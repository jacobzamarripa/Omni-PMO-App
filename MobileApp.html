<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Production Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ─── CUSTOM PROPERTIES ─────────────────────────────────────────── */
    :root {
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 34px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --dock-height: 72px;
      --card-radius: 32px;
      --card-max-w: 390px;
      --carousel-gap: 20px;

      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --card-bg-2: #f8fafc;
      --card-bg-3: #f1f5f9;
      --card-bg-detail: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --border: rgba(15, 23, 42, 0.08);
      --hairline: 1px solid var(--border);
      --surface-muted: rgba(148, 163, 184, 0.12);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --surface-overlay: rgba(241, 245, 249, 0.96);

      --shadow-card: 0 4px 12px rgba(0,0,0,0.03);
      --shadow-dock: 0 -4px 12px rgba(15, 23, 42, 0.03);
      --shadow-hub: 0 12px 30px rgba(15, 23, 42, 0.08);
      --starGold: #fbbf24;

      --accent-commit: #22c55e;
      --accent-skip: #ef4444;
      --accent-hub: #3b82f6;

      --flag-critical: #ef4444;
      --flag-review: #f59e0b;
      --flag-insight: #a855f7;

      --color-critical: #ef4444;
      --color-review: #f59e0b;
      --color-insight: #a855f7;

      --qb-ug: #f97316;
      --qb-ae: #94a3b8;
      --qb-fib: #000000;
      --qb-nap: #4338ca;
      --qb-done: #22c55e;
      --qb-ae-bg: repeating-linear-gradient(115deg, #94a3b8, #94a3b8 3px, #e2e8f0 3px, #e2e8f0 6px);
      --qb-fib-bg: linear-gradient(to bottom, #64748b 0%, #171717 100%);
      --qb-nap-bg: linear-gradient(90deg, #4338ca 0%, #6366f1 70%);

      --pill-permitting-bg: rgba(168,85,247,0.12);
      --pill-permitting-txt: #7e22ce;
      --pill-ofs-bg: rgba(59,130,246,0.15);
      --pill-ofs-txt: #1d4ed8;
      --pill-complete-bg: rgba(34,197,94,0.15);
      --pill-complete-txt: #15803d;
      --pill-hold-bg: rgba(148,163,184,0.12);
      --pill-hold-txt: #475569;
      --pill-active-bg: rgba(249,115,22,0.12);
      --pill-active-txt: #fb923c;
      --pill-default-bg: rgba(148,163,184,0.16);
      --pill-default-txt: #475569;

      --vel-ug: var(--qb-ug);
      --vel-ae: var(--qb-ae-bg);
      --vel-fib: var(--qb-fib-bg);
      --vel-nap: var(--qb-nap-bg);

      --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-expo: cubic-bezier(0.7, 0, 0.84, 0);
    }

    /* ─── RESET & BASE ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #main-workspace {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ─── LOADING SCREEN ────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid rgba(148, 163, 184, 0.22);
      border-top-color: rgba(15, 23, 42, 0.4);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* ─── DECK SCENE ────────────────────────────────────────────────── */
    #deck-scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(var(--safe-top) + 24px);
      padding-bottom: calc(var(--dock-height) + var(--safe-bottom) + 20px);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      transition: transform 0.55s var(--ease-out-expo);
      will-change: transform;
      z-index: 30;
      background: var(--bg);
      transform: translateX(100%);
    }
    #deck-scene.active {
      transform: translateX(0);
    }

    /* ─── SCENE HEADER ──────────────────────────────────────────────── */
    #scene-header {
      width: calc(100vw - 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .scene-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-muted);
    }
    .scene-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-tertiary);
    }

    /* ─── CARD STACK ────────────────────────────────────────────────── */
    #card-stack {
      position: relative;
      width: 100%;
      flex: 1;
      max-height: 520px;
      min-height: 280px;
      overflow: hidden;
      padding: 0 20px;
    }

    .project-card {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100vw - 32px);
      max-width: none;
      margin: 0;
      background: var(--card-bg);
      border: var(--hairline);
      border-radius: 28px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      will-change: transform, opacity;
      overflow: hidden;
      transition: transform 0.32s var(--ease-out-expo), opacity 0.25s ease;
    }
    .project-card.active-card { z-index: 12; pointer-events: auto; }
    .project-card.side-card { z-index: 10; pointer-events: none; opacity: 0.92; }
    .project-card.hidden-card { opacity: 0; pointer-events: none; }
    .card-outer-container {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
    }
    .card-header-sticky {
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(255,255,255,0.94));
      padding-bottom: 12px;
      border-bottom: var(--hairline);
      margin-bottom: 16px;
    }
    .card-scroll-body {
      overflow-y: auto;
      flex: 1;
      padding: 16px 20px 120px;
    }
    .card-scroll-body::-webkit-scrollbar { width: 0; }
    .qb-module {
      background: var(--card-bg);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .qb-module-header,
    .section-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .qb-module-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--hairline);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .card-persistent-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .qb-proj-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .qb-proj-title-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .qb-proj-id {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1.6px;
      color: var(--text-main);
      line-height: 1;
    }
    .qb-proj-meta {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .edit-engine-link {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(248, 250, 252, 0.98);
      border: var(--hairline);
      padding: 6px 8px;
      border-radius: 10px;
      text-decoration: none;
    }
    .qb-time-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .qb-time-bar {
      position: relative;
      height: 12px;
      border-radius: 999px;
      border: var(--hairline);
      background: rgba(226, 232, 240, 0.8);
      overflow: visible;
      margin-bottom: 14px;
    }
    .qb-time-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s var(--ease-out-expo);
    }
    .qb-time-bead {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      border: 3px solid;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.16);
    }
    .qb-target-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-top: var(--hairline);
      padding-top: 12px;
    }
    .qb-target-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .qb-target-date {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    /* ─── CARD INNER ────────────────────────────────────────────────── */
    .card-top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .card-fdh {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1.8px;
      color: var(--text-primary);
      line-height: 1;
      flex: 1;
      min-width: 0;
    }
    .glass-pill,
    .status-pill {
      font-size: 9px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .status-pill {
      padding: 5px 11px;
      border-radius: 20px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 4px;
    }
    .glass-pill {
      padding: 3px 8px;
      border-radius: 8px;
    }
    .pill-permitting { background: var(--pill-permitting-bg); color: var(--pill-permitting-txt); }
    .pill-ofs        { background: var(--pill-ofs-bg);        color: var(--pill-ofs-txt); }
    .pill-complete   { background: var(--pill-complete-bg);   color: var(--pill-complete-txt); }
    .pill-hold       { background: var(--pill-hold-bg);       color: var(--pill-hold-txt); }
    .pill-active     { background: var(--pill-active-bg);     color: var(--pill-active-txt); }
    .pill-default    { background: var(--pill-default-bg);    color: var(--pill-default-txt); }

    .card-sub {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .card-schedule-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .schedule-chip {
      border: var(--hairline);
      border-radius: 16px;
      background: rgba(248, 250, 252, 0.92);
      padding: 10px 12px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
    }
    .schedule-chip-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .schedule-chip-value {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.25;
    }
    .flag-strip {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .flag-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .flag-dot.critical { background: var(--flag-critical); box-shadow: 0 0 5px var(--flag-critical); }
    .flag-dot.review   { background: var(--flag-review); }
    .flag-dot.insight  { background: var(--flag-insight); }
    .flag-dot.info     { background: var(--text-tertiary); }

    .xing-badge {
      font-size: 9px;
      font-weight: 900;
      padding: 3px 9px;
      border-radius: 10px;
      background: rgba(249,115,22,0.12);
      color: #fb923c;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      align-self: flex-start;
      margin-bottom: 10px;
    }

    .card-section-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: none;
    }

    .velocity-section { margin-top: 4px; }
    .vel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .vel-row:last-child { margin-bottom: 0; }
    .vel-label {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      width: 30px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .vel-track {
      flex: 1;
      height: 14px;
      background: var(--bg);
      border: var(--hairline);
      border-radius: 7px;
      overflow: hidden;
      position: relative;
    }
    .vel-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s var(--ease-out-expo);
      min-width: 2px;
    }
    .vel-fill.ug  { background: var(--qb-ug); }
    .vel-fill.ae  { background: var(--qb-ae-bg); }
    .vel-fill.fib { background: var(--qb-fib-bg); border-right: 2px solid #ef4444; }
    .vel-fill.nap { background: var(--qb-nap-bg); border-right: 2px solid #6366f1; }
    .vel-pct {
      font-size: 10px;
      font-weight: 900;
      color: var(--text-tertiary);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ─── EMPTY STATE ───────────────────────────────────────────────── */
    #empty-state {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      pointer-events: none;
    }
    #empty-state.visible { display: flex; }
    .empty-icon { font-size: 44px; line-height: 1; }
    .empty-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .empty-sub   { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

    /* ─── HUB CONTENT ───────────────────────────────────────────────── */
    #hub-content {
      position: absolute;
      inset: 0;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(var(--safe-top) + 12px) 14px calc(var(--dock-height) + var(--safe-bottom) + 30px);
      z-index: 20;
      opacity: 1;
      pointer-events: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transition: opacity 0.28s ease;
    }
    #hub-content.review-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .hub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    #unified-list-container {
      background: var(--card-bg);
      border: var(--hairline);
      border-radius: 24px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .hub-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .tab-container {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .panel-tab {
      flex: 1;
      min-width: 0;
      border: var(--hairline);
      border-radius: 16px;
      background: rgba(255,255,255,0.78);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      padding: 12px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      touch-action: manipulation;
    }
    .panel-tab.active {
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    .panel-tab.is-clear {
      background: rgba(255,255,255,0.78);
      color: var(--text-secondary);
      box-shadow: none;
    }
    .ob-tab-badge {
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.14);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .panel-tab.active .ob-tab-badge {
      background: rgba(59, 130, 246, 0.12);
      color: #2563eb;
    }
    .inbox-list {
      overflow-y: auto;
      flex: 1;
      padding-bottom: 0;
    }
    .email-card {
      padding: 14px 16px 12px;
      border: none;
      border-bottom: 1px solid var(--border);
      border-left: 4px solid transparent;
      background: color-mix(in srgb, var(--card-bg) 92%, transparent);
      cursor: pointer;
      transition: background 0.1s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      gap: 7px;
      touch-action: manipulation;
    }
    .email-card:active { background: var(--card-bg-2); }
    .email-card.crit { border-left-color: var(--color-critical); }
    .email-card.warn { border-left-color: var(--color-review); }
    .email-card.info { border-left-color: var(--color-insight); }
    .em-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .em-fdh {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.4px;
      color: var(--text-main);
      line-height: 1.1;
    }
    .em-vendor {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .em-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 18px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid transparent;
      line-height: 1;
      white-space: nowrap;
    }
    .tag-red { background: rgba(254, 226, 226, 0.5); color: #991b1b; border-color: #fca5a5; }
    .tag-yellow { background: rgba(254, 252, 232, 0.5); color: #854d0e; border-color: #fde047; }
    .tag-muted { background: #27272a; color: #a1a1aa; border-color: #3f3f46; }
    .hub-empty {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 600;
      text-align: center;
      padding: 16px;
      cursor: default;
    }
    .hub-section-title {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 18px 0 10px;
    }

    #outbox-pane {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 92vh;
      transform: translateY(100%);

    .vendor-update-box {
      font-size: 11px;
      line-height: 1.45;
      padding: 12px 14px;
      border: 1.5px solid #fde047;
      border-radius: 14px 14px 14px 4px;

      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;

    }
    .system-diag-box.crit {
      border-left-color: var(--color-critical);
      background: rgba(239, 68, 68, 0.05);
    }
    .xing-hazard-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 10px 12px;
      color: #78350f;
      font-size: 11px;
      line-height: 1.45;

      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;

    #gantt-panel {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 2100;
      display: none;
      flex-direction: column;
      padding: calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 14px);
    }
    #gantt-panel.fullscreen { display: flex; }
    .gantt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    #gantt-ui-overlay {
      position: fixed;
      inset: 0;
      display: none;
      pointer-events: none;
      z-index: 2200;
    }
    .gantt-pill {
      padding: 8px 16px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--card-bg) 88%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: var(--hairline);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }
    #gantt-content {
      overflow: auto;
      flex: 1;
      position: relative;
      -webkit-overflow-scrolling: touch;
    }
    .gantt-area {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;

    .gantt-timeline-header {
      position: sticky;
      top: 0;
      z-index: 3;

      padding-bottom: 10px;
      backdrop-filter: blur(8px);
    }
    .gantt-timeline-grid {
      position: relative;
      min-width: 720px;
      border-radius: 20px;
      padding-top: 30px;
    }
    .gantt-grid-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        to right,
        rgba(148, 163, 184, 0.16) 0,
        rgba(148, 163, 184, 0.16) 1px,
        transparent 1px,
        transparent calc(100% / var(--gantt-days))
      );
      border-radius: 20px;
    }
    .gantt-date-markers {
      position: relative;
      height: 26px;
      min-width: 720px;
    }
    .gantt-date-pill {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 900;
      color: var(--text-muted);
      background: rgba(255,255,255,0.9);
      border: var(--hairline);
      border-radius: 999px;
      padding: 2px 8px;
    }
    .gantt-row {
      background: var(--card-bg);
      border: var(--hairline);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
      transition: opacity 0.2s ease, filter 0.2s ease;
      cursor: pointer;

    .gantt-row-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .gantt-row-id {
      font-size: 14px;
      font-weight: 900;
      color: var(--text-main);
    }
    .gantt-row-meta {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .gantt-bar-track {
      position: relative;
      height: 12px;
      border-radius: 999px;
      border: var(--hairline);
      background: rgba(226, 232, 240, 0.8);
      overflow: visible;
      margin-bottom: 8px;
    }
    .gantt-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 999px;
      transition: box-shadow 0.25s ease, transform 0.25s ease, opacity 0.25s ease;
      opacity: 0.88;
    }
    .gantt-today-line {
      position: absolute;
      top: 30px;
      bottom: 0;
      width: 2px;
      background: rgba(239,68,68,0.8);

      border-left: 1px dashed #ef4444;
      pointer-events: none;
    }
    .gantt-row-dates {
      display: flex;

      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);

    .gantt-area.has-focus .gantt-row:not(.is-active) {
      opacity: 0.35;
      filter: grayscale(40%);

    .gantt-row.is-active .gantt-bar-fill {
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--text-main), 0 10px 20px rgba(0,0,0,0.3) !important;
      transform: scaleY(1.15);
      opacity: 1 !important;
    }

    /* ─── DOCK ──────────────────────────────────────────────────────── */
    #dock {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 32px));
      height: 68px;
      background: rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 34px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 10px;
      z-index: 10000;
    }
    .dock-btn {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: var(--hairline);
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .dock-btn:active { transform: scale(0.88); }
    .dock-btn svg { width: 20px; height: 20px; }
    #dock-primary-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: 132px;
      padding: 8px 18px;
      background: rgba(255,255,255,0.88);
      border: var(--hairline);
      border-radius: 24px;
      color: var(--text-main);
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.25s var(--spring);
    }
    #dock-primary-pill.bump { transform: scale(1.12); }
    #dock-primary-main {
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      color: var(--text-main);
    }
    #dock-primary-sub {
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-muted);
    }
    .dock-action-btn {
      min-width: 64px;
      height: 44px;
      padding: 0 14px;
      border-radius: 22px;
      border: var(--hairline);
      background: rgba(255,255,255,0.82);
      color: var(--text-main);
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .dock-action-btn:active { transform: scale(0.96); }
    .dock-btn.dock-back-active {
      background: rgba(59,130,246,0.12);
      color: #2563eb;
    }
    .nav-hub-badge {
      position: absolute;
      top: -6px;
      left: -4px;
      right: auto;
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 6px;
      min-width: 20px;
      height: 18px;
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      line-height: 1;
      box-shadow: 0 4px 8px rgba(239, 68, 68, 0.3);
      z-index: 10001;
    }
    .admin-strip {
      padding: 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .admin-kpi {
      flex: 1 0 110px;
      min-width: 110px;
      border-radius: 16px;
      padding: 12px 10px;
      border: var(--hairline);
      background: rgba(248, 250, 252, 0.96);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .admin-kpi.active {
      box-shadow: 0 0 0 2px rgba(59,130,246,0.18), 0 10px 24px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }
    .admin-kpi.crossings.active {
      background: #422006;
      border-color: #facc15;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .admin-kpi.crossings.active .admin-kpi-val,
    .admin-kpi.crossings.active .admin-kpi-label { color: #fde047; }
    .admin-kpi.status.active {
      background: #450a0a;
      border-color: #ef4444;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .admin-kpi.status.active .admin-kpi-val,
    .admin-kpi.status.active .admin-kpi-label { color: #fca5a5; }
    .admin-kpi.boms.active {
      background: #022c22;
      border-color: #34d399;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .admin-kpi.boms.active .admin-kpi-val,
    .admin-kpi.boms.active .admin-kpi-label { color: #6ee7b7; }
    .admin-kpi-val {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-main);
      line-height: 1;
    }
    .admin-kpi-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }
    #dock-session-count {
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      color: #4ade80;
      letter-spacing: -1px;
    }

      color: var(--text-secondary);
      line-height: 1.4;
    }
    .detail-flag-item.critical { background: rgba(239,68,68,0.07); color: #fca5a5; }
    .detail-flag-item.review   { background: rgba(245,158,11,0.07); color: #fcd34d; }
    .detail-flag-item.insight  { background: rgba(168,85,247,0.07); color: #c084fc; }

    .detail-vel-fill.nap { background: var(--qb-nap-bg); border-right: 2px solid #6366f1; }
    .detail-vel-bead {

      top: 50%;
      width: 14px;

  state.deck = getDiagQueueItems();
  state.idx  = 0;
  state.reviewOpen = false;
  populateSearchFilters();
  syncCountLabel();
  hideSplash();
  renderDeck();
  renderHub();
  renderAdminSheet();
  handleLandscapeChange();
  updatePill();
  showHubHome();
}

function hideSplash() {
  var el = document.getElementById('loading-screen');
  if (el) el.classList.add('hidden');
}

/* ═══════════════════════════════════════════════════
   5. HELPERS
═══════════════════════════════════════════════════ */
function pillClass(status, stage) {
  var s = (status||'').toUpperCase(), g = (stage||'').toUpperCase();
  if (s.includes('PERMITTING')||g.includes('PERMITTING')) return 'pill-permitting';
  if (s.includes('OFS')||s.includes('OPEN FOR SALE')||g.includes('OFS')) return 'pill-ofs';
  if (s.includes('COMPLETE')) return 'pill-complete';
  if (s.includes('ON HOLD')||s.includes('HOLD')) return 'pill-hold';
  if (s.includes('ACTIVE')||g.includes('CONSTRUCTION')) return 'pill-active';
  return 'pill-default';
}

function pillLabel(status, stage) {
  return ((status||'').trim()) || ((stage||'').trim()) || 'Unknown';
}

function parseFlags(str) {
  if (!str) return [];
  return str.split('\n').map(function(l){ return l.trim(); }).filter(Boolean).map(function(l) {
    var sev = 'info';
    for(var i=0;i<FLAG_CRITICAL.length;i++) if(l.includes(FLAG_CRITICAL[i])){sev='critical';break;}
    if(sev==='info') for(var i=0;i<FLAG_REVIEW.length;i++) if(l.includes(FLAG_REVIEW[i])){sev='review';break;}
    if(sev==='info') for(var i=0;i<FLAG_INSIGHT.length;i++) if(l.includes(FLAG_INSIGHT[i])){sev='insight';break;}
    return { text:l, sev:sev };
  });
}

function getSeverity(flagsStr) {
  var rawFlags = (flagsStr || '').split('\n').map(function(f){ return f.trim(); }).filter(Boolean);
  var highest = 'info';
  rawFlags.forEach(function(flag) {
    if (
      flag.includes('ADMIN: CHECK CROSSINGS') ||
      flag.includes('ADMIN: REFRESH REF DATA') ||
      flag.includes('STATUS MISMATCH') ||
      flag.includes('MISSING QB STATUS') ||
      flag.includes('🚨') ||
      flag.includes('🛑') ||
      flag.includes('🚩')
    ) {
      highest = 'crit';
    } else if (
      highest !== 'crit' &&
      (flag.includes('⚠️') || flag.includes('🖍️') || flag.includes('🚧'))
    ) {
      highest = 'warn';
    }
  });
  return highest;
}

function getOfsBucket(ofsDate) {
  if (!ofsDate) return '';
  try {
    var date = new Date(ofsDate);
    return isNaN(date) ? '' : date.toLocaleDateString('en-US', { month:'short', timeZone:'UTC' }).toUpperCase();
  } catch (err) {
    return '';
  }
}

function velPcts(vel) {
  if (!vel) return {ug:0,ae:0,fib:0,nap:0};
  function p(t,b){ return b>0?Math.min(100,Math.round((t/b)*100)):0; }
  return {
    ug:  p(vel.ug&&vel.ug.tot,   vel.ug&&vel.ug.bom),
    ae:  p(vel.ae&&vel.ae.tot,   vel.ae&&vel.ae.bom),
    fib: p(vel.fib&&vel.fib.tot, vel.fib&&vel.fib.bom),
    nap: p(vel.nap&&vel.nap.tot, vel.nap&&vel.nap.bom),
  };
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) { return n ? Number(n).toLocaleString() : '—'; }

function formatDate(val) {
  if (!val) return 'TBD';
  var d = new Date(val);
  if (isNaN(d.getTime())) return String(val);
  return d.toLocaleDateString('en-US', { month:'numeric', day:'numeric', year:'2-digit', timeZone:'UTC' });
}

function getQBStatusClass(stage, status, isMissing) {
  if (isMissing) return 'pill-default';
  var st = (stage || '').toLowerCase();
  var stat = (status || '').toLowerCase();
  if (st.includes('ofs')) return 'pill-ofs';
  if (st.includes('permit')) return 'pill-permitting';
  if (stat.includes('complete')) return 'pill-complete';
  if (stat.includes('hold') || stat.includes('assign')) return 'pill-hold';
  if (stat.includes('active') || st.includes('construction')) return 'pill-active';
  return 'pill-default';
}

function getEditUrl(rid) {
  return rid ? "https://omnifiber.quickbase.com/db/bts3c49e9?a=q&qid=1000071&dlta=mog~&query={'3'.EX.'" + rid + "'}" : '#';
}

function statusColor(item) {
  var st = (item.stage || '').toLowerCase();
  var stat = (item.status || '').toLowerCase();
  var isComplete = st.includes('ofs') || stat.includes('complete');
  var isOnHold = stat.includes('hold');
  var isPermit = st.includes('permit');
  var end = item.cxEnd ? new Date(item.cxEnd) : null;
  var today = new Date();
  today.setHours(0,0,0,0);
  var isOverdue = end && !isNaN(end.getTime()) && today > end && !isComplete && !isOnHold && !isPermit;
  if (isComplete) return '#22c55e';
  if (isPermit) return '#a855f7';
  if (isOnHold) return '#94a3b8';
  if (isOverdue) return '#ef4444';
  return '#f59e0b';
}

function calcSchedulePct(item) {
  var start = item.cxStart ? new Date(item.cxStart) : null;
  var end = (item.cxEnd || item.targetDate) ? new Date(item.cxEnd || item.targetDate) : null;
  if (!start || !end || isNaN(start.getTime()) || isNaN(end.getTime()) || end <= start) return 0;
  var today = new Date();
  var pct = ((today - start) / (end - start)) * 100;
  return Math.max(0, Math.min(100, Math.round(pct)));
}

function renderVelocityBars(item) {
  var vel = velPcts(item.vel);
  var html = '';
  for (var vi = 0; vi < VEL_TYPES.length; vi++) {
    var t = VEL_TYPES[vi], p = vel[t];
    html += '<div class="vel-row"><div class="vel-label">' + VEL_LABELS[t] + '</div>' +
      '<div class="vel-track"><div class="vel-fill ' + t + '" style="width:' + p + '%"></div></div>' +
      '<div class="vel-pct">' + p + '%</div></div>';
  }
  return html;
}

function renderVelocityBarsDesktopStyle(item) {
  var vel = velPcts(item.vel);
  var html = '<div class="velocity-grid">';
  for (var vi = 0; vi < VEL_TYPES.length; vi++) {
    var t = VEL_TYPES[vi];
    var p = vel[t];
    var bucket = item.vel && item.vel[t] ? item.vel[t] : { tot:0, bom:0, daily:0 };
    var fill = t === 'ug' ? 'var(--qb-ug)' : t === 'ae' ? 'var(--qb-ae-bg)' : t === 'fib' ? 'var(--qb-fib-bg)' : 'var(--qb-nap-bg)';
    var bead = '';
    if (p > 0 && p < 100) {
      var beadColor = t === 'fib' ? '#ef4444' : t === 'nap' ? '#6366f1' : t === 'ae' ? '#94a3b8' : 'var(--qb-ug)';
      bead = '<div class="qb-vel-bead" style="left:calc(' + p + '% - 7px); border-color:' + beadColor + ';"></div>';
    }
    var unit = t === 'nap' ? 'NAPs' : 'ft';
    html += '<div class="qb-vel-item">' +
      '<div class="qb-vel-labels"><span>' + VEL_LABELS[t] + '</span><span>' + p + '%</span></div>' +
      '<div class="qb-vel-bar"><div class="qb-vel-fill" style="width:' + p + '%; background:' + fill + ';"></div>' + bead + '</div>' +
      '<div class="qb-vel-footer"><span>' + fmt(bucket.tot) + ' / ' + fmt(bucket.bom) + ' ' + unit + '</span><span>PACE ' + fmt(bucket.daily) + '/' + (t === 'nap' ? 'day' : 'day') + '</span></div>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

function renderDeliverableChip(label, status) {
  return '<div class="deliverable-chip ' + (status ? 'ok' : '') + '">' +
    '<span class="deliverable-dot"></span>' + esc(label) +
  '</div>';
}

function renderDeliverableGrid(item) {
  return '<div class="chips-row">' +
    '<div class="deliverable-group"><div class="deliverable-title">Delivered</div><div class="deliverable-chip-row">' +
      renderDeliverableChip('SPLICING', item.hasSpliceDel) +
      renderDeliverableChip('STRAND', item.hasStandDel) +
      renderDeliverableChip('CD', item.hasCDDel) +
      renderDeliverableChip('BOM', item.hasBOMDel) +
    '</div></div>' +
    '<div class="deliverable-group"><div class="deliverable-title">Distributed</div><div class="deliverable-chip-row">' +
      renderDeliverableChip('SPLICING', item.hasSpliceDist) +
      renderDeliverableChip('STRAND', item.hasStrandDist) +
      renderDeliverableChip('CD', item.hasCDDist) +
      renderDeliverableChip('BOM/PO', item.hasBOMPo) +
      renderDeliverableChip('SOW', item.hasSOW) +
    '</div></div>' +
  '</div>';
}

function renderFlags(flagsStr) {
  var flags = parseFlags(flagsStr);
  if (!flags.length) return '<div class="detail-section-body">No system diagnostics flagged.</div>';
  return '<div class="detail-flag-list">' + flags.map(function(f) {
    return '<div class="detail-flag-item ' + f.sev + '">' + esc(f.text) + '</div>';
  }).join('') + '</div>';
}

function renderXingHazardBox(item) {
  var detail = item.specXDetails || item.cdIntel || 'Special crossing detected. Verify permit status and restoration scope.';
  return '<div class="xing-hazard-box">' +
    '<div class="xing-hazard-title">Crossing Hazard</div>' +
    '<div>' + esc(detail) + '</div>' +
  '</div>';
}

function renderDiagnosticChips(item) {
  var flags = parseFlags(item.flags);
  return flags.length
    ? '<div class="detail-flag-list">' + flags.map(function(f){ return '<div class="detail-flag-item ' + f.sev + '">' + esc(f.text) + '</div>'; }).join('') + '</div>'
    : '<div class="detail-section-body">No system diagnostics flagged.</div>';
}

function syncCountLabel() {
  var el = document.getElementById('deck-count-label');
  if (el) el.textContent = state.deck.length ? (state.idx + 1) + ' / ' + state.deck.length : '0 / 0';
}

var VEL_TYPES  = ['ug','ae','fib','nap'];
var VEL_LABELS = {ug:'UG',ae:'AE',fib:'FIB',nap:'NAP'};

      '<div class="card-header-sticky">'+
        '<div class="card-persistent-header">'+

          '<div class="qb-proj-title-inline">'+
            '<div class="qb-proj-title-left">'+
              '<div class="qb-proj-id">'+esc(item.fdh||'—')+'</div>'+

            '<div class="glass-pill '+pillClassName+'">'+esc((item.stage || '-') + ' | ' + (item.status || '-'))+'</div>'+

        (item.cdIntel ? '<div class="qb-module"><div class="qb-module-header">CD Intelligence</div><div class="detail-section-body">'+esc(item.cdIntel)+'</div></div>' : '')+

function commentFieldId(item) {
  return 'p-comment-' + String(item && item.fdh ? item.fdh : 'item').replace(/[^A-Za-z0-9_-]/g, '_');
}

function makeCard(item, arrayIndex, carouselOffset) {
  var div = document.createElement('div');
  div.className = 'project-card';
  div.dataset.fdh = item.fdh || '';
  div.dataset.arrayIndex = String(arrayIndex);
  div.dataset.carouselOffset = String(carouselOffset);
  div.innerHTML = cardHTML(item);
  return div;
}

/* ═══════════════════════════════════════════════════
   7. DECK ENGINE
═══════════════════════════════════════════════════ */
function renderDeck() {
  var stack = document.getElementById('card-stack');
  if (!stack) return;
  stack.querySelectorAll('.project-card').forEach(function(card){ card.remove(); });

  var empty = document.getElementById('empty-state');
  if(!state.deck.length){
    if (empty) empty.classList.add('visible');
    syncCountLabel();
    return;
  }
  if (empty) empty.classList.remove('visible');
  syncCountLabel();

  var start = Math.max(0, state.idx - 1);
  var end = Math.min(state.deck.length - 1, state.idx + 1);
  for (var i = start; i <= end; i++) {
    var offset = i - state.idx;
    var card = makeCard(state.deck[i], i, offset);
    card.classList.add(offset === 0 ? 'active-card' : 'side-card');
    stack.appendChild(card);
    bindCard(card);
  }

  state.activeItem = state.deck[state.idx] || null;
  applyCarouselPositions(0, false);
  var activeCard = stack.querySelector('.active-card');
  if(activeCard) attachGestures(activeCard);
  updatePill();
}

function bindCard(card) {
  var arrayIndex = Number(card.dataset.arrayIndex);
  var item = state.deck[arrayIndex];
  var ta = card.querySelector('textarea');
  if (ta && item) {
    ta.addEventListener('input', function() { item.comment = ta.value; });
  }
}

function getCarouselCardWidth() {
  return Math.max(280, window.innerWidth - 32);
}

function carouselBasePx(offset) {
  return offset * (getCarouselCardWidth() + 20);
}

function applyCarouselPositions(dx, animated) {
  var cards = document.querySelectorAll('#card-stack .project-card');
  cards.forEach(function(card) {
    card.style.transition = animated ? 'transform '+CONFIG.CAROUSEL_MS+'ms cubic-bezier(0.16,1,0.3,1)' : 'none';
    var offset = Number(card.dataset.carouselOffset || 0);
    var x = carouselBasePx(offset) + dx;
    card.style.transform = 'translateX(calc(-50% + ' + x + 'px))';
    card.style.opacity = offset === 0 ? '1' : '0.92';
  });
}

function syncActiveCardComment() {
  var item = state.deck[state.idx];
  if (!item) return;
  var ta = document.getElementById(commentFieldId(item));
  if (ta) item.comment = ta.value;
}

function advanceCarousel(direction) {
  syncActiveCardComment();
  var nextIdx = state.idx + (direction === 'prev' ? -1 : 1);
  if (nextIdx < 0) {
    snapBackCarousel();
    return;
  }
  if (nextIdx >= state.deck.length) {
    showHubHome();
    toast('End of review queue');
    return;
  }
  state.idx = nextIdx;
  state.dragging = false;
  state.drag = null;
  renderDeck();
}

function snapBackCarousel() {
  state.dragging = false;
  state.drag = null;
  applyCarouselPositions(0, true);
}

/* ═══════════════════════════════════════════════════
   8. GESTURE ENGINE
═══════════════════════════════════════════════════ */
function attachGestures(card) {
  card.addEventListener('touchstart', onStart, {passive:false});
  card.addEventListener('touchmove',  onMove,  {passive:false});
  card.addEventListener('touchend',   onEnd,   {passive:false});
  card.addEventListener('touchcancel',onCancel,{passive:false});
}

function onStart(e) {
  if (!state.reviewOpen) return;
  if (e.target.closest('textarea, button, a, .card-scroll-body')) return;
  e.preventDefault();
  if(state.dragging) return;
  var t = e.touches[0];
  state.drag = { card:this, sx:t.clientX, dx:0 };
  this.style.transition = 'none';
}

function onMove(e) {
  if(!state.drag || state.dragging) return;
  e.preventDefault();
  if(!state.drag||state.drag.card!==this) return;
  var t = e.touches[0];
  state.drag.dx = t.clientX - state.drag.sx;
  applyCarouselPositions(state.drag.dx, false);
}

function onEnd(e) {
  if (!state.drag) return;
  e.preventDefault();
  if(!state.drag||state.drag.card!==this) return;
  var dx = state.drag.dx;
  var threshold = window.innerWidth * CONFIG.CAROUSEL_THRESHOLD;
  state.drag = null;
  if (dx < -threshold) advanceCarousel('next');
  else if (dx > threshold) advanceCarousel('prev');
  else snapBackCarousel();
}

function onCancel(e) {
  if(state.drag){ state.drag = null; snapBackCarousel(); }
}

function bumpPill() {
  var p=document.getElementById('dock-primary-pill');
  if(!p) return;
  p.classList.add('bump');
  setTimeout(function(){ p.classList.remove('bump'); },280);
}

/* ═══════════════════════════════════════════════════
   9. UI STATE MACHINE
═══════════════════════════════════════════════════ */
function showHubHome() {
  state.reviewOpen = false;
  state.drag = null;
  state.dragging = false;
  closeAdminSheet();
  var scene = document.getElementById('deck-scene');
  var hub = document.getElementById('hub-content');
  if (scene) scene.classList.remove('active');
  if (hub) hub.classList.remove('review-hidden');
  setDockMode();
}

function showReviewQueue(startFdh) {
  closeAdminSheet();
  if (startFdh) {
    for (var i = 0; i < state.deck.length; i++) {
      if (state.deck[i].fdh === startFdh) { state.idx = i; break; }
    }
  } else if (state.idx >= state.deck.length && state.deck.length) {
    state.idx = state.deck.length - 1;
  }
  state.reviewOpen = true;
  renderDeck();
  var scene = document.getElementById('deck-scene');
  var hub = document.getElementById('hub-content');
  if (scene) scene.classList.add('active');
  if (hub) hub.classList.add('review-hidden');
  setDockMode();
  haptic('light');
}

function setDockMode() {
  var homeBtn = document.getElementById('dock-home-btn');
  var primaryMain = document.getElementById('dock-primary-main');
  var primarySub = document.getElementById('dock-primary-sub');
  var secondary = document.getElementById('dock-secondary-btn');
  var homeIcon = document.getElementById('dock-home-icon');
  if (!primaryMain || !primarySub || !secondary || !homeBtn || !homeIcon) return;

  if (state.reviewOpen) {
    homeBtn.classList.remove('dock-back-active');
    primaryMain.textContent = 'Commit';
    primarySub.textContent = (state.deck[state.idx] && state.deck[state.idx].fdh) ? state.deck[state.idx].fdh : 'Review';
    secondary.textContent = 'Skip';
    homeIcon.innerHTML = '<path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>';
  } else {
    homeBtn.classList.remove('dock-back-active');
    primaryMain.textContent = 'Review Queue';
    primarySub.textContent = getDiagQueueItems().length + ' project' + (getDiagQueueItems().length !== 1 ? 's' : '');
    secondary.textContent = 'Search';
    homeIcon.innerHTML = '<path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>';
  }
}

function handleDockHome() {
  if (state.reviewOpen) openReviewHub('reviewed');
  else openReviewHub('admin');
}

function handlePrimaryAction() {
  if (state.reviewOpen) commitCurrentCard();
  else {
    state.deck = getDiagQueueItems();
    state.idx = 0;
    syncCountLabel();
    showReviewQueue();
  }
}

function handleSecondaryAction() {
  if (state.reviewOpen) skipCurrentCard();
  else openSearch();
}

function commitCurrentCard() {
  var item = state.deck[state.idx];
  if (!item) return;
  syncActiveCardComment();
  if (!item._committed) {
    logCommit(item);
    item._committed = true;
    bumpPill();
    haptic('medium');
    toast('Committed · ' + item.fdh);
  } else {
    haptic('light');
    toast('Already committed · ' + item.fdh);
  }
  advanceCarousel('next');
}

function skipCurrentCard() {
  if (!state.deck[state.idx]) return;
  syncActiveCardComment();
  haptic('light');
  advanceCarousel('next');
}

function openDetail(item) {
  if (item) showReviewQueue(item.fdh);
}

function closeDetailSheet() {
  state.detailOpen = false;
  state.activeItem = null;
  document.getElementById('detail-sheet').classList.remove('open');
}

function openSearch() {
  closeAdminSheet();
  state.searchOpen = true;
  document.getElementById('search-overlay').classList.add('open');
  applyFilters();
  setTimeout(function(){ var i=document.getElementById('search-input'); if(i) i.focus(); },360);
}

function closeSearch() {
  state.searchOpen = false;
  document.getElementById('search-overlay').classList.remove('open');
  var i=document.getElementById('search-input');
  if(i) i.blur();
}

function renderAdminSheetList(containerId, items, emptyText) {
  var el = document.getElementById(containerId);
  if (!el) return;
  if (!items.length) {

function selectDeckForFdh(fdh) {
  var adminSubset = getAdminItems();
  var crossingSubset = getCrossingItems();
  if (adminSubset.some(function(entry) { return entry.fdh === fdh; })) {
    state.deck = adminSubset.slice();
  } else if (crossingSubset.some(function(entry) { return entry.fdh === fdh; })) {
    state.deck = crossingSubset.slice();
  } else {
    state.deck = getDiagQueueItems().slice();
  }
  var idx = state.deck.findIndex(function(entry) { return entry.fdh === fdh; });
  if (idx < 0) {
    var item = state.all.find(function(entry) { return entry.fdh === fdh; });
    if (item) {
      state.deck = state.all.slice();
      idx = state.deck.findIndex(function(entry) { return entry.fdh === fdh; });

  state.idx = Math.max(0, idx);

  renderDeck();
}

function renderGantt(items) {
  var el = document.getElementById('gantt-content');
  if (!el) return;
  if (!items || !items.length) {
    el.innerHTML = '<div class="hub-empty">No schedule data available.</div>';
    return;
  }
  function safeParseDate(value) {
    if (!value || value === '-' || value === 'Unknown') return null;
    if (Object.prototype.toString.call(value) === '[object Date]') {
      return isNaN(value.getTime()) ? null : new Date(value.getTime());
    }
    var str = String(value).trim();
    if (!str) return null;
    var parsed = new Date(str);
    if (!isNaN(parsed.getTime())) return parsed;
    var parts = str.match(/(\d{1,2})[\-\/](\d{1,2})[\-\/](\d{2,4})/);
    if (!parts) return null;
    var year = parts[3].length === 2 ? Number('20' + parts[3]) : Number(parts[3]);
    parsed = new Date(year, Number(parts[1]) - 1, Number(parts[2]));
    return isNaN(parsed.getTime()) ? null : parsed;
  }
  var datedItems = items.map(function(item) {
    var start = safeParseDate(item.cxStart);
    var end = safeParseDate(item.targetDate || item.cxEnd);
    if (!start || !end || end < start) return null;
    return { item: item, start: start, end: end };
  }).filter(Boolean);
  if (!datedItems.length) {
    el.innerHTML = '<div class="hub-empty">No usable schedule dates (Checking Reference Data)...</div>';
    return;
  }
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var minDate = new Date(Math.min.apply(null, datedItems.map(function(entry) { return entry.start.getTime(); })));
  var maxDate = new Date(Math.max.apply(null, datedItems.map(function(entry) { return entry.end.getTime(); })));
  var defaultPast = new Date(today);
  defaultPast.setDate(today.getDate() - 14);
  var defaultFuture = new Date(today);
  defaultFuture.setDate(today.getDate() + 28);
  if (minDate > defaultPast) minDate = defaultPast;
  if (maxDate < defaultFuture) maxDate = defaultFuture;
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 14);
  var totalTime = Math.max(86400000, maxDate - minDate);
  var totalDays = Math.max(1, Math.ceil(totalTime / 86400000));
  var chartWidth = Math.max(760, totalDays * 22);
  var todayPct = ((today - minDate) / totalTime) * 100;
  var markers = [];
  for (var day = 0; day <= totalDays; day += 7) {
    var mark = new Date(minDate.getTime() + (day * 86400000));
    var left = (day / totalDays) * chartWidth;
    markers.push('<div class="gantt-date-pill" style="left:' + left + 'px;">' + (mark.getMonth() + 1) + '/' + mark.getDate() + '</div>');
  }
  var rows = datedItems.map(function(entry) {
    var item = entry.item;
    var start = entry.start;
    var end = entry.end;
    var startPct = ((start - minDate) / (maxDate - minDate)) * 100;
    var widthPct = Math.max(2, ((end - start) / (maxDate - minDate)) * 100);
    var color = statusColor(item);
    var activeClass = state.ganttSelectedFdh === item.fdh ? ' is-active' : '';
    var rowId = String(item.fdh || '').replace(/[^A-Za-z0-9_-]/g, '_');
    return '<div class="gantt-row' + activeClass + '" id="gantt-row-' + rowId + '" onclick="onGanttRowClick(\'' + esc(item.fdh) + '\')">' +
      '<div class="gantt-row-top"><div><div class="gantt-row-id">' + esc(item.fdh || '—') + '</div><div class="gantt-row-meta">' + esc((item.city || '') + (item.vendor ? ' · ' + item.vendor : '')) + '</div></div><div class="glass-pill ' + getQBStatusClass(item.stage, item.status, false) + '">' + esc((item.stage || '-') + ' | ' + (item.status || '-')) + '</div></div>' +
      '<div class="gantt-bar-track"><div class="gantt-bar-fill" style="left:' + startPct + '%; width:' + widthPct + '%; background:' + color + ';"></div></div>' +
      '<div class="gantt-row-dates"><span>Start: ' + formatDate(start) + '</span><span>Target: ' + formatDate(end) + '</span></div>' +
    '</div>';
  }).join('');
  el.innerHTML =
    '<div class="gantt-area' + (state.ganttSelectedFdh ? ' has-focus' : '') + '" id="gantt-area-main">' +
      '<div class="gantt-timeline-header"><div class="gantt-date-markers" style="width:' + chartWidth + 'px;">' + markers.join('') + '</div></div>' +
      '<div class="gantt-timeline-grid" style="width:' + chartWidth + 'px; --gantt-days:' + totalDays + ';">' +
        '<div class="gantt-grid-lines"></div>' +
        '<div class="gantt-today-line" style="left:' + todayPct + '%;"></div>' +
        rows +
      '</div>' +
    '</div>';
  setTimeout(function() {
    var scrollContainer = document.getElementById('gantt-content');
    var todayMarker = el.querySelector('.gantt-today-line');
    if (!scrollContainer || !todayMarker) return;
    var offset = todayMarker.offsetLeft - (scrollContainer.clientWidth / 2);
    scrollContainer.scrollLeft = Math.max(0, offset);
  }, 200);
}

function handleLandscapeChange() {
  var gantt = document.getElementById('gantt-panel');
  var main = document.getElementById('main-workspace');
  var overlay = document.getElementById('gantt-ui-overlay');
  if (!gantt || !main) return;
  var isLandscape = window.innerWidth > window.innerHeight;

    renderGantt(state.all);
  } else if (state.ganttSelectedFdh) {
    showReviewQueue(state.ganttSelectedFdh);
    state.ganttSelectedFdh = '';
  }
}

function commitFromDetail() {
  var item = state.activeItem;

  var ta = document.getElementById('p-comment');

  if (!item._committed) {

  haptic('medium');

function askGeminiForDraftMobile(btn) {
  var item = state.deck[state.idx];
  if (!item) return;
  
  var origText = btn.innerHTML;
  btn.innerHTML = 'DRAFTING...';
  btn.style.opacity = '0.7';
  btn.disabled = true;

  var payload = {
      fdh: item.fdh, vendor: item.vendor, status: item.stage + ' | ' + item.status,
      targetDate: item.targetDate, flags: item.flags, vendorComment: item.vendorComment,
      history: item.bench, productionToday: item.summary
  };

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(res) {
          var ta = document.getElementById(commentFieldId(item));
          if (ta) ta.value = res.text;
          item.comment = res.text;
          item.geminiInsight = res.text;
          item.geminiDate = res.date;
          btn.innerHTML = origText; btn.style.opacity = '1'; btn.disabled = false;
          haptic('light');
      })
      .withFailureHandler(function(err) {
          alert("AI Error: " + err.message);
          btn.innerHTML = origText; btn.style.opacity = '1'; btn.disabled = false;
      })
      .generateAndSaveFDHNarrative(payload);
  }
}

function populateDropdown(id, values) {
  var el = document.getElementById(id);
  if (!el) return;
  var current = el.value;
  while (el.options.length > 1) el.remove(1);
  values.forEach(function(value) {
    var option = document.createElement('option');
    option.value = value;
    option.text = value;
    el.appendChild(option);
  });
  if ([].slice.call(el.options).some(function(opt){ return opt.value === current; })) el.value = current;
}

function getDiagQueueItems() {
  return state.all.filter(function(item) {
    return parseFlags(item.flags).length > 0;
  }).sort(function(a, b) {
    var order = { crit: 0, warn: 1, info: 2 };
    return (order[getSeverity(a.flags)] || 9) - (order[getSeverity(b.flags)] || 9);
  });
}

function getAdminItems() {
  return state.all.filter(function(it) {
    var f = (it.flags || '').toUpperCase();
    for (var i = 0; i < QB_KW.length; i++) if (f.includes(QB_KW[i])) return true;
    return false;
  });
}

function getCrossingItems() {
  return state.all.filter(function(it) {
    var f = (it.flags || '').toUpperCase();
    for (var i = 0; i < XING_KW.length; i++) if (f.includes(XING_KW[i])) return true;
    return it.rawSpecialX === 'YES' || it.isXing;
  });
}

function getBomItems() {
  return state.all.filter(function(it) {
    var f = (it.flags || '').toUpperCase();
    return f.includes('CHECK BOM') || f.includes('PLEASE INPUT BOM') || f.includes('BOM');
  });
}

function calculateAdminCounts() {
  return {
    xing: getCrossingItems().length,
    status: getAdminItems().length,
    boms: getBomItems().length
  };
}

function getFilteredAdminItems() {
  var mode = state.adminFilter || 'all';
  if (mode === 'xing') return getCrossingItems();
  if (mode === 'status') return getAdminItems();
  if (mode === 'boms') return getBomItems();
  var merged = [];
  var seen = {};
  [getAdminItems(), getCrossingItems(), getBomItems()].forEach(function(group) {
    group.forEach(function(item) {
      if (seen[item.fdh]) return;
      seen[item.fdh] = true;
      merged.push(item);
    });
  });
  return merged;
}

    '</div>' +
    '<div class="admin-kpi boms ' + ((state.adminFilter === 'boms') ? 'active' : '') + '" onclick="filterMobileQueue(\'boms\')">' +
      '<div class="admin-kpi-val">' + counts.boms + '</div><div class="admin-kpi-label">Check BOMs</div>' +
    '</div>';
}

function filterMobileQueue(type) {
  state.adminFilter = state.adminFilter === type ? 'all' : type;
  renderAdminSheet();
}

function getHubItemsByTab(tab) {
  return getDiagQueueItems();
}

function renderList(items) {
  var list = document.getElementById('unified-list');
  if (!list) return;
  list.innerHTML = '';
  items.forEach(function(item) {
    var card = document.createElement('div');
    var rawFlags = String(item.flags || '').split('\n').filter(Boolean);
    var highestSev = getSeverity(item.flags);
    var tagsHtml = '';
    rawFlags.slice(0, 3).forEach(function(f) {
      var cleanText = f.replace(/[🚨🛑🚩⚠️🖍️🚧🪄🟣]/g, '').trim();
      var tagClass = 'tag-muted';
      if (f.includes('STATUS MISMATCH') || f.includes('MISSING QB STATUS') || f.includes('🚨') || f.includes('🛑') || f.includes('🚩')) {
        tagClass = 'tag-red';
      } else if (f.includes('⚠️') || f.includes('🖍️') || f.includes('🚧')) {
        tagClass = 'tag-yellow';
      }
      tagsHtml += '<span class="tag ' + tagClass + '">' + esc(cleanText) + '</span>';
    });
    if (rawFlags.length > 3) tagsHtml += '<span class="tag tag-muted">+' + (rawFlags.length - 3) + '</span>';
    card.className = 'email-card ' + highestSev;
    card.innerHTML =
      '<div class="em-header">' +
        '<div style="display:flex; align-items:baseline; gap:8px; min-width:0;">' +
          '<div class="em-fdh" style="flex-shrink:0;">' + esc(item.fdh || '—') + '</div>' +
          '<div class="em-vendor" style="font-size:9px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + esc(item.vendor || '—') + '</div>' +
        '</div>' +
        '<span class="glass-pill ' + pillClass(item.status, item.stage) + '">' + esc(pillLabel(item.status, item.stage)) + '</span>' +
      '</div>' +
      '<div class="em-tags">' + tagsHtml + '</div>';
    card.onclick = function() { openCarouselAt(item); };
    list.appendChild(card);
  });
}

function updateHubCounts() {
  var diagCount = getDiagQueueItems().length;
  var sceneLabel = document.getElementById('scene-count-label');
  if (sceneLabel) sceneLabel.textContent = diagCount + ' project' + (diagCount === 1 ? '' : 's');
}

function openCarouselAt(item) {
  var subset = getDiagQueueItems().slice();
  state.deck = subset;
  state.idx = 0;
  if (item && item.fdh) {
    for (var i = 0; i < subset.length; i++) {
      if (subset[i].fdh === item.fdh) {
        state.idx = i;
        break;
      }
    }
  }
  syncCountLabel();
  showReviewQueue(item && item.fdh ? item.fdh : undefined);
}

function applyFilters() {
  var vVen = (document.getElementById('filter-vendor') || {}).value || 'ALL';
  var vCit = (document.getElementById('filter-city') || {}).value || 'ALL';
  var vOfs = (document.getElementById('filter-ofs') || {}).value || 'ALL';
  var vSev = (document.getElementById('filter-severity') || {}).value || 'ALL';
  var searchTerm = ((document.getElementById('search-input') || {}).value || '').trim().toLowerCase();

  state.deck = state.all.filter(function(item) {
    var matchSev = vSev === 'ALL' || getSeverity(item.flags) === vSev;
    var matchVen = vVen === 'ALL' || item.vendor === vVen;
    var matchCit = vCit === 'ALL' || item.city === vCit;
    var matchOfs = vOfs === 'ALL' || getOfsBucket(item.ofsDate) === vOfs;
    var haystack = [
      item.fdh || '',
      item.city || '',
      item.vendor || '',
      item.stage || '',
      item.status || ''
    ].join(' ').toLowerCase();
    var matchSearch = !searchTerm || haystack.includes(searchTerm);
    return matchSev && matchVen && matchCit && matchOfs && matchSearch;
  });

  state.idx = 0;
  syncCountLabel();
  renderDeck();
  updatePill();
  renderSearchResults();
}

function pickResult(fdh) {
  closeSearch();
  showReviewQueue(fdh);
}

/* ═══════════════════════════════════════════════════
   12. HUB PANEL
═══════════════════════════════════════════════════ */
function renderHub() {
  var el = document.getElementById('unified-list');
  if (!el) return;
  updateHubCounts();
  var hits = getDiagQueueItems();
  if (!hits.length) {
    el.innerHTML = '<div class="hub-empty">No projects in the diagnostic queue</div>';
    return;
  }
  renderList(hits);
}

function jumpTo(fdh) {
  var item = state.all.find(function(entry) { return entry.fdh === fdh; });
  if (!item) return;
  var adminSubset = getAdminItems();
  var crossingSubset = getCrossingItems();
  if (adminSubset.some(function(entry) { return entry.fdh === fdh; })) {
    state.deck = adminSubset.slice();
  } else if (crossingSubset.some(function(entry) { return entry.fdh === fdh; })) {
    state.deck = crossingSubset.slice();
  } else {
    state.deck = getDiagQueueItems().slice();
  }
  state.idx = Math.max(0, state.deck.findIndex(function(entry) { return entry.fdh === fdh; }));
  syncCountLabel();
  showReviewQueue(fdh);
}

/* ═══════════════════════════════════════════════════
   13. COMMIT ENGINE
═══════════════════════════════════════════════════ */
function logCommit(item) {
  if(!item) return;
  var finalComment = item.comment || item.draft || '';
  var rev={ fdh:item.fdh||'', vendor:item.vendor||'', flags:item.flags||'', comment:finalComment };
  state.committed.push({
    fdh: item.fdh || '',
    vendor: item.vendor || '',
    city: item.city || '',
    stage: item.stage || '',
    status: item.status || '',
    flags: item.flags || '',
    comment: finalComment
  });
  state.count++;
  updatePill();
  renderHub();
  var hasGAS=typeof google!=='undefined'&&google.script&&google.script.run;
  if(hasGAS) google.script.run.withSuccessHandler(function(){}).withFailureHandler(function(){}).commitBatchReviewsToLog([rev]);
  renderAdminSheet();
}

function updatePill() {
  var el=document.getElementById('dock-session-count');
  if(el) el.textContent=state.count;
  setDockMode();
}

/* ═══════════════════════════════════════════════════
   14. TOAST & HAPTIC
═══════════════════════════════════════════════════ */
var toastTimer = null;

function toast(msg, ms) {
  ms = ms||2400;
  var el=document.getElementById('toast');
  if(!el) return;
  el.textContent=msg; el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('visible'); },ms);
}

function haptic(style) {
  if(!navigator.vibrate) return;
  ({light:[8],medium:[18],heavy:[28,8,18]})[style]&&navigator.vibrate(({light:[8],medium:[18],heavy:[28,8,18]})[style]);
}

/* ═══════════════════════════════════════════════════
   16. INIT
═══════════════════════════════════════════════════ */
function init() {
  var inp=document.getElementById('search-input');
  if(inp) inp.addEventListener('input', onSearchInput);
  ['filter-severity','filter-vendor','filter-city','filter-ofs'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('change', applyFilters);
  });

  // Detail sheet swipe-to-close from handle
  var handleRow=document.getElementById('detail-handle-row');
  var _sy=0;
  if(handleRow){
    handleRow.addEventListener('touchstart',function(e){ _sy=e.touches[0].clientY; },{passive:true});
    handleRow.addEventListener('touchend',  function(e){ if(e.changedTouches[0].clientY-_sy>60) closeDetailSheet(); _sy=0; },{passive:true});
  }

  var outboxHandle=document.getElementById('outbox-handle-row');
  var _outboxSy=0;
  if(outboxHandle){
    outboxHandle.addEventListener('touchstart',function(e){ _outboxSy=e.touches[0].clientY; },{passive:true});
    outboxHandle.addEventListener('touchend',function(e){ if(e.changedTouches[0].clientY-_outboxSy>50) closeAdminSheet(); _outboxSy=0; },{passive:true});
  }

  // Hub: stop propagation so deck gestures don't fire through it
  var hub=document.getElementById('hub-content');
  if(hub){
    hub.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});
    hub.addEventListener('touchmove', function(e){e.stopPropagation();},{passive:true});
  }

  // Global touchmove guard: allow scrollable areas, block everything else
  document.body.addEventListener('touchmove',function(e){
    var t=e.target;
    var ok=t.closest('#detail-scroll')||t.closest('#search-overlay')||t.closest('#hub-content')||t.closest('#search-input')||t.closest('.card-scroll-body')||t.closest('#outbox-scroll')||t.closest('#gantt-content')||t.closest('textarea');
    if(!ok) e.preventDefault();
  },{passive:false});

  // Keyboard escape
  document.addEventListener('keydown',function(e){
    if(e.key!=='Escape') return;
    if(state.detailOpen) closeDetailSheet();
    else if(state.adminSheetOpen) closeAdminSheet();
    else if(state.searchOpen) closeSearch();
    else if(state.reviewOpen) showHubHome();
  });

  window.addEventListener('resize', function(){ handleLandscapeChange(); });
  window.addEventListener('orientationchange', function(){ setTimeout(function(){ handleLandscapeChange(); }, 250); });

  loadData();
  renderAdminSheet();
  handleLandscapeChange();
}

document.addEventListener('DOMContentLoaded', init);
</script>
