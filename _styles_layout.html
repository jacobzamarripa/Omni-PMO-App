      /* 📱 TABLET (touch devices: iPad portrait + landscape; min-height excludes iPhones in landscape ~390px) */
      @media screen and (pointer: coarse) and (min-width: 769px) and (min-height: 600px) {
          :root { --inbox-panel-width: 280px; }

      /* iPad handles fallback — (hover: none) catches Edge which may not report pointer:coarse */

          :root { --inbox-panel-width: 280px; }
      }

      /* 🧠 MORPHING PANEL STYLING */
      .outbox-pane {
          display: none; /* Controlled by JS to prevent layout shifts */
          flex-direction: column;
          position: relative;
          top: 0; /* Align with top of anchor */
          right: 0;
          width: 380px;
          flex-shrink: 0; 
          height: calc(100% - (var(--panel-gutter-y) * 2) - var(--dock-panel-offset)) !important;
          max-height: none !important;
          margin-top: calc(var(--panel-gutter-y) + var(--dock-panel-offset));
          margin-right: var(--panel-gutter-x);
          margin-bottom: var(--panel-gutter-y);
          background: color-mix(in srgb, var(--card-bg) 98%, transparent);
          border-left: 1px solid var(--border);
          z-index: 1001;
          border: 1px solid var(--border);
          border-radius: 22px;
          box-shadow: 0 28px 60px rgba(15,23,42,0.24);
          overflow: hidden;
          min-width: 320px;
          min-height: 200px;
          
          /* Animation Properties */
          opacity: 0;
          transform: scale(0.1); /* Start small at the FAB's location */
          transform-origin: top right;
          transition: opacity 0.2s ease-out, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
          pointer-events: none;
          backdrop-filter: blur(14px);
      }

      .outbox-pane.open {
          display: flex;
          opacity: 1;
          transform: scale(1);
          pointer-events: auto;
      }

      /* 🧠 HIDE FAB WHEN PANEL IS OPEN */
      .reading-pane.admin-open #admin-fab {
          opacity: 0;
          transform: scale(0.5);
          pointer-events: none;
          transition: all 0.2s ease-in;
      }


      .outbox-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 119; backdrop-filter: none; -webkit-backdrop-filter: none; }

      #help-search-input { width: 100%; box-sizing: border-box; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); font-size: 12px; font-weight: 600; outline: none; box-shadow: inset 0 1px 3px rgba(0,0,0,0.03); transition: border-color 0.2s, box-shadow 0.2s; }
