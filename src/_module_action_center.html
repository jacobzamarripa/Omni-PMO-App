<script>
/* ============================================================
   FILE: _module_action_center.html
   ROLE: Action Center — 5-tab bulk PMO work surface
   TABS: Crossings | BOMs | Comments | Top Offenders | Reports
   READS: allActionItems, openQuickPeek(), stageExternalFinding()
   WRITES: #ac-kpi-rail, #ac-tab-crossings, #ac-tab-boms,
           #ac-tab-comments, #action-offenders-panel, #ac-tab-reports
   ============================================================ */
(function() {

  // ── Module state ──────────────────────────────────────────
  var _acActiveTab       = 'crossings';
  var _acXingsFilter     = 'all';     // 'all' | 'pending' | 'YES' | 'NO'
  var _acXingsSelected   = new Set();
  var _acCrossingsEdits  = {};        // {fdh: {xing, details}}
  var _acCommentsEdits   = {};        // {fdh: text}
  var _acCommentsSelected= new Set();
  var _acBomData         = null;      // loaded from backend
  var _acBomLoading      = false;
  var _acOpenPeekFdh     = null;      // FDH whose peek panel is currently open
  var _acReportsView     = 'crossings'; // which report is staged in Reports tab

  // ── Escape helper ─────────────────────────────────────────
  function _e(s) {
    return typeof esc === 'function'
      ? esc(String(s == null ? '' : s))
      : String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Active project filter ─────────────────────────────────
  function _acIsActive(item) {
    var stat = (item.status || '').toLowerCase();
    if (stat.includes('complete') || stat.includes('cancelled')) return false;
    var rd = item.reportDate ? new Date(item.reportDate) : null;
    var hasRecent = rd && (Date.now() - rd.getTime()) <= 21 * 24 * 60 * 60 * 1000;
    var st = (item.stage || '').toLowerCase();
    var inProgress = !st.includes('vendor assign');
    return inProgress || hasRecent;
  }

  // ── Tab switching ─────────────────────────────────────────
  function _acSwitchTab(tab) {
    _acActiveTab = tab;
    ['crossings','boms','comments','offenders','reports'].forEach(function(t) {
      var btn   = document.getElementById('ac-tab-btn-' + t);
      var panel = document.getElementById('ac-tab-' + t);
      if (btn)   btn.classList.toggle('active', t === tab);
      if (panel) panel.style.display = (t === tab) ? 'flex' : 'none';
    });
    _acRenderActiveTab();
  }

  function _acRenderActiveTab() {
    if      (_acActiveTab === 'crossings') _acRenderCrossingsTab();
    else if (_acActiveTab === 'boms')      _acRenderBOMsTab();
    else if (_acActiveTab === 'comments')  _acRenderCommentsTab();
    else if (_acActiveTab === 'offenders') _acRenderOffendersTab();
    else if (_acActiveTab === 'reports')   _acRenderReportsTab();
  }

  // ── KPI Rail ─────────────────────────────────────────────
  function _acRenderKpiRail() {
    var rail = document.getElementById('ac-kpi-rail');
    if (!rail) return;
    var items    = (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);
    var vendors  = {};
    var pending  = 0;
    var hasYes   = 0;
    items.forEach(function(i) {
      if (i.vendor) vendors[i.vendor] = true;
      var x = (i.qbRef && i.qbRef.xingExist) ? i.qbRef.xingExist.trim() : '';
      if (!x || x === '—') pending++;
      else if (x.toUpperCase() === 'YES') hasYes++;
    });
    var editedCount = Object.keys(_acCrossingsEdits).length + Object.keys(_acCommentsEdits).length;
    rail.innerHTML =
      _acKpiChip(items.length,               'Active Projects',  'ac-chip-queue',  null,          _acActiveTab === 'crossings') +
      _acKpiChip(pending,                    'X-ings Pending',   'ac-chip-crit',   'crossings',   _acActiveTab === 'crossings' && _acXingsFilter === 'pending') +
      _acKpiChip(hasYes,                     'X-ings: YES',      'ac-chip-warn',   null,          false) +
      _acKpiChip(Object.keys(vendors).length,'Active Vendors',   'ac-chip-vendor', null,          false) +
      _acKpiChip(editedCount,                'Unsaved Edits',    editedCount > 0 ? 'ac-chip-warn' : 'ac-chip-log', null, false);
  }

  function _acKpiChip(val, label, cls, action, active) {
    var clickAttr = '';
    if (action === 'crossings') clickAttr = 'onclick="_acSwitchTab(\'crossings\')"';
    return '<div class="ac-kpi-chip ' + cls + (active ? ' ac-chip-active' : '') + '" ' + clickAttr + '>' +
      '<div class="ac-kpi-val">' + val + '</div>' +
      '<div class="ac-kpi-label">' + label + '</div>' +
    '</div>';
  }

  // ════════════════════════════════════════════════════════════
  // TAB 1 — CROSSINGS
  // ════════════════════════════════════════════════════════════
  function _acRenderCrossingsTab() {
    var container = document.getElementById('ac-tab-crossings');
    if (!container) return;

    var items = (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);

    // Apply filter
    if (_acXingsFilter !== 'all') {
      items = items.filter(function(i) {
        var x = (i.qbRef && i.qbRef.xingExist) ? i.qbRef.xingExist.trim().toUpperCase() : '';
        if (_acXingsFilter === 'pending') return !x || x === '—';
        return x === _acXingsFilter.toUpperCase();
      });
    }

    var allFdhs = items.map(function(i){ return i.fdh; });
    var allChecked = items.length > 0 && items.every(function(i){ return _acXingsSelected.has(i.fdh); });
    var selCount = _acXingsSelected.size;

    var html =
      // Hidden file input for CSV import
      '<input type="file" id="ac-csv-import-input" accept=".csv,.xlsx" style="display:none" onchange="_acOnCsvFileSelected(this)">' +

      // Toolbar
      '<div class="ac-toolbar">' +
        '<div class="ac-toolbar-left">' +
          _acXingFilterPill('all',     'All')     +
          _acXingFilterPill('pending', 'Pending') +
          _acXingFilterPill('YES',     'YES')     +
          _acXingFilterPill('NO',      'NO')      +
        '</div>' +
        '<div class="ac-toolbar-right">' +
          (selCount > 0
            ? '<span class="ac-bulk-count">' + selCount + ' selected</span>' +
              '<button class="ac-bulk-action-btn" onclick="_acCommitSelectedCrossings()">Commit Selected</button>'
            : '') +
          '<button class="ac-bulk-action-btn ac-bulk-export" onclick="_acExportCrossingsCSV()">Export CSV</button>' +
          '<button class="ac-bulk-action-btn ac-import-btn" onclick="_acTriggerCsvImport()">Import CSV</button>' +
        '</div>' +
      '</div>';

    if (items.length === 0) {
      html += '<div class="ac-empty">' +
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        '<div>No items match this filter.</div>' +
      '</div>';
    } else {
      html += '<div class="ac-table-wrap"><table class="ac-table ac-table-crossings ac-table-workspace">' +
        '<thead><tr>' +
          '<th class="ac-th-check"><input type="checkbox" ' + (allChecked ? 'checked' : '') +
            ' onchange="_acToggleAllXings(this.checked,' + JSON.stringify(allFdhs) + ')"></th>' +
          '<th>FDH</th>' +
          '<th>Vendor</th>' +
          '<th>QB Status</th>' +
          '<th class="ac-th-xing-sel">Crossing?</th>' +
          '<th class="ac-th-xing-det">Details / Sheet Names</th>' +
        '</tr></thead><tbody>';

      items.forEach(function(item) {
        var isSel  = _acXingsSelected.has(item.fdh);
        var edit   = _acCrossingsEdits[item.fdh] || {};
        var qbX    = (item.qbRef && item.qbRef.xingExist) ? item.qbRef.xingExist.trim() : '';
        var qbDet  = (item.qbRef && item.qbRef['526'])    ? item.qbRef['526'].trim()    : '';
        var curX   = edit.xing    !== undefined ? edit.xing    : qbX;
        var curDet = edit.details !== undefined ? edit.details : qbDet;
        var isDirty = edit.xing !== undefined || edit.details !== undefined;
        var xPillCls = curX === 'YES' ? 'ac-xpill-yes' : (curX === 'NO' ? 'ac-xpill-no' : 'ac-xpill-none');
        var fdhSafe = _e(item.fdh);

        var xSelCls = 'xing-select' + (curX === 'YES' ? ' val-yes' : curX === 'NO' ? ' val-no' : '');
        var isPeekOpen = _acOpenPeekFdh === item.fdh;

        html +=
          '<tr class="ac-row ac-xing-row' + (isSel ? ' is-selected' : '') + (isDirty ? ' is-dirty' : '') + '">' +
          '<td class="ac-td-check" onclick="event.stopPropagation();_acToggleXingRow(\'' + fdhSafe + '\')">' +
            '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' onclick="event.stopPropagation()" onchange="_acToggleXingRow(\'' + fdhSafe + '\')">' +
          '</td>' +
          '<td class="ac-td-fdh" onclick="event.stopPropagation()">' +
            '<button class="ac-detail-btn' + (isPeekOpen ? ' is-active' : '') + '" data-fdh="' + fdhSafe + '" onclick="_acTogglePeek(\'' + fdhSafe + '\')" title="Open detail panel">⬡</button>' +
            '<span class="ac-fdh">' + fdhSafe + '</span>' +
          '</td>' +
          '<td>' + _e(item.vendor || '—') + '</td>' +
          '<td>' +
            '<span class="ac-xpill ' + xPillCls + '">' + _e(curX || '—') + '</span>' +
          '</td>' +
          '<td class="ac-td-xing-sel" onclick="event.stopPropagation()">' +
            '<select class="' + xSelCls + '" onchange="_acOnXingChange(\'' + fdhSafe + '\',this.value)">' +
              '<option value=""' + (!curX ? ' selected' : '') + '>—</option>' +
              '<option value="YES"' + (curX === 'YES' ? ' selected' : '') + '>YES</option>' +
              '<option value="NO"'  + (curX === 'NO'  ? ' selected' : '') + '>NO</option>' +
              '<option value="N/A"' + (curX === 'N/A' ? ' selected' : '') + '>N/A</option>' +
            '</select>' +
          '</td>' +
          '<td class="ac-td-xing-det" onclick="event.stopPropagation()">' +
            '<div class="xing-bubble">' +
              '<textarea class="xing-details-textarea" ' +
                'oninput="_acOnXingDetailChange(\'' + fdhSafe + '\',this.value);this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" ' +
                'onfocus="this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" ' +
                'placeholder="Sheet names, crossing types…">' + _e(curDet) + '</textarea>' +
            '</div>' +
          '</td>' +
          '</tr>';
      });

      html += '</tbody></table></div>';
    }

    container.innerHTML = html;
  }

  function _acXingFilterPill(val, label) {
    var active = _acXingsFilter === val;
    return '<button class="ac-filter-pill' + (active ? ' active' : '') +
      '" onclick="_acSetXingsFilter(\'' + val + '\')">' + label + '</button>';
  }

  function _acSetXingsFilter(val) {
    _acXingsFilter = val;
    _acRenderCrossingsTab();
  }

  function _acToggleXingRow(fdh) {
    if (_acXingsSelected.has(fdh)) _acXingsSelected.delete(fdh);
    else _acXingsSelected.add(fdh);
    _acRenderCrossingsTab();
    _acRenderKpiRail();
  }

  function _acToggleAllXings(checked, fdhs) {
    _acXingsSelected.clear();
    if (checked && fdhs) fdhs.forEach(function(f){ _acXingsSelected.add(f); });
    _acRenderCrossingsTab();
  }

  function _acOnXingChange(fdh, val) {
    if (!_acCrossingsEdits[fdh]) _acCrossingsEdits[fdh] = {};
    _acCrossingsEdits[fdh].xing = val;
    // Update select color class live
    var selEl = event && event.target;
    if (selEl && selEl.classList.contains('xing-select')) {
      selEl.classList.remove('val-yes', 'val-no');
      if (val === 'YES') selEl.classList.add('val-yes');
      else if (val === 'NO') selEl.classList.add('val-no');
    }
    _acRenderKpiRail();
  }

  function _acOnXingDetailChange(fdh, val) {
    if (!_acCrossingsEdits[fdh]) _acCrossingsEdits[fdh] = {};
    _acCrossingsEdits[fdh].details = val;
    _acRenderKpiRail();
  }

  function _acCommitSelectedCrossings() {
    var toCommit = [];
    _acXingsSelected.forEach(function(fdh) {
      var edit = _acCrossingsEdits[fdh] || {};
      var item = (typeof allActionItems !== 'undefined' ? allActionItems : []).find(function(i){ return i.fdh === fdh; });
      if (!item) return;
      var qbX   = (item.qbRef && item.qbRef.xingExist) ? item.qbRef.xingExist.trim() : '';
      var xing  = edit.xing    !== undefined ? edit.xing    : qbX;
      var det   = edit.details !== undefined ? edit.details : ((item.qbRef && item.qbRef['526']) || '');
      if (!xing) return; // skip if no crossing choice set
      toCommit.push({ fdh: fdh, xing: xing, xingDetails: det });
    });

    if (!toCommit.length) {
      if (typeof showToast === 'function') showToast('Set a crossing status on selected rows first.', 'error');
      return;
    }

    var date = new Date().toLocaleDateString();
    var successCount = 0;
    toCommit.forEach(function(item) {
      google.script.run
        .withSuccessHandler(function() {
          successCount++;
          delete _acCrossingsEdits[item.fdh];
          _acXingsSelected.delete(item.fdh);
          if (successCount === toCommit.length) {
            if (typeof showToast === 'function') showToast('Committed crossings for ' + successCount + ' FDH' + (successCount > 1 ? 's' : ''), 'success');
            _acRenderCrossingsTab();
            _acRenderKpiRail();
          }
        })
        .withFailureHandler(function(err) {
          if (typeof showToast === 'function') showToast('Failed ' + item.fdh + ': ' + (err.message || err), 'error');
        })
        .stageExternalFinding({ fdh: item.fdh, xing: item.xing, xingDetails: item.xingDetails, verifiedDate: date });
    });
  }

  // ── CSV Import ────────────────────────────────────────────
  function _acTriggerCsvImport() {
    var el = document.getElementById('ac-csv-import-input');
    if (el) el.click();
  }

  function _acOnCsvFileSelected(input) {
    var file = input.files && input.files[0];
    if (!file) return;
    input.value = '';
    if (typeof showToast === 'function') showToast('Parsing ' + file.name + '…', 'info');
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = btoa(e.target.result);
      google.script.run
        .withSuccessHandler(_acOnCsvParsed)
        .withFailureHandler(function(err) {
          if (typeof showToast === 'function') showToast('Parse failed: ' + (err.message || err), 'error');
        })
        .parseCrossingsCSV(base64);
    };
    reader.readAsBinaryString(file);
  }

  function _acOnCsvParsed(result) {
    var valid   = result.valid   || [];
    var skipped = result.skipped || [];
    var errors  = result.errors  || [];

    var summaryHtml =
      '<div class="ac-import-summary">' +
        '<div class="ac-import-stat ac-import-stat-good"><span class="ac-import-num">' + valid.length + '</span><span>rows will be staged</span></div>' +
        (skipped.length ? '<div class="ac-import-stat ac-import-stat-warn"><span class="ac-import-num">' + skipped.length + '</span><span>FDHs not recognized</span></div>' : '') +
        (errors.length  ? '<div class="ac-import-stat ac-import-stat-bad"><span class="ac-import-num">' + errors.length  + '</span><span>rows flagged invalid</span></div>' : '') +
      '</div>';

    var previewRows = valid.slice(0, 8).map(function(r) {
      return '<tr><td class="ac-td-fdh"><span class="ac-fdh">' + _e(r.fdh) + '</span></td>' +
        '<td><span class="ac-xpill ' + (r.xing === 'YES' ? 'ac-xpill-yes' : (r.xing === 'NO' ? 'ac-xpill-no' : 'ac-xpill-none')) + '">' + _e(r.xing||'—') + '</span></td>' +
        '<td class="ac-td-ellipsis">' + _e(r.details||'') + '</td></tr>';
    }).join('');

    var bodyHtml = summaryHtml +
      (valid.length > 0
        ? '<div class="ac-table-wrap" style="max-height:260px;overflow-y:auto;margin-top:14px;">' +
            '<table class="ac-table"><thead><tr><th>FDH</th><th>X-ing</th><th>Details</th></tr></thead><tbody>' +
            previewRows +
            (valid.length > 8 ? '<tr><td colspan="3" class="ac-more-row">…and ' + (valid.length - 8) + ' more</td></tr>' : '') +
          '</tbody></table></div>'
        : '<div class="ac-empty-sm" style="margin-top:14px;">No valid rows to stage.</div>') +
      (skipped.length ? '<div style="margin-top:10px;font-size:10px;color:var(--text-muted);">Unrecognized FDHs: ' + skipped.map(function(s){ return '<code>' + _e(s) + '</code>'; }).join(', ') + '</div>' : '') +
      (errors.length  ? '<div style="margin-top:6px;font-size:10px;color:#ef4444;">Errors: ' + errors.map(function(s){ return _e(s); }).join('; ') + '</div>' : '');

    _acShowModal(
      'Import Preview — ' + valid.length + ' row' + (valid.length !== 1 ? 's' : '') + ' to stage',
      bodyHtml,
      'Stage ' + valid.length + ' Row' + (valid.length !== 1 ? 's' : ''),
      function() {
        if (!valid.length) return false;
        google.script.run
          .withSuccessHandler(function(r) {
            if (typeof showToast === 'function') showToast('Staged ' + (r.staged||0) + ' crossings. Run QB sync to commit.', 'success');
            _acRenderCrossingsTab();
          })
          .withFailureHandler(function(err) {
            if (typeof showToast === 'function') showToast('Stage failed: ' + (err.message||err), 'error');
          })
          .stageParsedCrossings(valid);
      }
    );
  }

  // ── Crossings CSV Export ──────────────────────────────────
  function _acExportCrossingsCSV() {
    if (typeof showToast === 'function') showToast('Generating crossings export…', 'info');
    google.script.run
      .withSuccessHandler(function(url) {
        if (typeof showToast === 'function') showToast('Crossings CSV saved to Drive.', 'success');
        if (url && typeof window !== 'undefined') window.open(url, '_blank');
      })
      .withFailureHandler(function(err) {
        if (typeof showToast === 'function') showToast('Export failed: ' + (err.message||err), 'error');
      })
      .exportCrossingsCSV();
  }

  // ════════════════════════════════════════════════════════════
  // TAB 2 — BOMs
  // ════════════════════════════════════════════════════════════
  function _acRenderBOMsTab() {
    var container = document.getElementById('ac-tab-boms');
    if (!container) return;

    if (!_acBomData && !_acBomLoading) {
      // Show load trigger
      container.innerHTML =
        '<div class="ac-bom-load-shell">' +
          '<div class="ac-bom-load-icon">' +
            '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' +
          '</div>' +
          '<div class="ac-bom-load-title">BOM Comparison</div>' +
          '<div class="ac-bom-load-sub">Compare QuickBase BOM quantities against vendor-reported archive values. Differences are flagged for correction.</div>' +
          '<button class="btn btn-primary" style="margin-top:18px;padding:12px 28px;font-size:11px;" onclick="_acLoadBomData()">Load BOM Data</button>' +
        '</div>';
      return;
    }

    if (_acBomLoading) {
      container.innerHTML =
        '<div class="ac-bom-load-shell">' +
          '<div class="ac-bom-load-title">Loading BOM data…</div>' +
          '<div class="ac-bom-load-sub">Comparing QuickBase vs archive quantities.</div>' +
        '</div>';
      return;
    }

    var rows = _acBomData || [];
    var diffCount = rows.filter(function(r) { return r.hasDiff; }).length;

    var html =
      '<div class="ac-toolbar">' +
        '<div class="ac-toolbar-left">' +
          '<span class="ac-result-count">' + rows.length + ' projects · <span style="color:#ef4444">' + diffCount + ' with diffs</span></span>' +
        '</div>' +
        '<div class="ac-toolbar-right">' +
          '<button class="ac-bulk-action-btn ac-bulk-export" onclick="_acExportBOMCSV()">Export Comparison</button>' +
          '<button class="ac-bulk-action-btn" onclick="_acLoadBomData()" style="opacity:0.6;">Refresh</button>' +
        '</div>' +
      '</div>' +
      '<div class="ac-table-wrap"><table class="ac-table ac-table-bom ac-table-workspace">' +
      '<thead><tr>' +
        '<th>FDH</th><th>Vendor</th>' +
        '<th class="ac-bom-pair-hd" colspan="2">UG (ft)</th>' +
        '<th class="ac-bom-pair-hd" colspan="2">AE (ft)</th>' +
        '<th class="ac-bom-pair-hd" colspan="2">Fiber (ft)</th>' +
        '<th class="ac-bom-pair-hd" colspan="2">NAPs</th>' +
      '</tr>' +
      '<tr class="ac-bom-sub-hd">' +
        '<th></th><th></th>' +
        '<th>QB</th><th>Vendor</th>' +
        '<th>QB</th><th>Vendor</th>' +
        '<th>QB</th><th>Vendor</th>' +
        '<th>QB</th><th>Vendor</th>' +
      '</tr></thead><tbody>';

    if (rows.length === 0) {
      html += '<tr><td colspan="10" class="ac-empty-cell">No BOM data available.</td></tr>';
    } else {
      rows.forEach(function(r) {
        var fdhSafe = _e(r.fdh);
        var isPeekOpen = _acOpenPeekFdh === r.fdh;
        html += '<tr class="ac-row' + (r.hasDiff ? ' ac-bom-diff-row' : '') + '">' +
          '<td class="ac-td-fdh" onclick="event.stopPropagation()">' +
            '<button class="ac-detail-btn' + (isPeekOpen ? ' is-active' : '') + '" data-fdh="' + fdhSafe + '" onclick="_acTogglePeek(\'' + fdhSafe + '\')" title="Open detail panel">⬡</button>' +
            '<span class="ac-fdh">' + fdhSafe + '</span>' +
          '</td>' +
          '<td>' + _e(r.vendor || '—') + '</td>' +
          _acBomCell(r.qbUG,  r.vendorUG)  +
          _acBomCell(r.qbAE,  r.vendorAE)  +
          _acBomCell(r.qbFib, r.vendorFib) +
          _acBomCell(r.qbNAP, r.vendorNAP) +
        '</tr>';
      });
    }

    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  function _acBomCell(qbVal, vendorVal) {
    var isDiff = qbVal > 0 && vendorVal > 0 && Math.abs(qbVal - vendorVal) > 0;
    var cls = isDiff ? ' ac-bom-diff' : '';
    return '<td class="ac-bom-val' + cls + '">' + (qbVal     > 0 ? qbVal.toLocaleString()     : '—') + '</td>' +
           '<td class="ac-bom-val ac-bom-vendor' + cls + '">' + (vendorVal > 0 ? vendorVal.toLocaleString() : '—') + '</td>';
  }

  function _acLoadBomData() {
    _acBomLoading = true;
    _acRenderBOMsTab();
    google.script.run
      .withSuccessHandler(function(data) {
        _acBomData    = data;
        _acBomLoading = false;
        _acRenderBOMsTab();
      })
      .withFailureHandler(function(err) {
        _acBomLoading = false;

  function _acRenderCommentsTab() {

    var selCount = _acCommentsSelected.size;

        '<div class="ac-toolbar-left">' +

          (selCount > 0
            ? '<button class="ac-bulk-action-btn" onclick="_acAuditSelectedComments()">Audit History (' + selCount + ')</button>'
            : '') +
          (editCount > 0
            ? '<button class="ac-bulk-action-btn btn-primary" onclick="_acSaveAllComments()">Save Edited (' + editCount + ')</button>'
            : '') +
          '<button class="ac-bulk-action-btn ac-bulk-export" onclick="_acExportLatestComments()">Export Latest</button>' +

    if (items.length === 0) {
      html += '<div class="ac-empty"><div>No active projects found.</div></div>';

        var isSel  = _acCommentsSelected.has(item.fdh);
        var edited = _acCommentsEdits[item.fdh];
        var isDirty = edited !== undefined;
        var localNote = (typeof _acLoadNote === 'function') ? _acLoadNote(item.fdh) : null;
        var currentText = localNote ? localNote.text : '—';
        var fdhSafe = _e(item.fdh);

        var isPeekOpen = _acOpenPeekFdh === item.fdh;
        html +=
          '<tr class="ac-row' + (isSel ? ' is-selected' : '') + (isDirty ? ' is-dirty' : '') + '">' +
          '<td class="ac-td-check" onclick="event.stopPropagation();_acToggleCommentRow(\'' + fdhSafe + '\')">' +
            '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' onclick="event.stopPropagation()" onchange="_acToggleCommentRow(\'' + fdhSafe + '\')">' +
          '</td>' +
          '<td class="ac-td-fdh" onclick="event.stopPropagation()">' +
            '<button class="ac-detail-btn' + (isPeekOpen ? ' is-active' : '') + '" data-fdh="' + fdhSafe + '" onclick="_acTogglePeek(\'' + fdhSafe + '\')" title="Open detail panel">⬡</button>' +
            '<span class="ac-fdh">' + fdhSafe + '</span>' +
          '</td>' +
          '<td>' + _e(item.vendor || '—') + '</td>' +
          '<td class="ac-td-current-note">' + _e(currentText.length > 60 ? currentText.slice(0, 60) + '…' : currentText) + '</td>' +
          '<td class="ac-td-comment" onclick="event.stopPropagation()">' +
            '<textarea class="chat-bubble" ' +
              'oninput="_acOnCommentChange(\'' + fdhSafe + '\',this.value);this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" ' +
              'onfocus="this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" ' +
              'placeholder="Enter Omni/Manager comment…">' + _e(edited || '') + '</textarea>' +
          '</td>' +
          '</tr>';
      });

      html += '</tbody></table></div>';
    }

    container.innerHTML = html;
  }

  function _acToggleCommentRow(fdh) {

  function _acSaveAllComments() {
    var payload = [];
    var all = typeof allActionItems !== 'undefined' ? allActionItems : [];
    Object.keys(_acCommentsEdits).forEach(function(fdh) {
      var item = all.find(function(i){ return i.fdh === fdh; });

      payload.push({ fdh: fdh, rid: (item.qbRef && item.qbRef.pmRid) || '', comment: _acCommentsEdits[fdh] });
    });
    if (!payload.length) return;
    if (typeof showToast === 'function') showToast('Saving ' + payload.length + ' comment' + (payload.length > 1 ? 's' : '') + '…', 'info');

      .withSuccessHandler(function() {

  // ════════════════════════════════════════════════════════════
  // BULK STATUS MODAL (header utility)
  // ════════════════════════════════════════════════════════════
  function _acOpenBulkStatusModal() {
    var items = (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);
    if (!items.length) {
      if (typeof showToast === 'function') showToast('No active projects found.', 'error');
      return;
    }

    // Collect unique statuses from live data
    var statusSet = {};
    items.forEach(function(i){ if (i.status) statusSet[i.status] = true; });
    var statuses = Object.keys(statusSet).sort();

    // Compute milestone suggestions
    var today = new Date();
    today.setHours(0,0,0,0);
    var suggestions = {};
    items.forEach(function(item) {
      var st   = (item.stage  || '').toLowerCase();
      var stat = (item.status || '').toLowerCase();
      if (stat.includes('hold')) { suggestions[item.fdh] = null; return; }
      var cxEnd = item.cxEnd ? new Date(item.cxEnd) : null;
      if (cxEnd && today > cxEnd) { suggestions[item.fdh] = 'Complete'; return; }
      if (st.includes('ofs'))     { suggestions[item.fdh] = 'OFS';      return; }
      if (st.includes('pre-con')) { suggestions[item.fdh] = 'Pre-Construction'; return; }
      suggestions[item.fdh] = 'Active';
    });

    // Build suggestion summary chips
    var suggestMap = {};
    items.forEach(function(i) { var s = suggestions[i.fdh]; if (s) { suggestMap[s] = (suggestMap[s]||0)+1; } });
    var suggestHtml = Object.keys(suggestMap).map(function(s) {
      return '<button class="ac-filter-pill" style="font-size:10px;" onclick="_acApplySuggestion(\'' + _e(s) + '\')">' +
        _e(s) + ' <span style="opacity:0.6;">(' + suggestMap[s] + ')</span></button>';
    }).join('');

    var optHtml = statuses.map(function(s){ return '<option value="' + _e(s) + '">' + _e(s) + '</option>'; }).join('');

    var bodyHtml =
      '<div style="margin-bottom:14px;">' +
        '<div class="section-label" style="margin-bottom:8px;">MILESTONE SUGGESTIONS</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + suggestHtml + '</div>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:6px;">Click to auto-fill status based on milestone data.</div>' +
      '</div>' +
      '<div>' +
        '<label class="section-label" style="margin-bottom:6px;display:block;">APPLY STATUS TO ALL ACTIVE PROJECTS</label>' +
        '<select id="ac-bulk-status-sel" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-main);font-size:12px;font-weight:700;">' +
          '<option value="">— select status —</option>' + optHtml +
        '</select>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:8px;">Applies to all ' + items.length + ' active projects via QuickBase PATCH.</div>' +
      '</div>';

    window._acBulkStatusItems = items;
    window._acBulkStatusSuggestions = suggestions;

    _acShowModal('Bulk Status Change', bodyHtml, 'Apply to All Active', function() {
      var sel = document.getElementById('ac-bulk-status-sel');
      var status = sel ? sel.value : '';
      if (!status) {
        if (typeof showToast === 'function') showToast('Select a status first.', 'error');
        return false;
      }
      var payload = (window._acBulkStatusItems || []).map(function(i) {
        return { fdh: i.fdh, rid: (i.qbRef && i.qbRef.pmRid) || '', status: status };
      });
      if (typeof showToast === 'function') showToast('Applying status to ' + payload.length + ' projects…', 'info');
      google.script.run
        .withSuccessHandler(function() {
          if (typeof showToast === 'function') showToast('Status updated for ' + payload.length + ' projects.', 'success');
        })
        .withFailureHandler(function(err) {
          if (typeof showToast === 'function') showToast('Update failed: ' + (err.message||err), 'error');
        })
        .bulkWriteStatus(payload);
    });
  }

  function _acApplySuggestion(status) {
    var sel = document.getElementById('ac-bulk-status-sel');
    if (sel) sel.value = status;
  }

      load: function() {

        return _acBomData.rows.map(function(r) {
          return [r.fdh, r.vendor||'', r.qbUG||'', r.vendorUG||'', r.qbAE||'', r.vendorAE||'',
                  r.qbFib||'', r.vendorFib||'', r.qbNAP||'', r.vendorNAP||'', r.hasDiff ? 'YES' : ''];

      }
    },
    { key: 'comments', label: 'Manager Notes', dot: '#a855f7',

  function _acRenderReportsTab() {
    var container = document.getElementById('ac-tab-reports');
    if (!container) return;

    var def = _AC_REPORT_DEFS.find(function(d){ return d.key === _acReportsView; }) || _AC_REPORT_DEFS[0];

      return '<button class="ac-reports-nav-btn' + (d.key === _acReportsView ? ' active' : '') + '" ' +
             'onclick="_acReportsSwitchView(\'' + d.key + '\')">' +
             '<span class="ac-reports-nav-dot" style="background:' + d.dot + '"></span>' +
             d.label + '</button>';

    var previewHtml;
    if (isLoading) {
      previewHtml = '<div class="ac-reports-loading"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><span>Load BOM data first from the BOMs tab</span></div>';
    } else if (!rows || rows.length === 0) {
      previewHtml = '<div class="ac-reports-loading"><span>No data to preview</span></div>';
    } else {
      var thHtml = def.cols.map(function(c){ return '<th>' + _e(c) + '</th>'; }).join('');
      var tbodyHtml = rows.slice(0, 200).map(function(row) {
        return '<tr class="ac-row">' + row.map(function(v){ return '<td>' + _e(v == null ? '' : String(v)) + '</td>'; }).join('') + '</tr>';
      }).join('');
      var moreRow = rows.length > 200 ? '<tr><td colspan="' + def.cols.length + '" class="ac-more-row">Showing 200 of ' + rows.length + ' rows — export for full dataset</td></tr>' : '';
      previewHtml = '<div class="ac-reports-preview-table-wrap"><table class="ac-table"><thead><tr>' + thHtml + '</tr></thead><tbody>' + tbodyHtml + moreRow + '</tbody></table></div>';
    }

    var rowCount = (rows && !isLoading) ? rows.length : 0;
    var exportBtns =

      (def.key === 'crossings' ? '<button class="ac-bulk-action-btn" onclick="_acSwitchTab(\'crossings\')">Open Crossings Tab</button>' : '') +
      (def.key === 'boms' && !_acBomData ? '<button class="ac-bulk-action-btn" onclick="_acSwitchTab(\'boms\')">Load BOM Data</button>' : '') +
      (def.key === 'comments' ? '<button class="ac-bulk-action-btn" onclick="_acSwitchTab(\'comments\')">Open Comments Tab</button>' : '');

    container.innerHTML =
      '<div class="ac-reports-staging-shell">' +
        '<div class="ac-reports-staging-body">' +
          '<nav class="ac-reports-nav">' + navHtml + '</nav>' +
          '<div class="ac-reports-preview">' +
            '<div class="ac-reports-preview-toolbar">' +
              '<div>' +
                '<div class="ac-reports-preview-title">' + _e(def.label) + '</div>' +
                '<div class="ac-reports-preview-meta">' + (isLoading ? 'Awaiting data load' : rowCount + ' rows') + '</div>' +
              '</div>' +
              '<div style="display:flex;gap:6px;flex-wrap:wrap;">' + exportBtns + '</div>' +
            '</div>' +
            previewHtml +
          '</div>' +
        '</div>' +

  // ── Modal helper ──────────────────────────────────────────
  function _acShowModal(title, bodyHtml, confirmLabel, onConfirm) {
    var existing = document.getElementById('ac-modal-overlay');
    if (existing) existing.remove();
    var overlay = document.createElement('div');
    overlay.id = 'ac-modal-overlay';
    overlay.className = 'ac-modal-overlay';
    overlay.innerHTML =
      '<div class="ac-modal" onclick="event.stopPropagation()">' +
        '<div class="ac-modal-header">' +
          '<span class="ac-modal-title">' + _e(title) + '</span>' +
          '<button class="panel-tab-close" onclick="_acCloseModal()" style="flex-shrink:0;">✕</button>' +
        '</div>' +
        '<div class="ac-modal-body">' + bodyHtml + '</div>' +
        '<div class="ac-modal-footer">' +

        '</div>' +

    overlay.onclick = _acCloseModal;

    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);

  // ── Global exports ────────────────────────────────────────
  window._renderActionCenter      = _renderActionCenter;

  window._acOpenPeek              = _acOpenPeek;

  window._acToggleCommentRow      = _acToggleCommentRow;

  window._acOnCommentChange       = _acOnCommentChange;

  window._acAuditSelectedComments = _acAuditSelectedComments;

  window._acApplySuggestion       = _acApplySuggestion;
  window._acCloseModal            = _acCloseModal;
  window._acModalConfirm          = _acModalConfirm;
  window._acTogglePeek            = _acTogglePeek;
