<script>
/* ============================================================
   FILE: _module_action_center.html
   ROLE: Action Center — 5-tab bulk PMO work surface
   TABS: Crossings | BOMs | Comments | Top Offenders | Reports
   READS: allActionItems, openQuickPeek(), stageExternalFinding()
   WRITES: #ac-universal-filter-bar, #ac-tab-crossings, #ac-tab-boms,
           #ac-tab-comments, #action-offenders-panel, #ac-tab-reports
   ============================================================ */
(function() {

  // ── Module state ──────────────────────────────────────────
  var _acActiveTab       = 'worklog';
  var _acXingsFilter     = 'all';     // 'all' | 'pending' | 'YES' | 'NO'
  var _acXingsSearchQuery= '';
  var _acXingsSelected   = new Set();
  var _acXingGroupCollapsed = {};
  var _acXingVendorFilter   = null;    // null or vendor string
  var _acXingCityFilter     = null;    // null or city string
  var _acVisibleXingFdhs = [];
  var _acCrossingsEdits  = {};        // {fdh: {xing, details}}
  var _acCommentsEdits   = {};        // {fdh: text}
  var _acCommentsSelected= new Set();
  var _acBomData         = null;      // loaded from backend
  var _acBomLoading      = false;
  var _acOpenPeekFdh     = null;      // FDH whose peek panel is currently open
  var _acReportsView     = 'crossings'; // which report is staged in Reports tab
  var _acWorkLogData     = null;
  var _acWorkLogLoading  = false;
  var _acWorkLogDates    = { start: '', end: '' };
  var _acWorkLogVendorFilter = 'ALL';
  var _acWorkLogCollapsed = {}; // { groupKey: boolean }
  var _acWorkLogSelected  = new Set(); // { vendor::city::fdh::date }
  var _acBomSelected      = new Set(); // { fdh }
  var _acBomVendorFilter  = 'ALL';
  var _acBomCityFilter    = 'ALL';
  var _acBomCollapsed     = {};
  var _acCommentsGroupCollapsed = {}; // { 'v::VendorName': bool }

  // ── Universal filter bar state ────────────────────────────
  var _acUniversalSearchQuery = '';
  window._acUniversalSearchQuery = '';
  var _acUniversalFilters = {
    crossings: 'all',   // 'all' | 'pending' | 'YES' | 'NO'
    boms:      'all',   // 'all' | 'diffs'
    comments:  'all',   // 'all' | 'edited'
    offenders: null,    // null = All, string = flag key
    reports:   null,
    worklog:   'all'    // 'all' | 'discrepancies'
  };
  var _acUniversalSearchTimer = null;

  // ── Escape helper ─────────────────────────────────────────
  function _e(s) {
    return typeof esc === 'function'
      ? esc(String(s == null ? '' : s))
      : String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function _acJs(s) {
    return typeof escJs === 'function'
      ? escJs(String(s == null ? '' : s))
      : String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // ── Active project filter ─────────────────────────────────
  function _acIsActive(item) {
    var stat = (item.status || '').toLowerCase();
    if (stat.includes('complete') || stat.includes('cancelled')) return false;
    var rd = item.reportDate ? new Date(item.reportDate) : null;
    var hasRecent = rd && (Date.now() - rd.getTime()) <= 21 * 24 * 60 * 60 * 1000;
    var st = (item.stage || '').toLowerCase();
    var inProgress = !st.includes('vendor assign');
    return inProgress || hasRecent;
  }

  function _acCleanVal(val) {
    return String(val == null ? '' : val).trim();
  }

  function _acNormalizeXing(val) {
    var clean = _acCleanVal(val);
    if (!clean || clean === '—') return '';
    var upper = clean.toUpperCase();
    if (upper === 'TRUE' || upper === 'Y' || upper === 'YES' || upper.indexOf('X-ING YES') !== -1) return 'YES';
    if (upper === 'FALSE' || upper === 'N' || upper === 'NO' || upper === 'NONE') return 'NO';
    if (upper === 'N/A' || upper === 'NA') return 'N/A';
    return clean;
  }

  function _acInferCdXing(item) {
    var txt = _acCleanVal(item && item.cdIntel).toLowerCase();
    if (!txt) return '';
    if (txt === 'none' || txt.indexOf('no special crossings found') !== -1 || txt.indexOf('no crossings found') !== -1) return 'NO';
    return 'YES';
  }

  function _acResolveCrossing(item) {
    item = item || {};
    var edit = _acCrossingsEdits[item.fdh] || {};
    var qbRef = item.qbRef || {};
    var rawX = _acNormalizeXing(item.rawSpecialX);
    var xing = '';
    var source = 'pending';

    if (edit.xing !== undefined) {
      xing = _acNormalizeXing(edit.xing);
      source = 'edit';
    } else if (_acNormalizeXing(qbRef.xingExist)) {
      xing = _acNormalizeXing(qbRef.xingExist);
      source = 'quickbase';
    } else if (rawX) {
      xing = rawX;
      source = 'reference';
    } else if (item.isXing === true || item.isXing === 'true') {
      xing = 'YES';
      source = 'item';
    } else {
      xing = _acInferCdXing(item);
      if (xing) source = 'cd';
    }

    return {
      xing: xing,
      details: edit.details !== undefined
        ? edit.details
        : (_acCleanVal(qbRef['526']) || _acCleanVal(item.specXDetails) || _acCleanVal(item.cdIntel)),
      pending: !xing,
      source: source
    };
  }

  function _acGetActiveItems() {
    return (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);
  }

  function _acGetBomRows() {
    return Array.isArray(_acBomData) ? _acBomData : [];
  }

  function _acIsOffenderProjectActive(item) {
    var stat = (item.status || '').toLowerCase();
    var st = (item.stage || '').toLowerCase();
    if (stat.includes('complete') || stat.includes('hold')) return false;
    var inConstruction = !st.includes('ofs') && !st.includes('permit')
      && !st.includes('pre-con') && !st.includes('vendor assign');
    var rd = (typeof safeDate === 'function') ? safeDate(item.reportDate) : null;
    var hasRecentReport = rd && (Date.now() - rd.getTime()) <= 14 * 24 * 60 * 60 * 1000;
    return inConstruction || hasRecentReport;
  }

  function _acGetOffenderCount() {
    var vendors = {};
    (typeof allActionItems !== 'undefined' ? allActionItems : []).forEach(function(item) {
      if (!item.vendor || !item.flags) return;
      if (!_acIsOffenderProjectActive(item)) return;
      var flags = String(item.flags).split('\n').map(function(f){ return f.trim(); }).filter(Boolean);
      if (flags.length) vendors[item.vendor] = true;
    });
    return Object.keys(vendors).length;
  }

  function _acGetReportRowAvailability() {
    var activeCount = _acGetActiveItems().length;
    return activeCount + _acGetBomRows().length + activeCount;
  }

  function _acSyncTabBadges() {
    var activeItems = _acGetActiveItems();
    var pendingCrossings = activeItems.filter(function(i){ return _acResolveCrossing(i).pending; }).length;
    var bomRows = _acGetBomRows();

    var workLogDiscrepancies = 0;
    if (_acWorkLogData) {
      Object.keys(_acWorkLogData).forEach(function(v) {
        Object.keys(_acWorkLogData[v]._cities).forEach(function(c) {
          Object.keys(_acWorkLogData[v]._cities[c]._fdhs).forEach(function(f) {
            Object.keys(_acWorkLogData[v]._cities[c]._fdhs[f]._dates).forEach(function(d) {
              if (_acWorkLogData[v]._cities[c]._fdhs[f]._dates[d].diff.hasDiscrepancy) workLogDiscrepancies++;
            });
          });
        });
      });
    }

    var badgeVals = {
      crossings: pendingCrossings,
      boms: _acBomData ? bomRows.filter(function(r){ return r.hasDiff; }).length : (_acBomLoading ? 0 : 'Load'),
      comments: Object.keys(_acCommentsEdits).length,
      offenders: _acGetOffenderCount(),
      reports: _acGetReportRowAvailability(),
      worklog: _acWorkLogData ? workLogDiscrepancies : (_acWorkLogLoading ? 0 : 'Load')
    };

    Object.keys(badgeVals).forEach(function(key) {
      var el = document.querySelector('[data-ac-tab-badge="' + key + '"]');
      if (!el) return;
      var val = badgeVals[key];
      var show = val === 'Load' || Number(val) > 0;
      el.hidden = !show;
      el.textContent = val === 'Load' ? 'Load' : String(val);
      el.classList.toggle('ac-tab-badge-green', key === 'reports' && show);
      el.classList.toggle('ac-tab-badge-warn', (key === 'boms' || key === 'worklog') && val === 'Load');
    });
  }

  // ── Tab switching ─────────────────────────────────────────
  function _acSwitchTab(tab) {
    var prevTab = _acActiveTab;
    _acActiveTab = tab;
    if (tab !== 'crossings') {
      var ws = document.getElementById('action-workspace');
      if (ws) ws.classList.remove('ac-xing-scrolled');
    }
    if (tab === 'reports' && typeof closeQuickPeek === 'function') {
      closeQuickPeek();
    } else if (tab !== prevTab) {
      _acOpenPeekFdh = null;
    }
    ['crossings','boms','comments','offenders','reports','worklog'].forEach(function(t) {
      var btn   = document.getElementById('ac-tab-btn-' + t);
      var panel = document.getElementById('ac-tab-' + t);
      if (btn)   btn.classList.toggle('active', t === tab);
      if (panel) panel.style.display = (t === tab) ? 'flex' : 'none';
    });
    _acRenderUniversalFilterBar(tab);
    _acRenderActiveTab();
    _acSyncTabBadges();
  }

  function _acRenderActiveTab() {
    if      (_acActiveTab === 'crossings') _acRenderCrossingsTab();
    else if (_acActiveTab === 'boms')      _acRenderBOMsTab();
    else if (_acActiveTab === 'comments')  _acRenderCommentsTab();
    else if (_acActiveTab === 'offenders') _acRenderOffendersTab();
    else if (_acActiveTab === 'reports')   _acRenderReportsTab();
    else if (_acActiveTab === 'worklog')   _acRenderWorkLogTab();
    _acEnsurePermanentPeek();
  }

  function _acGetPeekSeedItems() {
    if (_acActiveTab === 'boms')      return _acGetFilteredBomItems();
    if (_acActiveTab === 'crossings') return _acGetFilteredCrossingItems();
    if (_acActiveTab === 'comments')  return _acGetFilteredCommentItems();
    return [];
  }

  function _acEnsurePermanentPeek() {
    if (_acActiveTab === 'reports') return;
    var ws = document.getElementById('action-workspace');
    if (!ws || !ws.classList.contains('ws-active')) return;
    if (_acOpenPeekFdh) return;
    _acOpenEmptyPeek();
  }

  function _acOpenEmptyPeek() {
    var panel = document.getElementById('gantt-quick-peek');
    var ws = document.getElementById('action-workspace');
    if (!panel || !ws || !ws.classList.contains('ws-active')) return;
    panel.innerHTML =
      '<div class="ac-empty-peek">' +
        '<div class="ac-empty-peek-kicker">Action Center</div>' +
        '<div class="ac-empty-peek-title">Select a row</div>' +
        '<div class="ac-empty-peek-body">Project details will appear here when you open a vendor item.</div>' +
      '</div>';
    panel.classList.add('open');
    ws.classList.add('ac-peek-open');
    _acOpenPeekFdh = null;
    _acUpdateDetailBtns();
  }

  // ── Per-tab contextual KPI strip ─────────────────────────
  function _acKpiChip(val, label, cls, onclick) {
    var clickAttr = onclick ? 'onclick="' + onclick + '"' : '';
    return '<div class="ac-kpi-chip ' + (cls || '') + '" ' + clickAttr + '>' +
      '<div class="ac-kpi-val">' + val + '</div>' +
      '<div class="ac-kpi-label">' + label + '</div>' +
    '</div>';
  }

  function _acRenderTabKpi(tab) {
    var items = _acGetActiveItems();
    var html = '<div class="ac-kpi-rail ac-tab-kpi-rail">';

    if (tab === 'crossings') {
      var xings   = _acGetFilteredCrossingItems();
      var pending = xings.filter(function(i){ return _acResolveCrossing(i).pending; }).length;
      var yes     = xings.filter(function(i){ return _acResolveCrossing(i).xing.toUpperCase() === 'YES'; }).length;
      var no      = xings.filter(function(i){ return _acResolveCrossing(i).xing.toUpperCase() === 'NO'; }).length;
      var xf = _acUniversalFilters.crossings;
      html += _acKpiChip(items.length, 'Active Projects', 'ac-chip-queue');
      html += _acKpiChip(pending, 'Pending', (pending > 0 ? 'ac-chip-crit' : 'ac-chip-queue') + (xf === 'pending' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('crossings','pending')");
      html += _acKpiChip(yes, 'YES', 'ac-chip-yes' + (xf === 'YES' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('crossings','YES')");
      html += _acKpiChip(no, 'NO', (no > 0 ? 'ac-chip-no' : 'ac-chip-queue') + (xf === 'NO' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('crossings','NO')");

    } else if (tab === 'boms') {
      var bomRows = _acGetBomRows();
      var diffs   = bomRows.filter(function(r){ return r.hasDiff; }).length;
      var clean   = bomRows.length - diffs;
      var bf = _acUniversalFilters.boms;
      html += _acKpiChip(_acBomData ? bomRows.length : '—', 'Total Projects', 'ac-chip-queue');
      html += _acKpiChip(_acBomData ? diffs : '—', 'With Diffs', (diffs > 0 ? 'ac-chip-no' : 'ac-chip-queue') + (bf === 'diffs' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('boms','diffs')");
      html += _acKpiChip(_acBomData ? clean : '—', 'Clean', 'ac-chip-yes' + (bf === 'clean' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('boms','clean')");

    } else if (tab === 'comments') {
      var edited = Object.keys(_acCommentsEdits).length;
      var cf = _acUniversalFilters.comments;
      html += _acKpiChip(items.length, 'Active Projects', 'ac-chip-queue');
      html += _acKpiChip(edited, 'Edited', (edited > 0 ? 'ac-chip-warn' : 'ac-chip-queue') + (cf === 'edited' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('comments','edited')");

    } else if (tab === 'worklog') {
      var wlVendors = _acWorkLogData ? Object.keys(_acWorkLogData).length : '—';
      var wlDays = 0; var wlDisc = 0;
      if (_acWorkLogData) {
        Object.keys(_acWorkLogData).forEach(function(v) {
          Object.keys(_acWorkLogData[v]._cities).forEach(function(c) {
            Object.keys(_acWorkLogData[v]._cities[c]._fdhs).forEach(function(f) {
              Object.keys(_acWorkLogData[v]._cities[c]._fdhs[f]._dates).forEach(function(d) {
                wlDays++;
                if (_acWorkLogData[v]._cities[c]._fdhs[f]._dates[d].diff.hasDiscrepancy) wlDisc++;
              });
            });
          });
        });
      }
      var wf = _acUniversalFilters.worklog;
      html += _acKpiChip(wlVendors, 'Vendors', 'ac-chip-queue');
      html += _acKpiChip(_acWorkLogData ? wlDays : '—', 'Record-Days', 'ac-chip-queue');
      html += _acKpiChip(_acWorkLogData ? wlDisc : '—', 'Discrepancies', (wlDisc > 0 ? 'ac-chip-crit' : 'ac-chip-queue') + (wf === 'discrepancies' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('worklog','discrepancies')");
      html += _acKpiChip(_acWorkLogSelected.size || '—', 'Selected', 'ac-chip-queue' + (wf === 'selected' ? ' ac-chip-active' : ''), "_acSetUniversalFilter('worklog','selected')");

    } else if (tab === 'reports') {
      _AC_REPORT_DEFS.forEach(function(d) {
        var isActive = _acReportsView === d.key;
        var rows = d.load();
        var count = rows ? rows.length : '—';
        html += '<div class="ac-kpi-chip' + (isActive ? ' ac-chip-active' : '') + '" ' +
          'onclick="_acReportsSwitchView(\'' + d.key + '\')" style="cursor:pointer">' +
          '<div class="ac-kpi-val" style="color:' + d.dot + '">' + count + '</div>' +
          '<div class="ac-kpi-label">' + _e(d.label) + '</div>' +
          '</div>';
      });
    }

    html += '</div>';
    return html;
  }

  // ── Universal filter bar ─────────────────────────────────
  function _acRenderUniversalFilterBar(tab) {
    var el = document.getElementById('ac-universal-filter-bar');
    if (!el) return;
    el.setAttribute('data-tab', tab);

    var qSafe = _e(_acUniversalSearchQuery);

    // For crossings: prepend KPI mini chips — hidden by CSS until ac-xing-scrolled
    var kpiPrefix = '';
    if (tab === 'crossings') {
      var ufbItems = _acGetFilteredCrossingItems();
      var ufbPend = ufbItems.filter(function(i){ return _acResolveCrossing(i).pending; }).length;
      var ufbYes  = ufbItems.filter(function(i){ return (_acResolveCrossing(i).xing || '').toUpperCase() === 'YES'; }).length;
      var ufbNo   = ufbItems.filter(function(i){ return (_acResolveCrossing(i).xing || '').toUpperCase() === 'NO';  }).length;
      kpiPrefix = '<span class="ac-tki-chip ac-tki-pend">' + ufbPend + ' Pend</span>'
        + '<span class="ac-tki-chip ac-tki-yes">'  + ufbYes + ' YES</span>'
        + '<span class="ac-tki-chip ac-tki-no">'   + ufbNo  + ' NO</span>'
        + '<div class="ac-ufb-sep ac-ufb-kpi-sep"></div>';
    }

    var html = kpiPrefix + '<input type="text" class="ac-ufb-search" id="ac-ufb-search" value="' + qSafe + '" ' +
      'placeholder="Search ' + (tab === 'crossings' ? 'FDH, vendor, city, details' :
                                tab === 'boms'      ? 'FDH, vendor, city' :
                                tab === 'comments'  ? 'FDH, vendor, city' :
                                tab === 'offenders' ? 'vendor, FDH, flag' : '') + '…" ' +
      'oninput="_acOnUniversalSearch(this.value)">';

    if (tab === 'crossings') {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','pending','YES','NO'].forEach(function(val) {
        var label = val === 'all' ? 'All' : val.charAt(0).toUpperCase() + val.slice(1);
        var active = _acUniversalFilters.crossings === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'crossings\',\'' + val + '\')">' + label + '</button>';
      });
    } else if (tab === 'boms' && _acBomData) {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','diffs'].forEach(function(val) {
        var label = val === 'all' ? 'All' : 'Has Diffs';
        var active = _acUniversalFilters.boms === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'boms\',\'' + val + '\')">' + label + '</button>';
      });

      html += '<div class="ac-ufb-sep"></div>';
      var bomVendors = _acGetWorkLogVendors(); 
      html += '<select class="ac-ufb-select" onchange="_acSetBomVendor(this.value)">';
      html += '<option value="ALL"' + (_acBomVendorFilter === 'ALL' ? ' selected' : '') + '>All Vendors</option>';
      bomVendors.forEach(function(v) {
        html += '<option value="' + _e(v) + '"' + (_acBomVendorFilter === v ? ' selected' : '') + '>' + _e(v) + '</option>';
      });
      html += '</select>';

      html += '<div class="ac-ufb-sep"></div>';
      var bomCities = _acGetWorkLogCities(); // Helper to get unique cities
      html += '<select class="ac-ufb-select" onchange="_acSetBomCity(this.value)">';
      html += '<option value="ALL"' + (_acBomCityFilter === 'ALL' ? ' selected' : '') + '>All Cities</option>';
      bomCities.forEach(function(c) {
        html += '<option value="' + _e(c) + '"' + (_acBomCityFilter === c ? ' selected' : '') + '>' + _e(c) + '</option>';
      });
      html += '</select>';

      html += '<div class="ac-ufb-sep"></div>';
      html += '<button class="ac-ufb-action-btn" onclick="_acLoadBomData()" ' + (_acBomLoading ? 'disabled' : '') + ' style="background:var(--accent);color:white;border-color:var(--accent)">' + (_acBomLoading ? 'Refreshing...' : 'Refresh BOMs') + '</button>';
    } else if (tab === 'comments') {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','edited'].forEach(function(val) {
        var label = val === 'all' ? 'All' : 'Edited';
        var active = _acUniversalFilters.comments === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'comments\',\'' + val + '\')">' + label + '</button>';
      });
    } else if (tab === 'offenders') {
      // Top Offenders manages its own toolbar and filter chrome — universal bar is intentionally empty here
      el.innerHTML = '';
      return;
    } else if (tab === 'reports') {
      html += '<div class="ac-ufb-sep"></div>';
      _AC_REPORT_DEFS.forEach(function(d) {
        var active = _acReportsView === d.key;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acReportsSwitchView(\'' + d.key + '\')" style="--ac-tab-accent:' + d.dot + '">' + _e(d.label) + '</button>';
      });
    } else if (tab === 'worklog') {
      html += '<div class="ac-ufb-sep"></div>';
      _acInitWorkLog();
      html += '<input type="date" class="ac-ufb-date" value="' + _acWorkLogDates.start + '" onchange="_acSetWorkLogDate(\'start\',this.value)">';
      html += '<span style="margin:0 2px;opacity:0.4;color:var(--text-muted)">—</span>';
      html += '<input type="date" class="ac-ufb-date" value="' + _acWorkLogDates.end + '" onchange="_acSetWorkLogDate(\'end\',this.value)">';
      
      html += '<div class="ac-ufb-sep"></div>';
      var workLogVendors = _acGetWorkLogVendors();
      html += '<select class="ac-ufb-select" onchange="_acSetWorkLogVendor(this.value)">';
      html += '<option value="ALL"' + (_acWorkLogVendorFilter === 'ALL' ? ' selected' : '') + '>All Vendors</option>';
      workLogVendors.forEach(function(v) {
        html += '<option value="' + _e(v) + '"' + (_acWorkLogVendorFilter === v ? ' selected' : '') + '>' + _e(v) + '</option>';
      });
      html += '</select>';

      html += '<div class="ac-ufb-sep"></div>';
      ['all','discrepancies'].forEach(function(val) {
        var label = val === 'all' ? 'All' : 'Discrepancies';
        var active = _acUniversalFilters.worklog === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'worklog\',\'' + val + '\')">' + label + '</button>';
      });

      html += '<div class="ac-ufb-sep"></div>';
      html += '<button class="ac-ufb-action-btn" onclick="_acLoadWorkLogData()" ' + (_acWorkLogLoading ? 'disabled' : '') + ' style="background:var(--accent);color:white;border-color:var(--accent)">' + (_acWorkLogLoading ? 'Loading...' : 'Fetch Logs') + '</button>';
    }

    // Count badge
    var count = '';
    if      (tab === 'crossings') count = _acGetFilteredCrossingItems().length + ' projects';
    else if (tab === 'boms')      count = _acBomData ? (_acGetFilteredBomItems().length + ' projects') : '—';
    else if (tab === 'comments')  count = _acGetFilteredCommentItems().length + ' projects';
    else if (tab === 'worklog')   count = _acWorkLogData ? (Object.keys(_acWorkLogData).length + ' vendors') : '—';

    if (count) html += '<span class="ac-ufb-count">' + count + '</span>';

    el.innerHTML = html;
  }

  function _acOnUniversalSearch(val) {
    _acUniversalSearchQuery = val || '';
    window._acUniversalSearchQuery = _acUniversalSearchQuery;
    clearTimeout(_acUniversalSearchTimer);
    _acUniversalSearchTimer = setTimeout(function() {
      _acRenderUniversalFilterBar(_acActiveTab);
      _acRenderActiveTab();
      _acSyncTabBadges();
      var input = document.getElementById('ac-ufb-search');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }, 120);
  }

  function _acSetUniversalFilter(tab, val) {
    _acUniversalFilters[tab] = val;
    if (tab === 'boms') _acBomSelected.clear(); // Clear selection on filter change
    _acRenderUniversalFilterBar(tab);
    _acRenderActiveTab();
    _acSyncTabBadges();

  function _acOpenBulkStatusModal() {

    items.forEach(function(i){ if (i.status) statusSet[i.status] = true; });
    var statuses = Object.keys(statusSet).sort();

    // Compute milestone suggestions
    var today = new Date();
    today.setHours(0,0,0,0);
    var suggestions = {};
    items.forEach(function(item) {
      var st   = (item.stage  || '').toLowerCase();
      var stat = (item.status || '').toLowerCase();
      if (stat.includes('hold')) { suggestions[item.fdh] = null; return; }
      var cxEnd = item.cxEnd ? new Date(item.cxEnd) : null;
      if (cxEnd && today > cxEnd) { suggestions[item.fdh] = 'Complete'; return; }
      if (st.includes('ofs'))     { suggestions[item.fdh] = 'OFS';      return; }
      if (st.includes('pre-con')) { suggestions[item.fdh] = 'Pre-Construction'; return; }
      suggestions[item.fdh] = 'Active';
    });

    // Build suggestion summary chips
    var suggestMap = {};
    items.forEach(function(i) { var s = suggestions[i.fdh]; if (s) { suggestMap[s] = (suggestMap[s]||0)+1; } });
    var suggestHtml = Object.keys(suggestMap).map(function(s) {
      return '<button class="ac-filter-pill" style="font-size:10px;" onclick="_acApplySuggestion(\'' + _e(s) + '\')">' +

        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + suggestHtml + '</div>' +

    _acShowModal('Bulk Status Change', bodyHtml, 'Apply to All Active', function() {
      var sel = document.getElementById('ac-bulk-status-sel');

    _acGetWorkLogVendorRowKeys(vendorName, _acWorkLogData[vendorName]).forEach(function(rowKey) {
      if (checked) _acWorkLogSelected.add(rowKey);
      else _acWorkLogSelected.delete(rowKey);
    });
    _acRenderWorkLogTab();
    _acSyncTabBadges();
  }

  // ── Modal helper ──────────────────────────────────────────
  function _acShowModal(title, bodyHtml, confirmLabel, onConfirm) {
    var existing = document.getElementById('ac-modal-overlay');
    if (existing) existing.remove();
    var overlay = document.createElement('div');
    overlay.id = 'ac-modal-overlay';
    overlay.className = 'ac-modal-overlay';
    overlay.innerHTML =
      '<div class="ac-modal" onclick="event.stopPropagation()">' +
        '<div class="ac-modal-header">' +
          '<span class="ac-modal-title">' + _e(title) + '</span>' +
          '<button class="panel-tab-close" onclick="_acCloseModal()" style="flex-shrink:0;">✕</button>' +
        '</div>' +
        '<div class="ac-modal-body">' + bodyHtml + '</div>' +
        '<div class="ac-modal-footer">' +
          '<button class="btn" style="padding:10px 18px;font-size:11px;" onclick="_acCloseModal()">Cancel</button>' +
          '<button class="btn btn-primary" id="ac-modal-confirm-btn" style="padding:10px 18px;font-size:11px;" onclick="_acModalConfirm()">' + _e(confirmLabel) + '</button>' +
        '</div>' +
      '</div>';
    overlay.onclick = _acCloseModal;
    var ws = document.getElementById('action-workspace');
    (ws || document.body).appendChild(overlay);
    window._acModalOnConfirm = onConfirm;
  }

  function _acCloseModal() {
    var el = document.getElementById('ac-modal-overlay');
    if (el) el.remove();
    window._acModalOnConfirm = null;
  }

  function _acModalConfirm() {
    if (typeof window._acModalOnConfirm === 'function') {
      var result = window._acModalOnConfirm();
      if (result !== false) _acCloseModal();
    }
  }

  // ── Download blob (client-side CSV fallback) ──────────────
  function _acDownloadBlob(text, filename) {
    var blob = new Blob([text], { type: 'text/csv' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  // ── Master entry point ────────────────────────────────────
  function _renderActionCenter() {
    _acRenderUniversalFilterBar(_acActiveTab);
    _acSwitchTab(_acActiveTab);
    _acSyncTabBadges();
