<script>
/* ============================================================
   FILE: _module_action_center.html
   ROLE: Action Center — 5-tab bulk PMO work surface
   TABS: Crossings | BOMs | Comments | Top Offenders | Reports
   READS: allActionItems, openQuickPeek(), stageExternalFinding()
   WRITES: #ac-universal-filter-bar, #ac-tab-crossings, #ac-tab-boms,
           #ac-tab-comments, #action-offenders-panel, #ac-tab-reports
   ============================================================ */
(function() {

  // ── Module state ──────────────────────────────────────────
  var _acActiveTab       = 'crossings';
  var _acXingsFilter     = 'all';     // 'all' | 'pending' | 'YES' | 'NO'
  var _acXingsSearchQuery= '';
  var _acXingsSelected   = new Set();
  var _acXingGroupCollapsed = {};
  var _acXingVendorFilter   = null;    // null or vendor string
  var _acXingCityFilter     = null;    // null or city string
  var _acVisibleXingFdhs = [];
  var _acCrossingsEdits  = {};        // {fdh: {xing, details}}
  var _acCommentsEdits   = {};        // {fdh: text}
  var _acCommentsSelected= new Set();
  var _acBomData         = null;      // loaded from backend
  var _acBomLoading      = false;
  var _acOpenPeekFdh     = null;      // FDH whose peek panel is currently open
  var _acReportsView     = 'crossings'; // which report is staged in Reports tab

  // ── Universal filter bar state ────────────────────────────
  var _acUniversalSearchQuery = '';
  window._acUniversalSearchQuery = '';
  var _acUniversalFilters = {
    crossings: 'all',   // 'all' | 'pending' | 'YES' | 'NO'
    boms:      'all',   // 'all' | 'diffs'
    comments:  'all',   // 'all' | 'edited'
    offenders: null,    // null = All, string = flag key
    reports:   null
  };
  var _acUniversalSearchTimer = null;

  // ── Escape helper ─────────────────────────────────────────
  function _e(s) {
    return typeof esc === 'function'
      ? esc(String(s == null ? '' : s))
      : String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function _acJs(s) {
    return typeof escJs === 'function'
      ? escJs(String(s == null ? '' : s))
      : String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // ── Active project filter ─────────────────────────────────
  function _acIsActive(item) {
    var stat = (item.status || '').toLowerCase();
    if (stat.includes('complete') || stat.includes('cancelled')) return false;
    var rd = item.reportDate ? new Date(item.reportDate) : null;
    var hasRecent = rd && (Date.now() - rd.getTime()) <= 21 * 24 * 60 * 60 * 1000;
    var st = (item.stage || '').toLowerCase();
    var inProgress = !st.includes('vendor assign');
    return inProgress || hasRecent;
  }

  function _acCleanVal(val) {
    return String(val == null ? '' : val).trim();
  }

  function _acNormalizeXing(val) {
    var clean = _acCleanVal(val);
    if (!clean || clean === '—') return '';
    var upper = clean.toUpperCase();
    if (upper === 'TRUE' || upper === 'Y' || upper === 'YES' || upper.indexOf('X-ING YES') !== -1) return 'YES';
    if (upper === 'FALSE' || upper === 'N' || upper === 'NO' || upper === 'NONE') return 'NO';
    if (upper === 'N/A' || upper === 'NA') return 'N/A';
    return clean;
  }

  function _acInferCdXing(item) {
    var txt = _acCleanVal(item && item.cdIntel).toLowerCase();
    if (!txt) return '';
    if (txt === 'none' || txt.indexOf('no special crossings found') !== -1 || txt.indexOf('no crossings found') !== -1) return 'NO';
    return 'YES';
  }

  function _acResolveCrossing(item) {
    item = item || {};
    var edit = _acCrossingsEdits[item.fdh] || {};
    var qbRef = item.qbRef || {};
    var rawX = _acNormalizeXing(item.rawSpecialX);
    var xing = '';
    var source = 'pending';

    if (edit.xing !== undefined) {
      xing = _acNormalizeXing(edit.xing);
      source = 'edit';
    } else if (_acNormalizeXing(qbRef.xingExist)) {
      xing = _acNormalizeXing(qbRef.xingExist);
      source = 'quickbase';
    } else if (rawX) {
      xing = rawX;
      source = 'reference';
    } else if (item.isXing === true || item.isXing === 'true') {
      xing = 'YES';
      source = 'item';
    } else {
      xing = _acInferCdXing(item);
      if (xing) source = 'cd';
    }

    return {
      xing: xing,
      details: edit.details !== undefined
        ? edit.details
        : (_acCleanVal(qbRef['526']) || _acCleanVal(item.specXDetails) || _acCleanVal(item.cdIntel)),
      pending: !xing,
      source: source
    };
  }

  function _acGetActiveItems() {
    return (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);
  }

  function _acGetBomRows() {
    return Array.isArray(_acBomData) ? _acBomData : [];
  }

  function _acIsOffenderProjectActive(item) {
    var stat = (item.status || '').toLowerCase();
    var st = (item.stage || '').toLowerCase();
    if (stat.includes('complete') || stat.includes('hold')) return false;
    var inConstruction = !st.includes('ofs') && !st.includes('permit')
      && !st.includes('pre-con') && !st.includes('vendor assign');
    var rd = (typeof safeDate === 'function') ? safeDate(item.reportDate) : null;
    var hasRecentReport = rd && (Date.now() - rd.getTime()) <= 14 * 24 * 60 * 60 * 1000;
    return inConstruction || hasRecentReport;
  }

  function _acGetOffenderCount() {
    var vendors = {};
    (typeof allActionItems !== 'undefined' ? allActionItems : []).forEach(function(item) {
      if (!item.vendor || !item.flags) return;
      if (!_acIsOffenderProjectActive(item)) return;
      var flags = String(item.flags).split('\n').map(function(f){ return f.trim(); }).filter(Boolean);
      if (flags.length) vendors[item.vendor] = true;
    });
    return Object.keys(vendors).length;
  }

  function _acGetReportRowAvailability() {
    var activeCount = _acGetActiveItems().length;
    return activeCount + _acGetBomRows().length + activeCount;
  }

  function _acSyncTabBadges() {
    var activeItems = _acGetActiveItems();
    var pendingCrossings = activeItems.filter(function(i){ return _acResolveCrossing(i).pending; }).length;
    var bomRows = _acGetBomRows();
    var badgeVals = {
      crossings: pendingCrossings,
      boms: _acBomData ? bomRows.filter(function(r){ return r.hasDiff; }).length : (_acBomLoading ? 0 : 'Load'),
      comments: Object.keys(_acCommentsEdits).length,
      offenders: _acGetOffenderCount(),
      reports: _acGetReportRowAvailability()
    };

    Object.keys(badgeVals).forEach(function(key) {
      var el = document.querySelector('[data-ac-tab-badge="' + key + '"]');
      if (!el) return;
      var val = badgeVals[key];
      var show = val === 'Load' || Number(val) > 0;
      el.hidden = !show;
      el.textContent = val === 'Load' ? 'Load' : String(val);
      el.classList.toggle('ac-tab-badge-green', key === 'reports' && show);
      el.classList.toggle('ac-tab-badge-warn', key === 'boms' && val === 'Load');
    });
  }

  // ── Tab switching ─────────────────────────────────────────
  function _acSwitchTab(tab) {
    _acActiveTab = tab;
    ['crossings','boms','comments','offenders','reports'].forEach(function(t) {
      var btn   = document.getElementById('ac-tab-btn-' + t);
      var panel = document.getElementById('ac-tab-' + t);
      if (btn)   btn.classList.toggle('active', t === tab);
      if (panel) panel.style.display = (t === tab) ? 'flex' : 'none';
    });
    _acRenderUniversalFilterBar(tab);
    _acRenderActiveTab();
    _acSyncTabBadges();
  }

  function _acRenderActiveTab() {
    if      (_acActiveTab === 'crossings') _acRenderCrossingsTab();
    else if (_acActiveTab === 'boms')      _acRenderBOMsTab();
    else if (_acActiveTab === 'comments')  _acRenderCommentsTab();
    else if (_acActiveTab === 'offenders') _acRenderOffendersTab();
    else if (_acActiveTab === 'reports')   _acRenderReportsTab();
    _acEnsurePermanentPeek();
  }

  function _acGetPeekSeedItems() {
    if (_acActiveTab === 'boms')      return _acGetFilteredBomItems();
    if (_acActiveTab === 'crossings') return _acGetFilteredCrossingItems();
    if (_acActiveTab === 'comments')  return _acGetFilteredCommentItems();
    return [];
  }

  function _acEnsurePermanentPeek() {
    if (!['crossings','boms','comments'].includes(_acActiveTab)) return;
    var ws = document.getElementById('action-workspace');
    if (!ws || !ws.classList.contains('ws-active')) return;
    var items = _acGetPeekSeedItems().filter(function(i){ return i && i.fdh; });
    if (!items.length) return;
    var target = items.find(function(i){ return i.fdh === _acOpenPeekFdh; }) || items[0];
    if (target && target.fdh && typeof openQuickPeek === 'function') {
      _acOpenPeek(target.fdh);
    }
  }

  // ── Per-tab contextual KPI strip ─────────────────────────
  function _acKpiChip(val, label, cls, onclick) {
    var clickAttr = onclick ? 'onclick="' + onclick + '"' : '';
    return '<div class="ac-kpi-chip ' + (cls || '') + '" ' + clickAttr + '>' +
      '<div class="ac-kpi-val">' + val + '</div>' +
      '<div class="ac-kpi-label">' + label + '</div>' +
    '</div>';
  }

  function _acRenderTabKpi(tab) {
    var items = _acGetActiveItems();
    var html = '<div class="ac-kpi-rail ac-tab-kpi-rail">';

    if (tab === 'crossings') {
      var xings   = _acGetFilteredCrossingItems();
      var pending = xings.filter(function(i){ return _acResolveCrossing(i).pending; }).length;
      var yes     = xings.filter(function(i){ return _acResolveCrossing(i).xing.toUpperCase() === 'YES'; }).length;
      var no      = xings.filter(function(i){ return _acResolveCrossing(i).xing.toUpperCase() === 'NO'; }).length;
      html += _acKpiChip(items.length, 'Active Projects', 'ac-chip-queue');
      html += _acKpiChip(pending,      'Pending',         pending > 0 ? 'ac-chip-crit' : 'ac-chip-queue');
      html += _acKpiChip(yes,          'YES',             'ac-chip-yes');
      html += _acKpiChip(no,           'NO',              no > 0 ? 'ac-chip-no' : 'ac-chip-queue');

    } else if (tab === 'boms') {
      var bomRows = _acGetBomRows();
      var diffs   = bomRows.filter(function(r){ return r.hasDiff; }).length;
      var clean   = bomRows.length - diffs;
      html += _acKpiChip(_acBomData ? bomRows.length : '—', 'Total Projects', 'ac-chip-queue');
      html += _acKpiChip(_acBomData ? diffs : '—',          'With Diffs',     diffs > 0 ? 'ac-chip-no' : 'ac-chip-queue');
      html += _acKpiChip(_acBomData ? clean : '—',          'Clean',          'ac-chip-yes');

    } else if (tab === 'comments') {
      var edited = Object.keys(_acCommentsEdits).length;
      var saved  = items.length - edited;
      html += _acKpiChip(items.length, 'Active Projects', 'ac-chip-queue');
      html += _acKpiChip(edited,       'Edited',          edited > 0 ? 'ac-chip-warn' : 'ac-chip-queue');
      html += _acKpiChip(saved > 0 ? saved : 0, 'Saved',  'ac-chip-yes');

    } else if (tab === 'reports') {
      _AC_REPORT_DEFS.forEach(function(d) {
        var isActive = _acReportsView === d.key;
        var rows = d.load();
        var count = rows ? rows.length : '—';
        html += '<div class="ac-kpi-chip' + (isActive ? ' ac-chip-active' : '') + '" ' +
          'onclick="_acReportsSwitchView(\'' + d.key + '\')" style="cursor:pointer">' +
          '<div class="ac-kpi-val" style="color:' + d.dot + '">' + count + '</div>' +
          '<div class="ac-kpi-label">' + _e(d.label) + '</div>' +
          '</div>';
      });
    }

    html += '</div>';
    return html;
  }

  // ── Universal filter bar ─────────────────────────────────
  function _acRenderUniversalFilterBar(tab) {
    var el = document.getElementById('ac-universal-filter-bar');
    if (!el) return;
    el.setAttribute('data-tab', tab);

    var qSafe = _e(_acUniversalSearchQuery);
    var html = '<input type="text" class="ac-ufb-search" id="ac-ufb-search" value="' + qSafe + '" ' +
      'placeholder="Search ' + (tab === 'crossings' ? 'FDH, vendor, city, details' :
                                tab === 'boms'      ? 'FDH, vendor' :
                                tab === 'comments'  ? 'FDH, vendor, city' :
                                tab === 'offenders' ? 'vendor, FDH, flag' : '') + '…" ' +
      'oninput="_acOnUniversalSearch(this.value)">';

    if (tab === 'crossings') {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','pending','YES','NO'].forEach(function(val) {
        var label = val === 'all' ? 'All' : val.charAt(0).toUpperCase() + val.slice(1);
        var active = _acUniversalFilters.crossings === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'crossings\',\'' + val + '\')">' + label + '</button>';
      });
    } else if (tab === 'boms' && _acBomData) {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','diffs'].forEach(function(val) {
        var label = val === 'all' ? 'All' : 'Has Diffs';
        var active = _acUniversalFilters.boms === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'boms\',\'' + val + '\')">' + label + '</button>';
      });
    } else if (tab === 'comments') {
      html += '<div class="ac-ufb-sep"></div>';
      ['all','edited'].forEach(function(val) {
        var label = val === 'all' ? 'All' : 'Edited';
        var active = _acUniversalFilters.comments === val;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acSetUniversalFilter(\'comments\',\'' + val + '\')">' + label + '</button>';
      });
    } else if (tab === 'offenders') {
      // Top Offenders manages its own toolbar and filter chrome — universal bar is intentionally empty here
      el.innerHTML = '';
      return;
    } else if (tab === 'reports') {
      html += '<div class="ac-ufb-sep"></div>';
      _AC_REPORT_DEFS.forEach(function(d) {
        var active = _acReportsView === d.key;
        html += '<button class="ac-filter-pill' + (active ? ' active' : '') +
          '" onclick="_acReportsSwitchView(\'' + d.key + '\')" style="--ac-tab-accent:' + d.dot + '">' + _e(d.label) + '</button>';
      });
    }

    // Count badge
    var count = '';
    if      (tab === 'crossings') count = _acGetFilteredCrossingItems().length + ' projects';
    else if (tab === 'boms')      count = _acBomData ? (_acGetFilteredBomItems().length + ' projects') : '—';
    else if (tab === 'comments')  count = _acGetFilteredCommentItems().length + ' projects';

    if (count) html += '<span class="ac-ufb-count">' + count + '</span>';

    el.innerHTML = html;
  }

  function _acOnUniversalSearch(val) {
    _acUniversalSearchQuery = val || '';
    window._acUniversalSearchQuery = _acUniversalSearchQuery;
    clearTimeout(_acUniversalSearchTimer);
    _acUniversalSearchTimer = setTimeout(function() {
      _acRenderUniversalFilterBar(_acActiveTab);
      _acRenderActiveTab();
      _acSyncTabBadges();
      var input = document.getElementById('ac-ufb-search');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }, 120);
  }

  function _acSetUniversalFilter(tab, val) {
    _acUniversalFilters[tab] = val;
    _acRenderUniversalFilterBar(tab);
    _acRenderActiveTab();
    _acSyncTabBadges();
    _acEnsurePermanentPeek();
  }

  function _acGetFilteredBomItems() {
    var rows = _acGetBomRows();
    if (_acUniversalFilters.boms === 'diffs') rows = rows.filter(function(r){ return r.hasDiff; });
    var q = _acUniversalSearchQuery.trim().toLowerCase();
    if (q) rows = rows.filter(function(r){
      return [r.fdh, r.vendor || ''].join(' ').toLowerCase().indexOf(q) !== -1;
    });
    return rows;
  }

  function _acGetFilteredCommentItems() {
    var items = _acGetActiveItems();
    if (_acUniversalFilters.comments === 'edited') {
      items = items.filter(function(i){ return _acCommentsEdits[i.fdh] !== undefined; });
    }
    var q = _acUniversalSearchQuery.trim().toLowerCase();
    if (q) items = items.filter(function(i){
      var edited = _acCommentsEdits[i.fdh] || '';
      return [i.fdh, i.vendor || '', i.city || '', edited].join(' ').toLowerCase().indexOf(q) !== -1;
    });
    return items;
  }

  // ════════════════════════════════════════════════════════════
  // TAB 1 — CROSSINGS
  // ════════════════════════════════════════════════════════════
  function _acGetFilteredCrossingItems() {
    var items = _acGetActiveItems();
    var filter = _acUniversalFilters.crossings;
    if (filter !== 'all') {
      items = items.filter(function(i) {
        var resolved = _acResolveCrossing(i);
        var x = resolved.xing.toUpperCase();
        if (filter === 'pending') return resolved.pending;
        return x === filter.toUpperCase();
      });
    }
    var q = _acUniversalSearchQuery.trim().toLowerCase();
    if (q) {
      items = items.filter(function(i) {
        var resolved = _acResolveCrossing(i);
        return [
          i.fdh, i.vendor, i.city, i.stage, i.status,
          resolved.xing, resolved.details
        ].join(' ').toLowerCase().indexOf(q) !== -1;
      });
    }
    return items;
  }

  function _acXingGroupKey(vendor, city) {
    return String(vendor || 'Unassigned Vendor') + '::' + String(city || 'No City');
  }

  function _acToggleXingGroup(key) {
    // Default (undefined) = collapsed; false = explicitly opened
    var isCurrentlyCollapsed = _acXingGroupCollapsed[key] !== false;
    _acXingGroupCollapsed[key] = !isCurrentlyCollapsed;
    _acRenderCrossingsTab();
  }

  function _acSetXingVendorFilter(v) {
    _acXingVendorFilter = (_acXingVendorFilter === v) ? null : v;
    _acXingCityFilter = null;
    _acRenderCrossingsTab();
  }

  function _acSetXingCityFilter(c) {
    _acXingCityFilter = (_acXingCityFilter === c) ? null : c;
    _acRenderCrossingsTab();
  }

  function _acOnXingScroll() {
    var tab = document.getElementById('ac-tab-crossings');
    if (!tab) return;
    var wrap = tab.querySelector('.ac-xing-card-wrap');
    tab.classList.toggle('ac-kpi-stuck', !!(wrap && wrap.scrollTop > 0));
  }

  function _acBindXingScroll() {
    var wrap = document.querySelector('#ac-tab-crossings .ac-xing-card-wrap');
    if (!wrap || wrap._xingScrollBound) return;
    wrap._xingScrollBound = true;
    wrap.addEventListener('scroll', _acOnXingScroll, { passive: true });
  }

  function _acBuildXingGroups(items) {
    var groups = {};
    items.forEach(function(item) {
      var vendor = item.vendor || 'Unassigned Vendor';
      var city = item.city || 'No City';
      if (!groups[vendor]) groups[vendor] = { vendor: vendor, count: 0, cities: {} };
      if (!groups[vendor].cities[city]) groups[vendor].cities[city] = [];
      groups[vendor].cities[city].push(item);
      groups[vendor].count++;
    });
    return Object.keys(groups).sort().map(function(vendor) {
      var group = groups[vendor];
      group.cityNames = Object.keys(group.cities).sort();
      return group;
    });
  }

  function _acRenderXingGroupHeader(label, count, key, depth) {
    var collapsed = !!_acXingGroupCollapsed[key];
    var avatar = depth === 0
      ? '<span class="ac-xing-group-avatar">' + _e((label || '?').charAt(0).toUpperCase()) + '</span>'
      : '';
    return '<div class="ac-xing-group-header ac-xing-group-header-depth-' + depth + (collapsed ? ' is-collapsed' : '') + '" ' +
      'onclick="_acToggleXingGroup(\'' + _acJs(key) + '\')">' +
        '<span class="ac-xing-group-toggle"></span>' +
        avatar +
        '<span class="ac-xing-group-label">' + _e(label) + '</span>' +
        '<span class="ac-xing-group-count">' + count + '</span>' +
      '</div>';
  }

  function _acRenderXingRow(item) {
    var isSel  = _acXingsSelected.has(item.fdh);
    var edit   = _acCrossingsEdits[item.fdh] || {};
    var resolved = _acResolveCrossing(item);
    var curX   = resolved.xing;
    var curDet = resolved.details;
    var isDirty = edit.xing !== undefined || edit.details !== undefined;
    var xPillCls = curX === 'YES' ? 'ac-xpill-yes' : (curX === 'NO' ? 'ac-xpill-no' : 'ac-xpill-none');
    var fdhSafe = _e(item.fdh);
    var fdhJs = _acJs(item.fdh);
    var xSelCls = 'xing-select' + (curX === 'YES' ? ' val-yes' : curX === 'NO' ? ' val-no' : '');
    var isPeekOpen = _acOpenPeekFdh === item.fdh;

    return '<div class="ac-xing-proj-row' + (isSel ? ' is-selected' : '') + (isDirty ? ' is-dirty' : '') + '">'
      + '<div class="ac-xpr-check" onclick="event.stopPropagation();_acToggleXingRow(\'' + fdhJs + '\')">'
      +   '<input type="checkbox"' + (isSel ? ' checked' : '') + ' onclick="event.stopPropagation()" onchange="_acToggleXingRow(\'' + fdhJs + '\')">'
      + '</div>'
      + '<div class="ac-xpr-meta" onclick="event.stopPropagation()">'
      +   '<span class="ac-xpr-fdh">' + fdhSafe + '</span>'
      +   '<button class="ac-xpr-detail-btn' + (isPeekOpen ? ' is-active' : '') + '" data-fdh="' + fdhSafe + '" onclick="_acTogglePeek(\'' + fdhJs + '\')" title="Open detail panel">Details</button>'
      + '</div>'
      + '<div class="ac-xpr-controls" onclick="event.stopPropagation()">'
      +   '<span class="ac-xpill ' + xPillCls + '">' + _e(curX || '—') + '</span>'
      +   '<select class="' + xSelCls + '" onchange="_acOnXingChange(\'' + fdhJs + '\',this.value)">'
      +     '<option value=""' + (!curX ? ' selected' : '') + '>—</option>'
      +     '<option value="YES"' + (curX === 'YES' ? ' selected' : '') + '>YES</option>'
      +     '<option value="NO"'  + (curX === 'NO'  ? ' selected' : '') + '>NO</option>'
      +     '<option value="N/A"' + (curX === 'N/A' ? ' selected' : '') + '>N/A</option>'
      +   '</select>'
      + '</div>'
      + '<div class="ac-xpr-bubble" onclick="event.stopPropagation()">'
      +   '<div class="xing-bubble ac-xing-entry cd-dropzone" id="ac-cd-dropzone-' + fdhSafe + '" '
      +     'ondragover="handleCdDragOver(event,this)" ondragleave="handleCdDragLeave(event,this)" ondrop="handleCdDrop(event,this,\'' + fdhJs + '\')">'
      +     '<div class="cd-overlay-trigger" onclick="event.stopPropagation();triggerCdSelect(\'' + fdhJs + '\',\'ac-cd-dropzone-' + fdhJs + '\')" title="Analyze CD PDF">' + icon('upload', 14) + '</div>'
      +     '<div class="cd-drop-hint">DROP CD PDF TO ANALYZE</div>'
      +     '<textarea class="xing-details-textarea" '
      +       'oninput="_acOnXingDetailChange(\'' + fdhJs + '\',this.value);this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" '
      +       'onfocus="this.style.height=\'\';this.style.height=this.scrollHeight+\'px\'" '
      +       'placeholder="Sheet names, crossing types…">' + _e(curDet) + '</textarea>'
      +   '</div>'
      + '</div>'
    + '</div>';
  }

  function _acRenderCrossingsTab() {
    var container = document.getElementById('ac-tab-crossings');
    if (!container) return;

    var allItems = _acGetFilteredCrossingItems();

    // Build vendor list for filter chips (from unfiltered set)
    var vendorSet = {}, vendorList = [];
    allItems.forEach(function(i) {
      var v = i.vendor || 'Unassigned';

  function _acCommitSelectedCrossings() {
    var toCommit = [];

      var edit = _acCrossingsEdits[fdh] || {};
      var item = (typeof allActionItems !== 'undefined' ? allActionItems : []).find(function(i){ return i.fdh === fdh; });
      if (!item) return;
      var resolved = _acResolveCrossing(item);
      var xing  = edit.xing !== undefined ? _acNormalizeXing(edit.xing) : resolved.xing;
      var det   = edit.details !== undefined ? edit.details : resolved.details;

      toCommit.push({ fdh: fdh, xing: xing, xingDetails: det });
    });

    if (!toCommit.length) {
      if (typeof showToast === 'function') showToast('Set a crossing status on selected rows first.', 'error');

    var date = new Date().toLocaleDateString();

        .withSuccessHandler(function() {

        '<td class="ac-td-ellipsis">' + _e(r.details||'') + '</td></tr>';

          '</tbody></table></div>'
        : '<div class="ac-empty-sm" style="margin-top:14px;">No valid rows to stage.</div>') +
      (skipped.length ? '<div style="margin-top:10px;font-size:10px;color:var(--text-muted);">Unrecognized FDHs: ' + skipped.map(function(s){ return '<code>' + _e(s) + '</code>'; }).join(', ') + '</div>' : '') +
      (errors.length  ? '<div style="margin-top:6px;font-size:10px;color:#ef4444;">Errors: ' + errors.map(function(s){ return _e(s); }).join('; ') + '</div>' : '');

    _acShowModal(

  function _acExportCrossingsCSV() {

    var activeFdhs = _acGetActiveItems().map(function(i){ return i.fdh; }).filter(Boolean);
    var currentFdhs = (_acVisibleXingFdhs && _acVisibleXingFdhs.length) ? _acVisibleXingFdhs.slice() : activeFdhs.slice();
    var exportFdhs = selected.length ? selected : currentFdhs;
    var scopeLabel = selected.length ? 'selected rows' : 'current search/filter';

    if (!selected.length) {
      if (currentFdhs.length !== activeFdhs.length) {
        var useCurrent = window.confirm('No rows are checked. Export the current search/filter result? Press Cancel to export all active Action Center rows.');
        exportFdhs = useCurrent ? currentFdhs : activeFdhs;
        scopeLabel = useCurrent ? 'current search/filter' : 'all active rows';
      } else if (!window.confirm('No rows are checked. Export all active Action Center rows?')) {
        return;

    exportFdhs = exportFdhs.filter(Boolean);
    if (!exportFdhs.length) {
      if (typeof showToast === 'function') showToast('No rows available to export.', 'error');
      return;

    if (typeof showToast === 'function') showToast('Generating crossings export for ' + exportFdhs.length + ' ' + scopeLabel + '…', 'info');

      .withSuccessHandler(function(url) {

      .exportCrossingsCSVForFdhs(exportFdhs);

  function _acOpenBulkStatusModal() {
    var items = (typeof allActionItems !== 'undefined' ? allActionItems : []).filter(_acIsActive);
    if (!items.length) {
      if (typeof showToast === 'function') showToast('No active projects found.', 'error');
      return;
    }

    // Collect unique statuses from live data
    var statusSet = {};
    items.forEach(function(i){ if (i.status) statusSet[i.status] = true; });
    var statuses = Object.keys(statusSet).sort();

    // Compute milestone suggestions
    var today = new Date();
    today.setHours(0,0,0,0);
    var suggestions = {};
    items.forEach(function(item) {
      var st   = (item.stage  || '').toLowerCase();
      var stat = (item.status || '').toLowerCase();
      if (stat.includes('hold')) { suggestions[item.fdh] = null; return; }
      var cxEnd = item.cxEnd ? new Date(item.cxEnd) : null;
      if (cxEnd && today > cxEnd) { suggestions[item.fdh] = 'Complete'; return; }
      if (st.includes('ofs'))     { suggestions[item.fdh] = 'OFS';      return; }
      if (st.includes('pre-con')) { suggestions[item.fdh] = 'Pre-Construction'; return; }
      suggestions[item.fdh] = 'Active';
    });

    // Build suggestion summary chips
    var suggestMap = {};
    items.forEach(function(i) { var s = suggestions[i.fdh]; if (s) { suggestMap[s] = (suggestMap[s]||0)+1; } });
    var suggestHtml = Object.keys(suggestMap).map(function(s) {
      return '<button class="ac-filter-pill" style="font-size:10px;" onclick="_acApplySuggestion(\'' + _e(s) + '\')">' +
        _e(s) + ' <span style="opacity:0.6;">(' + suggestMap[s] + ')</span></button>';
    }).join('');

    var optHtml = statuses.map(function(s){ return '<option value="' + _e(s) + '">' + _e(s) + '</option>'; }).join('');

    var bodyHtml =
      '<div style="margin-bottom:14px;">' +
        '<div class="section-label" style="margin-bottom:8px;">MILESTONE SUGGESTIONS</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + suggestHtml + '</div>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:6px;">Click to auto-fill status based on milestone data.</div>' +
      '</div>' +
      '<div>' +
        '<label class="section-label" style="margin-bottom:6px;display:block;">APPLY STATUS TO ALL ACTIVE PROJECTS</label>' +
        '<select id="ac-bulk-status-sel" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text-main);font-size:12px;font-weight:700;">' +

        '<div style="font-size:10px;color:var(--text-muted);margin-top:8px;">Applies to all ' + items.length + ' active projects via QuickBase PATCH.</div>' +
      '</div>';

    window._acBulkStatusItems = items;
    window._acBulkStatusSuggestions = suggestions;

    _acShowModal('Bulk Status Change', bodyHtml, 'Apply to All Active', function() {
      var sel = document.getElementById('ac-bulk-status-sel');
      var status = sel ? sel.value : '';
      if (!status) {
        if (typeof showToast === 'function') showToast('Select a status first.', 'error');
        return false;
      }
      var payload = (window._acBulkStatusItems || []).map(function(i) {
        return { fdh: i.fdh, rid: (i.qbRef && i.qbRef.pmRid) || '', status: status };
      });
      if (typeof showToast === 'function') showToast('Applying status to ' + payload.length + ' projects…', 'info');
      google.script.run
        .withSuccessHandler(function() {
          if (typeof showToast === 'function') showToast('Status updated for ' + payload.length + ' projects.', 'success');
        })
        .withFailureHandler(function(err) {
          if (typeof showToast === 'function') showToast('Update failed: ' + (err.message||err), 'error');
        })
        .bulkWriteStatus(payload);
    });
  }
