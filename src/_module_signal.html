<script>
// ============================================================
// FILE: _module_signal.html | ROLE: SIGNAL Operations Console
// DEPENDS ON: _module_startup_refdata.html (completeStartup)
// DEPENDED ON BY: WebApp.html (auto-open on load)
// ============================================================

var _signalCurrentTf = 'current';
var _signalActiveTab = 'qb';
var _signalMode = 'startup'; // 'startup' = must pick workspace | 'manual' = can dismiss freely
var _signalCache = { fast: {}, drive: {} };
var _signalLoadedTf = {};
var _signalPrefetching = {};
var _signalDriveRootFilter = 'all';
var _signalSearchQuery = '';

function _signalNormalizeTf(tf) {
  var raw = String(tf || '').toLowerCase().trim();
  if (raw === 'today') return 'current';
  if (raw === 'current' || raw === 'week' || raw === 'month') return raw;
  return 'week';
}

function _signalTfLabel(tf) {
  var normalized = _signalNormalizeTf(tf);
  if (normalized === 'current') return 'current snapshot';
  if (normalized === 'week') return 'weekly timeframe';
  if (normalized === 'month') return 'monthly timeframe';
  return 'selected timeframe';
}

function _signalShowCurrentPanel() {
  _signalSetTab(_signalActiveTab || 'qb');
}

function _signalPrimePanelShell() {
  var qbEl = document.getElementById('signal-panel-qb');
  var logEl = document.getElementById('signal-panel-log');
  var driveEl = document.getElementById('signal-panel-drive');
  if (qbEl) qbEl.innerHTML = '<div class="signal-loading">Loading...</div>';
  if (logEl) logEl.innerHTML = '<div class="signal-log-empty">LOADING...</div>';
  if (driveEl) driveEl.innerHTML = '<div class="signal-loading">Scanning folders...</div>';
}

function _signalRenderCached(tf) {
  var fastData = _signalCache.fast[tf];
  if (fastData) {
    _renderSignalQB(fastData.qbChanges || [], tf);
    _renderSignalLogs(fastData.systemLogs || []);
  }
  if (Object.prototype.hasOwnProperty.call(_signalCache.drive, tf)) {
    _renderSignalDrive(_signalCache.drive[tf] || [], tf);
  }
  _signalLoadedTf[tf] = !!(fastData && Object.prototype.hasOwnProperty.call(_signalCache.drive, tf));
}

function openSignal(force) {
  if (window.innerWidth <= 480) {
    return completeStartup('detail');
  }
  var overlay = document.getElementById('signal-overlay');
  if (!overlay) return completeStartup('detail');

  if (force) {
    // Manual open from nav — always show, backdrop dismisses back to app
    _signalMode = 'manual';
    overlay.classList.add('visible', 'signal-manual');
    _signalShowCurrentPanel();
    loadSignalData(_signalCurrentTf);
    return;
  }

  // Auto-open on load
  var seen = sessionStorage.getItem('SIGNAL_SEEN');
  if (seen) {
    _showStartupAfterSignal();
    return;
  }
  _signalMode = 'startup';
  overlay.classList.add('visible');
  overlay.classList.remove('signal-manual');
  _signalShowCurrentPanel();
  loadSignalData(_signalCurrentTf);
}

// Called when user picks a workspace (both modes)
function closeSignal(mode) {
  var overlay = document.getElementById('signal-overlay');
  if (overlay) { overlay.classList.remove('visible', 'signal-manual'); }
  try { localStorage.setItem('SIGNAL_LAST_OPEN', Date.now()); } catch(e) {}
  sessionStorage.setItem('SIGNAL_SEEN', '1');
  completeStartup(mode || 'detail');
}

// Called when user clicks backdrop in manual mode — return to app without workspace switch
function _signalDismiss() {
  if (_signalMode !== 'manual') return;
  var overlay = document.getElementById('signal-overlay');
  if (overlay) { overlay.classList.remove('visible', 'signal-manual'); }
}

function _signalBackdropClick(e) {
  if (e.target === document.getElementById('signal-overlay')) _signalDismiss();
}

function _showStartupAfterSignal() {
  // Prefetch 'current' in background while dashboard shows — instant on next open
  _signalPrefetch('current');
  if (typeof openDashboard === 'function') {
    openDashboard();
  } else {
    completeStartup('detail');
  }
}

// Fetches and caches a timeframe silently — no UI side-effects
function _signalPrefetch(tf) {
  tf = _signalNormalizeTf(tf);
  if (_signalLoadedTf[tf] || _signalPrefetching[tf]) return;
  _signalPrefetching[tf] = true;
  google.script.run
    .withSuccessHandler(function(data) {
      _signalCache.fast[tf] = data || { qbChanges: [], systemLogs: [] };
      google.script.run
        .withSuccessHandler(function(activity) {
          _signalCache.drive[tf] = activity || [];
          _signalLoadedTf[tf] = true;
          _signalPrefetching[tf] = false;
          // After current finishes, background-load week when idle
          if (tf === 'current' && !_signalLoadedTf['week']) {
            setTimeout(function() { _signalPrefetch('week'); }, 1500);
          }
        })
        .withFailureHandler(function() {
          _signalCache.drive[tf] = [];
          _signalLoadedTf[tf] = true;
          _signalPrefetching[tf] = false;
        })
        .getSignalDrive(tf);
    })
    .withFailureHandler(function() {
      _signalPrefetching[tf] = false;
    })
    .getSignalFast(tf);
}

function loadSignalData(tf) {
  tf = _signalNormalizeTf(tf);
  _signalCurrentTf = tf;
  document.querySelectorAll('.signal-tf-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.tf === tf);
  });

  if (_signalLoadedTf[tf]) {
    _signalRenderCached(tf);
    return;
  }

  _signalPrimePanelShell();

  // Call 1: fast sheet reads — renders QB + Log immediately
  google.script.run
    .withSuccessHandler(function(data) {
      _signalCache.fast[tf] = data || { qbChanges: [], systemLogs: [] };
      _renderSignalQB(data.qbChanges || [], tf);
      _renderSignalLogs(data.systemLogs || []);
      // Call 2: Drive traversal (cached after first run)
      google.script.run
        .withSuccessHandler(function(activity) {
          _signalCache.drive[tf] = activity || [];
          _renderSignalDrive(_signalCache.drive[tf], tf);
          _signalLoadedTf[tf] = true;
        })
        .withFailureHandler(function() {
          var el = document.getElementById('signal-panel-drive');
          if (el) el.innerHTML = '<div class="signal-empty">Drive scan failed.</div>';
          _signalCache.drive[tf] = [];
          _signalLoadedTf[tf] = true;
        })
        .getSignalDrive(tf);
    })
    .withFailureHandler(function() {
      var qbEl = document.getElementById('signal-panel-qb');
      var logEl = document.getElementById('signal-panel-log');
      _signalLoadedTf[tf] = false;
      if (qbEl) qbEl.innerHTML = '<div class="signal-empty">Failed to load.</div>';
      if (logEl) logEl.innerHTML = '<div class="signal-log-empty">FAILED TO LOAD</div>';
    })
    .getSignalFast(tf);
}

function _renderSignalQB(changes, tf) {
  var el = document.getElementById('signal-panel-qb');
  if (!el) return;
  var q = _signalSearchQuery.toLowerCase().trim();
  var filtered = q ? changes.filter(function(c) {
    return _signalMatchesQuery([c.fdh, c.type, c.newVal, c.updatedBy, c.timestamp], q);
  }) : changes;

  _signalUpdateMatchCount(filtered.length, changes.length);

  if (!filtered.length) {
    el.innerHTML = q
      ? '<div class="signal-empty">No results for "' + _esc(q) + '".</div>'
      : '<div class="signal-empty">No QB changes in the ' + _signalTfLabel(tf) + '.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(c) {
    var pillClass = _signalQBPillClass(c.type, c.newVal);
    var t = (c.type || '').toLowerCase().trim();
    var isDateField = t === 'ofs date' || t === 'cx start date' || t === 'cx end date';
    var pillLabel = isDateField ? _signalTypeLabel(t) : _esc(c.newVal || c.type);
    var subVal = isDateField ? '<span class="signal-val">' + _esc(c.newVal) + '</span>' : '';
    var fdhHtml = q ? _signalHighlight(c.fdh, q) : _esc(c.fdh);
    var metaHtml = _esc(c.updatedBy) + ' &middot; ' + _esc(c.timestamp);
    var hasItem = (allActionItems || []).some(function(i) { return String(i.fdh || '') === String(c.fdh || ''); });
    var viewBtn = hasItem
      ? '<button class="signal-nav-btn" onclick="_signalNavigateToItem(' + JSON.stringify(String(c.fdh || '')) + ')">View</button>'
      : '';
    html += '<div class="signal-row">'
      + '<div class="signal-row-main">'
      + '<span class="signal-fdh">' + fdhHtml + '</span>'
      + '<span class="glass-pill ' + pillClass + '">' + pillLabel + '</span>'
      + viewBtn
      + '</div>'
      + '<div class="signal-row-sub">'
      + subVal
      + '<span class="signal-meta">' + metaHtml + '</span>'
      + '</div>'
      + '</div>';
  });
  el.innerHTML = html;
}

function _signalTypeLabel(t) {
  if (t === 'ofs date') return 'OFS Date';
  if (t === 'cx start date') return 'CX Start';
  if (t === 'cx end date') return 'CX End';
  return t;
}

function _signalQBPillClass(type, val) {
  var t = (type || '').toLowerCase().trim();
  var v = (val || '').toLowerCase();
  if (t === 'ofs date') return 'pill-ofs';
  if (t === 'cx start date' || t === 'cx end date') return 'pill-active';
  if (v.includes('ofs')) return 'pill-ofs';
  if (v.includes('permitting') || v.includes('permit')) return 'pill-permit';
  if (v.includes('vendor')) return 'pill-drg';
  if (v.includes('cx') || v.includes('crossing') || v.includes('active')) return 'pill-active';
  if (v.includes('complete')) return 'pill-complete';
  return 'pill-hold';
}

function _stripEmoji(s) {
  return String(s).replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u2600-\u27BF]/g, '')
    .replace(/[\uFE00-\uFE0F]/g, '')
    .trim();
}

function _renderSignalLogs(logs) {
  var el = document.getElementById('signal-panel-log');
  if (!el) return;
  var q = _signalSearchQuery.toLowerCase().trim();
  var filtered = q ? logs.filter(function(l) {
    return _signalMatchesQuery([l.message, l.timestamp], q);
  }) : logs;

  _signalUpdateMatchCount(filtered.length, logs.length);

  if (!filtered.length) {
    el.innerHTML = q
      ? '<div class="signal-log-empty">NO RESULTS FOR "' + _esc(q.toUpperCase()) + '"</div>'
      : '<div class="signal-log-empty">NO ENTRIES FOUND</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(l) {
    var raw = l.message || '';
    var msg = _stripEmoji(raw);
    var upper = raw.toUpperCase();
    var cls = (upper.includes('ERROR') || upper.includes('FAIL') || upper.includes('❌'))
      ? 'err'
      : (upper.includes('WARN') || upper.includes('⚠'))
      ? 'warn'
      : (upper.includes('COMPLETE') || upper.includes('SUCCESS') || upper.includes('✅'))
      ? 'ok'
      : '';
    var msgHtml = q ? _signalHighlight(msg, q) : _esc(msg);
    html += '<div class="signal-log-row' + (cls ? ' signal-log-' + cls : '') + '">'
      + '<span class="signal-log-ts">' + _esc(l.timestamp) + '</span>'
      + '<span class="signal-log-msg">' + msgHtml + '</span>'
      + '</div>';
  });
  el.innerHTML = html;
}

function _renderSignalDrive(activity, tf) {
  var el = document.getElementById('signal-panel-drive');
  if (!el) return;
  var q = _signalSearchQuery.toLowerCase().trim();

  // Filter: keep groups that have at least one matching file (or matching folder path)
  var filteredActivity = q ? activity.map(function(group) {
    var folderMatch = _signalMatchesQuery([group.folder], q);
    var matchedFiles = group.files.filter(function(f) {
      return _signalMatchesQuery([f.name, f.modified, group.folder], q);
    });
    if (!folderMatch && !matchedFiles.length) return null;
    return { folder: group.folder, folderUrl: group.folderUrl, files: folderMatch ? group.files : matchedFiles };
  }).filter(Boolean) : activity;

  var totalFiles = filteredActivity.reduce(function(n, g) { return n + g.files.length; }, 0);
  _signalUpdateMatchCount(totalFiles, activity.reduce(function(n, g) { return n + g.files.length; }, 0));

  if (!filteredActivity.length) {
    el.innerHTML = q
      ? '<div class="signal-empty">No results for "' + _esc(q) + '".</div>'
      : '<div class="signal-empty">No Drive folder activity in the ' + _signalTfLabel(tf) + '.</div>';
    return;
  }

  // Re-group by root subfolder (segment index 1; segment 0 is the Omni Fiber root name)
  // rootMap: rootKey -> { rootUrl, subgroups: [{ subPath, folderUrl, files }] }
  var rootMap = {};
  filteredActivity.forEach(function(group) {
    var parts = group.folder.split(' / ');
    var rootKey = parts.length > 1 ? parts[1] : parts[0];
    var subPath = parts.length > 2 ? parts.slice(2).join(' / ') : '';
    if (!rootMap[rootKey]) rootMap[rootKey] = { rootUrl: null, subgroups: [] };
    // First entry at depth 1 (subPath empty) carries the root folder URL
    if (!subPath && group.folderUrl) rootMap[rootKey].rootUrl = group.folderUrl;
    rootMap[rootKey].subgroups.push({ subPath: subPath, folderUrl: group.folderUrl || null, files: group.files });
  });

  // Sort root keys by most recent activity
  var rootKeys = Object.keys(rootMap).sort(function(a, b) {
    var aMax = rootMap[a].subgroups.reduce(function(m, g) {
      return g.files.reduce(function(m2, f) { return f.modified > m2 ? f.modified : m2; }, m);
    }, '');
    var bMax = rootMap[b].subgroups.reduce(function(m, g) {
      return g.files.reduce(function(m2, f) { return f.modified > m2 ? f.modified : m2; }, m);
    }, '');
    return bMax > aMax ? 1 : -1;
  });

  if (_signalDriveRootFilter !== 'all' && rootKeys.indexOf(_signalDriveRootFilter) === -1) {
    _signalDriveRootFilter = 'all';
  }

  var folderIcon = '<svg width="46" height="46" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/></svg>';
  var chipHtml = '<div class="signal-drive-filter-row">';
  chipHtml += '<button class="signal-drive-filter-chip' + (_signalDriveRootFilter === 'all' ? ' active' : '') + '" type="button" onclick="_signalSetDriveRootFilter(\'all\')">'
    + '<span class="signal-drive-filter-icon">' + folderIcon + '</span>'
    + '<span class="signal-drive-filter-label">All Roots</span>'
    + '<span class="signal-count">' + filteredActivity.length + '</span>'
    + '</button>';
  rootKeys.forEach(function(rootKey) {
    var entry = rootMap[rootKey];
    var totalFiles = entry.subgroups.reduce(function(n, g) { return n + g.files.length; }, 0);
    chipHtml += '<button class="signal-drive-filter-chip' + (_signalDriveRootFilter === rootKey ? ' active' : '') + '" type="button" onclick="_signalSetDriveRootFilter(' + JSON.stringify(rootKey) + ')">'
      + '<span class="signal-drive-filter-icon">' + folderIcon + '</span>'
      + '<span class="signal-drive-filter-label">' + _esc(rootKey) + '</span>'
      + '<span class="signal-count">' + totalFiles + '</span>'
      + '</button>';
  });
  chipHtml += '</div>';

  var html = chipHtml;
  rootKeys.forEach(function(rootKey) {
    if (_signalDriveRootFilter !== 'all' && _signalDriveRootFilter !== rootKey) return;
    var entry = rootMap[rootKey];
    var totalFiles = entry.subgroups.reduce(function(n, g) { return n + g.files.length; }, 0);
    var rootLink = entry.rootUrl
      ? ' href="' + _esc(entry.rootUrl) + '" target="_blank"'
      : '';

    html += '<div class="signal-drive-root">'
      + '<div class="signal-drive-root-header">'
      + '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/></svg>'
      + '<a class="signal-drive-link"' + rootLink + '>' + _esc(rootKey) + '</a>'
      + ' <span class="signal-count">' + totalFiles + '</span>'
      + '</div>';

    entry.subgroups.forEach(function(sg) {
      if (sg.subPath) {
        var subLink = sg.folderUrl
          ? ' href="' + _esc(sg.folderUrl) + '" target="_blank"'
          : '';
        html += '<div class="signal-drive-subfolder">'
          + '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z" opacity="0.6"/></svg>'
          + '<a class="signal-drive-link"' + subLink + '>' + _esc(sg.subPath) + '</a>'
          + '</div>';
      }
      sg.files.forEach(function(f) {
        var fileLink = f.url
          ? ' href="' + _esc(f.url) + '" target="_blank"'
          : '';
        html += '<div class="signal-drive-file' + (sg.subPath ? ' signal-drive-file-nested' : '') + '">'
          + '<a class="signal-drive-file-name signal-drive-link"' + fileLink + '>' + _esc(f.name) + '</a>'
          + '<span class="signal-meta">' + _esc(f.modified) + '</span>'
          + '</div>';
      });
    });

    html += '</div>';
  });
  el.innerHTML = html;
}

function _signalSetDriveRootFilter(rootKey) {
  _signalDriveRootFilter = rootKey || 'all';
  if (_signalActiveTab !== 'drive') return;
  var tf = _signalNormalizeTf(_signalCurrentTf);
  if (Object.prototype.hasOwnProperty.call(_signalCache.drive, tf)) {
    _renderSignalDrive(_signalCache.drive[tf] || [], tf);
  }
}

function _signalSetTab(tab) {
  _signalActiveTab = tab;
  ['qb', 'log', 'drive'].forEach(function(t) {
    var panel = document.getElementById('signal-panel-' + t);
    var btn = document.getElementById('signal-tab-' + t);
    if (panel) panel.style.display = t === tab ? 'block' : 'none';
    if (btn) btn.classList.toggle('active', t === tab);
  });
  // Re-render with current search query applied to new tab
  if (_signalSearchQuery) _signalOnSearch(_signalSearchQuery);
}

function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// === SEARCH ===

function _signalMatchesQuery(fields, q) {
  if (!q) return true;
  return fields.some(function(f) {
    return f && String(f).toLowerCase().indexOf(q) !== -1;
  });
}

function _signalHighlight(text, q) {
  if (!text || !q) return _esc(text);
  var escaped = _esc(text);
  var escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + escapedQ + ')', 'gi'),
    '<mark class="signal-highlight">$1</mark>');
}

function _signalUpdateMatchCount(matched, total) {
  var countEl = document.getElementById('signal-search-count');
  var clearEl = document.getElementById('signal-search-clear');
  var q = _signalSearchQuery.trim();
  if (!q) {
    if (countEl) countEl.style.display = 'none';
    if (clearEl) clearEl.style.display = 'none';
    return;
  }
  if (countEl) {
    countEl.textContent = matched + ' of ' + total;
    countEl.style.display = '';
  }
  if (clearEl) clearEl.style.display = '';
}

function _signalOnSearch(val) {
  _signalSearchQuery = val || '';
  // Re-render active tab from cache
  var tf = _signalNormalizeTf(_signalCurrentTf);
  var fastData = _signalCache.fast[tf];
  if (_signalActiveTab === 'qb' && fastData) {
    _renderSignalQB(fastData.qbChanges || [], tf);
  } else if (_signalActiveTab === 'log' && fastData) {
    _renderSignalLogs(fastData.systemLogs || [], tf);
  } else if (_signalActiveTab === 'drive' && Object.prototype.hasOwnProperty.call(_signalCache.drive, tf)) {
    _renderSignalDrive(_signalCache.drive[tf] || [], tf);
  }
  // Show/hide clear button
  var clearEl = document.getElementById('signal-search-clear');
  if (clearEl) clearEl.style.display = _signalSearchQuery ? '' : 'none';
  var countEl = document.getElementById('signal-search-count');
  if (!_signalSearchQuery && countEl) countEl.style.display = 'none';
}

function _signalNavigateToItem(fdh) {
  var wasStartup = _signalMode === 'startup';
  if (wasStartup) {
    // Signal is gating workspace entry — close it properly then route to detail
    closeSignal('detail');
    setTimeout(function() {
      if (typeof selectItemForNav === 'function') selectItemForNav(fdh);
    }, 350);
  } else {
    // Manual mode — dismiss overlay, item is already in an active workspace
    _signalDismiss();
    if (typeof selectItemForNav === 'function') selectItemForNav(fdh);
  }
}

function _signalClearSearch() {
  _signalSearchQuery = '';
  var input = document.getElementById('signal-search-input');
  if (input) { input.value = ''; input.focus(); }
  _signalOnSearch('');
}

window.openSignal = openSignal;
window.closeSignal = closeSignal;
window.loadSignalData = loadSignalData;
window._signalSetTab = _signalSetTab;
window._signalSetDriveRootFilter = _signalSetDriveRootFilter;
window._signalBackdropClick = _signalBackdropClick;
window._signalDismiss = _signalDismiss;
window._signalOnSearch = _signalOnSearch;
window._signalClearSearch = _signalClearSearch;
window._signalNavigateToItem = _signalNavigateToItem;
</script>
