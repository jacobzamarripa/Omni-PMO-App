<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
      }
      h3 { margin-top: 0; font-size: 15px; color: #334155; margin-bottom: 16px; }
      input[type="date"] {
        padding: 10px 12px;
        font-size: 15px;
        font-family: monospace;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 20px;
        outline: none;
        cursor: pointer;
      }
      input[type="date"]:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }
      #weekend-hint {
        display: none;
        font-size: 10px;
        color: #1d4ed8;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid #bfdbfe;
        padding: 8px 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-weight: 700;
      }
      .btn-row { display: flex; gap: 10px; justify-content: center; }
      button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.2s;
        flex: 1;
      }
      .btn-primary { background: #0f172a; color: white; }
      .btn-primary:hover { background: #334155; }
      .btn-secondary { background: #e2e8f0; color: #475569; }
      .btn-secondary:hover { background: #cbd5e1; }
      #loading { display: none; font-size: 13px; color: #3b82f6; margin-top: 15px; font-weight: bold; }
    </style>
  </head>
  <body>
    <h3>Select Target Date</h3>
    <input type="date" id="datePicker">
    <div id="weekend-hint">✨ Friday selected. Saturday &amp; Sunday reports will be automatically bundled into this review.</div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="google.script.host.close()">Cancel</button>
      <button class="btn-primary" id="runBtn" onclick="submitDate()">Run Engine</button>
    </div>

    <div id="loading">⏳ Processing... please wait.</div>

    <script>
      let d = new Date();
      let tzOffset = d.getTimezoneOffset() * 60000;
      let localToday = new Date(d.getTime() - tzOffset);
      
      let maxDateStr = localToday.toISOString().split('T')[0];
      let datePicker = document.getElementById('datePicker');
      datePicker.max = maxDateStr;

      let defaultDate = new Date(localToday);
      let dayOfWeek = defaultDate.getUTCDay();
      let currentHour = d.getHours();
      if (dayOfWeek === 5) {                          // Friday → Thu
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
      } else if (dayOfWeek === 6) {                   // Saturday → Thu
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 2);
      } else if (dayOfWeek === 0) {                   // Sunday → Thu
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
      } else if (dayOfWeek === 1 && currentHour < 11) { // Mon before 11 → Thu
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 4);
      } else if (dayOfWeek === 1) {                   // Mon after 11 → Fri
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
      } else {                                        // Tue/Wed/Thu → yesterday
          defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
      }
      datePicker.value = defaultDate.toISOString().split('T')[0];
      
      datePicker.addEventListener('change', function() {
          let hint = document.getElementById('weekend-hint');
          let selDate = new Date(this.value + 'T12:00:00');
          if (hint) hint.style.display = (selDate.getDay() === 5) ? 'block' : 'none';
      });
      datePicker.dispatchEvent(new Event('change'));

      function submitDate() {
        document.getElementById('runBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';

        let dateVal = document.getElementById('datePicker').value;
        let actionName = '<?= action ?>';
        
        let targetDates = [dateVal];
        let selDate = new Date(dateVal + 'T12:00:00');
        if (selDate.getDay() === 5 && actionName === 'RunReview') {
            let sat = new Date(selDate); sat.setDate(sat.getDate() + 1);
            let sun = new Date(selDate); sun.setDate(sun.getDate() + 2);
            targetDates.push(sat.toISOString().split('T')[0]);
            targetDates.push(sun.toISOString().split('T')[0]);
        }

        google.script.run
          .withSuccessHandler(function() { google.script.host.close(); })
          .withFailureHandler(function(err) { alert("Error: " + err.message); google.script.host.close(); })
          .processDateSelection(actionName === 'RunReview' ? targetDates : dateVal, actionName);
      }
    </script>
  </body>
</html>
