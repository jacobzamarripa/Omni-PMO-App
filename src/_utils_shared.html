// ============================================================
// FILE: _utils_shared.html
// ROLE: Provides pure shared frontend helpers for escaping, date normalization, and classification logic.
// DEPENDS ON: _registry.html, WebApp.html
// DEPENDED ON BY: WebApp.html runtime functions and future frontend partials
// MOBILE NOTES: Date helpers are mobile-safe, but the classification helpers still feed desktop-first UI states elsewhere.
// AGENT NOTES: Read _registry.html and WebApp.html before changing helper behavior because these functions are reused across queue, detail, and Gantt rendering.
// ============================================================
-->
<script>
      function esc(s) {
          if (s === null || s === undefined) return '';
          return String(s)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#39;');
      }

      function escJs(s) {
          return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      }

      function autoExpandTextarea(el) {
          if (!el) return;
          el.style.height = 'auto';
          el.style.height = el.scrollHeight + 'px';
      }

      // UTC-locked date parser — prevents browser local-time shifting across timezones.
      function safeDate(str) {
          if (!str || str === '' || str === '-' || str === 'Unknown') return null;
          let s = String(str).trim();
          
          // 1. Check for long Javascript Date string format (e.g. "Sat Apr 11 2026...")
          if (s.includes(' ') && s.match(/[A-Z][a-z]{2}\s[A-Z][a-z]{2}\s\d{1,2}\s\d{4}/)) {
              let d = new Date(s);
              if (!isNaN(d.getTime())) return new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
          }

          // 2. yyyy-MM-dd or yyyy/MM/dd (ISO-style)
          let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
          if (m) return new Date(Date.UTC(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10)));
          
          // 3. MM-dd-yyyy or MM/dd/yyyy or MM-dd-yy or MM/dd/yy
          m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
          if (m) {
              let yr = m[3].length === 2 ? parseInt('20'+m[3],10) : parseInt(m[3],10);
              return new Date(Date.UTC(yr, parseInt(m[1],10)-1, parseInt(m[2],10)));
          }
          
          let d = new Date(str);
          if (!isNaN(d.getTime())) {
              return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
          }
          return null;
      }

      // UTC-locked date formatter — everyone on the team sees the same Business Day date.
      function formatDate(val, includeTime = false) {
          if (!val || val === '-' || val === 'Unknown' || val === '') return 'TBD';

          let d;
          if (val instanceof Date) {
              d = val;
          } else {
              // Try to parse the string into a UTC-locked Date object
              d = safeDate(val);
          }

          if (!d || isNaN(d.getTime())) return String(val);

          // Force MM/DD/YY format
          let mo = String(d.getUTCMonth() + 1).padStart(2, '0');
          let da = String(d.getUTCDate()).padStart(2, '0');
          let yr = String(d.getUTCFullYear()).substring(2);
          
          let datePart = mo + '/' + da + '/' + yr;

          if (includeTime) {
              // Only show time if it's not exactly midnight UTC
              const isMidnightUTC = d.getUTCHours() === 0 && d.getUTCMinutes() === 0;
              if (!isMidnightUTC) {
                  let hh = String(d.getUTCHours()).padStart(2, '0');
                  let mm = String(d.getUTCMinutes()).padStart(2, '0');
                  return datePart + ' ' + hh + ':' + mm;
              }
          }

          return datePart;
      }

      function getCanonicalOfsRaw(item) {
          if (!item) return '';
          let raw = item.canonicalOfsDate || item.ofsDate || '';
          if (!raw || raw === '-' || raw === 'Unknown') return '';
          return String(raw).trim();
      }

      /**
       * Returns true if the item is in a terminal stage or status.
       */
      function isCompleteOrOfs(item) {
          if (!item) return false;
          const f = (item.flags || "").toUpperCase();
          const s = (item.status || "").toUpperCase();
          const st = (item.stage || "").toUpperCase();
          return f.includes("COMPLETE") || s.includes("COMPLETE") || 
                 f.includes("OFS") || f.includes("OPEN FOR SALE") || s.includes("OFS") || s.includes("OPEN FOR SALE") ||
                 st.includes("OFS") || st.includes("COMPLETE");
      }

      function getEffectiveOfsRaw(item) {
          return getCanonicalOfsRaw(item);
      }

      function getEffectiveOfsDate(item) {
          return safeDate(getEffectiveOfsRaw(item));
      }

      function getEffectiveOfsLabel(item, fallback) {
          let effective = getEffectiveOfsRaw(item);
          return effective ? formatDate(effective) : (fallback || 'TBD');
      }

      function getEffectiveOfsMonthMeta(item, referenceDate) {
          let d = getEffectiveOfsDate(item);
          if (!d || isNaN(d.getTime())) {
              return { label: 'TBD', isCurrentMonth: false, date: null };
          }
          let today = referenceDate instanceof Date ? new Date(referenceDate.getTime()) : new Date();
          return {
              label: d.toLocaleDateString('en-US', { month: 'short', timeZone: 'UTC' }).toUpperCase(),
              isCurrentMonth: d.getUTCMonth() === today.getMonth() && d.getUTCFullYear() === today.getFullYear(),
              date: d
          };
      }

      function getOfsDiagnosticMeta(item) {
          let canonicalRaw = getCanonicalOfsRaw(item);
          let mirrorRaw = item && item.rawMirrorOfsDate ? String(item.rawMirrorOfsDate).trim() : '';
          let targetRaw = item && item.targetDate ? String(item.targetDate).trim() : '';
          return {
              canonicalRaw: canonicalRaw,
              mirrorRaw: mirrorRaw,
              targetRaw: targetRaw,
              hasCanonical: !!canonicalRaw,
              hasMirror: !!mirrorRaw && mirrorRaw !== '-' && mirrorRaw !== 'Unknown',
              hasTarget: !!targetRaw && targetRaw !== '-' && targetRaw !== 'Unknown',
              mirrorMismatch: !!canonicalRaw && !!mirrorRaw && canonicalRaw !== mirrorRaw
          };
      }

      function getTimelineTodayIndicator(start, end, referenceDate) {
          let s = safeDate(start);
          let e = safeDate(end);
          let today = safeDate(referenceDate) || new Date();
          if (!s || !e || isNaN(s.getTime()) || isNaN(e.getTime()) || e <= s) return null;
          today.setHours(0, 0, 0, 0);
          let rawPct = ((today - s) / (e - s)) * 100;
          return {
              pct: rawPct,
              clampedPct: Math.max(0, Math.min(100, rawPct)),
              isOutOfRange: rawPct < 0 || rawPct > 100
          };
      }

      function getSeverity(flagsStr) {
          let rawFlags = (flagsStr || "").split('\n').map(f => f.trim()).filter(f => f !== "");
          let highestSev = "info";
          rawFlags.forEach(f => {
              const plain = cleanDiagnosticFlagText(f).toUpperCase();
              if (
                  f.includes("🚨") || f.includes("🛑") ||
                  plain.includes("LIGHTING RISK") || plain.includes("OVERRUN")
              ) { highestSev = "crit"; }
              else if (highestSev !== "crit" && (
                  f.includes("🚩") || f.includes("⚠️") || f.includes("🖍️") || f.includes("🚧") ||
                  plain.includes("ADMIN: CHECK CROSSINGS") || plain.includes("ADMIN: REFRESH REF DATA") ||
                  plain.includes("STATUS MISMATCH") || plain.includes("MISSING QB STATUS") ||
                  plain.includes("SCOPE DEVIATION") || plain.includes("PACE") ||
                  plain.includes("CHECK BOM") || plain.includes("PLEASE INPUT BOM") ||
                  plain.includes("BLOCKED BY UPSTREAM") || plain.includes("DELAYING DOWNSTREAM") ||
                  plain.includes("FORMAT ERROR")
              )) { highestSev = "warn"; }
          });
          if (highestSev === "info") {
              if (rawFlags.some(f => {
                  let up = String(f).toUpperCase();
                  return up === "MISSING DAILY REPORT" || (up.includes("STALE REPORT") && !up.includes("YESTERDAY"));
              })) {
                  highestSev = "crit";
              } else if (rawFlags.some(f => String(f).toUpperCase().includes("YESTERDAY"))) {
                  highestSev = "warn";
              }
          }
          return highestSev;
      }

      function getSeverityOrder(flagsStr) {
          const severity = getSeverity(flagsStr);
          const order = { crit: 0, warn: 1, info: 2, ghost: 3 };
          return Object.prototype.hasOwnProperty.call(order, severity) ? order[severity] : 99;
      }

      function buildReferenceConfidenceMeta(item) {
          const flagsStr = String((item && item.flags) || '').toUpperCase();
          const hasReferencePresence = !flagsStr.includes('NOT IN QB REFERENCE');
          const hasCurrentStatus = !flagsStr.includes('MISSING QB STATUS');
          const hasFreshReferenceState = !flagsStr.includes('STATUS MISMATCH') && !flagsStr.includes('ADMIN: REFRESH REF DATA');
          const hasRid = !!String((item && item.rid) || '').trim();
          const hasSow = !!(item && item.hasSOW);
          const hasCd = !!(item && ((item.hasCDDel) || (item.hasCDDist)));
          const hasBom = !!(item && ((item.hasBOMDel) || (item.hasBOMPo)));
          const hasInferredState = flagsStr.includes('INFERRED:') || flagsStr.includes('LIKELY OFS');
          const hasInferredDates = !!String((item && item.cxInferred) || '').trim();

          let score = 0;
          if (hasReferencePresence) score += 50;
          if (hasCurrentStatus) score += 20;
          if (hasFreshReferenceState) score += 10;
          if (hasRid) score += 8;
          if (hasSow) score += 4;
          if (hasCd) score += 4;
          if (hasBom) score += 4;
          if (hasInferredState) score -= 12;
          if (hasInferredDates) score -= 6;

          let tier = 'weak';
          if (score >= 75) tier = 'strong';
          else if (score >= 40) tier = 'partial';

          return { score: score, tier: tier };
      }

      function getReferenceConfidenceScore(item) {
          const raw = item && item.referenceConfidenceScore;
          const num = Number(raw);
          if (Number.isFinite(num)) return num;
          return buildReferenceConfidenceMeta(item).score;
      }

      function getReferenceConfidenceTier(item) {
          const raw = item && item.referenceConfidenceTier;
          if (raw === 'strong' || raw === 'partial' || raw === 'weak') return raw;
          return buildReferenceConfidenceMeta(item).tier;
      }

      function getPrimarySortDate(item) {
          return safeDate(item && item.targetDate) ||
                 safeDate(item && item.cxEnd) ||
                 getEffectiveOfsDate(item) ||
                 safeDate(item && item.reportDate) ||
                 null;
      }

      function compareWithSecondarySort(a, b, sortMode) {
          const mode = sortMode || 'end';
          const scoreDiff = getReferenceConfidenceScore(b) - getReferenceConfidenceScore(a);
          if (scoreDiff !== 0) return scoreDiff;

          if (mode === 'admin') {
              const aAdmin = (String(a && a.flags || '').includes("ADMIN: CHECK CROSSINGS") || String(a && a.flags || '').includes("STATUS MISMATCH") || String(a && a.flags || '').includes("ADMIN: REFRESH REF DATA") || String(a && a.flags || '').includes("MISSING QB STATUS")) ? 0 : 1;
              const bAdmin = (String(b && b.flags || '').includes("ADMIN: CHECK CROSSINGS") || String(b && b.flags || '').includes("STATUS MISMATCH") || String(b && b.flags || '').includes("ADMIN: REFRESH REF DATA") || String(b && b.flags || '').includes("MISSING QB STATUS")) ? 0 : 1;
              if (aAdmin !== bAdmin) return aAdmin - bAdmin;
          }

          let valA = null;
          let valB = null;
          if (mode === 'target') {
              valA = safeDate(a && a.targetDate);
              valB = safeDate(b && b.targetDate);
          } else if (mode === 'start') {
              valA = safeDate(a && a.cxStart);
              valB = safeDate(b && b.cxStart);
          } else if (mode === 'end') {
              valA = safeDate(a && a.cxEnd);
              valB = safeDate(b && b.cxEnd);
          } else if (mode === 'ofs') {
              valA = getEffectiveOfsDate(a);
              valB = getEffectiveOfsDate(b);
          } else if (mode === 'report') {
              valA = safeDate(a && a.reportDate);
              valB = safeDate(b && b.reportDate);
          } else {
              valA = getPrimarySortDate(a);
              valB = getPrimarySortDate(b);
          }

          const hasA = !!valA;
          const hasB = !!valB;
          if (hasA && hasB) {
              const dateDiff = valA.getTime() - valB.getTime();
              if (dateDiff !== 0) return dateDiff;
          } else if (hasA !== hasB) {
              return hasA ? -1 : 1;
          }

          const severityDiff = getSeverityOrder(a && a.flags) - getSeverityOrder(b && b.flags);
          if (severityDiff !== 0) return severityDiff;

          return (Number(a && a.rowNum) || 0) - (Number(b && b.rowNum) || 0);
      }

      function compareReferenceConfidence(a, b) {
          return compareWithSecondarySort(a, b, 'end');
      }

      function getQueuePillClass(stage, status) {
          return getQBStatusClass(stage, status, false);
      }

      function getQBStatusClass(stage, status, isMissing) {
          if (isMissing) return 'chip-missing';
          let st = (stage || "").toLowerCase(), stat = (status || "").toLowerCase();
          if (st.includes('ofs')) return 'chip-ofs';
          if (st.includes('permit') || st.includes('pre-con') || st.includes('vendor assignment')) return 'chip-permit';
          if (stat.includes('complete')) return 'chip-complete';
          if (stat.includes('hold')) return 'chip-hold';
          return 'chip-active';
      }

      function getDiagnosticTagClass(flag) {
          let f = String(flag || '').toUpperCase();
          let plain = cleanDiagnosticFlagText(f).toUpperCase();
          if (f.includes('OFS') || f.includes('OPEN FOR SALE')) return 'chip-ofs';
          if (f.includes('COMPLETE')) return 'chip-complete';
          if (f.includes('ON HOLD')) return 'chip-hold';
          if (plain.includes('ADMIN: CHECK CROSSINGS') || plain.includes('ADMIN: REFRESH REF DATA')) return 'chip-admin';
          if (plain.includes('STATUS MISMATCH') || plain.includes('MISSING QB STATUS')) return 'chip-warn';
          if (
            f.includes('⚠️') || f.includes('🖍️') || f.includes('🚧') ||
            plain.includes('SCOPE DEVIATION') || plain.includes('PACE') ||
            plain.includes('CHECK BOM') || plain.includes('PLEASE INPUT BOM') ||
            plain.includes('FORMAT ERROR') || plain.includes('BLOCKED BY UPSTREAM') ||
            plain.includes('DELAYING DOWNSTREAM')
          ) return 'chip-warn';
          if (f.includes('🪄') || f.includes('🟣') || plain.includes('TRACKER UPDATE') || plain.includes('TRANSPORT OVERRIDE')) return 'chip-magic';
          if (f.includes('STALE REPORT')) {
              if (f.includes('YESTERDAY')) return 'chip-warn';
              return 'tag-red';
          }
          if (f === 'MISSING DAILY REPORT') return 'chip-ghost';
          if (f.includes('🚨') || f.includes('🛑') || plain.includes('LIGHTING RISK') || plain.includes('OVERRUN')) return 'tag-red';
          if (f.includes('🚩')) return 'chip-warn';
          return 'chip-muted';
      }

      function cleanDiagnosticFlagText(flag) {
          return String(flag || '').replace(/[\u{1F6A8}\u{1F6D1}\u{1F6A9}\u26A0\uFE0F\u{1F58D}\u{1F6A7}\u{1FA84}\u{1F7E3}\u{1F535}\u{1F7E2}\u26AA]/gu, '').trim();
      }

      function getQueueCombinedPill(item) {
          const flags = String((item && item.flags) || '');
          if (flags.includes("INFERRED: SPLICING ONLY")) return "Field CX | Splicing Only";
          if (flags.includes("INFERRED: FIELD CX")) return "Field CX (Inferred)";
          if (flags.includes("INFERRED: PRE-CON")) return "Pre-Con (Inferred)";
          if (flags.includes("INFERRED: HOLD")) return "On Hold (Inferred)";
          
          const isOutOfCxScope = flags.includes("LIKELY OFS / OOS") || flags.includes("LIKELY OFS / OUT OF CX SCOPE");
          const isMissingQbStatus = flags.includes("MISSING QB STATUS");
          const isNotInQb = flags.includes("NOT IN QB REFERENCE");
          if (isOutOfCxScope) return "OFS (Inferred) | OOS";
          if (isMissingQbStatus && !isNotInQb) return "Reference Status Missing";
          if (isNotInQb) return "Reference Data Missing";
          return `${item.stage || "-"} | ${item.status || "-"}`;
      }

      function getDisplayStageLabel(item) {
          if (!item) return "-";
          const flags = String(item.flags || '');
          if (flags.includes("INFERRED: SPLICING ONLY")) return "Field CX";
          if (flags.includes("INFERRED: FIELD CX")) return "Field CX";
          if (flags.includes("INFERRED: PRE-CON")) return "Pre-Construction";
          if (flags.includes("INFERRED: HOLD")) return "On Hold";
          if (flags.includes("LIKELY OFS / OOS")) return "OFS (Inferred)";
          return item.stage || "-";
      }

      function getGanttClass(stage, status, isOverdue) {
          let st = (stage || "").toLowerCase(), stat = (status || "").toLowerCase();
          if (st.includes('ofs')) return 'g-color-blue';
          if (st.includes('permit') || st.includes('pre-con') || st.includes('vendor assignment')) return 'g-color-purple';
          if (stat.includes('complete')) return 'g-color-green';
          if (stat.includes('hold')) return 'g-color-gray';
          if (st.includes('inferred')) {
              if (st.includes('cx')) return 'g-color-yellow';
              if (st.includes('pre-con') || st.includes('vendor assignment')) return 'g-color-purple';
              if (st.includes('hold')) return 'g-color-gray';
          }
          if (isOverdue || st === "reference data missing" || st === "-") return 'g-color-red';
          return 'g-color-yellow';
      }
      // ── DOM HELPERS (Shorthand) ──
      const getEl = (id) => document.getElementById(id);
      const setHtml = (id, val) => { let el = getEl(id); if(el) el.innerHTML = val; };
      const setTxt = (id, val) => { let el = getEl(id); if(el) el.innerText = val; };
      const setStyle = (id, prop, val) => { let el = getEl(id); if(el) el.style[prop] = val; };
      const setVal = (id, val) => { let el = getEl(id); if(el) el.value = val; };
</script>
