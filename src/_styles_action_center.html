<style>
/* ============================================================
   FILE: _styles_action_center.html
   ROLE: Action Center workspace styles
   ============================================================ */

/* ── Workspace container ─────────────────────────────────── */
#action-workspace {
  display: none;
  flex-direction: row;
  flex: 1;
  min-height: 0;
  width: 100%;
  box-sizing: border-box;
  overflow: hidden;
}

#action-workspace.ws-active {
  display: flex;
}

/* Hide queue, filter strip, and filter pills — mirrors upload-view-active pattern */
body.action-view-active .workspace           { display: none !important; }
body.action-view-active .filter-strip        { display: none !important; }
body.action-view-active #active-filter-pills { display: none !important; }

/* Ensure workspace fills the layout shell */
body.action-view-active #action-workspace {
  flex: 1 1 auto !important;
  min-height: 0 !important;
  display: flex !important;
  overflow: hidden !important;
}

/* ── Left column: Top Offenders ──────────────────────────── */
.action-ws-left {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: color-mix(in srgb, var(--bg) 92%, #f8fafc);
  overflow: hidden;
}

.action-ws-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 24px 12px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
  background: color-mix(in srgb, var(--bg) 97%, var(--card-bg));
}

.action-ws-kicker {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1;
}

.action-ws-title {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--text-main);
  line-height: 1.1;
  margin-top: 3px;
}

.action-ws-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 24px;
}

#action-offenders-panel {
  width: 100%;
}

.action-ws-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 120px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ── Right column: Action Panel (outbox-pane embedded) ───── */
.action-ws-right {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  overflow: hidden;
  background: var(--card-bg);
}

/* Neutralize the outbox-pane's fixed/transform positioning when embedded */
#outbox-pane.action-panel-embedded {
  position: static !important;
  transform: none !important;
  visibility: visible !important;
  pointer-events: auto !important;
  transition: none !important;
  width: 100% !important;
  height: 100% !important;
  max-height: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  border: none !important;
  border-bottom: none !important;
  bottom: auto !important;
  top: auto !important;
  left: auto !important;
  right: auto !important;
  z-index: auto !important;
  margin: 0 !important;
  flex: 1;
  min-height: 0;
}

/* Hide the close button — no way to dismiss the panel when it's a workspace column */
#outbox-pane.action-panel-embedded #admin-panel-close {
  display: none !important;
}

/* Suppress the backdrop overlay when the panel is embedded */
body.action-view-active #outbox-overlay {
  display: none !important;
}

/* ── Dark mode ───────────────────────────────────────────── */
body.dark-mode .action-ws-left {
  background: color-mix(in srgb, var(--bg) 94%, #0f172a);
}

body.dark-mode .action-ws-header {
  background: color-mix(in srgb, var(--bg) 95%, var(--card-bg));
}

/* ── Responsive: collapse right column on narrow viewports ── */
@media (max-width: 900px) {
  #action-workspace.ws-active { flex-direction: column; }
  .action-ws-right {
    width: 100%;
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 50vh;
  }
  .action-ws-header { padding: 12px 16px 10px; }
  .action-ws-body   { padding: 14px 16px; }
  .action-ws-title  { font-size: 15px; }
}
</style>
