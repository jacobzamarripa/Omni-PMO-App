<script>
// ============================================================
// FILE: _state_router.html
// ROLE: Authoritative workspace routing and view mode state owner
// DEPENDS ON: _registry.html, _state_queue.html
// DEPENDED ON BY: WebApp.html main runtime and all workspace/
//   navigation module extractions
// MOBILE NOTES: currentDockPlacement drives dock inversion in
//   Gantt view — bottom dock opens dropdowns upward
// AGENT NOTES: Read this before touching any workspace switching,
//   dock behavior, deck mode, or view routing logic
// ============================================================
// STATE: currentWorkspaceView
// READS: workspace-router, detail, gantt, grid, critical hub
// WRITES: workspace-router, applyFilters, navigation helpers
// EXTRACT WITH: currentDetailFace, isDeckMode, deckIndex, gantt session state
// WORKSTREAM 3 RISK: High
let currentWorkspaceView = 'detail';
// STATE: currentDetailFace
// READS: detail/deck face rendering, workspace-router
// WRITES: workspace-router, detail face toggles
// EXTRACT WITH: currentWorkspaceView, isDeckMode, deckIndex
// WORKSTREAM 3 RISK: High
let currentDetailFace = 'detail';
// STATE: isDeckMode
// READS: detail/deck rendering, grid, applyFilters, router
// WRITES: workspace-router, deck presentation toggles
// EXTRACT WITH: currentWorkspaceView, currentDetailFace, deckIndex, pmSessionMemory
// WORKSTREAM 3 RISK: High
let isDeckMode = false;
// STATE: deckIndex
// READS: deck navigation, deck selection
// WRITES: deck/detail navigation, grid open handlers
// EXTRACT WITH: isDeckMode, filteredItems, stagedDeckItems, pmSessionMemory
// WORKSTREAM 3 RISK: Medium
let deckIndex = 0;
// STATE: currentDockPlacement
// READS: dock spacing, gantt island layout
// WRITES: dock placement sync and floating pill positioning
// EXTRACT WITH: currentWorkspaceView, isDeckMode, gantt session state
// WORKSTREAM 3 RISK: Medium
let currentDockPlacement = 'top';
// Panel tab state — owned here, written by switchPanelTab()
let currentPanelTab = 'admin';

// STATE: isGridMode
// READS: workspace-router, detail, grid
// WRITES: workspace-router
// EXTRACT WITH: currentGridPivot, currentWorkspaceView
// WORKSTREAM 3 RISK: Medium
let isGridMode = false;
// STATE: currentGridPivot
// READS: bootstrap, grid, queue chrome
// WRITES: bootstrap, grid, workspace-router
// EXTRACT WITH: isGridMode, currentViewMode, allGlobalLogs
// WORKSTREAM 3 RISK: High
let currentGridPivot = 'velocity';
// STATE: deckPrevPivot
// READS: workspace-router
// WRITES: deck/view transitions
// EXTRACT WITH: currentGridPivot, switchWorkspaceView
let deckPrevPivot = 'velocity';
// STATE: pendingFaceAnimation
// READS: detail face transitions
// WRITES: face animation helpers
// EXTRACT WITH: currentDetailFace, isDeckMode
let pendingFaceAnimation = null;

// STATE: currentV2Variant — mobile shell identifier
// READS: mobile shell init, shell-aware rendering
// WRITES: set once on load by the active mobile shell via setV2Variant()
// EXTRACT WITH: currentWorkspaceView
// null means the shared desktop shell is active
let currentV2Variant = null;
function getV2Variant() { return currentV2Variant; }
function setV2Variant(name) { currentV2Variant = name || null; }
</script>
