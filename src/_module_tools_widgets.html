<script>
// ============================================================
// FILE: _module_tools_widgets.html
// ROLE: Owns the calculator and calendar widget runtime, including drag, persistence, and inline control handlers.
// DEPENDS ON: WebApp.html markup
// DEPENDED ON BY: WebApp.html inline handlers and global keydown listener
// MOBILE NOTES: Uses pointer drag, viewport clamping, and fixed widget positioning that remain desktop-biased.
// AGENT NOTES: Read the Workstream 3 recommendation in WORKSTREAM_0_NOTES.md before editing; keep the public surface limited to toggleWidget, changeMonth, calcNum, and calcOp.
// ============================================================
(function() {
  // STATE: CALC_WIDGET_SESSION_KEY
  // READS: calculator widget persistence
  // WRITES: none
  // EXTRACT WITH: saveCalcWidgetPosition, loadCalcWidgetPosition
  // WORKSTREAM 3 RISK: Low
  var CALC_WIDGET_SESSION_KEY = 'calcWidgetPosition';

  // STATE: CALC_WIDGET_VIEWPORT_MARGIN
  // READS: calculator widget clamping
  // WRITES: none
  // EXTRACT WITH: clampToolWidgetPosition
  // WORKSTREAM 3 RISK: Low
  var CALC_WIDGET_VIEWPORT_MARGIN = 20;

  // STATE: calcWidgetDragState
  // READS: calculator drag move/end
  // WRITES: calculator drag lifecycle
  // EXTRACT WITH: calculator widget helpers
  // WORKSTREAM 3 RISK: Low
  var calcWidgetDragState = null;

  // STATE: currentCalDate
  // READS: calendar render
  // WRITES: calendar month navigation
  // EXTRACT WITH: renderCalendar, changeMonth
  // WORKSTREAM 3 RISK: Low
  var currentCalDate = new Date();
  var CALENDAR_MAX_VISIBLE_EVENTS = 3;
  var activeCalendarFilters = { start: true, complete: true, ofs: true };

  // STATE: calcState
  // READS: calculator render/update
  // WRITES: calculator input/operators
  // EXTRACT WITH: calcNum, calcOp, updateCalc
  // WORKSTREAM 3 RISK: Low
  var calcState = '';

  function clampToolWidgetPosition(widget, left, top) {
      if (!widget) return { left: 0, top: 0 };
      var maxLeft = Math.max(CALC_WIDGET_VIEWPORT_MARGIN, window.innerWidth - widget.offsetWidth - CALC_WIDGET_VIEWPORT_MARGIN);
      var maxTop = Math.max(CALC_WIDGET_VIEWPORT_MARGIN, window.innerHeight - widget.offsetHeight - CALC_WIDGET_VIEWPORT_MARGIN);
      return {
          left: Math.min(Math.max(CALC_WIDGET_VIEWPORT_MARGIN, left), maxLeft),
          top: Math.min(Math.max(CALC_WIDGET_VIEWPORT_MARGIN, top), maxTop)
      };
  }

  function applyToolWidgetPosition(widget, left, top) {
      if (!widget) return;
      var pos = clampToolWidgetPosition(widget, left, top);
      widget.style.left = pos.left + 'px';
      widget.style.top = pos.top + 'px';
  }

  function saveCalcWidgetPosition(left, top) {
      try {
          sessionStorage.setItem(CALC_WIDGET_SESSION_KEY, JSON.stringify({ left: left, top: top }));
      } catch (e) {}
  }

  function loadCalcWidgetPosition() {
      try {
          var raw = sessionStorage.getItem(CALC_WIDGET_SESSION_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed.left !== 'number' || typeof parsed.top !== 'number') return null;
          return parsed;
      } catch (e) {
          return null;
      }
  }

  function positionWidgetFromTrigger(widget, triggerEl) {
      if (!widget || !triggerEl) return;
      var rect = triggerEl.getBoundingClientRect();
      var topPos = rect.bottom + 12;
      var leftPos = rect.left + (rect.width / 2) - (widget.offsetWidth / 2);
      applyToolWidgetPosition(widget, leftPos, topPos);
  }

  function restoreCalcWidgetPosition(widget, triggerEl) {
      if (!widget) return;
      var saved = loadCalcWidgetPosition();
      if (saved) {
          applyToolWidgetPosition(widget, saved.left, saved.top);
          return;
      }
      if (triggerEl) {
          positionWidgetFromTrigger(widget, triggerEl);
          return;
      }
      applyToolWidgetPosition(widget, window.innerWidth - widget.offsetWidth - 32, 88);
  }

  var activeDragWidgetId = null;
  var widgetDragStates = {};

  function startWidgetDrag(e, id) {
      var widget = document.getElementById(id);
      if (!widget || !widget.classList.contains('open')) return;
      if (e.target && e.target.closest('.tool-close')) return;
      
      var point = e.touches && e.touches[0] ? e.touches[0] : e;
      var rect = widget.getBoundingClientRect();
      
      widgetDragStates[id] = {
          pointerId: e.pointerId,
          offsetX: point.clientX - rect.left,
          offsetY: point.clientY - rect.top
      };
      
      activeDragWidgetId = id;
      widget.classList.add('dragging');
      if (typeof e.preventDefault === 'function') e.preventDefault();
  }

  function moveWidgetDrag(e) {
      if (!activeDragWidgetId) return;
      var state = widgetDragStates[activeDragWidgetId];
      if (state.pointerId !== undefined && e.pointerId !== undefined && e.pointerId !== state.pointerId) return;
      
      var widget = document.getElementById(activeDragWidgetId);
      if (!widget) return;
      
      var nextLeft = e.clientX - state.offsetX;
      var nextTop = e.clientY - state.offsetY;
      applyToolWidgetPosition(widget, nextLeft, nextTop);
      if (typeof e.preventDefault === 'function') e.preventDefault();
  }

  function endWidgetDrag() {
      if (!activeDragWidgetId) return;
      var widget = document.getElementById(activeDragWidgetId);
      if (widget) {
          widget.classList.remove('dragging');
          var left = parseFloat(widget.style.left);
          var top = parseFloat(widget.style.top);
          if (!isNaN(left) && !isNaN(top)) {
              if (activeDragWidgetId === 'calc-widget') saveCalcWidgetPosition(left, top);
          }
      }
      activeDragWidgetId = null;
  }

  function syncWidgetsToViewport() {
      if (typeof syncCalcWidgetToViewport === 'function') syncCalcWidgetToViewport();
  }

  function initCalcWidgetDrag() {
      var calcHeader = document.getElementById('calc-widget-header');
      if (calcHeader) {
          calcHeader.addEventListener('pointerdown', function(e) { startWidgetDrag(e, 'calc-widget'); });
      }

      window.addEventListener('pointermove', moveWidgetDrag);
      window.addEventListener('pointerup', endWidgetDrag);
      window.addEventListener('pointercancel', endWidgetDrag);
      window.addEventListener('resize', syncWidgetsToViewport);
  }

  // MODULE CANDIDATE: _module_tools_widgets.html
  // STATE DEPS: calcWidgetDragState, currentCalDate, calcState
  // EXTRACT ORDER: 1
  function toggleWidget(id, event) {
      ['cal-widget', 'calc-widget'].forEach(function(w) {
          var el = document.getElementById(w);
          if (el && w !== id) {
              el.classList.remove('open');
              if (w === 'calc-widget') endWidgetDrag();
          }
      });
      var widget = document.getElementById(id);
      if (!widget) return;
      var isOpen = widget.classList.toggle('open');

      if (id === 'calc-widget' && !isOpen) {
          endWidgetDrag();
      }

      if (isOpen && id === 'calc-widget') {
          restoreCalcWidgetPosition(widget, event && event.currentTarget ? event.currentTarget : null);
      } else if (isOpen && event && event.currentTarget) {
          positionWidgetFromTrigger(widget, event.currentTarget);
      }

      if (id === 'cal-widget' && isOpen) renderCalendar();
  }

  function escapeCalendarHtml(value) {
      return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
  }

  function escapeCalendarJs(value) {
      return String(value == null ? '' : value)
          .replace(/\\/g, '\\\\')
          .replace(/'/g, "\\'");
  }

  function getCalendarItems() {
      if (typeof getActiveQueueItems === 'function') {
          var activeItems = getActiveQueueItems();
          if (Array.isArray(activeItems) && activeItems.length) return activeItems;
      }
      if (Array.isArray(filteredItems) && filteredItems.length) return filteredItems;
      if (Array.isArray(allActionItems) && allActionItems.length) return allActionItems;
      return [];
  }

  function getCalendarMilestones(items, year, month) {
      var typeOrder = { start: 0, complete: 1, ofs: 2 };
      var counters = { start: 0, complete: 0, ofs: 0 };
      var grouped = {};

      function pushMilestone(item, rawDate, type, suffix, pillClass) {
          var parsed = safeDate(rawDate);
          if (!parsed || isNaN(parsed.getTime())) return;
          if (parsed.getUTCFullYear() !== year || parsed.getUTCMonth() !== month) return;

          var day = parsed.getUTCDate();
          var milestone = {
              fdh: item && item.fdh ? String(item.fdh) : 'UNKNOWN',
              day: day,
              type: type,
              suffix: suffix,
              pillClass: pillClass,
              item: item
          };

          if (!grouped[day]) grouped[day] = [];
          grouped[day].push(milestone);
          counters[type]++;
      }

      (items || []).forEach(function(item) {
          if (!item) return;
          pushMilestone(item, item.cxStart, 'start', 'START', 'cal-event-pill-start');
          pushMilestone(item, item.cxEnd, 'complete', 'COMPLETE', 'cal-event-pill-complete');
          pushMilestone(item, getEffectiveOfsRaw(item), 'ofs', 'OFS', 'cal-event-pill-ofs');
      });

      Object.keys(grouped).forEach(function(dayKey) {
          grouped[dayKey].sort(function(a, b) {
              if (typeOrder[a.type] !== typeOrder[b.type]) return typeOrder[a.type] - typeOrder[b.type];
              return a.fdh.localeCompare(b.fdh);
          });
      });

      return {
          grouped: grouped,
          counts: counters,
          total: counters.start + counters.complete + counters.ofs
      };
  }

  function getFilteredCalendarMilestones(milestoneData) {
      var grouped = {};
      var counters = { start: 0, complete: 0, ofs: 0 };

      Object.keys((milestoneData && milestoneData.grouped) || {}).forEach(function(dayKey) {
          var dayEvents = (milestoneData.grouped[dayKey] || []).filter(function(evt) {
              return !!activeCalendarFilters[evt.type];
          });
          if (!dayEvents.length) return;
          grouped[dayKey] = dayEvents;
          dayEvents.forEach(function(evt) {
              counters[evt.type] = (counters[evt.type] || 0) + 1;
          });
      });

      return {
          grouped: grouped,
          counts: counters,
          total: counters.start + counters.complete + counters.ofs
      };
  }

  function updateCalendarSummary(summary) {
      var totalEl = document.getElementById('cal-total-count');
      var startEl = document.getElementById('cal-start-count');
      var completeEl = document.getElementById('cal-complete-count');
      var ofsEl = document.getElementById('cal-ofs-count');
      if (totalEl) totalEl.innerText = String(summary.total || 0);
      if (startEl) startEl.innerText = String(summary.counts && summary.counts.start || 0);
      if (completeEl) completeEl.innerText = String(summary.counts && summary.counts.complete || 0);
      if (ofsEl) ofsEl.innerText = String(summary.counts && summary.counts.ofs || 0);
  }

  function syncCalendarFilterUi() {
      var filterToClass = {
          start: 'cal-legend-pill-start',
          complete: 'cal-legend-pill-complete',
          ofs: 'cal-legend-pill-ofs'
      };
      Object.keys(filterToClass).forEach(function(key) {
          var el = document.querySelector('.' + filterToClass[key]);
          if (!el) return;
          el.classList.toggle('is-active', !!activeCalendarFilters[key]);
      });
  }

  function clearCalendarMilestoneFilters() {
      activeCalendarFilters = { start: true, complete: true, ofs: true };
      syncCalendarFilterUi();
      renderCalendar();
  }

  function toggleCalendarFilter(type) {
      if (!Object.prototype.hasOwnProperty.call(activeCalendarFilters, type)) return;
      var nextValue = !activeCalendarFilters[type];
      var activeCount = Object.keys(activeCalendarFilters).filter(function(key) { return !!activeCalendarFilters[key]; }).length;
      if (!nextValue && activeCount === 1) return;
      activeCalendarFilters[type] = nextValue;
      syncCalendarFilterUi();
      renderCalendar();
  }

  function openCalendarProject(fdh) {
      var target = (filteredItems || []).find(function(item) { return String(item.fdh || '') === String(fdh || ''); })
          || (allActionItems || []).find(function(item) { return String(item.fdh || '') === String(fdh || ''); });
      if (!target) return;

      var widget = document.getElementById('cal-widget');
      if (widget) widget.classList.remove('open');
      if (typeof switchWorkspaceView === 'function') switchWorkspaceView('detail');
      openPane(target, document.getElementById('card-' + target.fdh) || null);
  }

  function renderCalendar() {
      var y = currentCalDate.getFullYear(), m = currentCalDate.getMonth();
      document.getElementById('cal-month-year').innerText = new Date(y, m).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
      var firstDay = new Date(y, m, 1).getDay();
      var daysInMonth = new Date(y, m + 1, 0).getDate();
      var grid = document.getElementById('cal-grid');
      if (!grid) return;

      var sourceItems = getCalendarItems();
      var milestoneData = getCalendarMilestones(sourceItems, y, m);
      var filteredMilestoneData = getFilteredCalendarMilestones(milestoneData);
      syncCalendarFilterUi();
      updateCalendarSummary(filteredMilestoneData);

      var html = '<div class="cal-day-header">Su</div><div class="cal-day-header">Mo</div><div class="cal-day-header">Tu</div><div class="cal-day-header">We</div><div class="cal-day-header">Th</div><div class="cal-day-header">Fr</div><div class="cal-day-header">Sa</div>';
      for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
      var today = new Date();
      for (var d = 1; d <= daysInMonth; d++) {
          var isToday = (d === today.getDate() && m === today.getMonth() && y === today.getFullYear());
          var dayEvents = filteredMilestoneData.grouped[d] || [];
          var visibleEvents = dayEvents.slice(0, CALENDAR_MAX_VISIBLE_EVENTS);
          var overflowEvents = dayEvents.slice(CALENDAR_MAX_VISIBLE_EVENTS);
          var eventsHtml = visibleEvents.map(function(evt) {
              var label = escapeCalendarHtml(evt.fdh + ' · ' + evt.suffix);
              return '<button class="cal-event-pill ' + evt.pillClass + '" onclick="openCalendarProject(\'' + escapeCalendarJs(evt.fdh) + '\')" title="' + label + '">' + label + '</button>';
          }).join('');
          if (overflowEvents.length) {
              var overflowTitle = escapeCalendarHtml(overflowEvents.map(function(evt) { return evt.fdh + ' · ' + evt.suffix; }).join(', '));
              eventsHtml += '<div class="cal-more" title="' + overflowTitle + '">+' + overflowEvents.length + ' more</div>';
          }
          html += '<div class="cal-cell ' + (isToday ? 'today' : '') + '"><div class="cal-cell-day"><span class="cal-cell-day-number">' + d + '</span></div><div class="cal-cell-events">' + eventsHtml + '</div></div>';
      }
      grid.innerHTML = html;
  }

  function changeMonth(dir) {
      currentCalDate.setMonth(currentCalDate.getMonth() + dir);
      renderCalendar();
  }

  function calcNum(n) {
      if (calcState === 'Err') calcState = '';
      calcState += n;
      updateCalc();
  }

  function calcOp(op) {
      if (op === 'clr') { calcState = ''; }
      else if (op === '=') {
          try {
              var result = new Function('return ' + calcState.replace(/×/g, '*').replace(/÷/g, '/'))();
              calcState = String(Math.round(result * 100) / 100);
          } catch(e) { calcState = 'Err'; }
      }
      else if (['drill-days', 'jet-days', 'ae-days', 'splice-days'].includes(op)) {
          try {
              var val = Number(new Function('return ' + calcState.replace(/×/g, '*').replace(/÷/g, '/'))());
              if (op === 'drill-days')  calcState = String(Math.ceil(val / 450));
              if (op === 'jet-days')    calcState = String(Math.ceil(val / 5000));
              if (op === 'ae-days')     calcState = String(Math.ceil(val / 5000));
              if (op === 'splice-days') calcState = String(Math.ceil(val / 5));
          } catch(e) { calcState = 'Err'; }
      }
      else {
          if (calcState === 'Err') calcState = '';
          calcState += op;
      }
      updateCalc();
  }

  function updateCalc() {
      var disp = document.getElementById('calc-display');
      if (disp) disp.value = calcState || '0';
  }

  window.toggleWidget = toggleWidget;
  window.changeMonth = changeMonth;
  window.calcNum = calcNum;
  window.calcOp = calcOp;
  window.openCalendarProject = openCalendarProject;
  window.toggleCalendarFilter = toggleCalendarFilter;
  window.clearCalendarMilestoneFilters = clearCalendarMilestoneFilters;

  initCalcWidgetDrag();
})();
</script>
