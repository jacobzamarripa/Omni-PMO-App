<script>
// ============================================================
// FILE: _module_queue_state.html | ROLE: Queue rendering, grouping, selection, filters, dropdowns, and queue UI helpers
// DEPENDS ON: _state_queue.html, _state_router.html, _state_session.html, _state_analytics.html, _state_ui_shell.html, _utils_shared.html, _utils_notifications.html, _module_changelog.html, _module_admin.html, _module_deck.html, _module_gantt.html, _module_grid.html, _module_huds.html, _module_critical_hub.html
// DEPENDED ON BY: _module_webapp_core.html, _module_grid.html, _module_quick_peek.html, WebApp.html
// ============================================================
// STATE: _filterDebounce — search debounce timer handle
let _filterDebounce;
// STATE: _filterInput — cached search input DOM reference
let _filterInput = getEl('search-input');
if (_filterInput) {
    _filterInput.addEventListener('input', () => {
        clearTimeout(_filterDebounce);
        _filterDebounce = setTimeout(applyFilters, 300);
    });
}
function persistQueueGroupingSession() {
    try {
        sessionStorage.setItem(GROUP_BY_SESSION_KEY, currentGroupBy || 'none');
        sessionStorage.setItem(GROUP_COLLAPSE_SESSION_KEY, JSON.stringify(queueGroupCollapseState || {}));
    } catch (e) {}
}

function setGroupBy(value) {
    let nextValue = GROUP_BY_OPTIONS.includes(value) ? value : 'none';
    currentGroupBy = nextValue;
    persistQueueGroupingSession();
    applyFilters();
}

function toggleQueueGroupSection(groupKey) {
    if (currentGroupBy === 'none') return;
    let modeState = queueGroupCollapseState[currentGroupBy] || {};
    modeState[groupKey] = !modeState[groupKey];
    queueGroupCollapseState[currentGroupBy] = modeState;
    persistQueueGroupingSession();
    renderList(filteredItems || []);
}

function isQueueGroupCollapsed(groupKey) {
    return !!(queueGroupCollapseState[currentGroupBy] && queueGroupCollapseState[currentGroupBy][groupKey]);
}

function getGroupMetaForItem(item, groupBy) {
    let mode = GROUP_BY_OPTIONS.includes(groupBy) ? groupBy : 'none';
    if (mode === 'vendor') {
        let label = String(item.vendor || 'Unknown Vendor').trim() || 'Unknown Vendor';
        return { key: 'vendor:' + label.toLowerCase(), label: label, sortKey: label.toLowerCase() };
    }
    if (mode === 'city') {
        let label = String(item.city || 'Unknown City').trim() || 'Unknown City';
        return { key: 'city:' + label.toLowerCase(), label: label, sortKey: label.toLowerCase() };
    }
    if (mode === 'stage') {
        let label = String(item.stage || 'Unknown Stage').trim() || 'Unknown Stage';
        return { key: 'stage:' + label.toLowerCase(), label: label, sortKey: label.toLowerCase() };
    }
    if (mode === 'status') {
        let label = String(item.status || 'Unknown Status').trim() || 'Unknown Status';
        return { key: 'status:' + label.toLowerCase(), label: label, sortKey: label.toLowerCase() };
    }
    if (mode === 'health') {
        let severity = getSeverity(item.flags);
        let labels = { crit: 'Critical', warn: 'Warnings', info: 'Clear' };
        let order = { crit: 0, warn: 1, info: 2 };
        return {
            key: 'health:' + severity,
            label: labels[severity] || 'Clear',
            sortKey: String(order[severity] !== undefined ? order[severity] : 99)
        };
    }
    return { key: 'all', label: 'All Projects', sortKey: '0' };
}

function getGroupedQueueSections(items) {
    if (currentGroupBy === 'none') return [];
    let groups = new Map();
    (items || []).forEach(function(item) {
        let meta = getGroupMetaForItem(item, currentGroupBy);
        if (!groups.has(meta.key)) {
            groups.set(meta.key, { key: meta.key, label: meta.label, sortKey: meta.sortKey, items: [] });
        }
        groups.get(meta.key).items.push(item);
    });
    let sections = Array.from(groups.values());
    sections.sort(function(a, b) {
        if (currentGroupBy === 'health') return Number(a.sortKey) - Number(b.sortKey);
        return String(a.sortKey || '').localeCompare(String(b.sortKey || ''));
    });
    return sections;
}

function flattenGroupedSections(sections) {
    return (sections || []).reduce(function(acc, section) {
        return acc.concat(section.items || []);
    }, []);
}

// ── DEBOUNCED SEARCH ──
let searchTimeout;
function handleSearchInput(e) {
    const sourceEl = e && e.target ? e.target : null;
    const nextValue = sourceEl ? sourceEl.value : '';
    const desktopSearch = getEl('search-input');
    const mobileSearch = getEl('m-sf-search-input');
    if (desktopSearch && sourceEl !== desktopSearch && desktopSearch.value !== nextValue) desktopSearch.value = nextValue;
    if (mobileSearch && sourceEl !== mobileSearch && mobileSearch.value !== nextValue) mobileSearch.value = nextValue;

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        applyFilters();
    }, 200);
}

function handleFilterCheck(category, value, isChecked) {
    if (isChecked) {
        if (!activeFilters[category].includes(value)) activeFilters[category].push(value);
    } else {
        activeFilters[category] = activeFilters[category].filter(v => v !== value);
    }
    applyFilters();
}

function getFilterCategoryLabel(category) {
    return ({ sev: 'Health', vendor: 'Vendor', city: 'City', ofs: 'OFS', status: 'Status' }[category]) || category;
}

function getFilterValueLabel(category, value) {
    if (category === 'sev') return ({ crit: 'Critical', warn: 'Warnings', info: 'Clear' }[value]) || value;
    if (category === 'ofs') {
        if (value === '60_DAYS') return '< 60 Days';
        if (value === '90_DAYS') return '< 90 Days';
    }
    return value;
}

function getFilterSummaryText(category, selected, optionLabelMap, defaultLabel) {
    if (selected.length === 0) return defaultLabel;
    if (selected.length === 1) return optionLabelMap[selected[0]] || selected[0];
    let pluralLabel = ({ sev: 'Health Filters', vendor: 'Vendors', city: 'Cities', ofs: 'OFS Filters', status: 'Statuses' }[category]) || `${getFilterCategoryLabel(category)}s`;
    return `${selected.length} ${pluralLabel}`;
}

function clearFilterCategory(category) {
    if (!activeFilters[category]) return;
    activeFilters[category] = [];
    applyFilters();
}

function renderMultiSelect(id, category, defaultLabel, optionsArr) {
    let wrap = getEl(id);
    if (!wrap) return;
    let selected = activeFilters[category];
    let optionLabelMap = {};
    optionsArr.forEach(opt => { optionLabelMap[opt.val] = opt.label; });
    let displayText = getFilterSummaryText(category, selected, optionLabelMap, defaultLabel);
    let isActive = selected.length > 0;
    let semanticsText = `${getFilterCategoryLabel(category)} uses OR within this category and AND across categories.`;
    let displayHtml = `<div class="ms-display ${isActive ? 'is-active' : ''}" onclick="toggleDropdown('${id}', event)" title="${esc(semanticsText)}"><span>${esc(displayText)}</span><span style="font-size:8px;">▼</span></div>`;
    let optionsHtml = `<div class="ms-dropdown" onclick="event.stopPropagation()">`;
    optionsArr.forEach(opt => {
        let isSel = selected.includes(opt.val);
        let style = isSel ? 'background:rgba(59,130,246,0.1);color:#2563eb;font-weight:900;' : '';
        optionsHtml += `<div class="ms-opt" style="${style}" onclick="toggleFilterValue('${category}','${escJs(opt.val)}')">${esc(opt.label)}${isSel ? '<span style="margin-left:auto;">✓</span>' : ''}</div>`;
    });
    if (selected.length > 0) {
        optionsHtml += `<div class="ms-opt" style="margin-top:4px; border-top:1px solid var(--border); color:#ef4444; font-weight:900;" onclick="clearFilterCategory('${category}')">Clear ${esc(getFilterCategoryLabel(category))}</div>`;
    }
    optionsHtml += `</div>`;
    wrap.innerHTML = displayHtml + optionsHtml;
    wrap.classList.toggle('open', openDropdownId === id);
}

function toggleFilterValue(category, value) {
    if (activeFilters[category].includes(value)) {
        activeFilters[category] = activeFilters[category].filter(v => v !== value);
    } else {
        activeFilters[category].push(value);
    }
    applyFilters();
}

function cycleViewMode() {
    let idx = (_VIEW_MODES.indexOf(currentViewMode) + 1) % _VIEW_MODES.length;
    currentViewMode = _VIEW_MODES[idx];
    localStorage.setItem('queueViewMode', currentViewMode);
    applyViewMode();
    syncWorkspaceChrome();
    applyFilters();
}

function applyViewMode() {
    if (window.innerWidth <= 480 && currentViewMode === 'grid') {
        currentViewMode = 'inbox';
    }
    let list = getEl('inbox-list');
    let btn = getEl('view-toggle-btn');
    if (list) {
        list.classList.remove('dense-view');
        list.classList.toggle('grid-view', currentViewMode === 'grid');
        if (currentViewMode === 'list') list.classList.add('dense-view');
    }
    const icons = { inbox: '⊟', list: '☰', grid: '⊞' };
    const tips = { inbox: 'Switch to List', list: 'Switch to Grid', grid: 'Switch to Inbox' };
    if (btn) {
        btn.innerHTML = icons[currentViewMode];
        btn.setAttribute('data-tooltip', tips[currentViewMode]);
    }
}

function selectItemForNav(fdh) {
    let item = (allActionItems || []).find(i => i.fdh === fdh);
    if (item) {
        openPane(item, null);
        centerQueueCardByFdh(item.fdh, 'smooth');
    }
}

function getActiveQueueItems() {
    let reviewedFdhs = getReviewedFdhSet();
    return (allActionItems || []).filter(item => !reviewedFdhs.has(String(item.fdh || '')));
}

function renderList(items) {
    let list = getEl('inbox-list');
    if (!list) return;
    setTxt('inbox-count', items.length);
    
    let groupedSections = currentGroupBy !== 'none' ? getGroupedQueueSections(items) : [];
    let html = '';

    function getListCardHtml(item) {
        let rawFlags = (item.flags || "").split('\n').map(f => f.trim()).filter(f => f !== "");
        let highestSev = "info";
        let tagParts = [];
        let visibleTagLimit = isVendorTrackerLinked(item) ? 2 : 3;

        if (isVendorTrackerLinked(item)) {
            tagParts.push(renderTrackerPill(item, { inline: true, stopPropagation: 'event.stopPropagation()' }));
        }

        rawFlags.slice(0, visibleTagLimit).forEach(f => {
            let tagCls = getDiagnosticTagClass(f);
            if (tagCls === 'chip-admin' || tagCls === 'chip-warn') { if(highestSev!=="crit") highestSev = "warn"; }
            else if (tagCls === 'tag-red') highestSev = "crit";
            else if (tagCls === 'chip-ghost' && highestSev !== "crit" && highestSev !== "warn") highestSev = "ghost";
            tagParts.push(`<span class="tag ${tagCls}">${cleanDiagnosticFlagText(f)}</span>`);
        });
        if (rawFlags.length > visibleTagLimit) tagParts.push(`<span class="tag chip-muted">+${rawFlags.length - visibleTagLimit}</span>`);

        let isNotInQb = item.flags.includes("NOT IN QB REFERENCE") || item.flags.includes("MISSING QB STATUS");
        let combinedPill = isNotInQb ? "NOT IN QB REFERENCE" : `${item.stage || "-"} | ${item.status || "-"}`;
        if (item.flags.includes("MISSING QB STATUS") && !item.flags.includes("NOT IN QB REFERENCE")) combinedPill = "MISSING QB STATUS";

        let pillCls = getQBStatusClass(item.stage, item.status, isNotInQb);
        let isSelected = (currentActiveItem && currentActiveItem.fdh === item.fdh) ? 'selected' : '';
        let cityVendor = [item.city, item.vendor].filter(Boolean).join(' · ');

        // Note: Using onclick string instead of arrow function for batch performance
        return `
           <div class="email-card ${highestSev} ${isSelected}" id="card-${item.fdh}" data-fdh="${item.fdh}" onclick="handleCardClick('${item.fdh}')">
              <div class="em-header">
                 <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px; min-width: 0; flex: 1 1 auto;">
                     <div class="em-fdh" style="flex-shrink: 0;">${item.fdh}</div>
                     <div class="em-vendor" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${cityVendor || 'Unknown City \u00b7 Unknown Vendor'}</div>
                 </div>
                 <div class="em-pill-stack">
                     <span class="glass-pill ${pillCls}" style="flex-shrink: 0;">${combinedPill}</span>
                     <span class="em-chevron" aria-hidden="true">&#8250;</span>
                 </div>
              </div>
              <div class="em-tags">${tagParts.join('')}</div>
           </div>`;
    }

    function getGridCardHtml(item) {
        let pivot = getEl('sidebar-pivot-select')?.value || 'schedule';
        let today = new Date();
        today.setHours(0, 0, 0, 0);
        let isNotInQb = item.flags.includes("NOT IN QB REFERENCE") || item.flags.includes("MISSING QB STATUS");
        let combinedPill = isNotInQb ? "NOT IN QB REFERENCE" : `${item.stage || "-"} | ${item.status || "-"}`;
        let pillCls = getQBStatusClass(item.stage, item.status, isNotInQb);

        let pEnd = safeDate(item.cxEnd);
        let daysLeft = pEnd ? Math.ceil((pEnd - new Date()) / 86400000) : 0;
        let isComplete = (item.stage || "").toLowerCase().includes('ofs') || (item.status || "").toLowerCase().includes('complete');
        let isPermit = (item.stage || "").toLowerCase().includes('permit');
        let isOnHold = (item.status || "").toLowerCase().includes('hold');
        let isOverdue = pEnd && today > pEnd && !isComplete && !isOnHold && !isPermit;

        let bodyHtml = '';
        if (pivot === 'schedule') {
            let sColor = "#facc15";
            if (isComplete) sColor = "#22c55e";
            else if (isPermit) sColor = "#a855f7";
            else if (isOnHold) sColor = "#94a3b8";
            else if (isOverdue) sColor = "#ef4444";
            let pStart = safeDate(item.cxStart);
            let pct = 0;
            if (pStart && pEnd && pEnd - pStart > 0) pct = Math.max(0, Math.min(100, ((new Date() - pStart) / (pEnd - pStart)) * 100));
            let xingBadge = item.isXing ? `<div style="position:absolute; bottom:4px; right:4px; background:#171717; color:#facc15; padding:1px 6px; border-radius:4px; font-size:8px; font-weight:900; border:1px solid #facc15;">X-ING</div>` : '';
            bodyHtml = `
                <div class="qb-time-labels" style="margin-top:0; margin-bottom:4px;">
                    <span>START: <span style="color:var(--text-main);">${item.cxStart ? formatDate(item.cxStart) : 'TBD'}</span></span>
                    <span>END: <span style="color:var(--text-main);">${item.cxEnd ? formatDate(item.cxEnd) : 'TBD'}</span></span>
                </div>
                <div class="qb-time-bar" style="margin-bottom:12px;">
                    <div class="qb-time-fill" style="width:${pct}%; background:${sColor};"></div>
                    ${pct > 0 && pct < 100 ? `<div class="qb-time-bead" style="left:calc(${pct}% - 7px); border-color:${sColor}; display:block;"></div>` : ''}
                </div>
                <div class="qb-target-wrap ${item.isXing ? 'xing' : ''}" style="margin-top:auto;">
                    <div class="qb-target-inner" style="border-radius:${item.isXing ? '9px 9px 0 0' : '12px 12px 0 0'}; padding:8px 6px; position:relative;">
                        <div class="qb-target-label" style="font-size:9px;">Target Date</div>
                        <div class="qb-target-date" style="color:${sColor}; font-size:14px;">${item.targetDate ? formatDate(item.targetDate) : 'TBD'}</div>
                        ${xingBadge}
                    </div>
                </div>`;
        } else if (pivot === 'velocity') {
            let v = item.vel;
            let ofsMonthStr = "TBD";
            let isOFSMonth = false;
            let ofsDate = safeDate(item.ofsDate) || safeDate(item.targetDate);
            if (ofsDate && !isNaN(ofsDate.getTime())) {
                ofsMonthStr = ofsDate.toLocaleString('default', { month: 'short', timeZone: 'UTC' }).toUpperCase();
                if (ofsDate.getUTCMonth() === today.getMonth() && ofsDate.getUTCFullYear() === today.getFullYear()) isOFSMonth = true;
            }
            let ofsPillStyle = isOFSMonth ? 'color:#2563eb; background:rgba(239, 246, 255, 0.7); border-color:#2563eb;' : 'color:var(--text-main); background:var(--bg); border-color:var(--border);';
            if (v) {
                bodyHtml = `
                    <div class="velocity-grid" style="align-content:flex-start; gap:8px; margin-bottom:8px; flex-grow:0;">
                        ${buildVelocityBar('UG', v.ug.daily, v.ug.tot, v.ug.bom, 'UG', daysLeft)}
                        ${buildVelocityBar('Aerial', v.ae.daily, v.ae.tot, v.ae.bom, 'AE', daysLeft)}
                        ${buildVelocityBar('Fiber', v.fib.daily, v.fib.tot, v.fib.bom, 'FIB', daysLeft)}
                        ${buildVelocityBar('Splicing', v.nap.daily, v.nap.tot, v.nap.bom, 'NAP', daysLeft)}
                    </div>
                    <div class="qb-vel-footer" style="margin-top:auto; border-top:1px solid var(--border); padding-top:8px;">
                        <div style="font-size:9px; font-weight:900; color:var(--text-muted);">${daysLeft < 0 ? `OVERDUE BY: ${Math.abs(daysLeft)} DAYS` : `DAYS LEFT: ${daysLeft}`}</div>
                        <div style="display:flex; gap:6px;">
                            <div class="vel-footer-pill" style="font-size:8px; padding:2px 6px;">BSLS: ${item.bsls}</div>
                            <div class="vel-footer-pill" style="font-size:8px; padding:2px 6px; ${ofsPillStyle}">OFS: ${ofsMonthStr}</div>
                        </div>
                    </div>`;
            } else {
                bodyHtml = `<div style="font-style:italic; color:var(--text-muted); font-size:10px;">No velocity data</div>`;
            }
        }

        let isSelected = (currentActiveItem && currentActiveItem.fdh === item.fdh) ? 'is-selected' : '';
        return `
            <div class="grid-card ${isSelected}" id="queue-grid-card-${item.fdh}" data-fdh="${item.fdh}" onclick="handleCardClick('${item.fdh}')">
                <div class="grid-card-header" style="padding-bottom:6px;">
                    <div>
                        <div style="font-size:14px; font-weight:900; color:var(--text-main);">${item.fdh}</div>
                        <div style="font-size:9px; color:var(--text-muted); text-transform:uppercase;">${item.vendor}</div>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px;">
                        <span class="glass-pill ${pillCls}" style="font-size:8px; padding:2px 6px;">${combinedPill}</span>
                        ${renderTrackerPill(item, { inline: true, stopPropagation: 'event.stopPropagation()' })}
                    </div>
                </div>
                <div class="grid-card-body" style="gap:4px;">${bodyHtml}</div>
            </div>`;
    }

    if (groupedSections.length > 0) {
        groupedSections.forEach(section => {
            let collapsed = isQueueGroupCollapsed(section.key);
            html += `
                <div class="queue-group">
                    <div class="queue-group-header" onclick="toggleQueueGroupSection('${section.key}')">
                        <div class="queue-group-title">
                            <span class="queue-group-toggle">${collapsed ? '&#9656;' : '&#9662;'}</span>
                            <span>${esc(section.label)}</span>
                        </div>
                        <span class="queue-group-count">${section.items.length}</span>
                    </div>
                    <div class="queue-group-body ${collapsed ? 'collapsed' : ''}">
                        ${section.items.map(item => currentViewMode === 'grid' ? getGridCardHtml(item) : getListCardHtml(item)).join('')}
                    </div>
                </div>`;
        });
    } else {
        html = items.map(item => currentViewMode === 'grid' ? getGridCardHtml(item) : getListCardHtml(item)).join('');
    }

    list.innerHTML = html;

    if (items.length > 0 && !currentActiveItem && window.innerWidth > 480) {
        handleCardClick(items[0].fdh);
    }
}

// ── OPTIMIZED CLICK HANDLER ──
function handleCardClick(fdh) {
    let item = (allActionItems || []).find(i => String(i.fdh) === String(fdh));
    if (!item) return;
    let cardEl = getEl(`card-${fdh}`) || getEl(`queue-grid-card-${fdh}`);
    openPane(item, cardEl);
}

function renderDiagnosticStrip(rowArray) {
    let strip = getEl('raw-data-strip');
    if (!strip) return;
    if (!rowArray || !rowArray.length) {
        strip.innerHTML = '';
        syncRawDataStripState();
        return;
    }
    let html = `<table class="raw-table"><tr>`;
    rowArray.forEach(entry => {
        let safeH = (entry.h || '').replace(/"/g, '&quot;');
        html += `<th data-header="${safeH}">${entry.h || ''}</th>`;
    });
    html += `</tr><tr>`;
    rowArray.forEach(entry => {
        let safeH = (entry.h || '').replace(/"/g, '&quot;');
        let val = entry.v === null || entry.v === undefined ? '' : entry.v;
        if (String(val).includes('T') && !isNaN(Date.parse(val))) {
            val = formatDate(val);
        }
        html += `<td data-header="${safeH}">${val}</td>`;
    });
    html += `</tr></table>`;
    strip.innerHTML = html;
    syncRawDataStripState();
}

function generateSmartComment(item, daysLeft, isOverdue) {
    let st = (item.stage || "").toLowerCase();
    let stat = (item.status || "").toLowerCase();

    if (st.includes('ofs') || stat.includes('complete')) {
        return `Action: None. Project is ${item.status}.\nStatus: Tracking complete.`;
    }

    let parts = [];
    let cleanDraft = (item.draft || "").replace(/\n*\[CD Intelligence\]:\s*[\s\S]*$/, '').trim();
    if (cleanDraft !== "" && !cleanDraft.includes("No specific action") && !cleanDraft.includes("No Anomalies")) {
        parts.push(cleanDraft);
    }

    let v = item.vel;
    if (v) {
        let todayParts = [];
        if (v.ug.daily > 0) todayParts.push(`${v.ug.daily.toLocaleString()} ft UG`);
        if (v.ae.daily > 0) todayParts.push(`${v.ae.daily.toLocaleString()} ft Strand`);
        if (v.fib.daily > 0) todayParts.push(`${v.fib.daily.toLocaleString()} ft Fiber`);
        if (v.nap.daily > 0) todayParts.push(`${v.nap.daily} NAPs`);
        if (todayParts.length > 0) parts.push(`Vendor reported ${todayParts.join(', ')} today.`);

        let paceAlerts = [];
        [[v.ug, 'UG', 'ft', 450], [v.ae, 'Strand', 'ft', 5000], [v.nap, 'NAPs', '', 5]].forEach(([vel, label, unit, thresh]) => {
            if (!vel || vel.bom <= 0 || vel.tot >= vel.bom) return;
            let pct = Math.round((vel.tot / vel.bom) * 100);
            let remaining = vel.bom - vel.tot;
            let pace = daysLeft > 0 ? Math.round(remaining / daysLeft) : 0;
            let paceStr = unit ? `${pace.toLocaleString()} ${unit}/day` : `${pace}/day`;
            if (pace > thresh) paceAlerts.push(`${label} pace required ${paceStr} — above threshold.`);
            else if (pct > 0) parts.push(`${label}: ${pct}% complete (${vel.tot.toLocaleString()} / ${vel.bom.toLocaleString()}${unit ? ' ' + unit : ''}).`);
        });
        paceAlerts.forEach(a => parts.push(a));
    }

    if (isOverdue) parts.push(`Project is OVERDUE by ${Math.abs(daysLeft)} days.`);
    else if (daysLeft >= 0 && daysLeft <= 7) parts.push(`Closing in ${daysLeft} day${daysLeft === 1 ? '' : 's'} — needs immediate attention.`);

    let f = item.flags || "";
    if (f.includes("ADMIN: CHECK CROSSINGS")) parts.push("Crossing check required before proceeding.");
    if (f.includes("LIGHTING RISK")) parts.push("Pending light to cabinets is a delivery risk.");
    if (f.includes("POSSIBLE REROUTE")) parts.push("Possible reroute detected — confirm scope with vendor.");
    if (f.includes("NOT IN QB REFERENCE")) parts.push("Project missing from Reference Data export. Verify it exists in QuickBase.");

    if (parts.length === 0) parts.push("No anomalies detected. Monitor progress.");

    let actionText = parts.join(' ');
    let statusText = item.vendorComment ? `Vendor states: "${item.vendorComment}"` : "Awaiting vendor updates.";
    return `Action: ${actionText}\nStatus: ${statusText}`;
}

function buildVelocityBar(name, daily, tot, bom, typeKey, daysLeft) {
    let dailyVal = daily || 0;
    let rawTot = tot || 0;
    let bomVal = bom || 0;
    let totalVal = Math.max(rawTot, dailyVal);

    if (bomVal === 0 && totalVal === 0 && dailyVal === 0) return '';
    if (bomVal === 0 && totalVal > 0) bomVal = totalVal;

    let totalPct = bomVal > 0 ? Math.min(100, (totalVal / bomVal) * 100) : 0;
    let isDone = totalPct >= 100;
    let colorDef = QB_STYLES[typeKey] || QB_STYLES["AE"];
    let textCol = isDone ? QB_STYLES["DONE"].color : colorDef.color;

    let bgStyle = isDone ? "#22c55e" : colorDef.bg;
    if (!isDone) {
        if (typeKey === 'AE') bgStyle = "var(--qb-ae-bg)";
        else if (typeKey === 'FIB') bgStyle = "var(--qb-fib-bg)";
        else if (typeKey === 'NAP') bgStyle = "var(--qb-nap-bg)";
    }

    let beadBorder = isDone ? QB_STYLES["DONE"].border : colorDef.border;
    let beadShadow = "0 2px 4px rgba(0,0,0,0.2)";
    if (typeKey === 'FIB' && !isDone) beadShadow = `0 0 10px ${beadBorder}`;
    if (typeKey === 'NAP' && !isDone) beadShadow = `0 0 8px rgba(99, 102, 241, 0.6)`;

    let paceDays = Math.max(1, daysLeft);
    let paceVal = Math.max(0, bomVal - totalVal) / paceDays;
    let paceColor = "var(--text-muted)";

    if (!isDone && bomVal > 0) {
        if (typeKey === 'UG' && paceVal > 450) paceColor = "#ef4444";
        else if (typeKey === 'AE' && paceVal > 5000) paceColor = "#ef4444";
        else if (typeKey === 'NAP' && paceVal > 5) paceColor = "#ef4444";
        else paceColor = textCol;
    }

    let paceUnit = typeKey === 'NAP' ? 'NAPs/day' : 'ft/day';
    let formattedPace = typeKey === 'NAP' ? Math.ceil(paceVal) : Math.round(paceVal);
    let dailyLabel = typeKey === 'NAP'
        ? 'Daily NAPs/Encl. Completed'
        : `Daily ${typeKey === 'UG' ? 'UG' : typeKey === 'AE' ? 'Strand' : 'Fiber'} Footage`;
    let dailyBadge = dailyVal > 0 ? `<span style="background:#dcfce7; color:#166534; padding:2px 6px; border-radius:4px; font-size:8px; border:1px solid #bbf7d0; display:inline-flex; align-items:center; line-height:1; white-space:nowrap; cursor:pointer;" onmouseenter="hl('${dailyLabel}')" onmouseleave="hl('')">+${dailyVal.toLocaleString()} TODAY</span>` : '';

    let starStr = isDone ? `<span class="has-tooltip" data-tooltip="${name} 100% Complete" style="color:var(--starGold); margin-left:4px; font-size:12px; line-height:1;">★</span>` : '';
    let barTrackBg = (typeKey === 'FIB' || typeKey === 'NAP') ? 'var(--border)' : 'var(--bg)';
    let beadHtml = '';
    if (!isDone && totalPct > 0) beadHtml = `<div class="qb-vel-bead" style="left: calc(${totalPct}% - 7px); border-color: ${beadBorder}; box-shadow: ${beadShadow};"></div>`;

    let colMap = {
        'UG': { tot: 'Total UG Footage Completed', bom: 'UG BOM Quantity' },
        'AE': { tot: 'Total Strand Footage Complete?', bom: 'Strand BOM Quantity' },
        'FIB': { tot: 'Total Fiber Footage Complete', bom: 'Fiber BOM Quantity' },
        'NAP': { tot: 'Total NAPs Completed', bom: 'NAP/Encl. BOM Qty.' }
    };
    let cols = colMap[typeKey] || { tot: '', bom: '' };

    return `
    <div class="qb-vel-item">
        <div class="qb-vel-labels" style="display:flex; justify-content:space-between; align-items:flex-end; gap:8px; margin-bottom:4px;">
            <div style="display:flex; align-items:center; flex-wrap:nowrap; gap:6px;">
                <span style="font-size:10px; font-weight:bold; color:var(--text-main);">${name}:</span>
                <span style="color:${textCol}; font-family:monospace; font-size:10px; font-weight:bold; cursor:pointer;" onmouseenter="hl('${cols.tot}')" onmouseleave="hl('')">${totalVal.toLocaleString()}</span>
                <span style="color:var(--text-muted); font-size:10px;">/</span>
                <span style="color:${textCol}; font-family:monospace; font-size:10px; font-weight:bold; cursor:pointer;" onmouseenter="hl('${cols.bom}')" onmouseleave="hl('')">${bomVal.toLocaleString()}</span>
                ${dailyBadge}
            </div>
            <div style="color:${textCol}; font-family:monospace; font-size:10px; font-weight:900; white-space:nowrap; flex-shrink:0;">${Math.round(totalPct)}% ${starStr}</div>
        </div>
        <div class="qb-vel-bar" style="background:${barTrackBg}; overflow:visible;"><div class="qb-vel-fill" style="width:${totalPct}%; background:${bgStyle};"></div>${beadHtml}</div>
        <div style="font-size:9px; color:${paceColor}; font-weight:800; margin-top:2px;">PACE: ${formattedPace.toLocaleString()} ${paceUnit}</div>
    </div>`;
}

function openPane(item, cardEl) {

        let isOnHold = stat.includes('hold') || stat.includes('assign');

        let hasEnd = item.cxEnd && item.cxEnd !== "";
        let isOverdue = false;

            let end = safeDate(item.cxEnd);

            today.setHours(0, 0, 0, 0);
            if (end && today > end && !isOFS && !isComplete && !isOnHold && !isPermit) isOverdue = true;
        }

        let unifiedCard = getEl('main-qb-grid');

            else if (isPermit) unifiedCard.classList.add('glow-permit');
            else if (isOverdue) unifiedCard.classList.add('glow-overdue');
            else unifiedCard.classList.add('glow-active');
        }

        let isMuted = isComplete || isOFS || isPermit;

        let velocityModule = getEl('velocity-production-card');
        if (scheduleModule) {

        let scheduleTodayLabel = getEl('p-today-label');
        let daysLeft = 0;

        if (hasStart && hasEnd && pStart && pEnd && scheduleFill) {

            if (pct >= 0 && pct <= 100) return `<div class="proj-bead has-tooltip" data-tooltip="${title}" style="left:${pct}%; background:${bgColor}; border-color:${borderColor}; color:${borderColor};">${icon}</div>`;

        let projBeadHtml = '';

        if (pStart && pEnd && (pEnd - pStart > 0)) {

            let cabMatch = benchStr.match(/Cab:\s*([\d/]+)/);

                                let sCol = QB_STYLES[phase] ? QB_STYLES[phase].border : "#94a3b8";
                                let sShadow = "0 1px 3px rgba(0,0,0,0.3)";
                                if (phase === 'FIB') sShadow = `0 0 10px ${sCol}`;
                                if (phase === 'NAP') sShadow = `0 0 8px rgba(99, 102, 241, 0.6)`;
                                projBeadHtml += `<div class="proj-bead has-tooltip" data-tooltip="${phase} 100% Complete (${dateExtract[1]})" style="left:${starPct}%; background:rgba(255,255,255,0.85); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); border-color:${sCol}; color:${sCol}; box-shadow:${sShadow}; font-size:9px;">★</div>`;
                            }
                        }
                    }
                });
            }
        }
        setHtml('p-time-stars', projBeadHtml);

        let targetWrap = getEl('p-target-wrap');

        setStyle('p-target', 'color', statusColor);

        if (item.isXing && targetWrap && targetInner) {

                  <div style='display: flex; flex-wrap: wrap; gap: 4px;'>

                    <div style="font-size:9px; font-weight:900; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase;">Special X-ings Data</div>

        setHtml('p-light-pill', lightHtml);

                let today = new Date();
                if (d.getUTCMonth() === today.getMonth() && d.getUTCFullYear() === today.getFullYear()) {
                    isOFSMonth = true;
                }
            }
        }

        setTxt('p-days-left', daysLeft < 0 ? `OVERDUE BY: ${Math.abs(daysLeft)} DAYS` : `DAYS LEFT: ${daysLeft}`);
        setTxt('p-bsls', `BSLS: ${item.bsls}`);
        let pOfs = getEl('p-ofs');

            if (isOFSMonth) {
                pOfs.style.color = '#2563eb';
                pOfs.style.background = 'rgba(239, 246, 255, 0.7)';
                pOfs.style.borderColor = '#2563eb';
            } else {
                pOfs.style.color = 'var(--text-main)';
                pOfs.style.background = 'var(--bg)';
                pOfs.style.borderColor = 'var(--border)';
            }
        }

        let chkMatch = (item.gaps || "").match(/\[Chk:\s*([^\]]+)\]/);
        let lastCheckedStr = chkMatch ? chkMatch[1] : "NEVER";
        let d = new Date();
        let dateStr = (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear().toString().slice(-2);

        setTxt('p-date', `REPORT DATE: ${item.reportDate ? formatDate(item.reportDate) : dateStr}`);
        setTxt('p-last-check', `LAST CHECKED: ${lastCheckedStr === 'NEVER' ? 'NEVER' : formatDate(lastCheckedStr)}`);
        updateRefDataIndicator();

        let smartNote = item.geminiInsight ? item.geminiInsight : generateSmartComment(item, daysLeft, isOverdue);
        let pComment = getEl('p-comment');
        if (pComment) {
            pComment.value = item.comment || smartNote;
            pComment.dataset.generated = item.comment ? 'false' : 'true';
        }

        let pGeminiDate = getEl('p-gemini-date');
        if (pGeminiDate) {
            pGeminiDate.innerText = item.geminiDate ? `Drafted: ${formatDate(item.geminiDate)}` : "";
        }

        let ganttArea = currentWorkspaceView === 'gantt' ? getEl('gantt-area-main') : null;
        if (ganttArea) {
            ganttArea.classList.add('has-focus');
            document.querySelectorAll('.gantt-row').forEach(r => r.classList.remove('is-active'));
            syncGanttIslandState();
            let gRow = getEl(`gantt-row-${item.fdh}`);
            if (gRow) {
                gRow.classList.add('is-active');
                let scrollContainer = getEl('gantt-scroll');
                if (scrollContainer) {
                    let rowTop = gRow.offsetTop;
                    let containerHalfH = scrollContainer.clientHeight / 2;
                    let rowHalfH = gRow.clientHeight / 2;
                    let scrollTopTarget = rowTop - containerHalfH + rowHalfH;
                    let scrollLeftTarget = scrollContainer.scrollLeft;
                    let todayLine = ganttArea.querySelector('.gantt-today-line');
                    if (todayLine) {
                        let leftPct = parseFloat(todayLine.style.left);
                        let chartWidth = ganttArea.querySelector('.gantt-grid-container').offsetWidth;
                        let barOffset = chartWidth * (leftPct / 100) + 140;
                        scrollLeftTarget = Math.max(0, barOffset - (scrollContainer.clientWidth / 2));
                    }
                    scrollContainer.scrollTo({ top: scrollTopTarget, left: scrollLeftTarget, behavior: 'smooth' });
                }
            }
            let exitBtn = getEl('btn-exit-theater');
            if (exitBtn) exitBtn.style.display = 'inline-flex';
        }

        if (currentWorkspaceView === 'detail' && isDeckMode) {
            renderDeckStage();
        }
    });
}

// BOOTSTRAP ANCHOR: recomputes filteredItems, queue selection, admin, digest, grid, gantt, HUDs, and badges from shared state
function applyFilters() {
    safeExecute('applyFilters', () => {
        const sortVal = getActiveSortValue();
        const desktopSearchValue = getEl('search-input')?.value || '';
        const mobileSearchValue = getEl('m-sf-search-input')?.value || '';
        const searchTerm = (desktopSearchValue || mobileSearchValue).toLowerCase();
        const activeQueueItems = getActiveQueueItems();
        let searchEl = getEl('search-input');
        if (searchEl) searchEl.classList.toggle('is-active', searchEl.value.trim() !== '');
        let mobileSearchEl = getEl('m-sf-search-input');
        if (mobileSearchEl) mobileSearchEl.classList.toggle('is-active', mobileSearchEl.value.trim() !== '');

        let today = new Date();
        today.setHours(0, 0, 0, 0);

        let filterMatch = (item, skipCategory) => {
            let ofsBuckets = getOfsFilterBuckets(item, today);
            let mSev = skipCategory === 'sev' || activeFilters.sev.length === 0 || activeFilters.sev.includes(getSeverity(item.flags));
            let mVen = skipCategory === 'vendor' || activeFilters.vendor.length === 0 || activeFilters.vendor.includes(item.vendor);
            let mCit = skipCategory === 'city' || activeFilters.city.length === 0 || activeFilters.city.includes(item.city);
            let mOfs = skipCategory === 'ofs' || activeFilters.ofs.length === 0 || activeFilters.ofs.some(v => ofsBuckets.includes(v));
            let mStatus = skipCategory === 'status' || activeFilters.status.length === 0 || activeFilters.status.includes(item.status || '');
            let mSearch = itemMatchesSearch(item, searchTerm);
            return mSev && mVen && mCit && mOfs && mStatus && mSearch;
        };

        let validSev = [...new Set(activeQueueItems.filter(i => filterMatch(i, 'sev')).map(i => getSeverity(i.flags)))];
        let validVen = [...new Set(activeQueueItems.filter(i => filterMatch(i, 'vendor')).map(i => i.vendor).filter(Boolean))].sort();
        let validCit = [...new Set(activeQueueItems.filter(i => filterMatch(i, 'city')).map(i => i.city).filter(Boolean))].sort();
        let validStatus = [...new Set(activeQueueItems.filter(i => filterMatch(i, 'status')).map(i => i.status).filter(Boolean))].sort();
        let validOfsSet = new Set();
        activeQueueItems.filter(i => filterMatch(i, 'ofs')).forEach(i => {
            getOfsFilterBuckets(i, today).forEach(bucket => validOfsSet.add(bucket));
        });
        let validOfsMonths = [...validOfsSet].filter(v => v !== '60_DAYS' && v !== '90_DAYS').sort();
        let validOfs = [];
        if (validOfsSet.has('60_DAYS')) validOfs.push('60_DAYS');
        if (validOfsSet.has('90_DAYS')) validOfs.push('90_DAYS');
        validOfs.push(...validOfsMonths);

        activeFilters.sev = activeFilters.sev.filter(v => validSev.includes(v));
        activeFilters.vendor = activeFilters.vendor.filter(v => validVen.includes(v));
        activeFilters.city = activeFilters.city.filter(v => validCit.includes(v));
        activeFilters.ofs = activeFilters.ofs.filter(v => validOfs.includes(v));
        activeFilters.status = activeFilters.status.filter(v => validStatus.includes(v));

        let sevOpts = [
            { val: 'crit', label: 'Critical' },
            { val: 'warn', label: 'Warnings' },
            { val: 'info', label: 'Clear' }
        ].filter(o => validSev.includes(o.val));
        let ofsOpts = validOfs.map(v => ({
            val: v,
            label: v === '60_DAYS' ? '< 60 Days' : v === '90_DAYS' ? '< 90 Days' : v
        }));

        const MS_MAP = [
            ['wrap-filter-severity', 'm-sf-wrap-severity', 'sev', 'All Health', sevOpts],
            ['wrap-filter-vendor', 'm-sf-wrap-vendor', 'vendor', 'All Vendors', validVen.map(v => ({ val: v, label: v }))],
            ['wrap-filter-city', 'm-sf-wrap-city', 'city', 'All Cities', validCit.map(v => ({ val: v, label: v }))],
            ['wrap-filter-ofs', 'm-sf-wrap-ofs', 'ofs', 'All OFS Dates', ofsOpts],
            ['wrap-filter-status', 'm-sf-wrap-status', 'status', 'All Statuses', validStatus.map(v => ({ val: v, label: v }))]
        ];

        MS_MAP.forEach(cfg => {
            renderMultiSelect(cfg[0], cfg[2], cfg[3], cfg[4]);
            renderMultiSelect(cfg[1], cfg[2], cfg[3], cfg[4]);
        });

        if (typeof syncMobileSFFilterChips === 'function') syncMobileSFFilterChips();

        // Base filter: vendor/city/OFS/severity/search — NO admin filter
        // Used for badge counts so Crossings & QB Status always show correct totals
        let baseFiltered = activeQueueItems.filter(i => {
            let ofsBuckets = getOfsFilterBuckets(i, today);
            let mSev = activeFilters.sev.length === 0 || activeFilters.sev.includes(getSeverity(i.flags));
            let mVen = activeFilters.vendor.length === 0 || activeFilters.vendor.includes(i.vendor);
            let mCit = activeFilters.city.length === 0 || activeFilters.city.includes(i.city);
            let mOfs = activeFilters.ofs.length === 0 || activeFilters.ofs.some(v => ofsBuckets.includes(v));
            let mStatus = activeFilters.status.length === 0 || activeFilters.status.includes(i.status || '');
            let mSearch = itemMatchesSearch(i, searchTerm);
            return mSev && mVen && mCit && mOfs && mStatus && mSearch;
        });
        setTxt('kpi-crossings-val', baseFiltered.filter(i => i.flags.includes("ADMIN: CHECK CROSSINGS")).length);
        setTxt('kpi-status-val', baseFiltered.filter(i => i.flags.includes("STATUS MISMATCH") || i.flags.includes("MISSING QB STATUS")).length);

        // Apply admin filter on top for the actual queue list
        let filtered = baseFiltered.filter(i => {
            if (activeAdminFilter === 'crossings') return i.flags.includes("ADMIN: CHECK CROSSINGS");
            if (activeAdminFilter === 'status') return i.flags.includes("STATUS MISMATCH") || i.flags.includes("MISSING QB STATUS");
            return true;
        });
        currentCriticalHubItems = filtered.filter(i => getSeverity(i.flags) === 'crit');
        acknowledgedCriticalFdhs = acknowledgedCriticalFdhs.filter(fdh => currentCriticalHubItems.some(item => String(item.fdh || '') === String(fdh || '')));

        let activeProjCount = 0;
        let pendingProjCount = 0;
        let overdueProjCount = 0;
        let activeBslsCount = 0;
        let activeCritCount = 0;
        currentFilterStats.bslByVendor = {};
        currentFilterStats.bslByMonth = {};
        currentFilterStats.bslMatrix = {};
        currentFilterStats.lifecycle = { active: 0, pending: 0, overdue: 0 };
        currentFilterStats.stageCounts = {};
        currentFilterStats.pieCounts = {};

        filtered.forEach(item => {
            let start = safeDate(item.cxStart) || safeDate(item.reportDate) || new Date(today);
            let end = safeDate(item.cxEnd) || safeDate(item.targetDate) || new Date(start.getTime() + 86400000 * 30);
            if (isNaN(start)) start = new Date(today);
            if (isNaN(end)) end = new Date(start.getTime() + 86400000 * 7);
            if (end < start) end = new Date(start.getTime() + 86400000);

            let isComplete = (item.stage || "").toLowerCase().includes('ofs') || (item.status || "").toLowerCase().includes('complete');
            let isOnHold = (item.status || "").toLowerCase().includes('hold');

            let stageName = item.stage || 'Unknown';
            currentFilterStats.stageCounts[stageName] = (currentFilterStats.stageCounts[stageName] || 0) + 1;

            let pieSliceName = getProjectsPieSliceLabel(item);
            currentFilterStats.pieCounts[pieSliceName] = (currentFilterStats.pieCounts[pieSliceName] || 0) + 1;

            let bslStr = String(item.bsls).replace(/,/g, '');
            let bslNum = parseInt(bslStr, 10) || 0;
            activeBslsCount += bslNum;
            if (getSeverity(item.flags) === 'crit') activeCritCount++;

            let v = item.vendor || "Unknown";
            currentFilterStats.bslByVendor[v] = (currentFilterStats.bslByVendor[v] || 0) + bslNum;

            let ofsD = safeDate(item.ofsDate) || safeDate(item.targetDate);
            let mKey = (ofsD && !isNaN(ofsD.getTime()))
                ? ofsD.toLocaleString('default', { month: 'short', timeZone: 'UTC' }).toUpperCase()
                : 'TBD';
            currentFilterStats.bslByMonth[mKey] = (currentFilterStats.bslByMonth[mKey] || 0) + bslNum;
            if (!currentFilterStats.bslMatrix[v]) currentFilterStats.bslMatrix[v] = {};
            currentFilterStats.bslMatrix[v][mKey] = (currentFilterStats.bslMatrix[v][mKey] || 0) + bslNum;

            if (!isComplete && !isOnHold) {
                if (today < start) {
                    pendingProjCount++;
                    currentFilterStats.lifecycle.pending++;
                } else if (today > end) {
                    overdueProjCount++;
                    currentFilterStats.lifecycle.overdue++;
                } else {
                    activeProjCount++;
                    currentFilterStats.lifecycle.active++;
                }
            }
        });

        let displayFiltered = activePieStageFilter
            ? filtered.filter(i => getProjectsPieSliceLabel(i) === activePieStageFilter)
            : filtered.slice();

        setTxt('kpi-total-proj', displayFiltered.length);
        setTxt('kpi-active-bsls', activeBslsCount.toLocaleString());
        setTxt('kpi-active-crit', activeCritCount);

        let sortedStageKeys = Object.keys(currentFilterStats.stageCounts).sort((a, b) => currentFilterStats.stageCounts[b] - currentFilterStats.stageCounts[a]);
        let top2Stages = sortedStageKeys.slice(0, 2);
        let stageHtml = top2Stages.map(s => `<span class="kpi-expand-token">${currentFilterStats.stageCounts[s]} ${esc(s)}</span>`).join('<span class="kpi-expand-sep">•</span>');
        setHtml('kpi-projects-breakdown', stageHtml || `<span>No stages</span>`);

        let sortedMonths = Object.keys(currentFilterStats.bslByMonth)
            .sort((a, b) => currentFilterStats.bslByMonth[b] - currentFilterStats.bslByMonth[a])
            .slice(0, 2);
        let bslMonthHtml = sortedMonths
            .map(m => `<span class="kpi-expand-token">${esc(m)} ${currentFilterStats.bslByMonth[m].toLocaleString()}</span>`)
            .join('<span class="kpi-expand-sep">•</span>');
        setHtml('kpi-bsls-breakdown', bslMonthHtml || `<span>No dates</span>`);

        if (bslsHudLocked) {
            let pill = getEl('nav-bsls-pill');
            if (!renderBslsHUD()) {
                bslsHudLocked = false;
                if (pill) pill.classList.remove('is-locked');
            }
        }
        if (projectsHudLocked) {
            let pill = getEl('nav-projects-pill');
            if (!renderProjectsHUD()) {
                projectsHudLocked = false;
                if (pill) pill.classList.remove('is-locked');
            }
        }

        if (sortVal !== 'default') {
            displayFiltered.sort((a, b) => {
                if (sortVal === 'admin') {
                    let aAdmin = (a.flags.includes("ADMIN: CHECK CROSSINGS") || a.flags.includes("STATUS MISMATCH") || a.flags.includes("ADMIN: REFRESH REF DATA") || a.flags.includes("MISSING QB STATUS")) ? 0 : 1;
                    let bAdmin = (b.flags.includes("ADMIN: CHECK CROSSINGS") || b.flags.includes("STATUS MISMATCH") || b.flags.includes("ADMIN: REFRESH REF DATA") || b.flags.includes("MISSING QB STATUS")) ? 0 : 1;
                    if (aAdmin !== bAdmin) return aAdmin - bAdmin;
                    return a.rowNum - b.rowNum;
                }
                let valA;
                let valB;
                if (sortVal === 'target') {
                    valA = new Date(a.targetDate);
                    valB = new Date(b.targetDate);
                } else if (sortVal === 'start') {
                    valA = new Date(a.cxStart);
                    valB = new Date(b.cxStart);
                } else if (sortVal === 'end') {
                    valA = new Date(a.cxEnd);
                    valB = new Date(b.cxEnd);
                } else if (sortVal === 'ofs') {
                    valA = new Date(a.ofsDate);
                    valB = new Date(b.ofsDate);
                } else if (sortVal === 'report') {
                    valA = new Date(a.reportDate);
                    valB = new Date(b.reportDate);
                }
                let isInvA = isNaN(valA);
                let isInvB = isNaN(valB);
                if (isInvA && isInvB) return a.rowNum - b.rowNum;
                if (isInvA) return 1;
                if (isInvB) return -1;
                return valA - valB;
            });
        } else {
            displayFiltered.sort((a, b) => a.rowNum - b.rowNum);
        }

        if (currentGroupBy !== 'none') {
            displayFiltered = flattenGroupedSections(getGroupedQueueSections(displayFiltered));
        }

        let anyActive = activeFilters.sev.length > 0 || activeFilters.vendor.length > 0 || activeFilters.city.length > 0 || activeFilters.ofs.length > 0 || activeFilters.status.length > 0 || searchTerm !== '' || activeAdminFilter !== null || activePieStageFilter !== null;
        let clearBtn = getEl('btn-clear-filters');
        let clearZone = getEl('dock-clear-zone');
        if (clearBtn) clearBtn.classList.toggle('collapsed', !anyActive);
        if (clearZone) clearZone.classList.toggle('collapsed', !anyActive);
        let filtersBtn = getEl('btn-filters');
        if (filtersBtn) filtersBtn.classList.toggle('btn-filters-active', anyActive || !(getEl('filter-strip')?.classList.contains('hidden')));
        let groupSelect = getEl('group-by-select');
        if (groupSelect) {
            groupSelect.value = currentGroupBy;
            groupSelect.classList.toggle('is-active', currentGroupBy !== 'none');
        }
        if (typeof syncDesktopFiltersLauncherState === 'function') syncDesktopFiltersLauncherState();
        if (typeof syncUnifiedFabState === 'function') syncUnifiedFabState();
        filteredItems = displayFiltered;
        if (typeof syncMobileDockContext === 'function') syncMobileDockContext();
        ganttNeedsRender = true;
        if (currentWorkspaceView === 'gantt' && !ganttFocusedFdh && ganttHasVisited) captureGanttScrollState();
        renderList(displayFiltered);
        renderAdminPane(activeQueueItems);
        if (currentWorkspaceView === 'grid') renderGrid();
        if (isDeckMode) {
            renderGrid();
            renderDeckStage();
        }
        if (currentWorkspaceView === 'gantt') ensureGanttRendered({ focusFdh: ganttFocusedFdh, defer: false, immediate: true });
        renderActiveFilterPills();
        if (getEl('critical-hub-overlay')?.classList.contains('open')) renderCriticalHub();
    });
}

function clearAllFilters() {
    let s = getEl('search-input');
    let ms = getEl('m-sf-search-input');
    if (s) s.value = '';
    if (ms) ms.value = '';
    activeFilters = { sev: [], vendor: [], city: [], ofs: [], status: [] };
    activeAdminFilter = null;
    activePieStageFilter = null;
    if (openDropdownId) {
        let el = getEl(openDropdownId);
        if (el) el.classList.remove('open');
        openDropdownId = null;
    }
    applyFilters();
    hidePieHUD('projects');
    hidePieHUD('bsls');
    let clearBtn = getEl('btn-clear-filters');
    let clearZone = getEl('dock-clear-zone');
    if (clearBtn) clearBtn.classList.add('collapsed');
    if (clearZone) clearZone.classList.add('collapsed');
    let strip = getEl('filter-strip');
    let btn = getEl('btn-filters');
    if (strip && !strip.classList.contains('hidden')) {
        strip.classList.add('hidden');
        if (btn) btn.classList.remove('btn-filters-active');
    }
    if (typeof syncDesktopFiltersLauncherState === 'function') syncDesktopFiltersLauncherState();
}

// ── FILTER / DROPDOWN / PILL BEHAVIOR ──
function getStageColor(stage) {
    let sLower = (stage || "").toLowerCase();
    if (sLower.includes('permit')) return '#a855f7';
    if (sLower.includes('field cx') || sLower.includes('active') || sLower.includes('progress')) return '#facc15';
    if (sLower.includes('complete')) return '#22c55e';
    if (sLower.includes('ofs')) return '#3b82f6';
    if (sLower.includes('hold')) return '#64748b';
    if (sLower.includes('pending') || sLower.includes('assignment')) return '#f97316';
    return '#94a3b8';
}

function togglePieStageFilter(stage) {
    activePieStageFilter = (activePieStageFilter === stage) ? null : stage;
    applyFilters();
    let hud = getEl('projects-pie-hud');
    if (hud && hud.style.display !== 'none') renderProjectsHUD();
}

function toggleDropdown(id, event) {
    if (event) event.stopPropagation();
    if (openDropdownId && openDropdownId !== id) {
        let oldEl = getEl(openDropdownId);
        if (oldEl) oldEl.classList.remove('open');
    }
    let el = getEl(id);
    if (el) {
        el.classList.toggle('open');
        openDropdownId = el.classList.contains('open') ? id : null;
    }
}

function toggleNavFab() {
    let dropdown = document.getElementById('nav-fab-dropdown');
    if (!dropdown) return;
    dropdown.classList.toggle('open');
}

function getProjectsHudFilterEntries() {
    let entries = [];
    ['sev', 'vendor', 'city', 'ofs', 'status'].forEach(function(category) {
        (activeFilters[category] || []).forEach(function(value) {
            entries.push({
                category: category,
                categoryLabel: getFilterCategoryLabel(category),
                value: value,
                label: getFilterValueLabel(category, value)
            });
        });
    });
    if (activePieStageFilter) {
        entries.push({
            category: 'stage',
            categoryLabel: 'Stage',
            value: activePieStageFilter,
            label: activePieStageFilter,
            color: getStageColor(activePieStageFilter)
        });
    }
    return entries;
}

function getOfsFilterBuckets(item, today) {
    let buckets = [];
    if (!item) return buckets;
    let rawOfs = item.ofsDate;
    let rawFallback = item.targetDate;
    let d = safeDate(rawOfs) || safeDate(rawFallback);
    if (!d || isNaN(d.getTime())) return buckets;
    buckets.push(d.toLocaleString('default', { month: 'short', timeZone: 'UTC' }).toUpperCase());
    let diffDays = (d - today) / 86400000;
    if (diffDays >= 0 && diffDays <= 90) buckets.push('90_DAYS');
    if (diffDays >= 0 && diffDays <= 60) buckets.push('60_DAYS');
    return buckets;
}

function itemMatchesSearch(item, searchTerm) {
    return searchTerm === '' ||
        item.fdh.toLowerCase().includes(searchTerm) ||
        (item.city && item.city.toLowerCase().includes(searchTerm)) ||
        (item.vendor && item.vendor.toLowerCase().includes(searchTerm));
}

function getProjectsPieSliceLabel(item) {
    let stageName = item.stage || "Unknown";
    let statusName = item.status || "Unknown";
    let sLower = stageName.toLowerCase();
    if (sLower.includes('field cx')) return `${stageName} | ${statusName}`;
    if (sLower.includes('ofs')) return 'OFS';
    if (sLower.includes('permit')) return 'Permitting';
    return stageName;
}

function renderActiveFilterPills() {
    const container = getEl('active-filter-pills');
    if (!container) return;
    container.innerHTML = '';
    const categories = { sev: 'Health', vendor: 'Vendor', city: 'City', ofs: 'OFS', status: 'Status', user: 'User' };
    Object.keys(activeFilters).forEach(cat => {
        activeFilters[cat].forEach(val => {
            const pill = document.createElement('div');
            pill.className = 'filter-pill';
            let label = val;
            if (val === '60_DAYS') label = '< 60 Days';
            if (val === '90_DAYS') label = '< 90 Days';
            pill.innerHTML = `
                <span style="color:var(--text-muted); opacity: 0.7; font-size: 7px;">${categories[cat] || cat}</span>
                <span style="font-weight: 900;">${esc(label)}</span>
                <div class="remove-btn" onclick="toggleFilterValue('${cat}', '${escJs(val)}')">✕</div>
            `;
            container.appendChild(pill);
        });
    });
    if (activePieStageFilter) {
        const pill = document.createElement('div');
        pill.className = 'filter-pill';
        const color = getStageColor(activePieStageFilter);
        pill.style.borderLeft = `3px solid ${color}`;
        pill.innerHTML = `
            <span style="color:var(--text-muted); opacity: 0.7; font-size: 7px;">Stage</span>
            <span style="color:${color}; font-weight: 900;">${esc(activePieStageFilter)}</span>
            <div class="remove-btn" onclick="togglePieStageFilter(null)">✕</div>
        `;
        container.appendChild(pill);
    }
    if (currentGroupBy && currentGroupBy !== 'none') {
        const pill = document.createElement('div');
        pill.className = 'filter-pill';
        pill.innerHTML = `
            <span style="color:var(--text-muted); opacity: 0.7; font-size: 7px;">Group by</span>
            <span style="font-weight: 900;">${esc(getGroupByLabel(currentGroupBy))}</span>
            <div class="remove-btn" onclick="setGroupBy('none')">✕</div>
        `;
        container.appendChild(pill);
    }
    updateFloatingPillsPosition();
}

function getGroupByLabel(value) {
    let labels = {
        vendor: 'Vendor',
        city: 'City',
        health: 'Health',
        stage: 'Stage',
        status: 'Status'
    };
    return labels[value] || 'Group By';
}

function populateDropdown(id, values) {
    let el = getEl(id); if (!el) return; let current = el.value; while (el.options.length > 1) el.remove(1);
    values.forEach(v => { let opt = document.createElement('option'); opt.value = v; opt.text = v; el.appendChild(opt); });
    if ([...el.options].some(o => o.value === current)) el.value = current;
}
