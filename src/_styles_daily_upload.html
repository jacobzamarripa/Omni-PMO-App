<style>
/* ============================================================
   FILE: _styles_daily_upload.html
   ROLE: Upload Center workspace styles
   ============================================================ */

#upload-workspace {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  background: color-mix(in srgb, var(--bg) 92%, #f8fafc);
  overflow: hidden;
}

#upload-workspace.ws-active {
  display: flex;
}

/* Hide global Admin FAB when in Upload workspace to prevent overlap */
#upload-workspace.ws-active ~ #admin-dock,
#upload-workspace.ws-active ~ #admin-fab,
#upload-workspace.ws-active ~ .admin-fab-container,
#upload-workspace.ws-active ~ .fab-container { 
  display: none !important; 
}

.upload-shell {
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 96%, #ffffff);
}

.upload-overview {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 12px;
}

.upload-overview-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.upload-overview-titleblock {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.upload-overview-kicker {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-overview-title {
  font-size: 24px;
  line-height: 1.1;
  font-weight: 800;
  color: var(--text-main);
  max-width: 640px;
}

.upload-overview-meta {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
}

.upload-kpi-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.upload-kpi-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-bg) 90%, white);
}

.upload-kpi-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-kpi-value {
  font-size: 17px;
  font-weight: 900;
  color: var(--text-main);
}

.upload-kpi-chip.kpi-pending .upload-kpi-value { color: #d97706; }
.upload-kpi-chip.kpi-uploaded .upload-kpi-value { color: #16a34a; }
.upload-kpi-chip.kpi-failed .upload-kpi-value { color: #dc2626; }

.upload-missing-summary.ok { color: #16a34a; }
.upload-missing-summary.warn { color: #7c3aed; }

.upload-missing-header-modal {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.upload-missing-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.upload-missing-today-btn {
  height: 34px;
  padding: 0 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 94%, #f5f3ff);
  color: #7c3aed;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: all 120ms ease;
}

.upload-missing-today-btn:hover {
  background: #f5f3ff;
  border-color: #8b5cf6;
}

.upload-missing-date-picker {
  height: 34px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 12px;
  font-family: inherit;
}

.upload-missing-body {
  display: none;
  border-top: 1px solid color-mix(in srgb, #8b5cf6 18%, var(--border));
  background: color-mix(in srgb, white 96%, #faf5ff);
}

.upload-missing-body.is-open {
  display: block;
}

.upload-missing-rows {
  display: flex;
  flex-direction: column;
}

.upload-modal-missing-wrap {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.upload-missing-header-modal {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.upload-missing-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
}

.upload-missing-row-main {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.upload-missing-vendor {
  font-size: 12px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-missing-meta {
  font-size: 11px;
  color: var(--text-muted);
}

.upload-missing-draft-btn,
.upload-missing-draft-all button {
  height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, #8b5cf6 25%, var(--border));
  background: color-mix(in srgb, white 86%, #f5f3ff);
  color: #7c3aed;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
}

.upload-missing-draft-all {
  display: flex;
  justify-content: flex-end;
  padding: 10px 14px;
}

.upload-missing-empty {
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 0;
  flex-wrap: wrap;
}

.upload-toolbar + .upload-toolbar {
  border-top: 1px solid var(--border);
}

.upload-toolbar-left,
.upload-toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.upload-toolbar-left {
  flex: 1;
  min-width: 0;
}

.upload-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.upload-field-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-field-search {
  min-width: 280px;
  flex: 1;
}

.upload-select,
.upload-search {
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  padding: 0 12px;
  outline: none;
}

.upload-select {
  min-width: 160px;
}

.upload-search {
  width: 100%;
}

.upload-select:focus,
.upload-search:focus,
.upload-cell-input:focus,
.upload-confirm-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

.upload-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 36px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 82%, var(--card-bg));
  color: var(--text-main);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}

.upload-btn:hover {
  border-color: var(--accent);
}

.upload-btn.btn-ghost {
  background: transparent;
}

.upload-btn.btn-primary {
  background: color-mix(in srgb, var(--accent) 88%, white);
  border-color: color-mix(in srgb, var(--accent) 88%, white);
  color: #fff;
}

.upload-btn.btn-danger {
  background: #dc2626;
  border-color: #dc2626;
  color: #fff;
}

.upload-btn.is-active {
  background: color-mix(in srgb, var(--accent) 10%, white);
  border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
  color: var(--accent);
}

.upload-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

.upload-selection-info {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}

.upload-table-wrap {
  flex: 1;
  min-height: 0;
  overflow: auto;
  background: color-mix(in srgb, white 96%, var(--bg));
}

.upload-table {
  width: 100%;
  min-width: 1660px;
  border-collapse: collapse;
  table-layout: auto;
  font-size: 13px;
  background: white;
}

.upload-table thead th {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 8px 12px;
  background: #f8f9fa;
  border: 1px solid #dee2e6;
  border-bottom: 2px solid #bdc1c6;
  font-size: 12px;
  font-weight: 700;
  color: #3c4043;
  text-align: left;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  line-height: 1.4;
}

.upload-table thead th:hover {
  background: #f1f3f4;
}

.upload-table th .sort-arrow {
  margin-left: 6px;
  color: #70757a;
}

.upload-table th.is-sorted {
  background: #e8f0fe;
  color: #1a73e8;
}

.upload-table th.is-sorted .sort-arrow {
  color: #1a73e8;
}

.upload-table tbody td {
  padding: 4px 12px;
  height: 38px;
  border: 1px solid #dee2e6;
  background: #fff;
  color: #202124;
  font-weight: 700;
  vertical-align: middle;
  overflow: visible;
  white-space: nowrap;
}

.upload-table tbody tr:hover td {
  background: #f8f9fa;
}

.upload-table tbody tr.row-dirty td {
  background: #fff9db;
  border-color: #fab005;
}

.upload-table tbody tr.row-failed td {
  background: #fff5f5;
  border-color: #ffc9c9;
}

.upload-table tbody tr.row-duplicate td {
  background: #fff9db;
  border-color: #fab005;
}

.upload-table tbody tr.row-uploaded td {
  color: #70757a;
  background: #f1f3f4;
  font-weight: 400;
}

.upload-table th.col-check,
.upload-table td.col-check {
  position: sticky;
  left: 0;
  z-index: 110;
  width: 48px;
  min-width: 48px;
  max-width: 48px;
  text-align: center;
  padding: 0;
  background: #f8f9fa !important;
  box-shadow: 2px 0 0 0 #dee2e6;
}

.upload-table td.col-check {
  background: #fff !important;
}

.upload-table th:nth-child(2),
.upload-table td:nth-child(2) {
  position: sticky;
  left: 48px;
  z-index: 90;
  width: 130px;
  min-width: 130px;
  background: #f8f9fa !important;
}

.upload-table td:nth-child(2) {
  background: #fff !important;
}

.upload-table th:nth-child(3),
.upload-table td:nth-child(3) {
  position: sticky;
  left: 178px;
  z-index: 90;
  width: 180px;
  min-width: 180px;
  background: #f8f9fa !important;
}

.upload-table td:nth-child(3) {
  background: #fff !important;
}

.upload-table th:nth-child(4),
.upload-table td:nth-child(4) {
  position: sticky;
  left: 358px;
  z-index: 90;
  width: 260px;
  min-width: 260px;
  box-shadow: 2px 0 0 0 #bdc1c6;
  background: #f8f9fa !important;
}

.upload-table td:nth-child(4) {
  background: #fff !important;
}

.upload-table thead th:nth-child(2),
.upload-table thead th:nth-child(3),
.upload-table thead th:nth-child(4) {
  z-index: 105;
}

.upload-table td.col-comments,
.upload-table th.col-comments {
  width: 99%;
  min-width: 400px;
  white-space: normal;
}

.upload-table td.col-comments {
  line-height: 1.4;
}

.upload-table th.col-lime,
.upload-table td.col-lime {
  min-width: 140px;
}

.upload-table th.col-ug-footage,
.upload-table td.col-ug-footage,
.upload-table th.col-strand,
.upload-table td.col-strand,
.upload-table th.col-fiber,
.upload-table td.col-fiber,
.upload-table th.col-nap,
.upload-table td.col-nap {
  min-width: 120px;
}

.upload-table th.col-teal,
.upload-table td.col-status {
  min-width: 160px;
}

.upload-table th.col-dark-navy:not(.col-fdh),
.upload-table td.col-dark-navy:not(.col-fdh):not(.col-comments) {
  min-width: 110px;
}

.upload-row-check {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.upload-cell-readonly {
  display: block;
  padding: 6px 0;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.upload-cell-readonly.is-comments {
  white-space: normal;
  overflow: visible;
  min-width: 380px;
}

.upload-td-editable {
  background: #fff !important;
}

.upload-cell-input {
  width: 100%;
  height: 30px;
  padding: 0 8px;
  border: 1px solid transparent;
  background: transparent;
  color: #1a73e8;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  outline: none;
  box-sizing: border-box;
}

.upload-cell-input:focus {
  background: white;
  border: 2px solid #1a73e8;
  box-shadow: none;
}

.upload-cell-input.is-comments {
  min-height: 48px;
  padding: 6px 8px;
  resize: vertical;
}

.upload-bool-cell {
  text-align: center;
}

.du-bool-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.du-bool-checkbox {
  width: 18px;
  height: 18px;
  margin: 0;
  cursor: pointer;
}

.upload-status-badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
}

/* Remove colored headers to fix the "broken" look and match Sheets */
.upload-table th.col-dark-navy,
.upload-table th.col-lime,
.upload-table th.col-ug-footage,
.upload-table th.col-strand,
.upload-table th.col-fiber,
.upload-table th.col-nap,
.upload-table th.col-teal { 
  background: #f8f9fa; 
  color: #3c4043; 
  border-bottom: 2px solid #bdc1c6; 
}

/* Accent top bars on headers for category subtle hinting */
.upload-table th.col-dark-navy { border-top: 3px solid #1c4587; }
.upload-table th.col-lime { border-top: 3px solid #16a34a; }
.upload-table th.col-ug-footage { border-top: 3px solid #f6b26b; }
.upload-table th.col-strand { border-top: 3px solid #9fc5e8; }
.upload-table th.col-fiber { border-top: 3px solid #ea9999; }
.upload-table th.col-nap { border-top: 3px solid #fce5cd; }
.upload-table th.col-teal { border-top: 3px solid #0f766e; }

/* Fixed sticky border overlap */
.upload-table td.col-lime,
.upload-table td.col-ug-footage,
.upload-table td.col-strand,
.upload-table td.col-fiber,
.upload-table td.col-nap,
.upload-table td.col-comments { border-left: 1px solid #dee2e6; }

.col-resizer {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 6px;
  cursor: col-resize;
  z-index: 12;
}

.col-resizer:hover,
.col-resizer.is-dragging {
  background: rgba(255, 255, 255, 0.28);
}

/* ── Modal overlay & dialog ──────────────────────────────── */
.upload-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.upload-modal-overlay.visible {
  display: flex;
}
.upload-modal {
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
  width: 100%;
  max-width: 600px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.upload-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.upload-modal-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-main);
}
.upload-modal-close {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 85%, var(--bg));
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 100ms, color 100ms;
}
.upload-modal-close:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
.upload-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}
.upload-modal-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.upload-modal-copy {
  font-size: 13px;
  color: var(--text-main);
  margin: 0 0 12px;
  line-height: 1.5;
}
.upload-modal-copy.strong { font-weight: 700; }
.upload-modal-subhead {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  margin-top: 12px;
}
.upload-confirm-input {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: 0.06em;
  outline: none;
  margin-top: 8px;
}
.upload-dirty-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #f59e0b;
  margin-right: 6px;
  vertical-align: middle;
}
.upload-lock-note {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  margin-left: 6px;
}
.upload-lock-note.editable { color: #16a34a; }
.upload-empty {
  padding: 48px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
}
.upload-history-section {
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.upload-history-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.upload-history-toggle svg { transition: transform 140ms ease; }
.upload-history-toggle.is-open svg { transform: rotate(90deg); }
.upload-history-list {
  display: none;
  max-height: 180px;
  overflow-y: auto;
  border-top: 1px solid var(--border);
}
.upload-history-list.is-open { display: block; }
.upload-history-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  font-size: 11px;
}
.upload-history-ts { color: var(--text-muted); font-weight: 600; }
.upload-history-dry-badge {
  padding: 2px 7px;
  border-radius: 999px;
  background: #dbeafe;
  color: #1d4ed8;
  font-size: 10px;
  font-weight: 800;
}
.upload-history-counts { display: flex; gap: 8px; align-items: center; flex: 1; }
.upload-history-count { font-weight: 700; color: var(--text-muted); }
.upload-history-count.success { color: #16a34a; }
.upload-history-count.failed  { color: #dc2626; }
.upload-history-count.skipped { color: #d97706; }
.upload-history-batch { font-size: 10px; color: var(--text-muted); font-family: monospace; margin-left: auto; }
.upload-history-empty { padding: 12px 16px; font-size: 12px; color: var(--text-muted); }

/* Preview table (dry run / upload preview) */
.upload-preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 12px;
}
.upload-preview-table th,
.upload-preview-table td {
  padding: 7px 10px;
  border: 1px solid var(--border);
  text-align: left;
  vertical-align: middle;
}
.upload-preview-table th { background: #f8f9fa; font-weight: 700; }
.upload-preview-table tr.is-dupe td { background: #fef9c3; }
.upload-preview-ok   { color: #16a34a; font-weight: 700; font-size: 11px; }
.upload-preview-warn { color: #d97706; font-weight: 700; font-size: 11px; }
.upload-preview-note {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.upload-preview-note.ok   { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.upload-preview-note.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

/* Email draft modal styles */
