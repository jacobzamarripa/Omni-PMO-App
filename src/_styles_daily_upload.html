<style>
/* ============================================================
   FILE: _styles_daily_upload.html
   ROLE: Upload Center workspace styles
   ============================================================ */

#upload-workspace {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  width: 100%;
  background: color-mix(in srgb, var(--bg) 92%, #f8fafc);
  box-sizing: border-box;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
  -webkit-overflow-scrolling: touch;
}

#upload-workspace.ws-active {
  display: flex;
}

/* Hide global Admin FAB when in Upload workspace to prevent overlap */
#upload-workspace.ws-active ~ #admin-dock,
#upload-workspace.ws-active ~ #admin-fab,
#upload-workspace.ws-active ~ .admin-fab-container,
#upload-workspace.ws-active ~ .fab-container { 
  display: none !important; 
}

.upload-shell {
  padding: 12px 24px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 82%, transparent);
  background: color-mix(in srgb, var(--bg) 97%, var(--card-bg));
}

.upload-intake-grid {
  display: grid;
  grid-template-columns: minmax(280px, 0.9fr) minmax(340px, 1.1fr);
  gap: 12px;
  padding: 0 0 12px;
}

.upload-stage-card,
.upload-stage-preview-shell,
.upload-queue-shell,
.upload-history-section {
  background: color-mix(in srgb, var(--card-bg) 94%, var(--bg));
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: none;
}

.upload-stage-card {
  position: relative;
  min-height: 150px;
  padding: 12px 12px 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.upload-stage-card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 3px;
  background: color-mix(in srgb, var(--border) 70%, transparent);
  opacity: 1;
}

.upload-intake-grid-secondary {
  margin-top: 12px;
}

.upload-card-head,
.upload-stage-preview-head,
.upload-queue-head {
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  gap: 10px;
}

.upload-card-headcopy,
.upload-queue-headcopy {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
  flex: 1 1 auto;
  padding-right: 64px;
}

.upload-stage-card--incoming .upload-card-headcopy {
  padding-right: 152px;
}

.upload-card-stepmark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  width: 32px;
  height: 32px;
  border-radius: 11px;
  border: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
  background: color-mix(in srgb, var(--card-bg) 88%, var(--bg));
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.1em;
  line-height: 1;
}

.upload-card-kicker {
  font-size: 8px;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-card-title {
  margin-top: 0;
  font-size: 13px;
  line-height: 1.02;
  font-weight: 800;
  color: var(--text-main);
  text-transform: uppercase;
  letter-spacing: -0.02em;
}

.upload-card-subtitle,
.upload-queue-subtitle,
.upload-overview-subtitle {
  font-size: 9px;
  line-height: 1.28;
  color: var(--text-muted);
}

.upload-card-subtitle {
  max-width: 20ch;
}

.upload-card-subtitle:empty,
.upload-queue-subtitle:empty,
.upload-overview-subtitle:empty {
  display: none;
}

.upload-source-note,
.upload-stage-note,
.upload-stage-warning,
.upload-source-empty,
.upload-stage-empty {
  margin-top: 10px;
  font-size: 11px;
  line-height: 1.45;
  color: var(--text-muted);
}

.upload-pipeline-body {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 34px;
  flex: 1 1 auto;
}

.upload-pipeline-actions {
  margin-top: auto;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: stretch;
  padding-top: 8px;
}

.upload-pipeline-actions > .upload-btn {
  flex: 1 1 calc(50% - 4px);
}

.upload-pipeline-actions > .upload-btn:only-child {
  flex-basis: 100%;
}

#du-step4-card .upload-pipeline-actions > .upload-btn:last-child {
  flex-basis: 100%;
}

.du-step-summary-stack {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 100%;
}

.du-step-corner-stack {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  text-align: right;
  max-width: 140px;
}

.du-step-corner-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.du-step-inline-status {
  display: flex;
  align-items: center;
  min-height: 22px;
}

.du-step-meta-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
  padding-top: 4px;
  border-top: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
}

.du-step-meta-row--compact {
  justify-content: flex-start;
  gap: 10px;
  width: fit-content;
}

.du-step-meta-label,
.upload-pipeline-stat-label {
  font-size: 8px;
  font-weight: 900;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.du-step-meta-value,
.upload-pipeline-stat-value,
.upload-pipeline-meta {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-main);
}

.upload-pipeline-meta {
  font-weight: 600;
  color: var(--text-muted);
}

.upload-pipeline-meta a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 700;
}

.upload-pipeline-meta a:hover {
  text-decoration: underline;
}

/* Single-row pipeline layout */
.upload-pipeline-row {
  display: grid;
  justify-content: center;
  grid-template-columns: repeat(4, minmax(0, 238px));
  gap: 12px;
  padding: 0 0 12px;
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}
.upload-pipeline-row .upload-stage-card {
  min-height: 144px;
  padding: 12px 12px 10px;
}
.upload-pipeline-row .upload-pipeline-body {
  margin-top: 10px;
  gap: 5px;
  min-height: 30px;
}
.upload-pipeline-row .upload-pipeline-actions {
  margin-top: auto;
  gap: 6px;
  padding-top: 8px;
}

.upload-stage-card.is-current {
  border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
  background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
  box-shadow: none;
}

.upload-stage-card.is-complete {
  border-color: color-mix(in srgb, #16a34a 20%, var(--border));
  background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
}

.upload-stage-card.is-warning {
  border-color: color-mix(in srgb, #d97706 24%, var(--border));
  background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
}

.upload-stage-card.is-blocked:not(.upload-stage-card--locked) {
  border-color: color-mix(in srgb, var(--border) 88%, #cbd5e1);
  background: color-mix(in srgb, var(--card-bg) 96%, #f8fafc);
}

.upload-stage-card.is-current::before {
  background: color-mix(in srgb, var(--accent) 88%, white);
}

.upload-stage-card.is-complete::before {
  background: #16a34a;
}

.upload-stage-card.is-warning::before {
  background: #d97706;
}

.upload-stage-card.is-blocked::before {
  background: #cbd5e1;
}

/* Step 4 locked state */
.upload-stage-card--locked {
  opacity: 0.8;
  pointer-events: none;
  user-select: none;
  filter: saturate(0.82);
}

.upload-pipeline-body .upload-step-state-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;
}

.upload-step-state-badge {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  min-height: 20px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-bg) 88%, var(--bg));
  color: var(--text-muted);
}

.upload-step-state-badge.is-blocked {
  background: color-mix(in srgb, var(--card-bg) 90%, #e2e8f0);
  color: #64748b;
}

.upload-step-state-badge.is-current {
  background: color-mix(in srgb, var(--card-bg) 88%, #dbeafe);
  border-color: color-mix(in srgb, var(--accent) 32%, var(--border));
  color: var(--accent);
}

.upload-step-state-badge.is-complete {
  background: #dcfce7;
  border-color: #86efac;
  color: #15803d;
}

/* Step 1 incoming file badge */
.du-incoming-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 99px;
}
.du-incoming-badge--alert {
  background: color-mix(in srgb, #fef3c7 90%, transparent);
  color: #92400e;
  border: 1px solid #fde68a;
}
.du-incoming-badge--clear {
  background: color-mix(in srgb, #d1fae5 80%, transparent);
  color: #065f46;
  border: 1px solid #a7f3d0;
}
.du-incoming-pulse {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #f59e0b;
  animation: du-pulse 1.4s ease-in-out infinite;
}
@keyframes du-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.75); }
}

/* Step 2 loaded date chip */
.du-loaded-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 99px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
}
.du-loaded-chip--empty {
  background: color-mix(in srgb, var(--border) 50%, transparent);
  color: var(--text-muted);
  border-color: var(--border);
}

/* Step 3 vendor summary */
.du-vendor-summary {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.du-vendor-summary-total {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-main);
}
.du-vendor-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.du-vendor-chip {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  background: color-mix(in srgb, var(--border) 60%, transparent);
  color: var(--text-main);
  border: 1px solid var(--border);
}
.du-vendor-chip em {
  font-style: normal;
  color: var(--text-muted);
  font-weight: 500;
}

/* Step 3 approve button states */
#du-btn-approve-queue.du-btn-approved {
  background: #059669;
  border-color: #059669;
  color: #fff;
}
#du-btn-approve-queue.du-btn-warn {
  background: #d97706;
  border-color: #d97706;
  color: #fff;
}

/* Responsive: collapse to 2×2 below 1080px */
@media (max-width: 1080px) {
  .upload-pipeline-row {
    grid-template-columns: repeat(2, 1fr);
  }
}

.upload-field-date {
  max-width: 220px;
}

.upload-stage-warning {
  color: #92400e;
}

.upload-source-list {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 360px;
  overflow: auto;
}

.upload-source-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
  background: color-mix(in srgb, white 80%, var(--bg));
  color: var(--text-main);
  cursor: pointer;
  text-align: left;
}

.upload-source-item.is-selected {
  border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
  background: color-mix(in srgb, white 75%, #eff6ff);
}

.upload-source-item-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.upload-source-item-name {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-source-item-meta,
.upload-source-item-action {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}

.upload-stage-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.upload-stage-summary {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.upload-stage-file-card {
  padding: 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(15, 23, 42, 0.03), rgba(59, 130, 246, 0.08));
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
}

.upload-stage-file-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-stage-file-meta {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-stage-chip-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
}

.upload-stage-chip {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
  background: color-mix(in srgb, white 82%, var(--bg));
}

.upload-stage-chip-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-stage-chip-value {
  font-size: 20px;
  font-weight: 900;
  color: var(--text-main);
}

.upload-stage-preview-shell,
.upload-queue-shell,
.upload-history-section {
  margin: 16px 34px 0;
  padding: 18px;
}

.upload-queue-shell {
  position: sticky;
  top: var(--du-pipeline-sticky-offset, 62px);
  display: flex;
  flex-direction: column;
  min-height: 0;
  height: calc(100vh - var(--desktop-header-height, 56px) - var(--du-pipeline-sticky-offset, 62px));
  max-height: calc(100vh - var(--desktop-header-height, 56px) - var(--du-pipeline-sticky-offset, 62px));
  overflow: hidden;
}

.upload-queue-head,
.upload-toolbar {
  flex-shrink: 0;
}

.upload-queue-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
}

.upload-queue-headcopy {
  padding-right: 0;
}

.upload-stage-view-switch {
  display: flex;
  gap: 8px;
}

.upload-stage-preview-list {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 360px;
  overflow: auto;
}

.upload-stage-record {
  padding: 14px;
  border-radius: 16px;
  border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  background: color-mix(in srgb, white 82%, var(--bg));
}

.upload-stage-record.has-blocking {
  border-color: rgba(220, 38, 38, 0.26);
  background: color-mix(in srgb, white 84%, #fef2f2);
}

.upload-stage-record-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.upload-stage-record-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-stage-record-meta {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-stage-disposition-group {
  display: flex;
  gap: 8px;
}

.upload-stage-disposition {
  height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 82%, var(--bg));
  color: var(--text-main);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
}

.upload-stage-disposition.is-active {
  border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
  background: color-mix(in srgb, white 72%, #dbeafe);
  color: #1d4ed8;
}

.upload-stage-disposition:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.upload-stage-pill-row {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.upload-stage-pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.upload-stage-pill.pill-blocking {
  background: #fee2e2;
  color: #b91c1c;
}

.upload-stage-pill.pill-warning {
  background: #fef3c7;
  color: #92400e;
}

.upload-stage-field-grid {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.upload-stage-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.upload-stage-field-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-stage-field-value {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
  word-break: break-word;
}

.upload-stage-preview-table-wrap {
  margin-top: 14px;
  overflow: auto;
}

.upload-stage-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 1100px;
}

.upload-stage-table th,
.upload-stage-table td {
  padding: 10px 12px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
  font-size: 12px;
  text-align: left;
  vertical-align: top;
}

.upload-stage-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: color-mix(in srgb, white 95%, var(--bg));
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.upload-overview {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-bottom: 6px;
}

.upload-overview-head {
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.upload-overview-titlebar {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  flex-wrap: wrap;
}

.upload-overview-titleblock {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.upload-overview-kicker {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-overview-title {
  font-size: 17px;
  line-height: 1.02;
  font-weight: 900;
  color: var(--text-main);
  max-width: none;
  text-transform: uppercase;
}

.upload-overview-meta {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 8px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
  background: color-mix(in srgb, var(--card-bg) 88%, var(--bg));
  font-size: 8px;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
  margin-left: auto;
}

.upload-kpi-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: flex-start;
}

.upload-kpi-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-direction: row;
  gap: 6px;
  min-height: 28px;
  padding: 0 9px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card-bg) 90%, var(--bg));
  box-shadow: none;
}

.upload-kpi-label {
  font-size: 8px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-kpi-value {
  font-size: 13px;
  line-height: 1;
  font-weight: 900;
  color: var(--text-main);
}

.upload-stage-card--incoming .upload-btn.btn-primary {
  background: color-mix(in srgb, #059669 90%, white);
  border-color: transparent;
  color: #f0fdf4;
}

.upload-stage-card--load .upload-btn.btn-primary {
  background: color-mix(in srgb, #2563eb 90%, white);
  border-color: transparent;
  color: #eff6ff;
}

.upload-stage-card--review .upload-btn.btn-primary {
  background: color-mix(in srgb, #d97706 90%, white);
  border-color: transparent;
  color: #fff7ed;
}

.upload-stage-card--finalize .upload-btn.btn-primary {

  border: 1px solid var(--border);
  background: color-mix(in srgb, white 85%, var(--bg));
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 100ms, color 100ms;
}
.upload-modal-close:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
.upload-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}
.upload-modal-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.upload-modal-copy {
  font-size: 13px;
  color: var(--text-main);
  margin: 0 0 12px;
  line-height: 1.5;
}
.upload-modal-copy.strong { font-weight: 700; }
.upload-modal-subhead {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  margin-top: 12px;
}
.upload-confirm-input {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: 0.06em;
  outline: none;
  margin-top: 8px;
}
.upload-dirty-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #f59e0b;
  margin-right: 6px;
  vertical-align: middle;
}
.upload-lock-note {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  margin-left: 6px;
}
.upload-lock-note.editable { color: #16a34a; }
.upload-empty {
  padding: 48px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
}
.upload-history-section {
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.upload-history-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.upload-history-toggle svg { transition: transform 140ms ease; }
.upload-history-toggle.is-open svg { transform: rotate(90deg); }
.upload-history-list {
  display: none;
  max-height: 180px;
  overflow-y: auto;
  border-top: 1px solid var(--border);
}
.upload-history-list.is-open { display: block; }
.upload-history-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  font-size: 11px;
}
.upload-history-ts { color: var(--text-muted); font-weight: 600; }
.upload-history-dry-badge {
  padding: 2px 7px;
  border-radius: 999px;
  background: #dbeafe;
  color: #1d4ed8;
  font-size: 10px;
  font-weight: 800;
}
.upload-history-counts { display: flex; gap: 8px; align-items: center; flex: 1; }
.upload-history-count { font-weight: 700; color: var(--text-muted); }
.upload-history-count.success { color: #16a34a; }
.upload-history-count.failed  { color: #dc2626; }
.upload-history-count.skipped { color: #d97706; }
.upload-history-batch { font-size: 10px; color: var(--text-muted); font-family: monospace; margin-left: auto; }
.upload-history-empty { padding: 12px 16px; font-size: 12px; color: var(--text-muted); }

/* Preview table (dry run / upload preview) */
.upload-preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 12px;
}
.upload-preview-table th,
.upload-preview-table td {
  padding: 7px 10px;
  border: 1px solid var(--border);
  text-align: left;
  vertical-align: middle;
}
.upload-preview-table th { background: #f8f9fa; font-weight: 700; }
.upload-preview-table tr.is-dupe td { background: #fef9c3; }
.upload-preview-ok   { color: #16a34a; font-weight: 700; font-size: 11px; }
.upload-preview-warn { color: #d97706; font-weight: 700; font-size: 11px; }
.upload-preview-note {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.upload-preview-note.ok   { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.upload-preview-note.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

/* Email draft modal styles */
.upload-email-subject {
  background: color-mix(in srgb, white 94%, var(--bg));
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 8px;
}
.upload-email-body {
  background: color-mix(in srgb, white 94%, var(--bg));
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-main);
  white-space: pre-wrap;
  line-height: 1.6;
  max-height: 260px;
  overflow-y: auto;
}

/* ── Status badge color variants ─────────────────────────── */
.upload-status-badge.status-pending  { background: #fff3cd; color: #92400e; }
.upload-status-badge.status-uploaded { background: #dcfce7; color: #166534; }
.upload-status-badge.status-failed   { background: #fee2e2; color: #991b1b; }
.upload-status-badge.status-duplicate{ background: #fef9c3; color: #854d0e; }
.upload-status-badge.status-skipped  { background: #f1f5f9; color: #475569; }

/* ── Health icons in status cell ─────────────────────────── */
.upload-health-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 900;
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}
.upload-health-icon.health-error { background: #fee2e2; color: #dc2626; }
.upload-health-icon.health-warn  { background: #fef3c7; color: #d97706; }
.upload-health-icon.health-ok    { background: #dcfce7; color: #16a34a; }

/* ── Row health state (left accent stripe) ───────────────── */
.upload-table tbody tr.row-has-error td:first-child { border-left: 3px solid #dc2626; }
.upload-table tbody tr.row-has-warning td:first-child { border-left: 3px solid #d97706; }

/* ── Inline validation annotation ────────────────────────── */
.upload-inline-error,
.upload-inline-warn {
  display: inline-flex;
  align-items: center;
  margin-left: 6px;
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.04em;
  white-space: nowrap;
  vertical-align: middle;
}
.upload-inline-error { background: #fee2e2; color: #dc2626; }
.upload-inline-warn  { background: #fef3c7; color: #b45309; }

.upload-dup-view-btn {
  display: inline-flex;
  align-items: center;
  margin-left: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, #d97706 30%, var(--border));
  background: #fef9c3;
  color: #92400e;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
  white-space: nowrap;
  vertical-align: middle;
  transition: background 100ms;
}
.upload-dup-view-btn:hover { background: #fef08a; }

/* ── Swimlane divider rows ────────────────────────────────── */
.upload-swimlane-row {
  position: sticky;
  top: 38px; /* stick just below the thead (~38px tall) */
  z-index: 98;
  cursor: pointer;
  user-select: none;
}
.upload-swimlane-cell {
  padding: 0 !important;
  height: auto !important;
  border-top: 1px solid var(--border) !important;
  border-bottom: 1px solid var(--border) !important;
  border-left: none !important;
  border-right: none !important;
}
.upload-swimlane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 7px 14px;
  transition: background 100ms;
}
.upload-swimlane-row:hover .upload-swimlane-header { filter: brightness(0.97); }
.upload-swimlane-header-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.upload-swimlane-chevron {
  display: inline-flex;
  transition: transform 140ms ease;
  color: var(--text-muted);
}
.upload-swimlane-chevron.is-open { transform: rotate(90deg); }
.upload-swimlane-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.upload-swimlane-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 18px;
  padding: 0 6px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 900;
  background: color-mix(in srgb, var(--border) 60%, transparent);
  color: var(--text-muted);
}
.upload-swimlane-action {
  height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 90%, var(--card-bg));
  color: var(--text-main);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 100ms, background 100ms;
}
.upload-swimlane-action:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, white); }

/* Swimlane color coding — opaque backgrounds required for sticky to work */
.swimlane-issues .upload-swimlane-label { color: #dc2626; }
.swimlane-issues .upload-swimlane-count { background: #fee2e2; color: #dc2626; }
.swimlane-issues .upload-swimlane-cell { background: #fff5f5 !important; }
.swimlane-ready .upload-swimlane-label { color: #16a34a; }
.swimlane-ready .upload-swimlane-count { background: #dcfce7; color: #15803d; }
.swimlane-ready .upload-swimlane-cell { background: #f0fdf4 !important; }
.swimlane-uploaded .upload-swimlane-cell { background: #f8fafc !important; }

/* Swimlane empty states */
.upload-swimlane-empty-row td { border: none !important; }
.upload-swimlane-empty-cell {
  padding: 10px 20px !important;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  background: color-mix(in srgb, var(--bg) 50%, white) !important;
  height: auto !important;
}
.upload-swimlane-ok { color: #16a34a !important; }

/* ── Post-upload results card ─────────────────────────────── */
.upload-results-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 48px 32px;
  min-height: 320px;
  background: color-mix(in srgb, white 97%, var(--bg));
}
.upload-rc-header {
  display: flex;
  align-items: center;
  gap: 16px;
}
.upload-rc-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #dcfce7;
  color: #16a34a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.upload-rc-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-main);
}
.upload-rc-batch {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  margin-top: 2px;
  font-family: monospace;
}
.upload-rc-stats {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.upload-rc-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 110px;
  padding: 20px 24px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: white;
}
.upload-rc-stat-value {
  font-size: 40px;
  font-weight: 900;
  line-height: 1;
}
.upload-rc-stat-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.stat-success .upload-rc-stat-value { color: #16a34a; }
.stat-success { border-color: #bbf7d0; background: #f0fdf4; }
.stat-skipped .upload-rc-stat-value { color: #d97706; }
.stat-skipped { border-color: #fde68a; background: #fffbeb; }
.stat-failed  .upload-rc-stat-value { color: #dc2626; }
.stat-failed  { border-color: #fecaca; background: #fef2f2; }

.upload-rc-failures {
  width: 100%;
  max-width: 560px;
  border: 1px solid #fecaca;
  border-radius: 12px;
  overflow: hidden;
  background: #fef2f2;
}
.upload-rc-failures-title {
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #dc2626;
  border-bottom: 1px solid #fecaca;
}
.upload-rc-failure-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 8px 16px;
  border-bottom: 1px solid color-mix(in srgb, #fecaca 50%, transparent);
  font-size: 12px;
}
.upload-rc-failure-row:last-child { border-bottom: none; }
.upload-rc-failure-fdh { font-weight: 800; color: #991b1b; min-width: 120px; }
.upload-rc-failure-err { color: #7f1d1d; flex: 1; }
.upload-rc-footer {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ── Duplicate comparison modal ──────────────────────────── */
.upload-dup-warning {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 12px 14px;
  border-radius: 10px;
  background: #fef9c3;
  border: 1px solid #fde047;
  color: #92400e;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 16px;
}
.upload-dup-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.upload-dup-field-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 96%, var(--bg));
}
.upload-dup-field-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.upload-dup-field-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-main);
}

@media (max-width: 1024px) {
  .upload-shell {
    padding: 14px 22px 0;
  }

  .upload-stage-preview-shell,
  .upload-queue-shell,
  .upload-history-section {
    margin-left: 22px;
    margin-right: 22px;
  }

  .upload-queue-shell {
    top: var(--du-pipeline-sticky-offset, 62px);
    height: calc(100vh - var(--desktop-header-height, 56px) - var(--du-pipeline-sticky-offset, 62px));
    max-height: calc(100vh - var(--desktop-header-height, 56px) - var(--du-pipeline-sticky-offset, 62px));
  }

  .upload-overview-head {
    flex-direction: column;
    align-items: flex-start;
  }

  .upload-intake-grid,
  .upload-stage-field-grid,
  .upload-stage-chip-grid {
    grid-template-columns: 1fr 1fr;
  }

  .upload-field-search {
    min-width: 220px;
  }

  .upload-toolbar--queue-head .upload-field-search {
    min-width: 360px;
  }
}

@media (max-width: 768px) {
  .upload-shell {
    padding: 12px 14px 0;
  }

  .upload-intake-grid,
  .upload-stage-field-grid,
  .upload-stage-chip-grid {
    grid-template-columns: 1fr;
  }

  .upload-stage-record-head,
  .upload-card-head,
  .upload-stage-preview-head,
  .upload-queue-head {
    flex-direction: column;
    align-items: stretch;
  }

  .upload-stage-card,
  .upload-pipeline-row .upload-stage-card {
    min-height: auto;
  }

  .upload-card-stepmark {
    width: 30px;
    height: 30px;
    border-radius: 10px;
  }

  .upload-toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .upload-queue-head {
    flex-direction: column;
    align-items: stretch;
  }

  .upload-toolbar-left,
  .upload-toolbar-right {
    width: 100%;
  }

  .upload-field,
  .upload-field-search,
  .upload-select,
  .upload-search {
    width: 100%;
    min-width: 0;
  }

  .upload-table {
    min-width: 900px;
  }

  .upload-stage-preview-shell,
  .upload-queue-shell,
  .upload-history-section {
    margin-left: 14px;
    margin-right: 14px;
    padding: 14px;
  }

  .upload-queue-shell {
    position: static;
    height: auto;
    max-height: none;
  }

  .upload-toolbar--queue-head {
    margin-left: 0;
    gap: 10px;
  }

  .upload-toolbar--queue-head .upload-toolbar-left,
  .upload-toolbar--queue-head .upload-toolbar-right {
    flex-wrap: wrap;
  }

  .upload-toolbar--queue-head .upload-field-search {
    min-width: 0;
  }

  .upload-modal-overlay {
    padding: 12px;
  }
}

/* ── Upload in-progress overlay ──────────────────────────── */
.upload-in-progress {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 64px 32px;
  min-height: 320px;
  background: color-mix(in srgb, white 97%, var(--bg));
}

.uip-header {
  display: flex;
  align-items: center;
  gap: 16px;
}

.uip-spinner {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid color-mix(in srgb, var(--accent) 20%, transparent);
  border-top-color: var(--accent);
  animation: uip-spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes uip-spin {
  to { transform: rotate(360deg); }
}

.uip-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--text-main);
}

.uip-meta {
  margin-top: 3px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.uip-progress-rail {
  width: 100%;
  max-width: 400px;
  height: 6px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 14%, var(--border));
  overflow: hidden;
}

.uip-progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: var(--accent);
  transition: width 0.4s ease-out;
}

.uip-elapsed {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.uip-batch {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  font-family: monospace;
}

/* ── Results card icon variants ──────────────────────────── */
.upload-rc-icon.icon-partial {
  background: #fef3c7;
  color: #d97706;
}

.upload-rc-icon.icon-failed {
  background: #fee2e2;
  color: #dc2626;
}

/* ── Results card extras ─────────────────────────────────── */
.upload-rc-timing {
  margin-left: auto;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  align-self: flex-start;
}

.upload-rc-reconciled {
  font-size: 11px;
  font-weight: 700;
  color: #0369a1;
  background: #e0f2fe;
  border: 1px solid #bae6fd;
  border-radius: 8px;
  padding: 6px 14px;
  max-width: 560px;
  width: 100%;
  text-align: center;
}
.upload-rc-snapshot {
  font-size: 11px;
  color: #4b5563;
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 6px 14px;
  max-width: 560px;
  width: 100%;
  text-align: center;
}
.upload-rc-snapshot a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}
.upload-rc-snapshot a:hover { text-decoration: underline; }

/* ============================================================
   PIPELINE ROW — UNIFIED FLOW
   Overrides the isolated-card grid with a single connected strip.
   All individual step-card chrome is removed; state coloring lives
   on the step badge and a subtle cell tint instead of card borders.
   ============================================================ */

.upload-pipeline-row {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  justify-content: stretch;
  gap: 0;
  padding: 0;
  margin-bottom: 12px;
  background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: none;
  transition: box-shadow 160ms ease, border-radius 160ms ease;
}

/* Subtle left-to-right gradient track along the top */
.upload-pipeline-row::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(
    to right,
    color-mix(in srgb, var(--accent) 70%, transparent) 0%,
    color-mix(in srgb, var(--accent) 18%, transparent) 100%
  );
  z-index: 3;
  pointer-events: none;
}

/* Step cards: no individual borders, no radius, transparent bg */
.upload-pipeline-row .upload-stage-card {
  border: none;
  border-right: 1px solid color-mix(in srgb, var(--border) 52%, transparent);
  border-radius: 0;
  background: transparent;
