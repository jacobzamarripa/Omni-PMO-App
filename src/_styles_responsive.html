<style>
      /* 💻 LAPTOP & SMALL DESKTOP OPTIMIZATION (Screens up to 1080p / 16-inch MBP) */
      @media screen and (max-width: 1920px) {
          .inbox-sidebar {
              width: 320px !important;
              min-width: 320px !important;
              max-width: 320px !important;
          }
          .outbox-pane {
              width: 320px !important;
              min-width: 320px !important;
          }

          .email-card { padding: 10px 12px 8px !important; }
          .em-fdh { font-size: 11px !important; }
          .glass-pill { font-size: 8px !important; padding: 2px 6px !important; }
          .tag { font-size: 7.5px !important; padding: 2px 4px !important; }

          .panel-tab-bar { padding: 0 10px !important; }
          .admin-kpi { padding: 8px 4px !important; min-width: 70px !important; }
          .admin-kpi-val { font-size: 16px !important; }
          .admin-kpi-label { font-size: 7.5px !important; }
          .admin-list-card { padding: 10px 12px !important; }
          .vendor-bubble { font-size: 10px !important; padding: 10px !important; }
          .action-box { font-size: 10px !important; padding: 10px !important; }

          body.deck-mode-active #deck-stage {
              padding: var(--dock-content-offset, 92px) 24px 20px !important;
              gap: 20px !important;
          }
          #deck-stage-card {
              border-radius: var(--desktop-shell-radius, 24px) !important;
          }
          .slide-header {
              padding: 12px 20px !important;
          }
          .slide-body {
              padding: 16px 20px !important;
              gap: 24px !important;
          }
          .slide-footer {
              padding: 12px 20px !important;
          }

          .slide-hdr-id { font-size: 24px !important; }
          .deck-stage .slide-q-label { font-size: 10px !important; }
          .deck-stage .slide-input { width: 150px !important; max-width: 150px !important; }
          .deck-modules-body { padding: 12px 16px !important; gap: 16px !important; }
          .deck-module .slide-q-row { gap: 12px !important; }
          .deck-stage .slide-input-wrap { width: 180px !important; }
          .deck-stage .slide-q-action.checkbox-action { min-width: 40px !important; max-width: 60px !important; }

          .pane-content {
              padding: var(--dock-content-offset, 88px) 16px calc(16px + var(--raw-strip-height, 0px)) !important;
          }
          #grid-content {
              grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
              gap: 12px !important;
              padding: var(--dock-content-offset, 60px) 16px 16px !important;
          }

          .top-nav {
              padding: 8px 12px 6px !important;
              gap: 8px !important;
          }
          .nav-brand {
              font-size: 14px !important;
              padding: 8px 12px !important;
          }

          /* 7. Tighten the Dynamic Dock */
          .filter-strip {
              padding: 6px 10px !important;
              border-radius: 28px !important;
          }
          .filter-strip input[type="text"],
          .ms-display {
              height: 30px !important;
              padding: 0 12px !important;
              font-size: 10px !important;
          }
          .smart-dock .btn {
              height: 30px !important;
              padding: 0 12px !important;
              font-size: 9px !important;
          }
          .dock-arrow {
              width: 28px !important;
              height: 28px !important;
              font-size: 22px !important;
              padding-bottom: 2px !important;
          }
      }


    /* iOS STYLE UTILITY WIDGETS */
    .tool-widget {
        position: absolute; width: 300px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 28px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.6);
        z-index: var(--z-widget); display: none; flex-direction: column; overflow: hidden;
        transform-origin: top center;
        will-change: transform, opacity;
    }
    body.dark-mode .tool-widget {
        background: rgba(30, 30, 36, 0.65);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }
    .tool-widget.open {
        display: flex;
        animation: widget-spring-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    body.deck-mode-active .tool-widget,
    body.presentation-active .tool-widget {
        z-index: var(--z-popover) !important;
    }
    @keyframes widget-spring-pop {
        0%   { opacity: 0; transform: scale(0.5) translate(-40px, -30px); }
        100% { opacity: 1; transform: scale(1) translate(0, 0); }
    }
    .tool-header {
        position: relative; display: flex; justify-content: center; align-items: center;
        padding: 16px 18px 12px;
        font-weight: 700; font-size: 13px; color: var(--text-main); letter-spacing: -0.3px;
    }
    #calc-widget .tool-header {
        cursor: grab;
        touch-action: none;
        user-select: none;
    }
    #calc-widget.dragging .tool-header {
        cursor: grabbing;
    }
    .tool-close {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        background: rgba(120,120,128,0.16); border: none; cursor: pointer;
        color: var(--text-muted); display: flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; border-radius: 50%; transition: background 0.2s; padding: 0;
    }
    .tool-close:hover { background: rgba(120,120,128,0.3); }
    .tool-close svg { width: 12px; height: 12px; stroke-width: 2.5; }

    /* Calendar */
    #cal-widget {
        width: 600px;
        max-width: min(90vw, 600px);
        max-height: min(72vh, 700px);
        background: color-mix(in srgb, var(--card-bg) 98%, transparent);
        border-color: color-mix(in srgb, var(--border) 88%, white 12%);
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.74);
    }
    body.dark-mode #cal-widget {
        background: color-mix(in srgb, var(--card-bg) 92%, transparent);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .cal-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
        padding: 0 14px 6px;
    }
    .cal-summary-card {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 6px 8px;
        border-radius: 10px;
        background: color-mix(in srgb, var(--bg) 68%, var(--card-bg));
        border: 1px solid color-mix(in srgb, var(--border) 68%, transparent);
        box-shadow: none;
    }
    .cal-summary-label {
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.9px;
        text-transform: uppercase;
        color: var(--text-muted);
    }
    .cal-summary-value {
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: var(--text-main);
        line-height: 1;
    }
    .cal-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 0 14px 8px;
    }
    .cal-legend-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 22px;
        padding: 0 9px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }
    .cal-legend-pill:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
    }
    .cal-legend-pill:not(.is-active) {
        opacity: 0.48;
        box-shadow: none;
    }
    .cal-legend-pill-start,
    .cal-event-pill-start {
        color: #7a4a00;
        background: rgba(250, 204, 21, 0.22);
        border-color: rgba(234, 179, 8, 0.18);
    }
    .cal-legend-pill-complete,
    .cal-event-pill-complete {
        color: #166534;
        background: rgba(74, 222, 128, 0.18);
        border-color: rgba(34, 197, 94, 0.18);
    }
    .cal-legend-pill-ofs,
    .cal-event-pill-ofs {
        color: #1d4ed8;
        background: rgba(59, 130, 246, 0.16);
        border-color: rgba(59, 130, 246, 0.18);
    }
    body.dark-mode .cal-legend-pill-start,
    body.dark-mode .cal-event-pill-start {
        color: #fde68a;
        background: rgba(234, 179, 8, 0.18);
        border-color: rgba(250, 204, 21, 0.16);
    }
    body.dark-mode .cal-legend-pill-complete,
    body.dark-mode .cal-event-pill-complete {
        color: #bbf7d0;
        background: rgba(22, 163, 74, 0.18);
        border-color: rgba(74, 222, 128, 0.16);
    }
    body.dark-mode .cal-legend-pill-ofs,
    body.dark-mode .cal-event-pill-ofs {
        color: #bfdbfe;
        background: rgba(37, 99, 235, 0.22);
        border-color: rgba(96, 165, 250, 0.2);
    }
    .cal-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2px 14px 8px;
        font-weight: 700;
        font-size: 12px;
        color: var(--text-main);
    }
    .cal-nav button {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px 10px;
        color: var(--accent);
        font-size: 24px;
        font-weight: 300;
        line-height: 1;
        transition: opacity 0.2s;
    }
    .cal-nav button:hover { opacity: 0.7; }
    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0;
        padding: 0 14px 14px;
        text-align: left;
        overflow-y: visible;
        min-height: 0;
        border-top: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-left: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
    }
    .cal-day-header {
        font-size: 8px;
        font-weight: 900;
        color: var(--text-muted);
        padding: 8px 4px 7px;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        border-right: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        background: color-mix(in srgb, var(--card-bg) 98%, var(--bg));
        text-align: center;
    }
    .cal-cell {
        aspect-ratio: 1 / 0.94;
        min-height: 78px;
        padding: 5px 5px 6px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 2px;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-main);
        background: color-mix(in srgb, var(--card-bg) 98%, var(--bg));
        border-right: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        box-sizing: border-box;
    }
    .cal-cell.empty {
        background: color-mix(in srgb, var(--bg) 98%, transparent);
        box-shadow: none;
    }
    .cal-cell.today {
        background: color-mix(in srgb, var(--accent) 4%, var(--card-bg));
        box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.08);
    }
    .cal-cell-day {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 10px;
        font-weight: 900;
        color: var(--text-main);
        min-height: 18px;
    }
    .cal-cell.today .cal-cell-day-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
    }
    .cal-cell-events {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-height: 0;
    }
    .cal-event-pill {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 16px;
        padding: 0 5px;
        border-radius: 4px;
        border: none;
        font-size: 7px;
        font-weight: 900;
        letter-spacing: 0.1px;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
    }
    .cal-event-pill:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
    }
    .cal-more {
        display: inline-flex;
        align-items: center;
        min-height: 16px;
        padding: 0 5px;
        border-radius: 4px;
        border: 1px dashed var(--border);
        color: var(--text-muted);
        font-size: 7px;
        font-weight: 800;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        background: color-mix(in srgb, var(--card-bg) 68%, transparent);
    }
    @media (max-width: 640px) {
        #cal-widget {
            width: min(96vw, 600px);
            max-height: 84vh;
        }
        .cal-summary {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .cal-cell {
            min-height: 74px;
            padding: 5px 5px 6px;
        }
        .cal-event-pill {
            padding: 0 5px;
            font-size: 7px;
        }
    }

    /* Calculator */
    #calc-widget {
        width: min(332px, calc(100vw - 40px));
        z-index: calc(var(--z-max) + 2);
        --calc-shell-top: #6b7280;
        --calc-shell-mid: #525864;
        --calc-shell-bottom: #3d434d;
        --calc-shell-glow: rgba(255,255,255,0.18);
        --calc-shell-border: rgba(17, 24, 39, 0.34);
        --calc-header-text: #f9fafb;
        --calc-header-subtle: rgba(255,255,255,0.72);
        --calc-close-bg: rgba(15,23,42,0.18);
        --calc-close-hover: rgba(15,23,42,0.3);
        --calc-display-top: rgba(61, 75, 49, 0.96);
        --calc-display-bottom: rgba(122, 142, 94, 0.9);
        --calc-display-border: rgba(25, 35, 18, 0.45);
        --calc-display-text: #20301a;
        --calc-display-meta: rgba(33, 45, 22, 0.78);
        --calc-solar-dark: rgba(15, 23, 42, 0.9);
        --calc-solar-light: rgba(71, 85, 105, 0.85);
        --calc-utility-bg: rgba(17, 24, 39, 0.22);
        --calc-utility-border: rgba(255,255,255,0.14);
        --calc-utility-text: #f8fafc;
        --calc-accent-top: #c9a44a;
        --calc-accent-bottom: #a27f27;
        --calc-accent-text: #221805;
        --calc-sub-top: #d2b356;
        --calc-sub-bottom: #b58d2f;
        --calc-sub-border: rgba(92, 67, 17, 0.46);
        --calc-sub-text: #2f2308;
        --calc-key-top: #e5e7eb;
        --calc-key-bottom: #bfc5ce;
        --calc-key-border: rgba(71, 85, 105, 0.34);
        --calc-key-text: #111827;
        --calc-op-top: #7d8795;
        --calc-op-bottom: #5d6673;
        --calc-op-text: #f8fafc;
        background:
            radial-gradient(circle at top left, var(--calc-shell-glow), transparent 28%),
            linear-gradient(180deg, var(--calc-shell-top) 0%, var(--calc-shell-mid) 18%, var(--calc-shell-bottom) 100%);
        border: 1px solid var(--calc-shell-border);
        border-radius: 22px;
        box-shadow:
            0 30px 68px rgba(15, 23, 42, 0.34),
            inset 0 2px 0 rgba(255,255,255,0.16),
            inset 0 -2px 0 rgba(17,24,39,0.28);
    }
    #calc-widget[data-calc-theme="field"] {
        --calc-shell-top: #7c6230;
        --calc-shell-mid: #5e4b29;
        --calc-shell-bottom: #342d22;
        --calc-shell-glow: rgba(255, 226, 147, 0.18);
        --calc-shell-border: rgba(56, 43, 14, 0.54);
        --calc-header-text: #fff9eb;
        --calc-header-subtle: rgba(255, 244, 214, 0.76);
        --calc-close-bg: rgba(56, 43, 14, 0.28);
        --calc-close-hover: rgba(56, 43, 14, 0.42);
        --calc-display-top: rgba(84, 99, 50, 0.96);
        --calc-display-bottom: rgba(159, 177, 97, 0.92);
        --calc-display-border: rgba(44, 55, 21, 0.52);
        --calc-display-text: #1f2d12;
        --calc-display-meta: rgba(43, 53, 18, 0.78);
        --calc-solar-dark: rgba(34, 25, 10, 0.92);
        --calc-solar-light: rgba(98, 78, 41, 0.82);
        --calc-utility-bg: rgba(39, 30, 10, 0.26);
        --calc-utility-border: rgba(255, 225, 152, 0.18);
        --calc-utility-text: #fff5d6;
        --calc-accent-top: #f2c55b;
        --calc-accent-bottom: #c78e1d;
        --calc-accent-text: #2e1f04;
        --calc-sub-top: #e2b851;
        --calc-sub-bottom: #b17618;
        --calc-sub-border: rgba(98, 59, 7, 0.48);
        --calc-sub-text: #2e1d07;
        --calc-key-top: #f0dfba;
        --calc-key-bottom: #c9af77;
        --calc-key-border: rgba(101, 74, 23, 0.34);
        --calc-key-text: #2d2415;
        --calc-op-top: #4d5f44;
        --calc-op-bottom: #2d3a28;
        --calc-op-text: #f8f7ed;
    }
    #calc-widget[data-calc-theme="terminal"] {
        --calc-shell-top: #16271e;
        --calc-shell-mid: #101a15;
        --calc-shell-bottom: #0a100d;
        --calc-shell-glow: rgba(102, 255, 181, 0.08);
        --calc-shell-border: rgba(70, 255, 163, 0.16);
        --calc-header-text: #c8ffdf;
        --calc-header-subtle: rgba(165, 255, 201, 0.62);
        --calc-close-bg: rgba(14, 31, 22, 0.72);
        --calc-close-hover: rgba(23, 56, 39, 0.88);
        --calc-display-top: rgba(8, 28, 16, 0.98);
        --calc-display-bottom: rgba(16, 56, 31, 0.94);
        --calc-display-border: rgba(79, 255, 159, 0.18);
        --calc-display-text: #97ffbb;
        --calc-display-meta: rgba(124, 255, 178, 0.58);
        --calc-solar-dark: rgba(7, 18, 12, 0.94);
        --calc-solar-light: rgba(19, 54, 33, 0.92);
        --calc-utility-bg: rgba(8, 25, 16, 0.88);
        --calc-utility-border: rgba(79, 255, 159, 0.14);
        --calc-utility-text: #c8ffdf;
        --calc-accent-top: #1a3c27;
        --calc-accent-bottom: #102718;
        --calc-accent-text: #9effbf;
        --calc-sub-top: #193626;
        --calc-sub-bottom: #102317;
        --calc-sub-border: rgba(79, 255, 159, 0.12);
        --calc-sub-text: #b8ffcf;
        --calc-key-top: #15291f;
        --calc-key-bottom: #0c1711;
        --calc-key-border: rgba(79, 255, 159, 0.12);
        --calc-key-text: #c8ffdf;
        --calc-op-top: #214631;
        --calc-op-bottom: #102718;
        --calc-op-text: #9effbf;
    }
    #calc-widget.open,
    #calc-widget.dragging {
        z-index: calc(var(--z-max) + 3) !important;
    }
    #calc-widget .tool-header {
        justify-content: flex-start;
        align-items: flex-start;
        padding: 14px 16px 8px;
        color: var(--calc-header-text);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    .calc-header-stack {
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding-right: 42px;
    }
    .calc-header-kicker {
        font-size: 8px;
        font-weight: 800;
        color: var(--calc-header-subtle);
        letter-spacing: 0.18em;
    }
    .calc-header-title {
        font-size: 13px;
        font-weight: 800;
        color: var(--calc-header-text);
        letter-spacing: 0.04em;
    }
    #calc-widget .tool-close {
        background: var(--calc-close-bg);
        color: var(--calc-header-text);
    }
    #calc-widget .tool-close:hover { background: var(--calc-close-hover); }
    .calc-display-shell {
        margin: 0 16px 10px;
        padding: 10px 12px 12px;
        border-radius: 13px;
        background:
            linear-gradient(180deg, var(--calc-display-top), var(--calc-display-bottom));
        border: 1px solid var(--calc-display-border);
        box-shadow:
            inset 0 2px 3px rgba(20, 26, 15, 0.42),
            inset 0 -1px 0 rgba(228, 237, 207, 0.28);
    }
    .calc-solar-strip {
        width: 96px;
        height: 12px;
        margin-left: auto;
        margin-bottom: 8px;
        border-radius: 4px;
        background:
            repeating-linear-gradient(
                90deg,
                var(--calc-solar-dark) 0 10px,
                var(--calc-solar-light) 10px 14px
            );
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
        opacity: 0.88;
    }
    .calc-display-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.1em;
        color: var(--calc-display-meta);
    }
    #calc-display {
        width: 100%;
        box-sizing: border-box;
        border: none;
        background: transparent;
        padding: 0;
        font-size: clamp(34px, 8vw, 42px);
        font-family: "Courier New", monospace;
        font-weight: 700;
        text-align: right;
        color: var(--calc-display-text);
        outline: none;
        letter-spacing: 0.03em;
        text-shadow: 0 1px 0 rgba(236, 245, 219, 0.32);
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        scrollbar-width: none;
