<!--
// ============================================================
// FILE: _styles_responsive.html
// ROLE: Desktop optimization and mobile responsive breakpoints
// DEPENDS ON: _styles_base.html, _styles_layout.html
// DEPENDED ON BY: WebApp.html
// MOBILE NOTES: Contains laptop/desktop @media queries, calendar/calculator widgets, morning brief, WS12 mobile breakpoints (≤768px).
// AGENT NOTES: All selectors here override desktop defaults. Read WS12 breakpoint comments before editing mobile rules.
// ============================================================
-->
<style>
      /* 💻 LAPTOP & SMALL DESKTOP OPTIMIZATION (Screens up to 1080p / 16-inch MBP) */
      @media screen and (max-width: 1920px) {
          .inbox-sidebar {
              width: 320px !important;
              min-width: 320px !important;
              max-width: 320px !important;
          }
          .outbox-pane {
              width: 320px !important;
              min-width: 320px !important;
          }

          .email-card { padding: 10px 12px 8px !important; }
          .em-fdh { font-size: 11px !important; }
          .glass-pill { font-size: 8px !important; padding: 2px 6px !important; }
          .tag { font-size: 7.5px !important; padding: 2px 4px !important; }

          .panel-tab-bar { padding: 0 10px !important; }
          .admin-kpi { padding: 8px 4px !important; min-width: 70px !important; }
          .admin-kpi-val { font-size: 16px !important; }
          .admin-kpi-label { font-size: 7.5px !important; }
          .admin-list-card { padding: 10px 12px !important; }
          .vendor-bubble { font-size: 10px !important; padding: 10px !important; }
          .action-box { font-size: 10px !important; padding: 10px !important; }

          body.deck-mode-active #deck-stage {
              padding: var(--dock-content-offset, 92px) 24px 20px !important;
              gap: 20px !important;
          }
          #deck-stage-card {
              border-radius: var(--desktop-shell-radius, 24px) !important;
          }
          .slide-header {
              padding: 12px 20px !important;
          }
          .slide-body {
              padding: 16px 20px !important;
              gap: 24px !important;
          }
          .slide-footer {
              padding: 12px 20px !important;
          }

          .slide-hdr-id { font-size: 24px !important; }
          .deck-stage .slide-q-label { font-size: 10px !important; }
          .deck-stage .slide-input { width: 150px !important; max-width: 150px !important; }
          .deck-modules-body { padding: 12px 16px !important; gap: 16px !important; }
          .deck-module .slide-q-row { gap: 12px !important; }
          .deck-stage .slide-input-wrap { width: 180px !important; }
          .deck-stage .slide-q-action.checkbox-action { min-width: 40px !important; max-width: 60px !important; }

          .pane-content {
              padding: var(--dock-content-offset, 88px) 16px calc(16px + var(--raw-strip-height, 0px)) !important;
          }
          #grid-content {
              grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
              gap: 12px !important;
              padding: var(--dock-content-offset, 60px) 16px 16px !important;
          }

          .top-nav {
              padding: 8px 12px 6px !important;
              gap: 8px !important;
          }
          .nav-brand {
              font-size: 14px !important;
              padding: 8px 12px !important;
          }

          /* 7. Tighten the Dynamic Dock */
          .filter-strip {
              padding: 6px 10px !important;
              border-radius: 28px !important;
          }
          .filter-strip input[type="text"],
          .ms-display {
              height: 30px !important;
              padding: 0 12px !important;
              font-size: 10px !important;
          }
          .smart-dock .btn {
              height: 30px !important;
              padding: 0 12px !important;
              font-size: 9px !important;
          }
          .dock-arrow {
              width: 28px !important;
              height: 28px !important;
              font-size: 22px !important;
              padding-bottom: 2px !important;
          }
      }


    /* iOS STYLE UTILITY WIDGETS */
    .tool-widget {
        position: absolute; width: 300px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 28px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.6);
        z-index: var(--z-widget); display: none; flex-direction: column; overflow: hidden;
        transform-origin: top center;
        will-change: transform, opacity;
    }
    body.dark-mode .tool-widget {
        background: rgba(30, 30, 36, 0.65);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }
    .tool-widget.open {
        display: flex;
        animation: widget-spring-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    body.deck-mode-active .tool-widget,
    body.presentation-active .tool-widget {
        z-index: var(--z-popover) !important;
    }
    @keyframes widget-spring-pop {
        0%   { opacity: 0; transform: scale(0.5) translate(-40px, -30px); }
        100% { opacity: 1; transform: scale(1) translate(0, 0); }
    }
    .tool-header {
        position: relative; display: flex; justify-content: center; align-items: center;
        padding: 16px 18px 12px;
        font-weight: 700; font-size: 13px; color: var(--text-main); letter-spacing: -0.3px;
    }
    #calc-widget .tool-header {
        cursor: grab;
        touch-action: none;
        user-select: none;
    }
    #calc-widget.dragging .tool-header {
        cursor: grabbing;
    }
    .tool-close {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        background: rgba(120,120,128,0.16); border: none; cursor: pointer;
        color: var(--text-muted); display: flex; align-items: center; justify-content: center;
        width: 26px; height: 26px; border-radius: 50%; transition: background 0.2s; padding: 0;
    }
    .tool-close:hover { background: rgba(120,120,128,0.3); }
    .tool-close svg { width: 12px; height: 12px; stroke-width: 2.5; }

    /* Calendar */
    #cal-widget {
        width: 600px;
        max-width: min(90vw, 600px);
        max-height: min(72vh, 700px);
        background: color-mix(in srgb, var(--card-bg) 98%, transparent);
        border-color: color-mix(in srgb, var(--border) 88%, white 12%);
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.74);
    }
    body.dark-mode #cal-widget {
        background: color-mix(in srgb, var(--card-bg) 92%, transparent);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .cal-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
        padding: 0 14px 6px;
    }
    .cal-summary-card {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 6px 8px;
        border-radius: 10px;
        background: color-mix(in srgb, var(--bg) 68%, var(--card-bg));
        border: 1px solid color-mix(in srgb, var(--border) 68%, transparent);
        box-shadow: none;
    }
    .cal-summary-label {
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.9px;
        text-transform: uppercase;
        color: var(--text-muted);
    }
    .cal-summary-value {
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: var(--text-main);
        line-height: 1;
    }
    .cal-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 0 14px 8px;
    }
    .cal-legend-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 22px;
        padding: 0 9px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 0.7px;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
    }
    .cal-legend-pill:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
    }
    .cal-legend-pill:not(.is-active) {
        opacity: 0.48;
        box-shadow: none;
    }
    .cal-legend-pill-start,
    .cal-event-pill-start {
        color: #7a4a00;
        background: rgba(250, 204, 21, 0.22);
        border-color: rgba(234, 179, 8, 0.18);
    }
    .cal-legend-pill-complete,
    .cal-event-pill-complete {
        color: #166534;
        background: rgba(74, 222, 128, 0.18);
        border-color: rgba(34, 197, 94, 0.18);
    }
    .cal-legend-pill-ofs,
    .cal-event-pill-ofs {
        color: #1d4ed8;
        background: rgba(59, 130, 246, 0.16);
        border-color: rgba(59, 130, 246, 0.18);
    }
    body.dark-mode .cal-legend-pill-start,
    body.dark-mode .cal-event-pill-start {
        color: #fde68a;
        background: rgba(234, 179, 8, 0.18);
        border-color: rgba(250, 204, 21, 0.16);
    }
    body.dark-mode .cal-legend-pill-complete,
    body.dark-mode .cal-event-pill-complete {
        color: #bbf7d0;
        background: rgba(22, 163, 74, 0.18);
        border-color: rgba(74, 222, 128, 0.16);
    }
    body.dark-mode .cal-legend-pill-ofs,
    body.dark-mode .cal-event-pill-ofs {
        color: #bfdbfe;
        background: rgba(37, 99, 235, 0.22);
        border-color: rgba(96, 165, 250, 0.2);
    }
    .cal-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2px 14px 8px;
        font-weight: 700;
        font-size: 12px;
        color: var(--text-main);
    }
    .cal-nav button {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px 10px;
        color: var(--accent);
        font-size: 24px;
        font-weight: 300;
        line-height: 1;
        transition: opacity 0.2s;
    }
    .cal-nav button:hover { opacity: 0.7; }
    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0;
        padding: 0 14px 14px;
        text-align: left;
        overflow-y: visible;
        min-height: 0;
        border-top: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-left: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        background: color-mix(in srgb, var(--card-bg) 96%, var(--bg));
    }
    .cal-day-header {
        font-size: 8px;
        font-weight: 900;
        color: var(--text-muted);
        padding: 8px 4px 7px;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        border-right: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        background: color-mix(in srgb, var(--card-bg) 98%, var(--bg));
        text-align: center;
    }
    .cal-cell {
        aspect-ratio: 1 / 0.94;
        min-height: 78px;
        padding: 5px 5px 6px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 2px;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-main);
        background: color-mix(in srgb, var(--card-bg) 98%, var(--bg));
        border-right: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--border) 64%, transparent);
        box-sizing: border-box;
    }
    .cal-cell.empty {
        background: color-mix(in srgb, var(--bg) 98%, transparent);
        box-shadow: none;
    }
    .cal-cell.today {
        background: color-mix(in srgb, var(--accent) 4%, var(--card-bg));
        box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.08);
    }
    .cal-cell-day {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 10px;
        font-weight: 900;
        color: var(--text-main);
        min-height: 18px;
    }
    .cal-cell.today .cal-cell-day-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
    }
    .cal-cell-events {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-height: 0;
    }
    .cal-event-pill {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 16px;
        padding: 0 5px;
        border-radius: 4px;
        border: none;
        font-size: 7px;
        font-weight: 900;
        letter-spacing: 0.1px;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
    }
    .cal-event-pill:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
    }
    .cal-more {
        display: inline-flex;
        align-items: center;
        min-height: 16px;
        padding: 0 5px;
        border-radius: 4px;
        border: 1px dashed var(--border);
        color: var(--text-muted);
        font-size: 7px;
        font-weight: 800;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        background: color-mix(in srgb, var(--card-bg) 68%, transparent);
    }
    @media (max-width: 640px) {
        #cal-widget {
            width: min(96vw, 600px);
            max-height: 84vh;
        }
        .cal-summary {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .cal-cell {
            min-height: 74px;
            padding: 5px 5px 6px;
        }
        .cal-event-pill {
            padding: 0 5px;
            font-size: 7px;
        }
    }

    /* Calculator */
    #calc-widget {
        width: 320px;
        background: linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.98));
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 32px 72px rgba(15, 23, 42, 0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    #calc-widget .tool-header {
        color: rgba(248, 250, 252, 0.92);
        padding: 18px 18px 10px;
        font-size: 12px;
        letter-spacing: 0.02em;
    }
    #calc-widget .tool-close {
        background: rgba(255,255,255,0.08);
        color: rgba(248,250,252,0.78);
    }
    #calc-widget .tool-close:hover { background: rgba(255,255,255,0.16); }
    #calc-display {
        width: 100%;
        box-sizing: border-box;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        background: transparent;
        padding: 10px 22px 14px;
        font-size: 50px;
        font-family: -apple-system, "SF Pro Display", sans-serif;
        font-weight: 250;
        text-align: right;
        color: #f8fafc;
        outline: none;
        letter-spacing: -0.04em;
    }
    .calc-sub-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding: 14px 14px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .calc-sub-btn {
        background: linear-gradient(180deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
        border: 1px solid rgba(147,197,253,0.28);
        padding: 11px 0;
        font-size: 8px;
        font-weight: 900;
        color: #eff6ff;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
        letter-spacing: 0.45px;
        border-radius: 14px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 8px 18px rgba(37,99,235,0.28);
    }
    .calc-sub-btn:hover { filter: brightness(1.06); }
    .calc-sub-btn:active { transform: scale(0.97); }
    .calc-keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        padding: 14px;
    }
    .calc-btn {
        background: linear-gradient(180deg, rgba(71,85,105,0.86), rgba(51,65,85,0.94));
        border: 1px solid rgba(255,255,255,0.06);
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 500;
        color: #f8fafc;
        cursor: pointer;
        border-radius: 50%;
        transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 12px 20px rgba(2,6,23,0.24);
    }
    .calc-btn:hover { filter: brightness(1.05); }
    .calc-btn:active { transform: scale(0.96); }
    .calc-btn.op {
        background: linear-gradient(180deg, #f97316, #ef4444);
        color: #fff7ed;
        font-size: 24px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 22px rgba(239,68,68,0.28);
    }
    .calc-btn.top-op {
        background: linear-gradient(180deg, rgba(148,163,184,0.95), rgba(100,116,139,0.96));
        color: #f8fafc;
        font-size: 16px;
        font-weight: 700;
    }
    .calc-btn.zero {
        grid-column: span 2;
        border-radius: 999px;
        aspect-ratio: auto;
        padding: 0 28px;
        justify-content: flex-start;
    }

/* Shared-shell mobile breakpoints (<=480px) */
@media (max-width: 480px) {

    /* Touch targets */
    .smart-dock .btn,
    .filter-strip .btn {
        min-height: 44px !important;
        height: 44px !important;
    }
    .slide-action-deck .btn,
    .slide-action-deck .dock-arrow {
        min-height: 44px !important;
        height: 44px !important;
        min-width: 44px !important;
    }
    .filter-strip input[type="text"],
    .filter-strip select {
        min-height: 44px !important;
        font-size: 16px !important; /* prevent iOS zoom on focus */
    }

    /* ── Filter rail: hidden by default, toggled via body class ── */
    .filter-strip.smart-dock {
        display: none !important;
    }
    body.mobile-filter-open::after {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.34);
        z-index: var(--z-overlay);
        pointer-events: none;
    }
    body.mobile-filter-open .filter-strip.smart-dock {
        display: flex !important;
        position: fixed !important;
        bottom: calc(56px + env(safe-area-inset-bottom)) !important;
        left: 0 !important;
        right: 0 !important;
        top: auto !important;
        z-index: var(--z-drawer) !important;
        border-radius: 18px 18px 0 0 !important;
        padding: 16px 16px calc(16px + env(safe-area-inset-bottom)) !important;
        max-height: 60vh !important;
        overflow-y: auto !important;
        box-shadow: 0 -18px 44px rgba(15,23,42,0.24) !important;
        border-top: 1px solid var(--border) !important;
        border-left: none !important;
        border-right: none !important;
        border-bottom: none !important;
        align-content: flex-start !important;
        gap: 10px !important;
    }
    body.mobile-filter-open .filter-strip.smart-dock::before {
        content: "";
        width: 36px;
        height: 4px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--text-muted) 45%, transparent);
        margin: 0 auto 8px;
        display: block;
        flex: 0 0 100%;
    }

    /* ── Inbox sidebar: sticky header ── */
    .inbox-header {
        position: sticky !important;
        top: 0 !important;
        z-index: 10 !important;
        background: var(--bg) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
    }
    .inbox-list {
        padding-bottom: 24px !important;
    }

    /* ── Detail pane padding ── */
    .pane-content {
        padding-top: 8px !important;
        padding-bottom: 24px !important;
        padding-left: var(--m-gutter, 16px) !important;
        padding-right: var(--m-gutter, 16px) !important;
    }
    #grid-content {
        padding-top: 0 !important;
        padding-bottom: 24px !important;
    }
    #welcome-screen {
        display: none !important;
    }

    /* ── Detail hero hierarchy ── */
    .qb-proj-id {
        font-size: 24px !important;
        font-weight: 800 !important;
        letter-spacing: -0.4px !important;
        line-height: 1.1 !important;
    }
    .qb-proj-meta {
        font-size: 14px !important;
        font-weight: 500 !important;
        line-height: 1.25 !important;
    }
    #project-schedule-card .qb-proj-title {
        flex-direction: column !important;
        gap: 10px !important;
        align-items: flex-start !important;
    }
    #project-schedule-card .glass-pill {
        font-size: 10px !important;
        width: 100% !important;
        justify-content: center !important;
        box-sizing: border-box !important;
    }

    /* ── qb-top-row: single-column stack ── */
    #project-schedule-card {
        flex-basis: 100% !important;
        min-width: 0 !important;
        border-right: none !important;
        border-bottom: 1px solid var(--border) !important;
    }
    #velocity-production-card {
        flex-basis: 100% !important;
        min-width: 0 !important;
    }
    .qb-top-row {
        border-bottom: 0 !important;
    }
    /* Flat native sections — no card chrome on phone */
    .qb-module {
        border-radius: 0 !important;
        border: none !important;
        border-bottom: 1px solid var(--border) !important;
        margin-bottom: 0 !important;
        padding: 16px var(--m-gutter, 16px) !important;
        background: transparent !important;
    }
    .qb-module-header {
        font-size: 12px !important;
        font-weight: 800 !important;
        letter-spacing: 0.4px !important;
        margin-bottom: 10px !important;
    }

    /* ── interaction-split: stack at phone width ── */
    .col-left-vendor,
    .col-right-note {
        min-width: 0 !important;
        flex-basis: 100% !important;
    }
    .interaction-split {
        gap: 12px !important;
    }
}

/* ── Phone: undo laptop inbox-sidebar width lock ── */
@media (max-width: 480px) {
    .inbox-sidebar { width: 100% !important; min-width: 0 !important; max-width: 100% !important; }
    .outbox-pane   { width: auto !important; min-width: 0 !important; max-width: none !important; }
