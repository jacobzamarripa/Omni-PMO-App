<script>
// ============================================================
// FILE: _module_router.html | ROLE: Workspace routing, dock sync, detail-face orchestration, and panel tabs
// DEPENDS ON: _state_router.html, _state_queue.html, _state_session.html, _utils_shared.html, _utils_notifications.html, _module_admin.html, _module_deck.html, _module_gantt.html
// DEPENDED ON BY: _module_tabs.html, _module_webapp_core.html, WebApp.html
// ============================================================
// STATE: _SLIDE_SVG — slide face icon for workspace chrome
const _SLIDE_SVG = `<span class="dock-face-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="13" rx="2"></rect><path d="M8 21h8"></path><path d="M12 18v3"></path><path d="M15 9l-4 3 4 3"></path></svg></span>`;

let pendingDockMotionOrigin = null;
let lastDockContextZoneId = null;

function primeDockMotionOrigin(el, context) {
    if (!el || typeof el.getBoundingClientRect !== 'function') return;
    const rect = el.getBoundingClientRect();
    pendingDockMotionOrigin = {
        x: rect.left + (rect.width / 2),
        y: rect.top + (rect.height / 2),
        context: context || null,
        ts: Date.now()
    };
    el.classList.remove('is-dock-origin-tap');
    void el.offsetWidth;
    el.classList.add('is-dock-origin-tap');
    setTimeout(() => el.classList.remove('is-dock-origin-tap'), 420);
}

function getActiveDockContextZone() {
    if (currentWorkspaceView === 'gantt') return getEl('dock-gantt-actions-zone');
    if (currentWorkspaceView === 'grid') return getEl('dock-pivot-zone');
    if (currentWorkspaceView === 'detail' && isDeckMode) {
        const slideDeck = getEl('slide-action-deck');
        if (slideDeck && slideDeck.classList.contains('visible')) return slideDeck;
    }
    if (currentWorkspaceView === 'detail') return getEl('dock-focus-zone');
    return null;
}

function animateDockZoneEmergence(zone) {
    if (!zone) return;
    const zoneRect = zone.getBoundingClientRect();
    let shiftX = 0;
    let shiftY = currentWorkspaceView === 'gantt' ? 18 : -18;
    const origin = pendingDockMotionOrigin;

    let profile = {
        duration: '460ms',
        childDuration: '480ms',
        startScale: '0.84',
        overshootScale: '1.03',
        startBlur: '7px'
    };

    if (currentWorkspaceView === 'grid') {
        profile = {
            duration: '390ms',
            childDuration: '420ms',
            startScale: '0.90',
            overshootScale: '1.02',
            startBlur: '4px'
        };
    } else if (currentWorkspaceView === 'gantt') {
        profile = {
            duration: '520ms',
            childDuration: '540ms',
            startScale: '0.80',
            overshootScale: '1.06',
            startBlur: '8px'
        };
        shiftY = 26;
    } else if (currentWorkspaceView === 'detail' && isDeckMode) {
        profile = {
            duration: '560ms',
            childDuration: '580ms',
            startScale: '0.78',
            overshootScale: '1.08',
            startBlur: '9px'
        };
    }

    if (origin && (Date.now() - origin.ts) < 1200) {
        const zoneCenterX = zoneRect.left + (zoneRect.width / 2);
        const zoneCenterY = zoneRect.top + (zoneRect.height / 2);
        shiftX = Math.max(-180, Math.min(180, origin.x - zoneCenterX));
        shiftY = Math.max(-90, Math.min(90, origin.y - zoneCenterY));
    }

    zone.style.setProperty('--dock-zone-duration', profile.duration);
    zone.style.setProperty('--dock-zone-child-duration', profile.childDuration);
    zone.style.setProperty('--dock-zone-start-scale', profile.startScale);
    zone.style.setProperty('--dock-zone-overshoot-scale', profile.overshootScale);
    zone.style.setProperty('--dock-zone-start-blur', profile.startBlur);
    zone.style.setProperty('--dock-zone-origin-x', `${Math.round(shiftX)}px`);
    zone.style.setProperty('--dock-zone-origin-y', `${Math.round(shiftY)}px`);
    zone.classList.remove('is-emerging');
    void zone.offsetWidth;
    zone.classList.add('is-emerging');
    setTimeout(() => zone.classList.remove('is-emerging'), 480);
    pendingDockMotionOrigin = null;
}

function syncDockContextChoreography() {
    const activeZone = getActiveDockContextZone();
    const nextZoneId = activeZone && !activeZone.classList.contains('collapsed') ? activeZone.id : null;
    const shouldAnimate = nextZoneId && (nextZoneId !== lastDockContextZoneId || pendingDockMotionOrigin);
    lastDockContextZoneId = nextZoneId;
    if (shouldAnimate) animateDockZoneEmergence(activeZone);
}

function syncWorkspaceModeState() {
    isGridMode = (currentWorkspaceView === 'grid');
    isDeckMode = isSlideFaceActive();

    document.body.classList.remove('grid-mode-active', 'deck-mode-active', 'gantt-view-active', 'digest-mode-active', 'dashboard-active', 'upload-view-active', 'action-view-active');
    if (isGridMode) document.body.classList.add('grid-mode-active');
    if (isDeckMode) document.body.classList.add('deck-mode-active');
    if (currentWorkspaceView === 'gantt')  document.body.classList.add('gantt-view-active');
    if (currentWorkspaceView === 'upload') document.body.classList.add('upload-view-active');
    if (currentWorkspaceView === 'action') document.body.classList.add('action-view-active');
}

function syncWorkspaceChrome() {
    if (currentWorkspaceView === 'dashboard') return;
    ['detail', 'grid', 'gantt', 'action'].forEach(v => {
        const btn = getEl(`view-btn-${v}`);
        if (btn) btn.classList.toggle('active', v === currentWorkspaceView);
    });

    const isDetailMode = currentWorkspaceView === 'detail';
    const isGridModeView = currentWorkspaceView === 'grid';
    const isGanttView = currentWorkspaceView === 'gantt';
    const pivotZone = getEl('dock-pivot-zone');
    const groupZone = getEl('dock-group-zone');
    const filtersZone = getEl('dock-filters-zone');
    const focusZone = getEl('dock-focus-zone');
    const clearZone = getEl('dock-clear-zone');
    const faceBtn = getEl('dock-btn-face-toggle');
    const slideDeck = getEl('slide-action-deck');
    const showSlideDeck = isSlideFaceActive() && !isGanttView;
    const groupSelect = getEl('group-by-select');

    if (filtersZone) filtersZone.classList.remove('collapsed');
    if (groupZone) groupZone.classList.remove('collapsed');
    if (pivotZone) pivotZone.classList.toggle('collapsed', !isGridModeView);
    if (focusZone) focusZone.classList.toggle('collapsed', !isDetailMode);
    if (clearZone) clearZone.classList.toggle('collapsed', getEl('btn-clear-filters')?.classList.contains('collapsed') !== false);
    if (pivotZone) pivotZone.classList.toggle('dock-zone-context-active', isGridModeView);
    if (focusZone) focusZone.classList.toggle('dock-zone-context-active', isDetailMode && !isDeckMode);
    const ganttZone = getEl('dock-gantt-actions-zone');
    if (ganttZone) ganttZone.classList.toggle('dock-zone-context-active', isGanttView);
    if (slideDeck) slideDeck.classList.toggle('visible', showSlideDeck && !isGanttView);
    if (slideDeck) slideDeck.classList.toggle('dock-zone-context-active', !!(isDetailMode && isDeckMode));
    if (groupSelect) {
        groupSelect.value = currentGroupBy;
        groupSelect.classList.toggle('is-active', currentGroupBy !== 'none');
    }

    if (faceBtn) {
        faceBtn.style.display = isDetailMode ? 'inline-flex' : 'none';
        faceBtn.classList.toggle('is-slide-cta', !isDeckMode);
        faceBtn.classList.toggle('is-detail-cta', isDeckMode);
        faceBtn.innerHTML = `${_SLIDE_SVG}<span class="btn-label">${isDeckMode ? 'Detail View' : 'Slide View'}</span>`;
    }

    const sortQueue = getEl('sort-queue');
    if (sortQueue) sortQueue.style.display = currentViewMode === 'grid' ? 'none' : '';
    syncSortControls();
    const sidebarPivot = getEl('sidebar-pivot-select');
    if (sidebarPivot) sidebarPivot.style.display = currentViewMode === 'grid' ? 'inline-block' : 'none';
    // FULLSCREEN ORCHESTRATION: keeps Gantt viewport offsets aligned with nav, dock, and active filter pills
    // Z-INDEX DEPENDENCY: top nav, smart dock, floating pills, and Gantt viewport shell
    syncGanttViewportLayout();
    // FULLSCREEN ORCHESTRATION: flips the smart dock between top and bottom placement when entering or leaving Gantt
    // Z-INDEX DEPENDENCY: nav/dock layer, floating pills, and the Gantt workspace shell
    syncDockPlacementState();
    syncRawDataStripState();
    syncSlideActionDeck();
    // FULLSCREEN ORCHESTRATION: swaps Review Hub tab chrome for deck-mode action panel visibility
    // Z-INDEX DEPENDENCY: outbox pane, deck action panel, panel tab bar, and admin FAB anchor
    syncOutboxPanelMode();
    syncDockLayoutSpacing();
    updateFloatingPillsPosition();
    syncDockClearanceState();
    syncDockContextChoreography();
    syncUnifiedFabState();
}

function syncUnifiedFabState() {
    const fab = getEl('unified-filter-fab');
    if (!fab) return;

    // 1. Position: Gantt = Top-Right, Others = Bottom-Right
    const isGantt = currentWorkspaceView === 'gantt';
    fab.classList.toggle('fab-top-right', isGantt);
    fab.classList.toggle('fab-bottom-right', !isGantt);

    // 2. Badge: Sync with active filter count
    const badge = getEl('fab-filter-badge');
    if (badge) {
        const count = typeof getDesktopFiltersActiveCount === 'function' ? getDesktopFiltersActiveCount() : 0;
        badge.textContent = String(count);
        badge.style.display = count > 0 ? 'inline-flex' : 'none';
    }
}

function syncDockPlacementState() {
    const dock = getEl('filter-strip');
    if (!dock) return;
    const nextPlacement = currentWorkspaceView === 'gantt' ? 'bottom' : 'top';
    if (currentDockPlacement === nextPlacement) return;
    // FULLSCREEN ORCHESTRATION: animates dock inversion for Gantt entry/exit so bottom-dock behavior stays in sync
    // Z-INDEX DEPENDENCY: top nav, smart dock, floating pills, and Gantt viewport shell
    dock.classList.remove('dock-slide-down-enter', 'dock-rise-up-enter');
    void dock.offsetWidth;
    dock.classList.add(nextPlacement === 'bottom' ? 'dock-slide-down-enter' : 'dock-rise-up-enter');
    currentDockPlacement = nextPlacement;
    setTimeout(() => {
        dock.classList.remove('dock-slide-down-enter', 'dock-rise-up-enter');
    }, 460);
}

function syncGanttViewportLayout() {
    let nav = document.querySelector('.top-nav');
    let topOffset = nav ? Math.ceil(nav.getBoundingClientRect().bottom) : 72;
    let dock = getEl('filter-strip');
    if (dock && getComputedStyle(dock).display !== 'none') {
        if (currentWorkspaceView !== 'gantt') {
            topOffset = Math.max(topOffset, Math.ceil(dock.getBoundingClientRect().bottom + 10));
        }
    }
    let pills = getEl('active-filter-pills');
    if (pills && pills.childElementCount > 0 && getComputedStyle(pills).display !== 'none' && currentWorkspaceView !== 'gantt') {
        topOffset = Math.max(topOffset, Math.ceil(pills.getBoundingClientRect().bottom + 10));
    }
    // FULLSCREEN ORCHESTRATION: maintains the Gantt viewport's top offset as chrome enters or exits the frame
    // Z-INDEX DEPENDENCY: top nav, smart dock, floating pills, and Gantt timeline viewport
    document.documentElement.style.setProperty('--gantt-top-offset', `${Math.max(0, topOffset)}px`);
    document.documentElement.style.setProperty('--gantt-bottom-offset', '0px');
}

function switchWorkspaceView(mode) {
    if (currentWorkspaceView === 'upload' && mode !== 'upload' && typeof _duConfirmLeaveWithUnsaved === 'function') {
        if (!_duConfirmLeaveWithUnsaved('leave the upload workspace')) return;
        if (typeof _duHasUnsavedChanges === 'function' && _duHasUnsavedChanges()) _duDirty = {};
    }
    if (mode === 'dashboard') {
        if (typeof openDashboard === 'function') openDashboard();
        return;
    }
    const requestedMode = mode;
    const normalizedMode = (requestedMode === 'deck' || requestedMode === 'slide' || requestedMode === 'digest') ? 'detail' : requestedMode;
    if (typeof toggleDesktopFiltersPanel === 'function') {
        const panel = getEl('dock-filters-panel');
        if (panel && panel.classList.contains('is-open')) toggleDesktopFiltersPanel(false);
    }
    if (isDeckMode && normalizedMode !== 'detail') saveCurrentCardState();
    if (currentWorkspaceView === 'gantt' && normalizedMode !== 'gantt') captureGanttScrollState();

    const prevWasSlide = isDeckMode;
    currentWorkspaceView = normalizedMode;
    if (requestedMode === 'detail') currentDetailFace = 'detail';
    if (requestedMode === 'deck' || requestedMode === 'slide') currentDetailFace = 'slide';
    syncWorkspaceModeState();

    if (normalizedMode !== 'grid' && currentGridPivot === 'global-log') {
        currentGridPivot = 'velocity';
        const pivot = getEl('grid-pivot-select');
        if (pivot) pivot.value = currentGridPivot;
    }

    const userFilter = getEl('filter-log-user');
    if (userFilter) {
        userFilter.style.display = (normalizedMode === 'grid' && (currentGridPivot === 'changelog' || currentGridPivot === 'global-log')) ? 'inline-flex' : 'none';
    }

    // FULLSCREEN ORCHESTRATION: synchronizes dock, panel, and workspace chrome before deferred view rendering
    // Z-INDEX DEPENDENCY: top nav, smart dock, outbox pane, deck action deck, and Gantt workspace shell
    syncWorkspaceChrome();

    if (prevWasSlide && normalizedMode !== 'detail') {
        currentGridPivot = deckPrevPivot || currentGridPivot;
        const pivot = getEl('grid-pivot-select');
        if (pivot) pivot.value = currentGridPivot;
    }

    const grid = getEl('grid-content');
    const welcome = getEl('welcome-screen');
    const paneContent = getEl('pane-content');
    const deckStage = getEl('deck-stage');
    const ganttPanel = getEl('gantt-panel');
    const uploadWs = getEl('upload-workspace');
    const actionWs = getEl('action-workspace');
    if (grid) {
        grid.style.display = 'none';
        grid.style.flex = '';
        grid.style.width = '';
    }
    if (paneContent) {
        paneContent.style.display = 'none';
        paneContent.style.flex = '';
        paneContent.style.width = '';
    }
    if (deckStage) {
        deckStage.style.display = 'none';
        deckStage.style.flex = '';
        deckStage.style.width = '';
        deckStage.style.padding = '';
        deckStage.style.overflow = '';
    }
    if (ganttPanel) {
        ganttPanel.style.display = 'none';
        ganttPanel.style.flex = '';
        ganttPanel.style.height = '';
    }
    if (uploadWs) uploadWs.classList.remove('ws-active');
    if (actionWs) actionWs.classList.remove('ws-active');
    if (grid) grid.classList.toggle('active', isGridMode);
    if (typeof closeQuickPeek === 'function') closeQuickPeek();

    // Sync Upload nav button active state
    const uploadBtn = getEl('view-btn-upload');
    if (uploadBtn) uploadBtn.classList.toggle('active', normalizedMode === 'upload');

    setTimeout(() => {
        if (normalizedMode === 'detail') {
            renderDetailWorkspaceFace();
            if (grid) grid.style.display = 'none';
            applyFilters();
        } else if (normalizedMode === 'grid') {
            setAdminPanelOpen(false);
            if (welcome) welcome.style.display = 'none';
            if (paneContent) paneContent.style.display = 'none';
            if (deckStage) deckStage.style.display = 'none';
            if (grid) grid.style.display = 'grid';
            renderGrid();
        } else if (normalizedMode === 'gantt') {
            // FULLSCREEN ORCHESTRATION: hides detail/deck surfaces and promotes the Gantt shell into the active workspace
            // Z-INDEX DEPENDENCY: Gantt panel, smart dock, outbox pane, and top nav
            setAdminPanelOpen(false);
            if (welcome) welcome.style.display = 'none';
            if (paneContent) paneContent.style.display = 'none';
            if (deckStage) deckStage.style.display = 'none';
            if (ganttPanel) ganttPanel.style.display = 'flex';
            if (typeof showGanttScrollHint === 'function') showGanttScrollHint();
            applyFilters();
        } else if (normalizedMode === 'upload') {
            setAdminPanelOpen(false);
            if (welcome) welcome.style.display = 'none';
            if (paneContent) paneContent.style.display = 'none';
            if (deckStage) deckStage.style.display = 'none';
            if (uploadWs) uploadWs.classList.add('ws-active');
            if (typeof initUploadWorkspace === 'function') initUploadWorkspace();
        } else if (normalizedMode === 'action') {
            setAdminPanelOpen(false);
            if (welcome) welcome.style.display = 'none';
            if (paneContent) paneContent.style.display = 'none';
            if (deckStage) deckStage.style.display = 'none';
            if (actionWs) actionWs.classList.add('ws-active');
            if (typeof _renderActionCenter === 'function') _renderActionCenter();
        }

        syncGanttIslandState();
        if (typeof syncDockClearanceState === 'function') {
            syncDockClearanceState();
            setTimeout(syncDockClearanceState, 150);
        }
    }, 40);
}

function syncOutboxPanelMode() {
    let title = getEl('review-hub-title');
    let tabBar = document.querySelector('#review-hub-main-header .panel-tab-bar');
    let hubHeader = getEl('review-hub-main-header');
    let desktopTabStrip = document.querySelector('.ob-desktop-tab-strip');
    let adminKpiRow = getEl('admin-kpi-header-wrap');
    let deckPanel = getEl('deck-action-panel');
    let adminPanel = getEl('ob-panel-admin');
    let reviewedPanel = getEl('ob-panel-reviewed');
    let changelogPanel = getEl('ob-panel-changelog');
    let fab = getEl('admin-fab');
    let isDeckView = isSlideFaceActive();

    if (title) {
        title.innerHTML = '<span>Action</span><span>Panel</span>';
    }
    if (hubHeader) {
        hubHeader.classList.toggle('is-admin-tab', currentPanelTab === 'admin');
        hubHeader.classList.toggle('is-reviewed-tab', currentPanelTab === 'reviewed');
        hubHeader.classList.toggle('is-changelog-tab', currentPanelTab === 'changelog');
        hubHeader.style.display = isDeckView ? 'none' : 'flex';
    }
    if (tabBar) tabBar.style.display = isDeckView ? 'none' : 'flex';
    if (desktopTabStrip) desktopTabStrip.style.display = !isDeckView ? 'flex' : 'none';
    if (adminKpiRow) adminKpiRow.style.display = (!isDeckView && currentPanelTab === 'admin') ? '' : 'none';
    if (deckPanel) deckPanel.style.display = isDeckView ? 'flex' : 'none';

    if (isDeckView) {

        // FULLSCREEN ORCHESTRATION: suppresses panel-tab surfaces while the deck action panel owns the outbox lane
        // Z-INDEX DEPENDENCY: outbox pane, panel tab bar, deck action panel, and admin FAB anchor
        if (adminPanel) adminPanel.style.display = 'none';
        if (reviewedPanel) reviewedPanel.style.display = 'none';
        if (changelogPanel) changelogPanel.style.display = 'none';
        return;
    }

    if (adminPanel) adminPanel.style.display = (currentPanelTab === 'admin') ? 'flex' : 'none';
    if (reviewedPanel) reviewedPanel.style.display = (currentPanelTab === 'reviewed') ? 'flex' : 'none';
    if (changelogPanel) changelogPanel.style.display = (currentPanelTab === 'changelog') ? 'flex' : 'none';
}

function switchPanelTab(tab) {
    currentPanelTab = tab;
    let adminPanel = getEl('ob-panel-admin'), reviewedPanel = getEl('ob-panel-reviewed'), changelogPanel = getEl('ob-panel-changelog');
    let adminTab = getEl('panel-tab-admin'), reviewedTab = getEl('panel-tab-reviewed'), changelogTab = getEl('panel-tab-changelog');
    let hubHeader = getEl('review-hub-main-header');
    let desktopTabStrip = document.querySelector('.ob-desktop-tab-strip');
    let adminKpiRow = getEl('admin-kpi-header-wrap');
    let outboxKpiRow = getEl('outbox-kpi-header-wrap');
    let changelogKpiRow = getEl('changelog-kpi-header-wrap');

    if (adminPanel) adminPanel.style.display = (tab === 'admin') ? 'flex' : 'none';
    if (reviewedPanel) reviewedPanel.style.display = (tab === 'reviewed') ? 'flex' : 'none';
    if (changelogPanel) changelogPanel.style.display = (tab === 'changelog') ? 'flex' : 'none';

    if (adminTab) adminTab.classList.toggle('active', tab === 'admin');
    if (reviewedTab) reviewedTab.classList.toggle('active', tab === 'reviewed');
    if (changelogTab) changelogTab.classList.toggle('active', tab === 'changelog');
    if (hubHeader) {
        hubHeader.classList.toggle('is-admin-tab', tab === 'admin');
        hubHeader.classList.toggle('is-reviewed-tab', tab === 'reviewed');
        hubHeader.classList.toggle('is-changelog-tab', tab === 'changelog');
    }
    
    // Ensure the Review Hub is open when switching tabs (crucial for desktop/iPad)
    if (typeof setAdminPanelOpen === 'function') setAdminPanelOpen(true);

    if (desktopTabStrip) desktopTabStrip.style.display = 'flex';
    if (adminKpiRow) adminKpiRow.style.display = (tab === 'admin') ? '' : 'none';
    if (outboxKpiRow) outboxKpiRow.style.display = (tab === 'reviewed') ? '' : 'none';
    if (changelogKpiRow) changelogKpiRow.style.display = (tab === 'changelog') ? '' : 'none';

    if (tab === 'changelog') {
        try { sessionStorage.setItem(CHANGELOG_PULSE_SESSION_KEY, '1'); } catch (e) {}
        let clBadge = getEl('changelog-badge');
        if (clBadge) clBadge.style.display = 'none';
        renderChangeLog();
    }
    if (typeof syncReviewHubHeaderCount === 'function') syncReviewHubHeaderCount();
    syncOutboxPanelMode();
    if (typeof syncReviewHubControlState === 'function') syncReviewHubControlState();
}

// ── DETAIL-FACE ORCHESTRATION ──
function isSlideFaceActive() {
    return currentWorkspaceView === 'detail' && currentDetailFace === 'slide';
}

function renderDetailWorkspaceFace() {
    if (currentWorkspaceView !== 'detail') return;

    const welcome = getEl('welcome-screen');
    const paneContent = getEl('pane-content');
    const deckStage = getEl('deck-stage');

    if (!currentActiveItem) {
        if (welcome) welcome.style.display = 'flex';
        if (paneContent) paneContent.style.display = 'none';
        if (deckStage) deckStage.style.display = 'none';
        setAdminPanelOpen(false);
        return;
    }

    if (welcome) welcome.style.display = 'none';

    if (isDeckMode) {
        if (paneContent) paneContent.style.display = 'none';
        if (deckStage) {
            deckStage.style.display = 'flex';
            deckStage.style.flex = '';
            deckStage.style.width = '';
            deckStage.style.padding = '';
            deckStage.style.overflow = '';
        }
        
        // Only force open if not explicitly closed by user
        if (!window.__adminPanelExplicitlyClosed) {
            setAdminPanelOpen(true);
        }

        deckIndex = Math.max(0, filteredItems.findIndex(i => i.fdh === currentActiveItem.fdh));
        renderDeckStage();
        syncActivePresentationCardTheme();
        animatePendingFaceTransition();
    } else {
        if (deckStage) deckStage.style.display = 'none';
        if (paneContent) paneContent.style.display = 'flex';
        openPane(currentActiveItem, getEl(`card-${currentActiveItem.fdh}`) || null);
        syncActivePresentationCardTheme();
        animatePendingFaceTransition();
        if (window.innerWidth > 768) syncAdminPanelForViewport();
    }
}

function toggleDetailFace(forceFace) {
    const nextFace = forceFace === 'slide' ? 'slide' : forceFace === 'detail' ? 'detail' : (isDeckMode ? 'detail' : 'slide');
    if (nextFace === 'slide' && !currentActiveItem) {
        showToast('Select a project before opening Slide View.', 'info');
        return;
    }

    pendingFaceAnimation = nextFace;
    currentDetailFace = nextFace;
    syncWorkspaceModeState();
    syncWorkspaceChrome();
    renderDetailWorkspaceFace();
    animateDockFaceShift(nextFace);
    syncGanttIslandState();
}

function animateCardFaceTransition(card, face) {
    if (!card) return;
    card.classList.remove('face-flip-enter', 'face-flip-slide', 'face-flip-detail');
    void card.offsetWidth;
    card.classList.add('face-flip-enter', face === 'slide' ? 'face-flip-slide' : 'face-flip-detail');
    setTimeout(() => {
        card.classList.remove('face-flip-enter', 'face-flip-slide', 'face-flip-detail');
    }, 700);
}

function animatePendingFaceTransition() {
    if (!pendingFaceAnimation) return;
    const face = pendingFaceAnimation;
    pendingFaceAnimation = null;
    requestAnimationFrame(() => animateCardFaceTransition(getActivePresentationCard(), face));
}

function animateDockFaceShift(face) {
    const dock = getEl('filter-strip');
    if (!dock || isPresentationMode || currentWorkspaceView !== 'detail') return;
    dock.classList.remove('dock-slide-down-enter', 'dock-rise-up-enter');
    void dock.offsetWidth;
    dock.classList.add(face === 'slide' ? 'dock-slide-down-enter' : 'dock-rise-up-enter');
    setTimeout(() => {
        dock.classList.remove('dock-slide-down-enter', 'dock-rise-up-enter');
    }, 460);
}

// ── GLOBAL UI EVENT LISTENERS ──
document.addEventListener('click', (e) => {
    // Dropdown auto-close
    if (typeof openDropdownId !== 'undefined' && openDropdownId) {
        let el = document.getElementById(openDropdownId);
        if (el && !el.contains(e.target)) {
            el.classList.remove('open');
            openDropdownId = null;
        }
    }

    // FAB Dropdown auto-close
    let dropdown = document.getElementById('nav-fab-dropdown');
    let trigger = document.getElementById('btn-nav-fab');
    if (dropdown && trigger && dropdown.classList.contains('open')) {
        if (!dropdown.contains(e.target) && !trigger.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    }
});
</script>
