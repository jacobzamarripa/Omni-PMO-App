<script>
// ============================================================
// FILE: _module_webapp_core.html | ROLE: Bootstrap, payload hydration, and desktop app-shell orchestration
// DEPENDS ON: _state_queue.html, _state_router.html, _state_session.html, _state_payload.html, _state_analytics.html, _state_ui_shell.html, _utils_shared.html, _utils_notifications.html, _utils_ui_tokens.html, and extracted _module_*.html owners
// DEPENDED ON BY: WebApp.html
// ============================================================
      window.addEventListener('scroll', updateFloatingPillsPosition, { passive: true });

      function isElementVisiblyRendered(el) {
          if (!el) return false;
          let style = window.getComputedStyle(el);
          return style.display !== 'none' && style.visibility !== 'hidden' && !el.classList.contains('collapsed');
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function syncDockLayoutSpacing() {
          const dock = getEl('filter-strip');
          if (dock) {
              dock.querySelectorAll('.dock-zone').forEach(zone => {
                  if (zone.id === 'dock-system-zone') {
                      zone.classList.remove('is-empty');
                      return;
                  }
                  let hasVisibleControl = Array.from(zone.children).some(child => {
                      if (child.classList && child.classList.contains('dock-divider')) return false;
                      return isElementVisiblyRendered(child);
                  });
                  zone.classList.toggle('is-empty', !hasVisibleControl || zone.classList.contains('collapsed'));
              });
          }

          const slideDeck = getEl('slide-action-deck');
          if (slideDeck) {
              slideDeck.querySelectorAll('.slide-action-cluster').forEach(cluster => {
                  let hasVisibleControl = Array.from(cluster.children).some(child => isElementVisiblyRendered(child));
                  cluster.classList.toggle('is-empty', !hasVisibleControl);
              });
          }
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function updateFloatingPillsPosition() {
          const container = getEl('active-filter-pills');
          if (!container) return;

          const hasPills = container.children.length > 0;
          container.style.opacity = hasPills ? '1' : '0';
          if (!hasPills) return;

          let anchor = null;
          const slideDeck = getEl('slide-action-deck');
          const filterStrip = getEl('filter-strip');
          const filtersPanel = getEl('dock-filters-panel');

          if (filtersPanel && filtersPanel.classList.contains('is-open') && isElementVisiblyRendered(filtersPanel)) {
              anchor = filtersPanel;
          }

          if (!anchor && slideDeck && isElementVisiblyRendered(slideDeck) && slideDeck.classList.contains('visible')) {
              anchor = slideDeck;
          } else if (!anchor && filterStrip && isElementVisiblyRendered(filterStrip)) {
              anchor = filterStrip;
          }

          if (!anchor) {
              container.style.top = '78px';
              container.style.bottom = 'auto';
              return;
          }

          const gap = 8;
          const rect = anchor.getBoundingClientRect();
          const anchorIsBottomDock = currentDockPlacement === 'bottom' || rect.top > (window.innerHeight / 2);

          if (anchorIsBottomDock) {
              container.style.top = 'auto';
              const bottomPx = Math.max(8, window.innerHeight - rect.top + gap);
              container.style.bottom = `${Math.min(bottomPx, Math.max(8, window.innerHeight - 72))}px`;
          } else {
              const topPx = Math.max(8, rect.bottom + gap);
              container.style.top = `${Math.min(topPx, Math.max(8, window.innerHeight - 96))}px`;
              container.style.bottom = 'auto';
          }
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function syncDockClearanceState() {
          let offset = 0;
          let shouldShift = false;
          let dock = getEl('filter-strip');
          let workspace = getEl('main-workspace');
          let pills = getEl('active-filter-pills');
          let body = document.body;
          let topNav = document.querySelector('.top-nav');
          let navRect = topNav ? topNav.getBoundingClientRect() : null;
          if (navRect) {
              document.documentElement.style.setProperty('--dock-clearance-top', `${Math.ceil(navRect.bottom + 10)}px`);
          }

          let contentOffset = 88;
          if (dock && workspace) {
              let workspaceRect = workspace.getBoundingClientRect();
              let dockRect = dock.getBoundingClientRect();
              if (dockRect.width > 0 && dockRect.height > 0) {
                  contentOffset = Math.max(88, Math.ceil((dockRect.bottom - workspaceRect.top) + 14));
              }
          }
          document.documentElement.style.setProperty('--dock-content-offset', `${contentOffset}px`);
          document.documentElement.style.setProperty('--deck-card-max-height', `${Math.max(340, Math.floor(window.innerHeight - contentOffset - 132))}px`);

          if (!dock || !workspace || (window.innerWidth <= 768 && !window.__surfaceIpad) || window.innerWidth > 1800 || currentWorkspaceView === 'gantt') {
              document.documentElement.style.setProperty('--dock-panel-offset', '0px');
              body.classList.remove('dock-clearance-active');
              return;
          }

          if (dock && workspace) {
              let workspaceRect = workspace.getBoundingClientRect();
              let dockRect = dock.getBoundingClientRect();
              let panel = getEl('dock-filters-panel');
              let panelRect = (panel && panel.classList.contains('is-open') && isElementVisiblyRendered(panel)) ? panel.getBoundingClientRect() : null;
              let collisionRect = dockRect;
              if (panelRect) {
                  collisionRect = {
                      left: Math.min(dockRect.left, panelRect.left),
                      right: Math.max(dockRect.right, panelRect.right),
                      top: Math.min(dockRect.top, panelRect.top),
                      bottom: Math.max(dockRect.bottom, panelRect.bottom),
                      width: Math.max(dockRect.right, panelRect.right) - Math.min(dockRect.left, panelRect.left)
                  };
              }
              let clearBottom = collisionRect.bottom;
              let leftRail = workspace.querySelector('.inbox-sidebar');
              let detailMain = workspace.querySelector('.detail-main');
              let outboxPane = getEl('outbox-pane');
              let fabAnchor = document.querySelector('.admin-fab-anchor');
              let topNavLeft = document.querySelector('.top-nav-left');
              let topNavCenter = document.querySelector('.top-nav-center');
              let topNavRight = document.querySelector('.nav-actions');
              let leftRect = (leftRail && getComputedStyle(leftRail).display !== 'none') ? leftRail.getBoundingClientRect() : null;
              let detailRect = (detailMain && getComputedStyle(detailMain).display !== 'none') ? detailMain.getBoundingClientRect() : null;
              let rightRect = null;
              let navLeftRect = topNavLeft ? topNavLeft.getBoundingClientRect() : null;
              let navCenterRect = topNavCenter ? topNavCenter.getBoundingClientRect() : null;
              let navRightRect = topNavRight ? topNavRight.getBoundingClientRect() : null;

          if (outboxPane && outboxPane.classList.contains('open') && getComputedStyle(outboxPane).display !== 'none') {
              rightRect = outboxPane.getBoundingClientRect();
          } else if (fabAnchor && currentWorkspaceView === 'detail') {
                  rightRect = fabAnchor.getBoundingClientRect();
              }

              let overlapX = function(a, b) {
                  if (!a || !b) return 0;
                  return Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
              };

              let dockBottomInWorkspace = Math.max(0, clearBottom - workspaceRect.top);
              let leftOverlap = overlapX(collisionRect, leftRect);
              let rightOverlap = overlapX(collisionRect, rightRect);
              let detailCompression = detailRect ? collisionRect.width >= Math.max(0, detailRect.width - 72) : false;
              let navSideCrowded = false;
              let centerCrowded = false;
              let topNavOverlap = false;

              let overlapY = function(a, b) {
                  if (!a || !b) return 0;
                  return Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
              };

              let overlapXY = function(a, b) {
                  return overlapX(a, b) > 0 && overlapY(a, b) > 0;
              };

              if (navRect) {
                  const navCollisionBand = {
                      left: navRect.left,
                      right: navRect.right,
                      top: navRect.top,
                      bottom: navRect.bottom + 12
                  };
                  topNavOverlap = overlapXY(collisionRect, navCollisionBand);
              }

              if (navCenterRect) {
                  centerCrowded = overlapXY(collisionRect, navCenterRect);
              }
              if (navLeftRect) {
                  navSideCrowded = overlapXY(collisionRect, navLeftRect);
              }
              if (!navSideCrowded && navRightRect) {
                  navSideCrowded = overlapXY(collisionRect, navRightRect);
              }

              const expandedDockCollision = !!panelRect && (
                  leftOverlap > 0 ||
                  rightOverlap > 0 ||
                  detailCompression ||
                  navSideCrowded ||
                  centerCrowded ||
                  topNavOverlap
              );

              // The compact floating dock should no longer push queue/review panes down on its own.
              // Only the expanded desktop filter panel gets to claim extra clearance.
              shouldShift = dockBottomInWorkspace > 0 && expandedDockCollision;

              if (shouldShift) {
                  let desiredTop = dockBottomInWorkspace + 18;
                  offset = Math.max(52, Math.ceil(desiredTop - 12));
              }
          }

          document.documentElement.style.setProperty('--dock-panel-offset', `${offset}px`);
          body.classList.toggle('dock-clearance-active', shouldShift);
      }

      function getActiveSortValue() {
          const queueSort = getEl('sort-queue')?.value || 'default';
          if (currentWorkspaceView === 'gantt' && queueSort === 'default') return 'end';
          return queueSort;
      }

      function syncGanttSort(value) {
          const queueSort = getEl('sort-queue');
          if (queueSort) queueSort.value = value || 'end';
          syncSortControls();
          applyFilters();
      }

      function syncSortControls() {
          const effectiveSort = getActiveSortValue();
          const ganttSort = getEl('gantt-sort-select');
          if (ganttSort) ganttSort.value = effectiveSort;
      }

      let desktopFiltersPanelCloseTimer = null;

      function getDesktopFiltersActiveCount() {
          const counts = ['sev', 'vendor', 'city', 'ofs', 'status'].reduce((sum, key) => {
              return sum + ((activeFilters && Array.isArray(activeFilters[key])) ? activeFilters[key].length : 0);
          }, 0);
          const grouped = currentGroupBy && currentGroupBy !== 'none' ? 1 : 0;
          const pie = activePieStageFilter ? 1 : 0;
          const admin = activeAdminFilter ? 1 : 0;
          return counts + grouped + pie + admin;
      }

      function syncDesktopFiltersLauncherState() {
          const launcher = getEl('dock-btn-filters-launcher');
          const badge = getEl('dock-filters-badge');
          if (!launcher || !badge) return;
          const count = getDesktopFiltersActiveCount();
          badge.textContent = String(count);
          badge.style.display = count > 0 ? 'inline-flex' : 'none';
      }

      function setDesktopPanelLaunchVector(panel, launcher) {
          if (!panel || !launcher) return;
          const launcherRect = launcher.getBoundingClientRect();
          const dockRect = panel.parentElement ? panel.parentElement.getBoundingClientRect() : null;
          if (!dockRect) return;

          const launcherCenterX = launcherRect.left + (launcherRect.width / 2);
          const dockCenterX = dockRect.left + (dockRect.width / 2);
          let shiftX = Math.max(-220, Math.min(220, launcherCenterX - dockCenterX));

          const panelWidth = Math.max(panel.offsetWidth || 0, panel.scrollWidth || 0, 420);
          const half = Math.ceil(panelWidth / 2);
          const viewportMargin = 14;
          const minCenterX = viewportMargin + half;
          const maxCenterX = Math.max(minCenterX, window.innerWidth - viewportMargin - half);
          const unclampedCenterX = dockCenterX + shiftX;
          const clampedCenterX = Math.max(minCenterX, Math.min(maxCenterX, unclampedCenterX));
          shiftX = clampedCenterX - dockCenterX;

          const isGanttDock = document.body.classList.contains('gantt-view-active');
          panel.style.setProperty('--dock-panel-shift-x', `${Math.round(shiftX)}px`);
          panel.style.setProperty('--dock-panel-shift-y', isGanttDock ? '14px' : '-14px');
      }

      function toggleDesktopFiltersPanel(forceOpen) {
          const panel = getEl('dock-filters-panel');
          const launcher = getEl('dock-btn-filters-launcher');
          // UNIFIED FAB REPLACEMENT: launcher might be null, but panel still exists
          if (!panel) return;

          const currentlyOpen = panel.classList.contains('is-open');
          const nextOpen = typeof forceOpen === 'boolean' ? forceOpen : !currentlyOpen;

          if (desktopFiltersPanelCloseTimer) {
              clearTimeout(desktopFiltersPanelCloseTimer);
              desktopFiltersPanelCloseTimer = null;
          }

          if (launcher) setDesktopPanelLaunchVector(panel, launcher);
          else {
              // If launcher is missing (e.g., in Gantt or via FAB), center it or anchor to FAB
              const fab = getEl('unified-filter-fab');
              if (fab) {
                  const fabRect = fab.getBoundingClientRect();
                  const isGantt = currentWorkspaceView === 'gantt';
                  panel.style.setProperty('--dock-panel-shift-x', '0px');
                  panel.style.setProperty('--dock-panel-shift-y', isGantt ? '84px' : '-84px');
                  // We could refine this vector, but centering is safer for now
              }
          }

          if (nextOpen) {
              panel.classList.remove('is-closing');
              panel.classList.add('is-open');
              if (launcher) {
                  launcher.classList.add('is-launching');
                  setTimeout(() => launcher.classList.remove('is-launching'), 430);
              }
              if (launcher) requestAnimationFrame(() => setDesktopPanelLaunchVector(panel, launcher));
          } else {
              panel.classList.add('is-closing');
              panel.classList.remove('is-open');
              desktopFiltersPanelCloseTimer = setTimeout(() => {
                  panel.classList.remove('is-closing');
              }, 230);
          }

          panel.setAttribute('aria-hidden', nextOpen ? 'false' : 'true');
          if (launcher) {
              launcher.setAttribute('aria-expanded', nextOpen ? 'true' : 'false');
              launcher.classList.toggle('is-active', nextOpen);
          }

          syncDockLayoutSpacing();
          updateFloatingPillsPosition();
          syncDockClearanceState();
          syncDesktopFiltersLauncherState();
      }

      function handleFabClick() {
          const isMobile = (!window.__surfaceIpad && window.innerWidth <= 768) || currentWorkspaceView === 'gantt';
          const sheet = getEl('mobile-sf-sheet');
          const isSheetOpen = sheet && sheet.classList.contains('open');

          if (isSheetOpen) {
              closeMobileSFSheet();
              return;
          }
          
          if (isMobile) {
              const fab = getEl('unified-filter-fab');
              if (sheet && fab) {
                  const rect = fab.getBoundingClientRect();
                  sheet.style.transformOrigin = `${rect.left + rect.width/2}px ${rect.top + rect.height/2}px`;
              }
              openMobileSFSheet('filter');
          } else {
              toggleDesktopFiltersPanel();
          }
      }

      // Dynamic Island State Memory

      function restoreDockState() {
          getEl('dock-system-zone').classList.add('collapsed');
          previousDockState.forEach(id => getEl(id)?.classList.remove('collapsed'));
          syncSlideActionDeck();
          syncDockLayoutSpacing();
          updateFloatingPillsPosition();
      }

      // currentPanelTab extracted to _state_router.html
      function persistStagedReviewSession() {
          try {
              sessionStorage.setItem(STAGED_REVIEW_SESSION_KEY, JSON.stringify(stagedDeckItems || []));
              sessionStorage.setItem(STAGED_REVIEW_COLLAPSED_SESSION_KEY, isStagedReviewCollapsed ? '1' : '0');
          } catch (e) {}
      }

      function loadStagedReviewSession() {
          try {
              let raw = sessionStorage.getItem(STAGED_REVIEW_SESSION_KEY);
              let parsed = raw ? JSON.parse(raw) : [];
              stagedDeckItems = Array.isArray(parsed) ? parsed : [];
          } catch (e) {
              stagedDeckItems = [];
          }
          try {
              isStagedReviewCollapsed = sessionStorage.getItem(STAGED_REVIEW_COLLAPSED_SESSION_KEY) === '1';
          } catch (e) {
              isStagedReviewCollapsed = false;
          }
      }

      function reconcileStagedReviewItems() {
          let activeFdhs = new Set(getActiveQueueItems().map(item => String(item.fdh || '')));
          let seen = new Set();
          stagedDeckItems = (stagedDeckItems || []).filter(function(fdh) {
              let key = String(fdh || '');
              if (!key || seen.has(key) || !activeFdhs.has(key)) return false;
              seen.add(key);
              return true;
          });
          persistStagedReviewSession();
      }

      function setStagedReviewCollapsed(collapsed) {
          isStagedReviewCollapsed = !!collapsed;
          persistStagedReviewSession();
          renderOutbox();
      }

      function toggleStagedReviewSection() {
          setStagedReviewCollapsed(!isStagedReviewCollapsed);
      }

      function getStagedReviewItems() {
          let activeLookup = new Map(getActiveQueueItems().map(item => [String(item.fdh || ''), item]));
          return (stagedDeckItems || []).map(fdh => activeLookup.get(String(fdh || ''))).filter(Boolean);
      }

      function getReviewedBadgeCount() {
          return getStagedReviewItems().length + (committedItems || []).length;
      }

      function searchHelp() {
          let input = getEl('help-search-input');
          if (!input) return;
          let filter = input.value.toLowerCase().trim();
          let sections = document.querySelectorAll('#help-panel .help-sec');
          sections.forEach(sec => {
              let title = sec.querySelector('.help-sec-title');
              let titleMatches = !!(title && title.innerText.toLowerCase().includes(filter));
              let hasVisibleContent = titleMatches;
              let items = sec.querySelectorAll('.help-row, .help-wf-step');
              items.forEach(item => {
                  let matches = titleMatches || !filter || item.innerText.toLowerCase().includes(filter);
                  item.style.display = matches ? '' : 'none';
                  if (matches) hasVisibleContent = true;
              });
              let descs = Array.from(sec.children).filter(el => el.classList.contains('hdesc'));
              descs.forEach(desc => {
                  let matches = titleMatches || !filter || desc.innerText.toLowerCase().includes(filter);
                  desc.style.display = matches ? '' : 'none';
                  if (matches) hasVisibleContent = true;
              });
              sec.style.display = hasVisibleContent ? 'flex' : 'none';
          });
      }

      function toggleHelpPanel() {
          let panel = getEl('help-panel'); let overlay = getEl('help-overlay');
          if (!panel) return;
          let isOpen = panel.classList.toggle('open');
          if (overlay) overlay.classList.toggle('open', isOpen);
          if (isOpen) {
              let searchInput = getEl('help-search-input');
              if (searchInput) {
                  searchInput.value = '';
                  searchHelp();
                  setTimeout(() => searchInput.focus(), 300);
              }
          }
      }

      function toggleMobileMenu() {
          let panel = getEl('mobile-menu-panel');
          if (!panel) return;
          const isOpen = panel.classList.toggle('open');
          document.body.classList.toggle('mobile-menu-open', isOpen);
      }

      // Shared-shell mobile filter toggle — operates on the shared .smart-dock, no DOM cloning
      function toggleMobileFilter() {
          const isOpen = document.body.classList.toggle('mobile-filter-open');
          const dock = document.querySelector('.smart-dock');
          if (dock) dock.classList.toggle('mobile-filter-expanded', isOpen);
      }

      // Shared-shell phone back navigation — clear detail view and return to queue
      function closeMobileDetail() {
          document.body.classList.remove('mobile-detail-open');
          setTxt('mobile-back-title', 'Project');
          if (typeof syncMobileDockContext === 'function') syncMobileDockContext();
      }

      function openMobileSFSheet(tab) {
          const sheet = getEl('mobile-sf-sheet');
          const overlay = getEl('mobile-sf-overlay');
          const title = getEl('m-sf-title');
          const fab = getEl('unified-filter-fab');
          if (!sheet || !overlay) return;

          if (title) title.textContent = tab === 'filter' ? 'Filter' : 'Search';
          if (typeof syncMobileSFFilterChips === 'function') syncMobileSFFilterChips();
          sheet.classList.add('open');
          overlay.classList.add('open');
          document.body.classList.add('mobile-sf-open');
          if (fab) fab.classList.add('is-active');

          if (tab === 'search') {
              setTimeout(function() {
                  const inp = getEl('m-sf-search-input');
                  if (inp) inp.focus();
              }, 240);
          }
      }

      function closeMobileSFSheet() {
          const sheet = getEl('mobile-sf-sheet');
          const overlay = getEl('mobile-sf-overlay');
          const fab = getEl('unified-filter-fab');
          if (sheet) sheet.classList.remove('open');
          if (overlay) overlay.classList.remove('open');
          document.body.classList.remove('mobile-sf-open');
          if (fab) fab.classList.remove('is-active');
      }

      function navigateMobileQueue(dir) {
          if (!Array.isArray(filteredItems) || filteredItems.length === 0) return;
          if (typeof currentQueueIndex !== 'number' || currentQueueIndex < 0) currentQueueIndex = 0;
          const nextIdx = (currentQueueIndex + dir + filteredItems.length) % filteredItems.length;
          const nextItem = filteredItems[nextIdx];
          if (!nextItem) return;

          const cardEl = getEl('card-' + nextItem.fdh);
          openPane(nextItem, cardEl);
          centerQueueCardByFdh(nextItem.fdh, 'smooth');
      }

      function syncMobileSFSort() {
          const sfSort = getEl('m-sf-sort-select');
          const desktopSort = getEl('sort-queue');
          if (!sfSort || !desktopSort) return;
          desktopSort.value = sfSort.value;
          applyFilters();
      }

      function syncMobileDockContext() {
          const queueCtx = getEl('m-dock-queue');
          const detailCtx = getEl('m-dock-detail');
          const deckCtx = getEl('m-dock-deck');
          if (!queueCtx || !detailCtx) return;

          const isPhone = window.innerWidth <= 480;
          const isDetail = isPhone && document.body.classList.contains('mobile-detail-open');
          const isDeck = isPhone && document.body.classList.contains('deck-mode-active');

          queueCtx.style.display = (!isDetail && !isDeck) ? 'flex' : 'none';
          detailCtx.style.display = isDetail ? 'flex' : 'none';
          if (deckCtx) deckCtx.style.display = isDeck ? 'flex' : 'none';
      }

      function syncMobileSFFilterChips() {
          const srcGroup = getEl('group-by-select');
          const dstGroup = getEl('m-sf-group-select');
          if (srcGroup && dstGroup) dstGroup.value = srcGroup.value;

          const srcSearch = getEl('search-input');
          const dstSearch = getEl('m-sf-search-input');
          if (srcSearch && dstSearch) dstSearch.value = srcSearch.value;

          const srcSort = getEl('sort-queue');
          const dstSort = getEl('m-sf-sort-select');
          if (srcSort && dstSort) dstSort.value = srcSort.value;
      }

      document.addEventListener('click', function(e) {
          let panel = getEl('mobile-menu-panel');
          if (!panel || !panel.classList.contains('open')) return;
          let btn = getEl('btn-hamburger');
          if (!btn) return;
          if (!panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) panel.classList.remove('open');
      });

      document.addEventListener('click', function(e) {
          const panel = getEl('dock-filters-panel');
          const launcher = getEl('dock-btn-filters-launcher');
          if (!panel || !launcher || !panel.classList.contains('is-open')) return;
          if (panel.contains(e.target) || launcher.contains(e.target)) return;
          toggleDesktopFiltersPanel(false);
      });

      function isIPadLike() {
          if (window.matchMedia('(pointer: coarse) and (min-width: 769px) and (min-height: 600px)').matches) return true;
          let ua = navigator.userAgent;
          if (/iPad/.test(ua)) return true;
          if (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1) return true;
          return false;
      }
      window.addEventListener('resize', () => {
          if (!currentActiveItem || window.innerWidth <= 768) return;
          if (shouldAutoOpenAdminPanel()) {
              setAdminPanelOpen(true);
          } else if (isIPadLike()) {
              setAdminPanelOpen(false);
          }
      });
      window.addEventListener('resize', () => {
          const panel = getEl('dock-filters-panel');
          const launcher = getEl('dock-btn-filters-launcher');
          if (!panel || !launcher || !panel.classList.contains('is-open')) return;
          setDesktopPanelLaunchVector(panel, launcher);
          updateFloatingPillsPosition();
          syncDockClearanceState();
      });
      window.addEventListener('resize', syncDockClearanceState);
    window.addEventListener('resize', syncMobileDockContext);

      // Shared-shell phone landscape behavior — auto-show Gantt and restore on portrait
      let _phonePreGanttView = 'detail';
      let _ganttLandscapeTimer = null;
      function _handleGanttLandscape() {
          clearTimeout(_ganttLandscapeTimer);
          _ganttLandscapeTimer = setTimeout(function() {
              const isPhone = Math.min(window.innerWidth, window.innerHeight) <= 480;
              if (!isPhone) return;
              const isLandscape = window.innerWidth > window.innerHeight;
              if (isLandscape && currentWorkspaceView !== 'gantt') {
                  _phonePreGanttView = currentWorkspaceView || 'detail';
                  if (typeof openGanttView === 'function') openGanttView();
              } else if (!isLandscape && currentWorkspaceView === 'gantt') {
                  switchWorkspaceView(_phonePreGanttView || 'detail');
              }
          }, 150);
      }
      // window.addEventListener('resize', _handleGanttLandscape);
      // window.addEventListener('orientationchange', function() { setTimeout(_handleGanttLandscape, 100); });
      document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
              closeMobileSFSheet();
              if (getEl('dock-filters-panel')?.classList.contains('is-open')) {
                  toggleDesktopFiltersPanel(false);
                  getEl('dock-btn-filters-launcher')?.focus();

      // ── ▶ Run Review — re-runs the diagnostic engine for a given date ────
      function triggerRunReview() {
          let d = new Date();
          let tzOffset = d.getTimezoneOffset() * 60000;
          let localToday = new Date(d.getTime() - tzOffset);
          let maxDateStr = localToday.toISOString().split('T')[0];
          let dateInput = getEl('run-review-date');

          if (dateInput) {
              dateInput.max = maxDateStr;

              let defaultDate = new Date(localToday);
              let dayOfWeek = defaultDate.getUTCDay();
              let currentHour = d.getHours();
              if (dayOfWeek === 5) {                          // Friday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
              } else if (dayOfWeek === 6) {                   // Saturday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 2);
              } else if (dayOfWeek === 0) {                   // Sunday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
              } else if (dayOfWeek === 1 && currentHour < 11) { // Mon before 11 → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 4);
              } else if (dayOfWeek === 1) {                   // Mon after 11 → Fri
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
              } else {                                        // Tue/Wed/Thu → yesterday
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
              }

              dateInput.value = defaultDate.toISOString().split('T')[0];
              checkWeekendHint();
          }

          getEl('run-review-modal')?.classList.add('visible');
      }

      function hl(headerName) {
          let strip = getEl('raw-data-strip');
          if (!strip) return;
          strip.querySelectorAll('.raw-highlight').forEach(el => el.classList.remove('raw-highlight'));
          if (!headerName) return;

          let normalizeHeader = function(value) {
              return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
          };
          let wanted = normalizeHeader(headerName);
          let aliasMap = {
              'budget ofs': ['budget ofs', 'ofs', 'budget ofs date', 'ofs date'],
              'target completion date': ['target completion date', 'target date'],
              'status': ['status', 'qb status'],
              'health flags': ['health flags', 'flags', 'system flags', 'action required'],
              'action required': ['action required', 'manager comment', 'pm note', 'comment', 'health flags'],
              'vendor comment': ['vendor comment', 'comment', 'construction comments'],
              'qb context gaps': ['qb context gaps', 'qb context', 'gaps', 'x ing yes'],
              'light to cabinets': ['light to cabinets', 'light'],
              'hhps': ['hhps', 'bsls', 'hhps'],
              'cx start': ['cx start', 'cx start date'],
              'cx complete': ['cx complete', 'cx complete date'],
              'date': ['date', 'report date']
          };
          let candidateTerms = aliasMap[wanted] || [wanted];
          
          let scoreHeader = function(actualHeader) {
              let actual = normalizeHeader(actualHeader);
              if (!actual || !candidateTerms.length) return -1;
              let best = -1;
              candidateTerms.forEach(function(term) {
                  if (!term) return;
                  if (actual === term) best = Math.max(best, 100);
                  else if (actual === wanted) best = Math.max(best, 95); // Direct input match wins over some aliases
                  else if (actual.indexOf(term) !== -1 || term.indexOf(actual) !== -1) best = Math.max(best, 75);
                  else {
                      let actualTokens = actual.split(' ').filter(Boolean);
                      let termTokens = term.split(' ').filter(Boolean);
                      let overlap = termTokens.filter(function(token) { return actualTokens.indexOf(token) !== -1; }).length;
                      if (overlap > 0) best = Math.max(best, overlap * 20);
                  }
              });
              return best;
          };

          let allCells = Array.from(strip.querySelectorAll('[data-header]'));
          let bestScore = -1;
          allCells.forEach(function(el) {
              bestScore = Math.max(bestScore, scoreHeader(el.getAttribute('data-header')));
          });
          
          let matches = allCells.filter(function(el) {
              return scoreHeader(el.getAttribute('data-header')) === bestScore && bestScore > 0;
          });
          
          matches.forEach(function(el) { el.classList.add('raw-highlight'); });
          
          let dataCell = matches.find(function(el) { return el.tagName === 'TD'; }) || matches[0];
          if (dataCell) {
              window.clearTimeout(window._rawStripCenterTimer);
              window._rawStripCenterTimer = window.setTimeout(function() {
                  // Use getBoundingClientRect for absolute relative positioning within the scroll container
                  const stripRect = strip.getBoundingClientRect();
                  const cellRect = dataCell.getBoundingClientRect();
                  const scrollLeft = strip.scrollLeft;
                  
                  // targetLeft is the position of the cell relative to the start of the scroll content
                  // (cellRect.left - stripRect.left) gives current visible offset
                  // Adding scrollLeft gives absolute offset from content start
                  const absoluteCellLeft = scrollLeft + (cellRect.left - stripRect.left);
                  const centerOffset = (stripRect.width - cellRect.width) / 2;
                  
                  let targetLeft = absoluteCellLeft - Math.max(0, centerOffset);
                  let maxLeft = Math.max(0, strip.scrollWidth - strip.clientWidth);
                  
                  strip.scrollTo({ 
                      left: Math.min(Math.max(0, targetLeft), maxLeft), 
                      behavior: 'smooth' 
                  });
              }, 40);
          }
      }

                    let opt = document.createElement('option'); opt.value = m; opt.text = m; ofsDropdown.appendChild(opt);
                });
            }
            applyFilters();
            showStartupSelector();
            // Re-apply theme after bootstrap to ensure icon renders
            if (typeof applyTheme === 'function') {
                applyTheme(_sysDark && _sysDark.matches);
            }
        });
        if (!initOk) {
            reportStartupPhase('dashboard-init-failure', 'safeExecute(initDashboard) reported a UI crash');
            showStartupFailure(
                'Frontend Initialization Crash',
                'Dashboard data loaded, but the UI failed while rendering startup state.',
                'Check the console for the original stack trace from safeExecute(initDashboard).'
            );
            return;
        }
        reportStartupPhase('dashboard-init-complete');
      }

      // window.addEventListener('orientationchange', () => { setTimeout(scrollGanttToToday, 350); });
      // window.addEventListener('resize', syncGanttViewportLayout);

      // Calculator Keyboard Support
      document.addEventListener('keydown', function(e) {
          var calcWidget = document.getElementById('calc-widget');
          if (!calcWidget || !calcWidget.classList.contains('open')) return;
          var key = e.key;
          if (/[0-9\.]/.test(key)) {
              e.preventDefault(); calcNum(key);
          } else if (['+', '-', '*', '/', '(', ')'].includes(key)) {
              e.preventDefault(); calcOp(key);
          } else if (key === 'Enter' || key === '=') {
              e.preventDefault(); calcOp('=');
          } else if (key === 'Backspace') {
              e.preventDefault();
              if (calcState !== 'Err' && calcState.length > 0) {
                  calcState = calcState.slice(0, -1);
                  updateCalc();
              }
          } else if (key === 'Escape') {
              e.preventDefault(); toggleWidget('calc-widget');
          }
      });
    </script>
