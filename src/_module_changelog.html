<script>
// ============================================================
// FILE: _module_changelog.html
// ROLE: Owns changelog list rendering for the Review Hub while leaving payload hydration in the WebApp shell.
// DEPENDS ON: WebApp.html markup, _utils_shared.html
// DEPENDED ON BY: WebApp.html changelog controls and bootstrap payload flow
// MOBILE NOTES: Renders into a desktop-biased panel with dense controls and inline desktop spacing assumptions.
// AGENT NOTES: Keep `allGlobalLogs` global in WebApp.html until bootstrap state moves; do not pull payload hydration into this file.
// ============================================================
let expandedActivityRows = new Set();

const _CHANGELOG_TRACKED_TYPES = ['status', 'stage', 'stage status', 'ofs date', 'cx start date', 'cx end date'];
function _isChangelogMilestone(type, val) {
  const t = (type || '').toLowerCase().trim();
  if (!_CHANGELOG_TRACKED_TYPES.includes(t)) return false;
  if (t === 'status' || t === 'stage' || t === 'stage status') {
    const v = (val || '').toLowerCase().trim();
    if (!v || v === 'design') return false;
  }
  return true;
}
function _getQBPillClass(type, val) {
  const t = (type || '').toLowerCase().trim();
  const v = (val || '').toLowerCase();
  if (t === 'ofs date') return 'pill-ofs';
  if (t === 'cx start date' || t === 'cx end date') return 'pill-active';
  // Status/Stage — color by value
  if (v.includes('ofs')) return 'pill-ofs';
  if (v.includes('permitting') || v.includes('permit')) return 'pill-permit';
  if (v.includes('vendor')) return 'pill-drg';
  if (v.includes('cx') || v.includes('crossing') || v.includes('active')) return 'pill-active';
  if (v.includes('complete')) return 'pill-complete';
  return 'pill-hold';
}

function getActivityRowKey(log) {
    return [log.fdh || '', log.timestampObj || '', log.type || '', log.user || ''].join('|');
}

function toggleActivityRow(key) {
    if (expandedActivityRows.has(key)) expandedActivityRows.delete(key);
    else expandedActivityRows.add(key);
    renderChangeLog();
}

function getActivityIconMarkup(type) {
    let t = String(type || '').toUpperCase();
    if (t.includes('REVIEW')) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    }
    if (t.includes('SYNC')) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15.55-6.36L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15.55 6.36L3 16"></path></svg>';
    }
    if (t.includes('UPDATE')) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
    }
    if (t.includes('COMMIT')) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>';
    }
    if (t.includes('FLAG')) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5"></path><path d="m4 5 6-2 4 2 6-2v10l-6 2-4-2-6 2"></path></svg>';
    }
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>';
}

function renderChangeLog() {
    let list = getEl('changelog-list');
    if (!list) return;
    let search = (getEl('changelog-search')?.value || '').toLowerCase();
    let timeFilter = getEl('changelog-time')?.value || 'ALL';
    let userFilter = getEl('changelog-user')?.value || 'ALL';
    let currentFdhOnly = getEl('changelog-current-fdh')?.checked;

    // Default: only show Permit Approved and beyond (reduces noise)
    let logsToRender = allGlobalLogs.filter(log => _isChangelogMilestone(String(log.type || ''), String(log.val || '')));

    if (currentFdhOnly && typeof currentActiveItem !== 'undefined' && currentActiveItem) {
        logsToRender = logsToRender.filter(log => String(log.fdh || '') === String(currentActiveItem.fdh || ''));
    }

    if (timeFilter !== 'ALL') {
        let hours = parseInt(timeFilter, 10);
        let cutoffTime = Date.now() - (hours * 60 * 60 * 1000);
        logsToRender = logsToRender.filter(log => {
            let ts = log.timestampObj ? Number(log.timestampObj) : new Date(log.time).getTime();
            return !isNaN(ts) && ts >= cutoffTime;
        });
    }

    if (userFilter !== 'ALL') {
        logsToRender = logsToRender.filter(log => String(log.user || '') === userFilter);
    }

    if (search) {
        logsToRender = logsToRender.filter(log =>
            String(log.fdh || '').toLowerCase().includes(search) ||
            String(log.user || '').toLowerCase().includes(search) ||
            String(log.type || '').toLowerCase().includes(search) ||
            String(log.val || '').toLowerCase().includes(search)
        );
    }

    logsToRender.sort((a, b) => {
        let tsA = a.timestampObj ? Number(a.timestampObj) : 0;
        if (!tsA && a.time) tsA = new Date(a.time).getTime();
        let tsB = b.timestampObj ? Number(b.timestampObj) : 0;
        if (!tsB && b.time) tsB = new Date(b.time).getTime();
        return tsB - tsA;
    });

    const displayCount = logsToRender.length;
    setTxt('ob-header-count', displayCount);
    let headerBadge = getEl('ob-header-count');
    if (headerBadge) {
        headerBadge.style.display = 'inline-flex'; // Always show in Hub for current tab
    }

    if (logsToRender.length === 0) {
        list.innerHTML = `<div class="empty-msg" style="margin-top:20px; font-size:11px;">No activity matches current filters.</div>`;
        return;
    }

    let html = '';
    logsToRender.forEach(log => {
        let t = String(log.type || '').toUpperCase();
        let rowKey = escJs(getActivityRowKey(log));
        let rowOpen = expandedActivityRows.has(getActivityRowKey(log));
        let cleanVal = String(log.val ?? '').replace(/(?: \d{2}:\d{2}:\d{2} GMT.*)/, '');
        
        // Conditional navigation: only show if project exists in action items
        const targetFdh = String(log.fdh || '');
        const itemExists = typeof allActionItems !== 'undefined' && allActionItems.some(i => String(i.fdh) === targetFdh);
        const navBtn = itemExists ? `
            <button class="log-row-nav" style="display:inline-flex;" onclick="event.stopPropagation(); selectItemForNav('${escJs(targetFdh)}')" aria-label="Open ${esc(targetFdh)}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"></path></svg>
            </button>` : '';

        html += `
        <div class="log-row-dense ${rowOpen ? 'is-expanded' : ''}">
            <div class="log-row-main log-row-expand" onclick="toggleActivityRow('${rowKey}')">
                <div class="log-row-top">
                    <span class="log-row-fdh">${esc(log.fdh)}</span>
                    <span class="log-row-time">${formatDate(log.timestampObj ? new Date(Number(log.timestampObj)) : log.time, true)}</span>
                </div>
                <div class="log-row-meta">
                    <span class="log-row-user">${esc(String(log.user || '').split(' ')[0])}</span>
                    <span class="glass-pill ${_getQBPillClass(log.type, log.val)}">${esc(String(log.val || log.type || 'Activity'))}</span>
                </div>
                <div class="log-row-val">${esc(cleanVal)}</div>
            </div>
            ${navBtn}
        </div>`;
    });

    list.innerHTML = html;
}
</script>
