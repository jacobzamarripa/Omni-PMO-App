<script>
(function() {
  const GLOBAL_SEARCH_GROUP_ORDER = ['Projects', 'Review Activity', 'SIGNAL', 'Help', 'Views/Tools'];
  const GLOBAL_SEARCH_MAX_PER_GROUP = 6;
  let _globalSearchRevealTimer = null;
  let _globalSearchPrimaryShortcut = 'Ctrl+K';

  function _gsDetectPrimaryShortcut() {
    const platform = (navigator.platform || navigator.userAgent || '').toLowerCase();
    return /mac|iphone|ipad|ipod/.test(platform) ? 'Cmd+K' : 'Ctrl+K';
  }

  function _gsSyncShortcutHints() {
    _globalSearchPrimaryShortcut = _gsDetectPrimaryShortcut();
    const isMac = _globalSearchPrimaryShortcut === 'Cmd+K';
    const primaryKey = isMac ? '⌘K' : 'Ctrl+K';
    const triggerBadge = getEl('gs-trigger-badge-primary');
    const spotlightBadge = getEl('gs-spotlight-badge-primary');
    if (triggerBadge) triggerBadge.textContent = primaryKey;
    if (spotlightBadge) spotlightBadge.textContent = primaryKey;
    const mHint = getEl('m-global-search-input');
    if (mHint) mHint.setAttribute('placeholder', 'Search everywhere…');
  }

  function _gsEsc(s) {
    return typeof esc === 'function' ? esc(s) : String(s || '');
  }

  function _gsNormalize(value) {
    return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
  }

  function _gsTokenize(query) {
    return _gsNormalize(query).split(' ').filter(Boolean);
  }

  function _gsHighlight(text, query) {
    const raw = String(text || '');
    const q = String(query || '').trim();
    if (!raw) return '';
    if (!q) return _gsEsc(raw);
    const escapedQuery = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return _gsEsc(raw).replace(new RegExp('(' + escapedQuery + ')', 'ig'), '<mark class="global-search-mark">$1</mark>');
  }

  function _gsMakeId(prefix, value) {
    return prefix + ':' + String(value || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function _gsCollectProjectEntries() {
    return (allActionItems || []).map(function(item) {
      const fdh = String(item && item.fdh || '').trim();
      if (!fdh) return null;
      return {
        id: _gsMakeId('project', fdh),
        type: 'project',
        group: 'Projects',
        title: fdh,
        subtitle: [item.vendor, item.city, item.stage, item.status].filter(Boolean).join(' | ') || 'Project result',
        keywords: [
          item.fdh, item.vendor, item.city, item.stage, item.status, item.flags, item.draft,
          item.comment, item.vendorComment, item.fieldProduction, item.gaps, item.geminiInsight,
          item.cdIntel, item.bsls, item.reportDate, item.targetDate, item.cxStart, item.cxEnd,
          item.ofsDate, item.canonicalOfsDate
        ].filter(Boolean).join(' \n '),
        target: { kind: 'project', fdh: fdh },
        highlightText: fdh
      };
    }).filter(Boolean);
  }

  function _gsCollectActivityEntries() {
    return (allGlobalLogs || []).filter(function(log) {
      return typeof _isChangelogMilestone === 'function'
        ? _isChangelogMilestone(String(log.type || ''), String(log.val || ''))
        : true;
    }).map(function(log) {
      const key = typeof getActivityRowKey === 'function'
        ? getActivityRowKey({
            fdh: log.fdh,
            timestampObj: typeof _getChangelogTimestamp === 'function' ? _getChangelogTimestamp(log) : (log.timestampObj || 0),
            type: log.type,
            user: log.user
          })
        : [log.fdh || '', log.type || '', log.user || '', log.time || ''].join('|');
      return {
        id: _gsMakeId('activity', key),
        type: 'activity',
        group: 'Review Activity',
        title: String(log.fdh || 'Activity'),
        subtitle: [log.type, log.val, log.user, log.time].filter(Boolean).join(' | '),
        keywords: [log.fdh, log.type, log.val, log.user, log.time].filter(Boolean).join(' \n '),
        target: { kind: 'activity', activityKey: key, fdh: String(log.fdh || '') },
        highlightText: String(log.val || log.type || log.fdh || '')
      };
    });
  }

  function _gsCollectSignalEntries() {
    const entries = [];
    const cache = (typeof _signalCache !== 'undefined' && _signalCache) ? _signalCache : { fast: {}, drive: {} };

    Object.keys(cache.fast || {}).forEach(function(tf) {
      const fast = cache.fast[tf] || {};
      (fast.qbChanges || []).forEach(function(change) {
        const signalId = ['qb', tf, change.fdh, change.type, change.newVal, change.updatedBy, change.timestamp].join('|');
        entries.push({
          id: _gsMakeId('signal', signalId),
          type: 'signal',
          group: 'SIGNAL',
          title: String(change.fdh || 'QB Change'),
          subtitle: ['QB', change.type, change.newVal, tf].filter(Boolean).join(' | '),
          keywords: [change.fdh, change.type, change.newVal, change.updatedBy, change.timestamp, tf].filter(Boolean).join(' \n '),
          target: { kind: 'signal', tab: 'qb', timeframe: tf, signalKey: signalId },
          highlightText: String(change.newVal || change.type || change.fdh || '')
        });
      });
      (fast.systemLogs || []).forEach(function(log, idx) {
        const signalId = ['log', tf, idx, log.timestamp, log.message].join('|');
        entries.push({
          id: _gsMakeId('signal', signalId),
          type: 'signal',
          group: 'SIGNAL',
          title: 'System Log',
          subtitle: [log.timestamp, log.message, tf].filter(Boolean).join(' | '),
          keywords: [log.timestamp, log.message, tf].filter(Boolean).join(' \n '),
          target: { kind: 'signal', tab: 'log', timeframe: tf, signalKey: signalId },
          highlightText: String(log.message || '')
        });
      });
    });

    Object.keys(cache.drive || {}).forEach(function(tf) {
      (cache.drive[tf] || []).forEach(function(group) {
        (group.files || []).forEach(function(file) {
          const signalId = ['drive', tf, group.folder, file.name, file.modified].join('|');
          entries.push({
            id: _gsMakeId('signal', signalId),
            type: 'signal',
            group: 'SIGNAL',
            title: String(file.name || 'Drive File'),
            subtitle: ['Drive', group.folder, file.modified, tf].filter(Boolean).join(' | '),
            keywords: [file.name, group.folder, file.modified, tf].filter(Boolean).join(' \n '),
            target: { kind: 'signal', tab: 'drive', timeframe: tf, signalKey: signalId, url: file.url || '' },
            highlightText: String(file.name || group.folder || '')
          });
        });
      });
    });

    return entries;
  }

  function _gsCollectHelpEntries() {
    const panel = getEl('help-panel');
    if (!panel) return [];
    return Array.from(panel.querySelectorAll('.help-sec')).map(function(section, idx) {
      const titleEl = section.querySelector('.help-sec-title');
      const title = titleEl && titleEl.textContent ? titleEl.textContent.trim() : ('Help Topic ' + (idx + 1));
      const bodyText = section.innerText || section.textContent || '';
      const helpId = section.dataset.globalSearchId || ('help-' + idx);
      section.dataset.globalSearchId = helpId;
      return {
        id: _gsMakeId('help', helpId),
        type: 'help',
        group: 'Help',
        title: title,
        subtitle: bodyText.slice(0, 120).trim(),
        keywords: bodyText,
        target: { kind: 'help', helpId: helpId },
        highlightText: title
      };
    });
  }

  function _gsCollectToolEntries() {
    return [
      { id: 'tool-dashboard', title: 'Dashboard', subtitle: 'Open program dashboard', action: function() { switchWorkspaceView('dashboard'); } },
      { id: 'tool-detail', title: 'Detail View', subtitle: 'Open project detail workspace', action: function() { switchWorkspaceView('detail'); } },
      { id: 'tool-grid', title: 'Grid View', subtitle: 'Open grid workspace', action: function() { switchWorkspaceView('grid'); } },
      { id: 'tool-gantt', title: 'Gantt View', subtitle: 'Open schedule timeline', action: function() { openGanttView(); } },
      { id: 'tool-review-hub', title: 'Review Hub', subtitle: 'Open admin / reviewed workspace', action: function() { if (typeof switchPanelTab === 'function') switchPanelTab('admin'); else if (typeof setAdminPanelOpen === 'function') setAdminPanelOpen(true); } },
      { id: 'tool-signal', title: 'SIGNAL', subtitle: 'Open SIGNAL console', action: function() { if (typeof openSignal === 'function') openSignal(true); } },
      { id: 'tool-help', title: 'Help', subtitle: 'Open in-app help guide', action: function() { if (typeof toggleHelpPanel === 'function') toggleHelpPanel(); } },
      { id: 'tool-calendar', title: 'Calendar Widget', subtitle: 'Open project calendar widget', action: function() { toggleWidget('cal-widget', window.event); } },
      { id: 'tool-calculator', title: 'Calculator', subtitle: 'Open Benny calculator widget', action: function() { toggleWidget('calc-widget', window.event); } }
    ].map(function(tool) {
      return {
        id: tool.id,
        type: 'tool',
        group: 'Views/Tools',
        title: tool.title,
        subtitle: tool.subtitle,
        keywords: [tool.title, tool.subtitle].join(' \n '),
        target: { kind: 'tool', actionId: tool.id },
        action: tool.action,
        highlightText: tool.title
      };
    });
  }

  function _gsScoreEntry(entry, tokens, rawQuery) {
    const haystack = _gsNormalize([entry.title, entry.subtitle, entry.keywords].join(' '));
    const title = _gsNormalize(entry.title);
    const subtitle = _gsNormalize(entry.subtitle);
    if (!tokens.length) {
      if (entry.group === 'Views/Tools') return 60;
      if (entry.group === 'Projects') return 40;
      return 10;
    }
    let score = 0;
    if (title === _gsNormalize(rawQuery)) score += 200;
    tokens.forEach(function(token) {
      if (title === token) score += 160;
      else if (title.indexOf(token) === 0) score += 110;
      else if (title.indexOf(token) > -1) score += 70;
      if (subtitle.indexOf(token) > -1) score += 25;
      if (haystack.indexOf(token) > -1) score += 15;
    });
    if (entry.group === 'Projects' && tokens.some(function(token) { return title.indexOf(token) === 0; })) score += 50;
    if (entry.group === 'Views/Tools') score += 10;
    return score;
  }

  function _gsGroupedResults(results) {
    const grouped = {};
    GLOBAL_SEARCH_GROUP_ORDER.forEach(function(group) { grouped[group] = []; });
    results.forEach(function(result) {
      if (!grouped[result.group]) grouped[result.group] = [];
      if (grouped[result.group].length < GLOBAL_SEARCH_MAX_PER_GROUP) grouped[result.group].push(result);
    });
    return grouped;
  }

  function _gsGetMode() {
    return document.body.classList.contains('v2-shell-glassflow') ? 'mobile' : 'desktop';
  }

  function _gsGetInput(mode) {
    return getEl(mode === 'mobile' ? 'm-global-search-input' : 'global-search-input');
  }

  function _gsGetResultsHost(mode) {
    return getEl(mode === 'mobile' ? 'm-global-search-results' : 'global-search-dropdown');
  }

  function _gsSyncInputs(value, origin) {
    const desktopInput = getEl('global-search-input');
    const mobileInput = getEl('m-global-search-input');
    if (desktopInput && origin !== desktopInput) desktopInput.value = value;
    if (mobileInput && origin !== mobileInput) mobileInput.value = value;
  }

  function _gsBuildQueryResults(query) {
    const tokens = _gsTokenize(query);
    return globalSearchIndex.map(function(entry) {
      return Object.assign({}, entry, { score: _gsScoreEntry(entry, tokens, query) });
    }).filter(function(entry) {
      return tokens.length === 0 ? entry.score >= 40 : entry.score > 0;
    }).sort(function(a, b) {
      return b.score - a.score;
    });
  }

  function _gsRenderResultCard(result, idx, query) {
    const activeClass = idx === globalSearchActiveIndex ? ' is-active' : '';
    return ''
      + '<button class="global-search-result' + activeClass + '" type="button" data-result-id="' + _gsEsc(result.id) + '" onclick="navigateGlobalSearchResult(' + JSON.stringify(result.id) + ')">'
      + '<span class="global-search-result-meta">' + _gsEsc(result.group) + '</span>'
      + '<span class="global-search-result-title">' + _gsHighlight(result.title, query) + '</span>'
      + '<span class="global-search-result-subtitle">' + _gsHighlight(result.subtitle, query) + '</span>'
      + '</button>';
  }

  function _gsRenderResults(mode) {
    const host = _gsGetResultsHost(mode);
    if (!host) return;
    const query = String(globalSearchQuery || '').trim();
    const grouped = _gsGroupedResults(globalSearchResults);
    const hasResults = GLOBAL_SEARCH_GROUP_ORDER.some(function(group) { return grouped[group] && grouped[group].length; });

    if (!globalSearchOpen && mode === 'desktop') {
      host.innerHTML = '';
      if (mode === 'desktop') {
        const shell = getEl('global-search-shell');
        if (shell) shell.classList.remove('has-results');
      }
      return;
    }

    if (mode === 'desktop') {
      const shell = getEl('global-search-shell');
      if (shell) shell.classList.toggle('has-results', !!query);
    }

    if (!query) {
      host.innerHTML = '';
      return;
    }

    let inner = '';
    if (!hasResults) {
      inner = '<div class="global-search-empty">No matches for "' + _gsEsc(query) + '".</div>';
    } else {
      let runningIndex = -1;
      inner = GLOBAL_SEARCH_GROUP_ORDER.map(function(group) {
        const items = grouped[group] || [];
        if (!items.length) return '';
        return ''
          + '<section class="global-search-group">'
          + '<div class="global-search-group-title">' + _gsEsc(group) + '</div>'
          + items.map(function(result) {
              runningIndex += 1;
              return _gsRenderResultCard(result, runningIndex, query);
            }).join('')
          + '</section>';
      }).join('');
    }
    host.innerHTML = inner;
  }

  function _gsSetDesktopOpen(open) {
    const spotlight = getEl('global-search-spotlight');
    if (spotlight) spotlight.classList.toggle('is-open', !!open);
    document.body.classList.toggle('global-search-desktop-open', !!open);
  }

  function _gsSetMobileOpen(open) {
    const overlay = getEl('global-search-mobile-overlay');
    if (overlay) overlay.classList.toggle('is-open', !!open);
    document.body.classList.toggle('global-search-mobile-open', !!open);
  }

  function _gsRevealElement(target, query) {
    if (_globalSearchRevealTimer) clearTimeout(_globalSearchRevealTimer);
    if (globalSearchHighlightTarget && globalSearchHighlightTarget.classList) globalSearchHighlightTarget.classList.remove('global-search-reveal');
    if (!target) return;

    globalSearchHighlightTarget = target;
    target.classList.add('global-search-reveal');
    if (typeof target.scrollIntoView === 'function') target.scrollIntoView({ behavior: 'smooth', block: 'center' });

    let markedNode = null;
    const match = String(query || '').trim();
    if (match) {
      const walker = document.createTreeWalker(target, NodeFilter.SHOW_TEXT, {
        acceptNode: function(node) {
          return node.nodeValue && node.nodeValue.toLowerCase().indexOf(match.toLowerCase()) > -1
            ? NodeFilter.FILTER_ACCEPT
            : NodeFilter.FILTER_SKIP;
        }
      });
      const textNode = walker.nextNode();
      if (textNode) {
        const lower = textNode.nodeValue.toLowerCase();
        const idx = lower.indexOf(match.toLowerCase());
        if (idx > -1) {
          const range = document.createRange();
          range.setStart(textNode, idx);
          range.setEnd(textNode, idx + match.length);
          const mark = document.createElement('mark');
          mark.className = 'global-search-destination-mark';
          try {
            range.surroundContents(mark);
            markedNode = mark;
          } catch (err) {}
        }
      }
    }

    _globalSearchRevealTimer = setTimeout(function() {
      target.classList.remove('global-search-reveal');
      if (markedNode && markedNode.parentNode) {
        const parent = markedNode.parentNode;
        while (markedNode.firstChild) parent.insertBefore(markedNode.firstChild, markedNode);
        parent.removeChild(markedNode);
      }
      if (globalSearchHighlightTarget === target) globalSearchHighlightTarget = null;
    }, 2600);
  }

  function _gsNavigateProject(target, query) {
    const fdh = String(target && target.fdh || '');
    const item = (allActionItems || []).find(function(entry) { return String(entry && entry.fdh || '') === fdh; });
    if (!item) return;
    if (typeof switchWorkspaceView === 'function') switchWorkspaceView('detail');
    setTimeout(function() {
      if (typeof selectItemForNav === 'function') selectItemForNav(fdh);
      else if (typeof openPane === 'function') openPane(item, null, true);
      setTimeout(function() {
        _gsRevealElement(getEl('project-schedule-card') || getEl('main-qb-grid') || getEl('pane-content'), query || fdh);
      }, 120);
    }, 40);
  }

  function _gsNavigateActivity(target, query) {
    if (typeof setAdminPanelOpen === 'function') setAdminPanelOpen(true);
    if (typeof switchPanelTab === 'function') switchPanelTab('changelog');
    const timeFilter = getEl('changelog-time');
    const searchInput = getEl('changelog-search');
    const currentFdh = getEl('changelog-current-fdh');
    const userFilter = getEl('changelog-user');
    if (timeFilter) timeFilter.value = 'ALL';
    if (searchInput) searchInput.value = '';
    if (currentFdh) currentFdh.checked = false;
    if (userFilter) userFilter.value = 'ALL';
    if (typeof renderChangeLog === 'function') renderChangeLog();
    setTimeout(function() {
      const row = document.querySelector('[data-activity-key="' + CSS.escape(String(target && target.activityKey || '')) + '"]');
      _gsRevealElement(row || getEl('changelog-list'), query || (target && target.fdh) || '');
    }, 120);
  }

  function _gsNavigateSignal(target, query) {
    if (typeof openSignal !== 'function') return;
    openSignal(true);
    setTimeout(function() {
      if (typeof _signalSetTab === 'function') _signalSetTab(target.tab || 'qb');
      if (typeof loadSignalData === 'function') loadSignalData(target.timeframe || 'current');
      setTimeout(function() {
        const key = String(target && target.signalKey || '');
        const row = document.querySelector('[data-signal-key="' + CSS.escape(key) + '"]');
        if (row) _gsRevealElement(row, query || key);
        else if (target && target.url) window.open(target.url, '_blank', 'noopener');
      }, 180);
    }, 60);
  }

  function _gsNavigateHelp(target, query) {
    const panel = getEl('help-panel');
    if (panel && !panel.classList.contains('open') && typeof toggleHelpPanel === 'function') toggleHelpPanel();
    setTimeout(function() {
      const input = getEl('help-search-input');
      if (input) {
        input.value = query || '';
        if (typeof searchHelp === 'function') searchHelp();
      }
      const section = document.querySelector('[data-global-search-id="' + CSS.escape(String(target && target.helpId || '')) + '"]');
      _gsRevealElement(section || panel, query || '');
    }, 120);
  }

  function _gsNavigateTool(result) {
    if (result && typeof result.action === 'function') result.action();
  }

  function _gsRefreshResults(origin) {
    _gsSyncInputs(globalSearchQuery, origin || null);
    globalSearchResults = _gsBuildQueryResults(globalSearchQuery);
    globalSearchActiveIndex = globalSearchResults.length ? 0 : -1;
    _gsRenderResults('desktop');
    _gsRenderResults('mobile');
  }

  function _gsFocusInput(mode) {
    const input = _gsGetInput(mode);
    if (!input) return;
    setTimeout(function() {
      input.focus();
      input.select();
    }, 40);
  }

  function openGlobalSearch(mode) {
    const nextMode = mode || _gsGetMode();
    globalSearchOpen = true;
    _gsRefreshResults(_gsGetInput(nextMode));
    _gsSetDesktopOpen(nextMode === 'desktop');
    _gsSetMobileOpen(nextMode === 'mobile');
    _gsFocusInput(nextMode);
  }

  function closeGlobalSearch(evt) {
    if (evt && evt.target && evt.target.id) {
      const id = evt.target.id;
      if (id !== 'global-search-spotlight' && id !== 'global-search-mobile-overlay') return;
    }
    globalSearchOpen = false;
    globalSearchQuery = '';
    _gsSyncInputs('', null);
    const badge = getEl('global-search-shortcut-badge');
    if (badge) badge.classList.remove('is-hidden');
    const shell = getEl('global-search-shell');
    if (shell) shell.classList.remove('has-results');
    const host = getEl('global-search-dropdown');
    if (host) host.innerHTML = '';
    _gsSetDesktopOpen(false);
    _gsSetMobileOpen(false);
    const desktopInput = getEl('global-search-input');
    if (desktopInput) { desktopInput.blur(); desktopInput.value = ''; }
  }

  function toggleGlobalSearch(mode) {
    if (globalSearchOpen) closeGlobalSearch();
    else openGlobalSearch(mode || _gsGetMode());
  }

  function clearGlobalSearch() {
    globalSearchQuery = '';
    globalSearchResults = _gsBuildQueryResults('');
    globalSearchActiveIndex = globalSearchResults.length ? 0 : -1;
    _gsSyncInputs('', null);
    const badge = getEl('global-search-shortcut-badge');
    if (badge) badge.classList.remove('is-hidden');
    _gsRenderResults('desktop');
    _gsRenderResults('mobile');
  }

  function handleGlobalSearchInput(e) {
    const source = e && e.target ? e.target : null;
    globalSearchQuery = source ? source.value : '';
    const badge = getEl('global-search-shortcut-badge');
    if (badge) badge.classList.toggle('is-hidden', !!globalSearchQuery);
    if (!globalSearchOpen) openGlobalSearch(_gsGetMode());
    else _gsRefreshResults(source);
  }

  function handleGlobalSearchKeydown(e) {
    if (!globalSearchOpen && (e.key === 'ArrowDown' || e.key === 'Enter')) {
      openGlobalSearch(_gsGetMode());
      return;
    }
    if (!globalSearchResults.length) {
      if (e.key === 'Escape') closeGlobalSearch();
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      globalSearchActiveIndex = Math.min(globalSearchResults.length - 1, globalSearchActiveIndex + 1);
      _gsRenderResults('desktop');
      _gsRenderResults('mobile');
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      globalSearchActiveIndex = Math.max(0, globalSearchActiveIndex - 1);
      _gsRenderResults('desktop');
      _gsRenderResults('mobile');
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      const active = globalSearchResults[globalSearchActiveIndex] || globalSearchResults[0];
      if (active) navigateGlobalSearchResult(active.id);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeGlobalSearch();
    }
  }

  function navigateGlobalSearchResult(resultId) {
    const result = globalSearchResults.find(function(entry) { return entry.id === resultId; })
      || globalSearchIndex.find(function(entry) { return entry.id === resultId; });
    if (!result) return;
    const navQuery = String(globalSearchQuery || result.highlightText || '').trim();
    closeGlobalSearch();
    if (result.target.kind === 'project') _gsNavigateProject(result.target, navQuery);
    else if (result.target.kind === 'activity') _gsNavigateActivity(result.target, navQuery);
    else if (result.target.kind === 'signal') _gsNavigateSignal(result.target, navQuery);
    else if (result.target.kind === 'help') _gsNavigateHelp(result.target, navQuery);
    else if (result.target.kind === 'tool') _gsNavigateTool(result);
  }

  function rebuildGlobalSearchIndex() {
    globalSearchIndex = []
      .concat(_gsCollectProjectEntries())
      .concat(_gsCollectActivityEntries())
      .concat(_gsCollectSignalEntries())
      .concat(_gsCollectHelpEntries())
      .concat(_gsCollectToolEntries());
    globalSearchIndexVersion += 1;
    _gsRefreshResults(null);
    return globalSearchIndex.length;
  }

  _gsSyncShortcutHints();

  document.addEventListener('click', function(event) {
    const shell = getEl('global-search-shell');
    const mobileSheet = getEl('global-search-mobile-sheet');
    const mobileTrigger = getEl('btn-global-search');
    const desktopTrigger = getEl('btn-global-search-trigger');
    const desktopShellContains = shell && shell.contains(event.target);
    const mobileSheetContains = mobileSheet && mobileSheet.contains(event.target);
    const mobileTriggerContains = mobileTrigger && mobileTrigger.contains(event.target);
    const desktopTriggerContains = desktopTrigger && desktopTrigger.contains(event.target);
    if (!desktopShellContains && !mobileSheetContains && !mobileTriggerContains && !desktopTriggerContains) closeGlobalSearch();
  });

  document.addEventListener('keydown', function(event) {
    const isModifier = event.metaKey || event.ctrlKey;
    if (isModifier && event.key.toLowerCase() === 'k') {
      event.preventDefault();
      toggleGlobalSearch(_gsGetMode());
      return;
    }
