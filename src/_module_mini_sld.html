<script>
// ============================================================
// FILE: _module_mini_sld.html | ROLE: Mini single-line-diagram helpers for detail/network path rendering
// DEPENDS ON: _state_queue.html, _utils_shared.html
// DEPENDED ON BY: _module_queue_state.html, _module_webapp_core.html
// ============================================================
function parseMiniSldFdh(value) {
    return String(value || '').split(',').map(v => v.trim()).filter(Boolean)[0] || '';
}

function isMiniSldTransportReady(value) {
    let normalized = String(value || '').trim().toLowerCase();
    return normalized === 'true' || normalized === 'yes' || normalized === '1' || normalized === 'y';
}

function miniSldSafeText(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getMiniSldNodeTheme(node) {
    if (!node) return { border: '1px dashed var(--border)', text: 'var(--text-muted)', bg: 'rgba(148,163,184,0.08)', dot: '#94a3b8' };
    let stage = String(node.stage || '').toLowerCase();
    let status = String(node.status || '').toLowerCase();
    let isLit = !!node.isLight || stage.includes('ofs') || status.includes('complete');
    if (isLit) return { border: '1px solid #22c55e', text: '#166534', bg: 'rgba(240,253,244,0.9)', dot: '#22c55e' };
    return { border: '1px solid #f59e0b', text: '#b45309', bg: 'rgba(255,247,237,0.95)', dot: '#f59e0b' };
}

function miniSldNodeHtml(label, node, navFdh, isCurrent) {
    let theme = isCurrent ? { border: '1px solid #111827', text: '#ffffff', bg: '#111827', dot: '#22c55e' } : getMiniSldNodeTheme(node);
    let clickable = !!navFdh && !isCurrent;
    let navArg = JSON.stringify(String(navFdh || ''));
    let attrs = clickable ? ` class="hover-trigger" onclick='selectItemForNav(${navArg})'` : '';
    if (isCurrent) attrs += ' id="mini-sld-current"';
    let cursor = clickable ? 'pointer' : 'default';
    return `<div${attrs} style="display:flex; align-items:center; gap:7px; min-width:0; max-width:220px; padding:8px 12px; border-radius:10px; border:${theme.border}; background:${theme.bg}; color:${theme.text}; box-shadow:${isCurrent ? '0 12px 24px rgba(15,23,42,0.18)' : 'none'}; cursor:${cursor}; flex:0 0 auto; min-width:max-content;">
        <span style="width:8px; height:8px; border-radius:999px; background:${theme.dot}; flex:0 0 auto;"></span>
        <span style="font-size:10px; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${miniSldSafeText(label || 'Unknown')}</span>
    </div>`;
}

function renderMiniSld(item) {
    if (!item) return '';

    // 🧠 BFS Helper: Traverse Upstream/Downstream to build the full topology map
    function buildMapLayers(startFdh, direction) {
        let layers = [];
        let queue = new Set([startFdh]);
        let visited = new Set([startFdh]);
        let limit = 10; 
        
        // Normalization helper for robust matching
        const norm = (id) => String(id || '').toUpperCase().replace(/\s+/g, '').replace(/F0*(\d+)/, 'F$1');

        while (queue.size > 0 && limit-- > 0) {
            let nextQueue = new Set();
            let hasTransport = false;
            let hasUnknown = false;

            for (let fdh of queue) {
                const normFdh = norm(fdh);
                let node = (allActionItems || []).find(i => norm(i.fdh) === normFdh);
                
                if (node) {
                    if (direction === 'up') {
                        let isTrans = isMiniSldTransportReady(node.qbRef && node.qbRef.transport);
                        if (isTrans && normFdh !== norm(startFdh)) { hasTransport = true; continue; }
                        let preds = node.qbRef && node.qbRef.predecessors || [];
                        let howFed = parseMiniSldFdh(node.qbRef && node.qbRef.howFed);
                        let upItems = Array.from(new Set([...preds, howFed].filter(Boolean)));
                        if (upItems.length === 0 && normFdh !== norm(startFdh)) hasUnknown = true;
                        else upItems.forEach(up => { if (!visited.has(norm(up))) { visited.add(norm(up)); nextQueue.add(up); } });
                    } else {
                        let succs = node.qbRef && node.qbRef.successors || [];
                        let whatFeeds = parseMiniSldFdh(node.qbRef && node.qbRef.whatFeeds);
                        let downItems = Array.from(new Set([...succs, whatFeeds].filter(Boolean)));
                        if (downItems.length === 0 && normFdh !== norm(startFdh)) hasUnknown = true;
                        else downItems.forEach(down => { if (!visited.has(norm(down))) { visited.add(norm(down)); nextQueue.add(down); } });
                    }
                } else if (normFdh !== norm(startFdh)) {
                    hasUnknown = true;
                }
            }

            if (nextQueue.size > 0) {
                if (direction === 'up') layers.unshift(Array.from(nextQueue));
                else layers.push(Array.from(nextQueue));
                queue = nextQueue;
            } else {
                if (direction === 'up') {
                    if (hasTransport) layers.unshift(['⚡ TRANSPORT READY']);
                    // 🧠 UX: Only show "UNKNOWN" if the current project itself has no immediate predecessors
                    else if (layers.length === 0) layers.unshift(['UPSTREAM UNKNOWN']);
                } else {
                    // 🧠 UX: Only show "UNKNOWN" if the current project itself has no immediate successors
                    if (layers.length === 0) layers.push(['DOWNSTREAM UNKNOWN']);
                }
                break;
            }
        }
        return layers;
    }

    const upLayers = buildMapLayers(item.fdh, 'up');
    const downLayers = buildMapLayers(item.fdh, 'down');

    const renderLayer = (layerFdhs) => {
        return layerFdhs.map(fdh => {
            if (fdh.includes('UNKNOWN') || fdh.includes('READY')) {
                let isReady = fdh.includes('READY');
                return `<div style="display:flex; align-items:center; gap:7px; min-width:0; max-width:220px; padding:8px 12px; border-radius:10px; border:1px solid ${isReady ? '#2563eb' : 'var(--border)'}; background:${isReady ? 'rgba(239,246,255,0.95)' : 'rgba(148,163,184,0.08)'}; color:${isReady ? '#1d4ed8' : 'var(--text-muted)'}; flex:0 0 auto; min-width:max-content;">
                    <span style="width:8px; height:8px; border-radius:999px; background:${isReady ? '#2563eb' : '#94a3b8'}; flex:0 0 auto;"></span>
                    <span style="font-size:10px; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${fdh}</span>
                </div>`;
            }
            let node = (allActionItems || []).find(i => i.fdh === fdh);
            return miniSldNodeHtml(fdh, node, node ? fdh : null, false);
        }).join('<div style="font-size:14px; color:var(--text-muted); flex:0 0 auto; margin:0 -4px;">&</div>');
    };

    const arrow = '<div style="font-size:14px; color:var(--text-muted); flex:0 0 auto;">→</div>';
    
    let html = upLayers.map(l => renderLayer(l)).join(arrow);
    if (upLayers.length > 0) html += arrow;
    html += miniSldNodeHtml(item.fdh, item, '', true);
    if (downLayers.length > 0) html += arrow;
    html += downLayers.map(l => renderLayer(l)).join(arrow);

    let labelNode = `<div style="display:flex; align-items:center; padding-right:12px; margin-right:4px; border-right:1px solid var(--border); flex-shrink:0;">
        <span style="font-size:9px; font-weight:900; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Network Path</span>
    </div>`;

    return `<div style="display:flex; align-items:center; gap:8px; width:100%;">
        ${labelNode}
        <div style="display:flex; align-items:center; gap:12px; min-width:0; flex:1; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; -ms-overflow-style:none;">
            <style>#p-network-path > div::-webkit-scrollbar { display: none; }</style>
            ${html}
        </div>
    </div>`;
}
</script>
