<style>
/* === TOP OFFENDERS — SIGNAL-native hierarchy polish === */
.off-summary-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.off-summary-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
  padding: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
  border-radius: 16px;
  background: var(--card-bg);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}
.off-summary-label {
  font-size: 9px;
  font-weight: 900;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.off-summary-value {
  font-size: 22px;
  line-height: 1;
  font-weight: 900;
  color: var(--text-main);
  letter-spacing: -0.4px;
}
.off-summary-card.is-accent .off-summary-value { color: var(--accent); }
.off-summary-title {
  font-size: 13px;
  font-weight: 800;

}
.off-summary-meta {

}
.off-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  padding: 12px 14px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
  border-radius: 16px;
  background: color-mix(in srgb, var(--accent) 2.5%, var(--card-bg));
}
.off-toolbar-main,
.off-toolbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.off-toolbar-label {
  font-size: 9px;
  font-weight: 900;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.75px;
}
.off-toolbar-hint {

}
.off-selected-count {

.off-ctrl-bar {
  display: flex;

}
.off-export-btn {

  border-radius: 999px;

  color: #22c55e;

  letter-spacing: 0.5px;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.off-export-btn:hover, .off-export-btn.active {
  background: rgba(34,197,94,0.1);
  border-color: #22c55e;
}
.off-export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.off-filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 8px 6px;
  margin: 0 0 14px;
  padding: 2px 2px 8px;
  overflow: visible;
}
.off-filter-chip {
  flex: 0 1 auto;
  cursor: pointer;
  transition: box-shadow 0.12s, opacity 0.12s, transform 0.1s;
  user-select: none;
}
.off-filter-chip:hover { transform: translateY(-1px); }
.off-filter-chip.active { box-shadow: 0 0 0 2px currentColor; }
.off-utility-drawer {
  display: none;
  margin: 0 0 14px;
  padding: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
  border-radius: 16px;
  background: color-mix(in srgb, var(--accent) 2%, var(--card-bg));
}
.off-utility-drawer.open { display: block; }
.off-utility-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.off-utility-title {
  font-size: 12px;
  font-weight: 900;
  color: var(--text-main);
  letter-spacing: -0.1px;
}
.off-utility-sub {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}
.off-utility-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.off-pm-panel {
  display: none;
  padding-top: 12px;
  margin-top: 12px;
  border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
}
.off-pm-panel.open { display: block; }
.off-pm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0 10px; }
.off-pm-row { display: flex; flex-direction: column; gap: 3px; }
.off-pm-label { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.off-pm-input {
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--fg, #1e293b);
  outline: none;
  width: 100%;
  box-sizing: border-box;
}
.off-pm-input:focus { border-color: var(--accent); }
.off-vendor-checkbox {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--accent);
  margin-right: 4px;
}
.off-expand-arrow {
  font-size: 9px;
  color: var(--text-muted);
  transition: transform 0.2s;
  display: inline-block;
  margin-left: 2px;
}
.off-expand-arrow.open { transform: rotate(90deg); }
.off-feed-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.off-feed-title {
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.off-feed-sub {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
}
.off-vendor-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.off-vendor-card {
  padding: 0 16px 14px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
  border-radius: 18px;
  background: var(--card-bg);
  overflow: visible;
}
.off-vendor-header {
  position: sticky;
  top: -1px;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
  margin: 0 -16px;
  padding: 9px 16px 9px;
  border-radius: 18px 18px 14px 14px;
  background: var(--card-bg);
  border-bottom: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
}
.off-vendor-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  flex: 1;
}
.off-vendor-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 12%, var(--bg));
  color: var(--accent);
  font-size: 11px;
  font-weight: 900;
  flex-shrink: 0;
}
.off-vendor-title-block {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.off-vendor-title-line {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.off-vendor-name {
  font-size: 13px;
  font-weight: 900;
  color: var(--text-main);
  letter-spacing: -0.3px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.off-vendor-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.35;
}
.off-vendor-stats {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  text-align: right;
  flex-shrink: 0;
}
.off-vendor-stat {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 4px 8px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--accent) 5%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
}
.off-vendor-stat-value {
  font-size: 13px;
  font-weight: 900;
  color: var(--text-main);
  line-height: 1;
}
.off-vendor-stat-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.65px;
  color: var(--text-muted);
}
.off-vendor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 6px;
  padding-top: 8px;
}
.off-vendor-flags {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  min-width: 0;
  flex: 1;
}
.off-vendor-flags .glass-pill,
.off-vendor-flags .tag {
  max-width: 100%;
  font-size: clamp(7px, 0.68vw, 10px);
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.off-project-list {
  display: grid;
  grid-template-rows: 0fr;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: grid-template-rows 0.32s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease;
}
.off-project-list.open { grid-template-rows: 1fr; opacity: 1; pointer-events: auto; }
.off-project-list-inner { min-height: 0; overflow: hidden; padding: 12px 0 0; border-top: 1px solid color-mix(in srgb, var(--border) 65%, transparent); }
.off-project-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
  transition: background 0.1s;
}
.off-project-row:last-child { border-bottom: none; }
.off-project-row:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); }
.off-project-row-top {
  display: grid;
  grid-template-columns: minmax(84px, auto) minmax(0, 1fr) auto;
  align-items: center;
  gap: 10px;
}
.off-project-fdh { font-size: 11px; font-weight: 900; color: var(--accent); min-width: 0; }
.off-project-meta { font-size: 11px; color: var(--text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.off-project-flags { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 0; }
@media (max-width: 768px) {
  .off-summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .off-toolbar { flex-direction: column; align-items: stretch; }
  .off-toolbar-main, .off-toolbar-actions { justify-content: space-between; }
  .off-utility-header { flex-direction: column; }
  .off-pm-grid { grid-template-columns: 1fr; }
  .off-vendor-header, .off-vendor-footer { flex-direction: column; align-items: stretch; }
  .off-vendor-stats { justify-content: flex-start; text-align: left; }
  .off-project-row-top { grid-template-columns: 1fr; align-items: flex-start; }
  .off-project-meta { white-space: normal; }
}
</style>

<script>
(function() {
  var _offendersSortBy = 'count';
  var _offendersSelectedVendors = {};
  var _offendersExpanded = {};
  var _offendersActiveFlagFilter = null;
  var _offendersUtilityDrawerOpen = false;
  var _offendersPmPanelOpen = false;

  // ── Active project gate ──────────────────────────────────────────
  // Include only projects that are actively in construction OR have
  // sent a report in the last 14 days. Excludes Complete and On Hold.
  function _isProjectActive(item) {
    var stat = (item.status || '').toLowerCase();
    var st   = (item.stage  || '').toLowerCase();

    if (stat.includes('complete') || stat.includes('hold')) return false;

    // "In construction" mirrors getQBStatusClass chip-active: not OFS milestone, not permit
    var inConstruction = !st.includes('ofs') && !st.includes('permit')
      && !st.includes('pre-con') && !st.includes('vendor assign');

    // Recent report: within the last 14 days (uses shared safeDate if available)
    var rd = (typeof safeDate === 'function') ? safeDate(item.reportDate) : null;
    var hasRecentReport = rd && (Date.now() - rd.getTime()) <= 14 * 24 * 60 * 60 * 1000;

    return inConstruction || hasRecentReport;
  }

  function _buildOffendersData() {
    var src = (typeof allActionItems !== 'undefined') ? allActionItems : [];
    var q = (typeof _signalSearchQuery !== 'undefined') ? _signalSearchQuery.trim().toLowerCase() : '';
    var vendorMap = {};
    var globalFlagCounts = {};

    src.forEach(function(item) {
      if (!item.vendor || !item.flags) return;
      if (!_isProjectActive(item)) return;

      var flags = item.flags.split('\n').map(function(f) { return f.trim(); }).filter(Boolean);
      if (!flags.length) return;

      if (_offendersActiveFlagFilter && flags.indexOf(_offendersActiveFlagFilter) === -1) return;

      if (q) {
        var matchable = [item.vendor, item.fdh, item.city, item.stage, item.status].concat(flags).join(' ').toLowerCase();
        if (matchable.indexOf(q) === -1) return;
      }

      if (!vendorMap[item.vendor]) vendorMap[item.vendor] = { projects: [], flagCounts: {}, totalFlags: 0 };
      vendorMap[item.vendor].projects.push({ fdh: item.fdh, city: item.city, stage: item.stage, status: item.status, flags: flags });
      flags.forEach(function(f) {
        vendorMap[item.vendor].flagCounts[f] = (vendorMap[item.vendor].flagCounts[f] || 0) + 1;
        vendorMap[item.vendor].totalFlags++;
        globalFlagCounts[f] = (globalFlagCounts[f] || 0) + 1;
      });
    });

    var vendors = Object.keys(vendorMap);
    vendors.sort(function(a, b) {
      return _offendersSortBy === 'vendor'
        ? a.localeCompare(b)
        : vendorMap[b].totalFlags - vendorMap[a].totalFlags;
    });

    return { vendors: vendors, vendorMap: vendorMap, globalFlagCounts: globalFlagCounts };
  }

  function _offendersCountSelected() {
    return Object.keys(_offendersSelectedVendors).filter(function(v) { return _offendersSelectedVendors[v]; }).length;
  }

  function _offendersGetTopFlags(vendorData, limit) {
    return Object.keys(vendorData.flagCounts)
      .sort(function(a, b) { return vendorData.flagCounts[b] - vendorData.flagCounts[a]; })
      .slice(0, limit || 4);
  }

  function _renderSignalOffenders() {
    var el = document.getElementById('signal-panel-offenders');
    if (!el) return;

    var data = _buildOffendersData();
    var vendors = data.vendors;
    var vendorMap = data.vendorMap;
    var globalFlagCounts = data.globalFlagCounts;

    var totalFlags    = vendors.reduce(function(acc, v) { return acc + vendorMap[v].totalFlags; }, 0);
    var totalProjects = vendors.reduce(function(acc, v) { return acc + vendorMap[v].projects.length; }, 0);

    if (typeof _signalUpdateMatchCount === 'function') {
      _signalUpdateMatchCount(totalProjects, totalProjects);
    }

    var html = '';
    var selectedCount = _offendersCountSelected();

    // ── Summary strip (hidden when search is active) ──────────────
    if (!_signalSearchQuery) {
      var worstVendor  = vendors[0] || null;
      var sortedGlobal = Object.keys(globalFlagCounts).sort(function(a, b) { return globalFlagCounts[b] - globalFlagCounts[a]; });
      var topFlag      = sortedGlobal[0] || null;
      html += '<div class="off-summary-strip">';

      if (worstVendor) {
        var worstPct = totalFlags > 0 ? Math.round(vendorMap[worstVendor].totalFlags / totalFlags * 100) : 0;
        html += '<div class="off-summary-card is-accent">'
          + '<div class="off-summary-label">Worst Vendor</div>'
          + '<div class="off-summary-title">' + _esc(worstVendor) + '</div>'
          + '<div class="off-summary-value">' + worstPct + '%</div>'
          + '<div class="off-summary-meta">' + vendorMap[worstVendor].totalFlags + ' flag' + (vendorMap[worstVendor].totalFlags !== 1 ? 's' : '') + ' across ' + vendorMap[worstVendor].projects.length + ' project' + (vendorMap[worstVendor].projects.length !== 1 ? 's' : '') + '</div>'
          + '</div>';
      } else {
        html += '<div class="off-summary-card is-accent">'
          + '<div class="off-summary-label">Worst Vendor</div>'
          + '<div class="off-summary-title">No active vendors</div>'
          + '<div class="off-summary-value">0%</div>'
          + '<div class="off-summary-meta">No offender distribution in this timeframe.</div>'
          + '</div>';
      }

      html += '<div class="off-summary-card">'
        + '<div class="off-summary-label">Active Vendors</div>'
        + '<div class="off-summary-value">' + vendors.length + '</div>'
        + '<div class="off-summary-meta">' + totalProjects + ' flagged project' + (totalProjects !== 1 ? 's' : '') + ' currently in play.</div>'
        + '</div>';

      if (topFlag) {
        var topFlagVendorCount = Object.keys(vendorMap).filter(function(v) { return vendorMap[v].flagCounts[topFlag]; }).length;
        var topFlagDisplay = (typeof cleanDiagnosticFlagText === 'function') ? cleanDiagnosticFlagText(topFlag) : topFlag;
        var topFlagCls = (typeof getDiagnosticTagClass === 'function') ? getDiagnosticTagClass(topFlag) : 'chip-warn';
        html += '<div class="off-summary-card">'
          + '<div class="off-summary-label">Top Flag Type</div>'
          + '<span class="tag ' + topFlagCls + '" style="align-self:flex-start">' + _esc(topFlagDisplay) + '</span>'
          + '<div class="off-summary-value">' + globalFlagCounts[topFlag] + '</div>'
          + '<div class="off-summary-meta">Seen across ' + topFlagVendorCount + ' vendor' + (topFlagVendorCount !== 1 ? 's' : '') + '.</div>'
          + '</div>';
      } else {
        html += '<div class="off-summary-card">'
          + '<div class="off-summary-label">Top Flag Type</div>'
          + '<div class="off-summary-title">No recurring flag</div>'
          + '<div class="off-summary-value">0</div>'
          + '<div class="off-summary-meta">No active flag clusters in this timeframe.</div>'
          + '</div>';
      }

      html += '<div class="off-summary-card">'
        + '<div class="off-summary-label">Total Flags</div>'
        + '<div class="off-summary-value">' + totalFlags + '</div>'
        + '<div class="off-summary-meta">' + selectedCount + ' vendor' + (selectedCount !== 1 ? 's' : '') + ' selected for export.</div>'
        + '</div>';

      html += '</div>';
    }

    // ── Toolbar ────────────────────────────────────────────────────
    html += '<div class="off-toolbar">'
      + '<div class="off-toolbar-main">'
      + '<span class="off-toolbar-label">Refine Feed</span>'
      + '<div class="off-ctrl-bar">'
      + '<button class="signal-tf-pill' + (_offendersSortBy === 'count' ? ' active' : '') + '" onclick="_offendersSetSort(\'count\')">Flag Count</button>'
      + '<button class="signal-tf-pill' + (_offendersSortBy === 'vendor' ? ' active' : '') + '" onclick="_offendersSetSort(\'vendor\')">Vendor A-Z</button>'
      + '</div>'
      + '</div>'
      + '<div class="off-toolbar-actions">'
      + '<span class="off-toolbar-hint">Selected: <strong class="off-selected-count">' + selectedCount + '</strong></span>'
      + '<button class="signal-tf-pill' + (_offendersUtilityDrawerOpen ? ' active' : '') + '" onclick="_offendersToggleUtilityDrawer()">' + (_offendersUtilityDrawerOpen ? 'Hide Utilities' : 'Utilities') + '</button>'
      + '</div>'
      + '</div>';

    // ── Utilities drawer ───────────────────────────────────────────
    html += '<div class="off-utility-drawer' + (_offendersUtilityDrawerOpen ? ' open' : '') + '" id="off-utility-drawer">'
      + '<div class="off-utility-header">'
      + '<div>'
      + '<div class="off-utility-title">Reporting Utilities</div>'
      + '<div class="off-utility-sub">Keep export and PM email maintenance available without competing with the vendor triage feed.</div>'
      + '</div>'
      + '<div class="off-utility-actions">'
      + '<button class="off-export-btn" id="off-btn-export-all" onclick="_offendersExportAll()">Export All</button>'
      + '<button class="off-export-btn" id="off-btn-export-sel" onclick="_offendersExportSelected()">Export Selected</button>'
      + '<button class="signal-tf-pill' + (_offendersPmPanelOpen ? ' active' : '') + '" onclick="_offendersTogglePmPanel()">' + (_offendersPmPanelOpen ? 'Hide PM Emails' : 'PM Emails') + '</button>'
      + '</div>'
      + '</div>'
      + '<div class="off-pm-panel' + (_offendersPmPanelOpen ? ' open' : '') + '" id="off-pm-panel">'
      + '<div class="signal-section-header" style="padding:0 0 2px">PM Email Addresses</div>'
      + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Used for the weekly PMO report. One address per vendor.</div>'
      + '<div class="off-pm-grid" id="off-pm-grid">' + (_offendersPmPanelOpen ? '<span style="font-size:11px;color:var(--text-muted)">Loading...</span>' : '') + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
      + '<button class="off-export-btn" onclick="_offendersSavePmEmails()">Save</button>'
      + '<span id="off-pm-save-status" style="font-size:11px;color:var(--text-muted)"></span>'
      + '</div>'
      + '</div>';
    html += '</div>';

    // ── Flag filter chips ─────────────────────────────────────────
    var sortedFlags = Object.keys(globalFlagCounts).sort(function(a, b) { return globalFlagCounts[b] - globalFlagCounts[a]; });
    if (sortedFlags.length > 0 || _offendersActiveFlagFilter) {
      html += '<div class="signal-section-header">Filter by Flag</div>'
        + '<div class="off-filter-bar">';
      var allActive = !_offendersActiveFlagFilter;
      html += '<span class="off-filter-chip glass-pill chip-muted' + (allActive ? ' active' : '') + '" onclick="_offendersSetFlagFilter(null)">All (' + totalFlags + ')</span>';
      sortedFlags.forEach(function(flag) {
        var isActive = _offendersActiveFlagFilter === flag;
        var displayFlag = (typeof cleanDiagnosticFlagText === 'function') ? cleanDiagnosticFlagText(flag) : flag;
        var cls = (typeof getDiagnosticTagClass === 'function') ? getDiagnosticTagClass(flag) : 'chip-warn';
        var flagJs = (typeof escJs === 'function') ? escJs(flag) : String(flag || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        html += '<span class="off-filter-chip tag ' + cls + (isActive ? ' active' : '') + '" onclick="_offendersSetFlagFilter(\'' + flagJs + '\')">'
          + _esc(displayFlag) + ' &times;' + globalFlagCounts[flag]
          + '</span>';
      });
      html += '</div>';
    }

    // ── Vendor feed ───────────────────────────────────────────────
    var feedLabel = 'Active Vendor Feed' + (_offendersActiveFlagFilter ? ' — ' + _esc(_offendersActiveFlagFilter) : '');
    html += '<div class="off-feed-header">'
      + '<div class="off-feed-title">' + feedLabel + '</div>'
      + '<div class="off-feed-sub">' + vendors.length + ' vendor' + (vendors.length !== 1 ? 's' : '') + ' in view</div>'
      + '</div>';

    if (!vendors.length) {
      var emptyReason = _signalSearchQuery
        ? 'No results for "' + _esc(_signalSearchQuery) + '".'
        : _offendersActiveFlagFilter
          ? 'No active vendors with flag "' + _esc(_offendersActiveFlagFilter) + '".'
          : 'No active vendors with open flags.';
      html += '<div class="signal-empty">' + emptyReason + '</div>';
    } else {
      html += '<div class="off-vendor-stack">';
      vendors.forEach(function(vendor) {
        var vd = vendorMap[vendor];
        var isExpanded = !!_offendersExpanded[vendor];
        var isChecked  = !!_offendersSelectedVendors[vendor];
        var vKey = vendor.replace(/[^a-z0-9]/gi, '_');
        var vendorJs = (typeof escJs === 'function') ? escJs(vendor) : String(vendor || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var topFlags = _offendersGetTopFlags(vd, 4);
        var rank = _offendersSortBy === 'count' ? (vendors.indexOf(vendor) + 1) : null;
        var leadingFlag = topFlags[0] || null;
        var monogram = (typeof getVendorMonogram === 'function') ? getVendorMonogram(vendor) : vendor.slice(0, 2).toUpperCase();
        var themeStyle = (typeof getVendorThemeStyle === 'function') ? getVendorThemeStyle(vendor, rank ? rank - 1 : vendors.indexOf(vendor)) : '';

        html += '<div class="off-vendor-card">'
          + '<div class="off-vendor-header" onclick="_offendersToggleExpand(\'' + vendorJs + '\')">'
          + '<div class="off-vendor-title-wrap">'
          + '<div class="queue-group-monogram" style="' + themeStyle + '">' + _esc(monogram) + '</div>'
          + '<div class="off-vendor-title-block">'
          + '<div class="off-vendor-title-line">'
          + '<input type="checkbox" class="off-vendor-checkbox"' + (isChecked ? ' checked' : '')
          + ' onclick="event.stopPropagation();_offendersToggleVendor(\'' + vendorJs + '\')">'
          + '<div class="off-vendor-name">' + _esc(vendor) + '</div>'
          + '<span class="off-expand-arrow' + (isExpanded ? ' open' : '') + '" id="off-arrow-' + vKey + '">&#9658;</span>'
          + '</div>'
          + '</div>'
          + '</div>'
          + '<div class="off-vendor-stats">'
          + '<div class="off-vendor-stat"><span class="off-vendor-stat-value">' + vd.totalFlags + '</span><span class="off-vendor-stat-label">Flags</span></div>'
          + '<div class="off-vendor-stat"><span class="off-vendor-stat-value">' + vd.projects.length + '</span><span class="off-vendor-stat-label">Projects</span></div>'
          + '</div>'
          + '</div>'
          + '<div class="off-vendor-footer">'
          + '<div class="off-vendor-flags">';

        topFlags.forEach(function(flag) {
          var cls = (typeof getDiagnosticTagClass === 'function') ? getDiagnosticTagClass(flag) : 'chip-warn';
          var displayFlag = (typeof cleanDiagnosticFlagText === 'function') ? cleanDiagnosticFlagText(flag) : flag;
          html += '<span class="tag ' + cls + '" title="' + _esc(displayFlag) + ' ×' + vd.flagCounts[flag] + '">' + _esc(displayFlag) + ' ×' + vd.flagCounts[flag] + '</span>';
        });
        if (Object.keys(vd.flagCounts).length > 4) {
          html += '<span class="tag chip-muted">+' + (Object.keys(vd.flagCounts).length - 4) + ' more</span>';
        }

        html += '</div>'
          + '<button class="signal-qb-open-btn" id="off-expandbtn-' + vKey + '"'
          + ' onclick="event.stopPropagation();_offendersToggleExpand(\'' + vendorJs + '\')">'
          + (isExpanded ? 'Hide Projects' : 'Review ' + vd.projects.length + ' Project' + (vd.projects.length !== 1 ? 's' : ''))
          + '</button>'
          + '</div>'
          + '</div>';

        // Collapsible project rows
        html += '<div class="off-project-list' + (isExpanded ? ' open' : '') + '" id="off-pl-' + vKey + '">'
          + '<div class="off-project-list-inner">';
        vd.projects.forEach(function(p) {
          var stageStatus = [p.city, p.stage, p.status].filter(Boolean).join(' · ');
          var fdhJs = (typeof escJs === 'function') ? escJs(p.fdh || '') : String(p.fdh || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          // Top row: FDH + meta + Open button
          var rowHtml = '<div class="off-project-row">'
            + '<div class="off-project-row-top">'
            + '<span class="off-project-fdh">' + _esc(p.fdh || '—') + '</span>'
            + '<span class="off-project-meta">' + _esc(stageStatus) + '</span>'
            + '<button class="signal-qb-open-btn" style="font-size:9px;padding:4px 8px;flex-shrink:0"'
            + ' onclick="event.stopPropagation();_signalNavigateToItem(\'' + fdhJs + '\')">Open Detail</button>'
            + '</div>';
          // Flag chips row — each project's specific offences
          if (p.flags && p.flags.length) {
            rowHtml += '<div class="off-project-flags">';
            p.flags.forEach(function(flag) {
              var cls = (typeof getDiagnosticTagClass === 'function') ? getDiagnosticTagClass(flag) : 'chip-muted';
              var displayFlag = (typeof cleanDiagnosticFlagText === 'function') ? cleanDiagnosticFlagText(flag) : flag;
              rowHtml += '<span class="tag ' + cls + '" style="font-size:8px;padding:2px 6px">' + _esc(displayFlag) + '</span>';
            });
            rowHtml += '</div>';
          }
          rowHtml += '</div>';
          html += rowHtml;
        });
        html += '</div></div>';
      });
      html += '</div>';
    }

    el.innerHTML = html;
    if (_offendersPmPanelOpen) _offendersLoadPmEmails();
  }

  // ── Sort & filter ─────────────────────────────────────────────────
  function _offendersSetSort(by) {
    _offendersSortBy = by;
    _renderSignalOffenders();
  }

  function _offendersSetFlagFilter(flag) {
    _offendersActiveFlagFilter = flag;
    _renderSignalOffenders();
  }

  // ── Vendor selection (checkboxes for export) ──────────────────────
  function _offendersToggleVendor(vendor) {
    _offendersSelectedVendors[vendor] = !_offendersSelectedVendors[vendor];
    _renderSignalOffenders();
  }

  // ── Expand/collapse project list ──────────────────────────────────
  function _offendersToggleExpand(vendor) {
    _offendersExpanded[vendor] = !_offendersExpanded[vendor];
    var vKey = vendor.replace(/[^a-z0-9]/gi, '_');
    var pl    = document.getElementById('off-pl-'       + vKey);
    var arrow = document.getElementById('off-arrow-'    + vKey);
    var btn   = document.getElementById('off-expandbtn-' + vKey);
    var open  = !!_offendersExpanded[vendor];
    if (pl)    pl.classList.toggle('open', open);
    if (arrow) arrow.classList.toggle('open', open);
    if (btn) {
      var count = pl ? pl.querySelectorAll('.off-project-row').length : 0;
      btn.textContent = open ? 'Hide Projects' : 'Review ' + count + ' Project' + (count !== 1 ? 's' : '');
    }
  }

  function _offendersToggleUtilityDrawer() {
    _offendersUtilityDrawerOpen = !_offendersUtilityDrawerOpen;
    _renderSignalOffenders();
  }

  // ── PM email panel ────────────────────────────────────────────────
  function _offendersTogglePmPanel() {
    _offendersUtilityDrawerOpen = true;
    _offendersPmPanelOpen = !_offendersPmPanelOpen;
    _renderSignalOffenders();
  }

  function _offendersLoadPmEmails() {
    var grid = document.getElementById('off-pm-grid');
    if (!grid) return;
    grid.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">Loading...</span>';
    google.script.run
      .withSuccessHandler(function(map) {
        var src = (typeof allActionItems !== 'undefined') ? allActionItems : [];
        var vendors = Object.keys(src.reduce(function(acc, i) { if (i.vendor) acc[i.vendor] = true; return acc; }, {})).sort();
        if (!vendors.length) {
          grid.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">No vendors in queue.</span>';
          return;
        }
        grid.innerHTML = vendors.map(function(v) {
          var vKey = v.replace(/[^a-z0-9]/gi, '_');
          return '<div class="off-pm-row">'
            + '<label class="off-pm-label">' + _esc(v) + '</label>'
            + '<input class="off-pm-input" id="off-pm-input-' + vKey + '" type="email" placeholder="pm@domain.com" value="' + _esc(map[v] || '') + '">'
            + '</div>';
        }).join('');
      })
      .withFailureHandler(function(err) {
        if (grid) grid.innerHTML = '<span style="font-size:11px;color:#ef4444">Failed: ' + _esc(String(err)) + '</span>';
      })
      .getVendorPmEmailsForUI();
  }

  function _offendersSavePmEmails() {
    var statusEl = document.getElementById('off-pm-save-status');
    if (statusEl) statusEl.textContent = 'Saving...';
    var src = (typeof allActionItems !== 'undefined') ? allActionItems : [];
    var vendors = Object.keys(src.reduce(function(acc, i) { if (i.vendor) acc[i.vendor] = true; return acc; }, {})).sort();
    var map = {};
    vendors.forEach(function(v) {
      var input = document.getElementById('off-pm-input-' + v.replace(/[^a-z0-9]/gi, '_'));
      if (input && input.value.trim()) map[v] = input.value.trim();
    });
    google.script.run
      .withSuccessHandler(function() {
        if (statusEl) {
          statusEl.textContent = 'Saved';
          setTimeout(function() { if (statusEl) statusEl.textContent = ''; }, 3000);
        }
      })
      .withFailureHandler(function(err) {
        if (statusEl) statusEl.textContent = 'Error: ' + String(err);
      })
      .saveVendorPmEmailsFromUI(map);
  }

  // ── CSV export ────────────────────────────────────────────────────
  function _offendersExportAll() {
    var email = prompt('Send CSV report to email:');
    if (!email || !email.trim()) return;
    _offendersRunExport(null, email.trim());
  }

  function _offendersExportSelected() {
    var selected = Object.keys(_offendersSelectedVendors).filter(function(v) { return _offendersSelectedVendors[v]; });
    if (!selected.length) { alert('Check at least one vendor checkbox to export selected.'); return; }
    var email = prompt('Send CSV for ' + selected.length + ' vendor(s) to email:');
    if (!email || !email.trim()) return;
    _offendersRunExport(selected, email.trim());
  }

  function _offendersRunExport(vendorList, email) {
    var allBtns = document.querySelectorAll('.off-export-btn');
    allBtns.forEach(function(b) { b.disabled = true; b.textContent = 'Sending...'; });
    google.script.run
      .withSuccessHandler(function(msg) {
        allBtns.forEach(function(b) { b.disabled = false; });
        var allBtn = document.getElementById('off-btn-export-all');
        var selBtn = document.getElementById('off-btn-export-sel');
        if (allBtn) allBtn.textContent = 'Export All';
        if (selBtn) selBtn.textContent = 'Export Selected';
        if (typeof showToast === 'function') showToast(msg || 'CSV sent.', 'success');
        else alert(msg || 'CSV sent.');
      })
      .withFailureHandler(function(err) {
        allBtns.forEach(function(b) { b.disabled = false; });
        var allBtn = document.getElementById('off-btn-export-all');
        var selBtn = document.getElementById('off-btn-export-sel');
        if (allBtn) allBtn.textContent = 'Export All';
        if (selBtn) selBtn.textContent = 'Export Selected';
        if (typeof showToast === 'function') showToast('Export failed: ' + String(err), 'error');
        else alert('Export failed: ' + String(err));
      })
      .exportOffendersCsv(vendorList, email);
  }

  window._renderSignalOffenders    = _renderSignalOffenders;
  window._offendersSetSort         = _offendersSetSort;
  window._offendersSetFlagFilter   = _offendersSetFlagFilter;
  window._offendersToggleVendor    = _offendersToggleVendor;
  window._offendersToggleExpand    = _offendersToggleExpand;
  window._offendersToggleUtilityDrawer = _offendersToggleUtilityDrawer;
  window._offendersTogglePmPanel   = _offendersTogglePmPanel;
  window._offendersExportAll       = _offendersExportAll;
  window._offendersExportSelected  = _offendersExportSelected;
  window._offendersSavePmEmails    = _offendersSavePmEmails;
})();
</script>
