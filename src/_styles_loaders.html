<style>
      /* 🚀 EXECUTIVE BOOT SEQUENCE LOADER STYLES */
      .obsidian-loader {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: calc(var(--z-max) + 10);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.2s;
        overflow: hidden;
      }

      /* Aurora Underlay */
      .obsidian-loader::before {
        content: '';
        position: absolute;
        inset: -50%;
        background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 70% 70%, rgba(20, 184, 166, 0.12) 0%, transparent 40%),
                    radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        filter: blur(80px);
        animation: aurora-drift 20s ease-in-out infinite alternate;
        z-index: -1;
      }

      @keyframes aurora-drift {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        50% { transform: translate(5%, 5%) rotate(5deg) scale(1.1); }
        100% { transform: translate(-2%, 8%) rotate(-3deg) scale(1.05); }
      }

      body.dark-mode .obsidian-loader {
        background: #080a0f;
      }
      body.dark-mode .obsidian-loader::before {
        background: radial-gradient(circle at 30% 30%, rgba(37, 99, 235, 0.18) 0%, transparent 45%),
                    radial-gradient(circle at 70% 70%, rgba(13, 148, 136, 0.14) 0%, transparent 45%),
                    radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 55%);
      }

      .obsidian-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      body.v2-shell-glassflow .obsidian-loader {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }

      .loader-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        max-width: 480px;
        padding: 40px;
        background: color-mix(in srgb, var(--card-bg) 72%, transparent);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid color-mix(in srgb, var(--border) 45%, transparent);
        border-radius: 32px;
        box-shadow: 
            0 32px 64px rgba(0, 0, 0, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
        z-index: 1;
        transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .obsidian-loader.hidden .loader-content {
        transform: scale(0.92) translateY(20px);
      }

      body.v2-shell-glassflow .loader-content {
        width: min(90vw, 420px);
        min-height: min(75vh, 640px);
        max-height: calc(100vh - 40px);
        justify-content: center;
        align-items: stretch;
        padding: clamp(24px, 5vw, 36px);
      }

      body.v2-shell-glassflow .mobile-loader-shell {
        gap: 24px;
      }

      body.v2-shell-glassflow .mobile-loader-hero {
        gap: 18px;
      }

      body.v2-shell-glassflow .mobile-loader-orbit {
        position: relative;
        width: 130px;
        height: 130px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(20, 184, 166, 0.1));
        border: 1px solid color-mix(in srgb, var(--border) 30%, transparent);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      }

      body.v2-shell-glassflow .mobile-loader-orbit::before {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 50%;
        padding: 2px;
        background: linear-gradient(135deg, #3b82f6, #14b8a6);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.4;
        animation: spin 4s linear infinite;
      }

      body.v2-shell-glassflow .mobile-loader-core {
        width: 80px;
        height: 80px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--accent);
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -1.5px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
      }

      body.v2-shell-glassflow .mobile-loader-brand {
        margin: 0;
        font-size: clamp(38px, 10vw, 48px);
        font-weight: 900;
        letter-spacing: -2.5px;
        line-height: 0.85;
        color: var(--text-main);
      }

      body.v2-shell-glassflow .mobile-loader-copy {
        max-width: 300px;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.5;
      }

      body.v2-shell-glassflow .mobile-loader-signal-card {
        background: color-mix(in srgb, var(--bg) 40%, transparent);
        border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
        border-radius: 20px;
        padding: 16px 20px;
        backdrop-filter: blur(8px);
      }

      body.v2-shell-glassflow .mobile-loader-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0 20px;
        background: color-mix(in srgb, var(--bg) 60%, transparent);
        border: 1px solid var(--border);
        border-radius: 20px;
        min-height: 60px;
        color: var(--text-main);
        font-weight: 800;
        text-align: center;
        font-size: 13px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      body.v2-shell-glassflow .mobile-loader-status-dot {
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: linear-gradient(135deg, #14b8a6, #3b82f6);
        box-shadow: 0 0 15px rgba(20, 184, 166, 0.4);
        animation: loader-breathe 2s ease-in-out infinite;
      }

      @keyframes loader-breathe {
        0%, 100% { transform: scale(0.9); opacity: 0.7; filter: brightness(1); }
        50% { transform: scale(1.15); opacity: 1; filter: brightness(1.2); }
      }

      body.dark-mode .loader-content {
        background: color-mix(in srgb, #111827 82%, transparent);
        border-color: rgba(148, 163, 184, 0.18);
        box-shadow:
          0 28px 76px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .loader-kicker {
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 2.8px;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 16px;
      }
      body.dark-mode .loader-kicker {
        color: #94a3b8;
      }
      .loader-brand-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        margin-bottom: 14px;
      }
      @keyframes spin-core { 100% { transform: rotate(360deg); } }
      @keyframes spin-core-reverse { 100% { transform: rotate(-360deg); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-core {
        0% { transform: scale(0.8); opacity: 0.8; }
        100% { transform: scale(1.2); opacity: 1; }
      }
      .loader-brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -1.4px;
        color: #0f172a;
        margin: 0;
        line-height: 0.92;
      }
      body.dark-mode .loader-brand {
        color: #f8fafc;
      }
      .loader-brand-label {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 2.4px;
        text-transform: uppercase;
        color: #64748b;
        transform: translateY(-1px);
      }
      body.dark-mode .loader-brand-label {
        color: #94a3b8;
      }
      .loader-version {
        font-size: 12px;
        line-height: 1.5;
        font-weight: 700;
        letter-spacing: 0;
        color: #475569;
        margin: 0 0 20px 0;
        max-width: 420px;
      }
      body.dark-mode .loader-version {
        color: #cbd5e1;
      }
      .loader-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      .loader-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(148, 163, 184, 0.28);
        color: #334155;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.2px;
        text-transform: uppercase;
      }
      .loader-pill::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: linear-gradient(135deg, #3b82f6, #14b8a6);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      }
      body.dark-mode .loader-pill {
        background: rgba(15, 23, 42, 0.66);
        border-color: rgba(148, 163, 184, 0.18);
        color: #dbe6f3;
      }
      .loader-progress-wrap {
        width: 100%;
        height: 8px;
        background: rgba(148, 163, 184, 0.18);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .loader-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #2563eb 0%, #14b8a6 55%, #60a5fa 100%);
        border-radius: inherit;
        transition: width 0.1s linear;
        position: relative;
      }
      .loader-progress-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.65), transparent);
        transform: translateX(-100%);
        animation: loader-shimmer 1.8s linear infinite;
      }
      @keyframes loader-shimmer {
        to { transform: translateX(100%); }
      }
      .loader-terminal {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: #475569;
        text-align: left;
        background: rgba(255, 255, 255, 0.54);
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        box-sizing: border-box;
      }
      body.dark-mode .loader-terminal {
        color: #dbe6f3;
        background: rgba(15, 23, 42, 0.62);
        border-color: rgba(148, 163, 184, 0.16);
      }
      .loader-terminal-indicator {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, #14b8a6, #3b82f6);
        box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.12);
        flex: 0 0 auto;
        animation: loader-breathe 1.8s ease-in-out infinite;
      }
      @keyframes loader-breathe {
        0%, 100% { transform: scale(0.9); opacity: 0.82; }
        50% { transform: scale(1.12); opacity: 1; }
      }
      @media (max-width: 560px) {
        .loader-content {
          max-width: min(92vw, 520px);
          padding: 28px 22px 24px;
          border-radius: 24px;
        }
        .loader-brand {
          font-size: 24px;
          gap: 8px;
        }
        .loader-version {
          font-size: 11px;
        }
      }
      @media (max-width: 560px) {
        body.v2-shell-glassflow .loader-content {
          width: min(90vw, 420px);
          min-height: min(78vh, 660px);
          max-height: calc(100vh - 24px);
          padding: 22px 18px 18px;
        }
        body.v2-shell-glassflow .mobile-loader-orbit {
          width: 108px;
          height: 108px;
        }
        body.v2-shell-glassflow .mobile-loader-core {
          width: 64px;
          height: 64px;
          border-radius: 22px;
          font-size: 22px;
        }
        body.v2-shell-glassflow .mobile-loader-copy {
          max-width: 250px;
          font-size: 12px;
        }
        body.v2-shell-glassflow .mobile-loader-signal-card {
          padding: 13px 14px;
        }
      }
      @media (max-height: 520px) {
        body.v2-shell-glassflow .loader-content {
          width: min(90vw, 380px);
          min-height: auto;
          height: calc(100vh - 24px);
          padding: 16px 16px 14px;
        }
        body.v2-shell-glassflow .mobile-loader-shell {
          gap: 12px;
        }
        body.v2-shell-glassflow .mobile-loader-hero {
          gap: 10px;
        }
        body.v2-shell-glassflow .mobile-loader-orbit {
          width: 86px;
          height: 86px;
        }
        body.v2-shell-glassflow .mobile-loader-core {
          width: 52px;
          height: 52px;
          border-radius: 18px;
          font-size: 18px;
        }
        body.v2-shell-glassflow .mobile-loader-brand {
          font-size: 30px;
        }
        body.v2-shell-glassflow .mobile-loader-copy {
          max-width: 240px;
          font-size: 11px;
          line-height: 1.45;
        }
        body.v2-shell-glassflow .mobile-loader-signal-stack {
          gap: 8px;
        }
        body.v2-shell-glassflow .mobile-loader-signal-card {
          padding: 10px 12px;
          border-radius: 14px;
        }
        body.v2-shell-glassflow .mobile-loader-signal-value {
          font-size: 12px;
        }
        body.v2-shell-glassflow .mobile-loader-progress {
          margin-bottom: 10px;
        }
        body.v2-shell-glassflow .mobile-loader-status {
          min-height: 44px;
          padding: 0 12px;
          font-size: 11px;
        }
      }

      /* ✨ FROSTED LOADER STYLES */
      .frosted-loader {
        position: fixed;
        inset: 0;
        z-index: calc(var(--z-max) + 20);
        background: color-mix(in srgb, var(--bg) 32%, transparent);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
      }
      body.dark-mode .frosted-loader {
        background: color-mix(in srgb, #000 48%, transparent);
      }
      .frosted-loader.visible {
        opacity: 1;
        visibility: visible;
      }
      .frosted-card {
        background: color-mix(in srgb, var(--card-bg) 78%, transparent);
        border: 1px solid color-mix(in srgb, var(--border) 45%, transparent);
        border-radius: 28px;
        padding: 28px 28px 24px;
        width: 360px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        box-shadow: 
            0 32px 64px rgba(15, 23, 42, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transform: scale(0.94) translateY(15px);
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        backdrop-filter: blur(12px);
      }
      .frosted-loader.visible .frosted-card {
        transform: scale(1) translateY(0);
      }
      .frosted-brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 28px;
        padding: 0 12px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--bg) 60%, transparent);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .frosted-brand strong {
        color: var(--accent);
      }
      .frosted-head {
        display: flex;
        gap: 18px;
        align-items: center;
        width: 100%;
        margin-bottom: 4px;
      }
      .frosted-title {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.5px;
        color: var(--text-main);
        margin: 0;
        line-height: 1.1;
      }
      .frosted-sub {
        font-size: 12px;
        line-height: 1.45;
        font-weight: 700;
        color: var(--text-muted);
        text-align: left;
      }
      .frosted-data-core {
        position: relative;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        background: color-mix(in srgb, var(--bg) 50%, transparent);
        border-radius: 50%;
        border: 1px solid color-mix(in srgb, var(--border) 30%, transparent);
      }
      .frosted-data-core .ring-1,
      .frosted-data-core .ring-2 {
        position: absolute;
        border-radius: 50%;
        box-sizing: border-box;
      }
      .core-sync .ring-1 {
        width: 100%;
        height: 100%;
        border: 3.5px solid transparent;
        border-top: 3.5px solid #3b82f6;
        border-bottom: 3.5px solid #14b8a6;
        animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }
      .core-sync .ring-2 {
        width: 62%;
        height: 62%;
        border: 3px solid transparent;
        border-left: 3px solid #8b5cf6;
        border-right: 3px solid #60a5fa;
        animation: spin-reverse 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }
      .core-engine .ring-1 {
        width: 100%;
        height: 100%;
        border: 4px dashed #f59e0b;
        animation: spin 3s linear infinite;
        opacity: 0.8;
      }
      .core-engine .ring-2 {
        width: 62%;
        height: 62%;
        border: 4px dashed #ef4444;
        animation: spin-reverse 2s linear infinite;
        opacity: 0.8;
      }
      @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

      .frost-progress-wrap {
        width: 100%;
        height: 6px;
        background: color-mix(in srgb, var(--border) 40%, transparent);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 6px;
      }
      .frost-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #14b8a6);
        transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }
      .frost-progress-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        transform: translateX(-100%);
        animation: loader-shimmer 2s linear infinite;
      }
      .frost-terminal {
        width: 100%;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-align: left;
        background: color-mix(in srgb, var(--bg) 60%, transparent);
        padding: 12px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        box-sizing: border-box;
        margin-top: 4px;
      }
      body.dark-mode .frost-terminal {
        background: #0f172a;
        border-color: #1e293b;
      }

      /* 🚀 Startup View Selector */
      .startup-overlay {
        position: fixed;
        inset: 0;
        z-index: calc(var(--z-max) + 5);
        background: color-mix(in srgb, var(--bg) 40%, transparent);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      body.dark-mode .startup-overlay { background: color-mix(in srgb, #000 50%, transparent); }
      .startup-overlay.visible { opacity: 1; visibility: visible; }
      .startup-modal {
        background: color-mix(in srgb, var(--card-bg) 84%, transparent);
        backdrop-filter: blur(12px);
        border: 1px solid color-mix(in srgb, var(--border) 45%, transparent);
        border-radius: 32px;
        padding: 40px;
        text-align: center;
        box-shadow: 
            0 32px 64px rgba(0, 0, 0, 0.25),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transform: translateY(20px) scale(0.96);
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        width: 100%;
        max-width: 520px;
      }
      .startup-overlay.visible .startup-modal { transform: translateY(0) scale(1); }
      .startup-cards { display: flex; gap: 16px; justify-content: center; }
      .startup-card {
        width: 120px;
        padding: 20px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .startup-card:hover {
        transform: translateY(-4px);
        background: rgba(59, 130, 246, 0.08);
        border-color: #3b82f6;
      }
      .startup-card svg { color: var(--text-main); margin-bottom: 12px; }
      .startup-card:hover svg { color: #3b82f6; }
      .startup-card h3 { margin: 0 0 4px 0; font-size: 14px; font-weight: 900; color: var(--text-main); }
      .startup-card p { margin: 0; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

      @media (max-width: 480px) {
        .startup-overlay { display: none !important; }
      }

      /* ── SIGNAL Operations Console ─────────────────────── */
      .signal-overlay {
        position: fixed;
        inset: 0;
        z-index: calc(var(--z-max) + 5);
        background: color-mix(in srgb, var(--bg) 40%, transparent);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      body.dark-mode .signal-overlay { background: color-mix(in srgb, #000 60%, transparent); }
      .signal-overlay.visible { opacity: 1; visibility: visible; }

      .signal-modal {
        background: color-mix(in srgb, var(--card-bg) 84%, transparent);
