<style>
      /* 🚀 EXECUTIVE BOOT SEQUENCE LOADER STYLES */
      .obsidian-loader {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999999;
        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
      }
      .obsidian-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 320px;
      }
      .data-core {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .core-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      .core-ring.outer {
        width: 100%;
        height: 100%;
        border-top-color: #3b82f6;
        border-bottom-color: #8b5cf6;
        animation: spin-core 2s linear infinite;
      }
      .core-ring.middle {
        width: 70%;
        height: 70%;
        border-left-color: #22c55e;
        border-right-color: #10b981;
        animation: spin-core-reverse 1.5s linear infinite;
      }
      .core-dot {
        width: 12px;
        height: 12px;
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 0 15px 4px rgba(59, 130, 246, 0.6);
        animation: pulse-core 1s ease-in-out infinite alternate;
      }
      @keyframes spin-core { 100% { transform: rotate(360deg); } }
      @keyframes spin-core-reverse { 100% { transform: rotate(-360deg); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-core {
        0% { transform: scale(0.8); opacity: 0.8; }
        100% { transform: scale(1.2); opacity: 1; }
      }
      .loader-brand {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.5px;
        color: #ffffff;
        margin: 0 0 4px 0;
      }
      .loader-version {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        color: #64748b;
        margin-bottom: 32px;
      }
      .loader-progress-wrap {
        width: 100%;
        height: 4px;
        background: #1e293b;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
      }
      .loader-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #a855f7);
        transition: width 0.1s linear;
      }
      .loader-terminal {
        width: 100%;
        font-family: monospace;
        font-size: 11px;
        color: #94a3b8;
        text-align: left;
        background: #0f172a;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #1e293b;
      }

      /* ✨ FROSTED LOADER STYLES */
      .frosted-loader {
        position: fixed;
        inset: 0;
        z-index: 9999999;
        background: rgba(241, 245, 249, 0.4);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      body.dark-mode .frosted-loader {
        background: rgba(9, 9, 11, 0.6);
      }
      .frosted-loader.visible {
        opacity: 1;
        visibility: visible;
      }
      .frosted-card {
        background: color-mix(in srgb, var(--card-bg) 85%, transparent);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px 36px;
        width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        box-shadow: 0 30px 60px rgba(15, 23, 42, 0.15);
        transform: scale(0.95) translateY(10px);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .frosted-loader.visible .frosted-card {
        transform: scale(1) translateY(0);
      }
      .frosted-title {
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 2px;
        color: var(--text-main);
        text-transform: uppercase;
        margin-top: 8px;
      }
      .frosted-sub {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-align: center;
      }
      .frosted-data-core {
        position: relative;
        width: 60px;
        height: 60px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .frosted-data-core .ring-1,
      .frosted-data-core .ring-2 {
        position: absolute;
        border-radius: 50%;
        box-sizing: border-box;
      }
      .core-sync .ring-1 {
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        border-top-color: #3b82f6;
        border-bottom-color: #06b6d4;
        animation: spin-core 1.5s linear infinite;
      }
      .core-sync .ring-2 {
        width: 65%;
        height: 65%;
        border: 3px solid transparent;
        border-left-color: #8b5cf6;
        border-right-color: #3b82f6;
        animation: spin-core-reverse 1s linear infinite;
      }
      .core-engine .ring-1 {
        width: 100%;
        height: 100%;
        border: 3.5px dashed #f59e0b;
        animation: spin-core 3s linear infinite;
      }
      .core-engine .ring-2 {
        width: 65%;
        height: 65%;
        border: 3.5px dashed #ef4444;
        animation: spin-core-reverse 2s linear infinite;
      }
      .frost-progress-wrap {
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 14px;
        margin-bottom: 6px;
      }
      .frost-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3b82f6, #a855f7);
        transition: width 0.1s linear;
      }
      .frost-terminal {
        width: 100%;
        font-family: monospace;
        font-size: 10px;
        color: var(--text-muted);
        text-align: left;
        background: var(--bg);
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        box-sizing: border-box;
      }
      body.dark-mode .frost-terminal {
        background: #0f172a;
        border-color: #1e293b;
      }

      /* 🚀 Startup View Selector */
      .startup-overlay {
        position: fixed;
        inset: 0;
        z-index: 999990;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      body.dark-mode .startup-overlay { background: rgba(0, 0, 0, 0.7); }
      .startup-overlay.visible { opacity: 1; visibility: visible; }
      .startup-modal {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        transform: translateY(20px);
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .startup-overlay.visible .startup-modal { transform: translateY(0); }
      .startup-cards { display: flex; gap: 16px; justify-content: center; }
      .startup-card {
        width: 120px;
        padding: 20px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .startup-card:hover {
        transform: translateY(-4px);
        background: rgba(59, 130, 246, 0.08);
        border-color: #3b82f6;
      }
      .startup-card svg { color: var(--text-main); margin-bottom: 12px; }
      .startup-card:hover svg { color: #3b82f6; }
      .startup-card h3 { margin: 0 0 4px 0; font-size: 14px; font-weight: 900; color: var(--text-main); }
      .startup-card p { margin: 0; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

      @media (max-width: 480px) {
        .startup-overlay { display: none !important; }
      }
</style>
