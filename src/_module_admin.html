<script>
// ============================================================
// FILE: _module_admin.html
// ROLE: Admin pane rendering, admin filter/panel helpers,
//   reviewed tray helpers, and outbox rendering module
//   extracted from WebApp.html
// DEPENDS ON: _state_queue.html, _state_session.html,
//   _utils_shared.html, _utils_notifications.html,
//   _module_queue_state.html, _module_digest.html
// DEPENDED ON BY: WebApp.html bootstrap anchors, applyFilters,
//   deck staging flows, and admin/review workflows
// MOBILE NOTES: The drawer/open-state helpers stay desktop-first;
//   mobile rework should adapt these interactions rather than
//   reusing them directly
// AGENT NOTES: Keep function names/signatures stable. Read
//   committedItems/currentActiveItem/allActionItems from owner
//   state files. Crossings-specific UI/actions now live in
//   _module_special_crossings.html.
// ============================================================
// STATE: activeAdminFilter
// READS: admin pane rendering and filter controls
// WRITES: admin toggle helpers and applyFilters
// EXTRACT WITH: filteredItems, allActionItems, currentActiveItem
let activeAdminFilter = null;

/**
 * Navigates to a project and automatically opens the Special Xings popover.
 */
function navToXings(fdh) {
    if (typeof selectItemForNav === 'function') {
        selectItemForNav(fdh);
        setTimeout(() => {
            if (typeof openSpecialXingsPopover === 'function') {
                openSpecialXingsPopover(fdh);
            }
        }, 300);
    }
}

function toggleAdminFilter(type) {
    activeAdminFilter = (activeAdminFilter === type) ? null : type;
    let kpiC = getEl('kpi-admin-crossings'), kpiS = getEl('kpi-admin-status'), kpiB = getEl('kpi-admin-boms');
    if (kpiC) kpiC.classList.toggle('active', activeAdminFilter === 'crossings');
    if (kpiS) kpiS.classList.toggle('active', activeAdminFilter === 'status');
    if (kpiB) kpiB.classList.toggle('active', activeAdminFilter === 'boms');
    applyFilters();
    renderAdminPane(getActiveQueueItems());
}

function toggleAdminPanel() {
    let isOpen = document.body.classList.contains('admin-open');
    if (isOpen) {
        window.__adminPanelExplicitlyClosed = true;
    } else {
        window.__adminPanelExplicitlyClosed = false;
    }
    setAdminPanelOpen(!isOpen);
}

function shouldAutoOpenAdminPanel() {
    return window.innerWidth > 768 && !isIPadLike();
}

function syncAdminFabAnchorToPanel() {
    if (window.innerWidth <= 768) return;

    let pane = getEl('outbox-pane');
    let host = document.querySelector('.reading-pane');
    if (!pane || !host) return;

    // Desktop: Fixed corner position that aligns with the sliding panel
    // Top: 56px (header) + 8px (X offset) = 64px.
    // Right: 12px (X offset)
    let top = 64;
    let right = 12;

    document.documentElement.style.setProperty('--admin-fab-top', `${top}px`);
    document.documentElement.style.setProperty('--admin-fab-right', `${right}px`);
}

function syncReviewHubControlState(open) {
    let pane = getEl('outbox-pane');
    let fab = getEl('admin-fab') || getEl('admin-hub-fab');
    let activeTab = typeof currentPanelTab !== 'undefined' ? currentPanelTab : 'admin';
    let isDeck = typeof isSlideFaceActive === 'function' && isSlideFaceActive();
    
    // Standardize labels for parity
    let tabLabel = isDeck ? 'Manager Review' : (activeTab === 'reviewed' ? 'Manager Review' : activeTab === 'changelog' ? 'Activity' : 'Admin');
    let isOpen = typeof open === 'boolean' ? open : !!(pane && pane.classList.contains('open'));

    if (fab) {
        fab.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        fab.setAttribute('aria-label', isOpen ? `Close ${tabLabel}` : `Open ${tabLabel}`);
        fab.title = isOpen ? `Close ${tabLabel}` : `Open ${tabLabel}`;
        fab.classList.toggle('is-open', isOpen);
    }

    // Handle all potential close buttons (Header and Deck Action Panel)
    const closeButtons = document.querySelectorAll('#admin-panel-close, #deck-panel-close, .review-hub-close-btn, .panel-tab-close');
    closeButtons.forEach(btn => {
        btn.setAttribute('aria-label', `Close ${tabLabel}`);
        btn.title = `Close ${tabLabel}`;
        if (btn.id === 'admin-panel-close' || btn.id === 'deck-panel-close') {
            btn.setAttribute('aria-hidden', !isOpen ? 'true' : 'false');
            btn.tabIndex = isOpen ? 0 : -1;
        }
    });

    // syncReviewHubControlState is still used to update the FAB state.
    syncAdminFabAnchorToPanel();
}

function setAdminPanelOpen(open) {
    let pane = getEl('outbox-pane');
    let overlay = getEl('outbox-overlay');
    let readingPane = document.querySelector('.reading-pane');

    // Prevent redundant state transitions if already in requested state
    const isCurrentlyOpen = document.body.classList.contains('admin-open');
    if (isCurrentlyOpen === open && pane && pane.style.display === (open ? 'flex' : 'none')) return;

    if (open && window.innerWidth > 768 && typeof toggleDesktopFiltersPanel === 'function') {
        let dockPanel = getEl('dock-filters-panel');
        if (dockPanel && dockPanel.classList.contains('is-open')) toggleDesktopFiltersPanel(false);
    }

    // Toggle global body class for CSS orchestration (e.g. smart dock centering)
    document.body.classList.toggle('admin-open', open);

    if (open) {
        if (pane) pane.style.display = 'flex';
        // Immediately sync tab visibility so the correct tab shows as it slides in
        if (typeof syncOutboxPanelMode === 'function') syncOutboxPanelMode();
        
        setTimeout(() => {
            if (pane) pane.classList.add('open');
            if (readingPane) readingPane.classList.add('admin-open');
            syncAdminFabAnchorToPanel();
            if (typeof syncDockClearanceState === 'function') syncDockClearanceState();
        }, 10);
    } else {
        if (pane) pane.classList.remove('open');
        if (readingPane) readingPane.classList.remove('admin-open');
        if (typeof syncDockClearanceState === 'function') syncDockClearanceState();
        syncReviewHubControlState(false);
        setTimeout(() => {
            if (pane && !pane.classList.contains('open')) {
                pane.style.display = 'none';
                // Final sync once transition is fully done and display is none
                if (typeof syncDockClearanceState === 'function') syncDockClearanceState();
            }
        }, 300);
    }

    if (overlay) {
        overlay.classList.toggle('open', open && (window.innerWidth <= 768 || isIPadLike()));
    }

    syncReviewHubControlState(open);
}

function syncAdminPanelForViewport() {
    syncOutboxPanelMode();
    // Only auto-open on desktop if not explicitly closed by user
    if (shouldAutoOpenAdminPanel()) {
        if (window.__adminPanelExplicitlyClosed) return;
        setAdminPanelOpen(true);
    } else {
        setAdminPanelOpen(false);
    }
}

function openAdminPanelByDefault() {
    syncAdminPanelForViewport();

    if (!window.__adminFabAnchorResizeBound) {
        window.addEventListener('resize', syncAdminFabAnchorToPanel);
        window.__adminFabAnchorResizeBound = true;
    }

    syncAdminFabAnchorToPanel();
}

function syncReviewHubHeaderCount() {
    let headerBadge = getEl('ob-header-count');
    if (!headerBadge) return;

    let activeTab = typeof currentPanelTab !== 'undefined' ? currentPanelTab : 'admin';
    let total = 0;

    if (activeTab === 'admin') {
        let items = getActiveQueueItems() || [];
        let crossings = items.filter(i => i.flags.includes("đźš© ADMIN: CHECK CROSSINGS") && !isCompleteOrOfs(i)).length;
        let bomInput = items.filter(i => (i.flags.includes("âš ď¸Ź PLEASE INPUT BOM") || i.flags.includes("MISSING UG BOM") || i.flags.includes("MISSING STRAND BOM")) && !isCompleteOrOfs(i)).length;
        let bomCheck = items.filter(i => (i.flags.includes("âš ď¸Ź CHECK BOM (UG/AE)") || i.flags.includes("HIGH UG VARIANCE") || i.flags.includes("HIGH STRAND VARIANCE")) && !isCompleteOrOfs(i)).length;
        let status = items.filter(i => (i.flags.includes("đźš© STATUS MISMATCH") || i.flags.includes("đźš© MISSING QB STATUS")) && !isCompleteOrOfs(i)).length;
        total = crossings + bomInput + bomCheck + status;
    } else if (activeTab === 'reviewed') {
        let stagedCount = typeof stagedDeckItems !== 'undefined' ? stagedDeckItems.length : 0;
        let reviewedCount = typeof committedItems !== 'undefined' ? committedItems.length : 0;
        total = stagedCount + reviewedCount;
    } else {
        return;
    }

    headerBadge.textContent = String(total);
    headerBadge.style.display = 'inline-flex';
}

function renderSpecialCrossingsAdminSection(items) {
    if (!items || items.length === 0) return '';
    let html = _adminSection('Special Crossings to Verify', items, function(item) {
        // Use logic similar to Project Schedule to decide label
        const needsConfirmation = !item.isXing || !item.rawSpecialX || item.rawSpecialX === "â€”";
        const btnLabel = needsConfirmation ? 'CONFIRM X-INGS' : 'REVIEW X-INGS';
        
        return `<div class="admin-list-card">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
                <div style="cursor:pointer;" onclick="selectItemForNav('${item.fdh}')">
                    <div style="font-size:12px; font-weight:900; color:var(--text-main);">${item.fdh}</div>
                    <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${item.city} Â· ${item.vendor}</div>
                </div>
                <button class="btn" onclick="event.stopPropagation(); navToXings('${item.fdh}')" style="padding:5px 10px; font-size:10px; font-weight:900; background:var(--accent); color:#fff; border-color:var(--accent-dark); white-space:nowrap; flex-shrink:0;">${btnLabel}</button>
            </div>
        </div>`;
    });
    
    // Inject AI Findings into the same section container
    html += `<div id="cd-findings-integrated-list"></div>`;
    return html;
}

// TODO: MODULE CANDIDATE - admin module still mutates reviewed tray, currentActiveItem, queue filters, and shared queue state.
function renderAdminPane(items) {
    let pane = getEl('admin-pane-content');
    if (!pane) return;
    if (!items || items.length === 0) {
        syncReviewHubHeaderCount();
        pane.innerHTML = '<div class="empty-msg" style="padding:40px 20px;">No admin tasks.</div>';
        return;
    }

    let crossings = items.filter(i => i.flags.includes("đźš© ADMIN: CHECK CROSSINGS") && !isCompleteOrOfs(i));
    let bomInput = items.filter(i => (i.flags.includes("âš ď¸Ź PLEASE INPUT BOM") || i.flags.includes("MISSING UG BOM") || i.flags.includes("MISSING STRAND BOM")) && !isCompleteOrOfs(i));
    let bomCheck = items.filter(i => (i.flags.includes("âš ď¸Ź CHECK BOM (UG/AE)") || i.flags.includes("HIGH UG VARIANCE") || i.flags.includes("HIGH STRAND VARIANCE")) && !isCompleteOrOfs(i));
    let status = items.filter(i => (i.flags.includes("đźš© STATUS MISMATCH") || i.flags.includes("đźš© MISSING QB STATUS")) && !isCompleteOrOfs(i));
    let bomsTotal = bomInput.length + bomCheck.length;

    let totalAdmin = crossings.length + bomsTotal + status.length;
    let badge = getEl('admin-badge');
    if (badge) { badge.textContent = totalAdmin; badge.style.display = totalAdmin > 0 ? 'inline-flex' : 'none'; }
    syncReviewHubHeaderCount();

    let kpiCv = getEl('kpi-crossings-val'), kpiSv = getEl('kpi-status-val'), kpiBv = getEl('kpi-boms-val');
    if (kpiCv) kpiCv.textContent = crossings.length;
    if (kpiSv) kpiSv.textContent = status.length;
    if (kpiBv) kpiBv.textContent = bomsTotal;

    let html = '';

    if ((!activeAdminFilter || activeAdminFilter === 'crossings') && crossings.length > 0) {
        html += renderSpecialCrossingsAdminSection(crossings);
    }

    if (!activeAdminFilter || activeAdminFilter === 'boms') {
        const renderSpecificFlags = (item, keywords) => {
            const flags = (item.flags || "").split('\n').filter(f => keywords.some(k => f.toUpperCase().includes(k)));
            if (flags.length === 0) return '';
            return `<div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">` + 
                flags.map(f => `<span style="background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); padding:1px 5px; border-radius:3px; font-size:9px; font-weight:900;">${f.replace(/[đźš©âš ď¸Źâś…đźš¨]/g, '').trim()}</span>`).join('') + 
                `</div>`;
        };

        html += _adminSection('BOMs to Input', bomInput, function(item) {
            return `<div class="admin-list-card" onclick="selectItemForNav('${item.fdh}')">
                <div style="font-size:12px; font-weight:900; color:var(--text-main);">${item.fdh}</div>
                <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${item.city} Â· ${item.vendor} Â· ${item.stage}</div>
                ${renderSpecificFlags(item, ['MISSING', 'INPUT BOM'])}
                <div style="font-size:10px; color:var(--text-muted); margin-top:3px; font-style:italic;">BOM quantity is missing despite reported activity. Verify BOM in QuickBase.</div>
            </div>`;
        });
        html += _adminSection('BOM Variance â€” High', bomCheck, function(item) {
            return `<div class="admin-list-card" onclick="selectItemForNav('${item.fdh}')">
                <div style="font-size:12px; font-weight:900; color:var(--text-main);">${item.fdh}</div>
                <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${item.city} Â· ${item.vendor} Â· ${item.stage}</div>
                ${renderSpecificFlags(item, ['VARIANCE', 'CHECK BOM'])}
                <div style="font-size:10px; color:var(--text-muted); margin-top:3px; font-style:italic;">Production significantly exceeding BOM. Verify BOM accuracy in QuickBase.</div>
            </div>`;
        });
    }

    if ((!activeAdminFilter || activeAdminFilter === 'status') && status.length > 0) {
        html += _adminSection('Status Mismatches', status, function(item) {
            return `<div class="admin-list-card" onclick="selectItemForNav('${item.fdh}')">
                <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
                    <div>
                        <div style="font-size:12px; font-weight:900; color:var(--text-main);">${item.fdh}</div>
                        <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${item.city} Â· ${item.vendor}</div>
                        <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">QB Status: <span style="font-weight:bold; color:var(--text-main);">${item.status}</span></div>
                    </div>
                    <button class="btn" onclick="event.stopPropagation(); markQbUpdatedFromAdmin('${item.fdh}', this)" style="padding:5px 10px; font-size:10px; font-weight:900; background:#2563eb; color:#fff; border-color:#1d4ed8; white-space:nowrap; flex-shrink:0; display:inline-flex; align-items:center; gap:4px;">Updated</button>
                </div>
            </div>`;
        });
    }

    if (html === '') html = '<div class="empty-msg" style="padding:40px 20px;">No items in this category.</div>';
    pane.innerHTML = html;
    
    // Trigger the writeback list refresh
    if (typeof refreshCDIngestionInfo === 'function') refreshCDIngestionInfo();
}

/**
 * UI: Trigger the Gemini CD Scanning process.
 */
function triggerCDScan() {
    const btn = getEl('btn-run-cd-scan');
    if (btn) { btn.disabled = true; btn.innerText = 'Scanning...'; }

    google.script.run
        .withSuccessHandler(res => {
            if (btn) { btn.disabled = false; btn.innerText = 'Run Scan'; }
            refreshCDFindings();
        })
        .withFailureHandler(err => {
            if (btn) { btn.disabled = false; btn.innerText = 'Run Scan'; }
            alert('Scan Failed: ' + err.message);
        })
        .manualTriggerCDIngestion();
}

function refreshCDIngestionInfo() {
    refreshCDFindings();
}

function refreshCDFindings() {
    const list = getEl('cd-findings-integrated-list');
    if (!list) return;
    
    google.script.run
        .withSuccessHandler(findings => {
            if (!findings || findings.length === 0) {
                list.innerHTML = '';
                return;
            }
            let html = '<div style="font-size:9px; font-weight:900; color:var(--text-muted); margin-bottom:8px; padding:0 4px; margin-top:15px; text-transform:uppercase;">AI Extracted Crossings (To Verify)</div>';
            findings.forEach((f, idx) => {
                html += `
                    <div class="admin-list-card" style="border-left:3px solid #a855f7;" id="cd-finding-${idx}">
                        <div style="font-weight:900; font-size:11px; color:var(--text-main);">${esc(f.fdh)}</div>
                        <div style="font-size:9px; color:var(--text-muted); margin-top:2px; line-height:1.2;">${esc(f.summary)}</div>
                        <button class="btn" onclick="openCDFindingReview(${idx})" style="margin-top:8px; width:100%; padding:4px; font-size:9px; background:rgba(168,85,247,0.1); color:#a855f7; border:1px solid rgba(168,85,247,0.3);">Review Extraction</button>
                    </div>
                `;
            });
            list.innerHTML = html;
            window.__lastCDFindings = findings;
        })
        .getPendingCDFindings();
}

/**
 * Global state for CD review due diligence
 */
let __cdFileClicked = false;

/**
 * Opens an editable review form for an AI finding.
 */
function openCDFindingReview(idx) {
    const f = window.__lastCDFindings[idx];
    if (!f) return;
    
    __cdFileClicked = false;
    
    const overlay = document.createElement('div');
    overlay.className = 'startup-overlay visible';
    overlay.id = 'cd-review-overlay';
    overlay.innerHTML = `
        <div class="startup-modal" style="text-align:left; width:400px; max-width:90vw;">
            <h2 style="margin-top:0; font-size:16px; font-weight:900; color:var(--text-main);">Confirm AI Crossing Extraction</h2>
            <div style="font-size:11px; font-weight:900; color:var(--accent); margin-bottom:12px;">PROJECT: ${f.fdh}</div>
            
            <div class="section-label" style="font-size:9px;">AI SUMMARY</div>
            <div class="vendor-bubble" style="font-size:11px; margin-bottom:12px; background:var(--bg); border:1px solid var(--border);">${esc(f.summary)}</div>
            
            <div class="section-label" style="font-size:9px;">EDIT DETAILS (FOR QUICKBASE)</div>
            <textarea id="cd-review-details" class="chat-bubble" style="width:100%; min-height:80px; font-size:11px; margin-bottom:16px;">${f.details}</textarea>
            
            <div style="background:rgba(59, 130, 246, 0.05); border:1px solid rgba(59, 130, 246, 0.2); padding:12px; border-radius:10px; margin-bottom:20px;">
                <div style="font-size:10px; font-weight:800; color:var(--text-main); margin-bottom:6px;">DUE DILIGENCE REQUIRED</div>
                <a href="${f.fileUrl}" target="_blank" onclick="unlockCDCommit()" style="display:flex; align-items:center; gap:6px; font-size:11px; color:#2563eb; font-weight:900; text-decoration:none;">
                    ${icon('folder')} OPEN SOURCE DOCUMENT
                </a>
                <div style="font-size:9px; color:var(--text-muted); margin-top:4px;">You must open the file to verify findings before committing.</div>
            </div>
            
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button class="btn btn-skip" onclick="closeCDReview()">Cancel</button>
                <button class="btn btn-primary" id="btn-cd-commit" disabled onclick="stageCDFindingConfirmed(${idx})" style="opacity:0.5;">Commit to Queue</button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
}

function unlockCDCommit() {
    __cdFileClicked = true;
    const btn = getEl('btn-cd-commit');
    if (btn) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.background = '#a855f7';
        btn.style.borderColor = '#9333ea';
    }
}

function closeCDReview() {
    const el = getEl('cd-review-overlay');
    if (el) el.remove();
}

function stageCDFindingConfirmed(idx) {
    const f = window.__lastCDFindings[idx];
    const editedDetails = getEl('cd-review-details').value;
    
    showToast('Staging finding for ' + f.fdh, 'info');
    const payload = {
        fdh: f.fdh,
        xing: 'YES',
        xingDetails: editedDetails,
        verifiedDate: new Date().toLocaleDateString()
    };
    
    google.script.run
        .withSuccessHandler(() => {
            showToast('Finding staged to sync queue.', 'success');
            closeCDReview();
            refreshCDFindings();
            refreshPendingWritebacks();
        })
        .stageExternalFinding(payload);
}

function markQbUpdatedFromAdmin(fdhId, btn) {
    if (btn) { btn.innerText = 'Saving...'; btn.disabled = true; }
    google.script.run.withSuccessHandler(function() {
        let item = (allActionItems || []).find(i => i.fdh === fdhId) || currentActiveItem;
        if (item) {
            item.flags = String(item.flags || '')
                .replace('đźš© STATUS MISMATCH', 'âš ď¸Ź ADMIN: REFRESH REF DATA')
                .replace('đźš© MISSING QB STATUS', 'âš ď¸Ź ADMIN: REFRESH REF DATA')
                .trim();
            item.comment = 'QB status updated; waiting on refreshed reference data.';
            let wasCurrent = currentActiveItem && currentActiveItem.fdh === fdhId;
            if (wasCurrent) currentActiveItem = null;
            moveItemToReviewed(item, { comment: item.comment, action: 'admin-status' });
            if (wasCurrent) advanceAfterAction();
            else applyFilters();
            showToast(`${fdhId} moved to Reviewed`);
        }
    }).withFailureHandler(function(err) {
        alert('Failed to save: ' + err.message);
        if (btn) { btn.innerText = 'Updated'; btn.disabled = false; }
    }).markStatusSyncComplete(fdhId);
}

// updateAdminBadge is owned by _module_tabs.html

function persistReviewedTray() {
    try { localStorage.setItem(REVIEWED_TRAY_STORAGE_KEY, JSON.stringify(committedItems || [])); } catch (e) {}
}

function loadReviewedTray() {
    try {
        let raw = localStorage.getItem(REVIEWED_TRAY_STORAGE_KEY);
        let parsed = raw ? JSON.parse(raw) : [];
        committedItems = Array.isArray(parsed) ? parsed.filter(i => i && i.fdh) : [];
    } catch (e) {
        committedItems = [];
    }
}

function getReviewedFdhSet() {
    return new Set((committedItems || []).map(i => String(i.fdh || '')));
}

function addToReviewedTray(item, meta) {
    if (!item || !item.fdh) return;
    let reviewedItem = JSON.parse(JSON.stringify(item));
    reviewedItem.comment = meta && meta.comment !== undefined ? meta.comment : (reviewedItem.comment || '');
    reviewedItem._reviewedAction = meta && meta.action ? meta.action : (reviewedItem._reviewedAction || 'reviewed');
    reviewedItem._reviewedAt = meta && meta.reviewedAt ? meta.reviewedAt : Date.now();
    committedItems = committedItems.filter(i => String(i.fdh || '') !== String(reviewedItem.fdh || ''));
    committedItems.unshift(reviewedItem);
    persistReviewedTray();
}

function clearReviewedTray(silent) {
    committedItems = [];
    persistReviewedTray();
    updateAdminBadge();
    renderAdminPane(getActiveQueueItems());
    applyFilters();
    renderOutbox();
    if (!silent) showToast('Reviewed tray cleared');
}

function renderOutbox() {
    const list = getEl('outbox-list');
    if (!list) return;
    if (typeof committedItems === 'undefined' || typeof stagedDeckItems === 'undefined') return;
    
    const stagedItems = getStagedReviewItems();
    const reviewedItems = committedItems || [];
    const qbItems = typeof pendingWritebacks !== 'undefined' ? pendingWritebacks : [];
    
    const totalCount = stagedItems.length + reviewedItems.length + qbItems.length;
    setTxt('ob-count', totalCount);
    syncReviewHubHeaderCount();
    let tabBadge = getEl('ob-count');
    if (tabBadge) {
        tabBadge.innerText = totalCount;
        tabBadge.style.display = totalCount > 0 ? 'inline-flex' : 'none';
    }
    list.innerHTML = '';
    if (totalCount === 0) {
        list.innerHTML = `<div class="empty-msg">No staged or reviewed items.</div>`;
        return;
    }

    const createSection = function(title, count, actions, items, type, opts) {
        opts = opts || {};
        let isCollapsible = !!opts.collapsible;
        let isCollapsed = !!opts.collapsed;
        
        // AUTO-COLLAPSE RULE: If count is 0, start collapsed regardless of preference
        if (count === 0) isCollapsed = true;

        let section = document.createElement('div');
        if (type === 'qb' || type === 'staged') section.style.borderBottom = '1px solid var(--border)';

        let header = document.createElement('div');
        header.className = `ob-header ob-header-${type}`;
        header.style.padding = '6px 14px 6px 11px';
        if (isCollapsible) {
            header.style.cursor = 'pointer';
            header.onclick = function() { toggleReviewHubSection(type); };
        }
        let titleEl = document.createElement('div');
        titleEl.className = 'review-hub-section-title';
        titleEl.style.cssText = 'flex-wrap: nowrap; overflow: hidden; min-width: 0;';

        let labelEl = document.createElement('div');
        labelEl.className = 'review-hub-section-label';
        labelEl.textContent = type === 'staged' ? 'Deck Staging' : (type === 'qb' ? 'Quickbase Sync' : 'Manager Review');

        let nameEl = document.createElement('div');
        nameEl.className = 'review-hub-section-name';
        nameEl.style.display = 'flex';
        nameEl.style.alignItems = 'center';
        nameEl.style.gap = '8px';
        nameEl.innerHTML = `${isCollapsible ? `<span style="display:inline-flex; align-items:center; justify-content:center; width:14px; color:var(--text-main); font-size:11px;">${isCollapsed ? '&#9656;' : '&#9662;'}</span>` : ''}<span>${title}</span>`;

        let countEl = document.createElement('div');
        countEl.className = 'review-hub-section-count';
        countEl.textContent = count;

        titleEl.appendChild(labelEl);
        titleEl.appendChild(nameEl);
        let rightWrap = document.createElement('div');
        rightWrap.style.cssText = 'display:flex; align-items:center; gap:6px; flex-shrink:0;';
        let actionWrap = document.createElement('div');
        actionWrap.style.cssText = 'display:flex; gap:6px;';
        actions.forEach(function(def) {
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.cssText = 'font-size:10px; padding:3px 8px;';
            btn.textContent = def.label;
            btn.onclick = function(event) {
                event.stopPropagation();
                def.onClick();
            };
            actionWrap.appendChild(btn);
        });
        rightWrap.appendChild(countEl);
        rightWrap.appendChild(actionWrap);
        header.appendChild(titleEl);
        header.appendChild(rightWrap);
        section.appendChild(header);

        let body = document.createElement('div');
        body.style.display = isCollapsed ? 'none' : '';

        if (!items.length) {
            let empty = document.createElement('div');
            empty.className = 'empty-msg';
            empty.style.cssText = 'padding:14px 16px; margin:0; font-size:11px;';
            empty.textContent = type === 'staged' ? 'No staged items.' : (type === 'qb' ? 'No pending syncs.' : 'No reviewed items.');
            body.appendChild(empty);
            section.appendChild(body);
            return section;
        }

        items.forEach(function(item, idx) {
            let card = document.createElement('div');
            card.className = 'ob-card';
            
            if (type === 'qb') {
                const isCollision = item.status === 'collision';
                if (isCollision) card.style.borderLeft = '3px solid #ef4444';
                card.onclick = function() { selectItemForNav(item.fdh); };
                const btnLabel = isCollision ? 'FORCE' : 'Review';
                const btnBg = isCollision ? '#ef4444' : 'var(--accent)';
                card.innerHTML = `
                    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
                        <div style="font-weight:900; font-size:12px; color:var(--text-main);">${esc(item.fdh)}</div>
                        <button class="btn" onclick="event.stopPropagation(); reviewAndCommitSingle(${idx})" style="padding:2px 6px; font-size:9px; background:${btnBg}; color:#fff; border:none; font-weight:900;">${btnLabel}</button>
                    </div>
                    <div style="font-size:10px; color:var(--text-muted); margin-top:4px;">Type: ${esc(item.type)}</div>
                    ${isCollision ? `<div style="font-size:9px; font-weight:900; color:#ef4444; margin-top:4px;">âš ď¸Ź DATA COLLISION</div>` : ''}
                `;
            } else {
                card.onclick = function() { openPane(item, null); };
                card.innerHTML = `
                    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
                        <div style="font-weight:900; font-size:12px; color:var(--text-main);">${esc(item.fdh)}</div>
                        <span class="tag ${type === 'staged' ? 'chip-magic' : 'chip-complete'}">${type === 'staged' ? 'STAGED' : 'REVIEWED'}</span>
                    </div>
                    <div style="font-size:10px; color:var(--text-muted); margin-top:4px;">${esc(item.vendor || item.city || 'Unknown')}</div>
                    <div style="font-family:monospace; font-size:10px; color:var(--text-muted); margin-top:4px; max-height:30px; overflow:hidden;">${esc(type === 'staged' ? (item.comment || 'Ready for batch export') : (item.comment || 'Reviewed'))}</div>`;
            }
            body.appendChild(card);
        });

        section.appendChild(body);
        return section;
    };

    list.appendChild(createSection('Quickbase Syncs', qbItems.length, [
        { label: 'Sync All', onClick: function() { commitAllPending(); } }
    ], qbItems, 'qb', { collapsible: true, collapsed: isQbSyncCollapsed }));

    list.appendChild(createSection('Staged', stagedItems.length, [
        { label: 'â†‘ Export Batch', onClick: function() { promptBatchDeckExport(); } },
        { label: 'Clear', onClick: function() { clearStagedDeckItems(); } }
    ], stagedItems, 'staged', { collapsible: true, collapsed: isStagedReviewCollapsed }));

    list.appendChild(createSection('Reviewed', reviewedItems.length, [
        { label: 'â†‘ Export', onClick: function() { promptEmailExport(); } },
        { label: 'Clear', onClick: function() { clearReviewedTray(); } }
    ], reviewedItems, 'reviewed', { collapsible: true, collapsed: isManagerReviewCollapsed }));
}
</script>
