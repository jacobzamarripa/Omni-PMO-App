<script>
// ============================================================
// FILE: _module_daily_upload.html
// ROLE: Upload Center workspace — daily production upload to QB
// ============================================================

var _duQueue = [];
var _duFiltered = [];
var _duSelected = new Set();
var _duDirty = {};
var _duSortCol = 'Date';
var _duSortDir = 'desc';
var _duFilterStatus = 'all';
var _duFilterVendor = 'all';
var _duSearchQuery = '';
var _duStats = {};
var _duHistory = [];
var _duHistoryOpen = false;
var _duMissing = [];
var _duMissingDate = '';
var _duMissingPanelOpen = false;
var _duColWidths = {};
var _duResize = null;
var _duEditMode = false;
var _duIsSaving = false;
var _duInitialized = false;
var _duModalRestoreFocus = null;
var _duLastLoadedAt = null;
var _duSearchTimeout = null;
var _duValidation = {};
var _duSwimlaneOpen = { issues: true, ready: true, uploaded: false };

var _DU_COL_GROUP = {
  'Date':                       'col-dark-navy',
  'Contractor':                 'col-dark-navy',
  'FDH Engineering ID':         'col-dark-navy col-fdh',
  'Locates Called In':          'col-lime',
  'Cabinets Set':               'col-lime',
  'Light to Cabinets':          'col-lime',
  'Target Completion Date':     'col-lime',
  'Daily UG Footage':           'col-ug-footage',
  'Daily Strand Footage':       'col-strand',
  'Daily Fiber Footage':        'col-fiber',
  'Daily NAPs/Encl. Completed': 'col-nap',
  'Drills':                     'col-dark-navy',
  'Missles':                    'col-dark-navy',
  'AE Crews':                   'col-dark-navy',
  'Fiber Pulling Crews':        'col-dark-navy',
  'Splicing Crews':             'col-dark-navy',
  'Construction Comments':      'col-dark-navy col-comments'
};

var _DU_BOOL_COLS = new Set(['Locates Called In', 'Cabinets Set', 'Light to Cabinets']);
var _DU_NUMERIC_COLS = new Set([
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage',
  'Daily NAPs/Encl. Completed', 'Drills', 'Missles',
  'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews'
]);
var _DU_EDITABLE_COLS = new Set([
  'Locates Called In', 'Cabinets Set', 'Light to Cabinets', 'Target Completion Date',
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage', 'Daily NAPs/Encl. Completed',
  'Drills', 'Missles', 'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews',
  'Construction Comments'
]);
var _DU_TABLE_COLS = [
  'Date', 'Contractor', 'FDH Engineering ID',
  'Locates Called In', 'Cabinets Set', 'Light to Cabinets', 'Target Completion Date',
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage', 'Daily NAPs/Encl. Completed',
  'Drills', 'Missles', 'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews',
  'Construction Comments'
];

function initUploadWorkspace() {
  if (!_duInitialized) {
    _duMissingDate = _duTodayStr();
    window.addEventListener('beforeunload', _duBeforeUnload);
    document.addEventListener('keydown', _duHandleModalKeydown);
    _duInitialized = true;
  }
  _duRefreshAll({ force: true });
  setTimeout(_duInitColResizers, 50);
}

function _duRefreshAll(options) {
  options = options || {};
  if (_duIsSaving) {
    showToast('Please wait for current saves to finish.', 'warn');
    return;
  }
  if (!options.force && !_duConfirmLeaveWithUnsaved('refresh the upload queue')) return;
  _duSetTableLoading(true);
  _duLoadStats();
  _duLoadMissing();
  _duLoadQueue();
  _duLoadHistory();
}

function _duHandleRefresh() {
  _duRefreshAll();
}

function _duLoadQueue() {
  google.script.run
    .withSuccessHandler(function(items) {
      _duQueue = items || [];
      _duSelected.forEach(function(rowIdx) {
        if (!_duQueue.some(function(r) { return r.rowIdx === rowIdx; })) _duSelected.delete(rowIdx);
      });
      _duDirty = {};
      _duEditMode = false;
      _duLastLoadedAt = new Date();
      _duPopulateVendorOptions();
      _duApplyFilters();
      _duSetTableLoading(false);
      _duRenderToolbar();
      _duRenderLastSync();
    })
    .withFailureHandler(function(err) {
      _duSetTableLoading(false);
      showToast('Failed to load upload queue: ' + (err.message || err), 'error');
    })
    .getDailyUploadQueue();
}

function _duLoadStats() {
  google.script.run
    .withSuccessHandler(function(stats) {
      _duStats = stats || {};
      _duRenderKpis();
    })
    .withFailureHandler(function() {})
    .getDailyUploadStats();
}

function _duLoadMissing() {
  google.script.run
    .withSuccessHandler(function(items) {
      _duMissing = items || [];
      _duRenderMissingPanel();
    })
    .withFailureHandler(function() {})
    .getMissingReportVendors(_duMissingDate);
}

function _duLoadHistory() {
  google.script.run
    .withSuccessHandler(function(rows) {
      _duHistory = rows || [];
      _duRenderHistory();
    })
    .withFailureHandler(function() {})
    .getDailyUploadHistory(30);
}

function _duPopulateVendorOptions() {
  var vendorSelect = document.getElementById('upload-filter-vendor');
  if (!vendorSelect) return;
  vendorSelect.innerHTML = _duBuildVendorOptions();
}

function _duApplyFilters() {
  var q = (_duSearchQuery || '').toLowerCase();
  _duFiltered = _duQueue.filter(function(r) {
    if (_duFilterStatus !== 'all' && r.uploadStatus !== _duFilterStatus) return false;
    if (_duFilterVendor !== 'all' && r['Contractor'] !== _duFilterVendor) return false;
    if (q) {
      var hay = [
        r['FDH Engineering ID'] || '',
        r['Contractor'] || '',
        r['Date'] || '',
        r['Construction Comments'] || ''
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  _duFiltered.sort(function(a, b) {
    var av = _duSortableValue(a[_duSortCol], _duSortCol);
    var bv = _duSortableValue(b[_duSortCol], _duSortCol);
    if (_duSortDir === 'asc') return av < bv ? -1 : av > bv ? 1 : 0;
    return av > bv ? -1 : av < bv ? 1 : 0;
  });

  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
}

function _duDebouncedSearch(val) {
  _duSearchQuery = val;
  if (_duSearchTimeout) clearTimeout(_duSearchTimeout);
  _duSearchTimeout = setTimeout(function() {
    _duApplyFilters();
  }, 250);
}

function _duSortableValue(value, col) {
  var raw = value === null || value === undefined ? '' : value;
  if (col === 'Date' || col === 'Target Completion Date') {
    var ts = Date.parse(raw);
    return isNaN(ts) ? raw.toString() : ts;
  }
  if (_DU_NUMERIC_COLS.has(col)) {
    var num = parseFloat(raw);
    return isNaN(num) ? -Infinity : num;
  }
  return raw.toString().toLowerCase();
}

function _duSetSort(col) {
  if (_duSortCol === col) _duSortDir = _duSortDir === 'asc' ? 'desc' : 'asc';
  else {
    _duSortCol = col;
    _duSortDir = col === 'Date' ? 'desc' : 'asc';
  }
  _duApplyFilters();
}

function _duRenderKpis() {
  var el = document.getElementById('upload-kpi-bar');
  if (!el) return;
  var s = _duStats || {};
  el.innerHTML = [
    _duKpiChip('Pending', s.pending || 0, 'kpi-pending'),
    _duKpiChip('Uploaded Today', s.uploadedToday || 0, 'kpi-uploaded'),
    _duKpiChip('Total Uploaded', s.uploadedTotal || 0, 'kpi-uploaded'),
    _duKpiChip('Failed', s.failed || 0, 'kpi-failed')
  ].join('');
}

function _duKpiChip(label, val, cls) {
  return '<div class="upload-kpi-chip ' + cls + '">' +
    '<span class="upload-kpi-label">' + _duEsc(label) + '</span>' +
    '<span class="upload-kpi-value">' + _duEsc(val) + '</span>' +
  '</div>';
}

function _duRenderLastSync() {
  var el = document.getElementById('upload-last-sync');
  if (!el) return;
  var dirtyCount = _duDirtyCount();
  var syncText = _duLastLoadedAt ? 'Queue refreshed ' + _duFormatRelativeTime(_duLastLoadedAt) : 'Queue not loaded yet';
  var dirtyText = dirtyCount > 0 ? ' • ' + dirtyCount + ' unsaved change' + (dirtyCount === 1 ? '' : 's') : '';
  el.textContent = syncText + dirtyText;
}

function _duOpenMissingReportsModal() {
  _duLoadMissing(); // Refresh data
  _duRenderMissingModal();
}

function _duRenderMissingModal() {
  var summary = _duMissing.length === 0
    ? '<div class="upload-preview-note ok">All vendors reported for ' + _duEsc(_duMissingDate) + '.</div>'
    : '<div class="upload-preview-note warn">' + _duMissing.length + ' vendor' + (_duMissing.length === 1 ? '' : 's') + ' missing for ' + _duEsc(_duMissingDate) + '.</div>';

  var rows = _duMissing.length === 0
    ? '<div class="upload-missing-empty">No outreach needed for this report date.</div>'
    : _duMissing.map(function(m, i) {
        return '<div class="upload-missing-row">' +
          '<div class="upload-missing-row-main">' +
            '<span class="upload-missing-vendor">' + _duEsc(m.vendor) + '</span>' +
            '<span class="upload-missing-meta">' + _duEsc(m.activeFdhCount) + ' active projects • Last reported ' + _duEsc(m.lastReportDate || '—') + '</span>' +
          '</div>' +
          '<button class="upload-missing-draft-btn" type="button" onclick="_duOpenEmailDraft(' + i + ')">Draft Email</button>' +
        '</div>';
      }).join('');

  var actions = _duMissing.length > 0
    ? '<div class="upload-missing-draft-all"><button type="button" class="upload-btn" onclick="_duDraftAllEmails()">Copy All Drafts</button></div>'
    : '';

  var body = 
    '<div class="upload-modal-missing-wrap">' +
      '<div class="upload-missing-header-modal">' +
        '<div class="upload-field">' +
          '<span class="upload-field-label">Report Date</span>' +
          '<div class="upload-missing-header-right">' +
            '<button type="button" class="upload-missing-today-btn" onclick="_duMissingDate=_duTodayStr(); _duLoadMissing(); setTimeout(_duRenderMissingModal, 100)">Today</button>' +
            '<input type="date" class="upload-missing-date-picker" value="' + _duIsoDate(_duMissingDate) + '" onchange="_duOnMissingDateChange(this.value); setTimeout(_duRenderMissingModal, 100)">' +
          '</div>' +
        '</div>' +
        summary +
      '</div>' +
      '<div class="upload-missing-rows">' + rows + '</div>' +
      actions +
    '</div>';

  _duOpenModal('Missing Daily Reports', body, [
    { label: 'Close', cls: 'upload-btn', onclick: '_duCloseModal()' }
  ]);
}

function _duRenderMissingPanel() {
  // Logic moved to Modal variant, stub kept for silent refresh calls
  if (document.getElementById('upload-modal-title') && document.getElementById('upload-modal-title').textContent.includes('Missing Daily Reports')) {
    _duRenderMissingModal();
  }
}

function _duToggleMissingPanel() {
  _duOpenMissingReportsModal();
}

function _duOnMissingDateChange(isoVal) {
  if (!isoVal) return;
  var parts = isoVal.split('-');
  _duMissingDate = parts[1] + '/' + parts[2] + '/' + parts[0];
  _duLoadMissing();
}

function _duRenderToolbar() {
  var selectedPending = _duGetEligibleSelected();
  var dirtyCount = _duDirtyCount();
  var dirtyRows = Object.keys(_duDirty).length;
  var selInfo = document.getElementById('upload-sel-info');
  if (selInfo) {
    var bits = [];
    bits.push(selectedPending.length + ' selected');
    if (_duEditMode) bits.push('Edit mode on');
    if (dirtyCount > 0) bits.push(dirtyRows + ' dirty row' + (dirtyRows === 1 ? '' : 's'));
    selInfo.textContent = bits.join(' • ');
  }

  var btnDry = document.getElementById('upload-btn-dryrun');
  var btnUpload = document.getElementById('upload-btn-upload');
  var btnSave = document.getElementById('upload-btn-save');
  var btnRevert = document.getElementById('upload-btn-revert');
  var btnEdit = document.getElementById('upload-btn-editmode');
  if (btnDry) btnDry.disabled = selectedPending.length === 0 || dirtyCount > 0 || _duIsSaving;
  if (btnUpload) btnUpload.disabled = selectedPending.length === 0 || dirtyCount > 0 || _duIsSaving;
  if (btnSave) btnSave.disabled = dirtyCount === 0 || _duIsSaving;
  if (btnRevert) btnRevert.disabled = dirtyCount === 0 || _duIsSaving;
  if (btnEdit) {
    btnEdit.classList.toggle('is-active', _duEditMode);
    btnEdit.setAttribute('aria-pressed', _duEditMode ? 'true' : 'false');
    btnEdit.innerHTML = (_duEditMode
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M20 6 9 17l-5-5"/></svg>Edit Mode On'
      : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Edit Mode Off');
  }
  _duRenderLastSync();
}

function _duRenderTable() {
  var tbody = document.getElementById('upload-table-body');
  if (!tbody) return;
  var colSpan = _DU_TABLE_COLS.length + 2;

  if (_duFiltered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="upload-empty">No rows match the current filter.</td></tr>';
    _duSyncSortHeaders();
    return;
  }

  var issues = [], ready = [], uploaded = [];
  _duFiltered.forEach(function(row) {
    var s = row.uploadStatus;
    if (s === 'Uploaded' || s === 'Skipped') {
      uploaded.push(row);
    } else {
      var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
      if (v.errors.length > 0 || v.warnings.length > 0) {
        issues.push(row);
      } else {
        ready.push(row);
      }
    }
  });

  _duUpdateUploadButtonLabel(ready.length);

  var html = '';

  html += _duBuildSwimlaneDivider('issues', issues.length, colSpan);
  if (_duSwimlaneOpen.issues) {
    if (issues.length > 0) {
      html += issues.map(function(r) { return _duBuildRowHtml(r); }).join('');
    } else {
      html += '<tr class="upload-swimlane-empty-row"><td colspan="' + colSpan + '" class="upload-swimlane-empty-cell upload-swimlane-ok">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        'All clear — no validation issues detected.</td></tr>';
    }
  }

  html += _duBuildSwimlaneDivider('ready', ready.length, colSpan);
  if (_duSwimlaneOpen.ready) {
    if (ready.length > 0) {
      html += ready.map(function(r) { return _duBuildRowHtml(r); }).join('');
    } else {
      html += '<tr class="upload-swimlane-empty-row"><td colspan="' + colSpan + '" class="upload-swimlane-empty-cell">No rows ready — fix issues above or adjust filters.</td></tr>';
    }
  }

  html += _duBuildSwimlaneDivider('uploaded', uploaded.length, colSpan);
  if (_duSwimlaneOpen.uploaded && uploaded.length > 0) {
    html += uploaded.map(function(r) { return _duBuildRowHtml(r); }).join('');
  }

  tbody.innerHTML = html;
  _duApplyColWidths();
  _duSyncSortHeaders();
}

function _duRenderCell(row, col, rowEditable, v) {
  var val = _duGetCellDisplayValue(row.rowIdx, col, row[col]);
  var tdClass = (_DU_COL_GROUP[col] || '') + (rowEditable && _DU_EDITABLE_COLS.has(col) ? ' upload-td-editable' : '');
  var escaped = _duEsc(val);

  if (_DU_BOOL_COLS.has(col)) {
    var boolVal = _duIsTruthy(val);
    if (rowEditable && _DU_EDITABLE_COLS.has(col)) {
      return '<td class="' + tdClass + ' upload-bool-cell">' +
        '<label class="du-bool-wrap">' +
          '<input type="checkbox" class="du-bool-checkbox" ' + (boolVal ? 'checked ' : '') + 'aria-label="' + _duEsc(col) + ' for row ' + row.rowIdx + '" onchange="_duToggleBool(' + row.rowIdx + ',\'' + _duEscJs(col) + '\')">' +
        '</label>' +
      '</td>';
    }
    return '<td class="' + tdClass + ' upload-bool-cell"><input type="checkbox" class="du-bool-checkbox is-readonly" ' + (boolVal ? 'checked ' : '') + 'disabled aria-label="' + _duEsc(col) + ' for row ' + row.rowIdx + '"></td>';
  }

  // Inline validation annotation on FDH cell
  var annotation = '';
  if (col === 'FDH Engineering ID' && v) {
    var firstMsg = (v.errors && v.errors[0]) || (v.warnings && v.warnings[0]);
    if (firstMsg) {
      var annCls = (v.errors && v.errors.length > 0) ? 'upload-inline-error' : 'upload-inline-warn';
      annotation += '<span class="' + annCls + '">' + _duEsc(firstMsg) + '</span>';
    }
    if (row.uploadStatus === 'Duplicate') {
      annotation += '<button type="button" class="upload-dup-view-btn" onclick="event.stopPropagation();_duOpenDupCompareModal(' + row.rowIdx + ')">View Match</button>';
    }
  }

  if (rowEditable && _DU_EDITABLE_COLS.has(col)) {
    var tag = col === 'Construction Comments' ? 'textarea' : 'input';
    var attrs = tag === 'textarea' ? 'rows="1"' : 'type="text"';
    var cls = 'upload-cell-input' + (col === 'Construction Comments' ? ' is-comments' : '');
    return '<td class="' + tdClass + '">' +
      (tag === 'textarea'
        ? '<textarea ' + attrs + ' class="' + cls + '" data-rowidx="' + row.rowIdx + '" data-field="' + _duEsc(col) + '" oninput="_duHandleCellInput(this)" onblur="_duNormalizeCellInput(this)">' + escaped + '</textarea>'
        : '<input ' + attrs + ' class="' + cls + '" data-rowidx="' + row.rowIdx + '" data-field="' + _duEsc(col) + '" value="' + escaped + '" oninput="_duHandleCellInput(this)" onblur="_duNormalizeCellInput(this)">') +
      annotation +
    '</td>';
  }

  return '<td class="' + tdClass + '"><span class="upload-cell-readonly' + (col === 'Construction Comments' ? ' is-comments' : '') + '">' + escaped + '</span>' + annotation + '</td>';
}

function _duStatusCell(row, v) {
  v = v || _duValidation[row.rowIdx] || { errors: [], warnings: [] };
  var dirtyDot = _duDirty[row.rowIdx] ? '<span class="upload-dirty-dot"></span>' : '';
  var status = row.uploadStatus;
  var healthIcon = '';
  if (status !== 'Uploaded' && status !== 'Skipped') {
    if (v.errors.length > 0) {
      healthIcon = '<span class="upload-health-icon health-error" title="' + _duEsc(v.errors.join(', ')) + '">✕</span>';
    } else if (v.warnings.length > 0) {
      healthIcon = '<span class="upload-health-icon health-warn" title="' + _duEsc(v.warnings.join(', ')) + '">⚠</span>';
    } else {
      healthIcon = '<span class="upload-health-icon health-ok" title="Validated">✓</span>';
    }
  }
  var lockText = status === 'Uploaded' || status === 'Skipped'
    ? '<span class="upload-lock-note">Locked</span>'
    : (_duEditMode ? '<span class="upload-lock-note editable">Editable</span>' : '<span class="upload-lock-note">Read only</span>');
  return dirtyDot + healthIcon + _duStatusBadge(status) + lockText;
}

function _duStatusBadge(status) {
  var map = {
    'Pending': ['status-pending', 'Pending'],
    'Uploaded': ['status-uploaded', 'Uploaded'],
    'Failed': ['status-failed', 'Failed'],
    'Duplicate': ['status-duplicate', 'Duplicate'],
    'Skipped': ['status-skipped', 'Skipped']
  };
  var entry = map[status] || ['status-pending', status || 'Pending'];
  return '<span class="upload-status-badge ' + entry[0] + '">' + _duEsc(entry[1]) + '</span>';
}

function _duToggleRow(rowIdx, checked) {
  if (checked) _duSelected.add(rowIdx);
  else _duSelected.delete(rowIdx);
  _duRenderToolbar();
}

function _duSelectAllPending() {
  _duFiltered.forEach(function(r) {
    if (_duIsSelectableRow(r)) _duSelected.add(r.rowIdx);
  });
  _duRenderTable();
  _duRenderToolbar();
}

function _duClearSelection() {
  _duSelected.clear();
  _duRenderTable();
  _duRenderToolbar();
}

function _duToggleSelectAll(checked) {
  if (checked) _duSelectAllPending();
  else _duClearSelection();
}

function _duToggleEditMode() {
  if (_duIsSaving) return;
  _duEditMode = !_duEditMode;
  _duRenderTable();
  _duRenderToolbar();
}

function _duHandleCellInput(el) {
  var rowIdx = parseInt(el.getAttribute('data-rowidx'), 10);
  var field = el.getAttribute('data-field');
  var value = el.value || '';
  _duStageCellChange(rowIdx, field, value);
}

function _duNormalizeCellInput(el) {
  if (el.tagName === 'TEXTAREA') {
    el.value = (el.value || '').trim();
    _duHandleCellInput(el);
  }
}

function _duToggleBool(rowIdx, field) {
  var current = _duGetCellDisplayValue(rowIdx, field, _duGetRow(rowIdx)[field]);
  _duStageCellChange(rowIdx, field, _duIsTruthy(current) ? 'FALSE' : 'TRUE');
  _duRenderTable();
  _duRenderToolbar();
}

function _duStageCellChange(rowIdx, field, value) {
  var row = _duGetRow(rowIdx);
  if (!row || !_DU_EDITABLE_COLS.has(field)) return;
  var original = _duNormalizeComparableValue(row[field], field);
  var next = _duNormalizeComparableValue(value, field);
  if (!_duDirty[rowIdx]) _duDirty[rowIdx] = {};
  if (original === next) {
    delete _duDirty[rowIdx][field];
    if (Object.keys(_duDirty[rowIdx]).length === 0) delete _duDirty[rowIdx];
  } else {
    _duDirty[rowIdx][field] = value;
  }
  _duSyncDirtyRowState(rowIdx);
  _duRenderToolbar();
}

function _duSyncDirtyRowState(rowIdx) {
  var tr = document.querySelector('#upload-table-body tr[data-rowidx="' + rowIdx + '"]');
  if (!tr) return;
  tr.classList.toggle('row-dirty', !!_duDirty[rowIdx]);
  var statusCell = tr.querySelector('.col-status');
  var row = _duGetRow(rowIdx);
  var v = _duValidation[rowIdx] || { errors: [], warnings: [] };
  if (statusCell && row) statusCell.innerHTML = _duStatusCell(row, v);
}

function _duSaveDirtyRows() {
  if (_duIsSaving) return;
  var rowIds = Object.keys(_duDirty);
  if (rowIds.length === 0) return;
  
  var totalChanges = _duDirtyCount();
  _duIsSaving = true;
  _duRenderToolbar();
  showToast('Saving ' + totalChanges + ' staged change(s)...', 'info');

  var tasks = [];
  rowIds.forEach(function(rowIdx) {
    Object.keys(_duDirty[rowIdx]).forEach(function(field) {
      tasks.push({ rowIdx: parseInt(rowIdx, 10), field: field, value: _duDirty[rowIdx][field] });
    });
  });

  google.script.run
    .withSuccessHandler(function(result) {
      _duIsSaving = false;
      if (result && result.ok) {
        // Apply changes to local queue
        tasks.forEach(function(task) {
          var row = _duGetRow(task.rowIdx);
          if (row) {
            row[task.field] = task.value;
            if (row.uploadStatus === 'Failed') row.uploadStatus = 'Pending';
          }
        });
        _duDirty = {};
        _duApplyFilters();
        showToast('Upload edits saved.', 'success');
      } else {
        var err = (result && result.error) ? result.error : 'Some edits failed to save.';
        showToast(err, 'error');
        _duRenderToolbar();
      }
    })
    .withFailureHandler(function(err) {
      _duIsSaving = false;
      showToast('Save failed: ' + (err.message || err), 'error');
      _duRenderToolbar();
    })
    .saveDailyUploadRowEditsBatch(tasks);
}

// _duSaveDirtyTask removed in favor of batched save function Above

function _duRevertDirtyRows() {
  if (_duDirtyCount() === 0) return;
  if (!confirm('Discard all unsaved upload edits?')) return;
  _duDirty = {};
  _duRenderTable();
  _duRenderToolbar();
}

function _duInitColResizers() {
  var ths = document.querySelectorAll('#upload-workspace .upload-table thead th');
  ths.forEach(function(th, idx) {
    if (th.classList.contains('col-check')) return;
    if (th.querySelector('.col-resizer')) return;
    var handle = document.createElement('div');
    handle.className = 'col-resizer';
    handle.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      e.preventDefault();
      _duResize = { th: th, idx: idx, startX: e.clientX, startW: th.offsetWidth };
      handle.classList.add('is-dragging');
      document.addEventListener('mousemove', _duOnColResize);
      document.addEventListener('mouseup', _duStopColResize);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    th.appendChild(handle);
  });
}

function _duOnColResize(e) {
  if (!_duResize) return;
  var newW = Math.max(56, _duResize.startW + (e.clientX - _duResize.startX));
  _duColWidths[_duResize.idx] = newW;
  _duApplyColWidths();
}

function _duStopColResize() {
  if (!_duResize) return;
  var handle = _duResize.th.querySelector('.col-resizer');
  if (handle) handle.classList.remove('is-dragging');
  _duResize = null;
  document.removeEventListener('mousemove', _duOnColResize);
  document.removeEventListener('mouseup', _duStopColResize);
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
}

function _duApplyColWidths() {
  var el = document.getElementById('upload-col-widths');
  if (!el) {
    el = document.createElement('style');
    el.id = 'upload-col-widths';
    document.head.appendChild(el);
  }
  el.textContent = Object.keys(_duColWidths).map(function(i) {
    var n = parseInt(i, 10) + 1;
    var w = _duColWidths[i];
    return '.upload-table th:nth-child(' + n + '),.upload-table td:nth-child(' + n + '){width:' + w + 'px!important;min-width:' + w + 'px!important;max-width:' + w + 'px!important;}';
  }).join('');
}

function _duRunDryRun() {
  var eligible = _duGetEligibleSelected();
  if (_duDirtyCount() > 0) {
    showToast('Save or revert staged edits before running a dry run.', 'warn');
    return;
  }
  if (eligible.length === 0) {
    showToast('Select at least one row to validate.', 'warn');

  }

  showToast('Running dry-run validation...', 'info');
  google.script.run
    .withSuccessHandler(function(result) {
      _duOpenDryRunResultModal(result);
    })
    .withFailureHandler(function(err) {

function _duOpenDryRunResultModal(result) {
  var rows = (result.results || []).map(function(r) {
    var unmappedStr = (r.unmappedFields && r.unmappedFields.length > 0)

  _duOpenModal('Dry Run Validation', body, [

  ]);

function _duOpenPreview() {
  var eligible = _duGetEligibleSelected();
  if (_duDirtyCount() > 0) {
    showToast('Save or revert staged edits before previewing an upload.', 'warn');
    return;
  }
  if (eligible.length === 0) {
    showToast('Select at least one pending row to upload.', 'warn');
    return;
  }

  var rows = eligible.map(function(ri) {
    var r = _duGetRow(ri);
    if (!r) return '';
    var isDupe = r.uploadStatus === 'Duplicate';
    var previewCols = ['Date', 'Contractor', 'FDH Engineering ID', 'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage'];
    var cells = previewCols.map(function(col) {
      return '<td>' + _duEsc((r[col] || '').toString()) + '</td>';
    }).join('');
    return '<tr' + (isDupe ? ' class="is-dupe"' : '') + '><td>' + ri + '</td>' + cells + '<td>' +
      (isDupe ? '<span class="upload-preview-warn">Possible duplicate</span>' : '<span class="upload-preview-ok">Ready</span>') +
      '</td></tr>';
  }).join('');

  var dupeCount = eligible.filter(function(ri) {
    var r = _duGetRow(ri);
    return r && r.uploadStatus === 'Duplicate';
  }).length;

  var dupeNote = dupeCount > 0
    ? '<div class="upload-preview-note warn">' + dupeCount + ' selected row(s) already match a record in QuickBase. Default upload will skip them.</div>'
    : '<div class="upload-preview-note ok">Selected rows are ready for final confirmation.</div>';

  var body = dupeNote +
    '<p class="upload-modal-copy">' + eligible.length + ' row(s) will be sent to QuickBase Daily Work Log (<code>bvay4aqkz</code>).</p>' +
    '<table class="upload-preview-table"><thead><tr><th>Row</th><th>Date</th><th>Contractor</th><th>FDH</th><th>UG Ft</th><th>Strand Ft</th><th>Fiber Ft</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>';

  var actions = [{ label: 'Cancel', cls: 'upload-btn', onclick: '_duCloseModal()' }];
  if (dupeCount > 0) {
    actions.push({ label: 'Upload (Skip Dupes)', cls: 'upload-btn btn-primary', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', true, false)' });
    actions.push({ label: 'Upload (Force All)', cls: 'upload-btn btn-danger', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', false, true)' });
  } else {
    actions.push({ label: 'Confirm Upload', cls: 'upload-btn btn-primary', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', true, false)' });

function _duExecuteUpload(rowIndices, skipDuplicates, forceAll) {
  if (!rowIndices || rowIndices.length === 0) return;
  if (rowIndices.length > 10) {
    _duOpenConfirmGate(rowIndices, skipDuplicates, forceAll);
    return;
  }
  _duDoUpload(rowIndices, skipDuplicates, forceAll ? rowIndices : []);
}

function _duOpenConfirmGate(rowIndices, skipDuplicates, forceAll) {
  var body = '<p class="upload-modal-copy strong">You are about to upload <strong>' + rowIndices.length + ' rows</strong> to QuickBase. This action cannot be undone.</p>' +
    '<p class="upload-modal-copy">Type <strong>UPLOAD</strong> to unlock the final action.</p>' +
    '<input type="text" id="upload-confirm-gate-input" class="upload-confirm-input" placeholder="UPLOAD" oninput="_duCheckConfirmGate(this)">';

  _duOpenModal('Confirm Batch Upload', body, [
    { label: 'Cancel', cls: 'upload-btn', onclick: '_duCloseModal()' },
    { label: 'Upload ' + rowIndices.length + ' Rows', cls: 'upload-btn btn-primary', id: 'upload-confirm-gate-btn', disabled: true, onclick: '_duCloseModal(); _duDoUpload(' + JSON.stringify(rowIndices) + ',' + skipDuplicates + ',' + JSON.stringify(forceAll ? rowIndices : []) + ')' }
  ]);
}

function _duCheckConfirmGate(el) {
  var btn = document.getElementById('upload-confirm-gate-btn');

}

function _duDoUpload(rowIndices, skipDuplicates, forceRows) {
  showToast('Uploading ' + rowIndices.length + ' row(s) to QuickBase...', 'info');
  var batchId = 'batch-' + Date.now().toString(36);
  google.script.run
    .withSuccessHandler(function(result) {

      _duLoadStats();
      _duLoadHistory();

    .withFailureHandler(function(err) {
      showToast('Upload failed: ' + (err.message || err), 'error');
      _duRefreshAll({ force: true });

      batchId: batchId,
      skipDuplicates: !!skipDuplicates,
      forceRows: forceRows || []
    });
}

    '<div><div class="upload-result-value success">' + _duEsc(result.success || 0) + '</div><div class="upload-result-label">Uploaded</div></div>' +

function _duOpenEmailDraft(idx) {
  var m = _duMissing[idx];
  if (!m) return;
  google.script.run
    .withSuccessHandler(function(draft) {
      var body = '<div class="upload-modal-subhead">Subject</div><div class="upload-email-subject">' + _duEsc(draft.subject) + '</div>' +
        '<div class="upload-modal-subhead">Body</div><div class="upload-email-body">' + _duEsc(draft.body) + '</div>';
      _duOpenModal('Missing Report Email • ' + m.vendor, body, [
        { label: 'Close', cls: 'upload-btn', onclick: '_duCloseModal()' },
        { label: 'Copy to Clipboard', cls: 'upload-btn btn-primary', onclick: '_duCopyEmailDraft(' + idx + ', ' + JSON.stringify(draft) + ')' }
      ]);
    })
    .withFailureHandler(function(err) {
      showToast('Draft error: ' + (err.message || err), 'error');
    })

function _duCopyEmailDraft(idx, draft) {
  var text = 'Subject: ' + draft.subject + '\n\n' + draft.body;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Email copied to clipboard.', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Email copied to clipboard.', 'success');
  });
}

function _duDraftAllEmails() {
  if (_duMissing.length === 0) return;
  showToast('Drafting missing vendor emails...', 'info');
  var drafts = [];
  var remaining = _duMissing.length;
  _duMissing.forEach(function(m) {
    google.script.run
      .withSuccessHandler(function(draft) {
        drafts.push('Subject: ' + draft.subject + '\n\n' + draft.body);
        remaining--;
        if (remaining === 0) _duFinalizeDraftCopy(drafts);
      })
      .withFailureHandler(function() {
        remaining--;
        if (remaining === 0) _duFinalizeDraftCopy(drafts);
      })
      .draftMissingReportEmail(m.vendor, _duMissingDate, m.activeFdhs || []);
  });
}

function _duFinalizeDraftCopy(drafts) {
  var combined = drafts.join('\n\n' + '-'.repeat(60) + '\n\n');
  navigator.clipboard.writeText(combined).then(function() {
    showToast('All drafts copied to clipboard.', 'success');
  }).catch(function() {
    showToast('Unable to copy drafts automatically.', 'error');
  });
}

function _duOpenModal(title, bodyHtml, actions) {

  overlay.innerHTML =
    '<div class="upload-modal" role="dialog" aria-modal="true" aria-labelledby="' + titleId + '" onclick="event.stopPropagation()">' +

        '<div class="upload-modal-title" id="' + titleId + '">' + _duEsc(title) + '</div>' +
        '<button type="button" class="upload-modal-close" aria-label="Close upload dialog" onclick="_duCloseModal()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +

function _duCloseModal() {

function _duHandleModalKeydown(evt) {
  var overlay = document.getElementById('upload-modal-overlay');
  if (!overlay || !overlay.classList.contains('visible')) return;
  if (evt.key === 'Escape') {
    evt.preventDefault();
    _duCloseModal();
  }
}

function _duGetEligibleSelected() {
  return Array.from(_duSelected).filter(function(ri) {
    var r = _duGetRow(ri);
    return r && _duIsSelectableRow(r);
  });
}

function _duSetTableLoading(isLoading) {
  var tbody = document.getElementById('upload-table-body');
  if (!tbody || !isLoading) return;
  tbody.innerHTML = '<tr><td colspan="20" class="upload-empty">Loading upload queue...</td></tr>';
}

function _duGetCellDisplayValue(rowIdx, field, fallback) {
  if (_duDirty[rowIdx] && Object.prototype.hasOwnProperty.call(_duDirty[rowIdx], field)) return _duDirty[rowIdx][field];
  return fallback === null || fallback === undefined ? '' : fallback;
}

function _duGetRow(rowIdx) {
  return _duQueue.find(function(r) { return r.rowIdx === rowIdx; });
}

function _duCanEditRow(row) {
  return !!row && _duEditMode && (row.uploadStatus === 'Pending' || row.uploadStatus === 'Failed' || row.uploadStatus === 'Duplicate');
}

function _duIsSelectableRow(row) {
  return !!row && row.uploadStatus !== 'Uploaded' && row.uploadStatus !== 'Skipped';
}

function _duIsTruthy(val) {
  return ['true', '1', 'yes'].indexOf(String(val || '').toLowerCase()) >= 0;
}

function _duDirtyCount() {
  return Object.keys(_duDirty).reduce(function(sum, rowIdx) {
    return sum + Object.keys(_duDirty[rowIdx]).length;
  }, 0);
}

function _duHasUnsavedChanges() {
  return _duDirtyCount() > 0;
}

function _duConfirmLeaveWithUnsaved(targetText) {
  if (!_duHasUnsavedChanges()) return true;
  return confirm('You have unsaved upload edits.\n\nSave or revert them before you ' + targetText + '.\n\nChoose OK to discard the staged edits and continue.');
}

function _duBeforeUnload(evt) {
  if (!_duHasUnsavedChanges()) return;
  evt.preventDefault();
  evt.returnValue = '';
  return '';
}

function _duSyncSortHeaders() {
  var ths = document.querySelectorAll('#upload-workspace .upload-table thead th');
  ths.forEach(function(th) { th.classList.remove('is-sorted', 'sort-asc', 'sort-desc'); });
  var sortIdx = _DU_TABLE_COLS.indexOf(_duSortCol);
  if (sortIdx < 0) return;
  var target = document.querySelector('#upload-workspace .upload-table thead th:nth-child(' + (sortIdx + 2) + ')');
  if (!target) return;
  target.classList.add('is-sorted');
  target.classList.add(_duSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  var arrow = target.querySelector('.sort-arrow');
  if (arrow) arrow.textContent = _duSortDir === 'asc' ? '↑' : '↓';
}

function _duNormalizeComparableValue(value, field) {
  var v = value === null || value === undefined ? '' : String(value).trim();
  if (_DU_BOOL_COLS.has(field)) return _duIsTruthy(v) ? 'TRUE' : 'FALSE';
  return v;
}

function _duFormatRelativeTime(dateObj) {
  var diff = Math.max(0, Date.now() - dateObj.getTime());
  var mins = Math.round(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 minute ago';
  if (mins < 60) return mins + ' minutes ago';
  var hrs = Math.round(mins / 60);
  if (hrs === 1) return '1 hour ago';
  return hrs + ' hours ago';
}

// ── Triage: validation ──────────────────────────────────────
function _duBuildValidation() {
  _duValidation = {};
  _duFiltered.forEach(function(row) {
    if (row.uploadStatus !== 'Uploaded' && row.uploadStatus !== 'Skipped') {
      _duValidation[row.rowIdx] = _duValidateRow(row);
    }
  });
}

function _duValidateRow(row) {
  var errors = [], warnings = [];
  if (!row['Date'] || String(row['Date']).trim() === '') errors.push('Missing Date');
  if (!row['Contractor'] || String(row['Contractor']).trim() === '') errors.push('Missing Contractor');
  if (!row['FDH Engineering ID'] || String(row['FDH Engineering ID']).trim() === '') errors.push('Missing FDH ID');
  _DU_NUMERIC_COLS.forEach(function(col) {
    var raw = row[col];
    if (raw !== null && raw !== undefined && raw !== '') {
      var n = parseFloat(raw);
      if (!isNaN(n) && n < 0) errors.push(_duShortColName(col) + ' is negative');
    }
  });
  if (!row['Target Completion Date'] || String(row['Target Completion Date']).trim() === '') warnings.push('No target date');
  if (row.uploadStatus === 'Duplicate') warnings.push('Possible duplicate in QB');
  if (row.uploadStatus === 'Failed') errors.push('Previous upload failed');
  return { errors: errors, warnings: warnings };
}

function _duShortColName(col) {
  var map = {
    'Daily UG Footage': 'UG Footage', 'Daily Strand Footage': 'Strand Footage',
    'Daily Fiber Footage': 'Fiber Footage', 'Daily NAPs/Encl. Completed': 'NAPs',
    'Drills': 'Drills', 'Missles': 'Missles', 'AE Crews': 'AE Crews',
    'Fiber Pulling Crews': 'Fiber Crews', 'Splicing Crews': 'Splice Crews'
  };
  return map[col] || col;
}

// ── Triage: row HTML ─────────────────────────────────────────
function _duBuildRowHtml(row) {
  var isFailed = row.uploadStatus === 'Failed';
  var isDupe = row.uploadStatus === 'Duplicate';
  var isDirty = !!_duDirty[row.rowIdx];
  var isChecked = _duSelected.has(row.rowIdx);
  var rowEditable = _duCanEditRow(row);
  var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
  var hasErrors = v.errors.length > 0;
  var hasWarnings = !hasErrors && v.warnings.length > 0;

  var trClass = [
    row.uploadStatus === 'Uploaded' ? 'row-uploaded' : '',
    isFailed ? 'row-failed' : '',
    isDupe ? 'row-duplicate' : '',
    isDirty ? 'row-dirty' : '',
    rowEditable ? 'row-editable' : '',
    _duEditMode ? 'table-edit-mode' : '',
    hasErrors ? 'row-has-error' : '',
    hasWarnings ? 'row-has-warning' : ''
  ].filter(Boolean).join(' ');

  var cells = _DU_TABLE_COLS.map(function(col) {
    return _duRenderCell(row, col, rowEditable, v);
  }).join('');

  var isLocked = row.uploadStatus === 'Uploaded' || row.uploadStatus === 'Skipped';
  return '<tr class="' + trClass + '" data-rowidx="' + row.rowIdx + '">' +
    '<td class="col-check"><input type="checkbox" class="upload-row-check" aria-label="Select row ' + row.rowIdx + '" ' +
    (isChecked ? 'checked ' : '') + (isLocked ? 'disabled ' : '') +
    'onchange="_duToggleRow(' + row.rowIdx + ',this.checked)"></td>' +
    cells +
    '<td class="col-status">' + _duStatusCell(row, v) + '</td>' +
  '</tr>';
}

// ── Triage: swimlane dividers ────────────────────────────────
function _duBuildSwimlaneDivider(key, count, colSpan) {
  var isOpen = _duSwimlaneOpen[key];
  var cfgs = {
    issues: {
      label: 'ISSUES',
      cls: 'swimlane-issues',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      action: count > 0 ? '<button type="button" class="upload-swimlane-action" onclick="event.stopPropagation();_duSelectSwimlane(\'issues\')">Select All</button>' : ''
    },
    ready: {
      label: 'READY TO UPLOAD',
      cls: 'swimlane-ready',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      action: count > 0 ? '<button type="button" class="upload-swimlane-action" onclick="event.stopPropagation();_duSelectSwimlane(\'ready\')">Select All</button>' : ''
    },
    uploaded: {
      label: 'UPLOADED TODAY',
      cls: 'swimlane-uploaded',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
      action: ''
    }
  };
  var cfg = cfgs[key] || cfgs.ready;
  var chevronSvg = '<svg class="upload-swimlane-chevron' + (isOpen ? ' is-open' : '') + '" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';

  return '<tr class="upload-swimlane-row ' + cfg.cls + '" onclick="_duToggleSwimlane(\'' + key + '\')">' +
    '<td colspan="' + colSpan + '" class="upload-swimlane-cell">' +
      '<div class="upload-swimlane-header">' +
        '<div class="upload-swimlane-header-left">' +
          chevronSvg + cfg.icon +
          '<span class="upload-swimlane-label">' + cfg.label + '</span>' +
          '<span class="upload-swimlane-count">' + count + '</span>' +
        '</div>' +
        cfg.action +
      '</div>' +
    '</td>' +
  '</tr>';
}

function _duToggleSwimlane(key) {
  if (_duSwimlaneOpen.hasOwnProperty(key)) _duSwimlaneOpen[key] = !_duSwimlaneOpen[key];
  _duRenderTable();
}

function _duSelectSwimlane(key) {
  var issues = [], ready = [];
  _duFiltered.forEach(function(row) {
    var s = row.uploadStatus;
    if (s !== 'Uploaded' && s !== 'Skipped') {
      var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
      if (v.errors.length > 0 || v.warnings.length > 0) issues.push(row);
      else ready.push(row);
    }
  });
  var target = key === 'issues' ? issues : key === 'ready' ? ready : [];
  target.forEach(function(row) { if (_duIsSelectableRow(row)) _duSelected.add(row.rowIdx); });
  _duRenderTable();
  _duRenderToolbar();
}

function _duUpdateUploadButtonLabel(readyCount) {
  var btn = document.getElementById('upload-btn-upload');
  if (!btn) return;
  var svgEl = btn.querySelector('svg');
  var svgHtml = svgEl ? svgEl.outerHTML : '';
  btn.innerHTML = svgHtml + ' Upload ' + readyCount + ' Record' + (readyCount === 1 ? '' : 's') + ' ↑';
}

// ── Triage: duplicate comparison modal ──────────────────────
function _duOpenDupCompareModal(rowIdx) {
  var row = _duGetRow(rowIdx);
  if (!row) return;
  var keyFields = [
    ['Date', row['Date']],
    ['FDH Engineering ID', row['FDH Engineering ID']],
    ['Contractor', row['Contractor']],
    ['UG Footage', row['Daily UG Footage']],
    ['Strand Footage', row['Daily Strand Footage']],
    ['Fiber Footage', row['Daily Fiber Footage']]
  ];
  var fieldRows = keyFields.map(function(f) {
    return '<div class="upload-dup-field-row">' +
      '<span class="upload-dup-field-label">' + _duEsc(f[0]) + '</span>' +
      '<span class="upload-dup-field-val">' + _duEsc(f[1] || '—') + '</span>' +
    '</div>';
  }).join('');

  var body =
    '<div class="upload-dup-warning">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;vertical-align:-3px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
      'A record with this FDH + Date already exists in QuickBase. Uploading will create a duplicate entry unless you skip or force override.' +
    '</div>' +
    '<div class="upload-dup-fields">' + fieldRows + '</div>';

  _duOpenModal('Duplicate Detected', body, [
    { label: 'Skip This Row', cls: 'upload-btn', onclick: '_duCloseModal();_duSkipDupeRow(' + rowIdx + ')' },
    { label: 'Force Override', cls: 'upload-btn btn-danger', onclick: '_duCloseModal();_duForceDupeRow(' + rowIdx + ')' },
    { label: 'Cancel', cls: 'upload-btn btn-ghost', onclick: '_duCloseModal()' }
  ]);
}

function _duSkipDupeRow(rowIdx) {
  _duSelected.delete(rowIdx);
  var row = _duGetRow(rowIdx);
  if (row) { row._duDupResolved = 'skip'; row.uploadStatus = 'Skipped'; }
  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
  showToast('Row will be skipped during upload.', 'info');
}

function _duForceDupeRow(rowIdx) {
  var row = _duGetRow(rowIdx);
  if (row) { row._duDupResolved = 'force'; row.uploadStatus = 'Pending'; }
  _duSelected.add(rowIdx);
  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
  showToast('Row will be force-uploaded — duplicate check bypassed.', 'warn');
}

// ── Triage: post-upload results card ────────────────────────
function _duRenderResultsCard(result) {
  var tableWrap = document.querySelector('#upload-workspace .upload-table-wrap');
  if (!tableWrap) { _duOpenUploadResultModal(result); return; }

  var failedRows = (result.results || []).filter(function(r) { return r.status === 'failed'; });
  var succCount = result.success || 0;
  var failCount = result.failed || 0;
  var skipCount = result.duplicates || 0;

  var failList = failedRows.length > 0
    ? '<div class="upload-rc-failures">' +
        '<div class="upload-rc-failures-title">Failed Records</div>' +
        failedRows.map(function(r) {
          return '<div class="upload-rc-failure-row">' +
            '<span class="upload-rc-failure-fdh">' + _duEsc(r.fdh || 'Row ' + r.rowIdx) + '</span>' +
            '<span class="upload-rc-failure-err">' + _duEsc(r.error || 'Unknown error') + '</span>' +
          '</div>';
        }).join('') +
      '</div>'
    : '';

  var retryBtn = failedRows.length > 0
    ? '<button type="button" class="upload-btn btn-danger" onclick="_duCloseResultsCard();_duRetryFailed(' + JSON.stringify(failedRows.map(function(r) { return r.rowIdx; })) + ')">Retry Failed</button>'
    : '';

  tableWrap.innerHTML =
    '<div class="upload-results-card">' +
      '<div class="upload-rc-header">' +
        '<div class="upload-rc-icon">' +
          '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        '</div>' +
        '<div>' +
          '<div class="upload-rc-title">Upload Complete</div>' +
          '<div class="upload-rc-batch">Batch · ' + _duEsc(result.batchId || '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="upload-rc-stats">' +
        '<div class="upload-rc-stat stat-success">' +
          '<div class="upload-rc-stat-value">' + succCount + '</div>' +
          '<div class="upload-rc-stat-label">Uploaded</div>' +
        '</div>' +
        '<div class="upload-rc-stat stat-skipped">' +
          '<div class="upload-rc-stat-value">' + skipCount + '</div>' +
          '<div class="upload-rc-stat-label">Skipped</div>' +
        '</div>' +
        '<div class="upload-rc-stat stat-failed">' +
          '<div class="upload-rc-stat-value">' + failCount + '</div>' +
          '<div class="upload-rc-stat-label">Failed</div>' +
        '</div>' +
      '</div>' +
      failList +
      '<div class="upload-rc-footer">' +
        retryBtn +
        '<button type="button" class="upload-btn btn-primary" onclick="_duCloseResultsCard()">Back to Review</button>' +
      '</div>' +
    '</div>';
}

function _duCloseResultsCard() {
  _duRefreshAll({ force: true });
}

function _duRetryFailed(rowIndices) {
  if (!rowIndices || rowIndices.length === 0) return;
  _duDoUpload(rowIndices, true, []);
}

function _duEsc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function _duEscJs(str) {
  return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function _duTodayStr() {
  var d = new Date();
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return mm + '/' + dd + '/' + d.getFullYear();
}

function _duIsoDate(mmddyyyy) {
  if (!mmddyyyy) return '';
  var p = mmddyyyy.split('/');
  if (p.length === 3) return p[2] + '-' + p[0].padStart(2, '0') + '-' + p[1].padStart(2, '0');
  return '';
}

function _duBuildVendorOptions() {
  var vendors = Array.from(new Set(_duQueue.map(function(r) { return r['Contractor'] || ''; }).filter(Boolean))).sort();
  return ['<option value="all">All Vendors</option>'].concat(vendors.map(function(v) {
    return '<option value="' + _duEsc(v) + '"' + (_duFilterVendor === v ? ' selected' : '') + '>' + _duEsc(v) + '</option>';
  })).join('');
}
</script>
