<script>
// ============================================================
// FILE: _module_daily_upload.html
// ROLE: Upload Center workspace — daily production upload to QB
// ============================================================

var _duQueue = [];
var _duFiltered = [];
var _duSelected = new Set();
var _duPipeline = {};
var _duTargetDate = '';
var _duLoadedQueueDate = '';
var _duLatestExport = null;
var _duDirty = {};
var _duSortCol = 'Date';
var _duSortDir = 'desc';
var _duFilterStatus = 'all';
var _duFilterVendor = 'all';
var _duSearchQuery = '';
var _duStats = {};
var _duHistory = [];
var _duHistoryOpen = false;
var _duMissing = [];
var _duMissingDate = '';
var _duMissingPanelOpen = false;
var _duColWidths = {};
var _duResize = null;
var _duEditMode = false;
var _duIsSaving = false;
var _duInitialized = false;
var _duModalRestoreFocus = null;
var _duLastLoadedAt = null;
var _duSearchTimeout = null;
var _duValidation = {};
var _duSwimlaneOpen = { issues: true, ready: true, uploaded: false };
var _duQueueApproved = false;
var _duIncomingCount = 0;
var _duIncomingFiles = [];
var _duShowDatePicker = false;
var _duExportStatus = null;
var _duLastApprovalReason = '';
var _duScrollBound = false;
var _duStickyCompact = false;

var _DU_COL_GROUP = {
  'Date':                       'col-dark-navy',
  'Contractor':                 'col-dark-navy',
  'FDH Engineering ID':         'col-dark-navy col-fdh',
  'Locates Called In':          'col-lime',
  'Cabinets Set':               'col-lime',
  'Light to Cabinets':          'col-lime',
  'Target Completion Date':     'col-lime',
  'Daily UG Footage':           'col-ug-footage',
  'Daily Strand Footage':       'col-strand',
  'Daily Fiber Footage':        'col-fiber',
  'Daily NAPs/Encl. Completed': 'col-nap',
  'Drills':                     'col-dark-navy',
  'Missles':                    'col-dark-navy',
  'AE Crews':                   'col-dark-navy',
  'Fiber Pulling Crews':        'col-dark-navy',
  'Splicing Crews':             'col-dark-navy',
  'Construction Comments':      'col-dark-navy col-comments'
};

var _DU_BOOL_COLS = new Set(['Locates Called In', 'Cabinets Set', 'Light to Cabinets']);
var _DU_NUMERIC_COLS = new Set([
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage',
  'Daily NAPs/Encl. Completed', 'Drills', 'Missles',
  'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews'
]);
var _DU_EDITABLE_COLS = new Set([
  'Locates Called In', 'Cabinets Set', 'Light to Cabinets', 'Target Completion Date',
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage', 'Daily NAPs/Encl. Completed',
  'Drills', 'Missles', 'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews',
  'Construction Comments'
]);
var _DU_TABLE_COLS = [
  'Date', 'Contractor', 'FDH Engineering ID',
  'Locates Called In', 'Cabinets Set', 'Light to Cabinets', 'Target Completion Date',
  'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage', 'Daily NAPs/Encl. Completed',
  'Drills', 'Missles', 'AE Crews', 'Fiber Pulling Crews', 'Splicing Crews',
  'Construction Comments'
];

function initUploadWorkspace() {
  if (!_duInitialized) {
    _duMissingDate = _duTodayStr();
    _duTargetDate = _duTodayIso(-1);
    window.addEventListener('beforeunload', _duBeforeUnload);
    document.addEventListener('keydown', _duHandleModalKeydown);
    _duInitialized = true;
  }
  _duBindScrollState();
  _duRefreshAll({ force: true });
  _duSyncStickyState();
  setTimeout(_duInitColResizers, 50);
}

function _duBindScrollState() {
  if (_duScrollBound) return;
  var scrollRegion = document.getElementById('upload-scroll-region');
  if (!scrollRegion) return;
  scrollRegion.addEventListener('scroll', _duSyncStickyState, { passive: true });
  window.addEventListener('resize', _duSyncStickyState);
  _duScrollBound = true;
}

function _duSyncStickyState() {
  var workspace = document.getElementById('upload-workspace');
  if (!workspace) return;
  // On mobile, never collapse the pipeline — let it stay full height
  if (window.innerWidth <= 768) {
    workspace.classList.remove('upload-workspace--pipeline-stuck');
    _duStickyCompact = false;
    return;
  }
  var scrollRegion = document.getElementById('upload-scroll-region');
  if (!scrollRegion) return;
  var isCompact = scrollRegion.scrollTop > 0;
  workspace.classList.toggle('upload-workspace--pipeline-stuck', isCompact);
  if (_duStickyCompact === isCompact) return;
  _duStickyCompact = isCompact;
}

function _duRefreshAll(options) {
  options = options || {};
  if (_duIsSaving) {
    showToast('Please wait for current saves to finish.', 'warn');
    return;
  }
  if (!options.force && !_duConfirmLeaveWithUnsaved('refresh the upload queue')) return;
  _duSetTableLoading(true);
  _duLoadPipelineStatus();
  _duLoadStats();
  _duLoadMissing();
  _duLoadQueue();
  _duLoadHistory();
}

function _duHandleRefresh() {
  _duRefreshAll();
}

function _duLoadPipelineStatus() {
  google.script.run
    .withSuccessHandler(function(status) {
      _duPipeline = status || {};
      if (_duPipeline.recommendedDate) {
        _duTargetDate = _duPipeline.recommendedDate;
      } else if (!_duTargetDate) {
        _duTargetDate = _duTodayIso(-1);
      }
      _duLatestExport = _duPipeline.latestExport || null;
      _duIncomingCount = _duPipeline.incomingFileCount || 0;
      _duIncomingFiles = _duPipeline.incomingFiles || [];
      _duRenderPipeline();
    })
    .withFailureHandler(function(err) {
      _duPipeline = {};
      _duRenderPipeline();
      showToast('Failed to load upload pipeline status: ' + (err.message || err), 'error');
    })
    .getDailyPipelineStatus();
}

function _duLoadExportStatus(targetDate) {
  var dateStr = targetDate || _duLoadedQueueDate || _duTargetDate || '';
  if (!dateStr) {
    _duExportStatus = null;
    _duRenderPipeline();
    _duRenderToolbar();
    return;
  }
  google.script.run
    .withSuccessHandler(function(status) {
      _duExportStatus = status || null;
      _duRenderPipeline();
      _duRenderToolbar();
    })
    .withFailureHandler(function() {
      _duExportStatus = null;
      _duRenderPipeline();
      _duRenderToolbar();
    })
    .getDailyUploadExportStatus(dateStr);
}

function _duLoadQueue() {
  google.script.run
    .withSuccessHandler(function(items) {
      _duQueue = items || [];
      _duSelected.forEach(function(rowIdx) {
        if (!_duQueue.some(function(r) { return r.rowIdx === rowIdx; })) _duSelected.delete(rowIdx);
      });
      _duDirty = {};
      _duEditMode = false;
      _duResetApproval('', true);
      _duLastLoadedAt = new Date();
      _duPopulateVendorOptions();
      _duApplyFilters();
      _duSetTableLoading(false);
      _duRenderToolbar();
      _duRenderLastSync();
      _duRenderStepGates();
      _duLoadExportStatus(_duLoadedQueueDate);
    })
    .withFailureHandler(function(err) {
      _duSetTableLoading(false);
      showToast('Failed to load upload queue: ' + (err.message || err), 'error');
    })
    .getDailyUploadQueue();
}

function _duLoadStats() {
  google.script.run
    .withSuccessHandler(function(stats) {
      _duStats = stats || {};
      _duRenderKpis();
    })
    .withFailureHandler(function() {})
    .getDailyUploadStats();
}

function _duLoadMissing() {
  google.script.run
    .withSuccessHandler(function(items) {
      _duMissing = items || [];
      _duRenderMissingPanel();
    })
    .withFailureHandler(function() {})
    .getMissingReportVendors(_duMissingDate);
}

function _duLoadHistory() {
  google.script.run
    .withSuccessHandler(function(rows) {
      _duHistory = rows || [];
      _duRenderHistory();
    })
    .withFailureHandler(function() {})
    .getDailyUploadHistory(30);
}

function _duRenderPipeline() {
  var incomingEl = document.getElementById('upload-pipeline-incoming');
  var targetEl   = document.getElementById('upload-pipeline-target');
  var finalEl    = document.getElementById('upload-pipeline-final');
  var queueMeta  = document.getElementById('upload-queue-meta');
  var targetInput = document.getElementById('upload-target-date');
  if (targetInput && _duTargetDate) targetInput.value = _duTargetDate;

  // Step 1 body
  if (incomingEl) {
    var incomingBadge = _duIncomingCount > 0
      ? '<div class="du-incoming-badge du-incoming-badge--alert">' +
          '<span class="du-incoming-pulse"></span>' +
          _duIncomingCount + ' file' + (_duIncomingCount === 1 ? '' : 's') + ' pending' +
        '</div>'
      : '<div class="du-incoming-badge du-incoming-badge--clear">Incoming folder is clear</div>';
    incomingEl.innerHTML =
      '<div class="du-step-summary-stack">' +
        '<div class="du-step-corner-stack">' +
          incomingBadge +
          '<div class="du-step-corner-meta">' +
            '<span class="du-step-meta-label">Latest Update</span>' +
            '<span class="du-step-meta-value">' + _duEsc(_duPipeline.latestArchiveDate || '—') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  // Step 2 body — show loaded date badge + date-picker toggle
  if (targetEl) {
    if (_duLoadedQueueDate) {
      targetEl.innerHTML =
        '<div class="du-step-inline-status"><span class="du-loaded-chip">Loaded ' + _duEsc(_duLoadedQueueDate) + '</span></div>' +
        '<div class="du-step-meta-row du-step-meta-row--compact">' +
          '<span class="du-step-meta-label">Queue Rows</span>' +
          '<span class="du-step-meta-value">' + _duQueue.length + '</span>' +
        '</div>';
    } else {
      targetEl.innerHTML =
        '<div class="du-step-inline-status"><span class="upload-step-state-badge is-blocked">Not Loaded</span></div>';
    }
  }

  // Step 2 Load Yesterday gate
  var btnYesterday = document.getElementById('du-btn-load-yesterday');
  if (btnYesterday) {
    btnYesterday.disabled = _duIncomingCount > 0;
    btnYesterday.title = _duIncomingCount > 0 ? 'Process incoming files in Step 1 first' : 'Load data for yesterday';
  }

  // Step 2 date picker wrap visibility
  var pickerWrap = document.getElementById('du-date-picker-wrap');
  if (pickerWrap) pickerWrap.style.display = _duShowDatePicker ? 'flex' : 'none';

  // Step 4 body
  if (finalEl) {
    finalEl.innerHTML = _duBuildFinalizeHtml();
  }

  // Queue meta (Step 3 body)
  if (queueMeta) {
    if (_duQueue.length > 0) {
      queueMeta.innerHTML = _duBuildQueueReviewHtml();
    } else {
      queueMeta.innerHTML = _duLoadedQueueDate
        ? '<div class="du-step-inline-status"><span class="upload-step-state-badge is-warning">Queue Empty</span></div><div class="upload-pipeline-meta">No rows available for ' + _duEsc(_duLoadedQueueDate) + '.</div>'
        : '<div class="du-step-inline-status"><span class="upload-step-state-badge is-blocked">Not Loaded</span></div><div class="upload-pipeline-meta">Load a date in Step 2 to review the queue.</div>';
    }
  }

  _duRenderStepGates();
  _duApplyStepCardStates();
  _duRenderLastSync();
  _duSyncStickyState();
}

function _duBuildVendorSummaryHtml() {
  var vendorMap = {};
  _duQueue.forEach(function(r) {
    var v = r['Contractor'] || 'Unknown';
    if (!vendorMap[v]) vendorMap[v] = 0;
    vendorMap[v]++;
  });
  var vendors = Object.keys(vendorMap).sort();
  var rows = vendors.map(function(v) {
    return '<span class="du-vendor-chip">' + _duEsc(v) + ' <em>' + vendorMap[v] + ' FDH' + (vendorMap[v] === 1 ? '' : 's') + '</em></span>';
  }).join('');
  return '<div class="du-vendor-summary">' +
    '<div class="du-vendor-summary-total">' + vendors.length + ' vendor' + (vendors.length === 1 ? '' : 's') + ' · ' + _duQueue.length + ' total rows</div>' +
    '<div class="du-vendor-chips">' + rows + '</div>' +
  '</div>';
}

function _duGetQueueHealth() {
  var summary = {
    total: 0,
    flagged: 0,
    blocking: 0,
    warnings: 0,
    ready: 0
  };
  _duQueue.forEach(function(row) {
    if (row.uploadStatus === 'Uploaded' || row.uploadStatus === 'Skipped') return;
    summary.total++;
    var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
    if (v.errors.length > 0) {
      summary.blocking++;
      summary.flagged++;
    } else if (v.warnings.length > 0) {
      summary.warnings++;
      summary.flagged++;
    } else {
      summary.ready++;
    }
  });
  return summary;
}

function _duBuildQueueReviewHtml() {
  var health = _duGetQueueHealth();
  return _duBuildVendorSummaryHtml() +
    '<div class="du-step-inline-status"><span class="upload-step-state-badge ' + (health.flagged > 0 ? 'is-warning' : 'is-complete') + '">' +
      health.ready + ' ready' +
      ' · ' + health.flagged + ' flagged' +
      (health.blocking > 0 ? ' · ' + health.blocking + ' blocking' : '') +
    '</span></div>';
}

function _duHasExportForLoadedDate() {
  return !!(_duExportStatus && _duExportStatus.exists && _duExportStatus.targetDate === _duLoadedQueueDate);
}

function _duCanRunFinalizeActions() {
  return _duQueueApproved && _duDirtyCount() === 0 && !_duIsSaving;
}

function _duBuildFinalizeHtml() {
  var selectedCount = _duGetEligibleSelected().length;
  if (!_duQueueApproved) {
    return '<div class="upload-step-state-badge is-blocked">Blocked</div>' +
      '<div class="upload-pipeline-meta">Approve the reviewed queue in Step 3 before exporting or uploading.</div>';
  }
  if (_duHasExportForLoadedDate()) {
    return '<div class="upload-step-state-badge is-complete">Export Found</div>' +
      '<div class="upload-pipeline-stat"><span class="upload-pipeline-stat-label">Existing CSV</span><span class="upload-pipeline-stat-value">' + _duEsc(_duExportStatus.fileName || '—') + '</span></div>' +
      '<div class="upload-pipeline-meta">Existing export found for ' + _duEsc(_duLoadedQueueDate) + '. Dry run and upload are available for ' + selectedCount + ' selected row(s).</div>' +
      (_duExportStatus.fileUrl
        ? '<div class="upload-pipeline-meta"><a href="' + _duEsc(_duExportStatus.fileUrl) + '" target="_blank" rel="noopener">Open export file</a></div>'
        : '');
  }
  return '<div class="upload-step-state-badge is-warning">Export Recommended</div>' +
    '<div class="upload-pipeline-meta">No manual export found for ' + _duEsc(_duLoadedQueueDate || 'this queue') + '. A snapshot will be created automatically on upload. You may also export now for an early backup.</div>';
}

function _duGetStepCardState(stepKey) {
  var health = _duGetQueueHealth();
  if (stepKey === 'step1') return _duIncomingCount > 0 ? 'warning' : 'complete';
  if (stepKey === 'step2') return _duLoadedQueueDate ? 'complete' : 'current';
  if (stepKey === 'step3') {
    if (!_duLoadedQueueDate) return 'blocked';
    if (_duQueueApproved) return 'complete';
    if (health.flagged > 0) return 'warning';
    return 'current';
  }
  if (stepKey === 'step4') {
    if (!_duQueueApproved) return 'blocked';
    return _duHasExportForLoadedDate() ? 'complete' : 'current';
  }
  return '';
}

function _duApplyStepCardStates() {
  var cards = {
    step1: document.querySelector('#upload-workspace .upload-pipeline-row .upload-stage-card:nth-child(1)'),
    step2: document.querySelector('#upload-workspace .upload-pipeline-row .upload-stage-card:nth-child(2)'),
    step3: document.querySelector('#upload-workspace .upload-pipeline-row .upload-stage-card:nth-child(3)'),
    step4: document.getElementById('du-step4-card')
  };
  Object.keys(cards).forEach(function(key) {
    var card = cards[key];
    if (!card) return;
    card.classList.remove('is-blocked', 'is-current', 'is-complete', 'is-warning');
    var state = _duGetStepCardState(key);
    if (state) card.classList.add('is-' + state);
  });
}

function _duResetApproval(reason, silent) {
  _duQueueApproved = false;
  _duLastApprovalReason = reason || '';
  if (!silent && reason) showToast(reason, 'info');
}

function _duRenderStepGates() {
  // Step 3 Approve button
  var btnApprove = document.getElementById('du-btn-approve-queue');
  if (btnApprove) {
    var hasQueue = _duQueue.length > 0;
    var hasIssues = hasQueue && _duQueue.some(function(r) {
      var v = _duValidation[r.rowIdx] || { errors: [], warnings: [] };
      return v.errors.length > 0;
    });
    btnApprove.disabled = !hasQueue;
    if (_duQueueApproved) {
      btnApprove.textContent = 'Approved ✓';
      btnApprove.classList.add('du-btn-approved');
      btnApprove.classList.remove('du-btn-warn');
      btnApprove.title = 'Queue is approved. Step 4 is unlocked.';
    } else if (!hasQueue) {
      btnApprove.textContent = 'Approve Queue';
      btnApprove.classList.remove('du-btn-approved', 'du-btn-warn');
      btnApprove.title = 'Load a date in Step 2 first';
    } else if (hasIssues) {
      btnApprove.textContent = 'Approve with Issues';
      btnApprove.classList.add('du-btn-warn');
      btnApprove.classList.remove('du-btn-approved');
      btnApprove.title = 'Queue has validation errors — proceed with caution';
    } else {
      btnApprove.textContent = 'Approve Queue';
      btnApprove.classList.remove('du-btn-approved', 'du-btn-warn');
      btnApprove.title = 'Approve this queue to unlock Step 4 export';
    }
  }

  // Step 4 card lock
  var step4Card = document.getElementById('du-step4-card');
  if (step4Card) {
    step4Card.classList.toggle('upload-stage-card--locked', !_duQueueApproved);
  }
  var btnExport4 = document.getElementById('du-btn-export-step4');
  if (btnExport4) {
    var hasQueue = _duQueue.length > 0;
    var hasExport = _duHasExportForLoadedDate();
    btnExport4.disabled = !_duQueueApproved || !hasQueue || _duDirtyCount() > 0 || _duIsSaving;
    btnExport4.textContent = hasExport ? 'Re-export QB CSV' : 'Export QB CSV';
    btnExport4.classList.toggle('btn-ghost', hasExport);
    btnExport4.classList.toggle('btn-primary', !hasExport);
    btnExport4.title = !_duQueueApproved
      ? 'Approve the queue in Step 3 first'
      : hasExport
        ? 'A CSV already exists for this date. Re-export only if you need a fresh file.'
        : 'Export current queue to 01_Pending_Upload as a QB CSV';
  }
  _duApplyStepCardStates();
}

function _duToggleDatePicker() {
  _duShowDatePicker = !_duShowDatePicker;
  var pickerWrap = document.getElementById('du-date-picker-wrap');
  if (pickerWrap) pickerWrap.style.display = _duShowDatePicker ? 'flex' : 'none';
  var btnSpecific = document.getElementById('du-btn-specific-date');
  if (btnSpecific) btnSpecific.textContent = _duShowDatePicker ? 'Hide Date Picker' : 'Load a Specific Date';
}

function _duApproveQueue() {
  if (_duQueue.length === 0) {
    showToast('Load a date in Step 2 before approving.', 'warn');
    return;
  }
  _duQueueApproved = true;
  _duRenderStepGates();
  showToast('Queue approved. Step 4 is now unlocked.', 'success');
}

function _duPreflightExport() {
  if (!_duQueueApproved) {
    showToast('Approve the queue in Step 3 before exporting.', 'warn');
    return;
  }
  var eligible = _duGetEligibleSelected();
  var pendingRows = _duQueue.filter(function(r) { return r.uploadStatus === 'Pending'; });
  var checkRows = eligible.length > 0 ? eligible : pendingRows.map(function(r) { return r.rowIdx; });
  if (checkRows.length === 0) {
    showToast('No pending rows to export.', 'warn');
    return;
  }

  // Build vendor breakdown for confirmation modal
  var vendorMap = {};
  _duQueue.forEach(function(r) {
    if (checkRows.indexOf(r.rowIdx) !== -1) {
      var v = r['Contractor'] || 'Unknown';
      if (!vendorMap[v]) vendorMap[v] = 0;
      vendorMap[v]++;
    }
  });
  var vendorLines = Object.keys(vendorMap).sort().map(function(v) {
    return '<li>' + _duEsc(v) + ': ' + vendorMap[v] + ' row' + (vendorMap[v] === 1 ? '' : 's') + '</li>';
  }).join('');

  var body =
    '<div class="upload-preview-note">' +
      '<strong>' + checkRows.length + ' row' + (checkRows.length === 1 ? '' : 's') + '</strong> will be written to <em>01_Pending_Upload</em> as a CSV.' +
    '</div>' +
    '<div class="upload-pipeline-meta" style="margin:8px 0 4px">Vendor breakdown:</div>' +
    '<ul style="margin:0 0 10px 16px;padding:0;font-size:11px;color:var(--text-main)">' + vendorLines + '</ul>' +
    '<div class="upload-preview-note warn">Tip: After export, verify the CSV before pushing it to QuickBase. Duplicates already in QB will be flagged on upload.</div>';

  _duOpenModal('Confirm Export to QB CSV', body, [
    { label: 'Confirm Export', cls: 'upload-btn btn-primary', onclick: '_duCloseModal(); _duExportPipelineCsv();' },
    { label: 'Cancel', cls: 'upload-btn', onclick: '_duCloseModal()' }
  ]);
}

function _duRunIncomingPipeline() {
  showToast('Processing incoming reports into Master Archive…', 'info');
  google.script.run
    .withSuccessHandler(function(result) {
      _duPipeline.archiveStatus = result.archiveStatus || 'idle';
      _duPipeline.latestArchiveDate = result.latestArchiveDate || _duPipeline.latestArchiveDate || '';
      showToast((result.archiveRowsAdded || 0) + ' archive row(s) added.', 'success');
      _duLoadPipelineStatus();
      _duLoadQueue();
      _duLoadStats();
    })
    .withFailureHandler(function(err) {
      showToast('Incoming processing failed: ' + (err.message || err), 'error');
    })
    .runIncomingArchivePipeline();
}

function _duHandleTargetDateInput(value) {
  _duTargetDate = value || _duTodayIso(-1);
}

function _duLoadRecommendedQueueDate() {
  _duTargetDate = _duPipeline.recommendedDate || _duTodayIso(-1);
  var targetInput = document.getElementById('upload-target-date');
  if (targetInput) targetInput.value = _duTargetDate;
  _duLoadQueueForDate(_duTargetDate);
}

function _duLoadQueueForDate(dateStr) {
  var target = dateStr || _duTargetDate || _duTodayIso(-1);
  showToast('Loading QuickBase upload tab for ' + target + '…', 'info');
  google.script.run
    .withSuccessHandler(function(result) {
      _duLoadedQueueDate = result.targetDate || target;
      _duPipeline.queueRowCount = result.rowCount || 0;
      _duResetApproval('', true);
      _duExportStatus = null;
      _duLoadQueue();
      _duLoadStats();
      _duRenderPipeline();
      showToast('Queue loaded for ' + _duLoadedQueueDate + '.', 'success');
    })
    .withFailureHandler(function(err) {
      showToast('Queue load failed: ' + (err.message || err), 'error');
    })
    .loadDailyUploadQueueForDate(target);
}

function _duExportPipelineCsv() {
  showToast('Exporting current QuickBase upload tab to CSV…', 'info');
  google.script.run
    .withSuccessHandler(function(result) {
      _duLatestExport = {
        fileId: result.fileId,
        fileName: result.fileName,
        fileUrl: result.fileUrl,
        modifiedAt: result.createdAt
      };
      _duExportStatus = {
        targetDate: _duLoadedQueueDate,
        exists: true,
        fileId: result.fileId,
        fileName: result.fileName,
        fileUrl: result.fileUrl,
        createdAt: result.createdAt,
        modifiedAt: result.createdAt
      };
      _duRenderPipeline();
      _duRenderToolbar();
      showToast('CSV exported to 01_Pending_Upload.', 'success');
    })
    .withFailureHandler(function(err) {
      showToast('CSV export failed: ' + (err.message || err), 'error');
    })
    .exportCurrentDailyUploadCsv();
}

function _duPopulateVendorOptions() {
  var vendorSelect = document.getElementById('upload-filter-vendor');
  if (!vendorSelect) return;
  vendorSelect.innerHTML = _duBuildVendorOptions();
}

function _duApplyFilters() {
  var q = (_duSearchQuery || '').toLowerCase();
  _duFiltered = _duQueue.filter(function(r) {
    if (_duFilterStatus !== 'all' && r.uploadStatus !== _duFilterStatus) return false;
    if (_duFilterVendor !== 'all' && r['Contractor'] !== _duFilterVendor) return false;
    if (q) {
      var hay = [
        r['FDH Engineering ID'] || '',
        r['Contractor'] || '',
        r['Date'] || '',
        r['Construction Comments'] || ''
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  _duFiltered.sort(function(a, b) {
    var av = _duSortableValue(a[_duSortCol], _duSortCol);
    var bv = _duSortableValue(b[_duSortCol], _duSortCol);
    if (_duSortDir === 'asc') return av < bv ? -1 : av > bv ? 1 : 0;
    return av > bv ? -1 : av < bv ? 1 : 0;
  });

  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
  _duRenderStepGates();
}

function _duDebouncedSearch(val) {
  _duSearchQuery = val;
  if (_duSearchTimeout) clearTimeout(_duSearchTimeout);
  _duSearchTimeout = setTimeout(function() {
    _duApplyFilters();
  }, 250);
}

function _duSortableValue(value, col) {
  var raw = value === null || value === undefined ? '' : value;
  if (col === 'Date' || col === 'Target Completion Date') {
    var ts = Date.parse(raw);
    return isNaN(ts) ? raw.toString() : ts;
  }
  if (_DU_NUMERIC_COLS.has(col)) {
    var num = parseFloat(raw);
    return isNaN(num) ? -Infinity : num;
  }
  return raw.toString().toLowerCase();
}

function _duSetSort(col) {
  if (_duSortCol === col) _duSortDir = _duSortDir === 'asc' ? 'desc' : 'asc';
  else {
    _duSortCol = col;
    _duSortDir = col === 'Date' ? 'desc' : 'asc';
  }
  _duApplyFilters();
}

function _duRenderTable() {
  var tbody = document.getElementById('upload-table-body');
  if (!tbody) return;
  var colSpan = _DU_TABLE_COLS.length + 2;

  if (_duFiltered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="upload-empty">No rows match the current filter.</td></tr>';
    _duSyncSortHeaders();
    return;
  }

  var issues = [], ready = [], uploaded = [];
  _duFiltered.forEach(function(row) {
    var s = row.uploadStatus;
    if (s === 'Uploaded' || s === 'Skipped') {
      uploaded.push(row);
    } else {
      var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
      if (v.errors.length > 0 || v.warnings.length > 0) {
        issues.push(row);
      } else {
        ready.push(row);
      }
    }
  });

  _duUpdateFinalizeActionLabels(_duGetEligibleSelected().length);

  var html = '';

  var issuesSelectable = issues.filter(function(r) { return _duIsSelectableRow(r); }).length;
  var issuesSelected   = issues.filter(function(r) { return _duSelected.has(r.rowIdx); }).length;
  var readySelectable  = ready.filter(function(r) { return _duIsSelectableRow(r); }).length;
  var readySelected    = ready.filter(function(r) { return _duSelected.has(r.rowIdx); }).length;

  html += _duBuildSwimlaneDivider('issues', issues.length, colSpan, issuesSelected, issuesSelectable);
  if (_duSwimlaneOpen.issues) {
    if (issues.length > 0) {
      html += issues.map(function(r, i) { return _duBuildRowHtml(r, i); }).join('');
    } else {
      html += '<tr class="upload-swimlane-empty-row"><td colspan="' + colSpan + '" class="upload-swimlane-empty-cell upload-swimlane-ok">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        'All clear — no validation issues detected.</td></tr>';
    }
  }

  html += _duBuildSwimlaneDivider('ready', ready.length, colSpan, readySelected, readySelectable);
  if (_duSwimlaneOpen.ready) {
    if (ready.length > 0) {
      html += ready.map(function(r, i) { return _duBuildRowHtml(r, i); }).join('');
    } else {
      html += '<tr class="upload-swimlane-empty-row"><td colspan="' + colSpan + '" class="upload-swimlane-empty-cell">No rows ready — fix issues above or adjust filters.</td></tr>';
    }
  }

  html += _duBuildSwimlaneDivider('uploaded', uploaded.length, colSpan, 0, 0);
  if (_duSwimlaneOpen.uploaded && uploaded.length > 0) {
    html += uploaded.map(function(r, i) { return _duBuildRowHtml(r, i); }).join('');
  }

  tbody.innerHTML = html;
  tbody.querySelectorAll('.upload-swimlane-group-check[data-indeterminate="true"]').forEach(function(cb) {
    cb.indeterminate = true;
  });
  _duApplyColWidths();
  _duSyncSortHeaders();
  _duSyncStickyState();
}

function _duGetCellAnnotation(col, v) {
  var errors = v.errors || [];
  var warnings = v.warnings || [];

  // Numeric cols: "[ShortName] is negative" annotation belongs in that col
  if (_DU_NUMERIC_COLS && _DU_NUMERIC_COLS.has(col)) {
    var neg = _duShortColName(col) + ' is negative';
    if (errors.indexOf(neg) >= 0) return { msg: neg, cls: 'upload-inline-error' };
  }

  // Static column → message ownership
  var ownedErrors = {
    'Date': ['Missing Date'],
    'Contractor': ['Missing Contractor'],
    'FDH Engineering ID': ['Missing FDH ID', 'Previous upload failed']
  };
  var ownedWarnings = {
    'Target Completion Date': ['No target date']
  };

  var emsgs = ownedErrors[col];
  if (emsgs) {
    for (var i = 0; i < emsgs.length; i++) {
      if (errors.indexOf(emsgs[i]) >= 0) return { msg: emsgs[i], cls: 'upload-inline-error' };
    }
  }
  var wmsgs = ownedWarnings[col];
  if (wmsgs) {
    for (var j = 0; j < wmsgs.length; j++) {
      if (warnings.indexOf(wmsgs[j]) >= 0) return { msg: wmsgs[j], cls: 'upload-inline-warn' };
    }
  }
  return null;
}

function _duRenderCell(row, col, rowEditable, v) {
  var val = _duGetCellDisplayValue(row.rowIdx, col, row[col]);
  var tdClass = (_DU_COL_GROUP[col] || '') + (rowEditable && _DU_EDITABLE_COLS.has(col) ? ' upload-td-editable' : '');
  var escaped = _duEsc(val);

  if (_DU_BOOL_COLS.has(col)) {
    var boolVal = _duIsTruthy(val);
    if (rowEditable && _DU_EDITABLE_COLS.has(col)) {
      return '<td class="' + tdClass + ' upload-bool-cell">' +
        '<label class="du-bool-wrap">' +
          '<input type="checkbox" class="du-bool-checkbox" ' + (boolVal ? 'checked ' : '') + 'aria-label="' + _duEsc(col) + ' for row ' + row.rowIdx + '" onchange="_duToggleBool(' + row.rowIdx + ',\'' + _duEscJs(col) + '\')">' +
        '</label>' +
      '</td>';
    }
    return '<td class="' + tdClass + ' upload-bool-cell"><input type="checkbox" class="du-bool-checkbox is-readonly" ' + (boolVal ? 'checked ' : '') + 'disabled aria-label="' + _duEsc(col) + ' for row ' + row.rowIdx + '"></td>';
  }

  // Inline validation annotation — shown in the column that owns the issue
  var annotation = '';
  if (v) {
    var ann = _duGetCellAnnotation(col, v);
    if (ann) annotation += '<span class="' + ann.cls + '">' + _duEsc(ann.msg) + '</span>';
  }
  if (col === 'FDH Engineering ID' && row.uploadStatus === 'Duplicate') {
    annotation += '<button type="button" class="upload-dup-view-btn" onclick="event.stopPropagation();_duOpenDupCompareModal(' + row.rowIdx + ')">View Match</button>';
  }

  if (rowEditable && _DU_EDITABLE_COLS.has(col)) {
    var tag = col === 'Construction Comments' ? 'textarea' : 'input';
    var attrs = tag === 'textarea' ? 'rows="1"' : 'type="text"';
    var cls = 'upload-cell-input' + (col === 'Construction Comments' ? ' is-comments' : '');
    return '<td class="' + tdClass + '">' +
      (tag === 'textarea'
        ? '<textarea ' + attrs + ' class="' + cls + '" data-rowidx="' + row.rowIdx + '" data-field="' + _duEsc(col) + '" oninput="_duHandleCellInput(this)" onblur="_duNormalizeCellInput(this)">' + escaped + '</textarea>'
        : '<input ' + attrs + ' class="' + cls + '" data-rowidx="' + row.rowIdx + '" data-field="' + _duEsc(col) + '" value="' + escaped + '" oninput="_duHandleCellInput(this)" onblur="_duNormalizeCellInput(this)">') +
      annotation +
    '</td>';
  }

  return '<td class="' + tdClass + '"><span class="upload-cell-readonly' + (col === 'Construction Comments' ? ' is-comments' : '') + '">' + escaped + '</span>' + annotation + '</td>';
}

function _duStatusCell(row, v) {
  v = v || _duValidation[row.rowIdx] || { errors: [], warnings: [] };
  var dirtyDot = _duDirty[row.rowIdx] ? '<span class="upload-dirty-dot"></span>' : '';
  var status = row.uploadStatus;
  var healthIcon = '';
  if (status !== 'Uploaded' && status !== 'Skipped') {
    if (v.errors.length > 0) {
      healthIcon = '<span class="upload-health-icon health-error" title="' + _duEsc(v.errors.join(', ')) + '">✕</span>';
    } else if (v.warnings.length > 0) {
      healthIcon = '<span class="upload-health-icon health-warn" title="' + _duEsc(v.warnings.join(', ')) + '">⚠</span>';
    } else {
      healthIcon = '<span class="upload-health-icon health-ok" title="Validated">✓</span>';
    }
  }
  var lockText = status === 'Uploaded' || status === 'Skipped'
    ? '<span class="upload-lock-note">Locked</span>'
    : (_duEditMode ? '<span class="upload-lock-note editable">Editable</span>' : '<span class="upload-lock-note">Read only</span>');
  return dirtyDot + healthIcon + _duStatusBadge(status) + lockText;
}

function _duStatusBadge(status) {
  var map = {
    'Pending': ['status-pending', 'Pending'],
    'Uploaded': ['status-uploaded', 'Uploaded'],
    'Failed': ['status-failed', 'Failed'],
    'Duplicate': ['status-duplicate', 'Duplicate'],
    'Skipped': ['status-skipped', 'Skipped']
  };
  var entry = map[status] || ['status-pending', status || 'Pending'];
  return '<span class="upload-status-badge ' + entry[0] + '">' + _duEsc(entry[1]) + '</span>';
}

function _duHandleCellInput(el) {
  var rowIdx = parseInt(el.getAttribute('data-rowidx'), 10);
  var field = el.getAttribute('data-field');
  var value = el.value || '';
  _duStageCellChange(rowIdx, field, value);
}

function _duNormalizeCellInput(el) {
  if (el.tagName === 'TEXTAREA') {
    el.value = (el.value || '').trim();
    _duHandleCellInput(el);
  }
}

function _duToggleBool(rowIdx, field) {
  var current = _duGetCellDisplayValue(rowIdx, field, _duGetRow(rowIdx)[field]);
  _duStageCellChange(rowIdx, field, _duIsTruthy(current) ? 'FALSE' : 'TRUE');
  _duRenderTable();
  _duRenderToolbar();
}

function _duStageCellChange(rowIdx, field, value) {
  var row = _duGetRow(rowIdx);
  if (!row || !_DU_EDITABLE_COLS.has(field)) return;
  var hadApproval = _duQueueApproved;
  var original = _duNormalizeComparableValue(row[field], field);
  var next = _duNormalizeComparableValue(value, field);
  if (!_duDirty[rowIdx]) _duDirty[rowIdx] = {};
  if (original === next) {
    delete _duDirty[rowIdx][field];
    if (Object.keys(_duDirty[rowIdx]).length === 0) delete _duDirty[rowIdx];
  } else {
    _duDirty[rowIdx][field] = value;
  }
  if (hadApproval && _duDirtyCount() > 0) {
    _duResetApproval('Queue approval cleared. Save or revert edits, then approve Step 3 again.');
  }
  _duSyncDirtyRowState(rowIdx);
  _duRenderToolbar();
  _duRenderPipeline();
  _duRenderStepGates();
}

function _duSyncDirtyRowState(rowIdx) {
  var tr = document.querySelector('#upload-table-body tr[data-rowidx="' + rowIdx + '"]');
  if (!tr) return;
  tr.classList.toggle('row-dirty', !!_duDirty[rowIdx]);
  var statusCell = tr.querySelector('.col-status');
  var row = _duGetRow(rowIdx);
  var v = _duValidation[rowIdx] || { errors: [], warnings: [] };
  if (statusCell && row) statusCell.innerHTML = _duStatusCell(row, v);
}

function _duSaveDirtyRows() {
  if (_duIsSaving) return;
  var rowIds = Object.keys(_duDirty);
  if (rowIds.length === 0) return;
  
  var totalChanges = _duDirtyCount();
  _duIsSaving = true;
  _duRenderToolbar();
  showToast('Saving ' + totalChanges + ' staged change(s)...', 'info');

  var tasks = [];
  rowIds.forEach(function(rowIdx) {
    Object.keys(_duDirty[rowIdx]).forEach(function(field) {
      tasks.push({ rowIdx: parseInt(rowIdx, 10), field: field, value: _duDirty[rowIdx][field] });
    });
  });

  google.script.run
    .withSuccessHandler(function(result) {
      _duIsSaving = false;
      if (result && result.ok) {
        // Apply changes to local queue
        tasks.forEach(function(task) {
          var row = _duGetRow(task.rowIdx);
          if (row) {
            row[task.field] = task.value;
            if (row.uploadStatus === 'Failed') row.uploadStatus = 'Pending';
          }
        });
        _duDirty = {};
        _duResetApproval('Queue approval cleared after saving edits. Re-approve Step 3 before finalizing.');
        _duApplyFilters();
        showToast('Upload edits saved.', 'success');
      } else {
        var err = (result && result.error) ? result.error : 'Some edits failed to save.';
        showToast(err, 'error');
        _duRenderToolbar();
      }
    })
    .withFailureHandler(function(err) {
      _duIsSaving = false;
      showToast('Save failed: ' + (err.message || err), 'error');
      _duRenderToolbar();
    })
    .saveDailyUploadRowEditsBatch(tasks);
}

// _duSaveDirtyTask removed in favor of batched save function Above

function _duRevertDirtyRows() {
  if (_duDirtyCount() === 0) return;
  if (!confirm('Discard all unsaved upload edits?')) return;
  _duDirty = {};
  _duResetApproval('Queue approval cleared after reverting edits. Re-approve Step 3 before finalizing.');
  _duRenderTable();
  _duRenderToolbar();
  _duRenderPipeline();
  _duRenderStepGates();
}

function _duInitColResizers() {
  var ths = document.querySelectorAll('#upload-workspace .upload-table thead th');
  ths.forEach(function(th, idx) {
    if (th.classList.contains('col-check')) return;
    if (th.querySelector('.col-resizer')) return;
    var handle = document.createElement('div');
    handle.className = 'col-resizer';
    handle.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      e.preventDefault();
      _duResize = { th: th, idx: idx, startX: e.clientX, startW: th.offsetWidth };
      handle.classList.add('is-dragging');
      document.addEventListener('mousemove', _duOnColResize);
      document.addEventListener('mouseup', _duStopColResize);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    th.appendChild(handle);
  });
}

function _duOnColResize(e) {
  if (!_duResize) return;
  var newW = Math.max(56, _duResize.startW + (e.clientX - _duResize.startX));
  _duColWidths[_duResize.idx] = newW;
  _duApplyColWidths();
}

function _duStopColResize() {
  if (!_duResize) return;
  var handle = _duResize.th.querySelector('.col-resizer');
  if (handle) handle.classList.remove('is-dragging');
  _duResize = null;
  document.removeEventListener('mousemove', _duOnColResize);
  document.removeEventListener('mouseup', _duStopColResize);
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
}

function _duApplyColWidths() {
  var el = document.getElementById('upload-col-widths');
  if (!el) {
    el = document.createElement('style');
    el.id = 'upload-col-widths';
    document.head.appendChild(el);
  }
  el.textContent = Object.keys(_duColWidths).map(function(i) {
    var n = parseInt(i, 10) + 1;
    var w = _duColWidths[i];
    return '.upload-table th:nth-child(' + n + '),.upload-table td:nth-child(' + n + '){width:' + w + 'px!important;min-width:' + w + 'px!important;max-width:' + w + 'px!important;}';
  }).join('');
}

function _duRunDryRun() {
  var eligible = _duGetEligibleSelected();
  if (!_duCanRunFinalizeActions()) {
    showToast('Step 4 requires an approved queue and a CSV export for the loaded date.', 'warn');
    return;
  }
  if (_duDirtyCount() > 0) {
    showToast('Save or revert staged edits before running a dry run.', 'warn');
    return;
  }
  if (eligible.length === 0) {
    showToast('Select at least one row to validate.', 'warn');
    return;
  }

  showToast('Running dry-run validation...', 'info');
  google.script.run
    .withSuccessHandler(function(result) {
      _duOpenDryRunResultModal(result);
    })
    .withFailureHandler(function(err) {
      showToast('Dry-run error: ' + (err.message || err), 'error');
    })
    .uploadDailyRecordsToQB(eligible, { dryRun: true, batchId: 'dry-' + Date.now() });
}

function _duOpenDryRunResultModal(result) {
  var rows = (result.results || []).map(function(r) {
    var unmappedStr = (r.unmappedFields && r.unmappedFields.length > 0)
      ? '<div class="upload-preview-warn">Unmapped: ' + _duEsc(r.unmappedFields.join(', ')) + '</div>'
      : '<span class="upload-preview-ok">All mapped</span>';
    return '<tr>' +
      '<td>' + _duEsc(r.fdh || '') + '</td>' +
      '<td>' + _duEsc(r.vendor || '') + '</td>' +
      '<td>' + (r.mappedFields || 0) + ' / 17</td>' +
      '<td>' + (r.isDuplicate ? '<span class="upload-preview-warn">Duplicate match found</span>' : '<span class="upload-preview-ok">No duplicate found</span>') + '</td>' +
      '<td>' + unmappedStr + '</td>' +
    '</tr>';
  }).join('');

  var body = '<p class="upload-modal-copy">Dry run complete. No rows were written to QuickBase.</p>' +
    '<table class="upload-preview-table"><thead><tr><th>FDH</th><th>Vendor</th><th>Fields Mapped</th><th>Duplicate Check</th><th>Notes</th></tr></thead><tbody>' + rows + '</tbody></table>';

  _duOpenModal('Dry Run Validation', body, [
    { label: 'Close', cls: 'upload-btn', onclick: '_duCloseModal()' }
  ]);
}

function _duOpenPreview() {
  var eligible = _duGetEligibleSelected();
  if (!_duCanRunFinalizeActions()) {
    showToast('Step 4 requires an approved queue and a CSV export for the loaded date.', 'warn');
    return;
  }
  if (_duDirtyCount() > 0) {
    showToast('Save or revert staged edits before previewing an upload.', 'warn');
    return;
  }
  if (eligible.length === 0) {
    showToast('Select at least one pending row to upload.', 'warn');
    return;
  }

  var rows = eligible.map(function(ri) {
    var r = _duGetRow(ri);
    if (!r) return '';
    var isDupe = r.uploadStatus === 'Duplicate';
    var previewCols = ['Date', 'Contractor', 'FDH Engineering ID', 'Daily UG Footage', 'Daily Strand Footage', 'Daily Fiber Footage'];
    var cells = previewCols.map(function(col) {
      return '<td>' + _duEsc((r[col] || '').toString()) + '</td>';
    }).join('');
    return '<tr' + (isDupe ? ' class="is-dupe"' : '') + '><td>' + ri + '</td>' + cells + '<td>' +
      (isDupe ? '<span class="upload-preview-warn">Possible duplicate</span>' : '<span class="upload-preview-ok">Ready</span>') +
      '</td></tr>';
  }).join('');

  var dupeCount = eligible.filter(function(ri) {
    var r = _duGetRow(ri);
    return r && r.uploadStatus === 'Duplicate';
  }).length;

  var dupeNote = dupeCount > 0
    ? '<div class="upload-preview-note warn">' + dupeCount + ' selected row(s) already match a record in QuickBase. Default upload will skip them.</div>'
    : '<div class="upload-preview-note ok">Selected rows are ready for final confirmation.</div>';

  var body = dupeNote +
    '<p class="upload-modal-copy">' + eligible.length + ' row(s) will be sent to QuickBase Daily Work Log (<code>bvay4aqkz</code>).</p>' +
    '<table class="upload-preview-table"><thead><tr><th>Row</th><th>Date</th><th>Contractor</th><th>FDH</th><th>UG Ft</th><th>Strand Ft</th><th>Fiber Ft</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>';

  var actions = [{ label: 'Cancel', cls: 'upload-btn', onclick: '_duCloseModal()' }];
  if (dupeCount > 0) {
    actions.push({ label: 'Upload (Skip Dupes)', cls: 'upload-btn btn-primary', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', true, false)' });
    actions.push({ label: 'Upload (Force All)', cls: 'upload-btn btn-danger', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', false, true)' });
  } else {
    actions.push({ label: 'Confirm Upload', cls: 'upload-btn btn-primary', onclick: '_duCloseModal(); _duExecuteUpload(' + JSON.stringify(eligible) + ', true, false)' });
  }
  _duOpenModal('Preview Upload', body, actions);
}

function _duExecuteUpload(rowIndices, skipDuplicates, forceAll) {
  if (!rowIndices || rowIndices.length === 0) return;
  if (rowIndices.length > 10) {
    _duOpenConfirmGate(rowIndices, skipDuplicates, forceAll);
    return;
  }
  _duDoUpload(rowIndices, skipDuplicates, forceAll ? rowIndices : []);
}

function _duOpenConfirmGate(rowIndices, skipDuplicates, forceAll) {
  var body = '<p class="upload-modal-copy strong">You are about to upload <strong>' + rowIndices.length + ' rows</strong> to QuickBase. This action cannot be undone.</p>' +
    '<p class="upload-modal-copy">Type <strong>UPLOAD</strong> to unlock the final action.</p>' +
    '<input type="text" id="upload-confirm-gate-input" class="upload-confirm-input" placeholder="UPLOAD" oninput="_duCheckConfirmGate(this)">';

  _duOpenModal('Confirm Batch Upload', body, [
    { label: 'Cancel', cls: 'upload-btn', onclick: '_duCloseModal()' },
    { label: 'Upload ' + rowIndices.length + ' Rows', cls: 'upload-btn btn-primary', id: 'upload-confirm-gate-btn', disabled: true, onclick: '_duCloseModal(); _duDoUpload(' + JSON.stringify(rowIndices) + ',' + skipDuplicates + ',' + JSON.stringify(forceAll ? rowIndices : []) + ')' }
  ]);
}

function _duCheckConfirmGate(el) {
  var btn = document.getElementById('upload-confirm-gate-btn');
  if (btn) btn.disabled = (el.value.trim().toUpperCase() !== 'UPLOAD');
}

var _duUploadStartTime = 0;
var _duUploadElapsedTimer = null;

function _duDoUpload(rowIndices, skipDuplicates, forceRows) {
  var batchId = 'batch-' + Date.now().toString(36);
  _duUploadStartTime = Date.now();
  _duShowUploadProgress(rowIndices.length, batchId);
  google.script.run
    .withSuccessHandler(function(result) {
      _duClearElapsedTimer();
      result._elapsedMs = Date.now() - _duUploadStartTime;
      _duRenderResultsCard(result);
      _duLoadStats();
      _duLoadHistory();
    })
    .withFailureHandler(function(err) {
      _duClearElapsedTimer();
      showToast('Upload failed: ' + (err.message || err), 'error');
      _duRefreshAll({ force: true });
    })
    .uploadDailyRecordsToQB(rowIndices, {
      batchId: batchId,
      skipDuplicates: !!skipDuplicates,
      forceRows: forceRows || [],
      targetDate: _duLoadedQueueDate || ''
    });
}

function _duClearElapsedTimer() {
  if (_duUploadElapsedTimer) { clearInterval(_duUploadElapsedTimer); _duUploadElapsedTimer = null; }
}

function _duShowUploadProgress(rowCount, batchId) {
  var tableWrap = document.querySelector('#upload-workspace .upload-table-wrap');
  if (!tableWrap) return;
  var chunkCount = Math.max(1, Math.ceil(rowCount / 25));
  var estSecs = Math.round(chunkCount * 1.5 + 1);

  tableWrap.innerHTML =
    '<div class="upload-in-progress">' +
      '<div class="uip-header">' +
        '<div class="uip-spinner"></div>' +
        '<div>' +
          '<div class="uip-title">Uploading to QuickBase</div>' +
          '<div class="uip-meta">' + rowCount + ' rows · ' + chunkCount + ' chunk' + (chunkCount === 1 ? '' : 's') + ' · ~' + estSecs + 's estimated</div>' +
        '</div>' +
      '</div>' +
      '<div class="uip-progress-rail"><div class="uip-progress-fill" id="uip-fill"></div></div>' +
      '<div class="uip-elapsed" id="uip-elapsed">0s elapsed</div>' +
      '<div class="uip-batch">Batch · ' + _duEsc(batchId) + '</div>' +
    '</div>';

  // Animate progress bar over estimated duration
  var startTime = Date.now();
  var fillEl = document.getElementById('uip-fill');
  var elapsedEl = document.getElementById('uip-elapsed');
  _duUploadElapsedTimer = setInterval(function() {
    var elapsed = (Date.now() - startTime) / 1000;
    var pct = Math.min(95, (elapsed / estSecs) * 100);
    if (fillEl) fillEl.style.width = pct.toFixed(1) + '%';
    if (elapsedEl) elapsedEl.textContent = elapsed.toFixed(0) + 's elapsed';
  }, 400);
}

function _duOpenUploadResultModal(result) {
  var failedRows = (result.results || []).filter(function(r) { return r.status === 'failed'; });
  var summary = '<div class="upload-result-grid">' +
    '<div><div class="upload-result-value success">' + _duEsc(result.success || 0) + '</div><div class="upload-result-label">Uploaded</div></div>' +
    '<div><div class="upload-result-value failed">' + _duEsc(result.failed || 0) + '</div><div class="upload-result-label">Failed</div></div>' +
    '<div><div class="upload-result-value duplicate">' + _duEsc(result.duplicates || 0) + '</div><div class="upload-result-label">Duplicates</div></div>' +
  '</div>';
  var failDetail = failedRows.length > 0
    ? '<div class="upload-result-failures">' + failedRows.map(function(r) {
        return '<div class="upload-result-failure"><strong>Row ' + _duEsc(r.rowIdx) + '</strong> • ' + _duEsc(r.fdh || '') + ' • ' + _duEsc(r.error || '') + '</div>';
      }).join('') + '</div>'
    : '<p class="upload-modal-copy">All selected rows completed without server-side failures.</p>';
  var batchNote = '<div class="upload-result-batch">Batch ID: ' + _duEsc(result.batchId || '') + '</div>';

  _duOpenModal('Upload Complete', summary + failDetail + batchNote, [
    { label: 'Close', cls: 'upload-btn btn-primary', onclick: '_duCloseModal()' }
  ]);
}

function _duExportCsv() {
  if (_duDirtyCount() > 0 && !confirm('Export the current queue without saving queue edits first?')) return;
  _duExportPipelineCsv();
}

function _duOpenEmailDraft(idx) {
  var m = _duMissing[idx];
  if (!m) return;
  google.script.run
    .withSuccessHandler(function(draft) {
      var body = '<div class="upload-modal-subhead">Subject</div><div class="upload-email-subject">' + _duEsc(draft.subject) + '</div>' +
        '<div class="upload-modal-subhead">Body</div><div class="upload-email-body">' + _duEsc(draft.body) + '</div>';
      _duOpenModal('Missing Report Email • ' + m.vendor, body, [
        { label: 'Close', cls: 'upload-btn', onclick: '_duCloseModal()' },
        { label: 'Copy to Clipboard', cls: 'upload-btn btn-primary', onclick: '_duCopyEmailDraft(' + idx + ', ' + JSON.stringify(draft) + ')' }
      ]);
    })
    .withFailureHandler(function(err) {
      showToast('Draft error: ' + (err.message || err), 'error');
    })
    .draftMissingReportEmail(m.vendor, _duMissingDate, m.activeFdhs || []);
}

function _duCopyEmailDraft(idx, draft) {
  var text = 'Subject: ' + draft.subject + '\n\n' + draft.body;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Email copied to clipboard.', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Email copied to clipboard.', 'success');
  });
}

function _duDraftAllEmails() {
  if (_duMissing.length === 0) return;
  showToast('Drafting missing vendor emails...', 'info');
  var drafts = [];
  var remaining = _duMissing.length;
  _duMissing.forEach(function(m) {
    google.script.run
      .withSuccessHandler(function(draft) {
        drafts.push('Subject: ' + draft.subject + '\n\n' + draft.body);
        remaining--;
        if (remaining === 0) _duFinalizeDraftCopy(drafts);
      })
      .withFailureHandler(function() {
        remaining--;
        if (remaining === 0) _duFinalizeDraftCopy(drafts);
      })
      .draftMissingReportEmail(m.vendor, _duMissingDate, m.activeFdhs || []);
  });
}

function _duFinalizeDraftCopy(drafts) {
  var combined = drafts.join('\n\n' + '-'.repeat(60) + '\n\n');
  navigator.clipboard.writeText(combined).then(function() {
    showToast('All drafts copied to clipboard.', 'success');
  }).catch(function() {
    showToast('Unable to copy drafts automatically.', 'error');
  });
}

function _duRenderHistory() {
  var el = document.getElementById('upload-history-list');

      '<div class="upload-history-counts">' +
        '<span class="upload-history-count">' + _duEsc(rowCount) + ' rows</span>' +
        '<span class="upload-history-count success">' + _duEsc(success) + ' uploaded</span>' +

        (skipped > 0 ? '<span class="upload-history-count skipped">' + _duEsc(skipped) + ' skipped</span>' : '') +
      '</div>' +
      '<span class="upload-history-batch">' + _duEsc(batchId) + '</span>' +
    '</div>';

}

function _duToggleHistory() {
  _duHistoryOpen = !_duHistoryOpen;
  var toggle = document.getElementById('upload-history-toggle');
  var list = document.getElementById('upload-history-list');
  if (toggle) toggle.classList.toggle('is-open', _duHistoryOpen);
  if (list) list.classList.toggle('is-open', _duHistoryOpen);
}

function _duOpenModal(title, bodyHtml, actions) {
  var overlay = document.getElementById('upload-modal-overlay');
  if (!overlay) return;
  _duModalRestoreFocus = document.activeElement;
  var titleId = 'upload-modal-title';
  var actionBtns = (actions || []).map(function(a) {
    var dis = a.disabled ? ' disabled' : '';
    var id = a.id ? ' id="' + a.id + '"' : '';
    return '<button type="button" class="' + a.cls + '"' + id + dis + ' onclick="' + _duEsc(a.onclick) + '">' + _duEsc(a.label) + '</button>';
  }).join('');

  overlay.innerHTML =
    '<div class="upload-modal" role="dialog" aria-modal="true" aria-labelledby="' + titleId + '" onclick="event.stopPropagation()">' +
      '<div class="upload-modal-header">' +
        '<div class="upload-modal-title" id="' + titleId + '">' + _duEsc(title) + '</div>' +
        '<button type="button" class="upload-modal-close" aria-label="Close upload dialog" onclick="_duCloseModal()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="upload-modal-body">' + bodyHtml + '</div>' +
      '<div class="upload-modal-footer">' + actionBtns + '</div>' +

  }, 0);
}

function _duCloseModal() {
  var overlay = document.getElementById('upload-modal-overlay');
  if (!overlay) return;
  overlay.classList.remove('visible');
  overlay.innerHTML = '';
  if (_duModalRestoreFocus && typeof _duModalRestoreFocus.focus === 'function') _duModalRestoreFocus.focus();
}

function _duHandleModalKeydown(evt) {
  var overlay = document.getElementById('upload-modal-overlay');
  if (!overlay || !overlay.classList.contains('visible')) return;
  if (evt.key === 'Escape') {
    evt.preventDefault();
    _duCloseModal();
  }
}

function _duGetEligibleSelected() {
  return Array.from(_duSelected).filter(function(ri) {
    var r = _duGetRow(ri);
    return r && _duIsSelectableRow(r);
  });
}

function _duSetTableLoading(isLoading) {
  var tbody = document.getElementById('upload-table-body');
  if (!tbody || !isLoading) return;
  tbody.innerHTML = '<tr><td colspan="20" class="upload-empty">Loading upload queue...</td></tr>';
}

function _duGetCellDisplayValue(rowIdx, field, fallback) {
  if (_duDirty[rowIdx] && Object.prototype.hasOwnProperty.call(_duDirty[rowIdx], field)) return _duDirty[rowIdx][field];
  return fallback === null || fallback === undefined ? '' : fallback;
}

function _duGetRow(rowIdx) {
  return _duQueue.find(function(r) { return r.rowIdx === rowIdx; });
}

function _duCanEditRow(row) {
  return !!row && _duEditMode && (row.uploadStatus === 'Pending' || row.uploadStatus === 'Failed' || row.uploadStatus === 'Duplicate');
}

function _duIsSelectableRow(row) {
  return !!row && row.uploadStatus !== 'Uploaded' && row.uploadStatus !== 'Skipped';
}

function _duIsTruthy(val) {
  return ['true', '1', 'yes'].indexOf(String(val || '').toLowerCase()) >= 0;
}

function _duDirtyCount() {
  return Object.keys(_duDirty).reduce(function(sum, rowIdx) {
    return sum + Object.keys(_duDirty[rowIdx]).length;
  }, 0);
}

function _duHasUnsavedChanges() {
  return _duDirtyCount() > 0;
}

function _duConfirmLeaveWithUnsaved(targetText) {
  if (!_duHasUnsavedChanges()) return true;
  return confirm('You have unsaved upload edits.\n\nSave or revert them before you ' + targetText + '.\n\nChoose OK to discard the staged edits and continue.');
}

function _duBeforeUnload(evt) {
  if (!_duHasUnsavedChanges()) return;
  evt.preventDefault();
  evt.returnValue = '';
  return '';
}

function _duSyncSortHeaders() {
  var ths = document.querySelectorAll('#upload-workspace .upload-table thead th');
  ths.forEach(function(th) { th.classList.remove('is-sorted', 'sort-asc', 'sort-desc'); });
  var sortIdx = _DU_TABLE_COLS.indexOf(_duSortCol);
  if (sortIdx < 0) return;
  var target = document.querySelector('#upload-workspace .upload-table thead th:nth-child(' + (sortIdx + 2) + ')');
  if (!target) return;
  target.classList.add('is-sorted');
  target.classList.add(_duSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  var arrow = target.querySelector('.sort-arrow');
  if (arrow) arrow.textContent = _duSortDir === 'asc' ? '↑' : '↓';
}

function _duNormalizeComparableValue(value, field) {
  var v = value === null || value === undefined ? '' : String(value).trim();
  if (_DU_BOOL_COLS.has(field)) return _duIsTruthy(v) ? 'TRUE' : 'FALSE';
  return v;
}

function _duFormatRelativeTime(dateObj) {
  var diff = Math.max(0, Date.now() - dateObj.getTime());
  var mins = Math.round(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 minute ago';
  if (mins < 60) return mins + ' minutes ago';
  var hrs = Math.round(mins / 60);
  if (hrs === 1) return '1 hour ago';
  return hrs + ' hours ago';
}

// ── Triage: validation ──────────────────────────────────────
function _duBuildValidation() {
  _duValidation = {};
  _duQueue.forEach(function(row) {
    if (row.uploadStatus !== 'Uploaded' && row.uploadStatus !== 'Skipped') {
      _duValidation[row.rowIdx] = _duValidateRow(row);
    }
  });
}

function _duValidateRow(row) {
  var errors = [], warnings = [];
  if (!row['Date'] || String(row['Date']).trim() === '') errors.push('Missing Date');
  if (!row['Contractor'] || String(row['Contractor']).trim() === '') errors.push('Missing Contractor');
  if (!row['FDH Engineering ID'] || String(row['FDH Engineering ID']).trim() === '') errors.push('Missing FDH ID');
  _DU_NUMERIC_COLS.forEach(function(col) {
    var raw = row[col];
    if (raw !== null && raw !== undefined && raw !== '') {
      var n = parseFloat(raw);
      if (!isNaN(n) && n < 0) errors.push(_duShortColName(col) + ' is negative');
    }
  });
  if (!row['Target Completion Date'] || String(row['Target Completion Date']).trim() === '') warnings.push('No target date');
  if (row.uploadStatus === 'Duplicate') warnings.push('Possible duplicate in QB');
  if (row.uploadStatus === 'Failed') errors.push('Previous upload failed');
  return { errors: errors, warnings: warnings };
}

function _duShortColName(col) {
  var map = {
    'Daily UG Footage': 'UG Footage', 'Daily Strand Footage': 'Strand Footage',
    'Daily Fiber Footage': 'Fiber Footage', 'Daily NAPs/Encl. Completed': 'NAPs',
    'Drills': 'Drills', 'Missles': 'Missles', 'AE Crews': 'AE Crews',
    'Fiber Pulling Crews': 'Fiber Crews', 'Splicing Crews': 'Splice Crews'
  };
  return map[col] || col;
}

// ── Triage: row HTML ─────────────────────────────────────────
function _duBuildRowHtml(row, rowIdx) {
  var isFailed = row.uploadStatus === 'Failed';
  var isDupe = row.uploadStatus === 'Duplicate';
  var isDirty = !!_duDirty[row.rowIdx];
  var isChecked = _duSelected.has(row.rowIdx);
  var rowEditable = _duCanEditRow(row);
  var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
  var hasErrors = v.errors.length > 0;
  var hasWarnings = !hasErrors && v.warnings.length > 0;

  var trClass = [
    row.uploadStatus === 'Uploaded' ? 'row-uploaded' : '',
    isFailed ? 'row-failed' : '',
    isDupe ? 'row-duplicate' : '',
    isDirty ? 'row-dirty' : '',
    rowEditable ? 'row-editable' : '',
    _duEditMode ? 'table-edit-mode' : '',
    hasErrors ? 'row-has-error' : '',
    hasWarnings ? 'row-has-warning' : '',
    (rowIdx !== undefined && rowIdx % 2 === 1) ? 'row-even' : ''
  ].filter(Boolean).join(' ');

  var cells = _DU_TABLE_COLS.map(function(col) {
    return _duRenderCell(row, col, rowEditable, v);
  }).join('');

  var isLocked = row.uploadStatus === 'Uploaded' || row.uploadStatus === 'Skipped';
  return '<tr class="' + trClass + '" data-rowidx="' + row.rowIdx + '">' +
    '<td class="col-check"><input type="checkbox" class="upload-row-check" aria-label="Select row ' + row.rowIdx + '" ' +
    (isChecked ? 'checked ' : '') + (isLocked ? 'disabled ' : '') +
    'onchange="_duToggleRow(' + row.rowIdx + ',this.checked)"></td>' +
    cells +
    '<td class="col-status">' + _duStatusCell(row, v) + '</td>' +
  '</tr>';
}

// ── Triage: swimlane dividers ────────────────────────────────
function _duBuildSwimlaneDivider(key, count, colSpan, selectedCount, selectableCount) {
  var isOpen = _duSwimlaneOpen[key];
  var cfgs = {
    issues: {
      label: 'ISSUES',
      cls: 'swimlane-issues',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
    },
    ready: {
      label: 'READY TO UPLOAD',
      cls: 'swimlane-ready',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    },
    uploaded: {
      label: 'UPLOADED TODAY',
      cls: 'swimlane-uploaded',
      icon: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'
    }
  };
  var cfg = cfgs[key] || cfgs.ready;
  var chevronSvg = '<svg class="upload-swimlane-chevron' + (isOpen ? ' is-open' : '') + '" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';

  var checkCell;
  if (key !== 'uploaded' && selectableCount > 0) {
    var isChecked       = selectedCount === selectableCount;
    var isIndeterminate = selectedCount > 0 && selectedCount < selectableCount;
    checkCell = '<td class="col-check upload-swimlane-check-cell"' +
      ' onclick="event.stopPropagation();_duToggleSwimlaneSelection(\'' + key + '\')">' +
      '<input type="checkbox" class="upload-swimlane-group-check upload-row-check"' +
      ' data-indeterminate="' + isIndeterminate + '"' +
      (isChecked ? ' checked' : '') +
      ' onclick="return false"' +
      ' aria-label="Select all ' + key + ' rows">' +
      '</td>';
  } else {
    checkCell = '<td class="col-check upload-swimlane-check-cell"></td>';
  }

  return '<tr class="upload-swimlane-row ' + cfg.cls + '" onclick="_duToggleSwimlane(\'' + key + '\')">' +
    checkCell +
    '<td colspan="' + (colSpan - 1) + '" class="upload-swimlane-cell">' +
      '<div class="upload-swimlane-header">' +
        '<div class="upload-swimlane-header-left">' +
          chevronSvg + cfg.icon +
          '<span class="upload-swimlane-label">' + cfg.label + '</span>' +
          '<span class="upload-swimlane-count">' + count + '</span>' +
        '</div>' +
      '</div>' +
    '</td>' +
  '</tr>';
}

function _duToggleSwimlaneSelection(key) {
  var groups = { issues: [], ready: [] };
  _duFiltered.forEach(function(row) {
    var s = row.uploadStatus;
    if (s !== 'Uploaded' && s !== 'Skipped') {
      var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
      if (v.errors.length > 0 || v.warnings.length > 0) groups.issues.push(row);
      else groups.ready.push(row);
    }
  });
  var target = groups[key] || [];
  var selectable = target.filter(function(r) { return _duIsSelectableRow(r); });
  var allSelected = selectable.length > 0 && selectable.every(function(r) { return _duSelected.has(r.rowIdx); });
  selectable.forEach(function(r) {
    if (allSelected) _duSelected.delete(r.rowIdx);
    else _duSelected.add(r.rowIdx);
  });
  _duRenderTable();
  _duRenderToolbar();
  _duRenderPipeline();
}

function _duToggleSwimlane(key) {
  if (_duSwimlaneOpen.hasOwnProperty(key)) _duSwimlaneOpen[key] = !_duSwimlaneOpen[key];
  _duRenderTable();
}

function _duSelectSwimlane(key) {
  var issues = [], ready = [];
  _duFiltered.forEach(function(row) {
    var s = row.uploadStatus;
    if (s !== 'Uploaded' && s !== 'Skipped') {
      var v = _duValidation[row.rowIdx] || { errors: [], warnings: [] };
      if (v.errors.length > 0 || v.warnings.length > 0) issues.push(row);
      else ready.push(row);
    }
  });
  var target = key === 'issues' ? issues : key === 'ready' ? ready : [];
  target.forEach(function(row) { if (_duIsSelectableRow(row)) _duSelected.add(row.rowIdx); });
  _duRenderTable();
  _duRenderToolbar();
  _duRenderPipeline();
}

function _duUpdateFinalizeActionLabels(selectedCount) {
  var btnUpload = document.getElementById('upload-btn-upload');
  if (btnUpload) {
    var uploadSvg = btnUpload.querySelector('svg');
    var uploadSvgHtml = uploadSvg ? uploadSvg.outerHTML : '';
    btnUpload.innerHTML = uploadSvgHtml + ' Upload ' + selectedCount + ' Selected';
  }
  var btnDry = document.getElementById('upload-btn-dryrun');
  if (btnDry) {
    var drySvg = btnDry.querySelector('svg');
    var drySvgHtml = drySvg ? drySvg.outerHTML : '';
    btnDry.innerHTML = drySvgHtml + ' Dry Run ' + selectedCount + ' Selected';
  }
}

// ── Triage: duplicate comparison modal ──────────────────────
function _duOpenDupCompareModal(rowIdx) {
  var row = _duGetRow(rowIdx);
  if (!row) return;
  var keyFields = [
    ['Date', row['Date']],
    ['FDH Engineering ID', row['FDH Engineering ID']],
    ['Contractor', row['Contractor']],
    ['UG Footage', row['Daily UG Footage']],
    ['Strand Footage', row['Daily Strand Footage']],
    ['Fiber Footage', row['Daily Fiber Footage']]
  ];
  var fieldRows = keyFields.map(function(f) {
    return '<div class="upload-dup-field-row">' +
      '<span class="upload-dup-field-label">' + _duEsc(f[0]) + '</span>' +
      '<span class="upload-dup-field-val">' + _duEsc(f[1] || '—') + '</span>' +
    '</div>';
  }).join('');

  var body =
    '<div class="upload-dup-warning">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;vertical-align:-3px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
      'A record with this FDH + Date already exists in QuickBase. Uploading will create a duplicate entry unless you skip or force override.' +
    '</div>' +
    '<div class="upload-dup-fields">' + fieldRows + '</div>';

  _duOpenModal('Duplicate Detected', body, [
    { label: 'Skip This Row', cls: 'upload-btn', onclick: '_duCloseModal();_duSkipDupeRow(' + rowIdx + ')' },
    { label: 'Force Override', cls: 'upload-btn btn-danger', onclick: '_duCloseModal();_duForceDupeRow(' + rowIdx + ')' },
    { label: 'Cancel', cls: 'upload-btn btn-ghost', onclick: '_duCloseModal()' }
  ]);
}

function _duSkipDupeRow(rowIdx) {
  _duSelected.delete(rowIdx);
  var row = _duGetRow(rowIdx);
  if (row) { row._duDupResolved = 'skip'; row.uploadStatus = 'Skipped'; }
  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
  showToast('Row will be skipped during upload.', 'info');
}

function _duForceDupeRow(rowIdx) {
  var row = _duGetRow(rowIdx);
  if (row) { row._duDupResolved = 'force'; row.uploadStatus = 'Pending'; }
  _duSelected.add(rowIdx);
  _duBuildValidation();
  _duRenderTable();
  _duRenderToolbar();
  showToast('Row will be force-uploaded — duplicate check bypassed.', 'warn');
}

// ── Triage: post-upload results card ────────────────────────
function _duRenderResultsCard(result) {
  var tableWrap = document.querySelector('#upload-workspace .upload-table-wrap');
  if (!tableWrap) { _duOpenUploadResultModal(result); return; }

  var failedRows = (result.results || []).filter(function(r) { return r.status === 'failed'; });
  var reconciledRows = (result.results || []).filter(function(r) { return r.reconciled; });
  var succCount  = result.success    || 0;
  var failCount  = result.failed     || 0;
  var dupeCount  = result.duplicates || 0;
  var skipCount  = result.skipped    || 0;
  var elapsedSec = result._elapsedMs ? (result._elapsedMs / 1000).toFixed(1) + 's' : '';

  // Icon and title reflect actual outcome
  var allFailed  = failCount > 0 && succCount === 0;
  var partFailed = failCount > 0 && succCount > 0;
  var iconCls    = allFailed ? 'upload-rc-icon icon-failed' : partFailed ? 'upload-rc-icon icon-partial' : 'upload-rc-icon';
  var iconSvg    = allFailed
    ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    : partFailed
      ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
      : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
  var rcTitle = allFailed ? 'Upload Failed' : partFailed ? 'Upload Partial' : 'Upload Complete';

  var failList = failedRows.length > 0
    ? '<div class="upload-rc-failures">' +
        '<div class="upload-rc-failures-title">Failed Records</div>' +
        failedRows.map(function(r) {
          return '<div class="upload-rc-failure-row">' +
            '<span class="upload-rc-failure-fdh">' + _duEsc(r.fdh || 'Row ' + r.rowIdx) + '</span>' +
            '<span class="upload-rc-failure-err">' + _duEsc(r.error || 'Unknown error') + '</span>' +
          '</div>';
        }).join('') +
      '</div>'
    : '';

  var retryBtn = failedRows.length > 0
    ? '<button type="button" class="upload-btn btn-danger" onclick="_duCloseResultsCard();_duRetryFailed(' + JSON.stringify(failedRows.map(function(r) { return r.rowIdx; })) + ')">Retry Failed</button>'
    : '';

  var reconciledNote = reconciledRows.length > 0
    ? '<div class="upload-rc-reconciled">' + reconciledRows.length + ' row' + (reconciledRows.length === 1 ? '' : 's') + ' reconciled from existing QB records</div>'
    : '';

  var snapshotChip = (result.snapshotFile && result.snapshotFile.fileUrl)
    ? '<div class="upload-rc-snapshot">Snapshot saved &rarr; <a href="' + _duEsc(result.snapshotFile.fileUrl) + '" target="_blank" rel="noopener">' + _duEsc(result.snapshotFile.fileName) + '</a></div>'
    : '';

  var elapsedChip = elapsedSec
    ? '<div class="upload-rc-timing">' + elapsedSec + ' elapsed</div>'
    : '';

  tableWrap.innerHTML =
    '<div class="upload-results-card">' +
      '<div class="upload-rc-header">' +
        '<div class="' + iconCls + '">' + iconSvg + '</div>' +
        '<div>' +
          '<div class="upload-rc-title">' + rcTitle + '</div>' +
          '<div class="upload-rc-batch">Batch · ' + _duEsc(result.batchId || '') + '</div>' +
        '</div>' +
        elapsedChip +
      '</div>' +
      '<div class="upload-rc-stats">' +
        '<div class="upload-rc-stat stat-success">' +
          '<div class="upload-rc-stat-value">' + succCount + '</div>' +
          '<div class="upload-rc-stat-label">Uploaded</div>' +
        '</div>' +
        (dupeCount > 0 ? '<div class="upload-rc-stat stat-skipped">' +
          '<div class="upload-rc-stat-value">' + dupeCount + '</div>' +
          '<div class="upload-rc-stat-label">Duplicates</div>' +
        '</div>' : '') +
        (skipCount > 0 ? '<div class="upload-rc-stat stat-skipped">' +
          '<div class="upload-rc-stat-value">' + skipCount + '</div>' +
          '<div class="upload-rc-stat-label">Skipped</div>' +
        '</div>' : '') +
        '<div class="upload-rc-stat stat-failed">' +
          '<div class="upload-rc-stat-value">' + failCount + '</div>' +
          '<div class="upload-rc-stat-label">Failed</div>' +
        '</div>' +
      '</div>' +
      reconciledNote +
      snapshotChip +
      failList +
      '<div class="upload-rc-footer">' +
        retryBtn +
        '<button type="button" class="upload-btn btn-primary" onclick="_duCloseResultsCard()">Back to Review</button>' +
      '</div>' +
    '</div>';
}

function _duCloseResultsCard() {
  _duRefreshAll({ force: true });
}

function _duRetryFailed(rowIndices) {
  if (!rowIndices || rowIndices.length === 0) return;
  _duDoUpload(rowIndices, true, []);
}

function _duEsc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function _duEscJs(str) {
  return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function _duTodayStr() {
  var d = new Date();
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return mm + '/' + dd + '/' + d.getFullYear();
}

function _duTodayIso(offsetDays) {
  var d = new Date();
  d.setDate(d.getDate() + (offsetDays || 0));
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function _duIsoDate(mmddyyyy) {
  if (!mmddyyyy) return '';
  var p = mmddyyyy.split('/');
  if (p.length === 3) return p[2] + '-' + p[0].padStart(2, '0') + '-' + p[1].padStart(2, '0');
  return '';
}

function _duBuildVendorOptions() {
  var vendors = Array.from(new Set(_duQueue.map(function(r) { return r['Contractor'] || ''; }).filter(Boolean))).sort();
  return ['<option value="all">All Vendors</option>'].concat(vendors.map(function(v) {
    return '<option value="' + _duEsc(v) + '"' + (_duFilterVendor === v ? ' selected' : '') + '>' + _duEsc(v) + '</option>';
  })).join('');
}
</script>
