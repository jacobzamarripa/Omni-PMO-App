<script>
// ============================================================
// FILE: _module_deck.html
// ROLE: Deck/slide workspace rendering, PM memory helpers,
//   staging/export flows, and presentation mode runtime
//   extracted from WebApp.html
// DEPENDS ON: _state_queue.html, _state_router.html,
//   _state_session.html, _utils_shared.html,
//   _utils_notifications.html, _module_queue_state.html,
//   _module_admin.html, _module_changelog.html
// DEPENDED ON BY: WebApp.html bootstrap anchors, detail/grid
//   navigation flows, admin review actions, and deck exports
// MOBILE NOTES: Desktop deck presentation and theater controls
//   stay here; mobile should adapt the data helpers without
//   reusing this layout/keyboard behavior directly
// AGENT NOTES: Keep function names and google.script.run
//   signatures stable. `moveItemToReviewed()` intentionally
//   still writes back into queue/admin state because the review
//   workflow is not isolated yet.
// ============================================================
// STATE: isDeckEditing
// READS: deck stage rendering
// WRITES: deck edit toggles, deck navigation
let isDeckEditing = false;
// STATE: deckIdleTimer
// READS: presentation mode toggle
// WRITES: deck idle reset
let deckIdleTimer = null;
// STATE: preferredPresentationCardTheme
// READS: deck theme sync
// WRITES: deck theme toggles, presentation mode
let preferredPresentationCardTheme = null;
// STATE: preTheaterThemeWasDark
// READS: presentation theme restore
// WRITES: presentation mode/theme sync
var preTheaterThemeWasDark = false;

function getActivePresentationCard() {
    return isDeckMode ? getEl('deck-stage-card') : document.querySelector('.qb-grid');
}

function applyPresentationCardTheme(card, theme) {
    if (!card) return;
    card.classList.remove('slide-light-mode', 'slide-dark-mode');
    if (theme === 'dark') card.classList.add('slide-dark-mode');
    if (theme === 'light') card.classList.add('slide-light-mode');
}

function syncSlideThemeButton() {
    const btn = getEl('dock-btn-slide-theme');
    if (!btn) return;
    const effectiveTheme = preferredPresentationCardTheme || (document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    btn.innerHTML = effectiveTheme === 'dark' ? _SUN_SVG : _MOON_SVG;
    btn.setAttribute('aria-label', effectiveTheme === 'dark' ? 'Switch slide lighting to light mode' : 'Switch slide lighting to dark mode');
    btn.title = effectiveTheme === 'dark' ? 'Lights Up' : 'Lights Down';
}

function clearPresentationCardThemes() {
    document.querySelectorAll('.qb-grid, #deck-stage-card').forEach(card => {
        card.classList.remove('slide-light-mode', 'slide-dark-mode');
    });
}

function syncActivePresentationCardTheme() {
    if (!isPresentationMode) {
        clearPresentationCardThemes();
        syncSlideThemeButton();
        return;
    }
    const theme = preferredPresentationCardTheme || (preTheaterThemeWasDark ? 'dark' : 'light');
    clearPresentationCardThemes();
    applyPresentationCardTheme(getActivePresentationCard(), theme);
    syncSlideThemeButton();
}

function syncSlideActionDeck() {
    const deck = getEl('slide-action-deck');
    if (!deck) return;
    const isFs = currentWorkspaceView === 'gantt';
    const showDeck = isSlideFaceActive() && !isFs;
    deck.classList.toggle('visible', showDeck);
    deck.classList.toggle('theater-active', showDeck && isPresentationMode);
    if (!showDeck) deck.classList.remove('dock-idle');
    syncSlideThemeButton();
    syncDockLayoutSpacing();
    updateFloatingPillsPosition();
}

function clearStagedDeckItems() {
    stagedDeckItems = [];
    persistStagedReviewSession();
    syncDockStagingButton();
    renderDeckStage();
    renderOutbox();
}

// TODO: HIGH RISK - mutates queue/detail/admin/reviewed tray state.
// Requires state layer isolation before extraction.
function moveItemToReviewed(item, meta) {
    if (!item || !item.fdh) return;
    clearDeckSessionForFdh(item.fdh);
    removeDeckItemFromSource(item.fdh);
    allActionItems = allActionItems.filter(i => String(i.fdh || '') !== String(item.fdh || ''));
    stagedDeckItems = (stagedDeckItems || []).filter(fdh => String(fdh || '') !== String(item.fdh || ''));
    persistStagedReviewSession();
    addToReviewedTray(item, meta || {});
    updateAdminBadge();
    renderAdminPane(getActiveQueueItems());
    renderOutbox();
}

function toggleStageCurrentDeckItem() {
    saveCurrentCardState();
    const item = ensureDeckIndex();
    if (!item) return;
    let idx = stagedDeckItems.indexOf(item.fdh);
    if (idx > -1) {
        stagedDeckItems.splice(idx, 1);
        persistStagedReviewSession();
        showDockSuccess('Removed from Batch');
        syncDockStagingButton();
        renderDeckStage();
        renderOutbox();
    } else {
        stagedDeckItems.push(item.fdh);
        persistStagedReviewSession();
        showDockSuccess('Staged for Batch');
        syncDockStagingButton();
        renderDeckStage();
        renderOutbox();

        setTimeout(() => {
            navDeck(1);
        }, 600);
    }
}

function syncDockStagingButton() {
    const item = ensureDeckIndex();
    const btn = getEl('dock-btn-stage');
    if (!btn || !item) return;
    if (stagedDeckItems.includes(item.fdh)) {
        btn.innerHTML = 'Unstage';
        btn.style.background = 'var(--card-bg)';
        btn.style.color = '#a855f7';
        btn.style.borderColor = '#d8b4fe';
    } else {
        btn.innerHTML = 'Stage Project';
        btn.style.background = '#a855f7';
        btn.style.color = '#fff';
        btn.style.borderColor = '#9333ea';
    }
}

function promptBatchDeckExport() {
    if (stagedDeckItems.length === 0) return alert('No items staged.');
    const email = prompt(`📧 Email Batch Report (${stagedDeckItems.length} project${stagedDeckItems.length !== 1 ? 's' : ''})\n\nThis will also permanently SAVE these items to the 8-Deck_Answers sheet.\n\nEnter destination email:`, '');
    if (!email || !email.trim()) return;

    showDockLoading(`Exporting ${stagedDeckItems.length} projects...`);

    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    const boolLabel = (val, fallback='—') => (val === true || val === 'true') ? 'YES' : (val === false || val === 'false') ? 'NO' : fallback;
    let payloads = [];
    let combinedText = `DAILY PM BATCH REPORT\nGenerated: ${dateStr}\n\n`;

    stagedDeckItems.forEach(fdh => {
        const item = (allActionItems || []).find(i => i.fdh === fdh);
        if (!item) return;
        const mem = pmSessionMemory[fdh] || {};
        const isXingSelected = mem['q_is_xing'] !== undefined ? (mem['q_is_xing'] === true || mem['q_is_xing'] === 'true') : item.isXing;
        payloads.push({ fdh: item.fdh, vendor: item.vendor, targetDate: item.targetDate || item.cxEnd || 'TBD', note: item.comment || '', answers: mem });

        const ofsStr = item.ofsDate && item.ofsDate !== '-' ? item.ofsDate : 'TBD';
        combinedText += `==================================================\n`;
        combinedText += `PROJECT: ${item.fdh} (${item.vendor || 'Unknown'} - ${item.city || 'Unknown'})\n`;
        combinedText += `Target OFS: ${ofsStr} | Stage: ${item.stage} | Status: ${item.status}\n\n`;
        combinedText += `[DELIVERABLES]\n`;
        combinedText += `- CD Distributed: ${item.hasCDDist ? 'YES' : 'NO'}\n`;
        combinedText += `- Splice Docs Dist: ${item.hasSpliceDist ? 'YES' : 'NO'}\n`;
        combinedText += `- Strand Maps Dist: ${item.hasStrandDist ? 'YES' : 'NO'}\n`;
        combinedText += `- BOM Sent: ${boolLabel(mem['q_bom_sent'])}\n`;
        combinedText += `- PO Number Sent: ${boolLabel(mem['q_po_sent'])}\n`;
        combinedText += `- SOW Signed: ${boolLabel(mem['q_sow_sign'])}\n\n`;
        combinedText += `[FIELD / PERMITTING QA]\n`;
        combinedText += `- Sent for permitting: ${mem['q_permit_sent'] || '\u2014'}\n`;
        combinedText += `- Permit approved: ${mem['q_permit_appr'] || '\u2014'}\n`;
        combinedText += `- Special Crossings: ${isXingSelected ? 'YES' : 'NONE'}\n`;
        if (isXingSelected) {
            combinedText += `  * DOT paperwork submitted: ${mem['q_cross_sub'] || '\u2014'}\n`;
            combinedText += `  * Crossing approved: ${mem['q_cross_appr'] || '\u2014'}\n`;
            combinedText += `  * Approval distributed: ${mem['q_cross_dist'] || '\u2014'}\n`;
        }
        combinedText += `- Active set: ${boolLabel(mem['q_active_set'])}\n`;
        combinedText += `- Active has power: ${boolLabel(mem['q_active_pwr'])}\n`;
        combinedText += `- Transport available: ${boolLabel(mem['q_transport'])}\n`;
        combinedText += `- OFS date changed: ${boolLabel(mem['q_ofs_change'])}\n`;
        combinedText += `- OFS change reason: ${mem['q_ofs_reason'] || '\u2014'}\n\n`;
        combinedText += `[MANAGER NOTE]\n${item.comment || item.draft || 'No note provided.'}\n\n`;
    });

    // DATA CALL: promptBatchDeckExport
    // COUPLED TO: stagedDeckItems, pmSessionMemory, dock system UI, renderDeckStage, renderOutbox
    // EXTRACT BLOCKER: staged export flow still depends on deck state ownership plus reviewed/outbox side effects
    google.script.run
        .withSuccessHandler(count => {
            showDockSuccess(`Emailed & Saved ${count} projects!`);
            stagedDeckItems = [];
            persistStagedReviewSession();
            syncDockStagingButton();
            renderDeckStage();
            renderOutbox();
        })
        .withFailureHandler(err => {
            showDockError('Export Failed');
            alert('Export Error: ' + (err.message || err));
        })
        .processBatchDeckExport(payloads, email.trim(), combinedText);
}

function getDeckItems() {
    return filteredItems || [];
}

function centerQueueCardByFdh(fdh, behavior) {
    const container = getEl('inbox-list');
    if (!container || !fdh) return;
    const target = container.querySelector(`[data-fdh="${CSS.escape(String(fdh || ''))}"]`) || getEl(`card-${fdh}`) || getEl(`queue-grid-card-${fdh}`);
    if (!target) return;
    const top = target.offsetTop - (container.clientHeight / 2) + (target.offsetHeight / 2);
    container.scrollTo({ top: Math.max(0, top), behavior: behavior || 'smooth' });
}

function ensureDeckIndex() {
    const items = getDeckItems();
    if (items.length === 0) {
        deckIndex = 0;
        return null;
    }
    if (deckIndex < 0) deckIndex = 0;
    if (deckIndex >= items.length) deckIndex = items.length - 1;
    return items[deckIndex];
}

function updateDeckStageSelection() {
    const items = getDeckItems();
    const active = items[deckIndex];
    document.querySelectorAll('.inbox-list .grid-card').forEach(card => card.classList.remove('is-selected'));
    if (!active) return;
    document.querySelectorAll(`.inbox-list [data-fdh="${CSS.escape(String(active.fdh || ''))}"]`).forEach(card => card.classList.add('is-selected'));
    centerQueueCardByFdh(active.fdh, 'smooth');
}

function navDeck(dir) {
    const items = getDeckItems();
    if (items.length === 0) return;
    const currentItem = items[deckIndex];
    if (isDeckEditing && pmSessionMemory[currentItem.fdh]) {
        if (confirm("⚠️ UNCOMMITTED CHANGES\n\nCommit changes to the local sheet before moving?\n\n'OK' to Commit\n'Cancel' to Erase local edits.")) {
            toggleStageCurrentDeckItem();
        } else {
            delete pmSessionMemory[currentItem.fdh];
        }
    }
    isDeckEditing = false;
    document.body.classList.remove('deck-is-editing');
    deckIndex = (deckIndex + dir + items.length) % items.length;
    const nextItem = items[deckIndex];
    openPane(nextItem, getEl(`card-${nextItem.fdh}`));
    renderDeckStage();
}

function toggleSlideSpecificTheme() {
    const card = getActivePresentationCard();
    if (!card) return;
    const isDark = (preferredPresentationCardTheme || (card.classList.contains('slide-dark-mode') ? 'dark' : 'light')) === 'dark';
    preferredPresentationCardTheme = isDark ? 'light' : 'dark';
    if (isPresentationMode) {
        syncActivePresentationCardTheme();
    } else {
        applyPresentationCardTheme(card, preferredPresentationCardTheme);
        syncSlideThemeButton();
    }
}

// Stealth Dock idle timer
function resetDeckIdleTimer() {
    if (!isPresentationMode) return;
    const dock = (isSlideFaceActive() ? document.getElementById('slide-action-deck') : document.getElementById('filter-strip'));
    if (dock) dock.classList.remove('dock-idle');
    clearTimeout(deckIdleTimer);
    deckIdleTimer = setTimeout(() => {
        if (isPresentationMode) {
            const d = (isSlideFaceActive() ? document.getElementById('slide-action-deck') : document.getElementById('filter-strip'));
            if (d) d.classList.add('dock-idle');
        }
    }, 3000);
}

function navGlobal(dir, isVertical) {
    if (isDeckMode) {
        const len = filteredItems?.length || 1;
        deckIndex = (deckIndex + dir + len) % len;
        renderDeckStage();
        return;
    }
    const items = filteredItems || [];
    if (items.length === 0) return;
    let idx = items.findIndex(i => i.fdh === currentActiveItem?.fdh);
    if (idx === -1) idx = 0;

    let nextIdx;
    if (currentWorkspaceView === 'grid' && isVertical) {
        const container = document.getElementById('grid-content');
        const cards = Array.from(container?.querySelectorAll('.grid-card') || []);
        if (cards.length > 1) {
            // Visual detection: count cards sharing the first card's offsetTop
            const firstTop = cards[0].offsetTop;
            let cols = 0;
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].offsetTop === firstTop) cols++;
                else break;
            }
            cols = cols || 1;
            const rows = Math.ceil(items.length / cols);
            const curRow = Math.floor(idx / cols);
            const curCol = idx % cols;
            let nextRow = (curRow + dir + rows) % rows;
            nextIdx = nextRow * cols + curCol;
            if (nextIdx >= items.length) nextIdx = items.length - 1;
        } else {
            nextIdx = (idx + dir + items.length) % items.length;
        }
    } else {
        nextIdx = (idx + dir + items.length) % items.length;
    }

    if (currentWorkspaceView === 'grid') openPaneFromGrid(items[nextIdx].fdh);
    else openPane(items[nextIdx], document.getElementById(`card-${items[nextIdx].fdh}`));
}

function showCinemaTooltip() {
    showToast('⌨️ SPACE / ARROWS to navigate · ESC to exit', 'info');
}

function togglePresentationMode() {
    isPresentationMode = !isPresentationMode;
    const body = document.body;
    const btn = document.getElementById('dock-btn-presentation');
    const activeContainer = isDeckMode ? document.getElementById('deck-stage') : document.getElementById('pane-content');
    if (isPresentationMode) {
        preTheaterThemeWasDark = body.classList.contains('dark-mode');
        if (!preferredPresentationCardTheme) preferredPresentationCardTheme = preTheaterThemeWasDark ? 'dark' : 'light';
        body.classList.add('presentation-active');
        applyTheme(true);
        syncActivePresentationCardTheme();
        if (btn) btn.innerHTML = 'Exit Cinema';
        showCinemaTooltip();
        resetDeckIdleTimer();
        if (activeContainer) activeContainer.onclick = (e) => { if (e.target === activeContainer) togglePresentationMode(); };
    } else {
        body.classList.remove('presentation-active');
        if (btn) btn.innerHTML = 'Theater Mode';
        applyTheme(preTheaterThemeWasDark);
        clearPresentationCardThemes();
        syncSlideThemeButton();
        clearTimeout(deckIdleTimer);
        document.getElementById('filter-strip')?.classList.remove('dock-idle');
        if (activeContainer) activeContainer.onclick = null;
    }
    syncGanttIslandState();
    syncDockLayoutSpacing();
    updateFloatingPillsPosition();
}

function toggleDeckEditMode() {
    isDeckEditing = !isDeckEditing;
    document.body.classList.toggle('deck-is-editing', isDeckEditing);
    renderDeckStage();
}

function buildSmartFdhDatalist(currentFdh) {
    if (!globalAllFdhIds || globalAllFdhIds.length === 0) return '';
    let match = String(currentFdh).match(/^(.*?)-F(\d+)$/i);
    let options = [];
    if (match) {
        let prefix = match[1].toUpperCase();
        let currentNum = parseInt(match[2], 10);
        let sameMarket = globalAllFdhIds.filter(id => id.toUpperCase().startsWith(prefix + '-F'));
        sameMarket.sort((a, b) => {
            let numA = parseInt((a.match(/-F(\d+)$/i) || [0, 0])[1], 10);
            let numB = parseInt((b.match(/-F(\d+)$/i) || [0, 0])[1], 10);
            return Math.abs(numA - currentNum) - Math.abs(numB - currentNum);
        });
        let others = globalAllFdhIds.filter(id => !id.toUpperCase().startsWith(prefix + '-F')).sort();
        options = [...sameMarket, ...others];
    } else {
        options = globalAllFdhIds.slice().sort();
    }
    return options.map(id => `<option value="${id}">`).join('');
}

function toggleXingRows(show) {
    document.querySelectorAll('.xing-nested-row').forEach(el => el.classList.toggle('muted-row', !show));
    document.querySelectorAll('.xing-nested-edit').forEach(el => el.style.display = show ? 'flex' : 'none');
}

function toggleOfsRows(show) {
    document.querySelectorAll('.ofs-reason-row').forEach(el => el.classList.toggle('muted-row', !show));
    document.querySelectorAll('.ofs-reason-edit').forEach(el => el.style.display = show ? 'flex' : 'none');
}

// TODO: HIGH RISK - mutates queue/detail/admin/reviewed tray state.
// Requires state layer isolation before extraction.
// TODO: MODULE CANDIDATE - Gemini draft flows mutate currentActiveItem/filteredItems and view-specific DOM; isolate state adapters first
function renderDeckStage() {
        const stageCard = getEl('deck-stage-card');
        if (!stageCard) return;

    const stageHost = getEl('deck-stage');
    const isPhone = window.innerWidth <= 480;

    if (isPhone) {
        if (stageHost) { stageHost.style.padding = '0'; stageHost.style.alignItems = 'stretch'; }
        stageCard.style.cssText = 'width:100%; height:100%; flex:1 1 auto; aspect-ratio:unset; max-height:unset; max-width:unset; border-radius:0; border:none; box-shadow:none; background:var(--card-bg); display:flex; flex-direction:column; overflow:hidden;';
    } else {
    const hostRect = stageHost ? stageHost.getBoundingClientRect() : { width: window.innerWidth - 48 };
    const deckMaxHeightRaw = getComputedStyle(document.documentElement).getPropertyValue('--deck-card-max-height').trim();
    const deckMaxHeight = parseFloat(deckMaxHeightRaw) || Math.max(340, Math.floor(window.innerHeight * 0.75));
    const usableWidth = Math.max(320, Math.floor((hostRect.width || (window.innerWidth - 48)) - 24));
    const cardWidth = Math.min(1100, usableWidth, Math.floor(deckMaxHeight * (16 / 9)));

    stageCard.style.cssText = `width:${cardWidth}px; max-width:100%; height:auto; aspect-ratio:16/9; max-height:${deckMaxHeight}px; flex-shrink:0; background:var(--card-bg); border-radius:20px; border:1px solid var(--border); box-shadow:0 30px 60px rgba(15,23,42,0.15); display:flex; flex-direction:column; overflow:hidden; margin:0 auto;`;
    }

        const item = ensureDeckIndex();
        if (!item) {
          stageCard.innerHTML = '<div style="margin:auto; font-size:24px;">No projects match current filters.</div>';
          const ap = getEl('deck-action-panel');
          if (ap) ap.innerHTML = '';
          document.body.classList.remove('deck-is-editing');
          return;
        }
        currentActiveItem = item;

        // Sync theme icon immediately (prevents flicker)
        const tBtn = getEl('dock-btn-slide-theme');
        if (tBtn) {
          syncSlideThemeButton();
        }

        let pEnd = safeDate(item.cxEnd);
        let today = new Date(); today.setHours(0,0,0,0);
        let daysLeft = pEnd ? Math.ceil((pEnd - today) / 86400000) : 0;
        let isComplete = (item.stage||'').toLowerCase().includes('ofs') || (item.status||'').toLowerCase().includes('complete');
        let isPermit = (item.stage||'').toLowerCase().includes('permit');
        let isOnHold = (item.status||'').toLowerCase().includes('hold');
        let isOverdue = pEnd && today > pEnd && !isComplete && !isOnHold && !isPermit;

        let sColor = isComplete ? '#22c55e' : isPermit ? '#a855f7' : isOnHold ? '#94a3b8' : isOverdue ? '#ef4444' : '#facc15';
        let ofsMonthStr = 'TBD', isOFSMonth = false;
        if (item.ofsDate && item.ofsDate !== '-' && item.ofsDate !== 'Unknown') {
          let d = safeDate(item.ofsDate);
          if (d) {
            ofsMonthStr = d.toLocaleDateString('en-US', {month:'short', timeZone:'UTC'}).toUpperCase();
            if (d.getUTCMonth() === today.getMonth() && d.getUTCFullYear() === today.getFullYear()) isOFSMonth = true;
          }
        }
        let ofsPillStyle = isOFSMonth ? 'color:#2563eb; background:rgba(239,246,255,0.7); border-color:#2563eb;' : 'color:var(--text-main); background:var(--card-bg); border-color:var(--border);';
        let daysLeftTxt = daysLeft < 0 ? `OVERDUE BY: ${Math.abs(daysLeft)} DAYS` : `DAYS LEFT: ${daysLeft}`;

        let deckReportDate = formatDate(item.reportDate || item.date);
        let deckLastCheck = formatDate(item.lastChecked);
        let rawRef = (typeof globalRefDataDate !== 'undefined' && globalRefDataDate) ? globalRefDataDate : '';
        let deckRefData = rawRef ? formatDate(rawRef.split(' ')[0]) : '—';

        const mem = pmSessionMemory[item.fdh] || {};
        const isXingActive = mem['q_is_xing'] !== undefined ? (mem['q_is_xing'] === 'true' || mem['q_is_xing'] === true) : item.isXing;
        const memOfsChange = mem['q_ofs_change'];
        const refOfsChange = item.qbRef?.ofsChange === true || String(item.qbRef?.ofsChange).toLowerCase() === 'true';
        const isOfsChangeActive = memOfsChange !== undefined ? (memOfsChange === true || memOfsChange === 'true') : refOfsChange;

        const isMismatch = (memVal, refVal, type) => {
          if (memVal === undefined || memVal === null || memVal === '') return false;
          if (type === 'bool') {
            const mBool = (memVal === true || String(memVal).toLowerCase() === 'true');
            const rBool = (refVal === true || String(refVal).toLowerCase() === 'true');
            return mBool !== rBool;
          }
          if (type === 'date') return String(memVal).trim() !== String(refVal).trim();
          return String(memVal).trim() !== String(refVal || '').trim();
        };

        const getVal = (id, refVal, type) => {
          let mVal = mem[id];
          let mismatch = isMismatch(mVal, refVal, type);
          let v = mismatch ? mVal : refVal;
          let stagedBadge = mismatch ? `<span class="badge-staged" title="Staged locally.">STAGED 🔄</span>` : '';
          if (v === undefined || v === '' || v === null || v === '-') return `<span class="slide-ppt-ans gap">Pending</span>`;
          if (type === 'bool') return `<span class="slide-ppt-ans">${(v === true || String(v).toLowerCase() === 'true') ? 'YES' : 'NO'}</span>${stagedBadge}`;
          return `<span class="slide-ppt-ans">${type === 'date' ? formatDate(v) : esc(v)}</span>${stagedBadge}`;
        };

        const pptRow = (q, ans, isMuted=false, isSub=false, extraClass='') => `<div class="slide-ppt-row ${isMuted ? 'muted-row' : ''} ${extraClass}"><div class="slide-ppt-q ${isSub ? 'sub-q' : ''}">${q}</div><div style="display:flex; align-items:center; justify-content:flex-end; gap:6px;">${isMuted ? '<span class="slide-ppt-ans" style="color:var(--text-muted);">—</span>' : ans}</div></div>`;

        const actionWrap = (content, extraClass='') => `<span class="slide-input-wrap ${extraClass}">${content}</span>`;
        const gapDot = (show, color='#ef4444') => show ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:5px;flex-shrink:0;vertical-align:middle;"></span>` : '';
        const stagedIcon = (show) => show ? `<span class="indicator-staged" title="Staged locally.">🔄</span>` : '';
        const row = (label, control, isFull=false) => `<div class="slide-q-row ${isFull ? 'full-width-row' : ''}"><span class="slide-q-label">${label}</span>${control}</div>`;

function saveCurrentCardState() {
    const item = ensureDeckIndex();
    if (!item) return;
    if (!pmSessionMemory[item.fdh]) pmSessionMemory[item.fdh] = {};
    document.querySelectorAll('.slide-input').forEach(inp => {
        pmSessionMemory[item.fdh][inp.id] = inp.type === 'checkbox' ? inp.checked : inp.value;
    });
    syncDeckNote();
}

function persistDeckInput(inputEl) {
    const item = ensureDeckIndex();
    if (!item || !inputEl) return;
    if (!pmSessionMemory[item.fdh]) pmSessionMemory[item.fdh] = {};
    pmSessionMemory[item.fdh][inputEl.id] = inputEl.type === 'checkbox' ? inputEl.checked : inputEl.value;
    const saveBtn = getEl('dock-btn-save');
    if (saveBtn) saveBtn.classList.remove('collapsed');
}

function syncDeckNote() {
    const item = ensureDeckIndex();
    const noteEl = getEl('deck-note');
    if (!item || !noteEl) return;
    item.comment = noteEl.value;
    let mainNote = getEl('p-comment');
    if (mainNote && typeof currentActiveItem !== 'undefined' && currentActiveItem && currentActiveItem.fdh === item.fdh) {
        mainNote.value = item.comment;
        mainNote.dataset.generated = 'false';
    }
    const saveBtn = getEl('dock-btn-save');
    if (saveBtn) saveBtn.classList.remove('collapsed');
}

function askGeminiForDraftDeck(btn) {
    const item = ensureDeckIndex();
    if (!item) return;
    let origText = btn.innerHTML;
    btn.innerHTML = 'DRAFTING...';
    btn.style.opacity = '0.7';
    btn.disabled = true;
    let payload = {
        fdh: item.fdh, vendor: item.vendor, status: `${item.stage} | ${item.status}`,
        targetDate: item.targetDate, flags: item.flags, vendorComment: item.vendorComment,
        history: item.bench, productionToday: item.summary
    };
    // DATA CALL: askGeminiForDraftDeck
    // COUPLED TO: ensureDeckIndex/current deck item, deck-note textarea, syncDeckNote, deck button state
    // EXTRACT BLOCKER: deck runtime owns note state and current card context, so the AI bridge cannot move cleanly yet
    google.script.run
        .withSuccessHandler(response => {
            let textArea = getEl('deck-note');
            if (textArea) textArea.value = response.text;
            item.comment = response.text;
            item.geminiInsight = response.text;
            item.geminiDate = response.date;
            syncDeckNote();
            btn.innerHTML = 'DRAFTED ✓';
            btn.style.opacity = '1';
            btn.disabled = false;
        })
        .withFailureHandler(err => {
            alert('AI Error: ' + err.message);
            btn.innerHTML = origText; btn.style.opacity = '1'; btn.disabled = false;
        })
        .generateAndSaveFDHNarrative(payload);
}

function exportDeckReport() {
    saveCurrentCardState();
    const item = ensureDeckIndex();
    if (!item) return;
    const mem = pmSessionMemory[item.fdh] || {};

    const isXingSelected = mem['q_is_xing'] !== undefined ? (mem['q_is_xing'] === true || mem['q_is_xing'] === 'true') : item.isXing;
    const text = `
# PROJECT PM REPORT: ${item.fdh}

General Info:
* Vendor: ${item.vendor || ''}
* City: ${item.city || ''}
* Target OFS: ${item.ofsDate || 'TBD'}

3. Network & Actives:

4. Architecture:

* OFS Change Reason: ${mem['q_ofs_reason'] || 'N/A'}

Manager Note / Decision:
${item.comment || 'No notes provided.'}
    `.trim();

    navigator.clipboard.writeText(text).then(() => {
        const btn = getEl('btn-export-deck');

    const item = ensureDeckIndex();
    if (!item) return;

    showDockLoading(`Saving ${item.fdh}...`);

    const mem = pmSessionMemory[item.fdh] || {};
    const payload = {
        fdh: item.fdh,
        vendor: item.vendor,
        targetDate: item.targetDate || item.cxEnd || 'TBD',
        note: item.comment || "",
        answers: mem
    };

    // DATA CALL: saveDeckToSheet
    // COUPLED TO: ensureDeckIndex/current deck item, pmSessionMemory, dock system UI, deck save flow
    // EXTRACT BLOCKER: save path still depends on central deck/session state and shared dock feedback helpers
    google.script.run
        .withSuccessHandler(timestamp => {
            showDockSuccess('Saved to Sheet');
        })
        .withFailureHandler(err => {
            showDockError('Save Failed');
        })
        .saveDeckAnswers(payload);
}

function getRecentChangesForItem(fdh) {
    var now = new Date();
    var lookbackHours = (now.getDay() === 1 && now.getHours() < 11) ? 80 : 48;
    var cutoff = now.getTime() - (lookbackHours * 60 * 60 * 1000);
    return allGlobalLogs.filter(function(log) {
        return log.fdh === fdh && Number(log.timestampObj || 0) >= cutoff;
    });
}

function toggleCinemaHistory() {
    var overlay = getEl('cinema-history-overlay');
    if (!overlay) return;
    if (overlay.classList.contains('active')) {
        overlay.classList.remove('active');
        return;
    }
    var item = currentActiveItem;
    if (!item) return;
    var changes = getRecentChangesForItem(item.fdh);
    var content = getEl('cinema-history-content');
    if (content) {
        if (changes.length === 0) {
            content.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:40px; font-size:13px;">No recent activity in the lookback window.</div>';
        } else {
            content.innerHTML = '<div style="font-size:11px; font-weight:900; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">Recent Activity &mdash; ' + esc(item.fdh) + '</div>' +
            changes.slice(0, 5).map(function(log) {
                var dateStr = formatDate(log.timestampObj ? new Date(Number(log.timestampObj)) : log.time, true);
                var cleanVal = String(log.val ?? '').replace(/(?: \d{2}:\d{2}:\d{2} GMT.*)/, '');
                return '<div style="border-bottom:1px solid rgba(255,255,255,0.08); padding:14px 0;">' +
                    '<div style="display:flex; justify-content:space-between; margin-bottom:6px;">' +
                    '<span style="font-size:10px; font-weight:900; color:#a855f7; text-transform:uppercase;">' + esc(log.type) + '</span>' +
                    '<span style="font-size:9px; color:rgba(255,255,255,0.4);">' + esc(dateStr) + '</span>' +
                    '</div>' +
                    '<div style="font-size:14px; font-weight:600; color:#f4f4f5; margin-bottom:4px;">&#8594; ' + esc(cleanVal) + '</div>' +
                    '<div style="font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase;">By: ' + esc(log.user) + '</div>' +
                    '</div>';
            }).join('');
        }
    }
    overlay.classList.add('active');
}

document.addEventListener('mousemove', resetDeckIdleTimer);

// Global keyboard navigation
document.addEventListener('keydown', function(e) {
    resetDeckIdleTimer();
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;

    if (e.key === 'ArrowRight' || e.code === 'Space') { e.preventDefault(); navGlobal(1, false); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); navGlobal(-1, false); }
    if (e.key === 'ArrowDown') { e.preventDefault(); navGlobal(1, true); }
    if (e.key === 'ArrowUp') { e.preventDefault(); navGlobal(-1, true); }

    if (e.key === 'Escape') {
        if (isPresentationMode) togglePresentationMode();
        else if (document.getElementById('gantt-area-main')?.classList.contains('has-focus')) exitTheaterMode();
    }
});

// Phone-only swipe left/right on deck stage to navigate slides
function initDeckSwipe() {
    const stage = document.getElementById('deck-stage');
    if (!stage) return;
    let _swipeX = 0;
    stage.addEventListener('touchstart', function(e) {
        _swipeX = e.touches[0].clientX;
    }, { passive: true });
    stage.addEventListener('touchend', function(e) {
        if (window.innerWidth > 480) return;
        const dx = e.changedTouches[0].clientX - _swipeX;
        if (Math.abs(dx) < 50) return;
        navDeck(dx < 0 ? 1 : -1);
    }, { passive: true });
}
