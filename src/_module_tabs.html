<script>
// ============================================================
// FILE: _module_tabs.html
// ROLE: Tab UI, notification badges, and workspace
//   transition visual handlers
// DEPENDS ON: _state_router.html, _state_queue.html,
//   _module_router.html
// DEPENDED ON BY: WebApp.html main runtime
// MOBILE NOTES: Tab UX needs full rethink for mobile —
//   do not reuse desktop tab markup or event handlers
//   directly in MobileApp.html
// AGENT NOTES: Read _module_router.html before editing.
//   Fullscreen bleed-through root cause documented inline.
//   Badge updates touch admin and changelog state.
// ============================================================
// Fullscreen bleed-through root cause:
// Presentation mode is owned outside the tab system, but its
// body-scoped CSS hides shared chrome (`.top-nav`,
// `.inbox-sidebar`, `.outbox-pane`) across module boundaries.
// Router isolation clarifies that tab switching is not the
// primary owner of the bleed-through; the shared
// `body.presentation-active` rules and deck/presentation state
// are still the dominant source.

function updateAdminBadge() {
    if (!allActionItems) return;
    let count = getActiveQueueItems().filter(i => {
        if (isCompleteOrOfs(i)) return false;
        const f = i.flags || "";
        return f.includes('🚩 ADMIN: CHECK CROSSINGS') ||
               f.includes('⚠️ PLEASE INPUT BOM') || f.includes('MISSING UG BOM') || f.includes('MISSING STRAND BOM') ||
               f.includes('⚠️ CHECK BOM (UG/AE)') || f.includes('HIGH UG VARIANCE') || f.includes('HIGH STRAND VARIANCE') ||
               f.includes('🚩 STATUS MISMATCH') ||
               f.includes('🚩 MISSING QB STATUS');
    }).length;
    let displayCount = String(count);
    let badge = getEl('admin-badge');
    if (badge) { 
        badge.textContent = String(displayCount); 
        badge.style.display = count > 0 ? 'inline-flex' : 'none'; 
    }
    
    // Desktop nav header badge
    let navBadge = getEl('nav-hub-badge');
    if (navBadge) {
        navBadge.textContent = String(displayCount);
        navBadge.style.display = count > 0 ? 'inline-flex' : 'none';
    }
    if (typeof syncReviewHubHeaderCount === 'function') syncReviewHubHeaderCount();
}

function updateChangelogBadge() {
    if (typeof getChangelogBadgeCount === 'function' && typeof syncChangelogBadgeCount === 'function') {
        syncChangelogBadgeCount(getChangelogBadgeCount());
    }
}
</script>
