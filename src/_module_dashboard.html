<script>
// ============================================================
// FILE: _module_dashboard.html | ROLE: Dashboard landing page — render and open/close
// DEPENDS ON: _state_analytics.html (currentFilterStats, currentCriticalHubItems),
//   _state_queue.html (allActionItems), _utils_shared.html (esc, getSeverity, getEl),
//   _module_critical_hub.html (getCriticalType, openCriticalHub),
//   _module_startup_refdata.html (completeStartup)
// DEPENDED ON BY: _module_signal.html (_showStartupAfterSignal),
//   _module_router.html (switchWorkspaceView 'dashboard'),
//   WebApp.html (nav-brand onclick)
// ============================================================

function openDashboard() {
    if (window.innerWidth <= 480) {
        completeStartup('detail');
        return;
    }
    var overlay = getEl('startup-overlay');
    if (!overlay) { completeStartup('detail'); return; }

    renderDashboard();
    overlay.classList.add('visible');
    currentWorkspaceView = 'dashboard';
    document.body.classList.add('dashboard-active');
}

function closeDashboard() {
    var overlay = getEl('startup-overlay');
    if (overlay) overlay.classList.remove('visible');
    document.body.classList.remove('dashboard-active');
}

function renderDashboard() {
    var hasData = Array.isArray(allActionItems) && allActionItems.length > 0;

    var tsEl = getEl('dash-timestamp');
    var nameEl = getEl('dash-program-name');
    
    // Updated freshness pill logic
    if (tsEl) {
        var freshTime = (typeof globalRefDataDate === 'string' && globalRefDataDate) ? globalRefDataDate : new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        tsEl.textContent = 'FRESHNESS: ' + freshTime;
    }
    
    if (nameEl) nameEl.textContent = hasData ? allActionItems.length + ' Projects Loaded' : 'Loading...';

    if (!hasData) {
        _renderDashSkeletons();
        return;
    }

    renderDashKpiStrip();
    renderDashHealthDonut();
    renderDashStatusBar();
    renderDashVendorBsl();
    renderDashFlagsFeed();
}

function renderDashKpiStrip() {
    var container = getEl('dash-kpi-strip');
    if (!container) return;

    var stageCounts = (currentFilterStats && currentFilterStats.stageCounts) || {};

    var ofsCount = 0, permitCount = 0, completeCount = 0, progressCount = 0;
    Object.keys(stageCounts).forEach(function(stage) {
        var s = stage.toLowerCase();
        var cnt = stageCounts[stage] || 0;
        if (s.indexOf('ofs') !== -1) ofsCount += cnt;
        else if (s.indexOf('permit') !== -1) permitCount += cnt;
        else if (s.indexOf('complete') !== -1) completeCount += cnt;
        else progressCount += cnt; // Group everything else as In Progress
    });

    var critCount = (allActionItems || []).filter(function(i) {
        return getSeverity(i.flags) === 'crit';
    }).length;

    var cards = [
        { label: 'OFS',        val: ofsCount,     cls: 'is-ofs' },
        { label: 'Permitting', val: permitCount,   cls: 'is-permit' },
        { label: 'Complete',   val: completeCount, cls: 'is-complete' },
        { label: 'In Progress', val: progressCount, cls: 'is-progress' },
        { label: 'Critical',   val: critCount,     cls: 'is-critical' }
    ];

    container.innerHTML = cards.map(function(c, idx) {
        var sep = (idx === 4) ? '<div class="dash-kpi-sep"></div>' : '';
        return sep + '<div class="dash-kpi-card ' + c.cls + '">' +
            '<div class="dash-kpi-val">' + c.val + '</div>' +
            '<div class="dash-kpi-label">' + esc(c.label) + '</div>' +
        '</div>';
    }).join('');
}

function renderDashHealthDonut() {
    var wrap = getEl('dash-donut-wrap');
    if (!wrap) return;

    var items = Array.isArray(allActionItems) ? allActionItems : [];
    var total = items.length;
    if (total === 0) { wrap.innerHTML = '<div class="dash-card-label" style="color:var(--text-muted)">No data</div>'; return; }

    var critCnt = 0, warnCnt = 0, cleanCnt = 0;
    items.forEach(function(item) {
        var sev = getSeverity(item.flags);
        if (sev === 'crit') critCnt++;
        else if (sev === 'warn') warnCnt++;
        else cleanCnt++;
    });

    wrap.innerHTML = _buildDonutSVG(total, critCnt, warnCnt, cleanCnt) +
        '<div class="dash-donut-legend">' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--pill-complete-bdr)"></div>' +
                    '<span>Clean</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + cleanCnt + '</span>' +
            '</div>' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--color-review)"></div>' +
                    '<span>Warning</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + warnCnt + '</span>' +
            '</div>' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--color-critical)"></div>' +
                    '<span>Critical</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + critCnt + '</span>' +
            '</div>' +
        '</div>';
}

function _buildDonutSVG(total, crit, warn, clean) {
    var r = 38;
    var circ = 2 * Math.PI * r; // ~238.76
    var safe = total || 1;

    var cleanLen = (clean / safe) * circ;
    var warnLen  = (warn  / safe) * circ;
    var critLen  = (crit  / safe) * circ;

    // Arcs stack clockwise: clean → warn → crit
    var warnOffset = -(cleanLen);
    var critOffset = -(cleanLen + warnLen);

    return '<svg class="dash-donut-svg" viewBox="0 0 100 100">' +
        '<circle class="donut-track" cx="50" cy="50" r="' + r + '" />' +
        '<circle class="donut-arc donut-arc-clean" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + cleanLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="0" />' +
        '<circle class="donut-arc donut-arc-warn" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + warnLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="' + warnOffset.toFixed(2) + '" />' +
        '<circle class="donut-arc donut-arc-crit" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + critLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="' + critOffset.toFixed(2) + '" />' +
        '<text class="donut-center-val" x="50" y="46">' + total + '</text>' +
        '<text class="donut-center-label" x="50" y="58">PROJECTS</text>' +
    '</svg>';
}

function renderDashStatusBar() {
    var container = getEl('dash-stage-bars');
    if (!container) return;

    // Use authoritative stageCounts from core analytics (reads item.stage)
    var stageMap = (currentFilterStats && currentFilterStats.stageCounts) || {};

    // Explicit progression + color map
    var stageDefs = [
        { match: ['ofs'],                            color: 'var(--pill-ofs-bdr)' },
        { match: ['complete'],                       color: 'var(--pill-complete-bdr)' },
        { match: ['field cx', 'in progress'],        color: 'var(--pill-active-bdr)' },
        { match: ['pending start'],                  color: 'var(--pill-active-bdr)' },
        { match: ['permit'],                         color: 'var(--pill-permit-bdr)' },
        { match: ['vendor assignment', 'vendor'],    color: 'var(--pill-drg-bdr)' },
        { match: ['hold'],                           color: 'var(--pill-hold-bdr)' },
        { match: ['approved'],                       color: '#a855f7' },
        { match: ['unknown', '-'],                   color: '#a855f7' }
    ];

    function stageDefIndex(name) {
        var s = (name || '').toLowerCase().trim();
        for (var i = 0; i < stageDefs.length; i++) {
            for (var j = 0; j < stageDefs[i].match.length; j++) {
                if (s === stageDefs[i].match[j] || s.indexOf(stageDefs[i].match[j]) !== -1) return i;
            }
        }
        return stageDefs.length;
    }

    function stageColor(name) {
        var idx = stageDefIndex(name);
        return idx < stageDefs.length ? stageDefs[idx].color : 'var(--pill-hold-bdr)';
    }

    var entries = Object.keys(stageMap).map(function(k) { return [k, stageMap[k]]; })
        .filter(function(e) { return e[1] > 0; })
        .sort(function(a, b) { return stageDefIndex(a[0]) - stageDefIndex(b[0]); });

    if (!entries.length) {
        container.innerHTML = '<div class="dash-bar-label" style="color:var(--text-muted)">No stage data</div>';
        return;
    }

    var maxVal = Math.max.apply(null, entries.map(function(e) { return e[1]; }));

    container.innerHTML = entries.map(function(e) {
        var stage = e[0], cnt = e[1];
        var pct = ((cnt / maxVal) * 100).toFixed(1);
        return '<div class="dash-bar-row">' +
            '<div class="dash-bar-label" title="' + esc(stage) + '">' + esc(stage) + '</div>' +
            '<div class="dash-bar-track">' +
                '<div class="dash-bar-fill" style="width:' + pct + '%;background:' + stageColor(stage) + ';opacity:0.7;"></div>' +
            '</div>' +
            '<div class="dash-bar-count">' + cnt + '</div>' +
        '</div>';
    }).join('');
}

function renderDashVendorBsl() {
    var container = getEl('dash-vendor-grid');
    if (!container) return;

    var bslByVendor = (currentFilterStats && currentFilterStats.bslByVendor) || {};
    var sorted = Object.keys(bslByVendor)
        .map(function(v) { return [v, bslByVendor[v]]; })
        .filter(function(e) { return e[1] > 0; })
        .sort(function(a, b) { return b[1] - a[1]; })
        .slice(0, 10);

    if (!sorted.length) {
        container.innerHTML = '<div class="dash-vendor-name" style="color:var(--text-muted)">No BSL data</div>';
        return;
    }

    container.innerHTML = sorted.map(function(e) {
        return '<div class="dash-vendor-card">' +
            '<div class="dash-vendor-name">' + esc(e[0]) + '</div>' +
            '<div class="dash-vendor-bsl">' + Number(e[1]).toLocaleString() + '</div>' +
            '<div class="dash-vendor-sub">BSLs</div>' +
        '</div>';
    }).join('');
}

function renderDashFlagsFeed() {
    var feedCard = getEl('dash-flags-card');
    var container = getEl('dash-flag-feed');
    if (!container || !feedCard) return;

    var items = (currentCriticalHubItems || []);
    feedCard.style.display = ''; // Always show in 2-column layout

    if (!items.length) {
        container.innerHTML = '<div class="empty-msg" style="margin-top:40px; color:var(--text-muted); font-size:12px; font-weight:700;">All Clear ✓<br><span style="font-weight:500; font-size:10px; opacity:0.7;">No critical items currently flagged.</span></div>';
        return;
    }

    container.innerHTML = items.map(function(item) {
        var fdh = esc(item.fdh || '');
        var vendor = esc(item.vendor || '');
        var stage = esc(item.stage || '');

        // Extract the specific 🚨/🛑 flags that triggered critical severity
        var critFlags = (item.flags || '').split('\n')
            .map(function(f) { return f.trim(); })
            .filter(function(f) { return f.includes('🚨') || f.includes('🛑'); });

        // Clean emoji prefix for display, keep text readable
        var triggerTags = critFlags.map(function(f) {
            var icon = f.includes('🚨') ? '🚨' : '🛑';
            var text = f.replace(/^[🚨🛑]\s*/, '').trim();
            return '<span class="dash-trigger-tag">' + icon + ' ' + esc(text) + '</span>';
        }).join('');

        return '<div class="dash-flag-item is-crit">' +
            '<div class="dash-flag-main">' +
                '<div class="dash-flag-fdh">' + fdh + '</div>' +
                '<div class="dash-flag-meta">' + vendor + (stage ? ' · ' + stage : '') + '</div>' +
                (triggerTags ? '<div class="dash-trigger-row">' + triggerTags + '</div>' : '') +
            '</div>' +
            '<button class="dash-flag-nav-btn" onclick="navigateFromDashboardFlag(\'' + fdh.replace(/'/g, "\\'") + '\')">' +
                'View' +
            '</button>' +
        '</div>';
    }).join('');
}

function navigateFromDashboardFlag(fdh) {
    completeStartup('detail');
    setTimeout(function() {
        if (typeof selectItemForNav === 'function') selectItemForNav(fdh);
    }, 350);
}

function _renderDashSkeletons() {
    var strip = getEl('dash-kpi-strip');
    if (strip) {
        strip.innerHTML = [1,2,3,4,5].map(function(n, idx) {
            var sep = (idx === 4) ? '<div class="dash-kpi-sep"></div>' : '';
            return sep + '<div class="dash-kpi-card">' +
                '<div class="dash-skeleton" style="height:32px;width:55%;margin-bottom:6px;"></div>' +
                '<div class="dash-skeleton" style="height:10px;width:75%;"></div>' +
            '</div>';
        }).join('');
    }

    var donutWrap = getEl('dash-donut-wrap');
    if (donutWrap) {
        donutWrap.innerHTML = '<div class="dash-skeleton" style="width:110px;height:110px;border-radius:50%;"></div>';
    }

    var stageBars = getEl('dash-stage-bars');
    if (stageBars) {
        stageBars.innerHTML = [1,2,3,4].map(function() {
            return '<div class="dash-bar-row">' +
                '<div class="dash-skeleton" style="height:11px;width:80px;"></div>' +
                '<div class="dash-skeleton" style="height:7px;flex:1;"></div>' +
                '<div class="dash-skeleton" style="height:11px;width:24px;"></div>' +
            '</div>';
        }).join('');
    }

    var flagFeed = getEl('dash-flag-feed');
    var flagCard = getEl('dash-flags-card');
    if (flagFeed && flagCard) {
        flagCard.style.display = '';
        flagFeed.innerHTML = [1,2,3].map(function() {
            return '<div class="dash-flag-item">' +
                '<div class="dash-flag-main">' +
                    '<div class="dash-skeleton" style="height:14px;width:120px;margin-bottom:6px;"></div>' +
                    '<div class="dash-skeleton" style="height:10px;width:180px;"></div>' +
                '</div>' +
            '</div>';
        }).join('');
    }
}
</script>
