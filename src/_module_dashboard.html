<script>
// ============================================================
// FILE: _module_dashboard.html | ROLE: Dashboard landing page — render and open/close
// DEPENDS ON: _state_analytics.html (currentFilterStats, currentCriticalHubItems),
//   _state_queue.html (allActionItems), _utils_shared.html (esc, getSeverity, getEl),
//   _module_critical_hub.html (getCriticalType, openCriticalHub),
//   _module_startup_refdata.html (completeStartup)
// DEPENDED ON BY: _module_signal.html (_showStartupAfterSignal),
//   _module_router.html (switchWorkspaceView 'dashboard'),
//   WebApp.html (nav-brand onclick)
// ============================================================

function openDashboard() {
    if (window.innerWidth <= 480) {
        completeStartup('detail');
        return;
    }
    var overlay = getEl('startup-overlay');
    if (!overlay) { completeStartup('detail'); return; }

    renderDashboard();
    overlay.classList.add('visible');
    currentWorkspaceView = 'dashboard';
    document.body.classList.add('dashboard-active');
}

function closeDashboard() {
    var overlay = getEl('startup-overlay');
    if (overlay) overlay.classList.remove('visible');
    document.body.classList.remove('dashboard-active');
}

let dashboardDiagnosticState = { type: 'ALL', severity: 'ALL' };

function getDashboardSourceItems() {
    if (Array.isArray(filteredItems)) return filteredItems.slice();
    if (Array.isArray(allActionItems)) return allActionItems.slice();
    return [];
}

function getDashboardActionableItems(sourceItems) {
    if (Array.isArray(currentCriticalHubItems) && currentCriticalHubItems.length) return currentCriticalHubItems.slice();
    return (sourceItems || []).filter(function(item) {
        var sev = getSeverity(item.flags);
        return (sev === 'crit' || sev === 'warn') && !isCompleteOrOfs(item);
    });
}

function getDashboardActiveFilterCount() {
    if (!activeFilters) return 0;
    return (activeFilters.sev || []).length +
        (activeFilters.vendor || []).length +
        (activeFilters.city || []).length +
        (activeFilters.ofs || []).length +
        (activeFilters.status || []).length +
        (activeAdminFilter ? 1 : 0);
}

function getDashboardFilterSummary() {
    var count = getDashboardActiveFilterCount();
    if (count === 0) return 'Full program view';
    return 'Scoped by ' + count + ' active filter' + (count === 1 ? '' : 's');
}

function getDashboardFreshnessMeta() {
    var raw = (typeof globalRefDataDate === 'string' && globalRefDataDate) ? globalRefDataDate : '';
    return {
        label: raw ? 'Freshness' : 'Live session',
        value: raw || new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
    };
}

function getDashboardUrgencyStats(sourceItems, actionableItems) {
    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var stats = {
        overdue: 0,
        blocked: 0,
        reference: 0,
        admin: 0,
        ofsSoon: 0
    };

    (sourceItems || []).forEach(function(item) {
        if (isCompleteOrOfs(item)) return;
        var flags = String(item.flags || '').toUpperCase();
        var endDate = safeDate(item.cxEnd || item.targetDate);
        var ofsDate = getEffectiveOfsDate(item);

        if (endDate && !isNaN(endDate.getTime()) && endDate < today) stats.overdue++;
        if (flags.includes('BLOCKED BY PREDECESSOR') || flags.includes('BLOCKED BY UPSTREAM') || flags.includes('DELAYING DOWNSTREAM')) stats.blocked++;
        if (flags.includes('NOT IN QB REFERENCE') || flags.includes('MISSING QB STATUS') || flags.includes('STATUS MISMATCH')) stats.reference++;
        if (flags.includes('ADMIN: CHECK CROSSINGS') || flags.includes('ADMIN: REFRESH REF DATA') || flags.includes('MISSING BOM') || flags.includes('CHECK BOM') || flags.includes('PLEASE INPUT BOM')) stats.admin++;
        if (ofsDate && !isNaN(ofsDate.getTime())) {
            var daysUntil = Math.ceil((ofsDate.getTime() - today.getTime()) / 86400000);
            if (daysUntil >= 0 && daysUntil <= 30) stats.ofsSoon++;
        }
    });

    if ((actionableItems || []).length && stats.reference === 0) {
        stats.reference = (actionableItems || []).filter(function(item) {
            var flags = String(item.flags || '').toUpperCase();
            return flags.includes('QB') || flags.includes('REFERENCE');
        }).length;
    }

    return stats;
}

function buildDashboardDiagnosticBreakdown(items) {
    var breakdown = {};
    (items || []).forEach(function(item) {
        var type = getCriticalType(item);
        var sev = getSeverity(item.flags);
        if (!breakdown[type]) breakdown[type] = { type: type, crit: 0, warn: 0, total: 0 };
        if (sev === 'crit') breakdown[type].crit++;
        else breakdown[type].warn++;
        breakdown[type].total++;
    });
    return Object.keys(breakdown).map(function(key) { return breakdown[key]; })
        .sort(function(a, b) {
            if (b.total !== a.total) return b.total - a.total;
            if (b.crit !== a.crit) return b.crit - a.crit;
            return a.type.localeCompare(b.type);
        });
}

function setDashboardDiagnosticType(type) {
    dashboardDiagnosticState.type = dashboardDiagnosticState.type === type ? 'ALL' : type;
    renderDashFlagsFeed();
}

function setDashboardDiagnosticSeverity(severity) {
    dashboardDiagnosticState.severity = dashboardDiagnosticState.severity === severity ? 'ALL' : severity;
    renderDashFlagsFeed();
}

function renderDashboard() {
    var sourceItems = getDashboardSourceItems();
    var actionableItems = getDashboardActionableItems(sourceItems);
    var hasLoadedItems = Array.isArray(allActionItems) && allActionItems.length > 0;

    var tsEl = getEl('dash-timestamp');
    var nameEl = getEl('dash-program-name');
    var scopeEl = getEl('dash-filter-summary');
    
    if (tsEl) {
        var freshnessMeta = getDashboardFreshnessMeta();
        var freshTime = freshnessMeta.value;
        if (freshTime.match && freshTime.match(/\d{1,2}\/\d{1,2}\/\d{4}/)) {
            var p = freshTime.split(' ');
            var dPart = p[0].split('/');
            freshTime = dPart[0].padStart(2,'0') + '/' + dPart[1].padStart(2,'0') + '/' + dPart[2].substring(2) + (p[1] ? ' ' + p[1] : '');
        }
        tsEl.innerHTML = '<span class="dash-freshness-label">' + esc(freshnessMeta.label) + '</span><span class="dash-freshness-value">' + esc(freshTime) + '</span>';
    }
    
    if (nameEl) nameEl.textContent = hasLoadedItems ? sourceItems.length + ' Projects in Current View' : 'Loading...';
    if (scopeEl) scopeEl.textContent = getDashboardFilterSummary();

    if (!hasLoadedItems) {
        _renderDashSkeletons();
        return;
    }

    renderDashKpiStrip(sourceItems, actionableItems);
    renderDashHealthDonut(sourceItems);
    renderDashStatusBar();
    renderDashVendorBsl();
    renderDashFlagsFeed(actionableItems);
}

function renderDashKpiStrip(sourceItems, actionableItems) {
    var container = getEl('dash-kpi-strip');
    if (!container) return;

    var urgencyStats = getDashboardUrgencyStats(sourceItems, actionableItems);

    var cards = [
        { label: "Overdue", val: urgencyStats.overdue, cls: "is-critical", note: 'Past target/end date' },
        { label: "Blocked", val: urgencyStats.blocked, cls: "is-warning", note: 'Dependency risk' },
        { label: "QB Risk", val: urgencyStats.reference, cls: "is-visible", note: 'Reference mismatch' },
        { label: "Admin", val: urgencyStats.admin, cls: "is-admin", note: 'Crossings / BOM / data' },
        { label: "OFS <=30d", val: urgencyStats.ofsSoon, cls: "is-progress", note: 'Near-term delivery' }
    ];

    container.innerHTML = cards.map(function(c) {
        return "<div class=\"dash-kpi-card " + c.cls + "\">" +
            "<div class=\"dash-kpi-val\">" + c.val + "</div>" +
            "<div class=\"dash-kpi-label\">" + esc(c.label) + "</div>" +
            "<div class=\"dash-kpi-note\">" + esc(c.note) + "</div>" +
        "</div>";
    }).join("");
}

function renderDashHealthDonut(sourceItems) {
    var wrap = getEl('dash-donut-wrap');
    if (!wrap) return;

    var items = Array.isArray(sourceItems) ? sourceItems : [];
    var total = items.length;
    if (total === 0) { wrap.innerHTML = '<div class="dash-card-label" style="color:var(--text-muted)">No data</div>'; return; }

    var critCnt = 0, warnCnt = 0, cleanCnt = 0;
    items.forEach(function(item) {
        var sev = getSeverity(item.flags);
        if (sev === 'crit') critCnt++;
        else if (sev === 'warn') warnCnt++;
        else cleanCnt++;
    });

    wrap.innerHTML = _buildDonutSVG(total, critCnt, warnCnt, cleanCnt) +
        '<div class="dash-donut-legend">' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--pill-complete-bg)"></div>' +
                    '<span>Clean</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + cleanCnt + '</span>' +
            '</div>' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--color-review)"></div>' +
                    '<span>Warning</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + warnCnt + '</span>' +
            '</div>' +
            '<div class="dash-legend-row">' +
                '<div class="dash-legend-row-left">' +
                    '<div class="dash-legend-dot" style="background:var(--color-critical)"></div>' +
                    '<span>Critical</span>' +
                '</div>' +
                '<span class="dash-legend-val">' + critCnt + '</span>' +
            '</div>' +
        '</div>';
}

function _buildDonutSVG(total, crit, warn, clean) {
    var r = 38;
    var circ = 2 * Math.PI * r; // ~238.76
    var safe = total || 1;

    var cleanLen = (clean / safe) * circ;
    var warnLen  = (warn  / safe) * circ;
    var critLen  = (crit  / safe) * circ;

    // Arcs stack clockwise: clean → warn → crit
    var warnOffset = -(cleanLen);
    var critOffset = -(cleanLen + warnLen);

    return '<svg class="dash-donut-svg" viewBox="0 0 100 100">' +
        '<circle class="donut-track" cx="50" cy="50" r="' + r + '" />' +
        '<circle class="donut-arc donut-arc-clean" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + cleanLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="0" />' +
        '<circle class="donut-arc donut-arc-warn" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + warnLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="' + warnOffset.toFixed(2) + '" />' +
        '<circle class="donut-arc donut-arc-crit" cx="50" cy="50" r="' + r + '"' +
            ' stroke-dasharray="' + critLen.toFixed(2) + ' ' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="' + critOffset.toFixed(2) + '" />' +
        '<text class="donut-center-val" x="50" y="46">' + total + '</text>' +
        '<text class="donut-center-label" x="50" y="58">IN VIEW</text>' +
    '</svg>';
}

function renderDashStatusBar() {
    var container = getEl('dash-stage-bars');
    if (!container) return;

    var stageMap = (currentFilterStats && currentFilterStats.stageCounts) || {};
    var stageDefs = [
        { key: 'vendor', label: 'Vendor', match: ['vendor assignment', 'vendor'], color: 'var(--pill-drg-bdr)' },
        { key: 'permit', label: 'Permitting', match: ['permit'], color: 'var(--pill-permit-bg)' },
        { key: 'pending', label: 'Pending Start', match: ['pending start'], color: 'var(--color-review)' },
        { key: 'field', label: 'Field CX', match: ['field cx', 'in progress'], color: 'var(--pill-active-bg)' },
        { key: 'ofs', label: 'OFS', match: ['ofs'], color: 'var(--pill-ofs-bg)' },
        { key: 'complete', label: 'Complete', match: ['complete'], color: 'var(--pill-complete-bg)' },
        { key: 'hold', label: 'Hold', match: ['hold'], color: 'var(--pill-hold-bg)' },
        { key: 'other', label: 'Other', match: ['approved', 'unknown', '-'], color: 'var(--color-insight)' }
    ];

    var stageTotals = {};
    stageDefs.forEach(function(def) { stageTotals[def.key] = 0; });

    function findStageDef(name) {
        var s = (name || '').toLowerCase().trim();
        for (var i = 0; i < stageDefs.length; i++) {
            for (var j = 0; j < stageDefs[i].match.length; j++) {
                if (s === stageDefs[i].match[j] || s.indexOf(stageDefs[i].match[j]) !== -1) return stageDefs[i];
            }
        }
        return stageDefs[stageDefs.length - 1];
    }

    Object.keys(stageMap).forEach(function(stageName) {
        var count = stageMap[stageName] || 0;
        if (!count) return;
        var def = findStageDef(stageName);
        stageTotals[def.key] = (stageTotals[def.key] || 0) + count;
    });

    var entries = stageDefs.map(function(def) {
        return {
            key: def.key,
            label: def.label,
            color: def.color,
            count: stageTotals[def.key] || 0
        };
    }).filter(function(entry) { return entry.count > 0; });

    if (!entries.length) {
        container.innerHTML = '<div class="dash-stage-summary-value" style="color:var(--text-muted)">No stage data</div>';
        return;
    }

    var total = entries.reduce(function(sum, entry) { return sum + entry.count; }, 0) || 1;
    entries.forEach(function(entry) {
        entry.pct = (entry.count / total) * 100;
    });
    var dominant = entries.slice().sort(function(a, b) { return b.count - a.count; })[0];

    container.innerHTML =
        '<div class="dash-stage-summary">' +
            '<span class="dash-stage-summary-label">Primary stage</span>' +
            '<span class="dash-stage-summary-value">' + esc(dominant.label) + ' · ' + dominant.pct.toFixed(0) + '% of view</span>' +
        '</div>' +
        '<div class="dash-stage-strip">' +
            entries.map(function(entry) {
                return '<span class="dash-stage-seg" style="width:' + entry.pct.toFixed(2) + '%; background:' + entry.color + ';" title="' + esc(entry.label) + ': ' + entry.count + ' (' + entry.pct.toFixed(1) + '%)"></span>';
            }).join('') +
        '</div>' +
        '<div class="dash-stage-legend">' +
            entries.map(function(entry) {
                return '<div class="dash-stage-pill' + (entry.key === dominant.key ? ' is-dominant' : '') + '">' +
                    '<div class="dash-stage-pill-top">' +
                        '<span class="dash-stage-pill-dot" style="background:' + entry.color + ';"></span>' +
                        '<span class="dash-stage-pill-label">' + esc(entry.label) + '</span>' +
                    '</div>' +
                    '<div class="dash-stage-pill-meta">' +
                        '<span class="dash-stage-pill-count">' + entry.count + '</span>' +
                        '<span class="dash-stage-pill-pct">' + entry.pct.toFixed(0) + '%</span>' +
                    '</div>' +
                '</div>';
            }).join('') +
        '</div>';
}

function renderDashVendorBsl() {
    var container = getEl('dash-vendor-grid');
    if (!container) return;

    var bslByVendor = (currentFilterStats && currentFilterStats.bslByVendor) || {};
    var sorted = Object.keys(bslByVendor)
        .map(function(v) { return [v, bslByVendor[v]]; })
        .filter(function(e) { return e[1] > 0; })
        .sort(function(a, b) { return b[1] - a[1]; })
        .slice(0, 6);

    if (!sorted.length) {
        container.innerHTML = '<div class="dash-vendor-name" style="color:var(--text-muted)">No BSL data</div>';
        return;
    }

    var total = sorted.reduce(function(sum, entry) { return sum + entry[1]; }, 0) || 1;

    container.innerHTML = sorted.map(function(e, idx) {
        var pct = ((e[1] / total) * 100).toFixed(1);
        return '<div class="dash-vendor-row">' +
            '<div class="dash-vendor-rank">#' + (idx + 1) + '</div>' +
            '<div class="dash-vendor-main">' +
                '<div class="dash-vendor-name">' + esc(e[0]) + '</div>' +
                '<div class="dash-vendor-meter"><span style="width:' + pct + '%;"></span></div>' +
                '<div class="dash-vendor-sub">' + pct + '% of visible BSLs</div>' +
            '</div>' +
            '<div class="dash-vendor-side">' +
                '<div class="dash-vendor-bsl">' + Number(e[1]).toLocaleString() + '</div>' +
                '<div class="dash-vendor-sub">BSLs</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

function renderDashFlagsFeed(actionableItemsOverride) {
    var feedCard = getEl('dash-flags-card');
    var container = getEl('dash-flag-feed');
    var chart = getEl('dash-diagnostic-chart');
    var summary = getEl('dash-diagnostic-summary');
    var activePill = getEl('dash-diagnostic-active');
    if (!container || !feedCard || !chart || !summary || !activePill) return;

    var items = Array.isArray(actionableItemsOverride) ? actionableItemsOverride : getDashboardActionableItems(getDashboardSourceItems());
    feedCard.style.display = '';

    if (dashboardDiagnosticState.severity !== 'ALL') {
        items = items.filter(function(item) { return getSeverity(item.flags) === dashboardDiagnosticState.severity; });
    }

    if (!items.length) {
        chart.innerHTML = '';
        summary.textContent = 'No active diagnostic categories';
        activePill.innerHTML = '<span class="dash-filter-chip active">All diagnostics clear</span>';
        container.innerHTML = '<div class="empty-msg" style="margin-top:40px; color:var(--text-muted); font-size:12px; font-weight:700;">All Clear ✓<br><span style="font-weight:500; font-size:10px; opacity:0.7;">No actionable diagnostics in the current view.</span></div>';
        return;
    }

    var breakdown = buildDashboardDiagnosticBreakdown(items);
    var critCount = items.filter(function(item) { return getSeverity(item.flags) === 'crit'; }).length;
    var warnCount = items.filter(function(item) { return getSeverity(item.flags) === 'warn'; }).length;
    if (!breakdown.some(function(entry) { return entry.type === dashboardDiagnosticState.type; })) {
        dashboardDiagnosticState.type = 'ALL';
    }

    var severityHtml = '<div class="dash-diagnostic-severity">' +
        '<button class="dash-severity-chip' + (dashboardDiagnosticState.severity === 'ALL' ? ' active' : '') + '" onclick="setDashboardDiagnosticSeverity(\'ALL\')">All<span>' + items.length + '</span></button>' +
        '<button class="dash-severity-chip' + (dashboardDiagnosticState.severity === 'crit' ? ' active is-crit' : ' is-crit') + '" onclick="setDashboardDiagnosticSeverity(\'crit\')">Critical<span>' + critCount + '</span></button>' +
        '<button class="dash-severity-chip' + (dashboardDiagnosticState.severity === 'warn' ? ' active is-warn' : ' is-warn') + '" onclick="setDashboardDiagnosticSeverity(\'warn\')">Warnings<span>' + warnCount + '</span></button>' +
    '</div>';

    var sectionEntries = (dashboardDiagnosticState.type === 'ALL'
        ? breakdown.slice(0, 3)
        : breakdown.filter(function(entry) { return entry.type === dashboardDiagnosticState.type; })
    );

    chart.innerHTML = severityHtml + sectionEntries.map(function(entry) {
        var sectionItems = items.filter(function(item) { return getCriticalType(item) === entry.type; })
            .sort(function(a, b) {
                var sevDiff = getSeverityOrder(a.flags) - getSeverityOrder(b.flags);
                if (sevDiff !== 0) return sevDiff;
                return compareWithSecondarySort(a, b, 'end');
            })
            .slice(0, 2);
        var isActive = dashboardDiagnosticState.type === entry.type;
        return '<section class="dash-review-section' + (isActive ? ' is-active' : '') + '">' +
            '<button class="dash-review-section-header" onclick="setDashboardDiagnosticType(\'' + escJs(entry.type) + '\')">' +
                '<div class="dash-review-section-title">' +
                    '<div class="dash-review-section-kicker">Diagnostic</div>' +
                    '<div class="dash-review-section-name">' + esc(entry.type) + '</div>' +
                '</div>' +
                '<div class="dash-review-section-meta">' +
                    (entry.crit ? '<span class="dash-review-pill is-crit">' + entry.crit + ' critical</span>' : '') +
                    (entry.warn ? '<span class="dash-review-pill is-warn">' + entry.warn + ' warnings</span>' : '') +
                    '<span class="dash-review-count">' + entry.total + '</span>' +
                '</div>' +
            '</button>' +
            '<div class="dash-review-section-body">' +
                sectionItems.map(function(item) {
                    return getListCardHtml(item);
                }).join('') +
            '</div>' +
        '</section>';
    }).join('');

    var filteredItemsForList = dashboardDiagnosticState.type === 'ALL'
        ? items.slice()
        : items.filter(function(item) { return getCriticalType(item) === dashboardDiagnosticState.type; });

    filteredItemsForList.sort(function(a, b) {
        var sevDiff = getSeverityOrder(a.flags) - getSeverityOrder(b.flags);
        if (sevDiff !== 0) return sevDiff;
        return compareWithSecondarySort(a, b, 'end');
    });

    summary.textContent = breakdown.length + ' diagnostic categories across ' + items.length + ' actionable projects';
    activePill.innerHTML =
        (dashboardDiagnosticState.severity === 'ALL'
            ? '<span class="dash-filter-chip active">All severities</span>'
            : '<span class="dash-filter-chip active">' + esc(dashboardDiagnosticState.severity === 'crit' ? 'Critical only' : 'Warnings only') + '</span><button class="dash-filter-chip clear" onclick="setDashboardDiagnosticSeverity(\'ALL\')">Clear</button>') +
        (dashboardDiagnosticState.type === 'ALL'
            ? '<span class="dash-filter-chip active">All diagnostic types</span>'
            : '<span class="dash-filter-chip active">' + esc(dashboardDiagnosticState.type) + '</span><button class="dash-filter-chip clear" onclick="setDashboardDiagnosticType(\'ALL\')">Clear</button>');

    var previewLimit = dashboardDiagnosticState.type === 'ALL' ? 0 : 5;
    var visibleListItems = previewLimit ? filteredItemsForList.slice(0, previewLimit) : [];
    container.innerHTML = visibleListItems.map(function(item) {
        return getListCardHtml(item);
    }).join('');
    if (previewLimit && !container.innerHTML) {
        container.innerHTML = '<div class="empty-msg" style="margin-top:40px; color:var(--text-muted); font-size:12px; font-weight:700;">No items match this diagnostic filter.</div>';
        return;
    }
    if (!previewLimit) {
        container.innerHTML = '<div class="dash-list-footnote">Select a diagnostic section to preview specific projects, or open the Hub for the full queue.</div>';
        return;
    }
    if (filteredItemsForList.length > visibleListItems.length) {
        container.insertAdjacentHTML('beforeend', '<div class="dash-list-footnote">Showing first ' + visibleListItems.length + ' items. Open Hub for the full diagnostic queue.</div>');
    }
}

function handleCardClick(fdh) {
    navigateFromDashboardFlag(fdh);
}

function navigateFromDashboardFlag(fdh) {
    completeStartup('detail');
    setTimeout(function() {
        if (typeof selectItemForNav === 'function') selectItemForNav(fdh);
    }, 350);
}

function _renderDashSkeletons() {
    var strip = getEl('dash-kpi-strip');
    if (strip) {
        strip.innerHTML = [1,2,3,4,5].map(function(n, idx) {
            var sep = (idx === 4) ? '<div class="dash-kpi-sep"></div>' : '';
            return sep + '<div class="dash-kpi-card">' +
                '<div class="dash-skeleton" style="height:32px;width:55%;margin-bottom:6px;"></div>' +
                '<div class="dash-skeleton" style="height:10px;width:75%;"></div>' +
            '</div>';
        }).join('');
    }

    var donutWrap = getEl('dash-donut-wrap');
    if (donutWrap) {
        donutWrap.innerHTML = '<div class="dash-skeleton" style="width:110px;height:110px;border-radius:50%;"></div>';
    }

    var stageBars = getEl('dash-stage-bars');
    if (stageBars) {
        stageBars.innerHTML = [1,2,3,4].map(function() {
            return '<div class="dash-bar-row">' +
                '<div class="dash-skeleton" style="height:11px;width:80px;"></div>' +
                '<div class="dash-skeleton" style="height:7px;flex:1;"></div>' +
                '<div class="dash-skeleton" style="height:11px;width:24px;"></div>' +
            '</div>';
        }).join('');
    }

    var flagFeed = getEl('dash-flag-feed');
    var flagCard = getEl('dash-flags-card');
    if (flagFeed && flagCard) {
        flagCard.style.display = '';
        flagFeed.innerHTML = [1,2,3].map(function() {
            return '<div class="email-card">' +
                '<div class="em-header">' +
                    '<div style="display: flex; flex-direction: column; gap: 4px; flex: 1;">' +
                        '<div class="dash-skeleton" style="height:14px;width:120px;"></div>' +
                        '<div class="dash-skeleton" style="height:10px;width:180px;"></div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');
    }
}
</script>
