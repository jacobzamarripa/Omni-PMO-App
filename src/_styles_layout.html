      /* 🧠 MORPHING PANEL STYLING */
      .outbox-pane {
          display: none; /* Controlled by JS to prevent layout shifts */
          flex-direction: column;
          position: relative;
          top: 0; /* Align with top of anchor */
          right: 0;
          width: 380px;
          flex-shrink: 0; 
          height: calc(100% - (var(--panel-gutter-y) * 2) - var(--dock-panel-offset)) !important;
          max-height: none !important;
          margin-top: calc(var(--panel-gutter-y) + var(--dock-panel-offset));
          margin-right: var(--panel-gutter-x);
          margin-bottom: var(--panel-gutter-y);
          background: color-mix(in srgb, var(--card-bg) 98%, transparent);
          border-left: 1px solid var(--border);
          z-index: 100010;
          border: 1px solid var(--border);
          border-radius: 22px;
          box-shadow: 0 28px 60px rgba(15,23,42,0.24);
          overflow: hidden;
          min-width: 320px;
          min-height: 200px;
          
          /* Animation Properties */
          opacity: 0;
          transform: scale(0.1); /* Start small at the FAB's location */
          transform-origin: top right;
          transition: opacity 0.2s ease-out, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
          pointer-events: none;
          backdrop-filter: blur(14px);
      }

      .outbox-pane.open {
          display: flex;
          opacity: 1;
          transform: scale(1);
          pointer-events: auto;
      }

      /* 🧠 HIDE FAB WHEN PANEL IS OPEN */
      .reading-pane.admin-open #admin-fab {
          opacity: 1;
          transform: none;
          pointer-events: auto;
