      /* 🧠 MORPHING PANEL STYLING */
      .outbox-pane {
          display: none; /* Controlled by JS to prevent layout shifts */
          flex-direction: column;
          position: relative;
          top: 0; /* Align with top of anchor */
          right: 0;
          width: 380px;
          flex-shrink: 0; 
          height: calc(100% - (var(--panel-gutter-y) * 2) - var(--dock-panel-offset)) !important;
          max-height: none !important;
          margin-top: calc(var(--panel-gutter-y) + var(--dock-panel-offset));
          margin-right: var(--panel-gutter-x);
          margin-bottom: var(--panel-gutter-y);
          background: color-mix(in srgb, var(--card-bg) 98%, transparent);
          border-left: 1px solid var(--border);
          z-index: 100010;
          border: 1px solid var(--border);
          border-radius: 22px;
          box-shadow: 0 28px 60px rgba(15,23,42,0.24);
          overflow: hidden;
          min-width: 320px;
          min-height: 200px;
          
          /* Animation Properties */
          opacity: 0;
          transform: scale(0.1); /* Start small at the FAB's location */
          transform-origin: top right;
          transition: opacity 0.2s ease-out, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
          pointer-events: none;
          backdrop-filter: blur(14px);
      }

      .outbox-pane.open {

          opacity: 1;
          transform: scale(1);
          pointer-events: auto;
      }

      /* 🧠 HIDE FAB WHEN PANEL IS OPEN */

/* -- WS16 #mobile-rail (phone-only action bar, <=480px) -- */
#mobile-rail { display: none; }
#mobile-back-btn { display: none; }

@media (max-width: 480px) {
    #mobile-rail {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(56px + env(safe-area-inset-bottom));
        padding-bottom: env(safe-area-inset-bottom);
        background: var(--card-bg);
        border-top: 1px solid var(--border);
        z-index: 4000;
        align-items: center;
        justify-content: space-around;
        pointer-events: none;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        transition: background 0.3s, border-color 0.3s;
    }
    body.dark-mode #mobile-rail {
        background: rgba(18, 18, 22, 0.92);
        border-top-color: rgba(255, 255, 255, 0.08);
    }
    .rail-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        min-width: 44px;
        min-height: 44px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.2px;
        padding: 4px 10px;
        border-radius: 10px;
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.15s, background 0.15s;
    }
    .rail-btn svg { width: 20px; height: 20px; stroke-width: 1.8; flex-shrink: 0; }
    .rail-btn span { line-height: 1; }
    .rail-btn:active { background: rgba(59,130,246,0.08); color: var(--accent); }

    /* Active state driven by body class -- zero JS in the rail */
    #mobile-rail .rail-btn:nth-child(1) { color: var(--accent); }
    body.grid-mode-active   #mobile-rail .rail-btn:nth-child(1) { color: var(--text-muted); }
    body.grid-mode-active   #mobile-rail .rail-btn:nth-child(2) { color: var(--accent); }
    body.gantt-view-active  #mobile-rail .rail-btn:nth-child(1) { color: var(--text-muted); }
    body.gantt-view-active  #mobile-rail .rail-btn:nth-child(3) { color: var(--accent); }
    body.deck-mode-active   #mobile-rail .rail-btn:nth-child(1) { color: var(--text-muted); }
    body.deck-mode-active   #mobile-rail .rail-btn:nth-child(4) { color: var(--accent); }
    body.mobile-filter-open #mobile-rail .rail-btn--filter { color: var(--accent); }

    /* ── Queue ↔ Detail toggle (Phase 3) ── */
