<style>
/* ============================================================
   FILE: _styles_dashboard.html | ROLE: Dashboard landing page styles
   DEPENDS ON: _styles_base.html (tokens), _styles_loaders.html (.startup-overlay)
   DEPENDED ON BY: WebApp.html
   ============================================================ */

/* === MODAL SHELL === */
.dashboard-modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(15, 23, 42, 0.16), 0 0 0 1px rgba(255,255,255,0.04) inset;
  width: min(96vw, 1200px);
  height: min(90vh, 840px);
  display: flex;
  flex-direction: column;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  opacity: 0;
}

.startup-overlay.visible .dashboard-modal {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* === HEADER === */
.dash-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 20px;
}

.dash-header-left {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.dash-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.dash-header-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.dash-header-actions::-webkit-scrollbar { display: none; }

.dash-title {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  gap: 3px;
}

.dash-title span:first-child { color: var(--text-muted); }
.dash-title span:last-child { color: var(--accent); }

.dash-program-name {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.2);
  padding: 4px 14px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-top: 4px;
  white-space: nowrap;
}

.dash-timestamp {
  font-size: 10px;
  font-weight: 900;
  color: var(--pill-complete-txt);
  font-family: monospace;
  flex-shrink: 0;
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.2);
  padding: 5px 12px;
  border-radius: 999px;
  white-space: nowrap;
}

/* === BODY === */
.dash-body {
  padding: 18px 20px;
  overflow: hidden;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* 2-COLUMN LAYOUT WRAPPER */
.dash-layout-wrapper {
  display: grid;
  grid-template-columns: 2fr 1.2fr;
  gap: 24px;
  align-items: start;
  height: 100%;
  flex: 1;
  min-height: 0;
}

.dash-col-left, .dash-col-right {
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: 100%;
  overflow-y: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.dash-col-left::-webkit-scrollbar, .dash-col-right::-webkit-scrollbar { width: 5px; }
.dash-col-left::-webkit-scrollbar-thumb, .dash-col-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }


/* === ROW 1: KPI STRIP === */
.dash-kpi-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr auto 1fr;
  gap: 12px;
}

.dash-kpi-sep {
  width: 1px;
  background: var(--border);
  height: 40px;
  align-self: center;
}

.dash-kpi-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: default;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.dash-kpi-val {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
}

.dash-kpi-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  margin-top: 2px;
}

.dash-kpi-card.is-critical .dash-kpi-val { color: var(--color-critical); }
.dash-kpi-card.is-ofs .dash-kpi-val      { color: var(--pill-ofs-txt); }
.dash-kpi-card.is-permit .dash-kpi-val   { color: var(--pill-permit-txt); }
.dash-kpi-card.is-complete .dash-kpi-val { color: var(--pill-complete-txt); }
.dash-kpi-card.is-progress .dash-kpi-val { color: var(--pill-active-txt); }

/* === ROW 2: CHARTS (donut + bars) === */
.dash-charts-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.dash-chart-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}

.dash-card-label {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

/* HEALTH DONUT */
.dash-donut-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 10px 0;
}

.dash-donut-svg {
  width: 120px;
  height: 120px;
  transform: rotate(-90deg);
  overflow: visible;
  flex-shrink: 0;
}

.donut-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 14;
}

.donut-arc {
  fill: none;
  stroke-width: 14;
  stroke-linecap: butt;
  transition: stroke-dasharray 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.donut-arc-clean { stroke: var(--pill-complete-bdr); }
.donut-arc-warn  { stroke: var(--color-review); }
.donut-arc-crit  { stroke: var(--color-critical); }

.donut-center-val {
  font-size: 20px;
  font-weight: 900;
  fill: var(--text-main);
  text-anchor: middle;
  transform: rotate(90deg);
  transform-origin: 50px 50px;
}

.donut-center-label {
  font-size: 7px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  fill: var(--text-muted);
  text-anchor: middle;
  transform: rotate(90deg);
  transform-origin: 50px 50px;
}

.dash-donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 110px;
}

.dash-legend-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  gap: 12px;
}

.dash-legend-row-left {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.dash-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dash-legend-val {
  font-weight: 900;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
}

/* STAGE BARS */
.dash-stage-bars {
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.dash-bar-row {
  display: grid;
  grid-template-columns: minmax(110px, auto) 1fr 32px;
  gap: 12px;
  align-items: center;
}

.dash-bar-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
  padding-right: 4px;
}

.dash-bar-track {
  height: 7px;
  border-radius: 4px;
  background: var(--border);
  overflow: hidden;
}

.dash-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

.dash-bar-count {
  font-size: 11px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  color: var(--text-main);
  text-align: right;
}

/* === ROW 3: VENDOR BSL === */
.dash-vendor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}

.dash-vendor-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.dash-vendor-name {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-vendor-bsl {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

.dash-vendor-sub {
  font-size: 8px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* === ROW 4: CRITICAL FLAGS FEED === */
.dash-flags-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0 !important; /* Flush edges */
  overflow: hidden;
}

.dash-flags-card .dash-card-label {
  padding: 16px 16px 12px 16px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 20;
}

.dash-flag-feed {
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
}

.dash-flag-group {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.dash-flag-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  margin-bottom: 0;
  position: sticky;
  top: 0;
  background: var(--card-bg);
  opacity: 0.96;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10;
}

.dash-flag-group:first-child .dash-flag-group-header {
  border-top: none;
}

.dash-flag-group-icon {
  font-size: 14px;
}

.dash-flag-group-text {
  font-size: 10px;
  font-weight: 900;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex: 1;
}

.dash-flag-group-count {
  font-size: 9px;
  font-weight: 900;
  background: var(--bg);
  color: var(--text-main);
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

/* Dashboard-specific tweaks for email-cards */
.dash-flag-feed .email-card {
  margin: 0 !important;
  width: 100% !important;
  box-sizing: border-box;
  border-radius: 0 !important;
  border-left: none !important;
  border-right: none !important;
  border-top: none !important;
  border-bottom: 1px solid var(--border) !important;
}

.dash-flag-feed .email-card:last-of-type {
  border-bottom: none !important;
}

.dash-flag-feed .email-card .em-fdh {
  font-size: 13px !important;
}

.dash-flag-feed .email-card .em-vendor {
  font-size: 9px !important;
}

.dash-flag-feed .email-card .glass-pill {
  transform: scale(0.9);
  transform-origin: right center;
}

/* === FOOTER: ENTRY BUTTONS === */
.dash-entry-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  flex-shrink: 0;
}

.dash-ws-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 42px;
  padding: 0 20px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.15s ease, border-color 0.15s ease;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-main);
  letter-spacing: 0.3px;
  font-family: inherit;
}

.dash-ws-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.1);
  border-color: color-mix(in srgb, var(--accent) 60%, transparent);
}

.dash-ws-btn.is-primary {
  background: var(--accent, #2563eb);
  color: #fff;
  border-color: var(--accent, #2563eb);
}

.dash-ws-btn.is-primary:hover {
  background: #1d4ed8;
  border-color: #1d4ed8;
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
}

/* === SKELETON SHIMMER === */
.dash-skeleton {
  background: linear-gradient(90deg,
    var(--border) 0%,
    color-mix(in srgb, var(--bg) 60%, var(--border)) 50%,
    var(--border) 100%);
  background-size: 200% 100%;
  animation: dash-shimmer 1.5s infinite;
  border-radius: 6px;
}

@keyframes dash-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* === DARK MODE === */
.dark-mode .dashboard-modal {
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
}

.dark-mode .dash-kpi-card.is-critical {
  border-color: rgba(239,68,68,0.3);
  background: rgba(239,68,68,0.04);
}

/* === DOCK HIDE WHEN DASHBOARD ACTIVE === */
body.dashboard-active .filter-strip,
body.dashboard-active .active-filter-pills,
body.dashboard-active .unified-filter-fab { display: none !important; }

/* Nav brand clickable hint */
.nav-brand { cursor: pointer; }

/* === RESPONSIVE === */
@media (max-width: 900px) {
  .dash-layout-wrapper { grid-template-columns: 1fr; }
  .dash-kpi-strip { grid-template-columns: repeat(5, 1fr); }
  .dash-charts-row { grid-template-columns: repeat(2, 1fr); flex-direction: row; }
  .dash-kpi-sep { display: none; }
}

@media (max-width: 768px) {
  .dash-kpi-strip { grid-template-columns: repeat(3, 1fr); }
  .dash-charts-row { grid-template-columns: 1fr; flex-direction: column; }
  .dash-kpi-val { font-size: 22px; }
}

@media (max-width: 540px) {
  .dash-kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .dash-entry-row { flex-wrap: wrap; }
}

</style>
