<style>
/* ============================================================
   FILE: _styles_dashboard.html | ROLE: Dashboard landing page styles
   DEPENDS ON: _styles_base.html (tokens), _styles_loaders.html (.startup-overlay)
   DEPENDED ON BY: WebApp.html
   ============================================================ */

/* === MODAL SHELL === */
.dashboard-modal {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(15, 23, 42, 0.16), 0 0 0 1px rgba(255,255,255,0.04) inset;
  width: min(96vw, 1200px);
  height: min(90vh, 840px);
  display: flex;
  flex-direction: column;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  opacity: 0;
}

.startup-overlay.visible .dashboard-modal {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* === HEADER === */
.dash-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 20px;
}

.dash-header-left {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.dash-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.dash-header-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.dash-header-actions::-webkit-scrollbar { display: none; }

.dash-title {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  gap: 3px;
}

.dash-title span:first-child { color: var(--text-muted); }
.dash-title span:last-child { color: var(--accent); }

.dash-program-name {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.2);
  padding: 4px 14px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-top: 4px;
  white-space: nowrap;
}

.dash-filter-summary {
  margin-top: 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

.dash-timestamp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-width: 116px;
  font-weight: 800;
  flex-shrink: 0;
  background: rgba(34, 197, 94, 0.08);
  border: 1px solid rgba(34, 197, 94, 0.18);
  padding: 6px 10px;
  border-radius: 999px;
  white-space: nowrap;
}

.dash-freshness-label {
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #166534;
  opacity: 0.7;
}

.dash-freshness-value {
  font-size: 10px;
  color: #166534;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

/* === BODY === */
.dash-body {
  padding: 18px 20px;
  overflow: hidden;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* 2-COLUMN LAYOUT WRAPPER */
.dash-layout-wrapper {
  display: grid;
  grid-template-columns: 2fr 1.2fr;
  gap: 24px;
  align-items: start;
  height: 100%;
  flex: 1;
  min-height: 0;
}

.dash-col-left, .dash-col-right {
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: 100%;
  overflow-y: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.dash-col-left::-webkit-scrollbar, .dash-col-right::-webkit-scrollbar { width: 5px; }
.dash-col-left::-webkit-scrollbar-thumb, .dash-col-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }


/* === ROW 1: KPI STRIP === */
.dash-kpi-strip {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
}

.dash-kpi-sep {
  width: 1px;
  background: var(--border);
  height: 40px;
  align-self: center;
}

.dash-kpi-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: default;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.dash-kpi-val {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
}

.dash-kpi-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  margin-top: 2px;
}

.dash-kpi-note {
  margin-top: 6px;
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.2;
}

.dash-kpi-card.is-critical .dash-kpi-val { color: var(--color-critical); }
.dash-kpi-card.is-admin .dash-kpi-val    { color: var(--color-insight); }
.dash-kpi-card.is-visible .dash-kpi-val  { color: var(--accent); }
.dash-kpi-card.is-warning .dash-kpi-val  { color: var(--color-review); }
.dash-kpi-card.is-ofs .dash-kpi-val      { color: var(--pill-ofs-txt); }
.dash-kpi-card.is-permit .dash-kpi-val   { color: var(--pill-permit-txt); }
.dash-kpi-card.is-complete .dash-kpi-val { color: var(--pill-complete-txt); }
.dash-kpi-card.is-progress .dash-kpi-val { color: var(--pill-active-bg); }

/* === ROW 2: CHARTS (donut + bars) === */
.dash-charts-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.dash-chart-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}

.dash-card-label {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

/* HEALTH DONUT */
.dash-donut-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 10px 0;
}

.dash-donut-svg {
  width: 120px;
  height: 120px;
  transform: rotate(-90deg);
  overflow: visible;
  flex-shrink: 0;
}

.donut-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 14;
}

.donut-arc {
  fill: none;
  stroke-width: 14;
  stroke-linecap: butt;
  transition: stroke-dasharray 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.donut-arc-clean { stroke: var(--pill-complete-bg); }
.donut-arc-warn  { stroke: var(--color-review); }
.donut-arc-crit  { stroke: var(--color-critical); }

.donut-center-val {
  font-size: 20px;
  font-weight: 900;
  fill: var(--text-main);
  text-anchor: middle;
  transform: rotate(90deg);
  transform-origin: 50px 50px;
}

.donut-center-label {
  font-size: 7px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  fill: var(--text-muted);
  text-anchor: middle;
  transform: rotate(90deg);
  transform-origin: 50px 50px;
}

.dash-donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 110px;
}

.dash-legend-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  gap: 12px;
}

.dash-legend-row-left {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.dash-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dash-legend-val {
  font-weight: 900;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
}

/* STAGE BARS */
.dash-stage-bars {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.dash-stage-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.dash-stage-summary-label {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
}

.dash-stage-summary-value {
  font-size: 12px;
  font-weight: 800;
  color: var(--text-main);
}

.dash-stage-strip {
  display: flex;
  width: 100%;
  height: 14px;
  overflow: hidden;
  border-radius: 999px;
  background: color-mix(in srgb, var(--border) 76%, transparent);
}

.dash-stage-seg {
  height: 100%;
  min-width: 10px;
  transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

.dash-stage-legend {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.dash-stage-pill {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card-bg);
}

.dash-stage-pill.is-dominant {
  border-color: color-mix(in srgb, var(--accent) 24%, var(--border));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
}

.dash-stage-pill-top,
.dash-stage-pill-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.dash-stage-pill-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  flex-shrink: 0;
}

.dash-stage-pill-label {
  flex: 1 1 auto;
  min-width: 0;
  font-size: 10px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.dash-stage-pill-count {
  font-size: 16px;
  font-weight: 900;
  color: var(--text-main);
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}

.dash-stage-pill-pct {
  font-size: 10px;
  font-weight: 800;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* === ROW 3: VENDOR BSL === */
.dash-vendor-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.dash-vendor-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  min-width: 0;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--card-bg);
}

.dash-vendor-rank {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  justify-content: center;
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 8%, var(--bg));
  color: var(--accent);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

.dash-vendor-main,
.dash-vendor-side {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.dash-vendor-main {
  flex: 1 1 auto;
}

.dash-vendor-side {
  align-items: flex-end;
  text-align: right;
  flex: 0 0 auto;
}

.dash-vendor-name {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-vendor-meter {
  width: 100%;
  height: 6px;
  margin-top: 2px;
  border-radius: 999px;
  overflow: hidden;
  background: color-mix(in srgb, var(--border) 80%, transparent);
}

.dash-vendor-meter span {
  display: block;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #fff));
}

.dash-vendor-bsl {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.03em;
  color: var(--text-main);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

.dash-vendor-sub {
  font-size: 8px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* === ROW 4: CRITICAL FLAGS FEED === */
.dash-flags-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0 !important; /* Flush edges */
  overflow: hidden;
}

.dash-flags-card .dash-card-label {
  margin-bottom: 4px;
}

.dash-flags-scroll {
  display: flex;
  flex: 1 1 auto;
  flex-direction: column;
  min-height: 0;
}

.dash-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 16px 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 20;
}

.dash-card-subtext {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

.dash-inline-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 34px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--accent) 32%, var(--border));
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  color: var(--accent);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.04em;
  cursor: pointer;
}

.dash-diagnostic-chart {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px 14px 0 14px;
  border-bottom: 1px solid var(--border);
}

.dash-diagnostic-severity {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.dash-severity-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  cursor: pointer;
}

.dash-severity-chip span {
  font-variant-numeric: tabular-nums;
}

.dash-severity-chip.active {
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
}

.dash-severity-chip.is-crit.active {
  color: var(--color-critical);
  border-color: color-mix(in srgb, var(--color-critical) 28%, var(--border));
}

.dash-severity-chip.is-warn.active {
  color: var(--color-review);
  border-color: color-mix(in srgb, var(--color-review) 28%, var(--border));
}

.dash-review-section {
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: color-mix(in srgb, var(--card-bg) 92%, var(--bg));
}

.dash-review-section.is-active {
  border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 16%, transparent);
}

.dash-review-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  padding: 9px 11px;
  border: none;
  background: var(--card-bg);
  text-align: left;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.dash-review-section-title {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.dash-review-section-kicker {
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
}

.dash-review-section-name {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: -0.01em;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-review-section-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.dash-review-pill {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 90%, transparent);
}

.dash-review-pill.is-crit {
  color: var(--color-critical);
  border-color: color-mix(in srgb, var(--color-critical) 22%, var(--border));
}

.dash-review-pill.is-warn {
  color: #8a5b00;
  border-color: color-mix(in srgb, var(--color-review) 28%, var(--border));
}

.dash-review-count {
  min-width: 22px;
  height: 22px;
  padding: 0 7px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 900;
  color: var(--text-main);
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  border: 1px solid color-mix(in srgb, var(--border) 76%, transparent);
}

.dash-diagnostic-active {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--accent) 3%, var(--bg));
}

.dash-review-section-body {
  padding: 0;
}

.dash-filter-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.dash-filter-chip.active {
  border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
  color: var(--accent);
}

.dash-filter-chip.clear {
  cursor: pointer;
  background: transparent;
}

.dash-flag-feed {
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 0 0 auto;
}

.dash-list-footnote {
  padding: 12px 16px 14px 16px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.dash-flag-group {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.dash-flag-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  margin-bottom: 0;
  position: sticky;
  top: 0;
  background: color-mix(in srgb, var(--card-bg) 96%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10;
}

.dash-flag-group:first-child .dash-flag-group-header {
  border-top: none;
}

.dash-flag-group-icon {
  font-size: 14px;
}

.dash-flag-group-text {
  font-size: 10px;
  font-weight: 900;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex: 1;
}

.dash-flag-group-count {
  font-size: 9px;
  font-weight: 900;
  background: var(--bg);
  color: var(--text-main);
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

/* Dashboard-specific tweaks for email-cards */
.dash-flag-feed .email-card {
  margin: 0 !important;
  width: 100% !important;
  box-sizing: border-box !important;
  border-radius: 0 !important;
  border-left: none !important;
  border-right: none !important;
  border-top: none !important;
  border-bottom: 1px solid var(--border) !important;
  box-shadow: none !important;
}

.dash-flag-feed .email-card:hover {
  transform: none !important;
}

.dash-flag-feed .email-card:last-of-type {
  border-bottom: none !important;
}

@media (min-width: 901px) {
  .dash-col-right {
    overflow: hidden;
  }

  .dash-flags-card {
    height: 100%;
  }

  .dash-flags-scroll {
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .dash-flags-scroll::-webkit-scrollbar {
    width: 5px;
  }

  .dash-flags-scroll::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }
}

.dash-flag-feed .email-card .em-fdh {
  font-size: 13px !important;
}

.dash-flag-feed .email-card .em-vendor {
  font-size: 9px !important;
}

.dash-flag-feed .email-card .glass-pill {
  transform: scale(0.9);
  transform-origin: right center;
}

/* === FOOTER: ENTRY BUTTONS === */
.dash-entry-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: center;
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  flex-shrink: 0;
