<style>
/* ============================================================
   V2 SHELL: GlassFlow (FINAL)
   ROLE: High-end mobile experience — spatial clarity & physical motion
   ============================================================ */

/* --- V2 Geometry Contract --- */
.v2-shell-glassflow {
  --v2-shell-inset: 12px;
  --v2-shell-radius: 24px;
  --v2-shell-top-offset: env(safe-area-inset-top, 0px);
  --v2-shell-bottom-clearance: 84px;
  --v2-shell-shadow: 0 8px 32px rgba(0,0,0,0.12);

  height: -webkit-fill-available;
  overflow: hidden;
  overscroll-behavior: contain;
  --inbox-panel-width: 100vw;
  font-size: 14px;
  background-color: var(--bg);
}

.v2-shell-glassflow-viewport {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  height: -webkit-fill-available;
}

.v2-shell-glassflow-container {
  margin: var(--v2-shell-inset);
  margin-top: calc(var(--v2-shell-inset) + var(--v2-shell-top-offset));
  margin-bottom: calc(var(--v2-shell-inset) + 10px);
  background: var(--card-bg);
  border-radius: var(--v2-shell-radius);
  box-shadow: var(--v2-shell-shadow);
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border);
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.v2-shell-glassflow-container.glow-ofs {
  border-color: #93c5fd;
  box-shadow: var(--v2-shell-shadow), 0 0 44px rgba(37, 99, 235, 0.32), 0 0 16px rgba(37, 99, 235, 0.16);
}
.v2-shell-glassflow-container.glow-complete {
  border-color: #86efac;
  box-shadow: var(--v2-shell-shadow), 0 0 44px rgba(34, 197, 94, 0.38), 0 0 16px rgba(34, 197, 94, 0.18);
}
.v2-shell-glassflow-container.glow-permit {
  border-color: #d8b4fe;
  box-shadow: var(--v2-shell-shadow), 0 0 44px rgba(168, 85, 247, 0.38), 0 0 16px rgba(168, 85, 247, 0.18);
}
.v2-shell-glassflow-container.glow-overdue {
  border-color: #f87171;
  box-shadow: var(--v2-shell-shadow), 0 0 52px rgba(239, 68, 68, 0.48), 0 0 20px rgba(239, 68, 68, 0.24);
}
.v2-shell-glassflow-container.glow-active {
  box-shadow: var(--v2-shell-shadow), 0 0 36px rgba(59, 130, 246, 0.22), 0 0 12px rgba(59, 130, 246, 0.10);
}

/* Glassy Header */
.v2-shell-glassflow-header {
  padding: 12px 20px;
  background: color-mix(in srgb, var(--card-bg) 85%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: var(--z-nav);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  pointer-events: auto;
}
.v2-shell-glassflow-header-main {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.v2-shell-glassflow-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.v2-shell-glassflow-logo-mark {
  font-weight: 900;
  letter-spacing: -1px;
  font-size: 22px;
  line-height: 1;
  white-space: nowrap;
}
.v2-shell-glassflow-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  z-index: calc(var(--z-base) + 3);
}
.v2-shell-glassflow-header-btn {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--border) 92%, transparent);
  background: color-mix(in srgb, var(--bg) 70%, var(--card-bg));
  color: var(--text-main);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.v2-shell-glassflow-header-btn svg {
  width: 16px;
  height: 16px;
}
.v2-shell-glassflow-header-btn#btn-help {
  font-size: 18px;
  font-weight: 900;
}

/* Animated Hamburger Icon */
.hamburger-icon {
  width: 20px;
  height: 14px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.hamburger-icon span {
  display: block;
  width: 100%;
  height: 2px;
  background: currentColor;
  border-radius: 4px;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: center;
}

/* Active State: X */
body.mobile-menu-open .hamburger-icon span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
body.mobile-menu-open .hamburger-icon span:nth-child(2) { opacity: 0; transform: scaleX(0); }
body.mobile-menu-open .hamburger-icon span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.v2-shell-glassflow-views {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.v2-shell-glassflow-scroll {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 94px;
  transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
}

#v2-glassflow-queue-panel {
  z-index: var(--z-drawer);
  opacity: 1;
  transform: translateX(0);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: 0;
}
#v2-glassflow-detail-panel { z-index: var(--z-drawer); transform: translateX(100%); opacity: 0; background: var(--card-bg); }

body.mobile-detail-open #v2-glassflow-queue-panel { transform: translateX(-30%); opacity: 0; pointer-events: none; }
body.mobile-detail-open #v2-glassflow-detail-panel { transform: translateX(0); opacity: 1; }

/* EXECUTIVE GLASS UI (WS18 P6 - Corner Utility Model) */
.v2-shell-glassflow-dock {
  position: fixed;
  bottom: calc(16px + env(safe-area-inset-bottom, 8px));
  left: 50% !important;
  transform: translateX(-50%) !important;
  width: auto !important;
  min-width: 60px;
  max-width: 96vw;
  height: 60px;
  background: color-mix(in srgb, var(--card-bg) 65%, transparent) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
  border-radius: 30px;
  display: none; /* Hidden by default in Queue */
  justify-content: center;
  align-items: center;
  padding: 0 8px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.15) !important;
  z-index: var(--z-dock);
  border: 1px solid color-mix(in srgb, var(--border) 45%, transparent) !important;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Show Dock only in Detail or Admin contexts */
body.mobile-detail-open .v2-shell-glassflow-dock,
body.mobile-admin-open .v2-shell-glassflow-dock {
  display: flex !important;
}

/* FAB Pushing Logic - Twin FAB Stack on Right */
#unified-filter-fab {
  bottom: calc(88px + env(safe-area-inset-bottom, 8px)) !important; /* Stacked Above Admin */
  right: 16px !important;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
}
#admin-hub-fab {
  bottom: calc(16px + env(safe-area-inset-bottom, 8px)) !important; /* Base FAB */
  right: 16px !important;
  width: 48px !important;
  height: 48px !important;
  background: color-mix(in srgb, var(--card-bg) 95%, #fff) !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25) !important;
}
#admin-hub-fab svg {
  width: 20px !important;
  height: 20px !important;
  color: var(--text-main);
  opacity: 0.85;
}
.m-dock-badge {
  padding: 0 6px !important;
  border-radius: 999px !important; /* Full pill shape */
  font-size: 10px !important;
  font-weight: 900 !important;
  min-width: 18px !important;
  height: 18px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  letter-spacing: -0.2px;
  background: var(--color-critical); /* Default Red */
  color: #fff !important;
  border: none !important;
}
#admin-fab-badge {
  position: absolute !important;
  left: -8px !important;
  right: auto !important;
  top: -8px !important;
  width: auto !important;
  min-width: 22px !important;
  padding: 0 7px !important;
  height: 22px !important;
  border-radius: 11px !important;
  border: none !important;
  color: #fff !important;
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.12);
}
#admin-fab-badge-detail {
  background: var(--color-critical) !important;
  margin-left: 6px !important;
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.12);
}

/* Hide FABs when expanded views are open to clear airspace */
body.mobile-detail-open #unified-filter-fab,
body.mobile-admin-open #unified-filter-fab,
body.mobile-detail-open #admin-hub-fab,
body.mobile-admin-open #admin-hub-fab {
  opacity: 0 !important;
  pointer-events: none !important;
  transform: translateY(20px) scale(0.8) !important;
}

/* Opaque Search & Filter Sheet */
#mobile-sf-sheet {
  background: var(--card-bg) !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.4) !important;
}

/* Active State: Large Blue Borderless Pill */
.v2-shell-glassflow-dock-btn.active,
body.mobile-admin-open .v2-shell-glassflow-dock-btn.active {
  background: var(--accent) !important;
  color: #ffffff !important;
  border: none !important;
  border-radius: 999px !important; /* Full pill shape */
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35) !important;
  margin: 0 16px !important; /* Widen spacing around selected for breathing room */
  padding: 0 16px !important; /* Larger pill */
  min-width: 64px !important;
}
.v2-shell-glassflow-dock-btn.active svg,
body.mobile-admin-open .v2-shell-glassflow-dock-btn.active svg { color: #ffffff !important; stroke: #ffffff !important; }

/* Admin Close Icon: Red and Transparent Background */
#dock-btn-admin-close {
  background: transparent !important;
  box-shadow: none !important;
  color: #ef4444 !important;
}
#dock-btn-admin-close svg {
  stroke: #ef4444 !important;
  width: 22px !important;
  height: 22px !important;
}

.v2-shell-glassflow-dock-btn {
  flex: none !important;
  min-width: 48px;
  height: 44px;
  margin: 0 6px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-size: 10px;
  font-weight: 800;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}

/* Floating Nav Strip (Above Dock in Detail View) */
.dock-nav-strip {
  display: none;
  position: absolute;
  top: -38px;
  left: 50%;
  transform: translateX(-50%);
  align-items: center;
  background: color-mix(in srgb, var(--card-bg) 95%, #fff) !important; /* High opacity for legibility */
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
  border: 1px solid color-mix(in srgb, var(--border) 85%, #000) !important; /* Sharper border */
  border-radius: 999px;
  height: 32px;
  padding: 0 10px;
  gap: 8px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.2) !important;
  white-space: nowrap;
  z-index: calc(var(--z-dock) + 10);
}
body.mobile-detail-open .dock-nav-strip { display: flex; }

#dock-btn-detail-admin {
  background: color-mix(in srgb, var(--bg) 92%, #fff) !important;
  border-radius: 999px !important;
  margin-left: 10px !important;
  padding: 0 12px !important;
  border: 1px solid var(--border) !important;
  opacity: 1 !important;
  color: var(--text-main) !important;
}

.v2-shell-glassflow-dock-btn span:last-child {
  min-width: 0;
  white-space: nowrap;
}
.v2-shell-glassflow-dock-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.v2-shell-glassflow-dock-btn.primary {
  color: #fff;
  background: linear-gradient(135deg, #22c55e, #16a34a) !important; /* Green Commit Button */
  box-shadow: 0 8px 24px rgba(34, 197, 94, 0.35) !important;
  border-radius: 999px !important; /* Enlarge to Pill Shape */
  min-width: 84px !important;
  height: 48px !important;
  margin: 0 10px !important;
}
.v2-shell-glassflow-dock-btn.primary svg { stroke: currentColor; }
.v2-shell-glassflow-dock-btn.is-disabled {
  opacity: 0.3;
  pointer-events: none;
  filter: grayscale(1);
}
.v2-shell-glassflow-dock-btn.is-busy {
  opacity: 0.72;
  pointer-events: none;
}
.v2-shell-glassflow-dock-btn.success-pulse {
  animation: dock-commit-confirm 0.38s cubic-bezier(0.16, 1, 0.3, 1);
}

.v2-shell-glassflow-dock-btn .m-dock-badge {
  position: absolute;
  top: -6px;
  right: -2px;
  background: var(--color-critical);
  color: #fff;
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 999px;
  min-width: 14px;
  border: none !important;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06) !important;
}
#ob-count.m-dock-badge { background: #16a34a; }
#changelog-badge.m-dock-badge { background: #a855f7; }

/* Back Button */
.v2-shell-glassflow-back {
    display: none; align-items: center; gap: 6px; font-weight: 900; color: var(--accent);
    background: none; border: none; padding: 0; font-size: 17px; letter-spacing: -0.5px;
}
body.mobile-detail-open .v2-shell-glassflow-back { display: flex; }
body.mobile-detail-open .v2-shell-glassflow-brand { display: none; }


#outbox-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: var(--z-overlay); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
#outbox-overlay.open { opacity: 1; pointer-events: auto; }

/* Focus Mode Overrides */
.gantt-area.has-focus .gantt-row:not(.is-active) {
  opacity: 0.2 !important;
  filter: grayscale(90%) blur(1.5px) !important;
  pointer-events: none;
  transition: all 0.45s ease !important;
}
.gantt-row.is-active {
  opacity: 1 !important;
  filter: none !important;
  transform: scale(1.02) !important;
  z-index: calc(var(--z-content) + 40) !important;
  box-shadow: 0 0 30px rgba(168, 85, 247, 0.3) !important;
}

/* Gantt Dock Position — Upper Right (Thumb optimized for Landscape) */
body.mobile-gantt-open .v2-shell-glassflow-dock {
  top: 16px !important;
  bottom: auto !important;
  right: 16px !important;
  left: auto !important;
  transform: none !important;
  min-width: 200px;
  border-radius: 20px;
  height: 54px;
}

/* Purple Hint Pill — Lower Right in Gantt (Executive Glass Upgrade) */
.gantt-hint-pill {
  position: fixed;
  bottom: 16px; 
  right: 16px;
  background: color-mix(in srgb, var(--card-bg) 48%, transparent) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
  border: 1px solid color-mix(in srgb, var(--color-permit) 35%, transparent) !important;
  color: var(--color-permit);
  padding: 10px 20px;
  border-radius: 22px;
  font-size: 11px;
  font-weight: 900;
  z-index: var(--z-tooltip);
  display: none;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3) !important;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: center;
  white-space: nowrap;
}
body.mobile-gantt-open .gantt-hint-pill { display: flex; }

/* Detail Polish */
.v2-shell-glassflow .qb-module {
    border-radius: 0 !important; border: none !important; border-bottom: 1px solid var(--border) !important;
    margin-bottom: 0 !important; padding: 16px 20px !important;
}
.v2-shell-glassflow .pane-content,
.v2-shell-glassflow .qb-grid,
.v2-shell-glassflow .qb-top-row {
    width: 100%;
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
    gap: 0 !important;
}
/* Force .qb-top-row children to stack vertically and stretch full width.
   Base style is flex-wrap:wrap which causes content-width-only items. */
.v2-shell-glassflow .qb-top-row {
    flex-direction: column !important;
    flex-wrap: nowrap !important;
    align-items: stretch !important;
}
/* Remove desktop flex-grow/min-width on the two main cards */
.v2-shell-glassflow #project-schedule-card,
.v2-shell-glassflow #velocity-production-card {
    flex: none !important;
    min-width: 0 !important;
    border-right: none !important;
}
.v2-shell-glassflow .pane-content {
    padding: 0 0 86px !important;
    box-sizing: border-box;
}
.v2-shell-glassflow .qb-grid {
    max-height: none !important;
    min-height: auto !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: visible !important;
    align-self: stretch !important;
}
.v2-shell-glassflow .qb-top-row {
    border-bottom: 0 !important;
}
.v2-shell-glassflow .glassflow-thread-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: stretch;
}
.v2-shell-glassflow .vendor-bubble {
    display: flex !important;
    flex-direction: column !important;
    margin-bottom: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    padding: 10px 14px 11px !important;
    border-radius: 10px;
    border: 1px solid color-mix(in srgb, var(--border) 80%, #ca8a04);
    background: color-mix(in srgb, #fefce8 32%, var(--card-bg));
    box-shadow: none;
    font-style: normal !important;
    line-height: 1.45 !important;
    box-sizing: border-box !important;
}
.v2-shell-glassflow.dark-mode .vendor-bubble {
    border-color: color-mix(in srgb, #ca8a04 45%, var(--border));
    background: color-mix(in srgb, #422006 60%, var(--card-bg));
}
.v2-shell-glassflow .glassflow-note-shell {
    width: 100%;
    max-width: 100%;
    margin-left: 0;
    padding: 10px 14px 12px !important;
    border-radius: 10px;
    border: 1px solid color-mix(in srgb, #a855f7 38%, var(--border));
    background: color-mix(in srgb, #faf5ff 35%, var(--card-bg));
    box-shadow: none;
    box-sizing: border-box;
}
.v2-shell-glassflow.dark-mode .glassflow-note-shell {
    border-color: color-mix(in srgb, #a855f7 35%, var(--border));
    background: color-mix(in srgb, #3b0764 50%, var(--card-bg));
}
.v2-shell-glassflow .chat-bubble {
    border-radius: 0 !important;
    font-family: inherit !important;
    font-size: 14px !important;
    line-height: 1.5 !important;
    font-style: normal !important;
    color: var(--text-main) !important;
    min-height: 88px !important;
    height: auto !important;
    max-height: none !important;
    padding: 0 !important;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
    resize: none;
    overflow-y: auto;
    width: 100%;
    box-sizing: border-box;
    display: block;
}
.v2-shell-glassflow .glassflow-thread-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}
.v2-shell-glassflow .glassflow-thread-meta.vendor {
    color: #854d0e;
}
.v2-shell-glassflow .glassflow-thread-meta.pm {
    color: #6b21a8;
}
.v2-shell-glassflow .glassflow-thread-body {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-main);
    word-break: break-word;
}
.v2-shell-glassflow.dark-mode .glassflow-thread-meta.vendor {
    color: #fbbf24;
}
.v2-shell-glassflow.dark-mode .glassflow-thread-meta.pm {
    color: #c4b5fd;
}
.v2-shell-glassflow.dark-mode #p-gemini-date {
    color: #c4b5fd !important;
}

/* Custom Queue Items */
.v2-shell-glassflow .glassflow-queue-header {
    padding: 10px 14px 6px;
    background: color-mix(in srgb, var(--card-bg) 92%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
    flex-shrink: 0;
}
.v2-shell-glassflow .glassflow-queue-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: space-between;
    margin-bottom: 0;
}
.v2-shell-glassflow .glassflow-queue-title {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 12px;
}
.v2-shell-glassflow .glassflow-queue-kicker {
    display: flex;
    flex-direction: column;
    gap: 1px;
    font-size: 13px;
    line-height: 0.98;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: var(--text-main);
}
.v2-shell-glassflow .glassflow-queue-kicker span:first-child {
    color: var(--text-muted);
}
.v2-shell-glassflow .glassflow-queue-kicker span:last-child {
    color: var(--accent);
}
.v2-shell-glassflow .glassflow-queue-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 32px;
    padding: 0 10px;
    border-radius: 999px;
