<script>
// ============================================================
// FILE: _module_webapp_core.html | ROLE: Bootstrap, payload hydration, and desktop app-shell orchestration
// DEPENDS ON: _state_queue.html, _state_router.html, _state_session.html, _state_payload.html, _state_analytics.html, _state_ui_shell.html, _utils_shared.html, _utils_notifications.html, _utils_ui_tokens.html, and extracted _module_*.html owners
// DEPENDED ON BY: WebApp.html
// ============================================================
      window.addEventListener('scroll', updateFloatingPillsPosition, { passive: true });

      function isElementVisiblyRendered(el) {
          if (!el) return false;
          let style = window.getComputedStyle(el);
          return style.display !== 'none' && style.visibility !== 'hidden' && !el.classList.contains('collapsed');
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function syncDockLayoutSpacing() {
          const dock = getEl('filter-strip');
          if (dock) {
              dock.querySelectorAll('.dock-zone').forEach(zone => {
                  if (zone.id === 'dock-system-zone') {
                      zone.classList.remove('is-empty');
                      return;
                  }
                  let hasVisibleControl = Array.from(zone.children).some(child => {
                      if (child.classList && child.classList.contains('dock-divider')) return false;
                      return isElementVisiblyRendered(child);
                  });
                  zone.classList.toggle('is-empty', !hasVisibleControl || zone.classList.contains('collapsed'));
              });
          }

          const slideDeck = getEl('slide-action-deck');
          if (slideDeck) {
              slideDeck.querySelectorAll('.slide-action-cluster').forEach(cluster => {
                  let hasVisibleControl = Array.from(cluster.children).some(child => isElementVisiblyRendered(child));
                  cluster.classList.toggle('is-empty', !hasVisibleControl);
              });
          }
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function updateFloatingPillsPosition() {
          const container = getEl('active-filter-pills');
          if (!container) return;

          const hasPills = container.children.length > 0;
          container.style.opacity = hasPills ? '1' : '0';
          if (!hasPills) return;

          let anchor = null;
          const slideDeck = getEl('slide-action-deck');
          const filterStrip = getEl('filter-strip');

          if (slideDeck && isElementVisiblyRendered(slideDeck) && slideDeck.classList.contains('visible')) {
              anchor = slideDeck;
          } else if (filterStrip && isElementVisiblyRendered(filterStrip)) {
              anchor = filterStrip;
          }

          if (!anchor) {
              container.style.top = '78px';
              container.style.bottom = 'auto';
              return;
          }

          const gap = 8;
          const rect = anchor.getBoundingClientRect();
          const anchorIsBottomDock = currentDockPlacement === 'bottom' || rect.top > (window.innerHeight / 2);

          if (anchorIsBottomDock) {
              container.style.top = 'auto';
              container.style.bottom = `${Math.max(8, window.innerHeight - rect.top + gap)}px`;
          } else {
              container.style.top = `${Math.max(8, rect.bottom + gap)}px`;
              container.style.bottom = 'auto';
          }
      }

      // TODO: DOM-COUPLED - extract after state layer is isolated
      function syncDockClearanceState() {
          let offset = 0;
          let shouldShift = false;
          let dock = getEl('filter-strip');
          let workspace = getEl('main-workspace');
          let pills = getEl('active-filter-pills');
          let body = document.body;
          let topNav = document.querySelector('.top-nav');
          let navRect = topNav ? topNav.getBoundingClientRect() : null;
          if (navRect) {
              document.documentElement.style.setProperty('--dock-clearance-top', `${Math.ceil(navRect.bottom + 10)}px`);
          }

          if (!dock || !workspace || window.innerWidth <= 768 || window.innerWidth > 1800 || currentWorkspaceView === 'gantt') {
              document.documentElement.style.setProperty('--dock-panel-offset', '0px');
              body.classList.remove('dock-clearance-active');
              return;
          }

          if (dock && workspace) {
              let workspaceRect = workspace.getBoundingClientRect();
              let dockRect = dock.getBoundingClientRect();
              let clearBottom = dockRect.bottom;
              let leftRail = workspace.querySelector('.inbox-sidebar');
              let detailMain = workspace.querySelector('.detail-main');
              let outboxPane = getEl('outbox-pane');
              let fabAnchor = document.querySelector('.admin-fab-anchor');
              let topNavLeft = document.querySelector('.top-nav-left');
              let topNavCenter = document.querySelector('.top-nav-center');
              let topNavRight = document.querySelector('.nav-actions');
              let leftRect = (leftRail && getComputedStyle(leftRail).display !== 'none') ? leftRail.getBoundingClientRect() : null;
              let detailRect = (detailMain && getComputedStyle(detailMain).display !== 'none') ? detailMain.getBoundingClientRect() : null;
              let rightRect = null;
              let navLeftRect = topNavLeft ? topNavLeft.getBoundingClientRect() : null;
              let navCenterRect = topNavCenter ? topNavCenter.getBoundingClientRect() : null;
              let navRightRect = topNavRight ? topNavRight.getBoundingClientRect() : null;

          if (outboxPane && outboxPane.classList.contains('open') && getComputedStyle(outboxPane).display !== 'none') {
              rightRect = outboxPane.getBoundingClientRect();
          } else if (fabAnchor && currentWorkspaceView === 'detail') {
                  rightRect = fabAnchor.getBoundingClientRect();
              }

              let overlapX = function(a, b) {
                  if (!a || !b) return 0;
                  return Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
              };

              let dockBottomInWorkspace = Math.max(0, clearBottom - workspaceRect.top);
              let leftOverlap = overlapX(dockRect, leftRect);
              let rightOverlap = overlapX(dockRect, rightRect);
              let detailCompression = detailRect ? dockRect.width >= Math.max(0, detailRect.width - 72) : false;
              let navSideCrowded = false;
              let centerCrowded = false;

              if (navCenterRect) {
                  centerCrowded = dockRect.width >= Math.max(0, navCenterRect.width - 24);
              }
              if (navLeftRect && navRightRect) {
                  let navCorridorWidth = Math.max(0, navRightRect.left - navLeftRect.right - 28);
                  navSideCrowded = dockRect.width >= Math.max(0, navCorridorWidth);
              }

              shouldShift = dockBottomInWorkspace > 0 && (
                  leftOverlap > 0 ||
                  rightOverlap > 0 ||
                  detailCompression ||
                  navSideCrowded ||
                  centerCrowded ||
                  dockRect.width >= Math.max(1020, window.innerWidth - 620)
              );

              if (shouldShift) {
                  let desiredTop = dockBottomInWorkspace + 18;
                  offset = Math.max(52, Math.ceil(desiredTop - 12));
              }
          }

          document.documentElement.style.setProperty('--dock-panel-offset', `${offset}px`);
          body.classList.toggle('dock-clearance-active', shouldShift);
      }

      function getActiveSortValue() {
          const queueSort = getEl('sort-queue')?.value || 'default';
          if (currentWorkspaceView === 'gantt' && queueSort === 'default') return 'end';
          return queueSort;
      }

      function syncGanttSort(value) {
          const queueSort = getEl('sort-queue');
          if (queueSort) queueSort.value = value || 'end';
          syncSortControls();
          applyFilters();
      }

      function syncSortControls() {
          const effectiveSort = getActiveSortValue();
          const ganttSort = getEl('gantt-sort-select');
          if (ganttSort) ganttSort.value = effectiveSort;
      }

      // Dynamic Island State Memory

      function restoreDockState() {
          getEl('dock-system-zone').classList.add('collapsed');
          previousDockState.forEach(id => getEl(id)?.classList.remove('collapsed'));
          syncSlideActionDeck();
          syncDockLayoutSpacing();
          updateFloatingPillsPosition();
      }

      // currentPanelTab extracted to _state_router.html
      function persistStagedReviewSession() {
          try {
              sessionStorage.setItem(STAGED_REVIEW_SESSION_KEY, JSON.stringify(stagedDeckItems || []));
              sessionStorage.setItem(STAGED_REVIEW_COLLAPSED_SESSION_KEY, isStagedReviewCollapsed ? '1' : '0');
          } catch (e) {}
      }

      function loadStagedReviewSession() {
          try {
              let raw = sessionStorage.getItem(STAGED_REVIEW_SESSION_KEY);
              let parsed = raw ? JSON.parse(raw) : [];
              stagedDeckItems = Array.isArray(parsed) ? parsed : [];
          } catch (e) {
              stagedDeckItems = [];
          }
          try {
              isStagedReviewCollapsed = sessionStorage.getItem(STAGED_REVIEW_COLLAPSED_SESSION_KEY) === '1';
          } catch (e) {
              isStagedReviewCollapsed = false;
          }
      }

      function reconcileStagedReviewItems() {
          let activeFdhs = new Set(getActiveQueueItems().map(item => String(item.fdh || '')));
          let seen = new Set();
          stagedDeckItems = (stagedDeckItems || []).filter(function(fdh) {
              let key = String(fdh || '');
              if (!key || seen.has(key) || !activeFdhs.has(key)) return false;
              seen.add(key);
              return true;
          });
          persistStagedReviewSession();
      }

      function setStagedReviewCollapsed(collapsed) {
          isStagedReviewCollapsed = !!collapsed;
          persistStagedReviewSession();
          renderOutbox();
      }

      function toggleStagedReviewSection() {
          setStagedReviewCollapsed(!isStagedReviewCollapsed);
      }

      function getStagedReviewItems() {
          let activeLookup = new Map(getActiveQueueItems().map(item => [String(item.fdh || ''), item]));
          return (stagedDeckItems || []).map(fdh => activeLookup.get(String(fdh || ''))).filter(Boolean);
      }

      function getReviewedBadgeCount() {
          return getStagedReviewItems().length + (committedItems || []).length;
      }

      function searchHelp() {
          let input = getEl('help-search-input');
          if (!input) return;
          let filter = input.value.toLowerCase().trim();
          let sections = document.querySelectorAll('#help-panel .help-sec');
          sections.forEach(sec => {
              let title = sec.querySelector('.help-sec-title');
              let titleMatches = !!(title && title.innerText.toLowerCase().includes(filter));
              let hasVisibleContent = titleMatches;
              let items = sec.querySelectorAll('.help-row, .help-wf-step');
              items.forEach(item => {
                  let matches = titleMatches || !filter || item.innerText.toLowerCase().includes(filter);
                  item.style.display = matches ? '' : 'none';
                  if (matches) hasVisibleContent = true;
              });
              let descs = Array.from(sec.children).filter(el => el.classList.contains('hdesc'));
              descs.forEach(desc => {
                  let matches = titleMatches || !filter || desc.innerText.toLowerCase().includes(filter);
                  desc.style.display = matches ? '' : 'none';
                  if (matches) hasVisibleContent = true;
              });
              sec.style.display = hasVisibleContent ? 'flex' : 'none';
          });
      }

      function toggleHelpPanel() {
          let panel = getEl('help-panel'); let overlay = getEl('help-overlay');
          if (!panel) return;
          let isOpen = panel.classList.toggle('open');
          if (overlay) overlay.classList.toggle('open', isOpen);
          if (isOpen) {
              let searchInput = getEl('help-search-input');
              if (searchInput) {
                  searchInput.value = '';
                  searchHelp();
                  setTimeout(() => searchInput.focus(), 300);
              }
          }
      }

      function toggleMobileMenu() {
          let panel = getEl('mobile-menu-panel');
          if (!panel) return;
          panel.classList.toggle('open');
      }

      document.addEventListener('click', function(e) {
          let panel = getEl('mobile-menu-panel');
          if (!panel || !panel.classList.contains('open')) return;
          let btn = getEl('btn-hamburger');
          if (!btn) return;
          if (!panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) panel.classList.remove('open');
      });

      function isIPadLike() {
          if (window.matchMedia('(pointer: coarse) and (min-width: 769px) and (min-height: 600px)').matches) return true;
          let ua = navigator.userAgent;
          if (/iPad/.test(ua)) return true;
          if (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1) return true;
          return false;
      }
      window.addEventListener('resize', () => {
          if (!currentActiveItem || window.innerWidth <= 768) return;
          if (shouldAutoOpenAdminPanel()) {
              setAdminPanelOpen(true);
          } else if (isIPadLike()) {
              setAdminPanelOpen(false);
          }
      });
      window.addEventListener('resize', syncDockClearanceState);

      function exitTheaterMode(e) {
          if (e && e.target.closest('.gantt-quick-peek')) return;
          if (e && e.target.closest('.gantt-row')) return;
          closeQuickPeek();
          if (e && e.target.closest('.gantt-row:not(.is-active)') && !e.target.closest('.gantt-spike-label') && !e.target.closest('.gantt-today-label')) return;
          if (e && (e.target.closest('.gantt-spike-label') || e.target.closest('.gantt-today-label'))) return;

          let ganttArea = getEl('gantt-area-main');
          if (ganttArea) ganttArea.classList.remove('has-focus');
          document.querySelectorAll('.gantt-row').forEach(r => r.classList.remove('is-active'));

          let btn = getEl('btn-exit-theater');
          if (btn) btn.style.display = 'none';

          hudLocked = false;
          hideHUD();
          syncGanttIslandState();
      }

      function syncRawDataStripState() {
          const strip = getEl('raw-data-strip');
          if (!strip) return;
          const shouldShow = currentWorkspaceView === 'detail' && currentActiveItem && Array.isArray(currentActiveItem.rawRow) && currentActiveItem.rawRow.length > 0;
          strip.style.display = shouldShow ? 'flex' : 'none';
          if (!shouldShow) {
              strip.innerHTML = '';
              strip.style.opacity = '1';
              strip.style.pointerEvents = '';
          }
      }

      function openGanttForCurrentProject() {
          if (!currentActiveItem || !currentActiveItem.fdh) return;
          openGanttView(currentActiveItem.fdh);
      }

      applyViewMode(); // restore persisted queue view (card/list/grid)
      if (navigator.maxTouchPoints > 1 && window.innerWidth >= 769) document.body.classList.add('touch-tablet');
      // ✨ KINETIC LOADER CONTROLLERS
      let frostedInterval;

      function showFrostedLoader(title, subtitle, type = 'sync', steps = ["Processing..."]) {
          let loader = getEl('frosted-loader');
          if (!loader) return;

          let titleEl = getEl('frosted-title');
          let subEl = getEl('frosted-sub');
          if (titleEl) titleEl.innerText = title;
          if (subEl) subEl.innerText = subtitle;

          let core = getEl('frosted-core');
          if (core) core.className = 'frosted-data-core core-' + type;

          loader.classList.add('visible');

          let stepIdx = 0;
          let progress = 0;
          let textEl = getEl('frosted-terminal-text');
          let barEl = getEl('frosted-progress');

          if (textEl) textEl.innerText = steps[0];
          if (barEl) barEl.style.width = '0%';

          clearInterval(frostedInterval);
          frostedInterval = setInterval(() => {
              progress += Math.random() * 15;
              if (progress >= 95) progress = 95;
              else if (progress > (stepIdx + 1) * (100 / steps.length) && stepIdx < steps.length - 1) {
                  stepIdx++;
                  if (textEl) textEl.innerText = steps[stepIdx];
              }
              if (barEl) barEl.style.width = `${progress}%`;
          }, 150);
      }

      function hideFrostedLoader() {
          clearInterval(frostedInterval);
          let barEl = getEl('frosted-progress');
          let textEl = getEl('frosted-terminal-text');
          if (barEl) barEl.style.width = '100%';
          if (textEl) textEl.innerText = "Task complete. Rendering UI...";

          setTimeout(() => {
              let loader = getEl('frosted-loader');
              if (loader) loader.classList.remove('visible');
          }, 400);
      }

      // ── ⟳ Sync QB — pulls fresh reference data from QuickBase API ──────────
      function triggerQBSync() {
          const queueCount = document.querySelectorAll('#inbox-list .inbox-item').length;
          const msg = "Sync reference data from QuickBase?\n\n" +
              "⚠️  This will overwrite 5-Reference_Data with live QB data.\n\n" +
              (queueCount > 0
                  ? `You have ${queueCount} item(s) still in the queue.\nHave you reviewed today's flagged projects before syncing?`
                  : "Queue is clear — safe to sync.");
          if (!confirm(msg)) return;
          const btn = getEl('btn-qb-sync');
          if (btn) { btn.innerText = '⟳ Syncing…'; btn.disabled = true; }
          showFrostedLoader("SYNCING QUICKBASE", "Pulling latest live reference data...", "sync", [
              "Authenticating QuickBase API token...",
              "Fetching multi-table payloads...",
              "Normalizing relational database...",
              "Rebuilding local reference dictionary..."
          ]);
          // DATA CALL: triggerQBSync
          // COUPLED TO: btn-qb-sync, frosted loader, globalRefDataDate, ref-data badge UI, confirm flow
          // EXTRACT BLOCKER: separate sync orchestration state from button/loading UI and global mirror-date ownership
          google.script.run
              .withSuccessHandler(function(r) {
                  if (r.success) {
                      globalRefDataDate = r.timestamp;
                      updateRefDataIndicator();
                      // DATA CALL: triggerQBSync post-sync refresh
                      // COUPLED TO: initDashboard payload bootstrap, btn-qb-sync, frosted loader, startup overlay, run-review prompt
                      // EXTRACT BLOCKER: initDashboard bootstrap contract must be isolated before this nested refresh can move
                      google.script.run
                          .withSuccessHandler(function(data) {
                              hideFrostedLoader();
                              if (btn) { btn.innerText = '⟳ Sync QB'; btn.disabled = false; }
                              initDashboard(data);
                              showToast('✅ Synced ' + r.count + ' records · ' + r.timestamp);

                              const promptRunReview = function() {
                                  const startupOverlay = getEl('startup-overlay');
                                  if (startupOverlay && startupOverlay.classList.contains('visible')) {
                                      setTimeout(promptRunReview, 300);
                                      return;
                                  }
                                  if (confirm('✅ Reference data synced & admin logs reset.\n\nRun Review now to refresh admin task flags (Check Crossings, Status Mismatch, etc.)?')) {
                                      triggerRunReview();
                                  }
                              };
                              setTimeout(promptRunReview, 400);
                          })
                          .withFailureHandler(function(err) {
                              hideFrostedLoader();
                              if (btn) { btn.innerText = '⟳ Sync QB'; btn.disabled = false; }
                              alert('Refresh Error: ' + err.message);
                          })
                          .getDashboardData();
                  } else {
                      hideFrostedLoader();
                      if (btn) { btn.innerText = '⟳ Sync QB'; btn.disabled = false; }
                      showToast('❌ ' + r.error, 'error');
                  }
              })
              .withFailureHandler(function(e) {
                  hideFrostedLoader();
                  if (btn) { btn.innerText = '⟳ Sync QB'; btn.disabled = false; }
                  showToast('❌ Sync error: ' + e.message, 'error');
              })
              .syncFromQBWebApp();
      }

      // ── ▶ Run Review — re-runs the diagnostic engine for a given date ────
      function triggerRunReview() {
          let d = new Date();
          let tzOffset = d.getTimezoneOffset() * 60000;
          let localToday = new Date(d.getTime() - tzOffset);
          let maxDateStr = localToday.toISOString().split('T')[0];
          let dateInput = getEl('run-review-date');

          if (dateInput) {
              dateInput.max = maxDateStr;

              let defaultDate = new Date(localToday);
              let dayOfWeek = defaultDate.getUTCDay();
              let currentHour = d.getHours();
              if (dayOfWeek === 5) {                          // Friday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
              } else if (dayOfWeek === 6) {                   // Saturday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 2);
              } else if (dayOfWeek === 0) {                   // Sunday → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
              } else if (dayOfWeek === 1 && currentHour < 11) { // Mon before 11 → Thu
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 4);
              } else if (dayOfWeek === 1) {                   // Mon after 11 → Fri
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 3);
              } else {                                        // Tue/Wed/Thu → yesterday
                  defaultDate.setUTCDate(defaultDate.getUTCDate() - 1);
              }

              dateInput.value = defaultDate.toISOString().split('T')[0];
              checkWeekendHint();
          }

          getEl('run-review-modal')?.classList.add('visible');
      }

      function checkWeekendHint() {
          let dateInput = getEl('run-review-date');
          let hint = getEl('weekend-hint');
          if (dateInput && hint) {
              let d = new Date(dateInput.value + 'T12:00:00');
              hint.style.display = (d.getDay() === 5) ? 'block' : 'none';
          }
      }

      function executeRunReview() {
          let dateVal = getEl('run-review-date')?.value;
          if (!dateVal) return;

          getEl('run-review-modal')?.classList.remove('visible');
          let btn = getEl('btn-run-review'); if(btn) { btn.innerText = "Running..."; btn.disabled = true; }
          let targetDates = [dateVal];
          let d = new Date(dateVal + 'T12:00:00');
          if (d.getDay() === 5) {
              let sat = new Date(d); sat.setDate(sat.getDate() + 1);
              let sun = new Date(d); sun.setDate(sun.getDate() + 2);
              targetDates.push(sat.toISOString().split('T')[0]);
              targetDates.push(sun.toISOString().split('T')[0]);
          }

          showFrostedLoader("RUNNING ENGINE", "Processing diagnostic rules and logic...", "engine", [
              "Initializing Benny Engine...",
              "Ingesting raw vendor reports...",
              "Calculating pace and historical benchmarks...",
              "Applying network topology logic...",
              "Generating AI-assisted diagnostics..."
          ]);
          // DATA CALL: executeRunReview
          // COUPLED TO: btn-run-review, frosted loader, targetDates modal flow, initDashboard bootstrap
          // EXTRACT BLOCKER: decouple review-run UI flow and dashboard bootstrap from the backend bridge
          google.script.run.withSuccessHandler((data) => {
              hideFrostedLoader();
              if(btn) { btn.innerText = "▶ Run Review"; btn.disabled = false; }
              initDashboard(data);
          }).withFailureHandler((err) => {
              hideFrostedLoader();
              if(btn) { btn.innerText = "▶ Run Review"; btn.disabled = false; } alert("Engine Error: " + err.message);
          }).webAppTrigger3a(targetDates);
      }

      // ── ↻ Refresh — fast re-read of mirror sheet, no engine re-run ────────
      function triggerUIRefresh() {
          let btn = getEl('btn-refresh'); if(btn) { btn.innerText = "↻ Loading…"; btn.disabled = true; }
          showFrostedLoader("REFRESHING DASHBOARD", "Fetching latest UI state...", "sync", [
              "Querying active mirror data...",
              "Re-rendering DOM elements...",
              "Applying active workspace filters..."
          ]);
          // DATA CALL: triggerUIRefresh
          // COUPLED TO: btn-refresh, frosted loader, initDashboard bootstrap, toast feedback
          // EXTRACT BLOCKER: isolate refresh UI orchestration and bootstrap re-render path first
          google.script.run
              .withSuccessHandler((data) => {
                  hideFrostedLoader();
                  if(btn) { btn.innerText = "↻ Refresh"; btn.disabled = false; }
                  initDashboard(data);
                  showToast('↻ Dashboard refreshed');
              })
              .withFailureHandler((err) => {
                  hideFrostedLoader();
                  if(btn) { btn.innerText = "↻ Refresh"; btn.disabled = false; }
                  alert("Refresh Error: " + err.message);
              })
              .getDashboardData();
      }

      function _adminSection(title, items, renderCard) {
          if (items.length === 0) return '';
          let cards = items.map(renderCard).join('');
          return `<div style="border-bottom:1px solid var(--border); padding:0;">
              <div style="padding:10px 16px 6px; font-size:11px; font-weight:900; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; justify-content:space-between; background:var(--bg);">
                  <span>${title} <span style="background:var(--border); color:var(--text-main); padding:1px 7px; border-radius:10px; font-size:10px;">${items.length}</span></span>
              </div>
              ${cards}
          </div>`;
      }

      function markQbUpdated(fdhId) {
          let btn = getEl('btn-qb-update'); if(btn) { btn.innerText = "SAVING..."; btn.disabled = true; }
          // DATA CALL: markQbUpdated
          // COUPLED TO: btn-qb-update, currentActiveItem, queue card tags, detail pane tags
          // EXTRACT BLOCKER: status-tag mutation spans queue/detail surfaces that still depend on shared item state
          google.script.run.withSuccessHandler((dateStr) => {
              if(btn) btn.remove();
              let paneTags = document.querySelectorAll('#p-action .chip-warn, #p-action .tag-red');
              paneTags.forEach(t => { if(t.innerText.includes("STATUS MISMATCH") || t.innerText.includes("MISSING QB STATUS")) { t.className = "tag chip-admin admin-flag-tag"; t.innerText = "ADMIN: REFRESH REF DATA"; } });
              let qCard = getEl(`card-${fdhId}`);
              if(qCard) { let qTags = qCard.querySelectorAll('.chip-warn, .tag-red'); qTags.forEach(t => { if(t.innerText.includes("STATUS MISMATCH") || t.innerText.includes("MISSING QB STATUS")) { t.className = "tag chip-admin"; t.innerText = "ADMIN: REFRESH REF DATA"; } }); }
              if(currentActiveItem) currentActiveItem.flags = currentActiveItem.flags.replace("🚩 STATUS MISMATCH", "⚠️ ADMIN: REFRESH REF DATA").replace("🚩 MISSING QB STATUS", "⚠️ ADMIN: REFRESH REF DATA").trim();
          }).withFailureHandler(err => {
              alert("Failed to save: " + err.message); if(btn) { btn.innerText = "🛠️ MARK QB UPDATED"; btn.disabled = false; }
          }).markStatusSyncComplete(fdhId);
      }

      function hl(headerName) {
          document.querySelectorAll('.raw-highlight').forEach(el => el.classList.remove('raw-highlight'));
          if(!headerName) return; let safeName = headerName.replace(/"/g, '&quot;');
          let els = document.querySelectorAll(`[data-header="${safeName}"]`); els.forEach(el => el.classList.add('raw-highlight'));
          if(els.length > 0) { let strip = getEl('raw-data-strip'); if(strip) { let elRect = els[0].getBoundingClientRect(); let stripRect = strip.getBoundingClientRect(); if(elRect.left < stripRect.left || elRect.right > stripRect.right) els[0].scrollIntoView({behavior: "smooth", inline: "center", block: "nearest"}); } }
      }

      /* 🧠 Touch-safe HUD Positioning */

      // globalEndCounts, globalTodayData, currentFilterStats,
      loadStagedReviewSession();
      loadReviewedTray();
      renderOutbox();

      // TODO: DOM-COUPLED - extract after state layer is isolated
      // BOOTSTRAP ANCHOR: owns first payload fetch, viewport handoff, splash timeout, and startup error UI
      window.onload = function() {
          reportStartupPhase('window-onload');
          if (checkViewportHandOff()) return;

          /* Keyboard avoidance: float dock above iOS software keyboard */
          if (window.visualViewport) {
              const setVvh = () => document.documentElement.style.setProperty('--vvh', window.visualViewport.height + 'px');
              setVvh();
              window.visualViewport.addEventListener('resize', setVvh);
          }
          let bootTimeoutId = setTimeout(() => {
              bootTimeoutId = null;
              reportStartupPhase('dashboard-payload-timeout');
              showStartupFailure(
                  'Connection timeout.',
                  'Apps Script did not respond. Please refresh the page.',
                  null
              );
          }, 20000);

          // DATA CALL: window.onload initial dashboard load
          // COUPLED TO: boot timeout state, splash/welcome/detail panes, initDashboard bootstrap, pane-content error UI
          // EXTRACT BLOCKER: bootstrap contract for all views must be isolated before moving the initial payload call
          google.script.run
              .withSuccessHandler(data => { 
                  if (bootTimeoutId) clearTimeout(bootTimeoutId);
                  reportStartupPhase('dashboard-payload-success', { actionItems: data && data.actionItems ? data.actionItems.length : 0 });
                  hideSplash();
                  try {
                      initDashboard(data);
                  } catch (err) {
                      reportStartupPhase('dashboard-init-failure', err && err.stack ? err.stack : err);
                      showStartupFailure(
                          'Frontend Initialization Crash',
                          'Dashboard data loaded, but the UI failed while initializing.',
                          err && err.stack ? err.stack : (err && err.message ? err.message : String(err))
                      );
                  }
              })
              .withFailureHandler(err => {
                  if (bootTimeoutId) clearTimeout(bootTimeoutId);
                  reportStartupPhase('dashboard-payload-failure', err && err.stack ? err.stack : err);
                  showStartupFailure(
                      'Backend Crash',
                      err && err.message ? err.message : 'Dashboard data could not be loaded from Apps Script.',
                      err && err.stack ? err.stack : null
                  );
              })
              .getDashboardData();

          // DATA CALL: window.onload Gemini usage badge load
          google.script.run
              .withSuccessHandler(usage => {
                  reportStartupPhase('gemini-usage-success');
                  updateGeminiBadge(usage);
              })
              .withFailureHandler(err => {
                  reportStartupPhase('gemini-usage-failure', err && err.message ? err.message : err);
              })
              .getGeminiUsage();
      };

      function updateCityDropdown() {
          let vVen = getEl('filter-vendor').value;
          let validCities = vVen === 'ALL'
              ? [...new Set(allActionItems.map(i => i.city).filter(Boolean))]
              : [...new Set(allActionItems.filter(i => i.vendor === vVen).map(i => i.city).filter(Boolean))];
          let cityDropdown = getEl('filter-city');
          if (!cityDropdown) return;
          let currentCity = cityDropdown.value;
          cityDropdown.innerHTML = '<option value="ALL">All Cities</option>';
          validCities.sort().forEach(c => {
              let opt = document.createElement('option'); opt.value = c; opt.text = c; cityDropdown.appendChild(opt);
          });
          cityDropdown.value = validCities.includes(currentCity) ? currentCity : 'ALL';
      }

      // TODO: HIGH RISK - bootstrap contract for all views.
      // Extract last, after all consumers are modularized.
      // BOOTSTRAP ANCHOR: hydrates allActionItems/global payload state and fans out to every major desktop surface
      function initDashboard(data) {
        window._lastDashboardPayload = data;
        const initOk = safeExecute('initDashboard', () => {
            hideSplash();
            restoreGanttViewSession();
            if (data && data.allFdhIds) {
                globalAllFdhIds = data.allFdhIds;
                let datalist = document.getElementById('fdh-list');
                if (!datalist) {
                    datalist = document.createElement('datalist');
                    datalist.id = 'fdh-list';
                    document.body.appendChild(datalist);
                }
                datalist.innerHTML = data.allFdhIds.sort().map(id => `<option value="${id}">`).join('');
            }
            allGlobalLogs = (data && data.globalLogs) ? data.globalLogs : [];
            digestVendorCities = (data && data.vendorCities) ? data.vendorCities : [];
            const userSelect = getEl('changelog-user');
            if (userSelect) {
                if (allGlobalLogs.length > 0) {
                    let uniqueUsers = [...new Set(allGlobalLogs.map(l => l.user).filter(Boolean))].sort();
                    userSelect.innerHTML = '<option value="ALL">All Users</option>' + uniqueUsers.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');
                } else {
                    userSelect.innerHTML = '<option value="ALL">All Users</option>';
                }
            }
            const logUserFilter = getEl('filter-log-user');
            if (logUserFilter) {
                if (allGlobalLogs.length > 0) {
                    let uniqueUsers = [...new Set(allGlobalLogs.map(l => l.user).filter(Boolean))].sort();
                    logUserFilter.innerHTML = '<option value="ALL">All Users</option>' + uniqueUsers.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');
                } else {
                    logUserFilter.innerHTML = '<option value="ALL">All Users</option>';
                }
                logUserFilter.style.display = (currentGridPivot === 'changelog' || currentGridPivot === 'global-log') ? 'inline-flex' : 'none';
            }
            let groupSelect = getEl('group-by-select');
            if (groupSelect) groupSelect.value = currentGroupBy;
            renderChangeLog();
            updateChangelogBadge();
            if (!data || !data.actionItems || data.actionItems.length === 0) {
                allActionItems = [];
                setHtml('gantt-container', `<div class="empty-msg">All Clear ✓</div>`);
                setHtml('inbox-list', `<div class="empty-msg">All Clear ✓</div>`);
                setStyle('welcome-screen', 'display', 'flex');
                setStyle('detail-layout', 'display', 'none');
                setHtml('welcome-screen', `<div style="font-size:32px; margin-bottom:12px; font-weight:900; letter-spacing:-1px; color:var(--text-muted);">All Clear ✓</div>`);
                showStartupSelector();
                return;
            }
            allActionItems = data.actionItems; globalHeaders = data.headers;
            globalRefDataDate = data.refDataDate || "";
            reconcileStagedReviewItems();
            let activeQueueItems = getActiveQueueItems();
            updateRefDataIndicator();
            updateAdminBadge();
            renderAdminPane(activeQueueItems);
            renderOutbox();
            openAdminPanelByDefault();
            populateDropdown('filter-vendor', [...new Set(activeQueueItems.map(i => i.vendor).filter(Boolean))]); populateDropdown('filter-city', [...new Set(activeQueueItems.map(i => i.city).filter(Boolean))]);
            let ofsMonths = activeQueueItems.map(i => {
                if(!i.ofsDate || i.ofsDate === "-" || i.ofsDate === "Unknown") return null;
                try { let d = safeDate(i.ofsDate); return d ? d.toLocaleDateString('en-US', {month:'short', timeZone:'UTC'}).toUpperCase() : null; } catch(e) { return null; }
            }).filter(Boolean);
            let ofsDropdown = getEl('filter-ofs');
            if (ofsDropdown) {
                ofsDropdown.innerHTML = '<option value="ALL">All OFS Dates</option><option value="60_DAYS">&lt; 60 Days</option><option value="90_DAYS">&lt; 90 Days</option>';
                [...new Set(ofsMonths)].sort().forEach(m => {
                    let opt = document.createElement('option'); opt.value = m; opt.text = m; ofsDropdown.appendChild(opt);
                });
            }
            applyFilters();
            showStartupSelector();
            // Re-apply theme after bootstrap to ensure icon renders
            if (typeof applyTheme === 'function') {
                applyTheme(_sysDark && _sysDark.matches);
            }
        });
        if (!initOk) {
            reportStartupPhase('dashboard-init-failure', 'safeExecute(initDashboard) reported a UI crash');
            showStartupFailure(
                'Frontend Initialization Crash',
                'Dashboard data loaded, but the UI failed while rendering startup state.',
                'Check the console for the original stack trace from safeExecute(initDashboard).'
            );
            return;
        }
        reportStartupPhase('dashboard-init-complete');
      }

      window.addEventListener('orientationchange', () => { setTimeout(scrollGanttToToday, 350); });
      window.addEventListener('resize', syncGanttViewportLayout);

      // Calculator Keyboard Support
      document.addEventListener('keydown', function(e) {
          var calcWidget = document.getElementById('calc-widget');
          if (!calcWidget || !calcWidget.classList.contains('open')) return;
          var key = e.key;
          if (/[0-9\.]/.test(key)) {
              e.preventDefault(); calcNum(key);
          } else if (['+', '-', '*', '/', '(', ')'].includes(key)) {
              e.preventDefault(); calcOp(key);
          } else if (key === 'Enter' || key === '=') {
              e.preventDefault(); calcOp('=');
          } else if (key === 'Backspace') {
              e.preventDefault();
              if (calcState !== 'Err' && calcState.length > 0) {
                  calcState = calcState.slice(0, -1);
                  updateCalc();
              }
          } else if (key === 'Escape') {
              e.preventDefault(); toggleWidget('calc-widget');
          }
      });
    </script>
