    const systemThemeMedia = window.matchMedia('(prefers-color-scheme: dark)');

    let globalEndCounts = {};
    let globalTodayData = { total: 0, vendors: {}, projects: [], activeBsls: 0, criticalCount: 0 };
    let _orientationHintTimer = null;
    var mobileViewMode = 'inbox'; 
    let ganttZoomMode = 'month';
    const GANTT_PX_PER_DAY = Object.freeze({ month: 22, week: 34 });
    let adminSubTab = 'crossings';

    let acknowledgedCriticalFdhs = [];
    var CHANGELOG_PULSE_KEY = 'omni_pmo_changelog_pulse';

    var mobileDeckStaged = (function() {
      try { return JSON.parse(sessionStorage.getItem(MOBILE_DECK_STAGED_KEY) || '[]'); } catch(e) { return []; }
    })();

    function getDateGroupLabel(tsMs) {
      if (!tsMs) return 'Unknown Date';
      var d = new Date(Number(tsMs));
      var today = new Date(); today.setHours(0,0,0,0);
      var yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      var entryDay = new Date(d); entryDay.setHours(0,0,0,0);
      if (entryDay.getTime() === today.getTime()) return 'Today';
      if (entryDay.getTime() === yesterday.getTime()) return 'Yesterday';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function updateChangelogPulse() {
      var logs = mobileState.globalLogs || [];
      var badge = document.getElementById('tab-badge-digest');
      if (!badge) return;
      if (!logs.length) { badge.classList.remove('has-value'); return; }
      var latestTs = Math.max.apply(null, logs.map(function(l) { return Number(l.timestampObj || 0); }));
      var seenTs = Number(sessionStorage.getItem(CHANGELOG_PULSE_KEY) || 0);
      if (latestTs > seenTs) badge.classList.add('has-value');
      else badge.classList.remove('has-value');
    }

    function clearChangelogPulse() {
      var logs = mobileState.globalLogs || [];
      if (logs.length) {
        var latestTs = Math.max.apply(null, logs.map(function(l) { return Number(l.timestampObj || 0); }));
        try { sessionStorage.setItem(CHANGELOG_PULSE_KEY, String(latestTs)); } catch(e) {}
      }
      var badge = document.getElementById('tab-badge-digest');
      if (badge) badge.classList.remove('has-value');
    }

    function openChangelogHub() {
      var overlay = document.getElementById('changelog-overlay');
      if (!overlay) return;
      overlay.classList.add('changelog-open');
      clearChangelogPulse();
      renderChangelogHub('');
    }

    function closeChangelogHub() {
      var overlay = document.getElementById('changelog-overlay');
      if (overlay) overlay.classList.remove('changelog-open');
    }

    function renderChangelogHub(searchTerm) {
      var content = document.getElementById('changelog-content');
      if (!content) return;
      var logs = (mobileState.globalLogs || []).slice();
      var term = String(searchTerm || '').trim().toLowerCase();
      if (term) {
        logs = logs.filter(function(l) {
          return String(l.fdh || '').toLowerCase().includes(term) ||
                 String(l.user || '').toLowerCase().includes(term) ||
                 String(l.type || '').toLowerCase().includes(term);
        });
      }
      logs.sort(function(a, b) { return Number(b.timestampObj || 0) - Number(a.timestampObj || 0); });
      var fdhSet = {};
      (allActionItems || []).forEach(function(item) { if (item.fdh) fdhSet[item.fdh] = true; });
      var listHtml = '';
      if (!logs.length) {
        listHtml = '<div class="clhub-empty">No activity' + (term ? ' matching "' + escapeHtml(term) + '"' : '') + '</div>';
      } else {
        var groups = []; var groupMap = {};
        logs.forEach(function(entry) {
          var label = getDateGroupLabel(entry.timestampObj);
          if (!groupMap[label]) { groupMap[label] = []; groups.push(label); }
          groupMap[label].push(entry);
        });
        groups.forEach(function(label) {
          listHtml += '<div class="clhub-date-group"><div class="clhub-date-label">' + escapeHtml(label) + '</div>';
          groupMap[label].forEach(function(entry) {
            var fdh = String(entry.fdh || '').trim();
            var cleanVal = String(entry.val || '').replace(/(?: \d{2}:\d{2}:\d{2} GMT.*)/, '').trim();
            var isLinked = fdh && fdhSet[fdh];
            listHtml += '<div class="clhub-entry' + (isLinked ? ' clhub-entry--tappable' : '') + '"' + (isLinked ? ' data-clhub-nav="' + escapeHtml(fdh) + '"' : '') + '>' +
                '<div class="clhub-entry__top">' + (fdh ? '<span class="clhub-entry__fdh">' + escapeHtml(fdh) + '</span>' : '') + (entry.type ? '<span class="clhub-entry__type">' + escapeHtml(entry.type) + '</span>' : '') + '</div>' +
                (cleanVal ? '<div class="clhub-entry__val">' + escapeHtml(cleanVal) + '</div>' : '') +
                '<div class="clhub-entry__meta">' + escapeHtml(entry.user || 'System') + ' \u00b7 ' + escapeHtml(entry.time || '') + '</div></div>';
          });
          listHtml += '</div>';
        });
      }
      content.innerHTML = '<div class="clhub-header"><div class="clhub-header__title">Changelog</div><div class="clhub-header__count">' + logs.length + ' entries</div><button class="chub-close" onclick="closeChangelogHub()">✕</button></div><div class="clhub-search-bar"><input id="clhub-search-input" class="clhub-search" type="search" placeholder="Search FDH, user, or type…" autocomplete="off" value="' + escapeHtml(term) + '"></div><div class="clhub-list">' + listHtml + '</div>';
      var input = document.getElementById('clhub-search-input');
      if (input) { input.addEventListener('input', function() { renderChangelogHub(input.value); }); if (term) { input.focus(); input.setSelectionRange(term.length, term.length); } }
      content.querySelectorAll('[data-clhub-nav]').forEach(function(entry) { entry.addEventListener('click', function() { closeChangelogHub(); adminOpenDetail(entry.dataset.clhubNav); }); });
    }

    function toggleMobileDeckStage(fdh) {
      var key = String(fdh || ''); if (!key) return;
      var idx = mobileDeckStaged.indexOf(key);
      if (idx > -1) { mobileDeckStaged.splice(idx, 1); showToast('Removed from batch', 'info'); }
      else { mobileDeckStaged.push(key); showToast('Staged for batch', 'success'); }
      try { sessionStorage.setItem(MOBILE_DECK_STAGED_KEY, JSON.stringify(mobileDeckStaged)); } catch(e) {}
      var btn = document.getElementById('detail-stage-btn'); if (btn) btn.textContent = mobileDeckStaged.includes(key) ? 'Unstage' : 'Stage';
      updateDeckStageBar();
    }

    function updateDeckStageBar() {
      var bar = document.getElementById('detail-deck-bar'); if (!bar) return;
      var count = mobileDeckStaged.length; bar.style.display = count > 0 ? 'flex' : 'none';
      var label = bar.querySelector('.detail-deck-bar__label'); if (label) label.textContent = count + ' project' + (count !== 1 ? 's' : '') + ' staged';
    }

    function promptMobileBatchExport() {
      if (!mobileDeckStaged.length) { showToast('No projects staged', 'info'); return; }
      var email = window.prompt('Email Batch Report (' + mobileDeckStaged.length + ' project' + (mobileDeckStaged.length !== 1 ? 's' : '') + ')\n\nEnter destination email:', '');
      if (!email || !email.trim()) return;
      var now = new Date(); var dateStr = (now.getMonth() + 1) + '/' + now.getDate() + '/' + now.getFullYear();
      var payloads = []; var combinedText = 'DAILY PM BATCH REPORT\nGenerated: ' + dateStr + '\n\n';
      mobileDeckStaged.forEach(function(fdh) {
        var item = (allActionItems || []).find(function(i) { return i.fdh === fdh; }); if (!item) return;
        var note = String(mobileState.detailNotes[fdh] || '');
        payloads.push({ fdh: item.fdh, vendor: item.vendor || '', targetDate: item.targetDate || item.cxEnd || 'TBD', note: note, answers: {} });
        combinedText += '==================================================\n' + 'PROJECT: ' + item.fdh + ' (' + (item.vendor || 'Unknown') + ' \u2014 ' + (item.city || 'Unknown') + ')\n' + 'Stage: ' + (item.stage || '-') + ' | Status: ' + (item.status || '-') + '\n' + 'Manager Note: ' + (note || 'No note provided.') + '\n\n';
      });
      if (!payloads.length) { showToast('No matching items found', 'error'); return; }
      showToast('Exporting ' + payloads.length + ' projects\u2026', 'info');
      google.script.run.withSuccessHandler(function(count) { showToast('Emailed & saved ' + count + ' projects!', 'success'); mobileDeckStaged = []; try { sessionStorage.removeItem(MOBILE_DECK_STAGED_KEY); } catch(e) {} updateDeckStageBar(); renderDetailView(); }).withFailureHandler(function(err) { showToast('Export failed: ' + (err.message || err), 'error'); }).processBatchDeckExport(payloads, email.trim(), combinedText);
    }

    const dom = {};
    function hydrateIconography() {
      if (dom.refreshButton) dom.refreshButton.innerHTML = icon('refresh', 20);
      var fabSymbol = document.querySelector('.fab-btn__symbol'); if (fabSymbol) fabSymbol.innerHTML = icon('menu', 20);
      var retryButton = document.getElementById('stale-retry-button'); if (retryButton) retryButton.innerHTML = 'Retry ' + icon('refresh', 14);
      document.querySelectorAll('.sheet-close, .modal-close').forEach(function(button) { button.innerHTML = icon('close', 18); });
      document.querySelectorAll('.action-item').forEach(function(button) {
        var glyph = button.querySelector('.action-item__glyph'); if (!glyph) return;
        var actionName = button.dataset.action || '';
        if (actionName === 'run-review') glyph.innerHTML = icon('run', 18);
        else if (actionName === 'sync-qb') glyph.innerHTML = icon('sync', 18);
        else if (actionName === 'refresh') glyph.innerHTML = icon('refresh', 18);
      });
      document.querySelectorAll('.admin-empty__icon').forEach(function(el) { el.innerHTML = icon('warning', 16); });
      if (dom.orientationPromptIcon) dom.orientationPromptIcon.innerHTML = icon('refresh', 18);
      var landscapeBack = document.getElementById('landscape-back-btn'); if (landscapeBack) landscapeBack.innerHTML = icon('back', 24);
      var landscapeMenu = document.getElementById('landscape-menu-btn'); if (landscapeMenu) landscapeMenu.innerHTML = icon('menu', 24);
      var tabIconMap = { 'tab-btn-queue': 'queue', 'tab-btn-detail': 'detail', 'tab-btn-gantt': 'gantt', 'tab-btn-admin': 'admin', 'tab-btn-digest': 'digest' };
      Object.keys(tabIconMap).forEach(function(id) { var button = document.getElementById(id); if (!button) return; var iconHost = button.querySelector('.mobile-tabbar__icon'); if (iconHost) iconHost.innerHTML = icon(tabIconMap[id], 20); });
    }

    function cacheDom() {
      dom.headerTitle = document.getElementById('mobile-header-title'); dom.headerSubtitle = document.getElementById('mobile-header-subtitle'); dom.headerContext = document.getElementById('header-context-bar'); dom.tabButtons = Array.from(document.querySelectorAll('.mobile-tabbar__tab')); dom.tabPanels = Array.from(document.querySelectorAll('.tab-panel')); dom.queueSearchInput = document.getElementById('queue-search-input'); dom.queueGroupButtons = Array.from(document.querySelectorAll('[data-queue-group]')); dom.queueContent = document.getElementById('queue-content'); dom.queueSummaryCount = document.getElementById('queue-summary-count'); dom.queueSummarySub = document.getElementById('queue-summary-sub'); dom.queuePullIndicator = document.getElementById('queue-pull-indicator'); dom.queueHudBody = document.getElementById('queue-hud-body'); dom.queueHudToggleLabel = document.getElementById('queue-hud-toggle-label'); dom.queueHudStats = document.getElementById('queue-hud-stats'); dom.queueHudChips = document.getElementById('queue-hud-chips'); dom.queueBadge = document.getElementById('tab-badge-queue'); dom.criticalBadge = document.getElementById('tab-badge-critical'); dom.detailContent = document.getElementById('detail-content'); dom.actionSheet = document.getElementById('mobile-action-sheet'); dom.actionSheetClose = document.getElementById('action-sheet-close'); dom.fabButton = document.getElementById('header-fab-btn'); dom.refreshButton = document.getElementById('header-refresh-btn'); dom.actionThemeLabel = document.getElementById('action-theme-label'); dom.actionThemeMeta = document.getElementById('action-theme-meta'); dom.actionThemeGlyph = document.getElementById('action-theme-glyph'); dom.loadingOverlay = document.getElementById('mobile-global-loading'); dom.loadingMessage = document.getElementById('mobile-global-loading-message'); dom.toastStack = document.getElementById('mobile-toast-stack'); dom.confirmModal = document.getElementById('mobile-confirm-modal'); dom.confirmModalTitle = document.getElementById('confirm-modal-title'); dom.confirmModalSubtitle = document.getElementById('confirm-modal-subtitle'); dom.confirmModalBody = document.getElementById('confirm-modal-body'); dom.confirmModalActions = document.getElementById('confirm-modal-actions'); dom.orientationPrompt = document.getElementById('mobile-orientation-prompt'); dom.orientationPromptMessage = document.getElementById('orientation-prompt-message'); dom.orientationPromptIcon = dom.orientationPrompt ? dom.orientationPrompt.querySelector('.orientation-hint__icon') : null; dom.ganttScrollWrap = document.getElementById('gantt-scroll-wrap'); dom.ganttTimelineInner = document.getElementById('gantt-timeline-inner'); dom.adminContent = document.getElementById('admin-content'); dom.adminBadge = document.getElementById('tab-badge-admin'); dom.adminCountCrossings = document.getElementById('admin-count-crossings'); dom.adminCountQbstatus = document.getElementById('admin-count-qbstatus'); dom.adminCountBoms = document.getElementById('admin-count-boms'); dom.digestContent = document.getElementById('digest-content'); dom.ganttZoomFab = document.getElementById('gantt-zoom-fab');
    }

    function getOrientation() { return window.innerWidth > window.innerHeight ? 'landscape' : 'portrait'; }
    function applyOrientationMode() {
      var tab = mobileState.activeTab; var orient = getOrientation(); var landscapeTabs = ['gantt', 'detail']; var isLandscape = orient === 'landscape' && landscapeTabs.includes(tab);
      document.body.classList.toggle('mode-landscape', isLandscape); document.body.classList.toggle('mode-portrait', !isLandscape);
      if (dom.ganttZoomFab) dom.ganttZoomFab.classList.toggle('visible', isLandscape && tab === 'gantt');
    }

    function setActiveTab(tabName) {
      if (!TAB_META[tabName]) return; mobileState.activeTab = tabName;
      dom.tabButtons.forEach(function(button) { const isActive = button.dataset.tabTarget === tabName; button.classList.toggle('is-active', isActive); button.setAttribute('aria-current', isActive ? 'page' : 'false'); });
      dom.tabPanels.forEach(function(panel) { panel.classList.toggle('is-active', panel.dataset.tab === tabName); });
      const meta = TAB_META[tabName]; if (dom.headerTitle) dom.headerTitle.textContent = meta.title; if (dom.headerSubtitle) dom.headerSubtitle.textContent = meta.subtitle; if (dom.headerContext) dom.headerContext.textContent = meta.context;
      applyOrientationMode(); checkOrientationForTab(tabName);
      if (tabName === 'gantt' && filteredItems.length > 0) renderGanttTimeline();
      if (tabName === 'admin') renderAdminTab();
      if (tabName === 'digest') renderDigestTab();
    }

    function setQueueViewMode(mode) { mobileViewMode = mode; ['inbox', 'list', 'grid'].forEach(function(m) { var chip = document.getElementById('vmc-' + m); if (chip) chip.classList.toggle('active', m === mode); }); renderQueueContent(); }
    function updateCriticalBadge() { var criticalCount = filteredItems.filter(function(item) { return getSeverity(item.flags) === 'crit'; }).length; if (!dom.criticalBadge) return; if (criticalCount > 0) { dom.criticalBadge.textContent = String(criticalCount); dom.criticalBadge.style.display = 'inline-flex'; } else dom.criticalBadge.style.display = 'none'; }

    function openCriticalHub() {
      try { var stored = localStorage.getItem(CRITICAL_ACK_KEY); acknowledgedCriticalFdhs = stored ? JSON.parse(stored) : []; } catch (e) { acknowledgedCriticalFdhs = []; }
      mobileState.criticalHubShowAcknowledged = false; renderCriticalHub();
      var overlay = document.getElementById('chub-overlay'); if (overlay) { overlay.hidden = false; requestAnimationFrame(function() { overlay.classList.add('chub-open'); }); }
    }

    function closeCriticalHub() { var overlay = document.getElementById('chub-overlay'); if (overlay) { overlay.classList.remove('chub-open'); window.setTimeout(function() { if (!overlay.classList.contains('chub-open')) overlay.hidden = true; }, 220); } }
    function acknowledgeCriticalItem(fdh) { if (!fdh || acknowledgedCriticalFdhs.indexOf(fdh) !== -1) return; acknowledgedCriticalFdhs.push(fdh); try { localStorage.setItem(CRITICAL_ACK_KEY, JSON.stringify(acknowledgedCriticalFdhs)); } catch (e) {} renderCriticalHub(); updateCriticalBadge(); }

    function renderCriticalHub() {
      var overlay = document.getElementById('chub-overlay'); var sheet = overlay ? overlay.querySelector('.chub-sheet') : null; if (!sheet) return;
      var all = allActionItems || []; var criticalItems = all.filter(function(item) { return getSeverity(item.flags) === 'crit'; }); var unacknowledged = criticalItems.filter(function(item) { return acknowledgedCriticalFdhs.indexOf(item.fdh) === -1; }); var acknowledged = criticalItems.filter(function(item) { return acknowledgedCriticalFdhs.indexOf(item.fdh) !== -1; });

    function setGanttZoom(zoom) { if (!GANTT_PX_PER_DAY[zoom]) return; if (ganttZoomMode === zoom) return; ganttZoomMode = zoom; document.querySelectorAll('[data-gantt-zoom]').forEach(function(b) { b.classList.toggle('is-active', b.dataset.ganttZoom === zoom); }); document.querySelectorAll('[data-gantt-zoom-fab]').forEach(function(b) { b.classList.toggle('is-active', b.dataset.ganttZoomFab === zoom); }); renderGanttTimeline(); }

    function bindShellEvents() {
      let queuePullStartY = 0, queuePullDelta = 0, detailSwipeStartX = 0, detailSwipeStartY = 0;
      dom.tabButtons.forEach(function(button) { button.addEventListener('click', function() { setActiveTab(button.dataset.tabTarget); }); });
      if (dom.queueSearchInput) dom.queueSearchInput.addEventListener('input', function() { mobileState.queueSearch = dom.queueSearchInput.value; applyQueueFilters(); });
      dom.queueGroupButtons.forEach(function(button) { button.addEventListener('click', function() { mobileState.queueGroupBy = button.dataset.queueGroup || 'none'; dom.queueGroupButtons.forEach(function(candidate) { candidate.classList.toggle('is-active', candidate === button); }); applyQueueFilters(); }); });
      if (dom.queueContent) { dom.queueContent.addEventListener('touchstart', function(event) { if (mobileState.activeTab !== 'queue' || mobileState.queueLoading || dom.queueContent.scrollTop > 0) return; queuePullStartY = event.touches[0].clientY; queuePullDelta = 0; }, { passive: true }); dom.queueContent.addEventListener('touchmove', function(event) { if (mobileState.activeTab !== 'queue' || mobileState.queueLoading || dom.queueContent.scrollTop > 0 || !queuePullStartY) return; queuePullDelta = Math.max(0, event.touches[0].clientY - queuePullStartY); if (queuePullDelta > 0 && dom.queuePullIndicator) { dom.queuePullIndicator.classList.add('is-visible'); dom.queuePullIndicator.classList.toggle('is-armed', queuePullDelta > 72); dom.queuePullIndicator.textContent = queuePullDelta > 72 ? 'Release to refresh' : 'Pull down to refresh'; } }, { passive: true }); dom.queueContent.addEventListener('touchend', function() { if (queuePullDelta > 72) loadQueueData(true); queuePullStartY = 0; queuePullDelta = 0; if (dom.queuePullIndicator && !mobileState.queueLoading) { dom.queuePullIndicator.classList.remove('is-visible', 'is-armed'); dom.queuePullIndicator.textContent = 'Pull down to refresh'; } }); }
      if (dom.detailContent) { dom.detailContent.addEventListener('touchstart', function(event) { if (mobileState.activeTab !== 'detail') return; detailSwipeStartX = event.touches[0].clientX; detailSwipeStartY = event.touches[0].clientY; }, { passive: true }); dom.detailContent.addEventListener('touchend', function(event) { if (mobileState.activeTab !== 'detail' || !detailSwipeStartX) return; const endX = event.changedTouches[0].clientX, endY = event.changedTouches[0].clientY, diffX = endX - detailSwipeStartX, diffY = endY - detailSwipeStartY; detailSwipeStartX = 0; detailSwipeStartY = 0; if (Math.abs(diffX) < 60 || Math.abs(diffY) > 40) return; if (diffX < 0) advanceActiveItem(1); else advanceActiveItem(-1); }); }
      if (dom.fabButton) dom.fabButton.addEventListener('click', function() { if (mobileState.actionSheetOpen) closeActionSheet(); else openActionSheet(); });
      if (dom.refreshButton) dom.refreshButton.addEventListener('click', function() { loadQueueData(true); });
      if (dom.actionSheetClose) dom.actionSheetClose.addEventListener('click', closeActionSheet);
      document.querySelectorAll('[data-close-sheet]').forEach(function(button) { button.addEventListener('click', function() { const target = document.getElementById(button.dataset.closeSheet); if (target) target.hidden = true; }); });
      document.querySelectorAll('[data-close-modal]').forEach(function(button) { button.addEventListener('click', function() { const target = document.getElementById(button.dataset.closeModal); if (target) { target.hidden = true; target.classList.remove('is-open'); } }); });
      const runReviewModalClose = document.getElementById('run-review-modal-close'), runReviewCancelBtn = document.getElementById('run-review-cancel-btn'), runReviewConfirmBtn = document.getElementById('run-review-confirm-btn');
      if (runReviewModalClose) runReviewModalClose.addEventListener('click', closeRunReviewModal); if (runReviewCancelBtn) runReviewCancelBtn.addEventListener('click', closeRunReviewModal); if (runReviewConfirmBtn) runReviewConfirmBtn.addEventListener('click', executeRunReview);
      document.querySelectorAll('.action-item').forEach(function(button) { button.addEventListener('click', function() { const actionName = button.dataset.action || ''; if (actionName === 'run-review') { closeActionSheet(); openRunReviewModal(); } else if (actionName === 'sync-qb') { closeActionSheet(); openConfirmModal({ action: 'sync-qb-confirm', title: 'Sync QB', subtitle: 'Pull latest data from QuickBase', body: 'This will sync QB data into the reference sheet and reload the queue. Continue?', confirmLabel: 'Sync QB', confirmClass: 'modal-action-btn--commit' }); } else if (actionName === 'toggle-theme') { closeActionSheet(); toggleDarkMode(); } else if (actionName === 'refresh') { closeActionSheet(); loadQueueData(true); } }); });
      document.addEventListener('keydown', function(event) { if (event.key === 'Escape' && mobileState.actionSheetOpen) closeActionSheet(); });
      document.addEventListener('click', function(event) { if (!mobileState.actionSheetOpen || !dom.actionSheet) return; if (event.target === dom.actionSheet) closeActionSheet(); });
      window.addEventListener('resize', function() { mobileState.orientation = getOrientation(); applyOrientationMode(); checkOrientationForTab(mobileState.activeTab); });
      bindGanttZoom(); bindAdminSubTabs();
    }

    function initMobileShell() {
      try { cacheDom(); hydrateIconography(); initializeTheme(); bindShellEvents(); mobileState.orientation = getOrientation(); setActiveTab(mobileState.activeTab); applyOrientationMode(); checkOrientationForTab(mobileState.activeTab); hideLoading(); var initialCache = loadQueueCache(); if (initialCache && initialCache.data) { applyDashboardPayload(initialCache.data); showStaleBanner(initialCache.savedAt); } renderDetailView(); loadQueueData(false); } catch (err) { document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#ef4444;"><h2>Startup Error</h2><pre style="white-space:pre-wrap;font-size:13px;">' + escapeHtml(err && err.message ? err.message : 'Unknown startup error') + '\n' + escapeHtml(err && err.stack ? err.stack : '') + '</pre></div>'; }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initMobileShell); else initMobileShell();
    window.dismissOrientationPrompt = dismissOrientationPrompt; window.toggleActionSheet = toggleActionSheet; window.setGanttZoom = setGanttZoom;
</script>
