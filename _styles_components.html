        flex-direction: column;
        align-items: center;
        justify-content: center;

        transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
      }
      .obsidian-loader.hidden {
        opacity: 0;

        pointer-events: none;
      }
      .loader-content {
        display: flex;
        flex-direction: column;

      }
      .data-core {

        justify-content: center;

        position: absolute;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      .core-ring.outer {
        width: 100%;
        height: 100%;
        border-top-color: #3b82f6;
        border-bottom-color: #8b5cf6;
        animation: spin-core 2s linear infinite;
      }
      .core-ring.middle {
        width: 70%;
        height: 70%;
        border-left-color: #22c55e;
        border-right-color: #10b981;
        animation: spin-core-reverse 1.5s linear infinite;
      }
      .core-dot {
        width: 12px;
        height: 12px;

        box-shadow: 0 0 15px 4px rgba(59, 130, 246, 0.6);
        animation: pulse-core 1s ease-in-out infinite alternate;
      }
      @keyframes spin-core { 100% { transform: rotate(360deg); } }

          position: relative;
          left: auto;
          bottom: auto;
          transform: translateY(18px) scale(0.985);
          display: none;
          align-items: center;
          justify-content: center;
          align-self: center;
          gap: 8px;
          margin: 18px auto 0;
          padding: 9px 12px;
          border-radius: 34px;
          background: rgba(255, 255, 255, 0.72);
          backdrop-filter: blur(32px) saturate(200%);
          -webkit-backdrop-filter: blur(32px) saturate(200%);
          border: 1px solid rgba(255, 255, 255, 0.82);
          box-shadow: 0 16px 40px rgba(15, 23, 42, 0.14), inset 0 1px 1px rgba(255,255,255,1);
          z-index: 2001;
          opacity: 0;
          pointer-events: none;
          transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.28s ease, filter 0.8s ease;

          opacity: 1;
          pointer-events: auto;
          transform: translateY(0) scale(1);
      }
      .slide-action-deck.dock-idle {

      /* ── 🧠 DYNAMIC ANCHORED FILTER TAGS ── */

      .digest-map-card { min-height:420px; }

          width:100%;
          height:100%;
